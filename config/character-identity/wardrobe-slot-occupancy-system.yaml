schema_version: "1.0.0"
name: "wardrobe-slot-occupancy-system"
description: "Tracks explicit wardrobe occupancy independently from pose, crop, object, and shadow coverage."

wardrobe_slot_occupancy:
  slot_state_values:
    worn: "explicitly requested in original prompt"
    absent: "explicitly stated as not worn"
    unspecified_absent_by_default: "not specified; enhancer must not add an item"
    covered_by_pose: "coverage is body pose, not clothing"
    covered_by_object: "coverage is object occlusion, not clothing"
    covered_by_camera_crop: "coverage is framing, not clothing"
    covered_by_shadow_or_light: "coverage is lighting, not clothing"
  slots:
    upper_body: [shirt, tank_top, blouse, camisole, crop_top, bra, bikini_top, jacket, coat, robe, towel, fabric_wrap, body_paint_upper]
    lower_body: [pants, jeans, shorts, skirt, panties, bikini_bottom, swimsuit_bottom, thong, leggings, stockings, towel_wrap, fabric_wrap, body_paint_lower]
    footwear: [shoes, boots, sandals, heels, barefoot]
    accessories: [gloves, socks, hat, scarf, belt, jewelry]
  rule: "An unspecified slot must never transition to worn without an explicit original-prompt item."
