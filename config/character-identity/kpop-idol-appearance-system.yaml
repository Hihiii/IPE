# ============================================================
# kpop-idol-appearance-system.yaml
# K-pop idol facial styling, eye harmony, hair styling, and performance-beauty controller
# Version: 1.0.0
# Purpose:
#   Strengthen K-pop idol-specific face, makeup, hair, and close-up beauty quality
#   without requiring LoRA.
# ============================================================

schema_version: "1.0.0"
name: "kpop-idol-appearance-system"
description: >
  A K-pop performance appearance module for prompt enhancement. It enriches idol
  prompts with Korean entertainment-industry beauty language, stage-ready hair and
  makeup, eye harmony safeguards, and performer-camera polish.

core_principle: >
  K-pop idol appearance is not generic beauty. It combines clean facial harmony,
  expressive but balanced eyes, polished skin finish, refined stage makeup, tidy
  hair shaping, and camera-ready performance polish. The goal is a believable,
  commercially styled idol look rather than a generic singer or doll-like beauty face.

global_rules:
  - "When the subject is a K-pop idol, add Korean entertainment-styling cues rather than generic beauty wording."
  - "Preserve eye harmony: left/right eye size, spacing, eyelid shape, gaze direction, and iris alignment should remain balanced."
  - "Stage makeup should look intentional under concert lighting, not flat or over-painted."
  - "Hair should read as performance-ready: shaped for movement, volume, and light response."
  - "Avoid blank doll-like faces, dead eyes, over-smoothed skin, or asymmetrical eye rendering."
  - "If the image is medium/full-body, still preserve facial readability and idol polish."
  - "Do not rely on LoRA as the first solution; facial harmony and styling should be built into the prompt."

idol_appearance_schema:
  appearance_mode: "kpop_idol | pop_star | actress_beauty | stage_editorial | custom"
  face_harmony_priority: "low | medium | high | critical"
  eye_harmony_priority: "low | medium | high | critical"
  skin_finish: []
  eye_design: []
  lip_finish: []
  contour_style: []
  hair_style_direction: []
  hair_movement_profile: []
  makeup_intensity: "soft | medium | strong"
  camera_beauty_intent: []
  anti_failure_terms: []

kpop_visual_markers:
  facial_language:
    - "refined K-pop idol facial styling"
    - "camera-ready idol beauty"
    - "polished Korean entertainment aesthetic"
    - "soft but defined facial harmony"
  skin_language:
    - "clean luminous skin"
    - "refined skin texture"
    - "subtle dewy stage-ready complexion"
    - "healthy soft glow without plastic smoothing"
  eye_language:
    - "balanced almond-shaped eyes"
    - "clear symmetric eyelids"
    - "defined yet natural eyeliner"
    - "bright expressive eyes"
    - "coherent iris alignment and gaze direction"
    - "natural lower-lash definition"
  lip_language:
    - "soft glossy lip finish"
    - "polished lip gradient or refined natural tint"
  hair_language:
    - "performance-ready styled hair"
    - "clean silhouette with controlled movement"
    - "soft shine and strand separation"
    - "hair shaped to read clearly under stage lights"

idol_makeup_profiles:
  stage_kbeauty_soft_glam:
    positive:
      - "polished K-beauty stage makeup"
      - "brightened under-eye area"
      - "clean eyeliner and natural lash definition"
      - "soft blush and sculpted but natural contour"
      - "subtle highlighter catching concert light"
      - "soft glossy lips"
    avoid:
      - "muddy makeup"
      - "heavy mask-like foundation"
      - "harsh overdrawn features"

  youthful_idol_glow:
    positive:
      - "youthful idol glow"
      - "fresh luminous complexion"
      - "delicate pink or coral lip tint"
      - "clean brows and bright eyes"
    avoid:
      - "over-aged makeup"
      - "dull skin"

eye_harmony_guardrails:
  positive_language:
    - "balanced eye size and shape"
    - "coherent left-right eye symmetry"
    - "consistent eyelid fold structure"
    - "aligned iris direction"
    - "natural catchlights"
    - "eyes remain expressive and coordinated"
  negative_language:
    - "uneven eyes"
    - "mismatched eye size"
    - "asymmetrical eyelids"
    - "cross-eyed"
    - "wandering gaze"
    - "dead eyes"
    - "doll-like eyes"
    - "blurred eye detail"

hair_stage_profiles:
  polished_stage_wave:
    positive:
      - "soft flowing hair with polished stage volume"
      - "movement-responsive strands"
      - "controlled flyaways"
      - "visible strand separation under backlight"
  sleek_idol_finish:
    positive:
      - "sleek idol hair styling"
      - "clean silhouette"
      - "controlled shine"
      - "tidy face-framing strands"

prompt_enrichment_language:
  positive_additions:
    - "refined K-pop idol facial styling"
    - "polished Korean entertainment aesthetic"
    - "balanced expressive eyes with coherent symmetry"
    - "clean luminous skin with refined texture"
    - "performance-ready hair and makeup"
    - "camera-ready idol beauty"
    - "natural catchlights and facial readability under stage lighting"
  negative_additions:
    - "uneven eyes"
    - "mismatched eye size"
    - "asymmetrical eyelids"
    - "cross-eyed"
    - "dead eyes"
    - "plastic skin"
    - "muddy makeup"
    - "doll-like face"
    - "over-smoothed face"

workflow_advice:
  if_face_is_weak:
    better_first_steps:
      - "improve facial styling and eye-harmony language in the prompt"
      - "increase facial readability priority"
      - "use medium-close framing when face quality is important"
      - "apply face/portrait repair or inpaint only after prompt quality is improved"
    optional_later:
      - "detailer or face-refiner workflow after base face harmony is already good"

self_review_checklist:
  - "Does the face read specifically as a polished K-pop idol rather than a generic singer?"
  - "Are the eyes balanced in size, eyelid shape, and gaze alignment?"
  - "Does the makeup remain readable under stage lighting?"
  - "Does the hair feel performance-ready and visually clean?"
  - "Does the face avoid plastic smoothing and doll-like stiffness?"

model_specific_rendering:
  chatgpt_image:
    guidance: >
      Use K-pop idol-specific face, eye, skin, and hair language. Explicitly protect eye
      harmony and camera-ready stage beauty.
  z_image_turbo:
    positive_template: >
      refined k-pop idol face, balanced expressive eyes, coherent eye symmetry,
      clean luminous skin, polished stage makeup, performance-ready hair
    negative_template: >
      uneven eyes, asymmetrical eyelids, dead eyes, plastic skin,
      doll-like face, muddy makeup
  stable_diffusion:
    positive_template: >
      kpop idol beauty, balanced eyes, clean skin, polished makeup,
      camera-ready face, stage hair
    negative_template: >
      bad eyes, asymmetrical eyes, dead eyes, plastic face, muddy makeup

prompt_assembly_hooks:
  phase_1_intent_analysis:
    add_fields:
      - idol_appearance_schema
    action: "Detect K-pop idol or performance-beauty tasks."
  phase_2_cinematic_enrichment:
    action: "Enrich face, eye harmony, hair, and makeup with K-pop-specific beauty language."
  phase_3_scene_blueprint:
    action: "Coordinate idol appearance with performance stage language, lighting, and wardrobe."
  phase_4_self_review:
    checks:
      - "Check eye harmony and facial readability."
      - "Check K-pop-specific styling quality."
  phase_4_5_cleanup:
    action: "Preserve eye-harmony and K-pop beauty safeguards."
  phase_4_6_renderer_selection:
    action: "Render K-pop appearance language in target-model format."
  phase_5_final_prompt:
    action: "Include concise K-pop idol facial styling and eye-harmony instructions."
