schema_version: "1.0.0"
name: "costume-marker-priority-system"
description: >
  Costume marker priority controller for recognizable character IP, cosplay,
  fashion reinterpretation, and photoreal conversion. It ranks which outfit
  components must stay readable when the costume is simplified, restyled, or
  translated into another rendering mode.

core_principle: >
  A character costume is a hierarchy of identity markers, not a pile of clothing
  words. Preserve the markers that carry recognition first: silhouette, color
  blocking, emblem/crest, signature accessory, material language, and prop logic.

costume_marker_schema:
  upper_body: ""
  lower_body: ""
  shoulder_design: ""
  neckline_or_collar: ""
  sleeve_or_glove: ""
  waist_design: ""
  footwear: ""
  cape_or_outerwear: ""
  emblem_logo_crest: ""
  signature_accessory: ""
  signature_prop: ""
  material_language: ""
  color_blocking: ""
  exposure_boundary: ""
  reinterpretation_notes: ""

marker_priority_order:
  - silhouette_and_outline
  - color_blocking
  - emblem_logo_crest
  - signature_accessory_or_prop
  - shoulder_neckline_waist_structure
  - material_language
  - footwear_and_gloves
  - micro_trim_details

reinterpretation_modes:
  direct_character_reference:
    preserve:
      - official-like silhouette
      - iconic color blocking
      - emblem / crest / symbol when safe and requested
      - signature props
    avoid:
      - random redesign
      - missing costume markers
      - wrong-series accessories
  cosplay_reinterpretation:
    preserve:
      - readable marker placement
      - cosplay construction seams
      - practical fabric thickness
      - wig / prop / accessory cues
    avoid:
      - generic model in unrelated outfit
      - costume marker loss
  fashion_reinterpretation:
    preserve:
      - color hierarchy
      - silhouette family
      - emblem-inspired motif without exact logo if commercial-safe
      - one or two signature accessories
    avoid:
      - exact logo use when commercial-safe mode is requested
      - fashion look that erases the IP signal
  photorealistic_real_world_version:
    preserve:
      - physically wearable construction
      - practical material translations
      - hair / face / palette locks
      - recognizable prop or emblem substitute
    avoid:
      - plastic costume
      - generic cosplay-girl replacement
      - marker overdesign that breaks recognition

marker_failure_taxonomy:
  costume_marker_loss:
    symptoms:
      - "key emblem, prop, accessory, or color block disappears"
      - "outfit becomes generic fantasy / idol / streetwear"
    positive_fix:
      - "restore the highest-priority costume markers"
      - "make color-block hierarchy readable at thumbnail distance"
    negative_fix:
      - "missing costume markers"
      - "generic outfit"
      - "wrong color blocking"
  wrong_garment_component:
    symptoms:
      - "wrong top, skirt, armor, coat, glove, or footwear replaces canonical structure"
    positive_fix:
      - "preserve upper/lower garment structure and silhouette"
      - "keep shoulder, collar, waist, sleeve, and footwear cues coherent"
    negative_fix:
      - "wrong top"
      - "wrong skirt"
      - "wrong armor"
      - "missing gloves or belt"
  emblem_logo_conflict:
    symptoms:
      - "exact logo requested in commercial-safe reinterpretation"
      - "logo is malformed or random"
    positive_fix:
      - "use emblem-inspired motif or safe abstract crest when commercial-safe"
      - "preserve placement and color role without fake text"
    negative_fix:
      - "fake logo"
      - "random text emblem"
      - "unreadable crest"

prompt_assembly_hooks:
  phase_1_intent_analysis:
    action: "Detect character costume, cosplay, fashion reinterpretation, emblem, prop, and commercial-safe constraints."
  phase_2_cinematic_enrichment:
    action: "Rank costume markers and decide which markers must survive styling, realism, and renderer conversion."
  phase_4_self_review:
    checks:
      - "Are the highest-priority costume markers still visible?"
      - "Did fashion or photoreal styling erase the IP signal?"
      - "Is color blocking coherent with the character profile?"
  phase_4_6_renderer_selection:
    action: "Convert marker hierarchy into concise positive and negative renderer terms."
