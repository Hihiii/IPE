schema_version: "1.0.0"
name: "adult-reclining-pose-system"
description: "Adult reclining and lounge posing layered on the generic reclining physics system."

adult_reclining_pose_schema:
  surface: [bed, sofa, chaise_lounge, floor]
  recline_mode: [side_recline, back_recline, propped_elbow_lounge, semi_reclined]
  support_points: []
  pelvis_rotation: "neutral | side_tilt | three_quarter_turn"
  leg_line: "soft_bend | long_line | staggered_bend"
  camera_risk: [high_angle_leg_distortion, wide_angle_foot_enlargement]

templates:
  side_recline:
    visible_pose: "hip and thigh supported by surface, upper body naturally propped on one elbow, soft bent legs, subtle torso-to-hip S-curve"
    required: [elbow_bearing_weight, pelvis_matches_torso, surface_compression]
  back_recline:
    visible_pose: "shoulders and hips settling into bedding, one knee softly bent, arms intentionally near hair, fabric, or body line"
    required: [smooth_spine_curve, bedding_compression, natural_leg_rest]
  propped_elbow_lounge:
    visible_pose: "shoulder stacked above support elbow, relaxed wrist and palm, supported hips and thighs, clear hip-to-knee alignment"
    required: [load_path, no_floating_elbow, readable_support_surface]

camera_guards:
  - "At high angle, preserve proportional legs and readable pelvis direction."
  - "At wide angle, keep feet away from the nearest edge unless intentional perspective exaggeration is requested."
  - "Do not remove mature pose intent while repairing support or anatomy."
