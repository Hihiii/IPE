# ------------------------------------------------------------
# 12. Prompt Assembly Hooks
# ------------------------------------------------------------

prompt_assembly_hooks:
  phase_1_intent_analysis:
    add_fields:
      - anatomy_risk
    action: "Detect lower-body visibility, dynamic pose risk, support-leg need, and anatomy guardrail level."

  phase_2_cinematic_enrichment:
    action: "Translate anatomy risk into generator-visible anatomy and biomechanics constraints."

  phase_3_scene_blueprint:
    action: "Add support-leg, pose balance, and camera-angle anatomy notes when full body or lower body is visible."

  phase_3_5_prompt_package:
    action: "Store anatomy_guardrails as positive and negative renderer hints."

  phase_4_self_review:
    checks:
      - "Run lower-body self-review when lower body is visible."
      - "Check pelvis, hip-to-thigh connection, leg proportions, knee direction, foot grounding, and foot orientation."
      - "If anatomy risk is high, reduce pose complexity or add stronger generator-visible anatomy constraints."
      - "For ballet, dance, pointe shoes, or lifted-leg poses, check ankle-foot orientation and pointe shoe direction."

  phase_4_5_cleanup:
    action: "Do not remove anatomy or foot-orientation guardrails when lower-body risk is high or critical."

  phase_4_6_renderer_selection:
    action: "Apply model-specific anatomy wording based on target renderer."

  phase_5_final_prompt:
    action: "Include concise anatomy guardrails in final positive prompt and task-specific lower-body negatives when needed."
