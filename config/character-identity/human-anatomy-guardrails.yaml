# ------------------------------------------------------------
# 9. Anatomy Quality Rubric
# ------------------------------------------------------------

anatomy_quality_rubric:
  dimensions:
    pelvic_structure_coherence:
      weight: 1.4
      checks:
        - "Pelvis volume is believable."
        - "Hip sockets appear plausibly placed."
        - "Pelvis rotation matches torso and leg placement."
    hip_to_thigh_connection:
      weight: 1.5
      checks:
        - "Femurs originate from plausible hip positions."
        - "Upper-thigh transition is natural."
        - "Inner-thigh and glute-thigh transitions are not warped."
    support_leg_mechanics:
      weight: 1.4
      checks:
        - "Support leg clearly carries body weight."
        - "Center of gravity reads over the planted foot."
        - "Ankle and foot placement support the pose."
    knee_direction_consistency:
      weight: 1.3
      checks:
        - "Knees follow thigh rotation."
        - "Patella orientation is believable."
        - "Knee bend is physically plausible."
    leg_proportion_consistency:
      weight: 1.2
      checks:
        - "Left and right leg lengths are consistent."
        - "Thigh-to-shin ratios are believable."
        - "Perspective explains any scale difference."
    foot_grounding:
      weight: 1.2
      checks:
        - "Feet contact the floor or support surface."
        - "Support foot is not floating or sliding."
        - "Ground contact matches body balance."
    overall_pose_believability:
      weight: 1.3
      checks:
        - "Pose feels physically sustainable."
        - "Dynamic pose still follows biomechanical logic."
        - "No limb appears detached, melted, or impossible."

  hard_fail_conditions:
    - "disconnected or implausible upper-thigh origin"
    - "major leg length mismatch without perspective reason"
    - "body balance impossible for the pose"
    - "knee and thigh rotation contradiction"
    - "broken pelvis or warped crotch region"
    - "floating support foot in a standing pose"
    - "severe lower-body deformation"

# ------------------------------------------------------------
# 10. Self-Review Checklist
# ------------------------------------------------------------

anatomy_self_review_checklist:
  lower_body_visible:
    - "Does the support leg clearly carry the body weight?"
    - "Is the pelvis structurally believable?"
    - "Do both femurs appear to originate from plausible hip positions?"
    - "Do knee directions match the rotation of the thighs?"
    - "Are leg lengths and proportions consistent?"
    - "Does the pose feel physically sustainable?"
    - "If the outfit is fitted or revealing, is the hip/groin transition still anatomically clean?"
    - "Are the feet grounded and aligned with the body balance?"

  dynamic_pose:
    - "Is there a clear action line?"
    - "Does the center of gravity make sense?"
    - "Does motion exaggeration preserve joint alignment?"
    - "Would simplifying the pose improve anatomy reliability?"

  image_edit_repair:
    - "Are identity, face, outfit, lighting, and background preserved?"
    - "Is only anatomy repaired unless a broader change is requested?"
    - "Does the repaired pose still match the original pose intent?"

# ------------------------------------------------------------
# 11. Conflict Resolution
# ------------------------------------------------------------

anatomy_conflict_resolution:
  complex_pose_vs_anatomy:
    problem: "A highly complex pose increases anatomy failure risk."
    rule: "Preserve pose intent but simplify impossible limb relationships."
    fix:
      - "dynamic but anatomically believable pose"
      - "clear support leg"
      - "coherent pelvis-knee-foot alignment"

  glamour_curve_vs_biomechanics:
    problem: "Overemphasized S-curve or hip twist breaks pelvis/leg connection."
    rule: "Keep elegant silhouette but preserve pelvis and hip-to-thigh structure."
    fix:
      - "elegant physically believable hip twist"
      - "natural side-body silhouette"
      - "smooth hip-to-thigh transition"

  low_angle_vs_leg_distortion:
    problem: "Low-angle full-body shot exaggerates legs and pelvis."
    rule: "Use controlled low angle and anatomy guardrails."
    fix:
      - "controlled low-angle perspective"
      - "correct leg proportions"
      - "feet and knees not exaggerated"

  fitted_outfit_vs_pelvic_error:
    problem: "Fitted clothing reveals or amplifies lower-body anatomy errors."
    rule: "Describe clothing following body structure naturally."
    fix:
      - "clothing follows body structure naturally"
      - "clean pelvic transition"
      - "smooth inner-thigh geometry"

  motion_blur_vs_anatomy_readability:
    problem: "Motion effects hide broken anatomy or create duplicate limbs."
    rule: "Keep the hero body silhouette sharp; limit motion blur to edges or background."
    fix:
      - "sharp readable body silhouette"
      - "motion blur limited to garment fringe or background"
      - "clear limb count and joint alignment"


# ------------------------------------------------------------
# 13. Foot / Ankle / Pointe Orientation Biomechanics
# ------------------------------------------------------------

foot_and_ankle_biomechanics:
  core_rule: >
    The foot must not be treated as an isolated decorative shape.
    Its orientation must follow the ankle, shin, knee, hip rotation, camera angle,
    and overall leg line naturally. This is especially important for ballet,
    pointe shoes, dance poses, lifted-leg poses, and one-leg support poses.

  activate_when:
    - "feet visible"
    - "lifted foot visible"
    - "pointe shoes"
    - "ballet pose"
    - "dance pose"
    - "pointed foot"
    - "extended leg"
    - "one-leg support pose"
    - "turnout"
    - "low-angle full-body pose"
    - "side-body pose with raised leg"

  critical_checks:
    - "foot orientation matches the leg direction"
    - "the top of the foot is visible on the correct side"
    - "ankle rotation is anatomically plausible"
    - "toe direction follows the foot line naturally"
    - "the pointed foot continues the leg line"
    - "the support foot angle matches balance and grounding"
    - "pointe shoe orientation is correct if ballet shoes are present"
    - "the lifted foot is not flipped or rotated 180 degrees"
    - "the visible sole / top-of-foot relationship matches the camera angle"

foot_orientation_failure_taxonomy:
  foot_orientation_180_error:
    symptoms:
      - "lifted foot appears flipped or rotated 180 degrees"
      - "top of foot faces the wrong direction"
      - "front/back direction of the foot contradicts the leg"
    likely_causes:
      - "lifted leg pose without foot orientation guardrail"
      - "ballet or pointe pose with ambiguous foot surface"
      - "side body pose where model confuses the near/far side of the foot"
    positive_fix:
      - "the lifted foot is oriented correctly"
      - "top of the foot faces the proper direction"
      - "foot direction follows the lifted leg naturally"
    negative_fix:
      - "reversed foot orientation"
      - "foot rotated 180 degrees"
      - "flipped foot"

  ankle_foot_rotation_conflict:
    symptoms:
      - "ankle rotation conflicts with shin direction"
      - "foot twists independently from the lower leg"
      - "foot angle is physically impossible"
    positive_fix:
      - "ankle rotation aligns naturally with the shin and leg direction"
      - "foot follows the lower-leg line"
      - "physically believable ankle-foot alignment"
    negative_fix:
      - "twisted ankle"
      - "broken ankle angle"
      - "impossible foot rotation"

  toe_direction_conflict:
    symptoms:
      - "toes point in an implausible direction"
      - "toe direction does not follow foot or leg line"
      - "toe box turns away from the expected orientation"
    positive_fix:
      - "toes point naturally along the direction of the foot"
      - "toe direction follows the leg line"
      - "believable toe orientation"
    negative_fix:
      - "impossible toe direction"
      - "broken toe orientation"
      - "misdirected toes"

  pointe_shoe_orientation_error:
    symptoms:
      - "pointe shoe box faces the wrong direction"
      - "pointe shoe appears reversed"
      - "shoe front/back orientation contradicts the foot"
    likely_causes:
      - "pointe shoe treated as generic shoe"
      - "lifted foot has ambiguous direction"
      - "AI confuses the flat front box with heel or sole"
    positive_fix:
      - "pointe shoe faces the correct direction"
      - "pointe shoe follows the line of the foot"
      - "shoe box orientation matches the toe direction"
    negative_fix:
      - "incorrect pointe shoe direction"
      - "reversed pointe shoe"
      - "broken pointe shoe angle"

  plantar_dorsal_surface_swap:
    symptoms:
      - "top of foot and sole-facing side are visually swapped"
      - "visible foot surface contradicts camera angle"
      - "foot appears inside-out"
    positive_fix:
      - "visible top of foot and sole orientation match the camera angle"
      - "foot surface orientation remains anatomically correct"
    negative_fix:
      - "inside-out foot"
      - "swapped foot surface"
      - "wrong sole orientation"

  foot_line_break_error:
    symptoms:
      - "pointed foot breaks the graceful line of the leg"
      - "ankle/foot angle interrupts the pose line"
      - "extended leg ends with a crooked or reversed foot"
    positive_fix:
      - "pointed foot continues the line of the leg naturally"
      - "elegant pointed-foot extension"
      - "unbroken leg-to-foot line"
    negative_fix:
      - "broken foot line"
      - "crooked pointed foot"
      - "deformed foot extension"

  turnout_foot_mismatch:
    symptoms:
      - "foot turnout does not match hip and knee rotation"
      - "foot twists independently from the leg"
      - "ballet turnout looks mechanically impossible"
    positive_fix:
      - "foot turnout follows hip and knee rotation naturally"
      - "turnout angle is consistent through hip, knee, ankle, and foot"
    negative_fix:
      - "incorrect turnout"
      - "twisted turnout"
      - "foot turnout mismatch"

dance_foot_biomechanics_rules:
  pointed_foot_pose:
    detect_when:
      - "pointed foot"
      - "extended foot"
      - "ballet line"
      - "dance pose"
    requirements:
