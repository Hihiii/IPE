schema_version: "1.0.0"
name: "adult-hand-placement-system"
description: "Gives each visible hand an intentional glamour, support, garment, or composition role."

adult_hand_placement:
  hand_on_waist:
    purpose: "define waistline and create triangular negative space"
  hand_in_hair:
    purpose: "frame face and create relaxed glamour gesture"
  hand_on_thigh:
    purpose: "guide the eye along the leg line"
  hand_on_collar_or_garment:
    purpose: "interact with neckline, opening, strap, or garment tension"
  hand_holding_fabric:
    purpose: "create a visible grip, tension direction, and coverage logic"
  hand_supporting_body:
    purpose: "carry upper-body weight through palm or elbow contact"
  hand_framing_body_line:
    purpose: "shape silhouette without obscuring face or critical detail"

hand_quality_rules:
  - "Each visible hand needs an intent, contact target, or support function."
  - "Fingers relax with natural curvature; wrists follow a plausible angle."
  - "Hand contact creates a local contact shadow and, when gripping cloth, directional fabric tension."
  - "Hands should guide the body line without aimlessly floating or obscuring the face."
