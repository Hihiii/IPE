schema_version: "1.0.0"
name: "reference-image-override-system"
description: >
  Character reference image override controller. It defines how user-provided
  reference images override, confirm, or supplement per-IP base/enhanced
  profiles without destroying explicit user constraints.

override_priority:
  - user_explicit_constraints
  - reference_image_identity_lock
  - reference_image_pose_or_outfit_when_requested
  - per_ip_enhanced_profile
  - per_ip_base_profile
  - global_identity_engine_defaults

reference_roles:
  identity_reference:
    preserve:
      - face impression
      - hair silhouette
      - body proportion family
      - costume markers visible in reference
    do_not_override:
      - explicit requested outfit change
      - explicit requested pose
      - mature age-safety constraints
  outfit_reference:
    preserve:
      - garment construction
      - color blocking
      - material behavior
      - emblem or safe motif placement
    do_not_override:
      - character face and hair identity unless requested
  pose_reference:
    preserve:
      - body angle
      - limb placement
      - camera relation
      - support/contact logic
    do_not_override:
      - character identity locks
      - outfit marker hierarchy

conflict_resolution:
  - "If reference image conflicts with explicit text, explicit text wins."
  - "If reference conflicts with per-IP profile but user asks to match the reference, reference wins for the requested role only."
  - "If reference is low quality or ambiguous, use it as soft guidance and keep per-IP locks."
  - "Never let reference style erase required identity markers unless the user asks for style transfer only."

prompt_assembly_hooks:
  phase_1_intent_analysis:
    action: "Classify each reference image role: identity, outfit, pose, style, lighting, composition, or background."
  phase_2_cinematic_enrichment:
    action: "Merge reference locks according to override priority and preserve explicit constraints."
  phase_4_self_review:
    checks:
      - "Did the reference override only the requested role?"
      - "Did the character identity survive style/outfit/pose transfer?"
  phase_4_6_renderer_selection:
    action: "Render reference constraints as concise preserve/change instructions."
