      - "no unintended female external anatomy"
    negative:
      - "vagina"
      - "female external genital anatomy"
      - "wrong intimate anatomy"

  user_specified_intimate_consistency:
    positive:
      - "external anatomy follows the user's specified adult body presentation"
      - "explicit user-specified anatomy preserved"
    negative:
      - "unintended binary correction"
      - "wrong intimate anatomy"

model_specific_intimate_rendering:
  chatgpt_image:
    female_template: >
      Maintain the specified adult female body presentation and keep external anatomy
      consistent with that subject. Avoid unintended male external anatomy.
    male_template: >
      Maintain the specified adult male body presentation and keep external anatomy
      consistent with that subject. Avoid unintended female external anatomy.
    user_specified_template: >
      Preserve the user's specified adult body presentation and do not apply automatic
      binary intimate-anatomy correction.

  z_image_turbo:
    female_positive: >
      adult female body presentation, external anatomy consistent with female subject,
      no unintended male external anatomy
    female_negative: >
      glans, penile anatomy, testicles, male external genital anatomy, wrong intimate anatomy
    male_positive: >
      adult male body presentation, external anatomy consistent with male subject,
      no unintended female external anatomy
    male_negative: >
      vagina, female external genital anatomy, wrong intimate anatomy
    user_specified_positive: >
      user-specified adult body presentation preserved
    user_specified_negative: >
      unintended binary correction, wrong intimate anatomy

  stable_diffusion:
    female_positive: >
      adult female, female body presentation, female external anatomy consistency
    female_negative: >
      glans, penis, testicles, male genitalia, wrong intimate anatomy
    male_positive: >
      adult male, male body presentation, male external anatomy consistency
    male_negative: >
      vagina, female genitalia, wrong intimate anatomy
    user_specified_positive: >
      user-specified adult body presentation preserved
    user_specified_negative: >
      unintended binary correction, wrong intimate anatomy

  image_edit:
    repair_template: >
      Repair only the unintended external anatomy inconsistency while preserving identity,
      face, hairstyle, outfit, lighting, background, pose, composition, and any explicit
      user-specified body presentation.

intimate_anatomy_self_review:
  - "If anatomy visibility is relevant, does the external anatomy match the specified adult subject?"
  - "Did a female-coded subject gain unintended male external anatomy?"
  - "Did a male-coded subject gain unintended female external anatomy?"
  - "Are body-trait locks and intimate-anatomy locks consistent with each other?"
  - "If the user explicitly requested trans/intersex/androgynous/user-specified anatomy, was that override preserved?"
  - "Does the negative prompt accidentally ban user-specified anatomy?"
  - "Are strict intimate guardrails used only when the context requires them?"

prompt_assembly_hooks_intimate_anatomy:
  phase_1_intent_analysis:
    add_fields:
      - intimate_anatomy_lock
      - forbidden_intimate_trait_drift
      - strict_intimate_guardrails_required
    action: "Detect whether external intimate-anatomy consistency is relevant and whether strict guardrails are required."

  phase_4_self_review:
    checks:
      - "Check body-trait lock and intimate-anatomy lock consistency."
      - "Check explicit user override preservation."
      - "Check that negative prompt does not contradict requested anatomy."

  phase_4_5_cleanup:
    action: "Do not remove intimate-anatomy locks when consistency is required. Remove contradictory avoid terms."

  phase_4_6_renderer_selection:
    action: "Render safe or strict intimate-anatomy guardrails based on context and model target."
