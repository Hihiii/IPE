# ============================================================
# sex-characteristics-control.yaml
# Adult body-presentation / sex-characteristic consistency controller
# Version: 1.1.0
# Purpose:
#   Prevent unintended sex-characteristic drift in human prompts, especially
#   adult glamour, swimsuit, body-conscious fashion, cosplay, character design,
#   and anatomy-sensitive workflows.
# ============================================================

schema_version: "1.2.0"
name: "sex-characteristics-control"
description: >
  A body-presentation consistency module for adult human subjects. It detects
  intended body presentation, protects user-specified sex characteristics, prevents
  unintended male/female trait drift, and preserves explicit user overrides such as
  androgynous, trans, nonbinary, gender-fluid, masculine woman, or feminine man.
  
  LOAD POLICY: Only load when adult body-presentation consistency is a real concern
  (adult content, NSFW, swimsuit, glamour, anatomy repair, intimate anatomy lock).
  Do NOT load for casual gender mentions like 'a woman' or 'a man' without
  body-presentation control needs. See _manifest.yaml triggers for details.

# ------------------------------------------------------------
# 1. Core Principle
# ------------------------------------------------------------

core_principle: >
  Preserve the user's specified adult body presentation. Do not force binary traits
  when the user explicitly requests androgynous, trans, nonbinary, gender-fluid, or
  otherwise nonstandard body presentation. When the prompt clearly specifies adult
  male or adult female without override, prevent unintended sex-characteristic drift.

not_an_nsfw_enhancer: true
primary_goal: "body trait and intimate-anatomy consistency, not explicit sexual detailing"

global_rules:
  - "Explicit user-specified body presentation wins."
  - "Do not infer or add explicit anatomy."
  - "Do not force binary anatomy when user explicitly requests androgynous, trans, nonbinary, or gender-fluid presentation."
  - "Use visible body-structure language, not explicit anatomical detail."
  - "Keep all body-trait wording adult, non-explicit, and presentation-focused."
  - "For mature styling, apply this after mature-content-control and before final renderer output."
  - "When adult external anatomy is visible or explicitly requested, keep placement anatomically correct and consistent with pelvis orientation, pose, and occlusion."

# ------------------------------------------------------------
# 2. Phase 1 Extraction Schema
# ------------------------------------------------------------

sex_characteristics:
  intended_presentation: "male | female | androgynous | trans | nonbinary | genderfluid | user_specified | unspecified"
  body_trait_lock: "male_coded | female_coded | androgynous | user_specified | unspecified"
  intimate_anatomy_lock: "male_external | female_external | user_specified | unspecified"
  explicit_user_override: false
  consistency_required: true
  forbidden_trait_drift: []
  forbidden_intimate_trait_drift: []
  renderer_guardrails:
    positive: []
    negative: []

phase_1_detection:
  presentation_triggers:
    male:
      - "male"
      - "man"
      - "adult male"
      - "male model"
      - "masculine"
      - "男"
      - "男性"
      - "男人"
      - "男模"
    female:
      - "female"
      - "woman"
      - "adult female"
      - "female model"
      - "feminine"
      - "女"
      - "女性"
      - "女人"
      - "女模"
    androgynous:
      - "androgynous"
      - "gender-neutral"
      - "中性"
      - "中性化"
    trans:
      - "trans"
      - "transgender"
      - "跨性別"
    nonbinary:
      - "nonbinary"
      - "non-binary"
      - "非二元"
    genderfluid:
      - "gender-fluid"
      - "genderfluid"
      - "性別流動"
    user_specified:
      - "masculine woman"
      - "feminine man"
      - "tomboy"
      - "femboy"
      - "中性女性"
      - "陰柔男性"
      - "陽剛女性"

  classification_rules:
    - if: "male trigger present and no override trigger"
      intended_presentation: "male"
      body_trait_lock: "male_coded"
    - if: "female trigger present and no override trigger"
      intended_presentation: "female"
      body_trait_lock: "female_coded"
    - if: "androgynous/nonbinary/genderfluid/trans/user_specified trigger present"
      intended_presentation: "user_specified"
      body_trait_lock: "user_specified"
      explicit_user_override: true
    - if: "unspecified body presentation"
      intended_presentation: "unspecified"
      body_trait_lock: "unspecified"
      consistency_required: false

# ------------------------------------------------------------
# 3. Body Presentation Guardrails
# ------------------------------------------------------------

body_presentation_guardrails:
  adult_male:
    positive:
      - "adult male figure"
      - "masculine torso structure"
      - "flat chest"
      - "broader shoulders"
      - "male-coded shoulder-waist-hip proportions"
      - "no unintended feminine breast shape"
    negative:
      - "feminine breasts"
      - "female chest"
      - "female-coded torso"
      - "unintended feminine hips"
      - "wrong sex characteristics"
    notes:
      - "Use structural body language, not explicit anatomical detail."
      - "Do not exaggerate into caricatured hypermasculinity unless requested."

  adult_female:
    positive:
      - "adult female figure"
      - "feminine torso structure"
      - "natural bust shape"
      - "female-coded waist and hip proportions"
      - "soft feminine body contour"
      - "no unintended male-coded chest"
    negative:
      - "male chest"
      - "masculine torso"
      - "male-coded body"
      - "beard"
      - "wrong sex characteristics"
    notes:
      - "Use natural, non-explicit body-presentation language."
      - "Do not exaggerate proportions unless the user explicitly requests stylization."

  androgynous_or_user_specified:
    positive:
      - "androgynous adult figure"
      - "intentionally gender-neutral body presentation"
      - "balanced shoulder-waist-hip proportions"
      - "body presentation follows the user's specified identity"
      - "no unintended exaggerated sex traits"
    negative:
      - "unintended exaggerated masculine traits"
      - "unintended exaggerated feminine traits"
      - "wrong body presentation"
    notes:
      - "Do not auto-correct to binary male/female traits."
      - "Preserve user-specified body presentation exactly."

# ------------------------------------------------------------
# 4. Sex-Characteristic Failure Taxonomy
# ------------------------------------------------------------

sex_characteristic_failure_taxonomy:
  male_character_with_female_traits:
    symptoms:
      - "male subject has unintended feminine breast shape"
      - "male torso becomes female-coded"
      - "hips or waist become strongly female-coded without request"
      - "male body presentation drifts toward female-coded silhouette"
    likely_contexts:
      - "body-conscious outfit"
      - "swimsuit or glamour prompt"
      - "feminine lighting/style tokens overpower male body lock"
      - "long prompt contains mixed gender descriptors"
    fix:
      positive:
        - "adult male figure"
        - "masculine torso structure"
        - "flat chest"
        - "male-coded shoulder-waist-hip proportions"
      negative:
        - "feminine breasts"
        - "female chest"
        - "female-coded torso"
        - "wrong sex characteristics"

  female_character_with_male_traits:
    symptoms:
      - "female subject has unintended male-coded torso"
      - "female body loses requested feminine proportions"
      - "masculine chest or facial hair appears without request"
      - "female body presentation drifts toward male-coded silhouette"
    likely_contexts:
      - "athletic pose"
      - "armored outfit"
      - "low body-fat description"
      - "masculine lighting/style tokens overpower female body lock"
    fix:
      positive:
        - "adult female figure"
        - "feminine torso structure"
        - "natural bust shape"
        - "female-coded waist and hip proportions"
      negative:
        - "male chest"
        - "masculine torso"
        - "male-coded body"
        - "beard"
        - "wrong sex characteristics"

  unintended_androgyny:
    symptoms:
      - "clearly specified male/female subject becomes ambiguous"
      - "body presentation does not match the specified role"
      - "facial/torso/wardrobe cues contradict intended presentation"
    fix:
      positive:
        - "body presentation clearly matches the specified adult subject"
        - "specified adult body presentation remains consistent"
      negative:
        - "wrong sex characteristics"
        - "unintended androgynous body"

  override_conflict:
    symptoms:
      - "user specified trans / androgynous / nonbinary traits but cleanup removed them"
      - "renderer forced binary anatomy despite explicit override"
    rule:
      - "explicit user identity/body-trait override wins"
      - "do not force binary traits when user explicitly requested otherwise"
    fix:
      positive:
        - "body presentation follows the user's specified identity"
        - "preserve intentional androgynous or user-specified body presentation"
      negative:
        - "unintended binary correction"
        - "wrong body presentation"

# ------------------------------------------------------------
# 5. Generator-Visible Translation
# ------------------------------------------------------------

generator_visible_translation:
  male_coded_body_lock:
    rewrite: >
      adult male figure with masculine torso structure, flat chest,
      broader shoulders, and male-coded shoulder-waist-hip proportions
    short: "adult male figure, masculine torso, flat chest, male-coded proportions"

  female_coded_body_lock:
    rewrite: >
      adult female figure with feminine torso structure, natural bust shape,
      and female-coded waist and hip proportions
    short: "adult female figure, feminine torso, natural bust shape, female-coded proportions"

  androgynous_body_lock:
    rewrite: >
      androgynous adult figure with intentionally gender-neutral body presentation
      and balanced shoulder-waist-hip proportions
    short: "androgynous adult figure, gender-neutral body presentation"

  user_specified_body_lock:
    rewrite: >
      body presentation follows the user's specified identity and body-trait description
    short: "user-specified adult body presentation preserved"

# ------------------------------------------------------------
# 6. Positive / Negative Prompt Recipes
# ------------------------------------------------------------

prompt_recipes:
  adult_male_consistency:
    positive:
      - "adult male figure"
      - "masculine torso structure"
      - "flat chest"
      - "broader shoulders"
      - "male-coded shoulder-waist-hip proportions"
      - "no unintended feminine breast shape"
    negative:
      - "feminine breasts"
      - "female chest"
      - "female-coded torso"
      - "unintended feminine hips"
      - "wrong sex characteristics"

  adult_female_consistency:
    positive:
      - "adult female figure"
      - "feminine torso structure"
      - "natural bust shape"
      - "female-coded waist and hip proportions"
      - "soft feminine body contour"
      - "no unintended male-coded chest"
    negative:
      - "male chest"
      - "masculine torso"
      - "male-coded body"
      - "beard"
      - "wrong sex characteristics"

  androgynous_consistency:
    positive:
      - "androgynous adult figure"
      - "intentionally gender-neutral body presentation"
      - "balanced shoulder-waist-hip proportions"
      - "no unintended exaggerated sex traits"
    negative:
      - "unintended exaggerated masculine traits"
      - "unintended exaggerated feminine traits"
      - "wrong body presentation"

# ------------------------------------------------------------
# 7. Model-Specific Renderer Rules
# ------------------------------------------------------------

model_specific_rendering:
  chatgpt_image:
    male_template: >
      Maintain the specified adult male body presentation with masculine torso structure,
      flat chest, and male-coded shoulder-waist-hip proportions. Avoid unintended feminine
      breast shape or female-coded torso traits.
    female_template: >
      Maintain the specified adult female body presentation with feminine torso structure,
      natural bust shape, and female-coded waist-to-hip proportions. Avoid unintended
      male-coded torso, masculine chest traits, or facial hair unless requested.
    androgynous_template: >
      Preserve the specified androgynous or user-defined adult body presentation without
      forcing binary male or female traits.

  z_image_turbo:
    male_positive: >
      adult male figure, masculine torso, flat chest, broad shoulders,
      male-coded waist and hips, no feminine breasts
    male_negative: >
      feminine breasts, female chest, female-coded torso, wrong sex characteristics
    female_positive: >
      adult female figure, feminine torso, natural bust shape, female-coded waist and hips
    female_negative: >
      male chest, masculine torso, male-coded body, beard, wrong sex characteristics
    androgynous_positive: >
      androgynous adult figure, gender-neutral body presentation, balanced proportions
    androgynous_negative: >
      unintended exaggerated masculine traits, unintended exaggerated feminine traits, wrong body presentation

  stable_diffusion:
    male_positive: >
      adult male, masculine torso, flat chest, broad shoulders, male body proportions
    male_negative: >
      female breasts, female chest, feminine torso, wrong sex characteristics
    female_positive: >
      adult female, feminine torso, natural bust, female body proportions
    female_negative: >
      male chest, masculine torso, beard, wrong sex characteristics
    androgynous_positive: >
      androgynous adult, gender-neutral body, balanced proportions
    androgynous_negative: >
      exaggerated male traits, exaggerated female traits, wrong body presentation

  image_edit:
    repair_template: >
      Repair only the unintended body-presentation drift while preserving identity, face,
      hairstyle, outfit, lighting, background, pose, and composition. Keep the body
      presentation consistent with the user-specified adult subject.

# ------------------------------------------------------------
# 8. Self-Review Checklist
# ------------------------------------------------------------

sex_characteristics_self_review:
  - "Did the prompt clearly specify adult male, adult female, androgynous, trans, nonbinary, or user-specified presentation?"
  - "Does the body-trait lock match the user's stated presentation?"
  - "Did any style, wardrobe, or mature-content language unintentionally shift the body presentation?"
  - "Are any forbidden trait drifts present in the positive prompt?"
  - "Does the negative prompt accidentally ban a user-requested identity or body presentation?"
  - "If user specified androgynous/trans/nonbinary/gender-fluid, did the system preserve that override?"
  - "If male-coded body is requested, did final output avoid unintended feminine breast shape?"
  - "If female-coded body is requested, did final output avoid unintended male-coded torso or facial hair?"

# ------------------------------------------------------------
# 9. Conflict Resolution
# ------------------------------------------------------------

conflict_resolution:
  explicit_override_vs_binary_cleanup:
    rule: "Explicit user-specified presentation wins over automatic male/female cleanup."
    fix: "Preserve user-specified body presentation and remove binary-forcing guardrails."

  mature_style_vs_body_trait_lock:
    rule: "Mature or glamour styling must not override the body-trait lock."
    fix: "Keep adult editorial styling while preserving the specified body presentation."

  wardrobe_vs_body_presentation:
    rule: "Wardrobe style does not automatically change body presentation."
    fix: "Describe clothing fit without changing sex-characteristic structure."

  character_reference_vs_body_trait_lock:
    rule: "Character reference may provide costume/color cues but must not override explicit adult body presentation."
    fix: "Use character-inspired design cues while preserving specified body-trait lock."

# ------------------------------------------------------------
# 10. Prompt Assembly Hooks
# ------------------------------------------------------------

prompt_assembly_hooks:
  phase_1_intent_analysis:
    add_fields:
      - sex_characteristics
      - intimate_anatomy_lock
    action: "Extract intended presentation, body trait lock, intimate anatomy lock, explicit overrides, forbidden trait drift, and forbidden intimate trait drift."

  phase_2_cinematic_enrichment:
    action: "Translate body-presentation requirements into visible, non-explicit body-structure language."

  phase_3_5_prompt_package:
    action: "Store sex_characteristics as structured positive and negative renderer hints."

  phase_4_self_review:
    checks:
      - "Does final body presentation match user-specified presentation?"
      - "Are any unintended male/female traits introduced?"
      - "Are explicit overrides preserved?"
      - "Does the avoid list accidentally contradict user-specified body presentation?"

  phase_4_5_cleanup:
    action: "Do not remove body-trait locks. Remove unintended trait drift and avoid-list contradictions."

  phase_4_6_renderer_selection:
    action: "Render sex-characteristic consistency in model-specific syntax."

  phase_5_final_prompt:
    action: "Include concise body-presentation guardrails only when needed by the subject and risk context."

# ------------------------------------------------------------
# 11. Intimate Anatomy Consistency
# ------------------------------------------------------------

intimate_anatomy_consistency:
  purpose: >
    Prevent unintended external intimate-anatomy drift in adult human prompts.
    This module should be used for consistency control, repair prompts, mature-content
    safety, anatomy-sensitive prompts, body paint, nude/coverage-sensitive prompts,
    or repeated generation failures. It must not be used to add explicit sexual detail.

  core_rule: >
    External anatomy should remain consistent with the specified adult subject unless
    the user explicitly specifies trans, intersex, androgynous, nonbinary, gender-fluid,
    or user-defined anatomy. Explicit user-specified anatomy overrides automatic binary cleanup.
    When external anatomy is visible, it should be correctly placed in the pelvic region,
    follow the pelvis and leg orientation, and respect occlusion by towels, hands, thighs,
    fabric, shadows, or crop boundaries.

  safe_default_language:
    male_external_lock: "external anatomy remains consistent with the specified adult male subject"
    female_external_lock: "external anatomy remains consistent with the specified adult female subject"
    user_specified_lock: "external anatomy follows the user's specified adult body presentation"

  strict_language_use_when:
    - "NSFW-sensitive prompt requires trait consistency"
    - "body paint, nude, or anatomy-sensitive prompt"
    - "image repair / inpaint task"
    - "repeated model failures involving intimate anatomy drift"
    - "user explicitly asks to prevent wrong external sex characteristics"
    - "user explicitly asks for correct placement of visible adult genital anatomy"

  strict_terms:
    female_subject_forbid:
      - "glans"
      - "penile anatomy"
      - "testicles"
      - "male external genital anatomy"
    male_subject_forbid:
      - "vagina"
      - "female external genital anatomy"

  phase_1_fields:
    intimate_anatomy_lock: "male_external | female_external | user_specified | unspecified"
    forbidden_intimate_trait_drift: []
    strict_intimate_guardrails_required: false

visible_adult_anatomy_placement:
  purpose: >
    Prevent misplaced visible adult anatomy. This is a structure and occlusion
    consistency rule, not a requirement to add explicit focus.
  applies_to:
    - "nipple / areola landmarks when visible"
    - "adult external genital anatomy when visible or requested"
    - "body-paint, nude, towel-slip, wet-cloth, or repair prompts"
  placement_rules:
    - "nipple and areola positions follow chest volume, breast shape, ribcage turn, and camera perspective"
    - "adult external genital anatomy remains in the correct pelvic region and follows pelvis orientation"
    - "left/right symmetry should be evaluated after pose twist and perspective, not as flat front-facing symmetry"
    - "opaque towel, clothing, hands, thighs, and shadow should occlude landmarks instead of landmarks appearing on top of them"
    - "avoid duplicated, floating, displaced, or wrong-sex visible anatomy"
  positive_language:
    - "visible adult anatomy correctly placed according to body structure"
    - "nipple and areola placement follows natural chest anatomy"
    - "external anatomy placement follows pelvis orientation when visible"
    - "correct occlusion by towel, fabric, hands, thighs, and body pose"
  negative_language:
    - "misplaced nipple"
    - "floating areola"
    - "duplicated nipple"
    - "nipple on towel"
    - "displaced external anatomy"
    - "duplicated genital anatomy"
    - "wrong intimate anatomy"

intimate_trait_failure_taxonomy:
  female_subject_with_male_external_traits:
    symptoms:
      - "female subject shows unintended glans"
      - "female subject shows unintended penile anatomy"
      - "female subject shows unintended testicles"
      - "external anatomy conflicts with specified female subject"
    fix:
      positive:
        - "adult female body presentation"
        - "external anatomy consistent with the specified adult female subject"
        - "no unintended male external anatomy"
      negative:
        - "glans"
        - "penile anatomy"
        - "testicles"
        - "male external genital anatomy"
        - "wrong intimate anatomy"

  male_subject_with_female_external_traits:
    symptoms:
      - "male subject shows unintended vagina"
      - "male subject shows unintended female external genital anatomy"
      - "external anatomy conflicts with specified male subject"
    fix:
      positive:
        - "adult male body presentation"
        - "external anatomy consistent with the specified adult male subject"
        - "no unintended female external anatomy"
      negative:
        - "vagina"
        - "female external genital anatomy"
        - "wrong intimate anatomy"

  override_conflict_intimate:
    symptoms:
      - "user explicitly requested trans/intersex/user-specified anatomy but cleanup removed it"
      - "automatic binary intimate-anatomy cleanup contradicted the user's explicit request"
    rule:
      - "explicit user-specified anatomy wins"
      - "do not force binary intimate anatomy when user explicitly requested otherwise"
    fix:
      positive:
        - "external anatomy follows the user's specified adult body presentation"
        - "explicit user-specified anatomy is preserved"
      negative:
        - "unintended binary correction"
        - "wrong intimate anatomy"

generator_visible_intimate_translation:
  male_external_lock:
    safe_rewrite: "external anatomy remains consistent with the specified adult male subject"
    strict_rewrite: "no unintended female external anatomy"

  female_external_lock:
    safe_rewrite: "external anatomy remains consistent with the specified adult female subject"
    strict_rewrite: "no unintended male external anatomy"

  female_subject_male_trait_repair:
    safe_rewrite: "remove unintended male external anatomy and keep anatomy consistent with the specified adult female subject"
    strict_rewrite: "no glans, no penile anatomy, no testicles"

  male_subject_female_trait_repair:
    safe_rewrite: "remove unintended female external anatomy and keep anatomy consistent with the specified adult male subject"
    strict_rewrite: "no vagina, no female external genital anatomy"

intimate_anatomy_prompt_recipes:
  adult_female_intimate_consistency:
    positive:
      - "adult female body presentation"
      - "external anatomy consistent with the specified female subject"
      - "no unintended male external anatomy"
    negative:
      - "glans"
      - "penile anatomy"
      - "testicles"
      - "male external genital anatomy"
