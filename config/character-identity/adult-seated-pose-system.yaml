schema_version: "1.0.0"
name: "adult-seated-pose-system"
description: "Adult seated glamour and boudoir posing with support, pelvis-leg alignment, hand intent, and surface response."

adult_seated_pose_schema:
  surface: [chair, sofa, bed_edge, stool, floor]
  hip_support: "full | partial | edge_supported"
  torso_orientation: "front | three_quarter | side_turn"
  leg_arrangement: "crossed | angled | one_folded | feet_grounded"
  hand_intent: []
  fabric_response: []

templates:
  chair_boudoir:
    visible_pose: "hips fully supported by chair, elongated torso with gentle S-curve, naturally angled legs, hand resting on thigh or chair arm"
    required: [chair_contact, pelvis_to_knee_alignment, relaxed_shoulders]
  sofa_glamour:
    visible_pose: "three-quarter torso toward camera, one arm resting on sofa back, hips settled into cushion, legs following pelvis direction"
    required: [cushion_compression, hand_intent, no_floating_thigh]
  bed_edge:
    visible_pose: "hips supported by mattress edge, feet grounded or one leg folded on bed, hands on thigh, fabric edge, or mattress"
    required: [mattress_compression, natural_knees, gravity_drape]

guards:
  - "Pelvis direction determines thigh, knee, shin, and foot direction."
  - "Crossed legs must retain plausible knee and ankle overlap."
  - "Chair, sofa, and bed surfaces show contact shadows and compression where weight rests."
