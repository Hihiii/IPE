schema_version: "1.0.0"
name: "reclining-pose-physics"
description: >
  Reclining and semi-reclining pose physics controller. It protects torso,
  pelvis, spine, hip, leg, arm-support, and surface-contact plausibility when a
  person lies, lounges, props up on elbows, or reclines on a bed, sofa, floor,
  pool edge, or soft support.

core_principle: >
  Reclining poses must show a believable load path. The prompt should define the
  support surface, weight-bearing contact points, spine angle, pelvis rotation,
  shoulder/elbow/hand support, knee direction, foot placement, fabric compression,
  and occlusion order. Even reclining poses risk boring symmetry — apply anti-boring
  diagnosis from config/character-identity/anti-boring-pose-system.yaml (P93) to
  ensure asymmetrical weight distribution and varied limb positions.

reclining_pose_schema:
  surface: "bed | sofa | floor | pool_edge | lounge_chair | custom"
  torso_angle: "flat | low_recline | semi_reclined | propped_on_elbows | propped_on_hands"
  pelvis_rotation: "neutral | side_tilt | three_quarter_turn | twisted_risk"
  weight_bearing_points: []
  support_path: []
  leg_position: ""
  knee_alignment: ""
  foot_visibility: ""
  hand_elbow_contact: ""
  soft_surface_response: ""
  occlusion_order: ""

risk_detector:
  high_risk_terms:
    - reclining
    - lying down
    - lounging
    - propped on elbows
    - propped on hands
    - on a bed
    - on a sofa
    - on a mattress
    - stretched out
    - side-lying
    - semi-reclined
  critical_conditions:
    - "full body visible with crossed legs or twisted pelvis"
    - "one hand or elbow supports upper-body weight"
    - "soft bed / sofa compression is visible"
    - "wet clothing or towel in reclining pose"

positive_physics_language:
  - "clear load-bearing contact points"
  - "pelvis and ribcage aligned in a plausible reclining angle"
  - "shoulder-to-elbow support path visible"
  - "palms or elbows press into the surface with contact shadows"
  - "hips and thighs subtly compress the soft surface"
  - "knees follow the same rotation as the pelvis"
  - "feet rest naturally without floating"
  - "fabric folds follow gravity and contact pressure"

negative_guardrails:
  - "twisted pelvis"
  - "floating limbs"
  - "unsupported reclining pose"
  - "broken knee alignment"
  - "hands not supporting body weight"
  - "elbows floating above surface"
  - "body clipping into mattress"
  - "impossible spine bend"

prompt_assembly_hooks:
  phase_1_intent_analysis:
    action: "Classify reclining, lounging, propped, side-lying, and soft-surface body poses as pose-physics risks."
  phase_2_cinematic_enrichment:
    action: "Add support path, contact points, pelvis/spine alignment, knee direction, and surface response."
  phase_4_self_review:
    checks:
      - "Are the weight-bearing points visible and plausible?"
      - "Does the pelvis rotation match the knees, torso, and feet?"
      - "Does the surface show contact shadows or compression?"
  phase_4_6_renderer_selection:
    action: "Render reclining physics as visible contact language plus narrow negative guardrails."
