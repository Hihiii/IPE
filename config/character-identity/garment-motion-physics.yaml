# =============================================================================
# garment-motion-physics.yaml
# Garment behavior during movement — wind, walking, turning, twisting, and
# motion-based fabric response for editorial fashion photography.
# =============================================================================

schema_version: "1.0.0"
name: "garment-motion-physics"
description: >
  Describes how garments behave during movement for editorial fashion photography.
  Covers wind response per fabric type, walking/running dynamics, turning/twisting
  fabric behavior, and common motion failures.

core_principle: >
  A garment in motion is not the same garment as when still. Wind, stride, twist,
  and gravity each affect fabric differently depending on material weight, cut,
  and construction. Motion must follow material physics — silk billows, leather
  resists, chiffon flutters, knit stretches.

# ===========================================================================
# SECTION 1: WIND RESPONSE PER FABRIC
# ===========================================================================

wind_response:
  purpose: "Describes how each fabric type behaves when wind is present in the scene."

  silk_satin:
    behavior: "Fluid billowing. Fabric lifts and falls in continuous waves. Lightweight silk responds even to gentle airflow."
    visual_cues:
      - "fabric lifts from the body in smooth undulating waves"
      - "hem and edges float rather than flap"
      - "fabric ripples travel from the point of wind contact outward"
      - "garment silhouette changes continuously with wind shifts"
    renderer_positive: "silk fabric catching the wind in smooth flowing waves, hem floating, fabric undulating naturally"
    renderer_negative: "static silk with no wind response, fabric glued to body despite wind, harsh unnatural ripples"

  chiffon_organza:
    behavior: "Fluttering and trembling. Lightweight transparent fabrics respond rapidly to wind, creating continuous micro-movement."
    visual_cues:
      - "fabric trembles and shimmers with each gust"
      - "edges flutter rapidly, creating a soft blurred edge effect"
      - "fabric lifts easily, often catching air and rising above the body"
      - "multiple layers move independently at different speeds"
    renderer_positive: "chiffon fluttering in the breeze, translucent layers trembling and lifting, fabric edges softly blurred by movement"
    renderer_negative: "stiff chiffon, frozen flutter, layers moving as one solid sheet"

  leather_patent:
    behavior: "Minimal movement. Heavy, structured leather resists wind. Only loose edges, open jackets, or wide sleeves show response."
    visual_cues:
      - "main body of garment stays still"
      - "open edges and loose panels may shift slightly"
      - "wide sleeves can catch wind and open like wings"
      - "leather does not ripple or undulate — it holds its shape"
    renderer_positive: "leather garment holding its structure in the wind, only open edges responding, sleeves catching air without losing shape"
    renderer_negative: "leather flapping like cloth, wrinkled wind distortion on structured panels, exaggerated movement on heavy leather"

  cashmere_wool:
    behavior: "Gentle sway. Heavy knits and wools show wind through soft, slow movement. Fabric stays close to the body."
    visual_cues:
      - "fabric sways gently rather than flaps"
      - "loose edges and scarf-like elements show more response"
      - "heavy fabric may press against the body on windward side"
      - "movement is slow, weighty, and grounded"
    renderer_positive: "cashmere swaying softly in the breeze, heavy fabric pressing gently against the body on the windward side"
    renderer_negative: "cashmere flapping like cotton, unnaturally light movement for heavy fabric"

  cotton_linen:
    behavior: "Moderate response. Crisp fabrics catch wind with defined folds and flaps. Movement is audible and visible."
    visual_cues:
      - "fabric catches wind in defined folds and creases"
      - "hem lifts in structured waves rather than fluid curves"
      - "shirt front may billow away from the body"
      - "crisp lines at wind-affected edges"
    renderer_positive: "cotton fabric catching the wind in crisp defined folds, shirt front billowing naturally away from the body"
    renderer_negative: "cotton behaving like silk (too fluid), unnaturally stiff hems in wind"

  tulle_mesh:
    behavior: "Volume shifts and bounces. Tulle is light but voluminous — wind compresses, lifts, and re-shapes the entire volume."
    visual_cues:
      - "wind compresses one side of the volume while lifting the other"
      - "fabric bounces and shifts as air moves through the mesh"
      - "hem rises unevenly, revealing layered underskirts"
      - "the overall silhouette changes shape with wind direction"
    renderer_positive: "tulle volume shifting with the wind, hem rising on one side, layered underskirts catching air, silhouette changing organically"
    renderer_negative: "tulle immune to wind, volume frozen despite breeze, compressed tulle not rebounding"

  lace_mesh:
    behavior: "Wind passes through open weave. The edges flutter while the body of the lace stays relatively still."
    visual_cues:
      - "wind passes through the lace openings with minimal resistance"
      - "scalloped edges flutter independently"
      - "main lace body stays close to skin or underlayer"
      - "lightweight lace may lift at hem and sleeve edges"
    renderer_positive: "lace edges fluttering in the breeze, open weave allowing wind to pass through, hem and sleeve scallops moving delicately"
    renderer_negative: "lace lifting like a solid sheet, no wind passing through visible openings"

# ===========================================================================
# SECTION 2: WALKING / RUNNING GARMENT DYNAMICS
# ===========================================================================

walking_garment_dynamics:
  purpose: "Describes how garments behave during walking and running strides."

  mid_stride:
    stance_leg_effects:
      - "fabric stretches across the forward thigh"
      - "waistband tension on the stance hip"
      - "hem rises on the forward leg"
    trailing_leg_effects:
      - "fabric bunches behind the knee"
      - "hem lags behind the body movement"
      - "trailing leg fabric stretches across the hip"
    general:
      - "coat or jacket hem lifts with each stride"
      - "skirt hem swings in an arc, opening on the forward side"
      - "trouser fabric creases at the hip joint with each step"
      - "sleeves swing opposite to the leg movement"
    renderer_positive: "garment responding to stride, fabric stretching across the forward thigh, hem swinging with each step, coat hem lifting naturally"
    renderer_negative: "frozen stride with no fabric response, garment glued to body during movement, hem not rising on the forward leg"

  walking_turn:
    description: "Subject turns while walking — common in editorial runway shots."
    effects:
      - "fabric catches at the hip rotation point"
      - "skirt or coat hem fans out with the turn momentum"
      - "sleeve on the turn side lags behind the arm"
      - "hair and scarf respond with delayed motion"
      - "garment on the trailing side of the turn stretches"
    renderer_positive: "garment catching at the turn, hem fanning with momentum, fabric responding to the rotational force naturally"
    renderer_negative: "turn without garment response, fabric glued to body during rotation, hem not swinging with the turn"

  runway_stride:
    description: "Deliberate, confident walking for catwalk or editorial."
    effects:
      - "arms swing with deliberate asymmetry — one forward, one back"
      - "hip rotation creates fabric tension at the waistband"
      - "jacket or coat hem lifts and falls with each hip shift"
      - "the leading leg's hem or cuff is more visible than the trailing"
      - "garment should show the walk rhythm, not random movement"
    renderer_positive: "confident runway stride, garment responding to hip rotation, hem lifting and falling with each step, asymmetric arm swing"
    renderer_negative: "frozen runway pose, garment ignoring the stride, both hems at equal height"

# ===========================================================================
# SECTION 3: TURNING / TWISTING FABRIC BEHAVIOR
# ===========================================================================

turning_twisting_fabric:
  purpose: "Describes fabric response when the torso rotates."

  upper_body_twist:
    effects:
      - "diagonal tension folds across the midriff"
      - "collar or neckline pulls toward the twist direction"
      - "fabric gathers on the compressed side"
      - "fabric stretches flat on the extended side"
      - "sleeves show spiral creasing from the rotation"
    renderer_positive: "fabric responding to torso twist, diagonal tension folds, fabric gathering on the compressed side, stretching on the extended side"
    renderer_negative: "twist with no fabric response, random diagonal folds not matching twist direction, fabric ignoring rotation"

  hem_lag:
    description: "When the body turns but the hem follows a split-second behind — creates dynamic lines."
    effects:
      - "hem rotates after the body has already turned"
      - "fabric stretches from the waist to the delayed hem point"
      - "flowy fabrics show more lag, stiff fabrics show less"
      - "lag creates a diagonal tension line from hip to hem"
    renderer_positive: "hem following the turn with natural lag, fabric stretching from hip to delayed hem point, dynamic diagonal tension"
    renderer_negative: "hem turning instantly with the body, no fabric lag, frozen rotation"

# ===========================================================================
# SECTION 4: POSE-SPECIFIC MOTION EFFECTS
# ===========================================================================

pose_specific_motion:
  purpose: "Fabric behavior for specific movement-based poses."

  sitting_down:
    effects:
      - "fabric compresses at hips and back of thighs"
      - "front fabric may tent away from the body"
      - "hem rises on the thighs"
      - "waistband presses into the abdomen"
      - "back fabric stretches across the shoulder blades"
    renderer_positive: "fabric compressing naturally at the seat, hem rising on thighs, front fabric tenting slightly"
    renderer_negative: "seated pose with standing-garment behavior, no compression or hem rise"

  standing_up:
    effects:
      - "fabric releases from compression positions"
      - "wrinkles from sitting briefly visible before falling out"
      - "hem drops back to standing length"
      - "waistband settles back to natural position"
    renderer_positive: "fabric releasing from compression, brief sitting wrinkles falling out naturally, hem returning to full length"
    renderer_negative: "perfect pristine garment after sitting, no release wrinkles"

  bending_forward:
    effects:
      - "shirt or top front hangs away from the body"
      - "neckline drops, revealing more décolletage"
      - "back fabric stretches across the shoulder blades"
      - "waistband gap at the lower back"
      - "skirt or pants hem rises at the back"
    renderer_positive: "fabric hanging forward away from body, neckline dropping naturally, back fabric stretching"
    renderer_negative: "bent pose with garment not responding to gravity, fabric stuck to the body"

  climbing_stairs:
    effects:
      - "forward leg fabric stretches across the thigh"
      - "trailing leg fabric bunches at the knee"
      - "hem rises significantly on the forward leg"
      - "coat or jacket hem lifts and may catch on the forward hip"
      - "waistband shifts with the asymmetrical hip position"
    renderer_positive: "garment responding to stair climbing, forward leg fabric stretching, hem rising, coat catching at the hip"
    renderer_negative: "stair pose with no hem differential between legs, garment ignoring leg positions"

# ===========================================================================
# SECTION 5: COMMON MOTION FAILURES
# ===========================================================================

common_motion_failures:
  - "frozen mid-stride with no fabric response — garment looks like a still photo pasted onto a walking figure"
  - "garment glued to body during movement — no hem rise, no fabric stretch, no wind response"
  - "random wind affecting only one part of the garment while the rest stays still"
  - "motion effects contradicting fabric weight — light chiffon behaving like heavy leather or vice versa"
  - "walking pose with both hems at equal height — indicates frozen stride"
  - "wind affecting hair but not the garment, or vice versa, without explanation"
  - "turning pose with instant hem response — fabric should lag slightly behind body rotation"
  - "sitting pose with garment compression that defies anatomy — fabric crushing at impossible points"

# ===========================================================================
# SECTION 6: RENDERER LANGUAGE
# ===========================================================================

renderer_language:
  chatgpt_image:
    positive: "Fabric responds naturally to movement — wind lifts the hem, the stride creates fabric tension, the turn leaves momentary hem lag."
    negative: "Frozen garment, no wind or motion fabric response, fabric glued to body."
  z_image_turbo:
    positive: "garment responding to motion, natural fabric movement, wind-affected edges, hem lift with stride"
    negative: "frozen garment, no motion fabric response, static hem"
  stable_diffusion:
    positive: "garment in motion, fabric moving naturally with wind and stride, dynamic hem"
    negative: "frozen clothes, fabric not moving, static hem, no wind response"

# ===========================================================================
# SECTION 7: CROSS-REFERENCES
# ===========================================================================

cross_references:
  - "adult-garment-pose-interaction.yaml: For static pose fabric response (seated, reclining, raised arm, etc.). This file covers motion; that file covers static poses."
  - "material-rendering-library.yaml: Fabric tier determines which wind_response and motion behavior applies. Match fabric_quality_tier to the motion detail level."
  - "anti-boring-pose-system.yaml: When pose enrichment adds motion, apply corresponding garment motion physics. When fix_pose_independent_of_camera is active, add context-appropriate motion fabric effects."
  - "fashion-silhouette-library.yaml: Silhouette affects motion behavior — trapeze swings more than column. Check silhouette type before applying motion rules."
