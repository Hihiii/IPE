schema_version: "1.0.0"
name: "crop-aware-character-outfit-policy"
description: >
  Keeps character identity accurate within the requested shot. Canonical outfit
  data is filtered by framing, action, and scene context; it never expands the
  camera merely to display a complete costume.

crop_aware_character_outfit_policy:
  rule: >
    Character outfit details must be constrained by the requested camera framing,
    action, and scene context. Do not expand the camera framing merely to display
    complete canonical costume details. Depth layering enrichment (P85) must not
    add foreground or background elements that imply a wider shot or reveal
    out-of-frame costume details. See config/visual-cinematography/visual-richness-narrative-depth.yaml.
  priority:
    - explicit_user_action
    - explicit_camera_framing
    - explicit_scene_context
    - character_identity
    - visible_character_signature_details
    - full_outfit_details_only_if_requested
  identity_completion_rule: "Character identity should be completed within the requested shot. The shot should not be expanded just to complete the character outfit."

composition_driven_visibility:
  source_fields:
    - composition_decision.shot_size
    - composition_decision.crop_policy
    - composition_decision.subject_occupancy
    - composition_decision.camera_relationship
    - action_gaze_flow.required_interaction_objects
    - scene_blueprint.required_nearby_objects
  rule: >
    Resolve visible character anchors only after composition has fixed the crop and
    subject occupancy. Character profiles provide candidate identity anchors; they
    do not declare which individual details must appear in a particular shot.
  shot_scopes:
    close_up: [face, hair, eyes, expression, crop-visible accessories]
    portrait_or_upper_torso: [face, hair, expression, upper_garment, visible_shoulders, visible_arm_accessories]
    waist_up: [face, hair, upper_garment, visible_hands, waist_details_if_inside_crop]
    full_body_or_character_sheet: [full_costume_silhouette, legwear, footwear, full_body_props]
  action_override: "Add a hand, held object, food, table object, or other nearby element only when the explicit action requires it."
  prohibited: [character_specific_crop_maps, camera_expansion_for_costume_completion]

selfie_mode:
  default_visible_scope:
    - face
    - hair
    - eyes
    - upper_torso
    - one_or_both_hands_if_action_requires
    - nearby_scene_objects_if_action_requires
  avoid_unless_requested:
    - full_body
    - boots
    - complete_lower_body_outfit
    - outfit_catalog_pose
    - fashion_editorial_pose
    - wide_body_showcase
  action_support_examples:
    dining: [restaurant_table, food_visible, utensil_visible_when_used]
    phone_or_mirror_selfie: [device_only_when_explicitly_requested]

crop_modes:
  close_up:
    include: [face, hair, eyes, expression, visible_hair_accessories]
    exclude_unless_explicit: [full_outfit, boots, legwear, standing_pose]
  portrait_or_upper_torso:
    include: [face, hair, expression, upper_garment, visible_shoulders, visible_arm_accessories]
    exclude_unless_explicit: [boots, full_legwear, complete_costume_silhouette]
  waist_up:
    include: [face, hair, upper_garment, visible_hands, waist_details_if_inside_crop]
    exclude_unless_explicit: [boots, full_legwear]
  full_body_or_character_sheet:
    include: [full_costume_silhouette, legwear, footwear, full_body_props]

silhouette_crop_affinity:
  description: "Different silhouettes read differently across crop levels. When a specific silhouette is active from fashion-silhouette-library.yaml, prefer the crop that best displays its defining feature."
  rule: "Do not expand the camera framing merely to display a complete silhouette. If the user already specified a crop, respect it and work within its visible silhouette zone."
  a_line: { best_crop: full_body, detail_focus: "hem flare and waist-to-hip transition" }
  hourglass: { best_crop: waist_up or three_quarter, detail_focus: "waist cinching and bodice fit" }
  column: { best_crop: full_body, detail_focus: "continuous vertical line and fabric texture" }
  cocoon: { best_crop: full_body, detail_focus: "overall volume and shoulder-to-hem rounded line" }
  trapeze: { best_crop: full_body, detail_focus: "hem width and fabric movement" }
  fit_and_flare: { best_crop: three_quarter or full_body, detail_focus: "waist seam and skirt volume transition" }
  asymmetrical: { best_crop: three_quarter or full_body, detail_focus: "asymmetry point and hem break" }
  bodycon: { best_crop: three_quarter or full_body, detail_focus: "continuous body line and fabric stretch" }
  high_low: { best_crop: three_quarter or full_body, detail_focus: "hem transition from short front to long back" }
  cape: { best_crop: full_body, detail_focus: "fabric fall and volume from shoulders" }
  peplum: { best_crop: waist_up, detail_focus: "peplum flare at waist and bodice fit" }
  deconstructed: { best_crop: full_body or three_quarter, detail_focus: "construction reveals and layering breaks" }
  cut_out: { best_crop: three_quarter or full_body, detail_focus: "cut-out geometry and skin framing" }
  strappy: { best_crop: full_body or three_quarter, detail_focus: "strap geometry and tension lines" }
  plunge: { best_crop: three_quarter or full_body, detail_focus: "plunge depth and fabric anchoring" }
  sheer_layering: { best_crop: full_body or three_quarter, detail_focus: "translucency gradient and layer depth" }

conflict_resolution:
  action_or_framing_vs_outfit_completion:
    winner: explicit_user_action_and_framing
    repair: "Keep only costume markers that are visible in the requested crop; do not add a full-body pose, boots, or lower-body details."
  explicit_canonical_outfit_request:
    winner: explicit_user_request
    repair: "Use the requested full-body or suitable wider framing only when the user also requests complete outfit visibility, a character sheet, a poster, or a fashion showcase."

prompt_assembly_hooks:
  phase_1_intent_analysis:
    action: "Resolve crop, action, scene context, and whether full outfit visibility is explicitly requested."
  phase_2_cinematic_enrichment:
    action: "Filter character anchors to the visible crop before adding aesthetic details."
  phase_3_1_prompt_package:
    action: "Store composition_visible_character_anchors separately from deferred_out_of_crop_character_anchors."
  phase_4_self_review:
    action: "Reject full-body, boots, lower-body outfit, standing, or fashion-showcase additions when they were not requested."
