    partial:
      - "半脫"  # half-off
      - "脫一半"
      - "拉下一半"  # pulled down halfway
      - "滑落"  # slipped off
      - "露出肩膀"  # shoulder revealed
      - "露出香肩"
      - "露肩"
      - "背後拉鍊沒拉"  # back zipper undone
      - "敞開"  # open (shirt/jacket open)
      - "敞開胸口"
      - "扣子沒扣"
      - "不扣"
      - "沒拉拉鍊"
      - "掀起"  # lifted up
      - "拉起來"  # pulled up
      - "脫到腰間"  # pulled down to waist
      - "脫到手臂"  # hanging off arms

  unspecified_terms:
    meaning: "No wardrobe mention means unspecified_absent_by_default, never inferred clothing."

  rules:
    - "身穿 must resolve to a concrete garment before a slot becomes worn."
    - "濕身、大雨、海邊、泳池、性感、glamour、boudoir、自拍 do not create wardrobe presence."
    - "上身 alone means upper_body slot has content only when followed by a concrete garment noun."
    - "下身 alone means lower_body slot has content only when followed by a concrete garment noun."
    - "半脫 and related partial terms set garment slot to worn but modify state to partially_removed."
    - "一絲不掛 and 全裸 set all wardrobe slots to explicitly_absent."
    - "赤腳 sets footwear slot to barefoot (a valid worn state, not absent)."
    - "Chinese + English mixed prompts: each language's wardrobe terms independently apply, union both."
    - "Category-specific negation follows full-body negation unless the user specifies otherwise."
    - "露肩 sets upper_body shoulder_covering to absent, rest of upper_body unchanged."
