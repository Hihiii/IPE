# ===========================================================================
# SECTION 5: SEXY EDITORIAL RULES
# ===========================================================================

sexy_editorial_rules:
  purpose: "Coordinates sexy/daring silhouettes with the NSFW mapping pipeline and ensures the output matches bold sexy intent."
  light_and_color:
    rule: "When cut_out, strappy, plunge, or sheer_layering silhouette is active, default to bright high-key fashion lighting (not dark moody). Skin should be well-lit and fabric details fully visible."
    cross_reference: "See prompt-renderer.yaml nsfw_trigger_rendering for lighting rules."
  wardrobe_coverage:
    rule: "Map sexy silhouette to the corresponding wardrobe_coverage level. cut_out and strappy → body_paint_inspired_fashion. plunge → lingerie_inspired_fashion or body_paint_inspired_fashion. sheer_layering → lingerie_inspired_fashion."
    cross_reference: "See skill-phase-1.yaml mature_content.wardrobe_coverage values."
  pose_geometry:
    rule: "Match silhouette to pose geometry: cut_out and strappy require broken-line angular poses. plunge and sheer_layering work best with s-curve flowing poses."
    cross_reference: "See anti-boring-pose-system.yaml fashion_pose_geometry."
  age_safety:
    rule: "Sexy editorial silhouettes always require adult age lock. All silhouettes in this library are adult/editorial only — never apply to underage or childlike framing."
  lighting_preference:
    rule: "For cut_out and strappy: dramatic directional light with sharp shadow lines emphasizes the strap/cut-out geometry. For plunge and sheer_layering: soft diffused key light with rim light emphasizes the revealed skin and fabric translucency."
  mood_inheritance:
    rule: "When mature_content.level is adult_explicit from NSFW mapping, prefer cut_out, strappy, plunge, or sheer_layering over classic silhouettes. When level is adult_mature, prefer hourglass, bodycon, asymmetrical."

# ===========================================================================
# SECTION 6: RULES
# ===========================================================================

rules:
  - "Silhouette choice precedes fabric choice. Select the silhouette first, then match fabric and color."
  - "When a silhouette is active, match pose_geometry to the silhouette's recommended type (s-curve or broken-line) from anti-boring-pose-system.yaml fashion_pose_geometry."
  - "When garment_interaction hand purpose is active from anti-boring-pose-system.yaml, select the interaction point based on silhouette: column → hem pinch, cocoon → fabric gather at shoulder, asymmetrical → adjust irregular hem, cut_out → touch strap edge, strappy → pull strap, plunge → trace neckline edge."
  - "When mature_content.level is adult_explicit or NSFW-triggered, prefer sexy silhouettes (cut_out, strappy, plunge, sheer_layering) and apply sexy_editorial_rules lighting and pose defaults."
  - "Cross-reference fashion_construction_vocabulary with garment-structure-failure-diagnosis.yaml for failure prevention."
  - "Cross-reference silhouette_crop_affinity with crop-aware-character-outfit-policy.yaml when camera framing is decided."
  - "Cross-reference silhouette_material_map with material-rendering-library.yaml when fabric tier is active."
  - "Do not force a silhouette that contradicts the user's specified garment type."
  - "When no silhouette is specified, infer from garment type + fabric + intended mood."
  - "All silhouettes in this library are adult/editorial only — do not apply underage or childlike framing."
