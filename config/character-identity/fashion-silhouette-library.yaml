  hourglass:
    best_crop: waist_up or three_quarter
    detail_focus: "waist cinching and bodice fit"
  column:
    best_crop: full_body
    detail_focus: "continuous vertical line and fabric texture"
  cocoon:
    best_crop: full_body
    detail_focus: "overall volume and shoulder-to-hem rounded line"
  trapeze:
    best_crop: full_body
    detail_focus: "hem width and fabric movement"
  fit_and_flare:
    best_crop: three_quarter or full_body
    detail_focus: "waist seam and skirt volume transition"
  asymmetrical:
    best_crop: three_quarter or full_body
    detail_focus: "the asymmetry point and hem break"
  bodycon:
    best_crop: three_quarter or full_body
    detail_focus: "continuous body line and fabric stretch response"
  high_low:
    best_crop: three_quarter or full_body
    detail_focus: "hem transition from short front to long back"
  cape:
    best_crop: full_body
    detail_focus: "fabric fall and volume from shoulders"
  peplum:
    best_crop: waist_up
    detail_focus: "peplum flare at waist and bodice fit"
  deconstructed:
    best_crop: full_body or three_quarter
    detail_focus: "construction reveals, layering breaks, raw edges"
  cut_out:
    best_crop: three_quarter or full_body
    detail_focus: "cut-out geometry and skin-framing by fabric"
    close_up_can_show: "cut-out edge finish and strap tension on skin"
  strappy:
    best_crop: full_body or three_quarter
    detail_focus: "strap geometry across body and tension lines"
    close_up_can_show: "buckle hardware and strap texture on skin"
  plunge:
    best_crop: three_quarter or full_body
    detail_focus: "plunge depth and fabric anchoring points"
    close_up_can_show: "neckline construction and fabric tension at bust"
  sheer_layering:
    best_crop: full_body or three_quarter
    detail_focus: "translucency gradient and layer depth"
    close_up_can_show: "sheer texture and weave pattern over skin"

