# ============================================================
# wardrobe-outfit-construction.yaml
# Garment structure, outfit logic, and styling-construction controller
# Version: 1.0.0
# Purpose:
#   Improve prompts involving clothing, fashion styling, and outfit design.
# ============================================================

schema_version: "1.0.0"
name: "wardrobe-outfit-construction"
description: >
  A prompt-enhancement module for garment structure, outfit styling,
  fashion logic, and clothing coherence. It handles silhouette, cut,
  layers, fit, material behavior, and styling consistency.

core_principle: >
  Good wardrobe prompting defines not only clothing category but construction:
  neckline, sleeve type, fit, waistline, hem, material thickness, layering,
  drape, and how the garment supports the subject, role, era, and scene.

global_rules:
  - "Do not infer any garment, underwear, swimwear, outerwear, towel, fabric wrap, accessory, footwear, or body paint unless it is explicitly requested in the original prompt."
  - "Scene, weather, style, fashion label, beach, pool, bedroom, boudoir, office, school, rain, and selfie context do not grant wardrobe permission."
  - "Define the clothing silhouette, not just the clothing category."
  - "Specify garment construction details when they matter: neckline, sleeves, waistline, length, fit, and layering."
  - "Fit, drape, and fabric behavior should align with the material type."
  - "Outfits should match the subject identity, scene context, era/culture, and styling intention."
  - "Accessories should feel integrated with the outfit rather than randomly attached."
  - "Avoid clothing descriptions that are too generic when fashion or costume is a key focus."
  - "Preserve clothing logic during edits unless a wardrobe change is requested."

wardrobe_outfit_schema:
  outfit_mode: "casual | editorial | formal | streetwear | costume | swimwear | uniform | luxury | fantasy | techwear | custom"
  silhouette_family: []
  garment_components: []
  neckline: []
  sleeve_type: []
  waistline: []
  lower_garment_cut: []
  hemline: []
  layering_logic: []
  fit_logic: []
  accessory_logic: []
  style_intent: []
  preservation_priority: "low | medium | high"

construction_elements:
  tops:
    examples:
      - "button-up shirt"
      - "crop top"
      - "camisole"
      - "structured jacket"
      - "bodysuit"
      - "corset"
  bottoms:
    examples:
      - "high-waisted trousers"
      - "low-rise shorts"
      - "pleated skirt"
      - "wide-leg pants"
      - "tailored shorts"
  outerwear:
    examples:
      - "blazer"
      - "coat"
      - "bomber jacket"
      - "cape"
  footwear:
    examples:
      - "heels"
      - "boots"
      - "sneakers"
      - "sandals"
  accessories:
    examples:
      - "belt"
      - "necklace"
      - "earrings"
      - "bag"
      - "gloves"
      - "hair accessory"
  towel_wraps:
    examples:
      - "bath towel wrapped around torso"
      - "post-shower towel wrap"
      - "plush terry towel"
      - "damp towel drape"

fit_and_drape_rules:
  - "Tailored garments should have clean structure and seam logic."
  - "Soft fabrics should drape and wrinkle naturally."
  - "Stretch garments should contour the body coherently without random stiff folds."
  - "Layered outfits should respect garment overlap and thickness."
  - "Accessories should sit correctly on the body or clothing."
  - "Bath towels should show wrap direction, top-edge thickness, tuck or hand anchor, gravity folds, and believable body contact."
  - "After-bath towel wraps should read as slightly damp or wet at skin-contact areas unless the user explicitly requests a dry staged towel."

styling_profiles:
  editorial_fashion:
    cues:
      - "strong silhouette"
      - "clean styling intention"
      - "controlled fashion-forward details"
    garment_types:
      - "asymmetric draped dress"
      - "deconstructed blazer"
      - "wide-leg tailored trouser"
      - "structured bodysuit with exaggerated shoulder"
    construction_vocabulary:
      - "asymmetric hem and one-shoulder neckline"
      - "exposed seam construction"
      - "oversized proportion with sharp shoulder line"
    material_pairings:
      - "matte cotton + patent leather: texture contrast"
      - "sheer organza + opaque knit: transparency play"
    forbidden:
      - "safe basic silhouettes that contradict editorial intent"
      - "generic office or casual wear"
      - "over-accessorized distracting detail"

  luxury:
    cues:
      - "refined construction"
      - "premium material behavior"
      - "elegant accessories"
    garment_types:
      - "silk blouse with French cuffs and covered buttons"
      - "tailored wool trousers with sharp center crease"
      - "structured single-breasted blazer in cashmere wool"
      - "cashmere turtleneck with ribbed cuff and hem"
      - "satin slip dress with adjustable spaghetti straps"
      - "leather pencil skirt with invisible zip"
    material_pairings:
      - "silk + leather: fluid top with structured bottom"
      - "cashmere + satin: soft bulk with liquid shine"
      - "wool + silk: matte body with glossy accent"
      - "linen + cotton: textural natural harmony"
    construction_vocabulary:
      - "princess seams for bust and waist contour"
      - "hand-finished hem with blind stitch"
      - "French darts for clean front panel"
      - "padded shoulder with rolu definition"
      - "bound buttonholes as quality marker"
      - "edge-painted leather hem"
    accessory_logic:
      - "single statement ring or cuff"
      - "thin leather belt at natural waist"
      - "minimal necklace that follows neckline"
      - "quality watch as only wrist detail"
      - "structured leather handbag"
    forbidden:
      - "bulky logo accessories"
      - "over-layering that hides garment construction"
      - "casual footwear with formal construction"
      - "synthetic fabric blends that look cheap"

  sexy_editorial:
    cues:
      - "deliberate skin reveal through construction"
      - "bold silhouettes emphasizing curves and bare zones"
      - "high-fashion sensuality, not accidental exposure"
    garment_types:
      - "cut-out bodysuit with side and waist openings"
      - "strappy harness dress with minimal fabric panels"
      - "deep plunge maxi dress with thigh-high slit"
      - "sheer layered blouse over lace bralette"
      - "leather corset top with strappy back"
      - "micro-mini with chain and strap details"
    material_pairings:
      - "leather + bare skin: structured framing of exposed zones"
      - "sheer silk + lace: translucent over textured"
      - "satin + chain: fluid soft with hard accent"
      - "mesh + patent: breathable reveal with gloss edge"
    construction_vocabulary:
      - "strategic cut-out panels at waist and ribs"
      - "strap and ring hardware as structural elements"
      - "deep plunge secured by internal waist stay"
      - "sheer panel inserts at décolletage and back"
      - "lace-up closure as visual feature"
      - "thigh-high slit with invisible seam"
    accessory_logic:
      - "minimal hardware: O-rings, chain accents, buckle details"
      - "strappy heels that echo garment strap language"
      - "no jewelry that competes with skin exposure"
      - "belt or waist chain at natural waist"
    forbidden:
      - "pornographic or vulgar styling without editorial framing"
      - "accidental exposure look — every reveal must feel intentional"
      - "cheap lingerie aesthetics without high-fashion construction"
      - "over-accessorizing that distracts from the silhouette"
    lighting_affinity: "bright high-key or dramatic directional"
    mood_affinity: [sexy_editorial, sensual, powerful, edgy]

  cosplay_reinterpretation:
    cues:
      - "retain signature character cues"
      - "translate into wearable, coherent garment construction"
  lifestyle_casual:
    cues:
      - "natural, believable outfit combination"
      - "simple but coherent layering"

common_failures:
  - "generic clothing with no cut definition"
  - "random seam or fold logic"
  - "outfit disconnected from character identity"
  - "incoherent accessories"
  - "fabric behavior inconsistent with material"
  - "costume markers lost during reinterpretation"
  - "bath towel behaves like a rigid panel, transparent cloth, or painted-on texture instead of a thick wrapped towel"

self_review_checklist:
  - "Is the outfit silhouette clear?"
  - "Are construction details sufficient?"
  - "Does the outfit fit the scene and subject?"
  - "Does the fabric behavior match the material?"
  - "Do accessories belong to the outfit logic?"

model_specific_rendering:
  chatgpt_image:
    guidance: >
      Use garment-construction vocabulary when wardrobe quality matters.
      Separate clothing category from silhouette, fit, and styling intention.
  z_image_turbo:
    positive_template: >
      coherent outfit design, strong garment silhouette, realistic fabric behavior,
      clean styling, integrated accessories
    negative_template: >
      generic outfit, random folds, incoherent styling, lost costume cues
  stable_diffusion:
    positive_template: >
      detailed outfit construction, clear clothing silhouette, realistic drape,
      coherent layering, fashion styling
    negative_template: >
      vague clothing, bad folds, weak styling, disconnected accessories

prompt_assembly_hooks:
  phase_1_intent_analysis:
    add_fields:
      - wardrobe_outfit_schema
    action: "Extract explicit wardrobe items and absence states; leave every unmentioned slot unspecified_absent_by_default."
  phase_2_cinematic_enrichment:
    action: "Translate only explicit wardrobe requests into silhouette, construction, fit, and styling logic."
  phase_3_scene_blueprint:
    action: "Coordinate wardrobe with character identity, materials, body language, and era/culture."
  phase_4_self_review:
    checks:
      - "Check silhouette clarity."
      - "Check fit and drape logic."
      - "Check styling coherence."
  phase_4_5_cleanup:
    action: "Remove garment-construction cues for unrequested clothing during cleanup."
  phase_4_6_renderer_selection:
    action: "Render wardrobe instructions in model-appropriate language."
  phase_5_final_prompt:
    action: "Include concise but meaningful outfit-construction details whenever wardrobe matters."


# ------------------------------------------------------------
# Fabric Opacity / Translucency / Reveal Logic Extension
# ------------------------------------------------------------

fabric_opacity_and_reveal_logic:
  purpose: >
    Ensure garments obey material opacity, thickness, moisture, light, drape, and body-contact logic.

  garment_fields:
    - "fabric_opacity_class"
    - "fabric_material"
    - "fabric_state"
    - "reveal_cause"
    - "reveal_intensity"
    - "body_contact_behavior"
    - "light_condition"

  rules:
    - "Dry oversized shirts default to mostly opaque with implied contour only."
    - "Semi-sheer effects require semi-sheer material and/or strong backlight."
    - "Wet translucency requires moisture and fabric cling."
    - "Sharp anatomical visibility is not physically plausible through dry opaque fabric."
    - "If visibility is intended, define material class and physical cause first."

  positive_language:
    - "mostly opaque fabric with lightweight natural drape"
    - "soft body contour gently suggested beneath the shirt"
    - "faint silhouette only in the thinnest backlit areas"
    - "translucency caused by moisture and fabric tension when damp"
    - "fabric visibility remains physically plausible"

  negative_language:
    - "unrealistic transparency"
    - "painted-on anatomical detail"
    - "sharp visibility through dry opaque fabric"
    - "fabric opacity conflict"
    - "cutout-like transparency"

bath_towel_wrap_construction:
  purpose: >
    Treat bath towels as thick wrapped fabric with construction logic. For after-bath
    or towel-slip prompts, define how the towel is wrapped, where it is anchored,
    which edge slips, and how the fabric weight falls.
  construction_fields:
    - "wrap_direction"
    - "top_edge_height"
    - "anchor_point"
    - "slipping_edge"
    - "fold_direction"
    - "towel_thickness"
    - "towel_wetness"
    - "wet_contact_zones"
    - "skin_contact_shadow"
  rules:
    - "A towel wrapped around the chest or torso needs a visible top edge and overlap seam."
    - "If slipping is requested, one edge should loosen first while another point remains caught, tucked, or held."
    - "Damp terry fabric should form heavy folds and bunches, not razor-thin clothing folds."
    - "The towel should occlude the body naturally; exposed skin appears where the edge has moved below it."
    - "Avoid symmetrical perfect slipping unless the scene is deliberately posed."
    - "In a post-shower scene, include damp terry texture, darker wet contact zones, and heavier folds from absorbed water."
  positive_language:
    - "thick terry towel wrapped around the torso"
    - "visible towel top-edge thickness and overlap seam"
    - "slightly damp terry texture against wet skin"
    - "one edge slipping diagonally downward"
    - "opposite edge caught under the arm or lightly held"
    - "heavy damp folds, darker wet contact zones, and soft contact shadows"
  negative_language:
    - "rigid towel panel"
    - "paper-thin towel"
    - "floating towel"
    - "painted-on towel"
    - "cutout reveal"
    - "dry towel in a steamy after-bath scene"
