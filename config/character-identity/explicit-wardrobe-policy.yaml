schema_version: "1.0.0"
name: "explicit-wardrobe-policy"
description: "Full wardrobe explicit-only policy. Clothing and coverage materials appear only when explicitly requested in the original prompt."

explicit_wardrobe_policy:
  core_rule:
    wardrobe_items_must_be_explicitly_requested: true
    unspecified_wardrobe_slots_must_not_be_auto_filled: true
    style_or_context_cannot_infer_clothing: true
    renderer_default_modesty_cannot_override_prompt_absence: true
  hard_age_guard_only: [teen, childlike, underage, youth_coded]
  applies_to_slots: [headwear, upper_body, bra_or_inner_top, outerwear, lower_body, underwear_bottom, swimwear, legwear, footwear, accessories, fabric_wrap, towel_wrap, body_paint]

wardrobe_decision_rule:
  if_item_explicitly_present_in_original_prompt:
    slot_state: worn
    allow_renderer_to_describe_item: true
  if_item_explicitly_absent_in_original_prompt:
    slot_state: absent
    add_conflict_negative_guards: true
  if_item_unspecified:
    slot_state: unspecified_absent_by_default
    do_not_auto_add_item: true
    do_not_infer_from_context: true

global_guards:
  upper_body_auto_clothing_guard: [shirt, tank_top, blouse, bra, bikini_top, crop_top, camisole, jacket, robe, towel, fabric_wrap]
  lower_body_auto_clothing_guard: [pants, shorts, skirt, panties, underwear, bikini_bottom, swimsuit_bottom, leggings, stockings, towel_wrap, fabric_wrap]
  no_context_wardrobe_inference: [rain, wet_scene, beach, pool, bedroom, boudoir, school, office, fashion_editorial, selfie]

prompt_assembly_hooks:
  phase_1_intent_analysis:
    action: "Extract only explicitly requested wardrobe items and explicit absence terms from the original prompt."
  phase_4_5_cleanup:
    action: "Remove unrequested garments and garment-material effects; preserve pose, crop, object, or shadow coverage as non-garment coverage."
