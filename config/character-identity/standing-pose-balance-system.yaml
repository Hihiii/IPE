schema_version: "1.0.0"
name: "standing-pose-balance-system"
description: >
  Standing pose balance controller for full-body, fashion, character sheet,
  action, dance, combat, and poster poses. It protects center of gravity,
  support leg, foot placement, knee direction, hip/shoulder counterbalance, and
  readable silhouette.

core_principle: >
  A standing pose is believable when the viewer can see how the body balances.
  Define the support foot, load-bearing leg, pelvis tilt, shoulder counterline,
  knee direction, free-leg gesture, and ground contact shadows.
  Before applying balance mechanics, run anti-boring diagnosis from
  config/character-identity/anti-boring-pose-system.yaml (P93) to ensure even
  stance and symmetrical weight distribution are corrected.

standing_pose_schema:
  support_leg: "left | right | both | shifting"
  center_of_gravity: ""
  foot_contact: ""
  knee_alignment: ""
  pelvis_tilt: ""
  shoulder_counterbalance: ""
  free_leg_action: ""
  arm_counterbalance: ""
  silhouette_readability: ""
  ground_contact_shadow: ""

pose_modes:
  relaxed_stance:
    positive:
      - "weight clearly on one support leg"
      - "free leg relaxed without floating"
      - "subtle hip counterbalance"
    avoid:
      - "unclear support leg"
      - "feet floating"
  heroic_power_stance:
    positive:
      - "wide grounded stance"
      - "knees aligned with feet"
      - "strong shoulder line and readable silhouette"
    avoid:
      - "broken knee angle"
      - "unbalanced low-angle distortion"
  fashion_contrapposto:
    positive:
      - "S-curve balanced by support hip and opposite shoulder"
      - "one foot carries weight, the other extends lightly"
    avoid:
      - "collapsed ankle"
      - "impossible pelvis twist"
  action_ready:
    positive:
      - "forward load path through planted foot"
      - "torso rotation supported by hip and knee direction"
      - "hands or prop align with movement vector"
    avoid:
      - "floating action pose"
      - "knees contradict movement direction"

negative_guardrails:
  - "floating feet"
  - "unclear support leg"
  - "broken knee alignment"
  - "twisted pelvis"
  - "unsupported center of gravity"
  - "feet not planted on ground"
  - "silhouette collapsed by pose"

prompt_assembly_hooks:
  phase_1_intent_analysis:
    action: "Classify full-body, lower-body-visible, fashion, dance, action, and poster poses for balance risk."
  phase_2_cinematic_enrichment:
    action: "Add support leg, foot contact, pelvis/shoulder counterbalance, knee direction, and ground shadow."
  phase_4_self_review:
    checks:
      - "Is the support leg visible and load-bearing?"
      - "Do feet, knees, pelvis, and shoulders agree?"
      - "Does the silhouette remain readable?"
  phase_4_6_renderer_selection:
    action: "Render balance as visible stance language and narrow negative guardrails."
