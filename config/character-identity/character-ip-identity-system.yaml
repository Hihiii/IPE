schema_version: 1.0.0
name: character-ip-identity-system
description: 'A character IP identity module for prompt enhancement. It converts vague character requests into stable visual
  identity locks: silhouette, hair identity, face impression, palette hierarchy, costume structure, signature props, archetype
  behavior, worldbuilding motifs, allowed variation, and forbidden drift.

  '
core_principle: 'Strong character IP recognition comes from a repeatable visual symbol system, not from repeating the character
  name. The prompt should define what must remain recognizable at silhouette distance, portrait distance, and close detail
  distance. Visual richness layering (P85) must not add background props, atmosphere, or secondary details that contradict
  or dilute character identity locks. See config/visual-cinematography/visual-richness-narrative-depth.yaml.

  '
character_ip_schema:
  name_or_reference: ''
  identity_strength: loose | medium | strict | ultra_strict
  mode: original_character | direct_character_reference | inspired_reinterpretation | cosplay_reinterpretation | fashion_reinterpretation
    | brand_collaboration_reinterpretation | photorealistic_real_world_version | anime_to_realism_conversion | game_cinematic_version
    | poster_key_visual_version
  silhouette:
    head_shape: ''
    hair_outline: ''
    costume_outline: ''
    prop_outline: ''
    body_silhouette: ''
  hair:
    color: ''
    length: ''
    bang_shape: ''
    side_locks: ''
    volume: ''
    silhouette: ''
    accessory: ''
  face:
    face_shape: ''
    eye_shape: ''
    eyebrow_style: ''
    nose_mouth_relation: ''
    expression_default: ''
    gaze_style: ''
    makeup_or_markings: ''
  palette:
    primary_color: ''
    secondary_color: ''
    accent_color: ''
    metal_color: ''
    glow_color: ''
    eye_color: ''
  costume:
    upper_body: ''
    lower_body: ''
    shoulder_design: ''
    waist_design: ''
    sleeve_or_glove: ''
    footwear: ''
    cape_or_outerwear: ''
    emblem: ''
    accessory: ''
    material_language: ''
    color_blocking: ''
  signature_props:
    required: []
    optional: []
    forbidden: []
  personality:
    archetype: ''
    pose_language: ''
    facial_expression: ''
    gaze_behavior: ''
    camera_relation: ''
  worldbuilding:
    motifs: []
    environment: ''
    lighting_style: ''
    material_language: ''
    era_or_culture_logic: ''
  locked_traits: []
  allowed_variations: []
  forbidden_drift: []
identity_strength_profiles:
  strict:
    use_when:
    - user asks same character
    - series continuity
    - character sheet
    - IP design must remain recognizable
    rules:
    - Lock silhouette, hair, face impression, palette, costume markers, emblem, and signature props.
    - Only vary pose, camera angle, lighting, background, and small seasonal styling details.
    - Repeat the locked traits in the final prompt if the image is part of a series.
  medium:
    use_when:
    - cosplay reinterpretation
    - character-inspired editorial
    - same character in a new outfit
    rules:
    - Preserve silhouette family, hair identity, face impression, palette hierarchy, and one or two signature props.
    - Allow outfit reinterpretation if the iconic structure, color blocking, emblem, or accessory remains readable.
  loose:
    use_when:
    - inspired by a character archetype
    - new original character with a borrowed mood
    rules:
    - Preserve broad archetype, color logic, and one or two symbolic motifs.
    - Avoid exact costume replication unless the user explicitly asks for direct character mode.
  ultra_strict:
    use_when:
    - golden test prompt
    - character sheet / multi-view turnaround
    - same character across a series
    - user explicitly asks exact identity preservation
    rules:
    - Lock silhouette, hair identity, face impression, eye shape/color, palette, costume structure, color blocking, signature
      props, and forbidden drift.
    - Allow only pose, camera, lighting, background, and renderer style changes that do not weaken recognition.
    - Add explicit negative drift terms for wrong hair, wrong face, wrong palette, missing costume markers, and generic replacement.
recognition_priority_order:
- silhouette and outline
- hair identity
- face impression and gaze
- color palette hierarchy
- costume structure and color blocking
- signature props, emblem, or markings
- personality pose and expression
- worldbuilding motifs
- rendering style
- decorative micro-details
identity_lock_modules:
  silhouette_lock:
    positive:
    - strong recognizable silhouette
    - signature outline
    - distinctive head shape and hair silhouette
    - iconic costume outline
    - clear character-readability even in silhouette
    protect:
    - head shape
    - hair outline
    - costume outline
    - prop outline
    negative:
    - weak silhouette
    - generic outline
    - changed body silhouette
    - missing signature shape
  hair_identity_lock:
    positive:
    - signature hair silhouette
    - specific bang shape
    - side locks framing the face
    - layered hair volume
    - hair accessories preserved
    fields:
    - color
    - length
    - bang_shape
    - side_locks
    - volume
    - silhouette
    - accessory
    negative:
    - wrong hairstyle
    - missing bangs
    - changed hair color
    - generic hair
    - missing hair ornament
  face_identity_profile:
    positive:
    - recognizable facial impression
    - consistent eye shape
    - signature expression
    - character-specific gaze
    - preserve face identity across variations
    fields:
    - face_shape
    - eye_shape
    - eyebrow_style
    - nose_mouth_relation
    - expression_default
    - gaze_style
    - makeup_or_markings
    negative:
    - face identity drift
    - wrong eye shape
    - wrong personality expression
    - generic beautiful face
  character_palette_lock:
    positive:
    - signature color palette
    - preserve original character color hierarchy
    - primary, secondary, and accent colors remain consistent
    - eye color and glow color preserved when specified
    fields:
    - primary_color
    - secondary_color
    - accent_color
    - metal_color
    - glow_color
    - eye_color
    negative:
    - wrong color palette
    - random color changes
    - changed color blocking
    - missing accent color
  costume_identity_lock:
    positive:
    - signature costume structure
    - recognizable outfit silhouette
    - preserve iconic garment components
    - clean costume construction
    - character-specific color blocking
    - signature accessories remain visible
    fields:
    - upper_body
    - lower_body
    - shoulder_design
    - waist_design
    - sleeve_or_glove
    - footwear
    - cape_or_outerwear
    - emblem
    - accessory
    - material_language
    negative:
    - generic outfit
    - missing costume markers
    - random costume redesign
    - messy costume construction
  identity_anchor_props:
    positive:
    - signature prop clearly visible
    - iconic accessory preserved
    - recognizable prop silhouette
    - do not omit the character's key accessory
    fields:
    - signature weapon
    - hair ornament
    - emblem
    - microphone
    - mascot item
    - jewelry
    - marking
    negative:
    - missing signature prop
    - missing emblem
    - unrelated accessories
    - random unrelated props
  worldbuilding_motif_lock:
    positive:
    - background includes subtle world-specific motifs
    - environment supports the character IP
    - props and architecture match the character's universe
    - lighting and material language support the character identity
    negative:
    - unrelated modern background elements
    - generic empty background
    - random props from another setting
    - worldbuilding motif drift
character_ip_consistency:
  locked_traits:
  - hair silhouette
  - face impression
  - eye color
  - core costume color palette
  - signature accessory
  - body silhouette
  - emblem or motif
  allowed_variations:
  - pose
  - camera angle
  - lighting
  - background
  - seasonal outfit detail
  - expression within character range
  forbidden_drift:
  - changed hairstyle
  - changed color palette
  - missing emblem
  - generic outfit
  - wrong personality expression
  - face identity drift
  - missing signature prop
  - duplicate character design
direct_vs_inspired_modes:
  direct_character_mode:
    use_when: The user explicitly requests a known character or exact character likeness.
    positive_language:
    - preserve official recognizable character cues
    - preserve key silhouette, hair, palette, costume markers, and signature prop
    caution: Keep this as visual-cue preservation; do not force a rendering medium unless requested.
  inspired_reinterpretation_mode:
    use_when: The user asks for inspired, reinterpretation, original version, commercial-safe, or character-like design.
    positive_language:
    - character-inspired design
    - preserve key visual cues while creating an original reinterpretation
    - avoid exact official logo or copyrighted costume replication when commercial use is intended
    caution: Use a new original design language while preserving the intended archetype and cue family.

character_ip_costume_policy:
  modes:
    identity_costume_required:
      use_when: [canonical_outfit, cosplay, "canonical_outfit", "character_accurate_outfit", character_accurate]
      allow_canonical_costume: true
    identity_face_only:
      use_when: [portrait, face_focus, hairstyle_focus, unspecified_wardrobe]
      allow_canonical_costume: false
    fashion_reinterpretation:
      use_when: [new_outfit, fashion_reinterpretation, user_specified_wardrobe, unspecified_wardrobe]
      allow_canonical_costume: false
  rule: "Character identity does not imply costume. User-specified wardrobe wins; if wardrobe is unspecified, preserve hair, face, archetype, and palette cues without adding canonical garments."
model_specific_rendering:
  chatgpt_image:
    positive_template: 'A highly recognizable character IP design with strong silhouette readability, signature hair identity,
      recognizable facial impression, consistent palette, iconic costume structure, preserved emblem or signature prop, character-specific
      body language, and subtle worldbuilding motifs.

      '
    negative_template: 'generic character, weak silhouette, changed hairstyle, wrong palette, missing emblem, missing signature
      prop, face identity drift, costume drift, random outfit redesign

      '
  z_image_base:
    positive_template: 'recognizable character IP, strong silhouette, signature hair, consistent face impression, locked palette,
      iconic costume structure, signature prop visible, clean costume construction, world motifs

      '
    negative_template: 'generic character, weak silhouette, changed hair, wrong colors, missing emblem, missing prop, face
      drift, costume drift, random accessories

      '
  z_image_turbo:
    positive_template: 'recognizable character IP, strong silhouette, signature hair, face impression, locked palette, iconic
      costume, signature prop, no identity drift

      '
    negative_template: 'generic character, weak silhouette, changed hair, wrong palette, missing emblem, missing prop, face
      drift, costume drift

      '
prompt_assembly_hooks:
  phase_1_intent_analysis:
    add_fields:
    - character_ip_schema
    action: Detect named characters, original character design, cosplay, reinterpretation, same-character continuity, or IP-like
      recognizability requirements.
  phase_2_cinematic_enrichment:
    action: 'Convert the character into a visual identity system: silhouette, hair, face, palette, costume, props, archetype,
      and world motifs.'
  phase_3_scene_blueprint:
    action: Coordinate character IP locks with wardrobe construction, face/expression, pose/body language, reference image
      control, and micro-detail priority.
  phase_4_self_review:
    checks:
    - Does the character remain recognizable without reading the name?
    - Are silhouette, hair, face, palette, costume markers, prop/emblem, and personality protected?
    - Are allowed variations separated from forbidden drift?
  phase_4_5_cleanup:
    action: Do not remove character identity anchors, even when cleanup removes redundant style words.
  phase_4_6_renderer_selection:
    action: Render character IP locks in model-appropriate wording without turning the prompt into a name-only repetition.
  phase_5_final_prompt:
    action: Include concise character identity locks and targeted anti-drift negatives whenever character recognizability
      matters.
identity_priority_order:
- silhouette
- hair_identity
- face_impression
- palette
- costume_structure
- signature_props
- personality_pose
- worldbuilding_motifs
- rendering_style
reinterpretation_modes:
  direct_character_reference:
    goal: Preserve the recognizable character as directly as the user requests.
    preserve:
    - identity locks
    - costume markers
    - signature props
    - palette hierarchy
  cosplay_reinterpretation:
    goal: Render a real person or model wearing a faithful cosplay interpretation.
    preserve:
    - wig/hair silhouette
    - cosplay garment construction
    - prop/contact realism
    - marker readability
  fashion_reinterpretation:
    goal: Translate the IP into fashion/editorial styling while retaining marker hierarchy.
    preserve:
    - color blocking
    - silhouette family
    - signature accessory motif
  brand_collaboration_reinterpretation:
    goal: Use commercial-safe motif translation and avoid exact logo replication unless requested.
    preserve:
    - brand-safe palette echo
    - abstract emblem placement
    - recognizable but transformed motif
  photorealistic_real_world_version:
    goal: Convert stylized/anime/game identity into physically wearable real-world design.
    preserve:
    - hair identity
    - face impression
    - costume structure translated into real materials
    - non-generic model identity
  anime_to_realism_conversion:
    goal: Convert anime cues into realism without losing silhouette, eye/hair logic, and archetype.
    preserve:
    - hair shape translated into plausible styling
    - eye/gaze personality
    - costume marker hierarchy
  game_cinematic_version:
    goal: Render the character as cinematic game key art.
    preserve:
    - hero silhouette
    - material response
    - signature prop
    - worldbuilding motifs
  poster_key_visual_version:
    goal: Prioritize IP recognition and visual hierarchy for poster/key visual composition.
    preserve:
    - thumbnail-readable silhouette
    - face/costume marker clarity
    - environment motif
enhanced_profile_required_fields:
- silhouette identity
- hair identity lock
- face impression lock
- eye color / eye shape
- costume structure
- color blocking
- signature props
- signature pose language
- personality expression range
- forbidden drift
- renderer-specific positive / negative prompt
