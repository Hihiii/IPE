# =============================================================================
# garment-layering-logic.yaml
# Garment layering order, thickness compatibility, visible edge rules, and
# editorial fashion layering combinations.
# =============================================================================

schema_version: "1.0.0"
name: "garment-layering-logic"
description: >
  Controls garment layering logic for fashion editorial — layering order,
  thickness compatibility, visible edge rules, and common layering combinations
  that create high-end visual interest.

core_principle: >
  Layering is not just adding clothes. Each layer must have a visible relationship
  to the one below and above — edge overlap, thickness contrast, texture interplay.
  Bad layering fuses garments into one blob. Good layering makes each piece
  individually readable while contributing to a cohesive whole.

# ===========================================================================
# SECTION 1: STANDARD LAYERING ORDER
# ===========================================================================

layering_order:
  description: "The standard order of garment layers from skin outward."
  sequence:
    - layer: "underwear / base"
      role: "Closest to skin. Provides coverage, shape, or foundation."
      examples: ["bra", "panties", "thong", "bikini bottom", "bodysuit", "shapewear", "slip"]
      visible_edges: "straps at shoulders, band at waist, hem line at hip"

    - layer: "inner / first garment"
      role: "The primary visible layer closest to the body."
      examples: ["t-shirt", "blouse", "turtleneck", "camisole", "bralette"]
      visible_edges: "collar above outer layer, cuffs at wrists, hem at waist or hip"

    - layer: "mid / secondary garment"
      role: "Adds texture, warmth, or structure over the inner layer."
      examples: ["shirt over t-shirt", "sweater over collared shirt", "vest over blouse", "corset over shirt"]
      visible_edges: "collar peeking, hem extending below, sleeves visible at cuff"

    - layer: "outer / top garment"
      role: "The most visible layer, defines the silhouette."
      examples: ["jacket", "blazer", "coat", "cardigan", "leather jacket", "cape"]
      visible_edges: "full silhouette, lapels, open front showing inner layers"

    - layer: "accessory / accent"
      role: "Completes the look, adds detail."
      examples: ["scarf", "belt", "jewelry", "hat", "bag", "gloves"]
      visible_edges: "overlaps with all layers at specific points"

# ===========================================================================
# SECTION 2: THICKNESS COMPATIBILITY
# ===========================================================================

thickness_compatibility:
  description: "Which fabric weights can layer under/over which, and how they interact."

  sheer_over_opaque:
    compatibility: "high"
    effect: "Inner opaque layer visible through outer sheer layer — creates depth and translucency interest."
    examples: ["sheer chiffon blouse over opaque camisole", "mesh top over bralette", "lace overlay over solid dress"]
    renderer_positive: "sheer layer over opaque base, inner fabric visible through translucency, depth from fabric layering"
    renderer_negative: "layers merging into one, no translucency distinction, inner layer invisible"

  structured_over_knit:
    compatibility: "medium"
    effect: "Structured outer layer creates tension lines over soft knit base. Works if the structured piece is not too tight."
    examples: ["blazer over sweater", "leather jacket over knit dress", "structured vest over cashmere"]
    renderer_positive: "structured outer over soft knit base, gentle tension lines at shoulders, fabric contrast between stiff and soft"
    renderer_negative: "compressed knit bunching under structured garment, bulky uneven silhouette"

  leather_over_silk:
    compatibility: "high"
    effect: "High-end contrast — matte or gloss leather over fluid lustrous silk. The contrast in texture and weight is the visual point."
    examples: ["leather jacket over silk blouse", "leather skirt with silk camisole tucked in"]
    renderer_positive: "leather over silk, deliberate texture contrast, matte and shine interplay, both fabrics independently readable"
    renderer_negative: "leather crushing the silk, silk invisible under leather, textures competing rather than complementing"

  cashmere_over_cotton:
    compatibility: "high"
    effect: "Soft bulk at collar and cuffs. The cashmere adds warmth and texture while the cotton provides structure."
    examples: ["cashmere cardigan over cotton shirt", "cashmere sweater with cotton collared shirt underneath"]
    renderer_positive: "cashmere over cotton, soft collar peeking, gentle bulk at neckline and cuffs, textured layering"
    renderer_negative: "both layers merging, no visible collar or cuff distinction, cashmere overpowering the cotton line"

  heavy_over_lightweight:
    compatibility: "low to medium"
    effect: "Heavy outer compresses lightweight inner. Only works if the lightweight layer is not the primary visual piece."
    examples: ["wool coat over thin dress", "heavy jacket over slip dress"]
    renderer_positive: "heavy outer layer over lightweight base, visible weight of outer fabric, inner layer suggested at open edges"
    renderer_negative: "inner fabric bunching in thick folds under heavy outer, silhouette distortion from compression"

# ===========================================================================
# SECTION 3: VISIBLE EDGE RULES
# ===========================================================================

visible_edge_rules:
  description: "Rules for how each layer should be visible at the garment's edges."

  collar:
    rule: "The inner layer's collar should peek above or outside the outer layer's collar by 1-3 cm."
    variations:
      turtleneck_under_shirt: "Turtleneck collar visible inside open shirt collar"
      shirt_under_sweater: "Shirt collar spread over sweater neckline"
      collar_under_blazer: "Shirt collar sitting cleanly inside blazer lapel"
      no_collar_show: "High-neck outer intentionally covers inner collar"
    failure: "Collar disappearing into outer layer, collar crushed or folded unnaturally"

  cuff:
    rule: "The inner layer's cuff should extend 1-2 cm beyond the outer layer's sleeve hem."
    variations:
      shirt_cuff_under_blazer: "Shirt cuff visible below blazer sleeve"
      layering_bracelets: "Multiple sleeve edges visible for intentional styling"
      rolled_cuffs: "Both layers cuffs rolled together or independently"
    failure: "Sleeves at identical length making layers look fused"

  hem:
    rule: "Each layer's hem should be visibly distinct in length or position."
    variations:
      long_under_short: "Inner layer hem extends below outer hem (tunic under jacket)"
      short_over_long: "Cropped outer layer shows inner layer below"
      equal_length: "Only works if fabric contrast is strong enough to distinguish layers"
      asymmetrical_layering: "Hem deliberately uneven across layers"
    failure: "All hems at identical level creating a single merged hem line"

  waistband:
    rule: "When garments overlap at the waist, the waistband of at least one layer should be visible."
    variations:
      tucked_in: "Inner layer tucked into bottom layer, waistband visible"
      half_tuck: "Front of shirt tucked, back untucked — editorial styling"
      belted_over: "Belt worn over both layers at the waist"
    failure: "Undefined waist, layers merging at the waistline, no construction visible"

# ===========================================================================
# SECTION 4: FASHION EDITORIAL LAYERING
# ===========================================================================

editorial_layering_combinations:
  description: "Specific high-end editorial layering combinations with visual effect notes."

  silk_blouse_structured_blazer_leather_pants:
    description: "Fluid top + structured mid + edgy bottom — texture contrast across three zones."
    visual_effect: "Each layer occupies a different visual zone with a distinct fabric story. The blouse flows, the blazer structures the shoulders, the leather anchors the look."
    best_moods: [editorial_luxury, powerful, modern]
    pose_notes: "Blazer open to show blouse. Hands in pockets to create leather tension at hips."

  turtleneck_shirt_oversized_coat:
    description: "High-neck base + collared mid + voluminous outer — edge layering at collar and hem."
    visual_effect: "Three layers visible at the neckline (turtleneck → shirt collar → coat lapel). Hem of shirt extends below coat hem for intentional long-line effect."
    best_moods: [editorial_luxury, relaxed, chic]
    pose_notes: "Coat worn open. One hand in pocket. The layers should be visible without being bunched."

  corset_sheer_blouse_high_waist_trousers:
    description: "Structured waist + translucent top + tailored bottom — editorial sexy layering."
    visual_effect: "Corset visible through sheer blouse at the waist. The blouse provides coverage while the corset provides structure. Trousers anchor the look."
    best_moods: [sexy_editorial, avant_garde, editorial_fashion]
    pose_notes: "Sheer blouse slightly open at the collar. One hand at waist to feel corset boning through the fabric."

  bodycon_dress_under_sheer_maxi:
    description: "Opaque fitted base + translucent voluminous outer — classic editorial sheer layering."
    visual_effect: "Bodycon provides the silhouette, sheer maxi provides the movement and translucency. The body line is visible through the outer layer."
    best_moods: [sexy_editorial, ethereal, editorial_luxury]
    pose_notes: "Backlight essential. Wind in the sheer layer. Bodycon dress visible through the translucent overlay."

  crop_top_high_waist_skirt_open_jacket:
    description: "Midriff-baring base + high waist bottom + shoulder-defining outer — zone layering."
    visual_effect: "Three zones: exposed midriff draws the eye to the waist, high-waist skirt elongates the legs, open jacket structures the shoulders."
    best_moods: [editorial_fashion, modern, sexy_editorial]
    pose_notes: "One hand at exposed midriff or on hip. Jacket pushed back to show shoulders."

# ===========================================================================
# SECTION 5: COMMON LAYERING FAILURES
# ===========================================================================

common_layering_failures:
  - "no visible layer distinction — garments fuse into one visually"
  - "thickness conflict — thick heavy layer under thin light layer causes unnatural bunching"
  - "collar chaos — too many collars competing at the neckline without clear hierarchy"
  - "bunching at waist — too many layers all tucked into the same waistband without space"
  - "identical hem lengths — all layers ending at exactly the same line, looking like one garment"
  - "sleeves disappearing — inner sleeve not visible at cuff because outer sleeve is too long"
  - "layer order violation — outer piece worn under inner piece without intentional deconstruction styling"
  - "excessive bulk — more than 3-4 visible layers without editorial justification"

# ===========================================================================
# SECTION 6: RENDERER LANGUAGE
# ===========================================================================

renderer_language:
  chatgpt_image:
    positive: "Coherent garment layering with each layer independently readable. Visible collar, cuff, and hem distinction between layers. Fabric contrast between layers adds visual interest."
    negative: "Layers fused together, no visible edge distinction between garments, random bulk at waist."
  z_image_turbo:
    positive: "clear garment layering, visible collar and cuff edges, distinct fabric layers, coherent layering logic"
    negative: "fused layers, no edge distinction, invisible underlayer, messy bunching"
  stable_diffusion:
    positive: "well-layered outfit, distinct garment layers at collar cuffs and hem, coherent stacking"
    negative: "merged clothing, no layer separation, bunching layers, unclear edges"

# ===========================================================================
# SECTION 7: CROSS-REFERENCES
# ===========================================================================

cross_references:
  - "wardrobe-outfit-construction.yaml: Use layering_logic field with this file's rules when layering is active."
  - "fashion-silhouette-library.yaml: Silhouette determines how many layers are visible and where edges should appear. Cocoon silhouette may hide inner layers by design."
  - "garment-structure-failure-diagnosis.yaml: Layer fusion is a common failure — cross-reference the collar, waist, and hem diagnosis sections."
  - "fabric-opacity-translucency-logic.yaml: When sheer layers are involved (section 4 creative combinations), apply translucency rules to the outer layer."
  - "color-palette-schemes.yaml: Layered colors should follow color strategy — contrast or tonal depending on the intended mood."
