# ============================================================
# identity-character-consistency.yaml
# Identity lock, character consistency, and multi-variation continuity controller
# Version: 1.0.0
# Purpose:
#   Preserve the same character/person/subject across edits, variations,
#   series outputs, and multi-image projects.
# ============================================================

schema_version: "1.0.0"
name: "identity-character-consistency"
description: >
  A prompt-enhancement module for identity preservation and series consistency.
  It governs face, hairstyle, silhouette, body type, costume identity, accessory identity,
  and recurring subject continuity across multiple generations or edits.

core_principle: >
  Identity consistency requires defining which visual anchors are essential and which may vary.
  The renderer must preserve face identity, hairstyle family, body silhouette, costume signature,
  and subject-specific markers unless the user intentionally changes them.

global_rules:
  - "Separate locked identity traits from changeable styling traits."
  - "Preserve recurring character markers across variants."
  - "For character IP work, define a visual-recognition anchor set instead of relying on repeated character names."
  - "Coordinate with character-ip-identity-system.yaml for silhouette, hair, face, palette, costume, props, world motifs, allowed variation, and forbidden drift."
  - "Coordinate with character-archetype-visual-system.yaml for gaze, expression, posture, gesture, and camera relation."
  - "Do not allow face drift, age drift, ethnicity drift, hairstyle drift, costume drift, or body-type drift unless requested."
  - "Series outputs should maintain the same subject impression even when pose, expression, or environment changes."
  - "For cosplay or character-inspired work, preserve recognizable signature cues while still following the requested realism/stylization level."
  - "For multi-subject scenes, maintain per-character separation so identities do not blend together."

identity_consistency_schema:
  subject_type: "realistic_person | fictional_character | cosplay_character | mascot | product | creature"
  identity_mode: "strict_lock | medium_lock | loose_lock"
  locked_traits: []
  allowed_variations: []
  recurring_markers: []
  continuity_scope: "single_edit | multi_variation | multi_page | series | campaign"
  anti_drift_checks: []

locked_trait_categories:
  face_identity:
    examples:
      - "face shape"
      - "eye shape"
      - "nose/lip relationship"
      - "overall facial impression"
      - "jawline"

  hair_identity:
    examples:
      - "length family"
      - "bangs or no bangs"
      - "overall hairstyle shape"
      - "base color"
      - "signature hair ornament"

  body_identity:
    examples:
      - "body type"
      - "height impression"
      - "shoulder/waist/hip proportion"
      - "silhouette"

  wardrobe_identity:
    examples:
      - "signature color scheme"
      - "iconic garment structure"
      - "recurring accessory"
      - "uniform logic"
      - "footwear family"

  character_signature:
    examples:
      - "mecha crest"
      - "cape shape"
      - "distinctive jewelry"
      - "weapon silhouette"
      - "face marking"

identity_lock_profiles:
  strict_lock:
    rules:
      - "Keep the same face identity across all outputs."
      - "Keep hairstyle family and body silhouette stable."
      - "Only vary expression, pose, camera angle, and environment unless more changes are requested."
      - "Preserve signature costume markers."

  medium_lock:
    rules:
      - "Keep the same identity impression, but allow moderate outfit/hair styling variation."
      - "Preserve the recognizable face, silhouette, and character cues."

  loose_lock:
    rules:
      - "Preserve the broad character essence, but allow freer reinterpretation."
      - "Still avoid accidental subject drift."

allowed_variation_categories:
  - "expression"
  - "pose"
  - "camera angle"
  - "lighting"
  - "background"
  - "outfit variation within the same identity family"
  - "mood shift"

anti_drift_failures:
  - "face drift"
  - "age drift"
  - "ethnicity drift"
  - "hairstyle drift"
  - "body type drift"
  - "costume drift"
  - "accessory loss"
  - "character signature loss"
  - "cross-character blending"
  - "duplicate face syndrome in multi-subject scenes"

multi_image_series_rules:
  - "If multiple outputs belong to the same series, define a stable identity anchor set."
  - "Re-state locked traits in later prompts when necessary."
  - "For edits, explicitly say 'preserve the same person/character identity'."
  - "For campaigns or lookbooks, vary styling and environment while keeping the subject recognizable."

self_review_checklist:
  - "Which traits are locked?"
  - "Which traits may vary?"
  - "Does the prompt protect identity strongly enough?"
  - "Could the model unintentionally drift age, face, or body type?"
  - "In multi-subject images, are the characters individually separable?"

model_specific_rendering:
  chatgpt_image:
    guidance: >
      Use explicit preserve-identity language and list the recurring subject markers.
      Make the allowed variations separate from the locked traits.
  z_image_turbo:
    positive_template: >
      same character identity, preserve face, preserve hairstyle family,
      preserve body silhouette, preserve signature costume markers, no identity drift
    negative_template: >
      face drift, hairstyle drift, age drift, costume drift, duplicate faces, mixed identity
  stable_diffusion:
    positive_template: >
      consistent identity, same face, same silhouette, same key costume cues,
      controlled variation only
    negative_template: >
      identity drift, face drift, body drift, costume drift, duplicated face

prompt_assembly_hooks:
  phase_1_intent_analysis:
    add_fields:
      - identity_consistency_schema
    action: "Detect when the user needs identity lock, character consistency, or series continuity."
  phase_2_cinematic_enrichment:
    action: "Convert identity cues into locked traits, allowed variations, anti-drift constraints, and character IP visual-recognition anchors when relevant."
  phase_3_scene_blueprint:
    action: "Coordinate identity consistency with subject rules, edit rules, and multi-subject interaction."
  phase_4_self_review:
    checks:
      - "Check lock strength."
      - "Check face/body/costume drift risk."
      - "Check per-character separation in multi-subject work."
  phase_4_5_cleanup:
    action: "Do not remove identity-lock phrases when prompt compression occurs."
  phase_4_6_renderer_selection:
    action: "Render identity constraints in model-appropriate language."
  phase_5_final_prompt:
    action: "Include concise identity lock language whenever continuity matters."
