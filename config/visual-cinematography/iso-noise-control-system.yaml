version: 1
purpose: "Control texture and noise as an intentional image-quality choice."

iso_noise_profile:
  fields:
    iso_intent: [clean_low_iso, natural_iso, high_iso_documentary, film_grain, digital_noise]
    noise_level: [none, subtle, natural, visible, gritty]
    skin_texture_policy: [clean, natural, detailed, gritty]
    shadow_noise_policy: [clean, natural, visible]
    commercial_cleanliness: [low, medium, high]

presets:
  clean_low_iso:
    prompt_effect: "smooth tonal transitions, minimal noise, polished commercial clarity"
    use_for: [product, beauty, architecture, automotive]
  natural_iso:
    prompt_effect: "natural photographic texture, subtle shadow grain, realistic skin detail"
    use_for: [editorial, portrait, lifestyle]
  high_iso_documentary:
    prompt_effect: "visible but controlled shadow grain and authentic low-light texture"
    use_for: [night_documentary, concert, candid]
  film_grain:
    prompt_effect: "fine organic film grain and cinematic analog tonal texture"
    use_for: [retro, filmic_editorial]

decision_rules:
  - "Commercial beauty, product, and readable text favor clean_low_iso."
  - "Night scenes may use controlled shadow grain but must preserve facial detail."
  - "Do not add heavy digital noise to clean beauty or product work unless documentary grit is explicit."
