dynamic_range_control:
  purpose: "Select how much tonal range the final image should describe."

  natural_dynamic_range:
    generator_prompt: "natural tonal range with believable highlights and shadows"
    best_for:
      - "portrait"
      - "lifestyle"
      - "documentary"
    avoid:
      - "HDR halos"
      - "flat overprocessed detail everywhere"

  wide_dynamic_range:
    generator_prompt: "wide dynamic range, bright and dark areas both retain detail, no harsh clipping"
    best_for:
      - "architecture"
      - "landscape"
      - "interior with windows"
      - "complex hidden-object scene"
    corrective_terms:
      - "balanced highlight and shadow detail"
      - "natural contrast, not overprocessed HDR"

  compressed_low_contrast:
    generator_prompt: "soft low-contrast exposure with gentle tonal transitions and minimal harsh shadows"
    best_for:
      - "beauty"
      - "children educational UI"
      - "pastel editorial"
    risks:
      - "image may become flat"
    corrective_terms:
      - "clear subject separation despite soft contrast"

  high_contrast_filmic:
    generator_prompt: "filmic high contrast with deep shadows and controlled bright highlights"
    best_for:
      - "thriller"
      - "luxury poster"
      - "sports drama"
    risks:
      - "important details may become unreadable"
    corrective_terms:
      - "hero detail remains readable"
      - "selective highlights define the shape"

tonal_zone_prompting:
  purpose: "Convert Zone System thinking into simple visible prompt language."

  zone_guides:
    zone_I_II:
      visible_language: "near-black shadow with minimal texture"
      use_carefully_for:
        - "background corners"
        - "noir atmosphere"
      avoid_for:
        - "faces"
        - "logos"
        - "important outfit details"

    zone_III_IV:
      visible_language: "dark shadow with visible texture"
      best_for:
        - "black clothing"
        - "dark wood"
        - "night background"

    zone_V:
      visible_language: "balanced midtone exposure"
      best_for:
        - "neutral surfaces"
        - "standard subject exposure"

    zone_VI_VII:
      visible_language: "bright skin or light fabric with preserved detail"
      best_for:
        - "skin highlights"
        - "cream fabric"
        - "light stone"

    zone_VIII_IX:
      visible_language: "very bright highlight with subtle texture"
      best_for:
        - "white background"
        - "wedding dress highlights"
        - "sunlit wall"
      corrective_terms:
        - "subtle texture retained"
        - "not pure clipped white"

exposure_failure_taxonomy:
  blown_highlights:
    symptoms:
      - "white areas have no texture"
      - "skin, sky, fabric, or product labels become pure white"
    likely_causes:
      - "high-key prompt without highlight guardrails"
      - "overuse of glowing, bloom, overexposed"
    fix:
      - "add highlight detail preserved"
      - "soft highlight roll-off"
      - "white surfaces retain texture"
    add_negative:
      - "blown-out highlights"
      - "featureless white areas"

  crushed_shadows:
    symptoms:
      - "dark areas lose all texture"
      - "subject blends into background"
    likely_causes:
      - "low-key prompt without rim or shadow detail"
      - "overuse of black, dark, noir"
    fix:
      - "add rich shadow detail"
      - "subtle edge separation"
      - "hero element remains readable"
    add_negative:
      - "crushed black shadows"
      - "subject disappearing into darkness"

  muddy_low_light:
    symptoms:
      - "night scene looks brown, noisy, or unclear"
      - "colors lose separation"
    likely_causes:
      - "low-light prompt with no motivated highlights"
      - "lack of contrast hierarchy"
    fix:
      - "add clean shadow separation"
      - "controlled neon or practical highlights"
      - "face/subject remains readable"
    add_negative:
      - "muddy shadows"
      - "noisy underexposed look"

  flat_overexposed_high_key:
    symptoms:
      - "image is bright but lacks depth"
      - "subject edges disappear into background"
    likely_causes:
      - "high-key prompt without separation"
      - "too much soft white light"
    fix:
      - "add subtle shadow modeling"
      - "soft edge separation"
      - "light fabric retains detail"
    add_negative:
      - "flat featureless lighting"
      - "washed-out subject"

  fake_hdr_overprocessed:
    symptoms:
      - "all details equally bright"
      - "halos around building edges"
      - "unnatural local contrast"
    likely_causes:
      - "HDR/wide dynamic range wording too strong"
    fix:
      - "add natural dynamic range"
      - "balanced highlights and shadows without HDR halos"
    add_negative:
      - "overprocessed HDR"
      - "halo artifacts"

  unreadable_text_due_to_exposure:
    symptoms:
      - "label or typography hidden by glare, shadow, or low contrast"
    likely_causes:
      - "reflective materials or dramatic lighting not controlled"
    fix:
      - "add even readable exposure on text area"
      - "no glare across label"
      - "clean contrast around typography"
    add_negative:
      - "glare covering text"
      - "unreadable label"

exposure_conflict_resolution:
  high_key_vs_texture:
    conflict: "User requests bright airy high-key but also needs lace, white product, skin, or label detail."
    resolution: "Use high-key exposure with highlight texture preserved, soft shadows, and subtle edge definition."
    final_prompt_phrase: "bright airy high-key exposure with preserved highlight texture and soft edge separation"

  low_key_vs_readability:
    conflict: "User requests dark cinematic low-key but hero face, product label, architecture detail, or UI must remain readable."
    resolution: "Use low-key atmosphere with selective highlights and explicit hero readability."
    final_prompt_phrase: "dark low-key atmosphere with selective highlights keeping the hero detail readable"

  shallow_dof_vs_label_or_ui:
    conflict: "Very shallow depth of field plus text, product label, UI, or hidden objects."
    resolution: "Preserve readable exposure and focus on text-critical areas; use background falloff only outside critical plane."
    final_prompt_phrase: "critical text area sharp and evenly exposed, background gently falls off"

  neon_night_vs_skin_tone:
    conflict: "Cyberpunk or colored neon lighting may contaminate face exposure and skin tone."
    resolution: "Keep colored light on edges/background; preserve natural facial exposure."
    final_prompt_phrase: "neon accents on edges and background, natural readable facial exposure"

  hdr_vs_cinematic_contrast:
    conflict: "Wide dynamic range requested but cinematic contrast is also needed."
    resolution: "Protect highlights and shadows while keeping hierarchy through controlled contrast."
    final_prompt_phrase: "wide dynamic range with filmic contrast hierarchy, not flat HDR"

exposure_compression_rules:
  purpose: "Reduce repeated tonal language before final prompt assembly."

  tonal_clusters:
    highlight_protection_cluster:
      redundant_terms:
        - "preserve highlights"
        - "highlight detail"
        - "no clipping"
        - "soft roll-off"
        - "white texture visible"
      compressed_as: "preserved highlight detail with soft roll-off"

    shadow_readability_cluster:
      redundant_terms:
        - "shadow detail"
        - "readable shadows"
        - "not crushed"
        - "rich blacks"
        - "visible dark texture"
      compressed_as: "rich readable shadows"

    high_key_cluster:
      redundant_terms:
        - "bright"
        - "airy"
        - "luminous"
        - "soft white"
        - "clean high-key"
      compressed_as: "bright airy high-key exposure"

    low_key_cluster:
      redundant_terms:
        - "dark"
        - "moody"
        - "noir"
        - "dramatic shadows"
        - "low-key"
      compressed_as: "dark low-key cinematic exposure"

    dynamic_range_cluster:
      redundant_terms:
        - "wide dynamic range"
        - "balanced highlights"
        - "balanced shadows"
        - "HDR detail"
        - "no clipping"
      compressed_as: "natural wide dynamic range"

  remove_from_final_prompt_when_unnecessary:
    - "spot metered"
    - "matrix metering"
    - "incident metering"
    - "histogram"
    - "zone system"
    - "ETTR"
    - "18% gray"
    - "bracketed frames"

model_output_mode_exposure_style:
  chatgpt_image:
    guidance: "Use natural visible tonal language. Avoid camera-metering jargon unless the user explicitly wants a technical photography plan."
    example: "bright airy exposure with preserved white fabric detail and soft shadows"

  stable_diffusion:
    guidance: "Use compact positive terms and separate exposure failures into negative prompt."
    positive_example: "high-key lighting, preserved highlight detail, soft shadows"
    negative_example: "blown highlights, crushed shadows, overprocessed HDR, muddy shadows"

  midjourney:
    guidance: "Use brief tonal phrases and avoid long exposure methodology."
    example: "low-key filmic contrast, rich readable shadows, controlled highlights"

  flux:
    guidance: "Use clear sentence-like exposure instructions early enough to affect the image."
    example: "The scene has natural wide dynamic range, with window highlights preserved and interior shadows readable."

exposure_quality_rubric:
  score_5:
    description: "Excellent exposure control."
    criteria:
      - "hero element clearly readable"
      - "highlights preserved where needed"
      - "shadows support mood without hiding critical detail"
      - "tonality matches genre and subject"
      - "no fake HDR or muddy underexposure"

  score_3:
    description: "Usable exposure with some weakness."
    criteria:
      - "subject readable but highlights or shadows slightly uncontrolled"
      - "genre mood mostly works"
      - "minor loss of material or text detail"

  score_1:
    description: "Exposure undermines the image."
    criteria:
      - "critical subject, face, label, or UI is hidden"
      - "highlights are clipped or shadows crushed"
      - "tonality conflicts with task profile"
      - "image looks muddy, washed out, or fake HDR"

