        - "white product"
        - "snow scene"
        - "bright sky"
        - "high-key beauty"
      corrective_terms:
        - "highlight detail preserved"
        - "no blown-out white areas"
        - "soft highlight roll-off"
      avoid_in_final_prompt_when_not_needed:
        - "ETTR"
        - "metering"
        - "histogram"

    expose_for_shadows:
