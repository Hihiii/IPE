version: 1
purpose: "Exposure strategies and metering modes for controlled lighting in photography."

# =============================================================================
# EXPOSURE STRATEGIES — fundamental approaches
# =============================================================================
exposure_strategies:
  expose_for_highlights:
    description: "Set exposure so that highlight detail is preserved. Shadows fall where they may."
    typical_use: "Outdoor bright scene, wedding dress detail, product white background, high-key."
    risk: "Underexposed shadows introduce noise when lifted."
    recovery: "Excellent highlight recovery; shadows can be lifted 2-3 stops."
    prompt_keywords: "expose for highlights, preserve highlight detail, ETTR minus compensation"

  expose_for_shadows:
    description: "Set exposure so that shadow detail is preserved. Highlights fall where they may."
    typical_use: "Indoor mood, dark commercial, film noir, low-key portrait."
    risk: "Blown highlights are unrecoverable."
    recovery: "Excellent shadow detail; highlights must be protected at capture."
    prompt_keywords: "expose for shadows, preserve shadow detail, shadow priority exposure"

  expose_to_the_right_ettr:
    description: "Expose as bright as possible without clipping highlights. Maximizes signal-to-noise ratio."
    typical_use: "Any scene where maximum dynamic range is desired. Studio product, landscape, commercial."
    risk: "Looks overexposed on camera preview. Requires post-processing to reduce exposure."
    benefit: "Cleanest shadows, least noise. Maximizes sensor dynamic range."
    prompt_keywords: "expose to the right ETTR, maximum dynamic range exposure, bright exposure with highlight protection"
    notes: "Check histogram — push exposure until highlights just touch the right edge, then back off slightly."

  expose_for_midtones_key:
    description: "Set exposure for a specific midtone value. Middle gray (18% gray) as reference."
    typical_use: "Standard portrait, studio product, balanced scenes."
    method: "Use gray card. Spot meter on midtone area. Adjust for desired key."
    prompt_keywords: "midtone key exposure, gray card metered, balanced exposure"

  bracketed_exposure:
    description: "Take multiple frames at different exposures to blend in post or ensure a usable frame."
    typical_use: "High-contrast scenes, wedding ceremony, unpredictable lighting."
    settings: "Typically 3-5 frames at ±1 stop intervals. Set camera to bracketing mode."
    prompt_keywords: "exposure bracketing, bracketed frames, multi-exposure for blending"
    notes: "For HDR blending. Use tripod for perfect alignment. Can also bracket just one direction."

  highlight_weighted_metering:
    description: "Metering biased toward preserving highlights. Camera prevents highlight clipping."
    typical_use: "Stage performance, spot-lit scenes, high-contrast street."
    best_for: "Nikon and Sony bodies with highlight-weighted metering mode."
    prompt_keywords: "highlight weighted metering, highlight priority auto exposure"

  spot_metered_key:
    description: "Use spot meter on a specific tone (skin, gray card, white) and set exposure manually."
    typical_use: "Studio controlled lighting, portrait, product with consistent tonality."
    method: "Meter on skin tone and place it in zone VI (Caucasian) or zone V (medium skin)."
    prompt_keywords: "spot meter exposure, manual exposure spot meter, zone placement"

  incident_metering:
    description: "Measure light falling on the subject (not reflected from it). Dome at subject position, pointed at camera."
    typical_use: "Studio, portrait, product, any controlled environment."
    benefit: "Ignores subject reflectance. Pure light measurement. Most accurate for portraits."
    prompt_keywords: "incident light metering, dome meter at subject, light falling on subject"
    notes: "The most accurate method for controlled environments. Eliminates subject color bias."

  average_metering:
    description: "Entire frame averaged to middle gray. Classic center-weighted average."
    typical_use: "Evenly lit scenes, landscapes, general photography."
    limitation: "Fooled by large bright or dark areas (snow, black background)."
    prompt_keywords: "average metering, center weighted average, overall scene exposure"

  matrix_evaluative_metering:
    description: "Camera evaluates multiple zones and compares to scene database."
    typical_use: "Walkaround, event, general use in variable lighting."
    benefit: "Most intelligent auto mode. Uses AI scene recognition."
    limitation: "Less predictable than spot or incident. Camera decides priority."
    prompt_keywords: "matrix metering, evaluative metering, intelligent scene exposure"

  zone_system_placement:
    description: "Ansel Adams zone system. Pre-visualize tones and expose/develop to place them correctly."
    typical_use: "Fine art, landscape, studio where precise tonal control is needed."
    zones_used: "Typically zones III through VII for print. Digital can use II through VIII."
    prompt_keywords: "zone system exposure, Ansel Adams zone placement, tonal previsualization"
    notes: "Zone V = 18% gray. Each zone = 1 stop. Place key tone, other tones fall naturally."

  low_key:
    description: "Overall dark exposure with bright accents. Most tones in zones I-III. Key subject in zones IV-VI."
    typical_use: "Moody portrait, film noir, luxury dark product, dramatic editorial."
    lighting: "Single small source or rim light. Minimal fill."
    prompt_keywords: "low key exposure, dark mood exposure, dramatic shadows, film noir lighting"
    notes: "The brightness range is compressed in shadows. Key subject must be lit intentionally."

  high_key:
    description: "Overall bright exposure with minimal shadows. Most tones in zones VII-IX."
    typical_use: "Beauty portrait, commercial bright product, clean editorial, food."
    lighting: "Flood with soft light. Minimal shadows. Overexpose background 1-2 stops."
    prompt_keywords: "high key exposure, bright airy exposure, soft overexposed background"
    notes: "Avoid completely blown skin. Keep some texture in the brightest areas."

  iso_noise_control:
    description: "Deliberate ISO selection balancing shutter speed needs against noise acceptance."
    typical_use: "Low-light situations where flash isn't allowed."
    guideline: "Base ISO (100) for maximum quality. Raise only when necessary for shutter speed."
    prompt_keywords: "low ISO exposure, base ISO quality, noise controlled exposure"

  long_exposure:
    description: "Shutter speed longer than 1 second. Captures time, movement, light trails."
    typical_use: "Night landscape, light trails, smooth water, astrophotography."
    requirement: "Tripod essential. Use remote shutter or self-timer to avoid shake."
    prompt_keywords: "long exposure, slow shutter, light trails, smooth water exposure"
    notes: "Use ND filter for long exposure in daytime. Bulb mode for >30 seconds."

  flash_ambient_balance:
    description: "Balancing flash power with ambient light for natural or dramatic look."
    strategies:
      - "slow sync: long shutter for ambient background, flash freezes subject"
      - "high-speed sync: flash at fast shutter to kill ambient, subject against dark"
      - "fill flash: flash at -1 to -2 stops below ambient, natural look"
    prompt_keywords: "flash ambient balance, slow sync flash, fill flash exposure, HSS flash"

  push_pull_processing:
    description: "Deliberately underexpose or overexpose and compensate in development (digital: in post)."
    typical_use: "When you need a specific shutter speed or aperture at ISO limit."
    risk: "Push (underexpose) increases noise and contrast. Pull (overexpose) reduces contrast."
    prompt_keywords: "push exposure, pull exposure, exposure compensation in post"


# =============================================================================
# ZONE SYSTEM — detailed zone-by-zone guide
# =============================================================================
zones:
  zone_0:
    name: "Pure black"
    description: "No detail. Maximum black of the print."
    typical_subjects: "Deep shadows, black velvet, unlit interior corners."
    digital_render: "RGB 0,0,0 or raw black point"

  zone_I:
    name: "Near black, first tone above black"
    description: "First hint of tone, no texture."
    typical_subjects: "Deep shadow in clothing, darkest tree bark."
    digital_render: "Almost black, subtle tonal shift"

  zone_II:
    name: "First hint of texture"
    description: "Very dark with texture just visible."
    typical_subjects: "Black fur texture, dark wood grain, shadow of dark hair."
    digital_render: "Texture visible only with careful viewing"

  zone_III:
    name: "Dark with good texture"
    description: "Full texture visible in dark areas. Important zone for shadow detail."
    typical_subjects: "Dark skin tone, dark foliage, shadow side of face, dark clothing detail."
    digital_render: "RGB ~60-70 (sRGB). Recommended minimum for usable shadow detail."

  zone_IV:
    name: "Dark midtone"
    description: "Dark foliage, shadowed grass, dark stone."
    typical_subjects: "Dark skin, blue sky in landscape, shadow side of light-colored building."
    digital_render: "RGB ~90-100 (sRGB)"

  zone_V:
    name: "Middle gray (18%)"
    description: "Standard metering target. The zone every meter assumes."
    typical_subjects: "18% gray card, medium skin tone, green grass, clear blue sky."
    digital_render: "RGB ~118-128 (sRGB). THE reference zone."

  zone_VI:
    name: "Light midtone"
    description: "Caucasian skin tone (standard). Light gray."
    typical_subjects: "Caucasian skin in portrait, light stone, light blue sky."
    digital_render: "RGB ~150-160 (sRGB)"

  zone_VII:
    name: "Light with detail"
    description: "Very light but still showing texture."
    typical_subjects: "White shirt with visible folds, clouds, light gray wall, paper."
    digital_render: "RGB ~200-210 (sRGB)"

  zone_VIII:
    name: "White with faint texture"
    description: "Nearly white. The last hint of detail before pure white."
    typical_subjects: "White dress detail, snow with slight texture, white wall texture."
    digital_render: "RGB ~235-245 (sRGB). Critical zone for highlight detail in portraits."

  zone_IX:
    name: "Pure white, no detail"
    description: "Maximum white. All texture is lost."
    typical_subjects: "Specular highlights, direct sun reflection, sky near sun."
    digital_render: "RGB 255,255,255 or raw white point"

  zone_X:
    name: "Paper base white / glare"
    description: "Brighter than white — reflective glare. Not achievable in print."
    typical_subjects: "Mirror reflection, chrome glare, direct light source."
    digital_render: "255,255,255 with no recovery possible"

# =============================================================================
# ADVANCED EXPOSURE CONCEPTS
# =============================================================================
advanced_concepts:
  dynamic_range_management:
    description: "Managing the brightness range of the scene relative to sensor capability."
    guideline: "Consumer sensors ~12 stops. Pro sensors ~14-15 stops. Human eye ~20 stops."
    strategies:
      - "compress: lighten shadows, darken highlights in post (HDR approach)"
      - "choose: expose for the important range, let the rest clip"
      - "blend: bracket and merge exposures"
    prompt_keywords: "dynamic range management, HDR blending, tonal compression"

  luminance_histogram_reading:
    description: "Reading the luminance histogram to judge exposure distribution."
    key_indicators:
      - "left wall: shadows clipped to black"
      - "right wall: highlights clipped to white"
      - "center peak: midtone concentration"
      - "gap in middle: missing tonal range"
    ideal: "Histogram touching neither wall, with smooth bell-like distribution."

  rgb_histogram_analysis:
    description: "Separate red, green, blue channels in histogram. One channel may clip before others."
    importance: "A single clipped channel creates color shifts (e.g., blown red channel makes skin look green)."
    prompt_keywords: "RGB histogram, channel clipping, color channel exposure"

  reciprocity_failure:
    description: "At very long exposures (>1 second), film reciprocity fails and needs compensation."
    digital_note: "Digital sensors do not have reciprocity failure, but long exposure noise increases."
    compensation: "Film: add 1 stop for 2-second exposure, 2 stops for 60-second exposure."
    prompt_keywords: "reciprocity compensation, long exposure correction"

  exposure_equivalency_triangle:
    description: "Aperture, shutter speed, and ISO are equivalent in exposure effect. Trading one for another."
    rule: "One stop change in any = same exposure with different aesthetic."
    example: "f/2.8, 1/125, ISO 100 = f/4, 1/60, ISO 100 = f/2.8, 1/250, ISO 200"
    prompt_keywords: "exposure triangle equivalency, aperture shutter ISO tradeoff"

  histograms_for_flash:
    description: "Using histogram to judge flash exposure balance between flash and ambient."
    method: "Check histogram after flash shot. Flash adds to highlights. Ambient fills shadows."
    ideal_flash_histogram: "Bimodal: dark ambient shadows with bright flash-lit subject."


# =============================================================================
# CONTRAST AND TONALITY MANAGEMENT
# =============================================================================
tonality:
  high_contrast:
    description: "Wide tonal range. Deep blacks to bright whites. Few midtones."
    visual_effect: "dramatic, punchy, aggressive, editorial"
    prompt_keywords: "high contrast, deep blacks bright whites, dramatic tonal range"

  low_contrast:
    description: "Compressed tonal range. Few extreme blacks or whites."
    visual_effect: "soft, muted, dreamy, flat, filmic"
    prompt_keywords: "low contrast, soft muted tones, compressed tonal range, flat exposure"

  soft_midtone_emphasis:
    description: "Tones concentrated in the middle range. Shadows and highlights both compressed."
    visual_effect: "creamy, smooth, gentle, velvety"
    prompt_keywords: "midtone emphasis, creamy exposure, soft tonal compression, velvet contrast"

  split_tonality:
    description: "Shadows toned one color, highlights another. Exposure supports both."
    visual_effect: "stylized, filmic, vintage, cinematic"
    prompt_keywords: "split tonal exposure, shadow highlight color separation, filmic contrast"

  full_range:
    description: "Pure black to pure white with smooth gradients across all zones."
    visual_effect: "natural, detailed, dimensional, rich"
    prompt_keywords: "full tonal range, black to white gradient, complete zone coverage, rich tonality"


# =============================================================================
# EXPOSURE RATIOS — lighting balance
# =============================================================================
ratios:
  ratio_1_1:
    description: "Even lighting. Key and fill at equal power. Flat, shadowless."
    use: "High-key beauty, product on white, ID photo."
    mood: "Flat, open, clean"
    stops: "Key = Fill (0 stop difference)"
    prompt_keywords: "1:1 lighting ratio, flat even lighting, shadowless"

  ratio_2_1:
    description: "Key one stop brighter than fill. Subtle modeling. Standard interview lighting."
    use: "Corporate portrait, interview, general commercial."
    mood: "Natural, pleasant, light"
    stops: "Key = Fill + 1 stop"
    prompt_keywords: "2:1 lighting ratio, subtle shadow modeling, soft dimensional light"

  ratio_3_1:
    description: "Key 1.5 stops brighter than fill. Noticeable shadows. Classic portrait."
    use: "Standard portrait, beauty, editorial."
    mood: "Dimensional, classic, flattering"
    stops: "Key = Fill + 1.5 stops"
    prompt_keywords: "3:1 lighting ratio, classic portrait contrast, dimensional shadow"

  ratio_4_1:
    description: "Key 2 stops brighter than fill. Strong shadows. Dramatic but not extreme."
    use: "Editorial portrait, fashion, male portrait."
    mood: "Strong, dramatic, characterful"
    stops: "Key = Fill + 2 stops"
    prompt_keywords: "4:1 lighting ratio, strong shadow contrast, dramatic portrait"

  ratio_8_1:
    description: "Key 3 stops brighter than fill. Very strong shadows. Near dark on fill side."
    use: "Film noir, moody editorial, high drama, male character."
    mood: "Extreme, moody, dark, theatrical"
    stops: "Key = Fill + 3 stops"
    prompt_keywords: "8:1 lighting ratio, extreme contrast, moody shadow, near dark fill"

  ratio_16_1:
    description: "Key 4+ stops brighter than fill. Fill side is nearly black. Single light source effect."
    use: "Rembrandt extreme, thriller mood, high drama."
    mood: "Harsh, severe, dark, intense"
    stops: "Key = Fill + 4+ stops"
    prompt_keywords: "16:1 lighting ratio, single light source, extreme dark shadow"

  key_to_background:
    description: "Ratio between key light and background illumination."
    guidelines:
      - "key +0 stops: subject blends with background"
      - "key -1 stop: subtle separation"
      - "key -2 stops: strong subject separation (recommended)"
      - "key -3 stops: subject pops dramatically from dark background"
      - "key +1 stop: subject darker than background (silhouette effect)"

  key_to_rim:
    description: "Ratio between key light and rim/accent light."
    guidelines:
      - "rim 1 stop brighter than key: subtle edge definition"
      - "rim 2 stops brighter than key: strong rim, hair detail"
      - "rim 3+ stops brighter than key: extreme rim, lens flare risk"


# =============================================================================
# AUTOREVISE EXTENSIONS — Exposure decisions for image-generation prompts
# =============================================================================
# These additions convert photographic exposure concepts into generator-visible
# tonal behavior, readability guardrails, conflict resolution, and compression
# rules. Human technical terms may remain in internal analysis; final prompts
# should describe visible tonal effects.

generator_visible_exposure_translation:
  purpose: "Translate camera exposure strategies into visible tonal behavior for image models."

  exposure_strategy_to_visible_effect:
    expose_for_highlights:
