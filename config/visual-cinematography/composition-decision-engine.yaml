schema_version: "1.0.0"
name: "composition-decision-engine"
description: >
  Composition decision controller for deciding how an image should be framed
  before style, detail, and rendering polish are added.

core_principle: >
  Composition is a directing layer. Decide camera relationship and shot scale
  early — gaze, layout, and crop safety all depend on knowing the viewer's
  perspective and frame boundaries. Background role vs negative space order
  is conditional on task type: publication tasks resolve background first;
  subject-first tasks resolve negative space first.

composition_decision_engine:
  decision_order:
    - determine_story_goal_and_image_use
    - identify_primary_subject
    - identify_secondary_subject
    - determine_visual_hierarchy
    - determine_camera_relationship
    - determine_camera_distance_and_shot_scale
    - determine_crop_policy
    - determine_gaze_action_flow
    - determine_frame_layout
    - determine_background_role_or_negative_space  # conditional — see background_vs_negative_space_order
    - determine_depth_layers
    - determine_light_hierarchy
    - determine_visual_balance
    - apply_failure_guardrails

  background_vs_negative_space_order:
    description: "Background role and negative space have a bidirectional dependency. The correct order depends on whether the background carries information responsibility."
    publication_mode:
      when: ["magazine_cover", "poster", "UI", "banner", "brand_ad", "publication", "cover", "text_overlay"]
      order: ["determine_background_role → determine_negative_space_policy"]
      logic: "Background has information-carrying responsibility first (title-safe zone, cover lines, logo panel). Negative space then serves the background's layout requirements."
    subject_mode:
      when: ["portrait", "product_scene", "character", "action", "fashion", "architecture", "landscape", "food", "vehicle", "selfie"]
      order: ["determine_negative_space_policy → determine_background_role"]
      logic: "Breathing room and visual pacing are set first. Background then conforms to the established negative space and composition rhythm."

composition_schema:
  composition_goal: "portrait_priority | product_priority | narrative_scene | action_readability | publication_layout | world_scale | atmosphere_first"
  subject_priority:
    primary_subject: ""
    secondary_subjects: []
    first_read_target: ""
    protected_features: []
  visual_hierarchy:
    first_read: []
    second_read: []
    third_read: []
    suppress: []
  camera_relationship:
    mode: "viewer_engagement | observational | over_shoulder | selfie | product_hero | action_follow | POV"
    viewpoint_notes: ""
  camera_distance_policy:
    shot_scale: "extreme_close_up | close_up | bust | waist_up | half_body | three_quarter | full_body | wide | extreme_wide"
    preferred_distance: "close | moderate | far | action_wide | selfie_close | product_macro"
    lens_family: "deferred_until_camera_technical_router"
    distortion_control: []
  crop_policy:
    crop_intent: "safe_full_subject | intentional_close_crop | cover_safe | cinematic_partial | action_wide | product_full"
    avoid_crop_points: []
    must_keep_visible: []
  gaze_action_flow:
    gaze_target: "viewer | off_frame_left | off_frame_right | object | screen | mirror | another_subject | action_target | none"
    action_direction: "left | right | toward_camera | away_from_camera | upward | downward | diagonal | static"
    lead_room_required: false
    target_visibility: "visible | implied_off_frame | not_needed"
  frame_strategy:
    subject_position: "center | left_third | right_third | lower_third | upper_third | symmetrical_axis | diagonal_path"
    composition_rule: "rule_of_thirds | centered_symmetry | golden_ratio | diagonal_tension | leading_lines | frame_within_frame | depth_layering | negative_space"
    frame_orientation: "portrait | landscape | square | panoramic | poster_vertical"
  background_readability:
    role: "minimal | readable_secondary | worldbuilding_support | spectacle_background | product_support | text_safe"
    detail_level: "low | medium | high"
    suppression_needed: []
  negative_space_policy:
    reserve_for: "none | title | cover_lines | body_copy | logo | motion_direction | scale | luxury_breathing_room"
    location: "top | left | right | bottom | around_subject | off_frame_direction | custom"
  depth_strategy:
    foreground: "none | framing_element | action_particles | object_occlusion | typography_frame"
    midground: "primary_subject | product | action_subjects | group_cluster"
    background: "minimal | readable_secondary | worldbuilding | spectacle | abstract"
    focus_mode: "shallow_subject_priority | moderate_readable_background | deep_focus | graphic_flat"
  light_hierarchy:
    key_light_role: "primary_subject | product | face | environment | mood"
    key_light_direction: "front | side | back | top | bottom | diagonal"
    fill_policy: "natural_shadow | soft_fill | no_fill | bounce"
    rim_or_separation: "none | subtle_rim | strong_rim | edge_light"
    practical_motivation: ""
  balance_policy:
    weight_distribution: "centered | left_heavy | right_heavy | top_heavy | bottom_heavy | diagonal | radial"
    counterbalance: []

task_goal_defaults:
  character_portrait:
    composition_goal: "portrait_priority"
    first_read: ["face", "eyes"]
    frame_strategy: "medium close-up or half-body, eye-level or slightly high/low angle based on mood"
    background_role: "readable_secondary"
    crop_policy: "do not cut top of head too tight unless intentional; keep hands readable if visible"
  magazine_cover:
    composition_goal: "publication_layout"
    first_read: ["title or face depending brief", "face", "costume/object markers"]
    frame_strategy: "medium to full-body with cover-safe top and side space"
    background_role: "text_safe"
    crop_policy: "cover-safe crop with title and cover-line zones"
  performance_stage:
    composition_goal: "action_readability"
    first_read: ["performer face", "gesture", "stage light cue"]
    frame_strategy: "wide or medium-wide with stage scale and lead room"
    background_role: "spectacle_background"
    crop_policy: "keep limbs and gesture silhouette readable"
  selfie:
    composition_goal: "viewer_engagement"
    first_read: ["faces", "eyes", "group expression"]
    frame_strategy: "close wide-angle face cluster with controlled edge distortion"
    background_role: "readable_secondary"
    crop_policy: "avoid cutting key faces; foreground arm must not cover faces"
  vehicle_editorial:
    composition_goal: "product_priority"
    first_read: ["vehicle silhouette", "model/driver if present", "brand/design details"]
    frame_strategy: "three-quarter hero or side profile with full wheel visibility"
    background_role: "readable_secondary"
    crop_policy: "do not crop wheels, grille, headlights, or vehicle tail"
  architecture_shot:
    composition_goal: "world_scale"
    first_read: ["architectural geometry", "scale cue", "light path"]
    frame_strategy: "wide or symmetrical composition with level verticals"
    background_role: "worldbuilding_support"
    crop_policy: "preserve structural edges and vertical alignment"

prompt_assembly_hooks:
  phase_1_intent_analysis:
    - "Extract composition_goal, primary_subject, secondary_subjects, desired reading order, action/gaze target, publication/text needs, and crop risks."
  phase_2_enrichment:
    - "Resolve camera relationship and shot scale early (steps 5-6) — gaze, layout, and crop safety depend on them. Resolve background role and negative space in task-dependent order (step 10a/10b). Select visual hierarchy, gaze/action flow, frame strategy, depth, light hierarchy, and visual balance before the camera technical router selects focal length."
  phase_3_5_prompt_package:
    - "Store composition_decision fields so renderers can express them in the final prompt."
  phase_4_self_review:
    - "Reject prompts with unclear first read, missing action target, unsafe crop, no depth plan, or background overpowering the subject."
