version: 1
purpose: "Decide whether motion is frozen, naturally suggested, or intentionally blurred."

shutter_motion_profile:
  fields:
    motion_intent: [freeze_motion, natural_motion, motion_blur, panning, long_exposure, handheld_blur]
    subject_motion: [still, walking, running, jumping, fighting, dancing, vehicle, water, hair_flip]
    blur_target: [none, background, limbs, hair, fabric, water, lights]
    sharpness_priority: [face, body, product, vehicle, action_line]
    motion_readability: [low, medium, high, critical]

presets:
  freeze_motion:
    prompt_effect: "sharp suspended motion, crisp face and body, droplets or particles frozen in midair"
  natural_motion:
    prompt_effect: "subtle movement in hair and fabric while the face remains sharp"
  motion_blur:
    prompt_effect: "controlled directional blur on moving limbs, hair, fabric, or lights with a sharp face"
  panning:
    prompt_effect: "subject or vehicle remains sharp while the background streaks horizontally"
  long_exposure:
    prompt_effect: "stable static subject with flowing background light trails"

decision_rules:
  - "Freeze motion when an action pose, water impact, or sports gesture must be inspected."
  - "For dance or performance, retain face sharpness and permit natural hair or fabric movement."
  - "Use panning for vehicle speed, never for static vehicle editorial."
  - "Do not combine freeze_motion with long-exposure trails on the same moving target."
