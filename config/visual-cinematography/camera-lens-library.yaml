version: 1
purpose: "Lens characteristics, selection strategies, and filter effects for cinematic and commercial photography."

# =============================================================================
# FOCAL LENGTH STRATEGIES — category-level guidance
# =============================================================================
focal_length_strategies:
  ultra_wide_10_14mm:
    description: "Expansive field of view with strong distortion at edges. Exaggerates scale."
    best_for:
      - "dramatic architecture interiors"
      - "creative forced perspective"
      - "immersive environmental context"
      - "car interiors and tight spaces"
    avoid:
      - "portraits (facial distortion)"
      - "natural-looking images"
    prompt_keywords: "ultra wide lens, dramatic perspective, expansive foreground, forced depth"

  wide_16_35mm:
    description: "Moderate wide angle. Retains context while managing distortion."
    best_for:
      - "environmental portraits"
      - "architectural interiors"
      - "establishing shots"
      - "documentary style"
    prompt_keywords: "wide angle lens, environmental context, moderate wide field of view"

  standard_35_50mm:
    description: "Natural perspective closest to human eye. Truthful and unexaggerated."
    best_for:
      - "street and documentary"
      - "full-body to half-body portraits"
      - "tabletop product"
      - "versatile all-purpose"
    prompt_keywords: "standard lens, natural perspective, truthful field of view, human eye equivalent"

  short_tele_85_105mm:
    description: "Flattering compression for portraits. Moderate subject isolation."
    best_for:
      - "portrait headshots and half-body"
      - "beauty and commercial"
      - "product hero shots"
      - "fashion close-ups"
    prompt_keywords: "short telephoto, flattering portrait perspective, natural bokeh, subject isolation"

  medium_tele_135_200mm:
    description: "Strong compression and background separation. Flattens depth planes."
    best_for:
      - "compressed fashion full-body"
      - "candid telephoto"
      - "extreme background separation"
      - "layered depth effect"
    prompt_keywords: "telephoto compression, flat depth planes, extreme background separation, isolated subject"

  super_tele_300_800mm:
    description: "Extreme reach and compression. Stacks distant elements. Very flat perspective."
    best_for:
      - "sports and wildlife"
      - "epic landscape compression"
      - "distant candid"
      - "sun and moon with foreground"
    notes: "Requires tripod or monopod. Subject distance can be 10-100m."
    prompt_keywords: "super telephoto, extreme compression, stacked depth planes, distant subject compression"


# =============================================================================
# LENS EXAMPLES — specific lenses with detailed characteristics
# =============================================================================
lens_examples:
  16mm:
    category: "ultra_wide"
    full_frame_equiv: "16mm"
    aps_c_equiv: "10mm"
    field_of_view_degrees: 107
    compression: "extreme_expansive"
    distortion: "strong_barrel"
    working_distance: "extremely_close_0_2_1m"
    perspective_effect: "Dramatic exaggeration of foreground, vast background feel, strong perspective lines"
    best_for:
      - "dramatic architecture"
      - "interior spaces"
      - "creative forced perspective"
      - "dynamic editorial fashion"
    avoid:
      - "portraits (severe distortion)"
      - "natural-looking images"
    prompt_keywords: "16mm ultra wide lens, dramatic forced perspective, expansive view, strong distortion"
    notes: "Use with caution. Foreground subjects will be strongly distorted. Excellent for creative effect."

  24mm:
    category: "wide_angle"
    full_frame_equiv: "24mm"
    aps_c_equiv: "16mm"
    field_of_view_degrees: 84
    compression: "low_expansive"
    distortion: "noticeable_barrel"
    working_distance: "close_1_2m"
    perspective_effect: "exaggerates foreground, makes backgrounds feel farther"
    best_for:
      - "architecture interiors"
      - "environmental portraits with context"
      - "wide establishing shots"
      - "real estate photography"
      - "car interiors"
    avoid:
      - "close-up portraits (distorts face)"
      - "product detail shots"
    prompt_keywords: "24mm wide angle lens, expansive wide view, environmental context, slight wide distortion"
    cinematic_use: "Establishes location. Used for master shots. Creates dynamic foreground/background relationship."

  35mm:
    category: "wide_to_normal"
    full_frame_equiv: "35mm"
    aps_c_equiv: "23mm"
    field_of_view_degrees: 63
    compression: "slight_expansive"
    distortion: "minimal_natural"
    working_distance: "moderate_1_3m"
    perspective_effect: "natural with slight environment inclusion, close to human peripheral vision"
    best_for:
      - "environmental portraits"
      - "documentary style"
      - "editorial with context"
      - "full-body fashion"
    avoid:
      - "tight headshots"
    prompt_keywords: "35mm lens, natural perspective with environment, documentary look, slight wide context"
    cinematic_use: "The 'master lens' for many filmmakers. Captures context while keeping natural proportions."

  50mm:
    category: "standard"
    full_frame_equiv: "50mm"
    aps_c_equiv: "35mm"
    field_of_view_degrees: 47
    compression: "neutral"
    distortion: "minimal"
    working_distance: "moderate_1_4m"
    perspective_effect: "Matches human monocular vision. Most natural perspective."
    best_for:
      - "portrait full to half body"
      - "street and documentary"
      - "product on tabletop"
      - "versatile all-purpose"
    avoid:
      - "extreme wide shots"
      - "extreme close-ups"
    prompt_keywords: "50mm standard lens, natural perspective, neutral field of view, true to human vision"
    cinematic_use: "The most truthful lens. No exaggeration. Used when you want the audience to feel present."

  85mm:
    category: "short_telephoto"
    full_frame_equiv: "85mm"
    aps_c_equiv: "56mm"
    field_of_view_degrees: 28
    compression: "moderate"
    distortion: "negligible"
    working_distance: "moderate_far_1_5_3m"
    perspective_effect: "Flattering face proportions, slight background compression, natural bokeh"
    best_for:
      - "portrait headshots and half-body"
      - "beauty and commercial"
      - "product hero shots"
      - "fashion close-ups"
    avoid:
      - "full-body (needs too much distance)"
      - "tight interior spaces"
    prompt_keywords: "85mm portrait lens, flattering face perspective, natural bokeh, short telephoto"
    cinematic_use: "The standard portrait lens. Creates intimate but not intrusive framing. Ideal for dialogue scenes."

  100mm_macro:
    category: "telephoto_macro"
    full_frame_equiv: "100mm"
    aps_c_equiv: "65mm"
    field_of_view_degrees: 24
    compression: "moderate_to_strong"
    distortion: "negligible"
    working_distance: "far_2_5m_plus_macro"
    perspective_effect: "Flat face compression, excellent for macro detail, isolates subject strongly"
    best_for:
      - "product detail macro shots"
      - "beauty close-ups (eyes, lips, texture)"
      - "jewelry photography"
      - "food texture close-ups"
