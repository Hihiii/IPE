lens_quality_rubric:
  scoring_dimensions:
    perspective_coherence:
      excellent: "One clear lens behavior supports the task without mixed perspective cues."
      poor: "Wide-angle, telephoto, macro, and fisheye cues compete in the same prompt."
    subject_protection:
      excellent: "Faces, products, buildings, and UI remain proportionally accurate and readable."
      poor: "Lens effect damages the primary subject or required details."
    depth_control:
      excellent: "Depth of field supports visual hierarchy and keeps hero details sharp."
      poor: "Blur is decorative and hides important information."
    task_fit:
      excellent: "Lens behavior is selected from subject type and use case."
      poor: "Lens terms are added randomly because they sound professional."

prompt_assembly_hooks:
  phase_2_generator_translation:
    add_fields:
      - "visible_lens_effect"
      - "visible_depth_effect"
      - "lens_model_risk"
      - "lens_corrective_terms"
  phase_3_5_prompt_package:
    map_to:
      style_and_lighting.lens: "Use visible_lens_effect + visible_depth_effect, not only focal length."
      constraints.no_extra_elements: "Add lens-specific negative guardrails only when risk is high."
  phase_4_self_review:
    checklist:
      - "Does the final prompt contain conflicting lens cues?"
      - "Does the selected depth of field preserve the hero element?"
      - "Are human faces protected from wide-angle distortion?"
      - "Are architecture verticals protected if wide lens is used?"
      - "Are product labels sharp and geometrically accurate?"

lens_selection_logic:
  purpose: "Route focal length by composition goal, room context, subject scale, action, and distortion risk."
  if_room_context_is_important:
    prefer: ["35mm", "50mm"]
    reason: "keeps subject natural while preserving environment readability"
  if_hero_portrait:
    prefer: ["50mm", "85mm", "105mm"]
    reason: "keeps facial proportions flattering and background controlled"
  if_large_scale_architecture_or_mecha:
    prefer: ["24mm", "28mm", "35mm"]
    reason: "shows scale and foreground/background relationship"
  if_full_body_reclining_pose:
    avoid_extreme_wide_close_distance: true
    prefer: ["35mm", "50mm", "70mm"]
    reason: "reduces stretched limbs and pelvis/leg distortion"
  if_group_selfie:
    prefer: ["24mm", "28mm", "35mm"]
    guardrail: "controlled edge distortion; all faces remain readable"
  if_sports_action:
    prefer: ["24mm", "35mm", "70-200mm depending distance"]
    reason: "wide for immersive court action, telephoto for compressed sports coverage"
  if_product_macro_or_detail:
    prefer: ["85mm", "100mm macro", "105mm"]
    reason: "clean geometry, label readability, detail isolation"

focal_length_prompt_routing:
