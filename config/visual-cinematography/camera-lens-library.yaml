      - "environmental shots"
      - "group portraits"
    prompt_keywords: "100mm macro lens, flat compression, extreme detail capture, product macro close-up"
    notes: "Also functions as macro lens. Working distance for 1:1 macro is ~30cm."

  105mm_f1_4:
    category: "short_telephoto"
    full_frame_equiv: "105mm"
    aps_c_equiv: "70mm"
    field_of_view_degrees: 23
    compression: "moderate_to_strong"
    distortion: "negligible"
    working_distance: "far_2_6m"
    perspective_effect: "Flattering face proportions with stronger compression than 85mm. Creamy bokeh wide open."
    best_for:
      - "beauty extreme close-ups"
      - "portrait with extreme background separation"
      - "editorial with bokeh emphasis"
      - "low-light portrait"
    avoid:
      - "group shots"
      - "environmental context"
    prompt_keywords: "105mm f1.4 lens, creamy bokeh, extreme background separation, dreamy portrait lens"

  135mm:
    category: "telephoto"
    full_frame_equiv: "135mm"
    aps_c_equiv: "90mm"
    field_of_view_degrees: 18
    compression: "strong"
    distortion: "none"
    working_distance: "far_3_8m"
    perspective_effect: "Strong background compression, very flattering facial proportions, isolates subject"
    best_for:
      - "compressed portraits"
      - "fashion full-body with compression"
      - "candid and street tele"
      - "headshots with extreme background separation"
    avoid:
      - "environmental context needed"
      - "indoor tight spaces"
    prompt_keywords: "135mm telephoto lens, strong background compression, isolated subject, flat perspective"
    cinematic_use: "Used for intimate close-ups without being physically close. Creates voyeuristic feel."

  200mm:
    category: "super_telephoto"
    full_frame_equiv: "200mm"
    aps_c_equiv: "135mm"
    field_of_view_degrees: 12
    compression: "extreme"
    distortion: "none"
    working_distance: "very_far_5_15m"
    perspective_effect: "Extreme compression, flattens depth dramatically, stacks background and subject"
    best_for:
      - "compressed fashion full-body"
      - "sports and wildlife style"
      - "extreme subject isolation"
      - "layered depth effect"
    avoid:
      - "any context or environment shots"
      - "close interaction feel"
    prompt_keywords: "200mm telephoto lens, extreme compression, flat depth layers, isolated subject against background"
    cinematic_use: "Creates the 'spy glass' look. Stacks image planes. Used for epic landscape compression or intimate distance."

  200mm_f2:
    category: "super_telephoto"
    full_frame_equiv: "200mm"
    aps_c_equiv: "135mm"
    field_of_view_degrees: 12
    compression: "extreme"
    distortion: "none"
    working_distance: "very_far_5_15m"
    perspective_effect: "Extreme compression with massive light gathering. Creamy bokeh at f/2. Separates subject from background completely."
    best_for:
      - "high-end fashion full-body compression"
      - "editorial with extreme bokeh"
      - "low-telephoto action"
    notes: "Very heavy lens (3kg+). Requires monopod or tripod."
    prompt_keywords: "200mm f2 telephoto, fast telephoto, extreme bokeh, compressed fashion, cream machine"

  300mm_f2_8:
    category: "super_telephoto"
    full_frame_equiv: "300mm"
    aps_c_equiv: "200mm"
    field_of_view_degrees: 8
    compression: "extreme"
    distortion: "none"
    working_distance: "very_far_10_30m"
    perspective_effect: "Extreme compression and reach. Isolates subject from very far distance."
    best_for:
      - "sports and wildlife"
      - "compressed landscape"
      - "long-distance candid"
      - "press and events"
    notes: "Pro-level sports lens. Often used with 1.4x or 2x teleconverter."
    prompt_keywords: "300mm f2.8 super telephoto, extreme reach, sports lens, compressed long distance"

  35mm_anamorphic:
    category: "specialty_anamorphic"
    full_frame_equiv: "35mm_squeeze"
    field_of_view_degrees: 64_horizontal_squeezed
    compression: "anamorphic_squeeze"
    distortion: "anamorphic_lens_character"
    working_distance: "moderate"
    perspective_effect: "2x horizontal squeeze, oval bokeh, horizontal flare lines, cinematic letterbox feel"
    best_for:
      - "cinematic feature film look"
      - "high-end commercial"
      - "period drama"
      - "epic landscape and fashion"
    avoid:
      - "clinical clean look"
      - "social media square format"
    prompt_keywords: "anamorphic lens, 2x squeeze, oval bokeh, blue horizontal flare, cinematic widescreen"
    notes: "Desqueezed to 2.39:1 or 2.35:1 aspect ratio. Oval bokeh and flare lines are signature characteristics."

  24mm_tilt_shift:
    category: "specialty_perspective_control"
    full_frame_equiv: "24mm"
    field_of_view_degrees: 84
    compression: "perspective_controllable"
    distortion: "correctable_via_shift"
    perspective_effect: "Shift corrects converging verticals. Tilt rotates plane of focus for miniature effect."
    best_for:
      - "architecture (correct converging verticals)"
      - "product tabletop (extend depth of field)"
      - "miniature effect landscape"
      - "creative focus plane manipulation"
    prompt_keywords: "tilt shift lens, perspective control, corrected verticals, selective focus plane, miniature effect"
    notes: "Manual focus only. Shift moves lens parallel to sensor. Tilt rotates lens relative to sensor."

  15mm_fisheye:
    category: "specialty_fisheye"
    full_frame_equiv: "15mm"
    field_of_view_degrees: 180
    compression: "severe_curvilinear"
    distortion: "extreme_fisheye_bowl"
    perspective_effect: "180-degree field of view. Straight lines become curved. Extreme spherical distortion."
    best_for:
      - "creative extreme wide effect"
      - "immersive interior spheres"
      - "skate and action sport"
      - "artistic distortion"
    avoid:
      - "natural-looking images"
      - "commercial product"
    prompt_keywords: "fisheye lens, 180 degree field of view, extreme barrel distortion, circular wide effect"
    notes: "Full-frame fisheye produces circular image. Diagonal fisheye fills the frame."


# =============================================================================
# LENS FILTERS — effects on final image
# =============================================================================
lens_filters:
  circular_polarizer_cpl:
    description: "Rotating filter that blocks polarized light. Reduces reflections and enhances saturation."
    effect_on_image:
      - "removes reflections from water and glass"
      - "deepens blue sky contrast"
      - "reduces haze"
      - "saturates foliage greens"
    light_loss_stops: 1.5
    prompt_keywords: "circular polarizer, polarized light removal, deep blue sky, reflection elimination"
    notes: "Rotate to adjust effect. Most effective at 90 degrees to sun. Cannot be fixed in post."

  nd_filter_3_stop:
    description: "Neutral density filter reducing light by 3 stops. Mild light reduction."
    use_case: "Shallow depth of field in bright conditions. Portrait at f/1.4 in sunlight."
    light_loss_stops: 3
    prompt_keywords: "ND filter 3 stop, mild neutral density, shallow depth of field in sunlight"

  nd_filter_6_stop:
    description: "Neutral density filter reducing light by 6 stops. Moderate light reduction."
    use_case: "Motion blur in daylight. Water smooth at 1/4 second. Crowd removal."
    light_loss_stops: 6
    prompt_keywords: "ND filter 6 stop, moderate neutral density, motion blur daylight, smooth water"

  nd_filter_10_stop:
    description: "Neutral density filter reducing light by 10 stops. Extreme light reduction."
    use_case: "Long exposure daytime. 30-second exposures in daylight for ghostly effects."
    light_loss_stops: 10
    prompt_keywords: "ND filter 10 stop, extreme neutral density, long exposure daytime, ghostly motion blur"
    notes: "Requires tripod and remote shutter. Focus before attaching filter (viewfinder goes black)."

  variable_nd:
    description: "Adjustable neutral density filter. Rotate to change density continuously."
    use_case: "Video where changing light conditions require quick ND adjustment."
    light_loss_range: "2_to_8_stops"
    prompt_keywords: "variable ND filter, adjustable neutral density, variable light reduction"
    notes: "Quality varies significantly. Cheap variable ND creates X-shaped cross-polarization artifacts."

  graduated_nd_soft:
    description: "Partial ND filter that transitions from dark to clear. Soft edge transition."
    use_case: "Landscape with bright sky and dark foreground. Balances exposure across scene."
    light_loss_stops: "1_to_3"
    prompt_keywords: "graduated ND filter, soft edge ND grad, sky foreground balance, landscape exposure balancing"
    notes: "Soft edge suits uneven horizons (mountains, trees). Hard edge for flat horizons (sea, plains)."

  black_pro_mist_1_4:
    description: "Diffusion filter that reduces sharpness and blooms highlights. No color shift."
    effect_on_image:
      - "reduces perceived sharpness"
      - "blooms highlights gently"
      - "softens skin texture"
      - "reduces contrast in highlights"
    prompt_keywords: "black pro mist filter, highlight bloom, soft diffusion, cinematic softening, skin texture reduction"
    notes: "The 1/4 strength is the most popular for cinematic use. Creates dreamy but not blurry image. Also available in 1/8, 1/2, 1, 2, 5 strengths."

  diffusion_glimmerglass:
    description: "Diffusion filter that adds subtle halation around highlights while retaining sharpness."
    effect_on_image:
      - "adds subtle glow to highlights"
      - "retains core sharpness"
      - "reduces digital clinical look"
    prompt_keywords: "glimmerglass diffusion filter, subtle highlight glow, organic softening, filmic diffusion"
    notes: "Subtler than black pro mist. Retains more sharpness. Good for commercial work needing filmic look without losing detail."

  close_up_diopter:
    description: "Filter-lens that allows closer focusing. Converts normal lens into macro."
    strengths_available: "+1, +2, +3, +4, +5, +10"
    use_case: "Quick macro capability without dedicated macro lens."
    prompt_keywords: "close up diopter filter, macro conversion, extreme close focus, diopter lens attachment"

  anamorphic_adapter:
    description: "Front-mounted adapter that squeezes the image horizontally for an anamorphic look."
    effect_on_image:
      - "oval bokeh"
      - "horizontal flare lines"
      - "2x squeeze (desqueeze in post)"
    prompt_keywords: "anamorphic adapter, squeeze lens, oval bokeh, horizontal flare, anamorphic character"


# =============================================================================
# LENS FILTERS EXPANSION — specialty character filters
# =============================================================================
lens_filters_expansion:
  streak_filter_blue_orange:
    description: "拉絲/條紋濾鏡。在圓形球面鏡頭前強行製造出類似 Anamorphic（變形鏡頭）的水平線條高光拉絲。"
    effect_on_image: "將點光源（如車燈、路燈）轉化為向兩側延伸的科幻藍色或溫暖橙色水平光芒。"
    best_for: "Cyberpunk nightscapes, sci-fi cinematography, fake anamorphic flares"
    prompt_keywords: "horizontal blue streak flare, anamorphic flare simulator, sci-fi night anamorphic streak"

  hollywood_black_magic:
    description: "結合了 Black Pro Mist 的柔化與剪刀差擴散（1/4 BPM + HD Classic Soft）。"
    effect_on_image: "在保持眼睛、睫毛絕對銳利的同時，讓面部皮膚如同抹了豬油般順滑，高光處有非常優雅的擴散，但暗部（Black crush）依然扎實。"
    best_for: "High-end commercial beauty, luxury car interiors with specular highlights"
    prompt_keywords: "hollywood black magic filter glow, sharp core with bloomed skin tones, premium commercial diffusion"


# =============================================================================
# LENS ACCESSORIES — focal length extenders and adapters
# =============================================================================
lens_accessories:
  teleconverter_1_4x:
    description: "Rear-mounted lens extender. Multiplies focal length by 1.4x. Loses 1 stop of light."
    effect: "200mm becomes 280mm. f/2.8 becomes f/4."
    quality_impact: "Slight loss of sharpness and contrast. Best on prime lenses."
    prompt_keywords: "1.4x teleconverter, focal length extender, reach multiplier"

  teleconverter_2x:
    description: "Rear-mounted lens extender. Multiplies focal length by 2x. Loses 2 stops of light."
    effect: "200mm becomes 400mm. f/2.8 becomes f/5.6."
    quality_impact: "Moderate loss of sharpness and contrast. Autofocus may be slower."
    prompt_keywords: "2x teleconverter, extreme focal length extender, reach doubler"

  extension_tubes:
    description: "Hollow tubes between camera and lens. Allows closer focusing. No optics inside = no light loss."
    effect: "Reduces minimum focus distance. Turns any lens into macro."
    prompt_keywords: "extension tubes, macro extension, reduced minimum focus distance, close focus adapter"
    notes: "No image quality loss (no glass). More extension = closer focus = less working distance."

  speed_booster_focal_reducer:
    description: "Adapter for using full-frame lenses on APS-C cameras. Concentrates light into smaller sensor area."
    effect: "Wider field of view (recovers crop factor). Gains 1 stop of light. Center light concentration."
    prompt_keywords: "speed booster, focal reducer, APS-C wide adapter, light concentrator"


