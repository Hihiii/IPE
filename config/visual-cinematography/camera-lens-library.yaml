subject_specific_lens_guardrails:
  human_faces:
    risks:
      - "wide-angle close-up enlarges nose, forehead, hands, or feet"
      - "ultra-shallow depth may blur second eye or lips"
    add_positive:
      - "natural facial proportions"
      - "face kept away from frame edges"
      - "sharp eyes with believable depth falloff"
    add_negative:
      - "distorted face"
      - "oversized nose"
      - "warped hands near camera"

  full_body_human:
    risks:
      - "wide lens can stretch legs or feet if subject touches frame edge"
      - "telephoto compression may crop feet if framing is not explicit"
    add_positive:
      - "entire figure visible from head to toe"
      - "feet fully inside frame with ground contact visible"
      - "natural limb proportions"
    add_negative:
      - "cropped feet"
      - "stretched limbs"
      - "distorted body proportions"

  architecture:
    risks:
      - "wide lenses may produce fisheye walls or leaning verticals"
      - "dramatic perspective may break structural realism"
    add_positive:
      - "straight vertical lines"
      - "controlled architectural perspective"
      - "consistent facade grid"
      - "realistic room scale"
    add_negative:
      - "fisheye distortion"
      - "warped windows"
      - "leaning walls"
      - "impossible geometry"

  product_packaging:
    risks:
      - "wide lenses distort rectangular packages and labels"
      - "shallow depth of field can hide label text"
    add_positive:
      - "accurate product geometry"
      - "front label faces camera and remains sharp"
      - "edges remain straight"
    add_negative:
      - "warped label"
      - "curved packaging unless specified"
      - "unreadable text"

  game_screen_or_ui:
    risks:
      - "photographic lens effects can reduce readability"
      - "bokeh or dramatic perspective can hide interactive elements"
    add_positive:
      - "deep-focus readable layout"
      - "orthographic or clean isometric perspective"
      - "large clear interactive objects"
    add_negative:
      - "cinematic blur hiding UI"
      - "fisheye game screen"

lens_failure_taxonomy:
  wide_angle_face_distortion:
    symptoms:
      - "large nose or forehead"
      - "hands or feet appear oversized"
      - "face stretched near frame edge"
    likely_causes:
      - "ultra-wide or wide lens used for close-up portrait"
      - "subject placed too close to camera"
    fix:
      - "switch to short telephoto portrait compression"
      - "keep face centered and away from edges"
      - "describe natural facial proportions"
    add_positive:
      - "flattering portrait compression"
      - "natural facial proportions"
    add_negative:
      - "wide-angle facial distortion"
      - "oversized facial features"

  architecture_fisheye_warp:
    symptoms:
      - "curved walls"
      - "leaning vertical lines"
      - "warped windows or ceiling"
    likely_causes:
      - "ultra-wide lens without perspective correction"
      - "fisheye terms accidentally included"
    fix:
      - "use controlled wide-angle or tilt-shift language"
      - "add straight verticals and coherent perspective"
    add_positive:
      - "straight vertical lines"
      - "tilt-shift architectural perspective"
    add_negative:
      - "fisheye distortion"
      - "curved walls"

  overblurred_hero_detail:
    symptoms:
      - "product label unreadable"
      - "both eyes not sharp"
      - "outfit detail disappears"
    likely_causes:
      - "aperture too shallow for subject complexity"
      - "bokeh terms overused"
    fix:
      - "switch to balanced depth of field"
      - "lock hero element sharpness"
    add_positive:
      - "hero detail remains crisp"
      - "balanced depth of field"
    add_negative:
      - "blurred label"
      - "overly shallow focus"

  flat_no_lens_character:
    symptoms:
      - "image looks generic"
      - "no spatial perspective"
      - "subject lacks separation"
    likely_causes:
      - "lens behavior unspecified"
      - "composition and depth cues missing"
    fix:
      - "add visible perspective behavior, depth layering, and focus hierarchy"
    add_positive:
      - "clear foreground-midground-background separation"
      - "visible lens perspective"

  conflicting_lens_cues:
    symptoms:
      - "image feels visually incoherent"
      - "wide foreground and telephoto background compression appear mixed unnaturally"
    likely_causes:
      - "prompt contains both ultra-wide perspective and telephoto compression"
      - "multiple lens examples stacked without selection"
    fix:
      - "choose one dominant lens behavior based on task"
    add_positive:
      - "single coherent lens perspective"
    add_negative:
      - "mixed conflicting lens effects"

lens_conflict_resolution:
  purpose: "Resolve incompatible lens, depth, and perspective instructions before final prompt assembly."
  rules:
    wide_vs_telephoto:
      conflict: "ultra-wide perspective and telephoto compression both requested"
      resolution: "Choose based on subject goal: environment/context uses wide; flattering portrait or compressed fashion uses telephoto. Do not keep both as equal-weight lens cues."
      final_prompt_pattern: "[chosen lens-visible effect], no conflicting perspective"

    shallow_dof_vs_readability:
      conflict: "strong bokeh requested but product label, UI, full outfit, or hidden objects must remain readable"
      resolution: "Use balanced or deep focus. Keep background separation only where it does not hide required information."
      final_prompt_pattern: "balanced depth of field, hero detail sharp, background gently separated"

    dramatic_wide_vs_architecture_accuracy:
      conflict: "dramatic wide angle requested but architecture must be accurate"
      resolution: "Use controlled wide-angle or tilt-shift style, not fisheye. Preserve straight verticals."
      final_prompt_pattern: "wide architectural view with straight vertical lines and controlled perspective"

    macro_detail_vs_context:
      conflict: "extreme macro requested but environment storytelling matters"
      resolution: "Use probe-lens or close foreground detail with readable contextual background, not pure abstract macro."
      final_prompt_pattern: "macro foreground detail with surrounding environment still visible"

    realism_vs_stylized_lens:
      conflict: "photorealistic realism with extreme stylized lens effects"
      resolution: "Keep lens effects physically plausible unless the user explicitly requests surrealism."
      final_prompt_pattern: "realistic lens rendering with subtle cinematic character"

lens_compression_rules:
  purpose: "Compress repeated lens and depth language for Phase 4.5 final prompt."
  semantic_clusters:
    portrait_compression_cluster:
      redundant_terms:
        - "85mm"
        - "105mm"
        - "short telephoto"
        - "portrait lens"
        - "flattering compression"
        - "subject isolation"
      compressed_as: "flattering short-telephoto portrait compression"

    wide_environment_cluster:
      redundant_terms:
        - "wide angle"
        - "environmental context"
        - "expansive view"
        - "room visible"
        - "spatial depth"
      compressed_as: "wide environmental perspective"

    architecture_control_cluster:
      redundant_terms:
        - "tilt-shift"
        - "straight verticals"
        - "controlled perspective"
        - "architectural correction"
      compressed_as: "controlled architectural perspective with straight verticals"

    shallow_depth_cluster:
      redundant_terms:
        - "shallow depth of field"
        - "soft bokeh"
        - "background blur"
        - "subject separation"
      compressed_as: "shallow depth with soft background separation"

    deep_focus_cluster:
      redundant_terms:
        - "deep focus"
        - "sharp foreground"
        - "sharp background"
        - "everything readable"
      compressed_as: "deep-focus clarity across the scene"

  remove_first:
    - "multiple focal lengths listed without choosing one"
    - "brand/model lens names unless user asked for a specific lens look"
    - "technical aperture values when visible depth is already described"
    - "redundant bokeh adjectives"

model_output_mode_lens_style:
  chatgpt_image:
    preferred_language: "natural language describing visible perspective and depth"
    example: "flattering portrait compression with sharp eyes and soft background separation"
    avoid:
      - "long comma-only lens keyword chains"
