# =============================================================================
# CINEMA OPTICAL CHARACTERISTICS — beyond focal length & aperture
# =============================================================================
# These characteristics separate cinema lenses from still photography lenses.
# They affect how the image feels during motion, not just at a single frame.
# =============================================================================
cinema_optical_characteristics:
  lens_breathing:
    characteristic: "鏡頭呼吸效應 (Lens Breathing)"
    description: "在切換對焦點（Rack Focus）時，畫面邊緣因光學結構移動而產生類似變焦（Zoom）的視角縮放現象。"
    cinematic_importance: "電影鏡頭（Cine Lenses）極度追求『零呼吸效應』，以確保觀眾的注意力完全留在演員角色的情緒轉變上，而不是被忽大忽小的畫面邊緣分心。"
    prompt_keywords: "zero lens breathing, stable rack focus, optical cinematic focus pull, premium cinema prime"

  t_stop_vs_f_stop:
    characteristic: "光傳導率 T-Stop (Transmission Stop)"
    description: "F-stop 是幾何光圈（焦距/孔徑），而 T-stop 是扣除鏡片玻璃反射、吸收損耗後，實際到達感光元件的真實光量。"
    cinematic_importance: "電影拍攝更換鏡頭時，必須依據 T-stop 確保曝光完全一致。高階變焦鏡（如 Angénieux）即便 F-stop 標示 f/2.8，其 T-stop 可能是 T3.0。"
    prompt_keywords: "calibrated T-stop exposure, consistent cinema light transmission"

  parfocal_vs_varifocal:
    characteristic: "同焦 (Parfocal) 與 變焦 (Varifocal)"
    description: "同焦鏡頭在改變焦距（Zoom in/out）時，對焦點會絕對鎖定不變；變焦鏡頭則會在變焦時失焦，必須重新對焦。"
    cinematic_importance: "商業與紀錄片中的動態推拉推焦（Zoom-and-Focus）必須依賴 Parfocal 設計。"
    prompt_keywords: "true parfocal zoom, continuous focal locking, snap zoom cinematography"


# =============================================================================
# LENS EXAMPLES EXPANSION — specialty character lenses
# =============================================================================
lens_examples_expansion:
  24mm_probe_lens:
    category: "specialty_macro_probe"
    full_frame_equiv: "24mm"
    field_of_view_degrees: 84
    aperture_range: "f/14 - f/40 (Requires extreme lighting)"
    compression: "expansive_macro"
    working_distance: "20mm_from_front_element (Bug-eye perspective)"
    perspective_effect: "極致的『蟲眼視角』。擁有微距鏡頭的超近對焦能力，同時保有廣角鏡頭的宏大背景空間感。"
    best_for:
      - "food_commercial_interior (穿梭於漢堡、飲料冰塊縫隙)"
      - "tabletop_tech_hero (穿梭於伺服器主機板、晶片電路)"
      - "miniature_architecture_walkthrough (模型建築內部透視)"
    prompt_keywords: "24mm probe lens, laowa probe perspective, bug-eye macro view, sliding through tight spaces, internal component macro photography"
    notes: "前段為細長防水槍管設計。因為進光量極小（f/14起跳），實戰中必須搭配極高功率的 LED 條燈或高感光度。"

  vintage_rehoused_cine:
    category: "specialty_character_lens"
    typical_focal_lengths: "35mm, 50mm, 58mm (e.g., Helios 44-2, Canon K35)"
    compression: "organic_classic"
    distortion: "swirly_bokeh_and_edge_falloff"
    perspective_effect: "帶有強烈個性的老鏡靈魂。邊緣失光（Vignetting）、旋渦狀焦外（Swirly Bokeh）、迷人的色散與低對比度。"
    best_for:
      - "period_drama (時代劇/復古電影)"
      - "dreamy_fashion_editorial (夢幻時尚大片)"
      - "breaking_digital_clinical_look (消除數位感，增加生動故事感)"
    prompt_keywords: "vintage rehoused cinema lens, helios 44-2 swirly bokeh, organic flares, vintage canon k35 rendering, soft contrast filmic texture"
    notes: "現代電影（如《沙丘》、《蝙蝠俠》）大量使用改裝老鏡（Rehousing），利用物理瑕疵來打破現代數位感光元件過於銳利、呆板的『塑膠感』。"

# =============================================================================
# AUTOREVISE EXTENSION — generator-visible lens translation and decision support
# =============================================================================
# These sections convert cinematographer lens knowledge into image-model-visible
# language. The human technical layer may keep focal length, aperture, and optical
# vocabulary; the final prompt should emphasize visible perspective, distortion,
# scale, subject separation, and focus hierarchy.
# =============================================================================

generator_visible_lens_translation:
  purpose: "Translate focal length, aperture, lens character, and optical strategy into visible image effects that generators can render."
  global_rules:
    - "Use focal length only when it helps lock composition or perspective; otherwise describe the visible effect."
    - "Do not stack multiple incompatible lens cues in one final prompt, such as ultra-wide perspective plus telephoto compression."
    - "For human subjects, protect facial proportions before applying dramatic lens effects."
    - "For architecture, prioritize straight verticals and coherent perspective before dramatic wide-angle impact."
    - "For product images, prioritize accurate shape and label legibility before shallow depth of field."

  focal_length_to_visible_effect:
    ultra_wide_10_14mm:
      human_reference: "10-14mm ultra-wide"
      generator_prompt: "expansive ultra-wide perspective, exaggerated foreground scale, deep spatial depth, strong converging lines"
      visible_effects:
        - "foreground appears larger and more dramatic"
        - "background feels vast and immersive"
        - "edge distortion risk is visible near frame borders"
      best_for:
        - "dramatic architecture interior"
        - "tight-space environmental scene"
        - "surreal forced perspective"
      corrective_terms:
        - "important faces away from frame edges"
        - "natural anatomy despite wide perspective"
        - "straight verticals for architecture"
      avoid_in_final_prompt_when_not_needed:
        - "fisheye"
        - "extreme distortion"

    wide_16_35mm:
      human_reference: "16-35mm wide-angle"
      generator_prompt: "wide environmental framing with clear subject context, moderate perspective depth, room visible around the subject"
      visible_effects:
        - "subject and environment both readable"
        - "space feels open without becoming surreal"
        - "mild foreground emphasis"
      best_for:
        - "environmental portrait"
        - "interior design"
        - "street documentary"
        - "establishing shot"
      corrective_terms:
        - "face not distorted"
        - "hands and feet natural size"
        - "vertical lines remain straight"

    standard_35_50mm:
      human_reference: "35-50mm standard perspective"
      generator_prompt: "natural human-eye perspective, balanced proportions, believable spatial depth"
      visible_effects:
        - "minimal distortion"
        - "subject proportions look truthful"
        - "environment feels natural rather than compressed or exaggerated"
      best_for:
        - "lifestyle portrait"
        - "full-body fashion"
        - "documentary scene"
        - "educational game illustration with natural camera feel"
      corrective_terms:
        - "natural proportions"
        - "truthful perspective"

    short_tele_85_105mm:
      human_reference: "85-105mm short telephoto"
      generator_prompt: "flattering portrait compression, softly separated background, natural face proportions, subject isolated from the environment"
      visible_effects:
        - "face and body proportions look elegant"
        - "background appears closer and softly blurred"
        - "subject becomes the clear focal point"
      best_for:
        - "beauty portrait"
        - "fashion editorial portrait"
        - "commercial product hero"
        - "cosplay editorial"
      corrective_terms:
        - "sharp eyes"
        - "natural facial structure"
        - "background separation without losing outfit detail"

    medium_tele_135_200mm:
      human_reference: "135-200mm medium telephoto"
      generator_prompt: "strong telephoto compression, flattened background layers, elegant subject isolation, compressed fashion look"
      visible_effects:
        - "background elements stack closer behind the subject"
        - "depth planes feel flattened and graphic"
        - "subject outline is strongly separated"
      best_for:
        - "runway or editorial fashion"
        - "sports sidelines"
        - "compressed city backdrop"
        - "wildlife portrait"
      corrective_terms:
        - "full subject remains in frame"
        - "background compressed but not pasted on"
        - "clear silhouette"

    super_tele_300_800mm:
      human_reference: "300-800mm super telephoto"
      generator_prompt: "extreme distant compression, stacked background layers, isolated subject with compressed atmosphere"
      visible_effects:
        - "distant elements appear huge behind the subject"
        - "space feels flattened and monumental"
        - "atmospheric haze becomes visible between layers"
      best_for:
        - "sports action"
        - "wildlife"
        - "sun or moon compression behind architecture"
        - "distant candid scene"
      corrective_terms:
        - "distant subject remains sharp"
        - "background layers remain believable"
        - "no miniature look unless specified"

  aperture_to_visible_depth:
    f_1_2_to_f_1_4:
      human_reference: "f/1.2-f/1.4"
      generator_prompt: "extremely shallow depth of field, razor-sharp focus on the eyes or hero detail, creamy background melt"
      visible_effects:
        - "only one narrow focus plane is crisp"
        - "background becomes abstract bokeh"
        - "dreamy separation"
      risks:
        - "important outfit or product label may become unreadable"
        - "second eye may appear soft in close-up"
      corrective_terms:
        - "both eyes sharp if face is frontal"
        - "hero detail remains crisp"

    f_1_8_to_f_2_8:
      human_reference: "f/1.8-f/2.8"
      generator_prompt: "shallow depth of field with strong subject separation, face or product crisp, background softly blurred"
      visible_effects:
        - "professional portrait separation"
        - "usable facial detail"
        - "soft bokeh without losing subject clarity"
      best_for:
        - "portrait"
        - "fashion editorial"
        - "cinematic close-up"

    f_4_to_f_5_6:
      human_reference: "f/4-f/5.6"
      generator_prompt: "balanced depth of field, subject fully sharp with gentle background falloff"
      visible_effects:
        - "entire face or product is readable"
        - "outfit and important props remain clear"
        - "background still separates slightly"
      best_for:
        - "fashion three-quarter body"
        - "product hero"
        - "group portrait"

    f_8_to_f_11:
      human_reference: "f/8-f/11"
      generator_prompt: "deep focus, architecture and spatial layers remain sharp, strong clarity across the frame"
      visible_effects:
        - "foreground and background readable"
        - "structural details remain clear"
        - "less dreamy blur, more design accuracy"
      best_for:
        - "architecture"
        - "interior design"
        - "hidden object scene"
        - "educational game scene"

    f_14_to_f_40:
      human_reference: "f/14-f/40"
      generator_prompt: "macro probe deep-focus look, tiny foreground detail and environment both visible, clinical miniature clarity"
      visible_effects:
        - "close object and surrounding environment share readable focus"
        - "bug-eye macro scale"
      best_for:
        - "probe lens food shot"
        - "miniature walkthrough"
        - "technical internal component shot"

