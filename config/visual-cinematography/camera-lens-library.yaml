fashion_lens_premium_strategy:
  purpose: "Select lens behavior based on fashion tier, premium feel type, garment focus, and working distance psychology."
  usage: "After task_profile and mood are selected, use this strategy to pick the lens behavior that maximizes premium fashion feel."

  premium_feel_lens_mapping:
    intimate_luxury:
      description: "Close, personal, exclusive feel. Subject fills the frame. Viewer feels invited into a private editorial moment."
      lens: "85-105mm short telephoto"
      aperture: "f/1.4-f/2"
      working_distance: "1.5-3m"
      compression: "moderate — flattering face proportions, soft background separation"
      perspective_effect: "subject dominates frame, environment barely visible, intimate proximity"
      best_for:
        - luxury_beauty_editorial
        - premium_portrait
