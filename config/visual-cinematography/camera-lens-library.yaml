  lens_character_for_fashion:
    purpose: "Choose lens 'personality' based on brand identity and fashion tier."
    clinical_modern:
      description: "Razor-sharp, high contrast, minimal aberrations. The modern luxury standard."
      look: "ultra-clean, precise, technical perfection"
