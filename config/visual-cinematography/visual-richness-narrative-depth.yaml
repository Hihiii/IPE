# =============================================================================
# VISUAL RICHNESS / NARRATIVE DEPTH — controlled foreground, midground, and
# background layering to add depth and richness without violating user intent.
# Priority: P85 (between composition P88 and lighting P82).
# =============================================================================

schema_version: "1.0.0"
name: "visual-richness-narrative-depth"
description: >
  Adds visual richness through controlled foreground, midground, and background
  layering. Uses relevant secondary details that support the main subject.
  Creates depth through perspective, lighting separation, material contrast,
  and atmospheric detail. Does not add unrelated props, random text, extra
  characters, or elements that change the user's specified scene.

core_principle: >
  A rich image has planned visual depth that guides the eye from foreground
  through subject to background. This depth must serve the subject and story,
  never distract from them. When a scene feels flat or underspecified, add
  depth through structured layering — but only with elements justified by
  the existing scene context.

# ===========================================================================
# NARRATIVE LAYERING — roles and rules for each depth plane
# ===========================================================================

narrative_layering:
  foreground:
    role: "optional supporting frame that creates immersion and scale"
    allowed_functions:
      - "frame the subject through partial occlusion (blurred edge elements)"
      - "establish camera position (foreground ground plane, table edge)"
      - "carry action-driven particles (splash, dust, petals, sparks)"
      - "provide depth contrast against midground subject"
      - "show scale reference (part of a chair, car hood, railing)"
    forbidden_functions:
      - "covering subject face, hands, product label, or action target"
      - "adding objects that imply a scene change (cup, lamp, plant in empty scene)"
      - "adding hands or body parts that imply extra characters"
      - "inventing foreground that contradicts specified location"
    density_policy:
      portrait: "light — soft bokeh frame or nothing"
      product: "minimal — clean support surface only"
      editorial: "moderate — contextual frame elements"
      cinematic: "deliberate — atmospheric or action-driven occlusion"

  midground:
    role: "primary subject plane — where the hero lives"
    rules:
      - "subject remains the dominant visual anchor at this plane"
      - "lighting, focus, and contrast prioritize the subject here"
      - "do not crowd the midground with competing elements"
      - "if multi-subject, maintain clear spatial separation"

  background:
    role: "supports the subject through context, mood, or contrast"
    allowed_functions:
      - "provide environmental context (indoor/outdoor, era, location)"
      - "extend mood through color and tone (warm/cool, bright/dark)"
      - "create depth contrast against midground subject"
      - "carry atmospheric detail (mist, light rays, texture)"
    forbidden_functions:
      - "inventing people, crowds, or characters not in the prompt"
      - "adding architecture or landmarks that change location"
      - "creating text, signage, or logos not specified"
      - "overpowering subject through excessive detail or contrast"

  atmosphere:
    role: "optional layer between background and far-background"
    allowed_functions:
      - "add depth separation (haze, mist, atmospheric perspective)"
      - "carry mood-supporting particles (fog, dust, light rays)"
      - "soften far-background elements for depth"
    forbidden_functions:
      - "random fog that obscures subject readability"
      - "overdone bloom or unrealistic atmospheric effects"

# ===========================================================================
# DEPTH CREATION METHODS — how to create visual depth
# ===========================================================================

depth_creation_methods:
  perspective_separation:
    description: "Use scale, overlap, and linear perspective to separate planes."
    methods:
      - "foreground element larger, midground hero, background smaller"
      - "overlapping objects at different distances"
      - "leading lines that recede into the scene"
      - "converging perspective for depth (roads, hallways, architecture)"

  lighting_separation:
    description: "Use light intensity and quality differences between planes."
    methods:
      - "key light on subject, softer fill on background"
      - "rim or edge light separating subject from background"
      - "background 1-2 stops darker or lighter than subject"
      - "warm light on subject, cool ambient in background (or vice versa)"
      - "dappled light creating texture on one plane only"

  material_contrast:
    description: "Use surface finish differences to define depth planes."
    methods:
      - "matte foreground, glossy subject, matte background"
      - "rough texture near, smooth hero, soft background"
      - "reflective subject against absorbent background"
      - "translucent overlay between planes"

  atmospheric_detail:
    description: "Use air, particles, and optical effects to separate depth."
    methods:
      - "atmospheric perspective: lighter, lower contrast in distance"
      - "haze or mist between midground and background"
      - "sun rays or volumetric light cutting through atmosphere"
      - "dust motes, pollen, or fog in specific depth bands"
      - "color shift: warm foreground, cool distance"

  focus_separation:
    description: "Use depth of field to define which plane the eye reads first."
    methods:
      - "sharp on subject, soft foreground and background"
      - "deep focus for environmental or architecture shots"
      - "selective focus racking through depth layers"
      - "foreground bokeh framing elements"

# ===========================================================================
# SECONDARY DETAIL POLICY — what to add and what not to add
# ===========================================================================

secondary_detail_policy:
  core_rule: "Every added detail must be justified by the existing scene context."

  allowed_additions:
    condition: "detail supports subject identity, mood, location, or action"
    examples:
      - "steam rising from coffee if the scene is a café"
      - "dust motes in a sunbeam for an old library"
      - "rain droplets on a window if the scene implies rain"
      - "leaves on ground if the scene is an autumn outdoor setting"
      - "soft fabric folds on a surface the subject sits on"
      - "reflection of environment on a glossy product"

  forbidden_additions:
    condition: "detail changes, adds to, or contradicts the user's specified scene"
    examples:
      - "extra people, animals, or characters not specified"
      - "text, logos, signage, or typography not requested"
      - "props that imply a different location (beach ball in office)"
      - "architecture or landmarks not in the prompt"
      - "weather phenomena not justified by mood or location"
      - "random decorative objects with no narrative function"
      - "background crowds for a solo portrait"
      - "food or drink in non-food scenes"
      - "vehicles in pedestrian scenes"

  density_guidelines:
    spare: "One plane active (subject only). No secondary details."
    controlled: "Two planes active. One secondary detail on the non-subject plane."
    balanced: "Three planes active. One secondary detail per support plane."
    rich: "Three planes plus atmosphere. Secondary details may layer but must not compete."

# ===========================================================================
# TASK TYPE DEFAULTS — recommended richness strategy per task
# ===========================================================================

task_defaults:
  portrait:
    depth_layers: 2
    foreground: "soft bokeh or nothing"
    background: "readable but subdued context"
    density: "controlled"
    note: "Face and eyes must remain first read; background is secondary atmosphere"
  product_ad:
    depth_layers: 2
    foreground: "clean support surface"
    background: "minimal gradient or soft context"
    density: "spare to controlled"
    note: "Product must not compete with background elements"
  fashion_editorial:
    depth_layers: 3
    foreground: "atmospheric or environmental frame"
    background: "location or studio context"
    density: "balanced"
    note: "Subject silhouette must read clearly against background"
  cinematic_scene:
    depth_layers: 4
    foreground: "deliberate occlusion or atmosphere"
    atmosphere: "haze, light rays, or particles"
    density: "balanced to rich"
    note: "Depth layers support storytelling; avoid random spectacle"
  architecture:
    depth_layers: 3
    foreground: "scale reference"
    background: "contextual environment"
    density: "balanced"
    note: "Straight verticals and clear geometry; deep focus preferred"
  cover_poster:
    depth_layers: 2
    foreground: "minimal or none"
    background: "text_safe or subdued"
    density: "controlled"
    note: "Negative space for typography overrides depth richness"
  action_scene:
    depth_layers: 3
    foreground: "action-driven particles or motion blur"
    atmosphere: "dust or impact debris"
    density: "balanced to rich"
    note: "Action target must remain readable; foreground particles must be caused by action"

# ===========================================================================
# RULES
# ===========================================================================

rules:
  - "Every depth layer must have a purpose. Do not add layers just to fill space."
  - "Secondary details must be grounded in the existing context: location, mood, action, or subject."
  - "Atmospheric effects must come from the scene (mist from water, dust from motion, light from sun/lamp)."
  - "Do not use atmospheric effects to mask poor composition or lack of subject detail."
  - "Foreground elements must not cover the subject's face, hands, product label, or action target."
  - "Material contrast between layers should feel intentional, not accidental."
  - "When in doubt, under-enrich rather than over-enrich. Spare clarity beats rich confusion."
  - "For tight crops (close-up, bust portrait), depth richness is limited to background atmosphere only."
  - "For wide shots, all three layers may be active but must form a coherent scene."
  - "Depth created through lighting separation requires that the light source is motivated by the scene."
  - "Never add elements that require the viewer to ask 'why is that there?'"
  - "When the user specifies a minimal or sparse scene, respect that — do not add richness."
  - "Cross-reference with environment-props-library.yaml for location-appropriate props."
  - "Cross-reference with depth-layering-system.yaml for technical focus-mode decisions."
  - "Cross-reference with scene-worldbuilding-library.yaml for scene type and density alignment."
