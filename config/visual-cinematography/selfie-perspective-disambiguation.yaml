schema_version: "1.0.0"
name: "selfie-perspective-disambiguation"
description: "Classifies selfie language as camera relationship by default and only adds a device, mirror, or stick from explicit triggers."

core_principle: "Selfie is camera relationship first; phone, mirror, and selfie stick are explicit prop or reflection actions."

selfie_intent_taxonomy:
  selfie_perspective:
    semantic_layer: camera_relationship
    phone_visible: false
    mirror_required: false
    selfie_stick_visible: false
    prop_required: false
    renderer_positive: [front_facing_arm_length_camera_pov, intimate_near_camera_composition, near_side_forearm_enters_from_frame_edge_toward_lens, camera_device_held_completely_beyond_crop, subject_looking_into_lens, close_half_body_or_three_quarter_subject_scale]
    renderer_negative: [visible_smartphone, mobile_phone, holding_phone, selfie_stick, mirror_selfie, phone_covering_face, reflected_phone, external_observer_full_body_view]
  phone_selfie:
    semantic_layer: prop_action
    phone_visible: true
    mirror_required: false
    selfie_stick_visible: false
    prop_required: true
    renderer_positive: [visible_smartphone, natural_hand_phone_contact, finger_grip_logic, believable_phone_camera_direction]
    renderer_negative: [floating_phone, phone_fused_with_hand, phone_covering_entire_face]
  mirror_selfie:
    semantic_layer: reflection_composition
    phone_visible: true
    mirror_required: true
    selfie_stick_visible: false
    prop_required: true
    renderer_positive: [mirror_reflection_composition, visible_phone, coherent_subject_phone_reflection_alignment]
    renderer_negative: [broken_reflection_logic, impossible_mirror_angle, subject_reflection_mismatch]
  selfie_stick_shot:
    semantic_layer: prop_action
    phone_visible: optional
    mirror_required: false
    selfie_stick_visible: true
    prop_required: true
    renderer_positive: [visible_selfie_stick_or_camera_pole, hand_stick_contact, extended_camera_direction]
    renderer_negative: [floating_selfie_stick, stick_fused_with_hand, unrequested_mirror]

default_selfie_mapping:
  selfie: selfie_perspective
  "自拍": selfie_perspective
  "selfie perspective": selfie_perspective
  "自拍視角": selfie_perspective
  "handheld selfie angle": selfie_perspective
  "close selfie framing": selfie_perspective

explicit_trigger_priority:
  - mirror_selfie
  - phone_selfie
  - selfie_stick_shot
  - selfie_perspective

phone_selfie_triggers:
  english: [holding_phone, holding_smartphone, visible_phone, visible_smartphone, phone_in_hand, smartphone_in_hand, taking_a_selfie_with_phone, phone_selfie, phone_covering_face, phone_camera_visible]
  chinese: ["拿手機自拍", "手拿手機", "拿著手機", "手機入鏡", "手機可見", "手機遮住臉", "用手機自拍"]
mirror_selfie_triggers:
  english: [mirror_selfie, bathroom_mirror_selfie, dressing_room_mirror_selfie, mirror_reflection_selfie, phone_reflected_in_mirror, reflected_smartphone]
  chinese: ["對鏡自拍", "鏡中自拍", "鏡子自拍", "浴室鏡自拍", "更衣室鏡自拍", "鏡中手機", "鏡子裡的手機"]
selfie_stick_triggers:
  english: [selfie_stick, gopro_stick, action_camera_stick, handheld_action_camera_pole]
  chinese: ["自拍棒", "手持自拍棒", "GoPro 自拍棒", "運動相機自拍棒"]

cleanup_rules:
  if_selfie_without_explicit_prop_trigger:
    assert: [selfie_mode_selfie_perspective, phone_visible_false, mirror_required_false, selfie_stick_visible_false]
    require: [front_facing_arm_length_camera_pov, foreground_arm_to_lens, device_beyond_crop, lens_aware_gaze]
    remove: [holding_phone, visible_smartphone, smartphone, mobile_phone, selfie_stick, mirror_selfie, reflected_phone, external_observer_full_body_view]
  if_phone_selfie:
    require: [phone_visible, hand_phone_contact, finger_grip_logic]
  if_mirror_selfie:
    require: [mirror_visible, phone_visible, reflection_logic]
  if_selfie_stick_shot:
    require: [selfie_stick_visible, hand_stick_contact, pole_direction]

prompt_assembly_hooks:
  phase_1_intent_analysis:
    action: "Classify plain selfie terms as selfie_perspective, then override only with explicit mirror, phone, or stick triggers."
  phase_4_5_cleanup:
    action: "Remove untriggered phone, mirror, and selfie-stick props; verify gaze matches the selected selfie mode."
