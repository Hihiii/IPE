# ------------------------------------------------------------
# FASHION PREMIUM MATERIAL QUALITY LADDER
# Extended material quality tiers for high-end fashion and portrait photography.
# Each entry defines three quality levels: standard, premium, ultra_premium.
# ------------------------------------------------------------

fashion_material_quality_ladder:
  purpose: "Map material quality to premium fashion output. Higher tiers add refined surface behavior, specific fabric physics, and targeted negative guards against cheap rendering."
  usage: "Select tier based on task_profile, mood, and subject. Ultra-premium reserved for haute couture, luxury editorial, and high-end commercial beauty."

  skin_quality:
    description: "Human skin realism tier — from standard realistic to ultra-premium editorial finish."
    standard:
      prompt_positive: "realistic skin texture with visible pores and natural tone variation"
      prompt_negative: "plastic skin, waxy face, over-smoothed beauty filter"
    premium:
      prompt_positive: "refined skin texture with natural subsurface scattering, soft diffuse quality, subtle pore definition, natural specular highlights following facial planes"
      prompt_negative: "plastic skin, waxy CGI finish, uniform airbrushed surface, poreless skin"
    ultra_premium:
      prompt_positive: "porcelain-finish skin with delicate luminescence, refined pore structure, natural subsurface scattering, soft warm undertones, micro-texture variation with no visible powder or makeup caking, natural specular response on cheekbones and collarbone, skin breathes like real living tissue"
      prompt_negative: "plastic skin, wax figure, over-smoothed beauty filter, uniform skin tone, airbrushed perfection, CGI gloss, poreless mannequin skin"

  silk_quality:
    description: "Silk fabric rendering — from basic sheen to haute couture charmeuse."
    standard:
      prompt_positive: "lustrous silk fabric, smooth drape, natural sheen"
      prompt_negative: "matte cotton, stiff synthetic"
    premium:
      prompt_positive: "premium silk charmeuse with liquid drape, refined luster, sharp fold highlights, soft fluid movement, natural iridescent sheen shifting with fold direction"
      prompt_negative: "matte cotton, stiff synthetic, plastic shine, uniform flat color"
    ultra_premium:
      prompt_positive: "haute couture silk charmeuse with liquid-metal drape, ultra-refined luster, champagne-gold highlight rolloff on folds, micro-pleat memory, weightless floating hem, subtle warp and weft variation creating natural depth, edge-stitch definition on hems"
      prompt_negative: "cheap polyester shine, stiff synthetic drape, uniform flat luster, plastic silk, no fabric weight"

  cashmere_wool_quality:
    description: "Premium knit and wool fabric for high-end fashion editorial."
    standard:
      prompt_positive: "soft wool fabric with fibrous texture, matte finish, natural drape"
      prompt_negative: "smooth synthetic, flat uniform knit"
    premium:
      prompt_positive: "luxury cashmere wool with soft matte finish, subtle fiber halo, natural heathered color variation, substantial drape weight, fine rib or knit structure visible at edges"
      prompt_negative: "smooth synthetic, flat acrylic knit, plastic fiber, uniform color without depth"
    ultra_premium:
      prompt_positive: "ultra-fine cashmere with barely visible fiber halo, liquid-soft hand feel, nuanced heathered color depth, natural drape with soft weight, micro-rib texture only visible at close inspection, no pilling or synthetic shine, garment structure holds shape naturally"
      prompt_negative: "cheap acrylic knit, synthetic pilling, flat uniform color, plastic fiber sheen, stiff cardboard drape"

  couture_fabric_quality:
    description: "High-end structural and embellished fabrics for haute couture fashion."
    standard:
      prompt_positive: "structured fashion fabric with clean silhouette, readable texture"
      prompt_negative: "cheap costume fabric, flat uniform texture"
    premium:
      prompt_positive: "couture-quality fabric with intricate weave structure, precise fold behavior clean silhouette definition, subtle texture variation across panels, refined seam and dart placement"
      prompt_negative: "cheap costume fabric, flat iron-on texture, sloppy seam construction, fabric wrinkling without structural cause"
    ultra_premium:
      prompt_positive: "haute couture fabric with architectural body, hand-finished seam construction, intricate micro-texture only visible at close range, fabric holds sculptural shape while maintaining natural drape weight, beadwork or embroidery sits flush with surface, lining moves independently from outer shell, invisible zipper or hand-stitched closure detail"
      prompt_negative: "cheap costume satin, printed-on texture, visible machine stitching, iron-on embellishment, fabric puckering at seams, polyester lining visible"

  leather_fashion_quality:
    description: "Premium leather for fashion garments and accessories."
    standard:
      prompt_positive: "smooth leather with fine grain and soft matte sheen"
      prompt_negative: "patent plastic, vinyl look, perfectly uniform surface"
    premium:
      prompt_positive: "full-grain calf leather with supple drape, natural grain variation, soft matte luxury sheen, subtle surface stretch marks, fine creasing at bend points"
      prompt_negative: "cheap patent leather, vinyl plastic, stamped grain, uniform surface"
    ultra_premium:
      prompt_positive: "nappa lambskin leather with buttery soft drape, natural pull-up effect revealing lighter undertone at crease points, micro-grain texture, matte-satin finish with no artificial gloss, leather breathes and drapes like second skin, edge painting or folded hem finish"
      prompt_negative: "cheap corrected-grain leather, patent vinyl, plastic-coated leather, uniform stamped texture, cardboard stiff leather"

  satin_fabric_quality:
    description: "Satin weave fabric for premium fashion and evening wear."
    standard:
      prompt_positive: "smooth satin fabric with lustrous face, fluid drape, crisp fold highlights"
      prompt_negative: "matte cotton, cheap polyester shine"
    premium:
      prompt_positive: "premium charmeuse satin with high-luster face and matte back, fluid liquid drape, sharp fold highlights catching key light, subtle warp luster variation, soft weight that follows body contour"
      prompt_negative: "cheap polyester satin, plastic shine, stiff drape, uniform flat luster"
    ultra_premium:
      prompt_positive: "ultra-premium silk satin with mirror-like luster on face, matte liquid back, drape follows gravity in continuous fluid lines, fold highlights create natural champagne-gold or pearl-silver accent, fabric weight just heavy enough for controlled movement yet light enough to float, no polyester or synthetic blend visible"
      prompt_negative: "synthetic poly-satin, plastic shine, cardboard drape, uniform flat reflection, cheap evening wear fabric"

  lace_fabric_quality:
    description: "Fine lace for premium fashion and intimate apparel."
    standard:
      prompt_positive: "lace fabric with open weave pattern, soft texture"
      prompt_negative: "printed lace pattern, cheap synthetic mesh"
    premium:
      prompt_positive: "fine French lace with intricate pattern definition, soft scalloped edges, subtle texture variation between floral motifs and mesh ground, lays flat against skin without gaping"
      prompt_negative: "printed lace pattern, stiff synthetic lace, uniform machine-made repeat, scratchy texture"
    ultra_premium:
      prompt_positive: "Chantilly or Alençon lace with hand-finished scalloped edges, micro-floral motifs connected by delicate brides, corded outline defining each pattern element, lace appears to float above skin with no visible seam or edge finish, soft stretch follows body contour without distortion"
      prompt_negative: "printed lace, cheap synthetic mesh, stiff scalloped edge, visible fusible backing, uniform machine repeat"

  tulle_organza_quality:
    description: "Sheer structural fabrics for premium fashion and editorial."
    standard:
      prompt_positive: "sheer tulle or organza fabric, crisp transparent quality, soft volume"
      prompt_negative: "opaque fabric, flat wrinkled net"
    premium:
      prompt_positive: "crisp silk organza with transparent body, holds structural shape, subtle iridescent shimmer, layered translucency creates depth, stiff enough for volume yet soft enough for fluid movement"
      prompt_negative: "stiff plastic net, flat opaque fabric, wrinkled or crushed texture, cheap costume tulle"
    ultra_premium:
      prompt_positive: "ultra-fine silk organza with barely-there transparency, crisp structural body that floats with movement, subtle moiré or iridescence in overlapping layers, pleats or ruffles hold sharp architectural edge, fabric makes its own shape independent of underlayer"
      prompt_negative: "cheap nylon tulle, plastic stiffness, crushed wrinkled net, opaque synthetic organza, costume-shop quality"

fashion_premium_material_assembly_rules:
  purpose: "Rules for combining premium materials in a single fashion editorial prompt."
  rules:
    - "Select one primary fabric quality tier for the hero garment; secondary fabrics may be one tier lower."
    - "Skin quality tier should match or exceed garment tier for editorial consistency."
    - "For full-body fashion, all visible materials should share the same quality tier."
    - "For beauty close-up, skin ultra-premium is mandatory; fabric can be one tier lower."
    - "When mixing materials (leather + silk + lace), ensure each has distinct specular response."
  conflict_resolution:
    garment_vs_skin_conflict:
      trigger: "Ultra-premium garment but standard skin"
      resolution: "Raise skin to premium minimum for editorial coherence"
    mixed_fabric_tiers:
      trigger: "Multiple fabrics at different quality tiers"
      resolution: "Use highest tier as anchor; describe others as complementary"
    fabric_vs_lighting:
      trigger: "Ultra-premium fabric detail lost in dark mood lighting"
      resolution: "Add selective hero illumination on fabric texture zones"

# ------------------------------------------------------------
# Fabric Opacity / Translucency Material Extension
# ------------------------------------------------------------

fabric_opacity_materials:
  cotton_poplin:
    opacity: "opaque"
    behavior:
      - "structured"
      - "mostly opaque"
      - "holds collar and placket shape"
    visibility_rule: "No sharp anatomical visibility through dry fabric."

  lightweight_cotton:
    opacity: "lightweight_opaque"
    behavior:
      - "soft drape"
      - "slight body contour where touching skin"
      - "mostly opaque under normal light"
    visibility_rule: "Use implied contour only unless strong backlight or wetness is specified."

  cotton_voile:
    opacity: "semi_sheer"
    behavior:
      - "light and airy"
      - "soft backlit translucency"
      - "faint silhouette in thinnest areas"
    visibility_rule: "Use faint non-sharp silhouette, not clear explicit visibility."

  chiffon:
    opacity: "sheer"
    behavior:
      - "transparent layering"
      - "floating drape"
      - "visible overlap and layering"
    visibility_rule: "Visibility must follow layered fabric structure."

  damp_cotton:
    opacity: "wet_translucent"
    behavior:
      - "clings in contact areas"
      - "more translucent where wet and tensioned"
      - "opaque-to-translucent gradient"
    visibility_rule: "Visibility must be caused by moisture, cling, and tension."

  lace_or_mesh:
    opacity: "mesh_or_lace"
    behavior:
      - "pattern-based visibility"
      - "open weave"
    visibility_rule: "Visibility follows lace/mesh pattern, not uniform transparency."

  satin:
    opacity: "opaque_with_sheen"
    behavior:
      - "smooth lustrous surface"
      - "high-luster face, matte back"
      - "fluid drape with crisp fold highlights"
    visibility_rule: "Opaque except where tension thins weave under strong backlight."

  organza:
    opacity: "stiff_sheer"
    behavior:
      - "crisp transparent sheer"
      - "holds structural shape"
      - "iridescent shimmer possible"
    visibility_rule: "Fully transparent where single layer; overlapping layers reduce visibility."

  neoprene:
    opacity: "opaque_thick"
    behavior:
      - "thick spongy edge"
      - "matte surface"
      - "holds shape without draping"
    visibility_rule: "Fully opaque regardless of light or moisture."

  leather_thin:
    opacity: "opaque_supple"
    behavior:
      - "opaque but follows body contour"
      - "stretches slightly over joints"
      - "subtle surface sheen"
    visibility_rule: "Opaque — anatomical contour visible through fit, not transparency."

