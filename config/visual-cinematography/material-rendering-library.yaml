      recommended: [a_line, column, fit_and_flare, high_low, hourglass, plunge]
      acceptable: [trapeze, bodycon, peplum, sheer_layering]
      avoid: [cocoon, cape, deconstructed, strappy, cut_out]

  cashmere_fashion_quality:
