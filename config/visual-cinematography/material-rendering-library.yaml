# FASHION SILHOUETTE RECOMMENDATIONS
# Maps each fabric tier to recommended silhouettes from
# config/character-identity/fashion-silhouette-library.yaml
# ===========================================================================

fashion_silhouette_recommendations:
  purpose: "Maps each fabric quality tier to the best matching editorial silhouettes. Use when both fabric tier and silhouette choice are active."
  cross_reference: "See config/character-identity/fashion-silhouette-library.yaml for full silhouette definitions, construction vocabulary, and crop affinity."

  silk_fashion_quality:
