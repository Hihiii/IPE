color_failure_taxonomy:
  muddy_palette:
    symptoms:
      - "colors blend together without hierarchy"
      - "subject does not separate from background"
      - "too many mid-saturation hues"
    fixes:
      - "assign dominant, secondary, and accent roles"
      - "increase value contrast around the subject"
      - "reduce number of competing hues"
  skin_color_cast:
    symptoms:
      - "face becomes green, gray, blue, or overly orange"
      - "beauty portrait feels unnatural"
    fixes:
      - "protect natural skin tones"
      - "move strong color grade into shadows/background"
      - "use warm neutral fill on face"
  brand_color_drift:
    symptoms:
      - "logo or product color changes under cinematic grade"
      - "brand recognition weakens"
    fixes:
      - "lock brand color"
      - "apply grading to environment only"
      - "use neutral lighting on brand mark"
  over_saturated_children_scene:
    symptoms:
      - "UI feels noisy"
      - "object recognition becomes difficult"
    fixes:
      - "use pastel high-luminance palette"
      - "limit accent colors"
      - "reserve saturated color for interactive elements"
  neon_overwash:
    symptoms:
      - "entire image becomes one neon color"
      - "skin and materials lose identity"
    fixes:
      - "restrict neon to rim lights, signs, and reflections"
      - "preserve neutral key light on subject"
      - "keep material base colors visible"

# =============================================================================
# FASHION EDITORIAL COLOR STRATEGIES — Premium fashion-specific color
# grading looks, palettes, and saturation strategies.
# =============================================================================

fashion_editorial_color_strategies:

  editorial_grading_looks:
    editorial_matte:
      description: "Low-saturation matte finish with controlled contrast. The modern high-fashion baseline. Colors are visible but never saturated; shadows are deep but not crushed."
      contrast: "moderate"
      saturation: "low_controlled"
      best_for:
        - high_fashion_editorial
        - luxury_brand_campaign
        - minimal_fashion_portfolio
        - avant_garde_fashion
      prompt_keywords: "editorial matte color grade, low saturation, controlled contrast, modern fashion palette, desaturated elegance"
      notes: "The most versatile high-fashion grade. Works across all garment colors. Skin tones remain natural while everything else is slightly muted."
      skin_protection:
        - "natural skin undertones preserved"
        - "face slightly warmer than the rest of the frame"
        - "no gray lifeless skin despite low saturation"

    editorial_pearl:
      description: "High-luminance, low-saturation palette with soft warm highlights. Skin has a luminous pearl quality. Whites are creamy, not clinical."
      contrast: "low_to_moderate"
      saturation: "very_low_warm"
      best_for:
        - luxury_beauty_editorial
        - bridal_fashion
        - premium_skincare
        - fine_art_portrait
      prompt_keywords: "editorial pearl grade, luminous skin, warm cream highlights, soft pearlescent finish, high-key editorial beauty"
      notes: "Creates the most flattering skin tones. Highlights have a soft creamy rolloff. Avoids the clinical feel of pure high-key."
      skin_protection:
        - "luminous natural skin with warm undertone"
        - "pearl-like softness without losing texture"
        - "highlights retain skin detail"

    editorial_high_contrast_mono:
      description: "Near-monochrome with extreme contrast. Deepest blacks, brightest whites, minimal color. Pure editorial power."
      contrast: "very_high"
      saturation: "near_monochrome"
      best_for:
        - black_and_white_fashion
        - dramatic_editorial
        - luxury_brand_statement
        - architectural_fashion
      prompt_keywords: "editorial high-contrast monochrome, deep blacks, clean whites, near-black-and-white fashion, dramatic tonal range"
      notes: "Color is reduced to near-zero. The entire image lives in tonal contrast. Garment texture, silhouette, and skin texture become the only visual elements."
      skin_protection:
        - "skin retains natural tonal variation"
        - "no muddy gray skin"
        - "highlights on face not blown"

    editorial_warm_cream:
      description: "Warm cream, ivory, and beige palette with restrained amber accents. The classic luxury editorial warmth. Inviting but refined."
      contrast: "low_to_moderate"
      saturation: "warm_minimal"
      best_for:
        - luxury_fashion_editorial
        - premium_lifestyle
        - fine_art_fashion
        - scandinavian_minimal
      prompt_keywords: "editorial warm cream grade, ivory beige palette, restrained amber warmth, Scandinavian fashion clean, luxury neutral tone"
      notes: "The warm equivalent of editorial_matte. For brands that want clean warmth without aggressive saturation. Pairs with natural textures."
      dominant_palette:
        - "warm cream"
        - "ivory"
        - "soft beige"
        - "muted caramel"
        - "warm charcoal"

    editorial_cool_steel:
      description: "Cool silver, steel blue, and charcoal palette. Modern, clean, architectural fashion feel. Distant but premium."
