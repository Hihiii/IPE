  fashion_saturation_strategies:
    editorial_selective:
      description: "Most of the frame desaturated except for the hero garment, accessory, or makeup accent. The eye goes exactly where the brand wants."
      effect: "hero-first color hierarchy"
      best_for:
        - editorial_fashion_spread
        - product_hero_editorial
        - makeup_lipstick_focus
        - statement_accessory
      prompt_keywords: "editorial selective saturation, desaturated environment, saturated hero garment, controlled color focus"
      ratio: "85% desaturated, 15% saturated accent"

    editorial_garment_focused:
      description: "Skin, background, and environment are muted. The garment or fabric holds the only saturated color in the frame."
      effect: "fabric as the color hero"
      best_for:
        - fashion_collection_showcase
        - fabric_brand_editorial
        - designer_lookbook
      prompt_keywords: "editorial garment-focused saturation, muted skin and background, saturated fabric, fashion color hero"
      ratio: "70% muted neutral, 30% garment saturation"

    editorial_duo_tone:
      description: "Two specific hues dominate the entire frame — one for shadows, one for highlights. Graphic, modern, editorial."
      effect: "controlled bipolar palette"
      best_for:
        - fashion_editorial_statement
        - brand_campaign_system
        - magazine_spread_identity
      prompt_keywords: "editorial duotone palette, two-color fashion grade, shadow highlight color separation, graphic editorial color"
      common_pairs:
