version: 1
purpose: "Color theory reference for cinematic and commercial image planning."

# =============================================================================
# COLOR SCHEMES — foundational color relationship patterns
# =============================================================================
schemes:
  complementary:
    description: "Colors opposite on the color wheel. Maximum contrast and visual tension."
    contrast_level: "very_high"
    visual_tension: "high"
    emotional_feel: "dynamic, bold, dramatic, energetic"
    common_pairs:
      - "blue_and_orange"
      - "red_and_green"
      - "yellow_and_purple"
      - "cyan_and_red_orange"
    best_for:
      - "cinematic teal-and-orange look"
      - "sports brands"
      - "action and drama"
      - "high-impact commercial"
    prompt_keywords: "complementary color scheme, contrasting warm and cool tones, dynamic color contrast"
    cinematic_example: "Teal-orange blockbuster look. Skin tones warm orange against teal shadows."

  analogous:
    description: "Colors adjacent on the color wheel. Harmonious and cohesive."
    contrast_level: "low"
    visual_tension: "very_low"
    emotional_feel: "calm, serene, harmonious, elegant, sophisticated"
    common_groups:
      - "blue_teal_green"
      - "yellow_orange_red"
      - "purple_blue_cyan"
      - "green_yellow_orange"
    best_for:
      - "luxury brand"
      - "spa and wellness"
      - "nature and landscape"
      - "elegant editorial"
    prompt_keywords: "analogous color harmony, cohesive color palette, harmonious tones, subtle color transition"
    cinematic_example: "Luxe perfume ads with champagne-copper-amber progression."

  triadic:
    description: "Three colors evenly spaced on the color wheel. Balanced but vibrant."
    contrast_level: "high"
    visual_tension: "moderate"
    emotional_feel: "vibrant, playful, balanced, rich, artistic"
    common_triads:
      - "red_yellow_blue"
      - "orange_green_purple"
      - "cyan_magenta_yellow"
    best_for:
      - "children's products"
      - "creative and artistic"
      - "festive and celebration"
      - "editorial with personality"
    prompt_keywords: "triadic color palette, three-color harmony, balanced vibrant colors"
    cinematic_example: "Wes Anderson films — bold reds, yellows, and blues in balanced composition."

  monochromatic:
    description: "Single hue with variations in saturation and luminance. Ultra-cohesive."
    contrast_level: "very_low"
    visual_tension: "none"
    emotional_feel: "minimalist, sophisticated, pure, focused, atmospheric"
    best_for:
      - "minimalist product"
      - "high-end fashion editorial"
      - "fine art"
      - "brand identity consistency"
    prompt_keywords: "monochromatic color scheme, single hue variations, tonal harmony, minimalist palette"
    cinematic_example: "The Matrix — green monochrome. Or Schindler's List — red coat as accent."

  split_complementary:
    description: "Base color plus two colors adjacent to its complement. High contrast but less tension."
    contrast_level: "high_but_refined"
    visual_tension: "moderate_refined"
    emotional_feel: "refined_contrast, sophisticated_drama, controlled_vibrancy"
    common_groups:
      - "blue_with_yellow_orange_and_red_orange"
      - "red_with_blue_green_and_yellow_green"
    best_for:
      - "refined commercial"
      - "controlled brand contrast"
      - "editorial with depth"
    prompt_keywords: "split complementary palette, refined color contrast, sophisticated accent colors"
    notes: "Easier to balance than full complementary. Gives contrast without the tension."

  tetradic_double_complementary:
    description: "Two complementary pairs. Rich but requires careful balance."
    contrast_level: "very_high"
    visual_tension: "high"
    emotional_feel: "rich, complex, bold, maximalist"
    best_for:
      - "maximalist editorial"
      - "festive packaging"
      - "complex commercial scenes"
    prompt_keywords: "tetradic color scheme, double complementary, rich multi-color palette"
    notes: "Most difficult to balance. Best with one dominant pair and one accent pair."

  accented_achromatic:
    description: "Nearly full grayscale with a single saturated accent color. The accent draws full attention."
    contrast_level: "very_high"
    visual_tension: "very_high"
    emotional_feel: "iconic, powerful, focused, dramatic, editorial"
    common_accents:
      - "red_accent_on_gray"
      - "yellow_accent_on_gray"
      - "teal_accent_on_gray"
    best_for:
      - "iconic editorial covers"
      - "brand hero imagery"
      - "fine art statement"
      - "product hero with single brand color"
    prompt_keywords: "accented achromatic, grayscale with single color accent, desaturated with pop of color"
    cinematic_example: "Schindler's List — the girl in the red coat. Everything else is monochrome."
    notes: "The accent color must be chosen with extreme care. It carries the entire emotional weight."

  duotone:
    description: "Two specific hues, typically one mapping to shadows and one to highlights. Graphic, editorial, modern."
    contrast_level: "moderate_to_high"
    visual_tension: "moderate"
    emotional_feel: "editorial, graphic, contemporary, stylized, cohesive"
    common_pairs:
      - "black_and_gold"
      - "blue_and_orange"
      - "purple_and_pink"
      - "teal_and_coral"
    best_for:
      - "editorial spreads"
      - "album artwork"
      - "brand mood boards"
      - "social media aesthetics"
    prompt_keywords: "duotone color palette, two-color gradient, shadow and highlight separation"
    notes: "Commonly used in print editorial. Works best when the two colors have strong contrast in temperature or saturation."

  pastel:
    description: "Multiple hues at low saturation and high luminance. Soft, gentle, inviting."
    contrast_level: "low"
    visual_tension: "very_low"
    emotional_feel: "soft, gentle, dreamy, romantic, youthful, approachable"
    common_groups:
      - "pink_lavender_mint"
      - "peach_cream_skyblue"
      - "mint_yellow_lilac"
    best_for:
      - "beauty and skincare"
      - "baby and children"
      - "wedding and lifestyle"
      - "spring and floral"
    prompt_keywords: "pastel color palette, soft muted tones, gentle dreamy colors, low saturation pastels"
    cinematic_example: "Wes Anderson palettes applied gently. Soft pastel pink and mint green tones."

  earthy_organic:
    description: "Warm natural tones from earth, clay, stone, and vegetation. Grounded and authentic."
    contrast_level: "low_to_moderate"
    visual_tension: "low"
    emotional_feel: "grounded, authentic, organic, natural, warm, sustainable"
    common_palette:
      - "terracotta_olive_cream"
      - "ochre_rust_sage"
      - "brown_amber_moss"
      - "clay_sand_stone"
    best_for:
      - "organic and natural brands"
      - "sustainable packaging"
      - "food and farmer's market"
      - "outdoor lifestyle"
    prompt_keywords: "earthy color palette, organic natural tones, terracotta and olive, grounded warm colors"
    notes: "Highlights natural textures. Avoid pure white; use warm cream or linen instead."

  neon_cyberpunk:
    description: "Extreme saturation, electric colors on dark backgrounds. Artificial, futuristic energy."
    contrast_level: "very_high"
    visual_tension: "very_high"
    emotional_feel: "futuristic, electric, edgy, synthetic, rebellious, urban"
    common_palette:
      - "magenta_cyan_dark"
      - "neon_green_purple_black"
      - "electric_blue_hot_pink"
    best_for:
      - "nightlife and music"
      - "gaming and tech"
      - "edgy fashion"
      - "cyberpunk aesthetic"
    prompt_keywords: "neon cyberpunk palette, electric saturated colors, neon on dark, synthetic glow"
    cinematic_example: "Blade Runner 2049 — neon magenta and cyan against deep shadows."

  polychromatic:
    description: "Full spectrum rainbow or near-rainbow palette. Maximalist, joyful, inclusive."
    contrast_level: "very_high"
    visual_tension: "high"
    emotional_feel: "joyful, inclusive, vibrant, celebratory, maximalist, diverse"
    best_for:
      - "pride and diversity"
      - "festivals and celebration"
      - "creative and artistic"
      - "children's products"
    prompt_keywords: "polychromatic color palette, full rainbow spectrum, multiple vivid colors, joyful diversity"
    notes: "Requires strong compositional control to avoid visual chaos. Use white or black as grounding."

  high_contrast_warm_cool:
    description: "Deliberate separation of warm and cool regions of the frame, not by complementary pairs but by color temperature zones."
    contrast_level: "high"
    visual_tension: "moderate_high"
    emotional_feel: "cinematic, spatial, dimensional, dramatic, deliberate"
    best_for:
      - "cinematic storytelling"
      - "product with dual environment"
      - "editorial with light and shadow areas"
      - "portrait with mixed lighting"
    prompt_keywords: "warm cool split lighting, deliberate temperature zones, warm subject on cool background"
    notes: "Different from complementary — this is about dividing the frame into temperature zones. Warm subject, cool background (or vice versa)."
    cinematic_example: "A face lit by warm tungsten on one side, cool window light on the other."

  golden_analogous:
    description: "Warm gold, amber, copper, and bronze tones. Narrow-band warm analogous. Richest warm range."
    contrast_level: "low"
    visual_tension: "very_low"
    emotional_feel: "rich, luxurious, warm, opulent, precious, golden"
    best_for:
      - "luxury jewelry and watches"
      - "premium spirits"
      - "wedding and celebration"
      - "royal and heritage brands"
    prompt_keywords: "golden analogous palette, warm amber tones, rich copper bronze, precious metal chromatic"
    notes: "The most expensive-feeling color scheme. Needs careful highlight management to avoid blowing out."

  cool_oceanic:
    description: "Blue, teal, cyan, and slate. Narrow-band cool analogous. Calm and expansive."
    contrast_level: "low"
    visual_tension: "very_low"
    emotional_feel: "calm, expansive, deep, refreshing, professional, aquatic"
    best_for:
      - "tech and finance"
      - "travel and aquatic"
      - "medical and clean"
      - "professional services"
    prompt_keywords: "cool oceanic palette, blue teal tones, calm cool chromatic, deep sea palette"
    notes: "Evokes depth and professionalism. Add a warm accent for visual anchor."

  soft_warm_light:
    description: "Warm tones at very low saturation — cream, champagne, peach, blush. Minimalist warm."
    contrast_level: "very_low"
    visual_tension: "none"
    emotional_feel: "intimate, gentle, elegant, understated, timeless"
    best_for:
      - "bridal and wedding"
      - "luxury skincare"
      - "intimate portrait"
      - "fine art nudes"
    prompt_keywords: "soft warm neutrals, champagne tones, blush cream palette, subtle warmth"


# =============================================================================
# COLOR TEMPERATURE — Kelvin scale with emotional mapping
# =============================================================================
color_temperatures:
  candlelight:
    kelvin: 1800
    rgb: "#FF8C00"
    cast: "very_warm_orange"
    emotion: "intimate, romantic, warm"
    notes: "Single candle as light source. Deepest warm tone. Shadows go black."

  sodium_vapor:
    kelvin: 2200
    rgb: "#FF6B00"
    cast: "deep_orange_warm"
    emotion: "urban, nocturnal, gritty, cinematic"
    notes: "Street lamps. Creates the classic urban night look. Pure orange cast."
    cinematic_use: "Michael Mann films — sodium vapor street lighting."

  tungsten:
    kelvin: 3200
    rgb: "#FFB347"
    cast: "warm_amber"
    emotion: "cozy, interior, classic, intimate"
    notes: "Standard indoor lighting. Warm but not orange. Classic Hollywood key light."
    cinematic_use: "The Godfather — warm amber interiors."

  sunrise_sunset:
    kelvin: 3500_4500
    rgb: "#FFD59A"
    cast: "golden_warm"
    emotion: "golden hour, nostalgic, warm glow, transient"
    notes: "The golden hour. Rapidly changing. Directional warm light."
    cinematic_use: "Days of Heaven — entire film shot during golden hour."

  fluorescent_cool:
    kelvin: 4200
    rgb: "#D4E0A0"
    cast: "cool_greenish"
    emotion: "clinical, institutional, cold, cheap"
    notes: "Office, hospital, retail. Can have a greenish cast. Often avoided in premium work."
    cinematic_use: "Office environments, horror — creates unease."

  daylight:
    kelvin: 5600
    rgb: "#FFFFFF"
    cast: "neutral_white"
    emotion: "natural, truthful, clean, standard"
    notes: "Midday sun, camera daylight balance. The reference point for all color temperature."

  studio_flash:
    kelvin: 5500
    rgb: "#FFFFFF"
    cast: "neutral_white"
    emotion: "commercial, studio, precise, controlled"
    notes: "Studio strobes are typically 5500K. Consistent, powerful, daylight balanced."
    best_for: "Product photography, commercial studio work."

  overcast_shade:
    kelvin: 6500_7500
    rgb: "#C8D8FF"
    cast: "cool_blue"
    emotion: "moody, cold, melancholy, soft"
    notes: "North light. Overcast sky. The softest and most even temperature."
    cinematic_use: "The Revenant — cool ambient light for survival scenes."

  luna_moonlight:
    kelvin: 7500_8000
    rgb: "#7090FF"
    cast: "cool_blue"
    emotion: "night, mysterious, cold, romantic"
    notes: "Moonlight is actually reflected sunlight but cinema convention treats it as cool blue."
    cinematic_use: "Standard cinematic moonlight effect. Paired with warm practicals for contrast."

  clear_sky_shadow:
    kelvin: 8000_10000
    rgb: "#4060E0"
    cast: "deep_blue"
    emotion: "cold, dramatic, clinical, clean"
    notes: "Shadow areas on a clear day. The blue sky casts a strong cool tint on shadows."
    cinematic_use: "Open shade portraits — cool shadows, warm sunlit areas."

  mercury_vapor:
    kelvin: 5900
    rgb: "#C0D8FF"
    cast: "blue_violet"
    emotion: "industrial, harsh, surveillance, cold"
    notes: "Parking lots, industrial yards. Blue-violet cast. Harsher than sodium."
    cinematic_use: "Parking lot scenes, industrial surveillance aesthetic."

  LED_variable:
    kelvin: 2700_6500
    rgb: "#variable"
    cast: "programmable"
    emotion: "modern, controllable, versatile, digital"
    notes: "Modern LED panels. Can be dialed to any temperature. The standard for modern filmmaking."
    best_for: "Modern studio production where color temp control is needed."


# =============================================================================
# COLOR GRADING LOOKS — specific film stocks, director signatures, and mood grades
# =============================================================================
color_grading_looks:
  # --- Commercial Standards ---
  neutral_pro:
    description: "Natural, unbiased color with accurate skin tones and neutral grays. The commercial baseline."
    contrast: "moderate"
    saturation: "accurate_neutral"
    best_for: "commercial product, e-commerce, catalog, color-critical work"
    prompt_keywords: "neutral color grade, accurate skin tones, commercial color standard, natural color balance"
    notes: "The 'no-grade' grade. Hardest to achieve because every color must be correct."

  golden_hour:
    description: "Warm amber/gold tones throughout. Low contrast, warm highlights. The most flattering light."
    contrast: "low"
    saturation: "warm_saturated"
    best_for: "romantic, nostalgic, lifestyle, beauty, wedding"
    prompt_keywords: "golden hour lighting, warm amber glow, low contrast golden tones, sunset warmth"
    cinematic_use: "Any scene requiring warmth, intimacy, or nostalgia."

  desaturated_cool:
    description: "Cool blue/muted tones, low saturation, clean. Modern architectural and tech aesthetic."
    contrast: "moderate"
    saturation: "low_cool"
    best_for: "modern commercial, tech, minimalist, luxury, architecture"
    prompt_keywords: "desaturated cool grade, muted blue tones, clean modern look, minimal color"
    cinematic_use: "Apple product photography. Modern minimalist architecture."

  bleach_bypass:
    description: "Desaturated with high contrast and silver retention. Gritty, metallic, aggressive."
    contrast: "very_high"
    saturation: "low"
    best_for: "war film, gritty drama, edgy fashion, post-apocalyptic"
    prompt_keywords: "bleach bypass look, desaturated high contrast, silver retention, gritty film look"
    cinematic_use: "Saving Private Ryan — the Normandy beach sequence."

  pastel_soft:
    description: "Low saturation, high key, soft tones. Gentle and dreamy, like candy-coated light."
    contrast: "low"
    saturation: "low_pastel"
    best_for: "beauty, lifestyle, social media, fashion soft, spring"
    prompt_keywords: "pastel soft color palette, low saturation dreamy, soft gentle tones"
    cinematic_use: "Romantic comedy flashbacks. Dream sequences."

  # --- Film Stock Emulations ---
  kodak_portra:
    description: "Warm skin tones, softened greens, pastel blue skies. The iconic portrait film. Slightly desaturated highlights, rich midtones."
    contrast: "moderate_low"
    saturation: "warm_with_green_muted"
    best_for: "portrait, wedding, engagement, lifestyle"
    prompt_keywords: "Kodak Portra film look, warm skin tones, pastel greens, classic portrait film"
    notes: "The gold standard for film portraits. Skin tones are rendered with a gentle warmth that flatters every complexion."

  kodak_ektar:
    description: "High saturation, vibrant blues and reds, punchy contrast. Consumer-grade but characterful."
    contrast: "moderate_high"
    saturation: "high_vibrant"
    best_for: "travel, street, product color emphasis, food"
    prompt_keywords: "Kodak Ektar film, high saturation vibrant, punchy colors, classic consumer film"
    notes: "More saturated than Portra. Excellent when color itself is the subject."

  fuji_pro_400h:
    description: "Cool skin tone bias, desaturated greens, soft pastel palette, gentle highlight rolloff. The alternative portrait standard."
    contrast: "moderate_low"
    saturation: "cool_pastel"
    best_for: "fashion, editorial, Japanese aesthetic, cool portrait"
    prompt_keywords: "Fuji Pro 400H film, cool skin tones, pastel palette, soft pastel film look"
    notes: "The preferred film for many fashion photographers. Skin tones run cooler than Portra."

  fuji_velvia:
    description: "Extremely high saturation, deep greens, punchy blues, high contrast. Landscape photographer's choice."
    contrast: "high"
    saturation: "extremely_high"
    best_for: "landscape, nature, architecture, color emphasis"
    prompt_keywords: "Fuji Velvia film, hyper saturated, deep greens, punchy blue sky, landscape film"
    notes: "Saturation is intentionally unrealistic. Best for nature and landscape where you want color to pop."

  cinestill_800t:
    description: "Warm tungsten-balanced film with signature red halation on highlights. Blue shadow tint. Urban night aesthetic."
    contrast: "high"
    saturation: "warm_with_blue_shadows"
    best_for: "night photography, neon, urban, cinematic interior, music"
    prompt_keywords: "Cinestill 800T film, tungsten balanced, red halation highlights, blue shadows, cinematic night"
    notes: "The halation (red glow around bright highlights) is the signature look. Streetlights, neon signs, car headlights all glow red."

  kodak_tri_x:
    description: "Classic black and white film. Medium contrast, visible grain, wide tonal range. The documentary choice."
    contrast: "moderate"
    saturation: "mono"
    best_for: "documentary, street photography, B&W portrait, fine art"
    prompt_keywords: "Kodak Tri-X film, black and white, medium contrast, classic grain, documentary B&W"
    notes: "400 speed, pushable to 1600+. The most iconic B&W film in history."

  ilford_hp5:
    description: "Black and white with finer grain than Tri-X, smoother midtones, excellent pushability."
    contrast: "moderate"
    saturation: "mono"
    best_for: "B&W portrait, fine art, editorial, available light B&W"
    prompt_keywords: "Ilford HP5 Plus film, fine grain B&W, smooth midtones, classic monochrome"
    notes: "Smoother than Tri-X. Preferred when you want B&W without the grain character being a feature."

  agfa_ultra:
    description: "Deep, warm saturation with a distinct European color palette. Red shift in shadows. Vibrant but natural."
    contrast: "moderate_high"
    saturation: "warm_deep"
    best_for: "editorial, European style, warm natural scenes, street"
    prompt_keywords: "Agfa Ultra film, warm saturation, European color, deep reds, vibrant natural"
    notes: "Discontinued but has a cult following. Colors are warm without being oversaturated."

  kodachrome:
    description: "Warm reds, deep blues, cyan shadows, slight halation. The most iconic slide film ever made."
    contrast: "high"
    saturation: "warm_red_shift"
    best_for: "vintage Americana, retro, travel documentary, period piece"
    prompt_keywords: "Kodachrome film look, warm reds, deep blues, classic slide film, vintage travel"
    notes: "Known for its longevity — Kodachrome slides last decades without color shift."

  # --- Director & Cinematic Signatures ---
  michael_mann_sodium:
    description: "Deep teal shadows, warm sodium-vapor highlights, strong color separation by temperature. Urban night defined."
    contrast: "high"
    saturation: "selective_extreme"
    best_for: "urban night, thriller, crime, nocturnal editorial"
    prompt_keywords: "Michael Mann teal and sodium look, teal shadows, warm streetlight, urban night cinematic"
    cinematic_use: "Heat, Collateral, Miami Vice — the definitive urban night look."

  wes_anderson:
    description: "Deliberately saturated pastels, warm biased but controlled. Symmetrical color blocking. Each scene has a dominant palette."
    contrast: "low_moderate"
    saturation: "pastel_vibrant"
    best_for: "editorial, period with stylized color, whimsical commercial"
    prompt_keywords: "Wes Anderson color palette, symmetrical pastels, warm saturated pastels, stylized color blocking"
    cinematic_use: "The Grand Budapest Hotel — pink, purple, and warm amber."

  dune_sandy:
    description: "Warm ochre, sand, bronze, muted olive. Low saturation with warm dust tone. Sun-bleached epic."
    contrast: "moderate"
    saturation: "low_warm"
    best_for: "epic landscape, period desert, survival, monumental architecture"
    prompt_keywords: "Dune sandy palette, warm ochre tones, sun bleached colors, desert epic color grade"
    cinematic_use: "Dune — warm sand tones, muted bronze, sun-baked everything."

  mad_max_orange:
    description: "High contrast warm orange and teal dust. Bleached highlights, crushed blacks. Post-apocalyptic heat."
    contrast: "very_high"
    saturation: "warm_orange_dominant"
    best_for: "action, post-apocalyptic, desert, high-energy"
    prompt_keywords: "Mad Max orange and teal, high contrast warm, bleached highlights, post-apocalyptic"
    cinematic_use: "Mad Max: Fury Road — orange dust, teal sky, extreme contrast."

  oppenheimer_midcentury:
    description: "Warm amber midtones, cool blue shadows, period-specific browns and grays. 1940s atomic age palette."
    contrast: "moderate_high"
    saturation: "warm_muted_with_blue_shadows"
    best_for: "period drama, 1940s-1950s, documentary reenactment, institutional"
    prompt_keywords: "Oppenheimer midcentury palette, warm amber and cool shadow, period atomic age colors"
    cinematic_use: "Oppenheimer — warm amber institutions, cold theoretical blue."

  blade_runner_cyberpunk:
    description: "Deep blacks, neon cyan, hot magenta, yellow-green industrial. The definitive cyberpunk palette."
    contrast: "very_high"
    saturation: "selective_neon"
    best_for: "sci-fi, cyberpunk, night scene, futuristic tech"
    prompt_keywords: "Blade Runner cyberpunk grade, neon cyan and magenta, deep blacks, futuristic dark"
    cinematic_use: "Blade Runner 2049 — neon on black, holographic cyan, warm interior practicals."

  ridley_scott_teal:
    description: "Teal-dominated shadows, warm but not orange highlights, slightly desaturated overall. Epic and atmospheric."
    contrast: "moderate"
    saturation: "teal_biased"
    best_for: "epic historical, sci-fi, atmospheric editorial, dark commercial"
    prompt_keywords: "Ridley Scott teal grade, teal shadows, muted warm highlights, epic atmospheric"
    cinematic_use: "Gladiator, Kingdom of Heaven — teal shadows with golden sun highlights."

  villeneuve_desaturated:
    description: "Very low saturation, high contrast, deep blacks, intentional color in only one or two hues. Cerebral and monumental."
    contrast: "high"
    saturation: "very_low_selective"
    best_for: "sci-fi, psychological drama, monumental architecture, austere editorial"
    prompt_keywords: "Villeneuve desaturated, low color, deep blacks, cerebral minimal grade"
    cinematic_use: "Arrival, Dune, Blade Runner 2049 — color used sparingly as punctuation."

  la_la_land_cinestill:
    description: "Warm, romantic, slight halation, vivid but not oversaturated. Modern romance with film character."
    contrast: "moderate"
    saturation: "warm_vivid"
    best_for: "romance, musical, date night, nostalgic modern"
    prompt_keywords: "La La Land warm grade, romantic halation, golden highlight glow, modern film romance"
    cinematic_use: "La La Land — warm amber nights, pastel costume colors, halation on streetlights."

  sin_city_noir:
    description: "Near black and white with selective saturated colors. High contrast. Graphic novel intensity."
    contrast: "very_high"
    saturation: "near_mono_with_accents"
    best_for: "crime noir, graphic novel aesthetic, high drama editorial"
    prompt_keywords: "Sin City selective color, near black and white with color accent, ultra high contrast noir"
    notes: "Extends the accented achromatic concept to its extreme. Only 1-2 colors appear in the frame."

  # --- Genre & Mood Specific ---
  horror_pale:
    description: "Desaturated with green-blue tint, slightly lifted blacks for a milky shadow, pale skin tones."
    contrast: "moderate"
    saturation: "low_cool_green"
    best_for: "horror, thriller, dark fantasy, suspense"
    prompt_keywords: "horror pale grade, desaturated green tint, cool sickly shadows, pale skin tone"
    cinematic_use: "The Ring, The Others — pale, cold, drained of life."

  romance_soft_glow:
    description: "Very warm, low contrast, slight highlight diffusion and bloom. Intimate and forgiving."
    contrast: "low"
    saturation: "warm_soft"
    best_for: "romance, reunion, intimate moment, warm emotional"
    prompt_keywords: "romantic soft glow, warm diffusion, low contrast bloom, intimate warm haze"
    notes: "The diffusion/haze hides skin imperfections and creates a dreamy quality."

  documentary_natural:
    description: "No visible grading. True-to-life color, moderate contrast, natural skin tones. The invisible grade."
    contrast: "moderate"
    saturation: "true_to_life"
    best_for: "documentary, news, interview, brand authenticity, reality"
    prompt_keywords: "natural documentary grade, true to life colors, no visible color grade, authentic"
    notes: "The hardest grade because every color must feel correct without calling attention to the grading."

  high_fashion_contrast:
    description: "Deep blacks, punchy saturated accent colors, slightly desaturated skin. Edgy, magazine-ready."
    contrast: "high"
    saturation: "selective_punchy"
    best_for: "editorial fashion, high-end magazine, luxury brand, avant-garde"
