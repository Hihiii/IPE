# =============================================================================
# COLOR PSYCHOLOGY — quick reference for emotional color associations
# =============================================================================
color_psychology:
  red:
    emotion: "passion, danger, energy, urgency, excitement, appetite"
    best_for: "call to action, food, sports, romance, warning"
    notes: "The most attention-grabbing color. Use sparingly for maximum impact."

  blue:
    emotion: "trust, calm, professional, cold, clean, authority"
    best_for: "corporate, tech, medical, finance, security"
    notes: "The most universally liked color. Safe but can feel cold."

  yellow:
    emotion: "optimism, warmth, caution, clarity, playful"
    best_for: "children, food, retail, creative, caution"
    notes: "High visibility. Can feel cheap if not paired with grounding colors."

  green:
    emotion: "nature, growth, health, wealth, envy, freshness"
    best_for: "organic, wellness, environment, finance, food"
    notes: "Versatile. Ranges from fresh lime to deep forest."

  purple:
    emotion: "luxury, creativity, mystery, spirituality, royalty"
    best_for: "beauty, luxury, creative, spiritual, anti-aging"
    notes: "Historically associated with royalty. Feels premium."

  orange:
    emotion: "warmth, enthusiasm, affordability, vitality, fun"
    best_for: "budget brands, food, call to action, autumn, youth"
    notes: "Friendly and energetic. Less aggressive than red."

  pink:
    emotion: "feminine, gentle, romantic, sweet, youthful"
    best_for: "beauty, baby, wedding, sweets, fashion soft"
    notes: "Ranges from soft blush to vibrant magenta."

  black:
    emotion: "luxury, power, sophistication, mystery, authority"
    best_for: "luxury, high-end, night, formal, minimal"
    notes: "The most powerful neutral. Creates contrast and weight."

  white:
    emotion: "purity, clean, simple, modern, minimal, empty"
    best_for: "healthcare, tech, minimalist, wedding, editorial"
    notes: "Creates space and breathe. Can feel sterile if overused."

  gray:
    emotion: "neutral, practical, timeless, corporate, mature"
    best_for: "corporate, professional, industrial, modern"
    notes: "Safe but can feel boring. Best with an accent color."

  brown:
    emotion: "earthy, reliable, grounded, warm, rustic"
    best_for: "organic, outdoor, comfort, vintage, wood products"
    notes: "Feels natural and authentic. Pairs well with green."

  gold:
    emotion: "premium, wealth, success, celebration, quality"
    best_for: "luxury, award, premium product, celebration"
    notes: "Metallic gold implies value. Use as accent, not dominant."


# =============================================================================
# SATURATION STRATEGIES — how to distribute color intensity across the frame
# =============================================================================
saturation_strategies:
  full_color:
    description: "All colors at their natural saturation. No suppression or emphasis."
    effect: "natural, neutral, documentary"
    best_for: "e-commerce, catalog, documentation"

  selective:
    description: "Key subject saturated, background or secondary elements desaturated. Focuses attention."
    effect: "directed, editorial, premium"
    best_for: "editorial, product hero, portrait where the outfit/face is the focus"
    prompt_keywords: "selective saturation, desaturated background, saturated subject"

  muted:
    description: "All colors slightly desaturated. Sophisticated, restrained."
    effect: "elegant, calm, premium, understated"
    best_for: "luxury, fine art, editorial, architecture"
    prompt_keywords: "muted colors, restrained saturation, sophisticated desaturated"

  vibrant:
    description: "All colors pushed beyond natural saturation. Energetic, punchy."
    effect: "energetic, bold, colorful, impactful"
    best_for: "food, fashion, travel, children, sports"
    prompt_keywords: "vibrant colors, high saturation, punchy, colorful popping"

  desaturated:
    description: "Overall low saturation, approaching monochrome. Minimalist."
    effect: "minimal, serious, modern, dramatic"
    best_for: "fine art, dramatic portrait, architectural, conceptual"
    prompt_keywords: "desaturated, low saturation, almost monochrome, washed"

  hyper_saturated:
    description: "Extremely pushed saturation. Intentional unrealism."
    effect: "fantastical, surreal, dreamlike, intense"
    best_for: "fantasy, surreal art, music, festival, creative"
    prompt_keywords: "hyper saturated, intense colors, surreal color, unreal saturation"

  split_saturation:
    description: "Warm colors saturated, cool colors desaturated (or vice versa). Creates temperature emphasis."
    effect: "cinematic, controlled, atmospheric"
    best_for: "cinematic portrait, storytelling, editorial with mood"
    prompt_keywords: "split saturation, warm saturated cool muted, selective temperature"

# =============================================================================
# AUTOREVISE DECISION LAYER — color choices for prompt enhancement
# =============================================================================
# These sections are intended to help the enhancer choose, translate, compress,
# and protect color decisions rather than merely list palettes.

color_role_system:
  purpose: "Assign every major color a visual job so prompts do not become decorative color lists."
  roles:
    dominant:
      description: "The main visible color family occupying the largest visual area."
      typical_ratio: "60%"
      prompt_function: "sets the global emotional temperature and scene identity"
      examples: ["warm ivory background", "deep navy environment", "soft beige interior"]
    secondary:
      description: "Supporting color used to shape subject/environment harmony."
      typical_ratio: "30%"
      prompt_function: "supports the dominant hue while adding depth"
      examples: ["champagne fabric", "desaturated teal shadows", "muted olive foliage"]
    accent:
      description: "Small but high-attention color used for focal emphasis."
      typical_ratio: "10%"
      prompt_function: "directs the eye to the hero detail"
      examples: ["red lipstick", "gold logo", "cyan rim light", "emerald jewelry"]
    neutral_anchor:
      description: "Black, white, gray, cream, brown, or stone colors that stabilize the palette."
      prompt_function: "prevents over-saturation and gives premium restraint"
      examples: ["warm gray concrete", "matte black base", "cream limestone"]
    skin_protection:
      description: "Keeps human skin believable when using stylized grades."
      prompt_function: "prevents color grades from contaminating faces and hands"
      add_positive:
        - "natural skin tones preserved"
        - "warm realistic skin undertones"
        - "color grade affects shadows and background more than skin"
      add_negative:
        - "green skin cast"
        - "gray lifeless skin"
        - "oversaturated orange skin"

color_ratio_rules:
  cinematic_default:
    ratio: "60-30-10"
    description: "Balanced color hierarchy for most commercial/editorial images."
    use_when:
      - "single hero subject"
      - "fashion portrait"
      - "product ad"
      - "poster composition"
    prompt_template: "60% {dominant}, 30% {secondary}, 10% {accent}"
  luxury_minimal:
    ratio: "75-20-5"
    description: "Restrained premium palette with very limited accent color."
    use_when:
      - "luxury product"
      - "high-end architecture"
      - "quiet fashion editorial"
      - "minimal brand image"
    prompt_template: "restrained palette dominated by {dominant}, subtle {secondary}, tiny {accent} accent"
  anime_vibrant:
    ratio: "50-35-15"
    description: "More saturated and characterful balance for stylized anime/game visuals."
    use_when:
      - "anime realism"
      - "game key art"
      - "children educational game"
      - "fantasy character design"
    prompt_template: "vibrant but controlled palette: {dominant}, {secondary}, clear {accent} highlights"
  noir_accent:
    ratio: "85-10-5"
    description: "Mostly dark/neutral with a single small color signal."
    use_when:
      - "noir"
      - "psychological poster"
      - "villain portrait"
      - "luxury black product"
    prompt_template: "mostly {dominant} shadows with restrained {secondary} and one sharp {accent} accent"

palette_selection_matrix:
  by_task_profile:
    human_portrait:
      safe_defaults:
        - scheme: "analogous"
          grade: "kodak_portra"
          reason: "flattering skin tones and gentle color harmony"
        - scheme: "soft_warm_light"
          grade: "warm_cream_editorial"
          reason: "beauty/editorial warmth without aggressive saturation"
      avoid_when_unspecified:
        - "mercury_vapor"
        - "hyper_saturated"
        - "neon_cyberpunk on skin unless explicitly requested"
    fashion_editorial:
      safe_defaults:
        - scheme: "monochromatic"
          grade: "high_fashion_contrast"
          reason: "clean visual hierarchy and premium restraint"
        - scheme: "accented_achromatic"
          grade: "cool_silver_modern"
          reason: "magazine-cover clarity with strong accent control"
    product_ad:
      safe_defaults:
        - scheme: "split_complementary"
          grade: "neutral_pro"
          reason: "controlled contrast without distracting from product color"
        - scheme: "golden_analogous"
          grade: "vintage_warm"
          reason: "luxury warmth for cosmetics, fragrance, jewelry, premium goods"
    architecture:
      safe_defaults:
        - scheme: "earthy_organic"
          grade: "neutral_pro"
          reason: "material-accurate architectural rendering"
        - scheme: "soft_warm_light"
          grade: "warm_cream_editorial"
          reason: "premium residential/interior atmosphere"
    cinematic_poster:
      safe_defaults:
        - scheme: "high_contrast_warm_cool"
          grade: "teal_orange"
          reason: "immediate blockbuster readability"
        - scheme: "accented_achromatic"
          grade: "noir"
          reason: "iconic dramatic poster language"
    educational_game_ui:
      safe_defaults:
        - scheme: "pastel"
          grade: "pastel_soft"
          reason: "low cognitive load and friendly readability"
        - scheme: "triadic"
          grade: "neutral_pro"
          reason: "playful but organized color grouping"
    hidden_object_scene:
      safe_defaults:
        - scheme: "polychromatic"
          grade: "documentary_natural"
          reason: "many object colors remain distinguishable"
        - scheme: "analogous"
          grade: "neutral_pro"
          reason: "keeps dense scenes readable without chaos"
      required_guardrail:
        - "maintain object color separation and readable silhouettes"

palette_conflict_resolution:
  first_priority: "explicit user color constraints"
  second_priority: "brand colors and exact logo/product colors"
  third_priority: "subject natural color accuracy, especially skin, food, product, architecture materials"
  fourth_priority: "selected visual mood or cinematic grade"
  rules:
    explicit_color_wins:
      trigger: "User names a required color such as red dress, blue car, Coca-Cola red."
      action: "Preserve that color as hard lock; choose supporting palette around it."
    brand_color_wins:
      trigger: "Known brand/product color is mentioned."
      action: "Do not replace brand colors with cinematic grade; apply grade to lighting/background instead."
    skin_tone_wins:
      trigger: "Human subject with photorealistic or editorial intent."
      action: "Protect natural skin undertones even under teal/orange, neon, or bleach bypass grades."
    material_accuracy_wins:
      trigger: "Architecture, product design, food, vehicle, jewelry."
      action: "Do not let grading destroy material identity such as marble veining, wood warmth, metal reflectance."
    style_grade_is_adjustable:
      trigger: "Color grade conflicts with hard lock."
      action: "Move the grade into shadows/background, reduce saturation, or change to a safer analogous palette."

skin_tone_protection:
  photorealistic:
    add_positive:
      - "natural skin tones preserved"
      - "subtle warm undertones in skin"
      - "healthy realistic skin color"
      - "color grade mainly affects background and shadows"
    add_negative:
      - "green or cyan skin cast"
      - "overly orange skin"
      - "gray lifeless skin"
      - "plastic waxy skin"
  anime_realism:
    add_positive:
      - "clean luminous skin with soft natural blush"
      - "skin tones harmonized with the palette"
    add_negative:
      - "muddy skin shading"
      - "oversaturated blush"
  high_contrast_grade:
    required_guardrail:
      - "keep face readable"
      - "avoid losing eye and lip color detail in shadows"
  neon_grade:
    required_guardrail:
      - "colored rim light on edges, not full-face color contamination"

material_color_behavior:
  glass:
    color_behavior: "Color appears through absorption, transparency, reflection, and edge thickness."
    add_positive:
      - "colored glass with brighter edges and darker thick areas"
      - "clean specular highlights"
      - "subtle refraction without destroying label readability"
    risks:
      - "label text distortion"
      - "dirty reflections"
      - "light equipment reflected in glass"
  metal_gold:
    color_behavior: "Gold is defined by metallic reflectance, not flat yellow."
    add_positive:
      - "metallic gold sheen"
      - "warm reflective highlights"
      - "darker amber shadows in gold surface"
    add_negative:
      - "flat yellow paint"
      - "plastic-looking gold"
  marble:
    color_behavior: "Base color plus natural veining; should not become noisy."
    add_positive:
      - "subtle natural veining"
      - "soft polished reflections"
      - "controlled contrast in stone pattern"
    add_negative:
      - "overly busy veins"
      - "random cracked texture"
  fabric:
    color_behavior: "Color changes across folds due to drape, sheen, and shadow."
    add_positive:
      - "color variation along fabric folds"
      - "soft highlight on raised folds"
      - "deeper tone in fabric valleys"
  neon:
    color_behavior: "Color should emit light and tint nearby surfaces."
    add_positive:
      - "colored glow spilling onto nearby edges"
      - "wet reflective surfaces catching neon color"
    add_negative:
      - "flat colored objects without glow"

prompt_color_translation:
  purpose: "Convert abstract color decisions into renderable prompt language."
  translations:
    complementary:
      weak: "complementary palette"
      stronger: "warm subject tones contrasted against cooler background shadows"
    analogous:
      weak: "analogous color harmony"
      stronger: "closely related hues with soft transitions and no harsh color breaks"
    monochromatic:
      weak: "monochromatic palette"
      stronger: "single hue family with varied brightness and saturation for depth"
    selective_saturation:
      weak: "selective saturation"
      stronger: "mostly muted scene with the hero accent color remaining vivid"
    teal_orange:
      weak: "teal and orange grade"
      stronger: "warm natural skin highlights balanced by cool teal shadows in the background"
    pastel:
      weak: "pastel colors"
      stronger: "low-saturation high-luminance colors with gentle contrast and airy softness"
    luxury_warm:
      weak: "luxury warm palette"
      stronger: "cream, champagne, muted gold, soft brown, and restrained black accents"

semantic_color_deduplication:
  purpose: "Compress redundant color adjectives into precise color language."
  clusters:
    warm_luxury:
      redundant_terms: ["warm", "golden", "amber", "champagne", "luxurious", "premium", "elegant"]
      compressed_as: "warm champagne-gold luxury palette"
    cool_modern:
      redundant_terms: ["cool", "silver", "blue", "gray", "modern", "clean", "minimal"]
      compressed_as: "cool silver-blue modern palette"
    soft_romantic:
      redundant_terms: ["soft", "pink", "blush", "dreamy", "romantic", "gentle", "pastel"]
      compressed_as: "soft blush-pastel romantic palette"
    dark_cinematic:
      redundant_terms: ["dark", "moody", "dramatic", "noir", "black", "shadowy", "high contrast"]
      compressed_as: "dark high-contrast noir palette"
    neon_future:
      redundant_terms: ["neon", "cyberpunk", "glowing", "cyan", "magenta", "futuristic"]
      compressed_as: "cyan-magenta neon cyberpunk palette"

brand_color_handling:
  exact_brand_color:
    description: "Brand colors should be preserved as hard locks, not replaced by cinematic grading."
    add_positive:
      - "brand color remains accurate and dominant on logo/product"
      - "cinematic grade applied to environment, not logo"
    add_negative:
      - "shifted logo hue"
      - "incorrect brand color"
      - "random color variation on brand mark"
  text_and_logo:
    description: "If text/logo must appear, keep its color high-contrast and uncluttered."
    add_positive:
      - "clean high-contrast logo area"
      - "uncluttered background behind text"
    add_negative:
      - "low-contrast text"
      - "text blended into background"
      - "malformed typography"

accessibility_and_readability:
  purpose: "Keep images readable for UI, education, posters, and text-heavy layouts."
  rules:
    text_overlay:
      add_positive:
        - "clear negative space behind text"
        - "high contrast between text area and background"
        - "low-detail background in the text zone"
      add_negative:
        - "busy texture behind text"
        - "low contrast typography zone"
    children_education:
      add_positive:
        - "bright but not oversaturated colors"
        - "clear object color separation"
        - "friendly high-luminance palette"
      add_negative:
        - "muddy colors"
        - "dark low-contrast UI"
        - "tiny color-coded details"
    hidden_object:
      add_positive:
        - "distinct color zones"
        - "objects separated by hue and value"
        - "balanced density without color chaos"
      add_negative:
        - "uniform muddy palette"
        - "too many same-colored objects"

scene_context_color_presets:
