    tracking_side:
      generator_prompt: "side-tracking cinematic feel, motion direction clearly horizontal, background suggests movement while subject remains readable"
      best_for:
        - vehicle
        - running
        - street_scene
    handheld_subtle:
      generator_prompt: "subtle handheld realism, slight observational imperfection, authentic documentary energy without blur"
      best_for:
        - lifestyle
        - documentary
        - candid_scene
      avoid:
        - "uncontrolled motion blur"
        - "crooked accidental framing"

