# =============================================================================
# FILM GRAMMAR PATTERNS
# =============================================================================

film_grammar_patterns:
  establishing_shot:
    purpose: "Introduce the location, scale, atmosphere, and world context."
    generator_prompt: "wide establishing view, location-first composition, subject integrated into the environment, strong sense of place and scale"
    best_for:
      - city_scene
      - architecture
      - fantasy_world
      - travel_campaign
      - hidden_object_scene
    risks:
      - "subject may become too small"
      - "identity may be lost"
    corrective_terms:
      - "subject remains readable"
      - "clear scale reference"
      - "environment supports the hero element"
    compression_phrase: "wide establishing view with clear scale and readable subject"

  master_shot:
    purpose: "Show subject, environment, and action relationship in one coherent frame."
    generator_prompt: "cinematic master shot with full scene blocking visible, subject and environment spatially connected, readable action path"
    best_for:
      - group_scene
      - interior_action
      - game_scene
      - film_still
    risks:
      - "too much empty space"
      - "weak first read"
    corrective_terms:
      - "clear hero-first hierarchy"
      - "supporting elements stay secondary"
    compression_phrase: "cinematic master shot with clear scene blocking"

  insert_shot:
    purpose: "Focus on a story detail that carries information."
    generator_prompt: "cinematic insert shot, close detail emphasized, hero detail sharp, background softened into context"
    best_for:
      - product_detail
      - jewelry
      - hands
      - weapon_detail
      - clue_or_symbol
    risks:
      - "context may disappear"
      - "hands may deform"
    corrective_terms:
      - "detail remains sharp and readable"
      - "natural hands if present"
    compression_phrase: "cinematic insert detail with sharp hero focus"

  over_the_shoulder:
    purpose: "Create perspective, conversation, or voyeuristic depth."
    generator_prompt: "over-the-shoulder cinematic framing with soft foreground shoulder or silhouette, subject in midground, spatial relationship clearly visible"
    best_for:
      - conversation
      - mirror_scene
      - subject_observing_another_subject
      - cinematic_dialogue
    risks:
      - "foreground may block subject"
      - "extra body parts may appear"
    corrective_terms:
      - "foreground softly blurred"
      - "main subject unobstructed"
      - "clean body silhouette"
    compression_phrase: "over-the-shoulder framing with unobstructed subject"

  profile_shot:
    purpose: "Graphic side-view showing elegance, tension, or introspection."
    generator_prompt: "clean side-profile composition, elegant silhouette, strong facial outline, background supporting the subject’s direction of gaze"
    best_for:
      - luxury_portrait
      - fashion
      - character_psychology
      - poster_design
    risks:
      - "flat depth"
      - "nose/lips may distort"
    corrective_terms:
      - "clean facial outline"
      - "subtle depth behind profile"
    compression_phrase: "clean side-profile silhouette with elegant depth"

  silhouette_shot:
    purpose: "Reduce subject to iconic shape against bright background."
    generator_prompt: "strong readable silhouette against a brighter background, rim-lit outline, clear recognizable shape, minimal internal detail"
    best_for:
      - hero_entrance
      - sunset_scene
      - mystery
      - epic_poster
    risks:
      - "identity details may be lost"
      - "subject may become black blob"
    corrective_terms:
      - "recognizable silhouette"
      - "subtle edge detail"
      - "key identity cues remain visible"
    compression_phrase: "strong readable silhouette with rim-lit identity cues"

  foreground_reveal:
    purpose: "Use foreground obstruction to reveal or frame the subject."
    generator_prompt: "soft blurred foreground elements partially frame the scene, subject revealed in sharp midground, background supports atmosphere"
    best_for:
      - romantic_scene
      - spy_scene
      - street_scene
      - cinematic_film_still
    risks:
      - "foreground may become clutter"
      - "subject may be hidden"
    corrective_terms:
      - "foreground remains soft and non-distracting"
      - "subject clearly visible"
    compression_phrase: "soft foreground reveal framing a clear subject"

  frame_within_frame:
    purpose: "Use doorways, windows, mirrors, arches, vehicles, or architecture to contain the subject."
    generator_prompt: "frame-within-frame composition, subject visually contained by architectural or environmental edges, strong depth and intentional negative space"
    best_for:
      - architecture_interior
      - emotional_portrait
      - film_still
      - luxury_editorial
    risks:
      - "AI may turn frame into unwanted door/window"
      - "subject may be boxed too tightly"
    corrective_terms:
      - "comfortable margins around subject"
      - "environmental frame does not crop the subject"
    compression_phrase: "frame-within-frame composition with comfortable subject margins"

  reaction_shot:
    purpose: "Show a subject responding emotionally to something implied off-screen."
    generator_prompt: "cinematic reaction shot, subject’s expression is the first read, gaze directed toward an implied off-screen event, background remains secondary"
    best_for:
      - narrative_portrait
      - emotional_scene
      - film_still
    risks:
      - "unclear gaze direction"
      - "expression may become generic"
    corrective_terms:
      - "clear eye direction"
      - "specific emotional expression"
      - "subtle story context"
    compression_phrase: "cinematic reaction shot with clear off-screen gaze"

  two_shot:
    purpose: "Show relationship between two subjects."
    generator_prompt: "cinematic two-shot, both subjects clearly visible, spatial relationship readable, balanced blocking with one dominant emotional focus"
    best_for:
      - dialogue
      - couple_scene
      - rivalry
      - mentor_student
    risks:
      - "faces may merge"
      - "hierarchy may be unclear"
    corrective_terms:
      - "separate silhouettes"
      - "clear primary emotional focus"
      - "no merged faces or limbs"
    compression_phrase: "cinematic two-shot with separate silhouettes and clear relationship"

# =============================================================================
# BLOCKING AND SCENE STAGING
# =============================================================================

blocking_and_scene_staging:
  subject_blocking_roles:
    hero_subject:
      purpose: "The primary subject should dominate attention."
      add_positive:
        - "hero subject is the first visual read"
        - "supporting elements remain secondary"
        - "clear silhouette and readable pose"
    observer_subject:
      purpose: "Subject is watching or reacting to something."
      add_positive:
        - "gaze direction implies off-screen story"
        - "body angle supports the line of attention"
    environmental_subject:
      purpose: "Subject is part of a larger world."
      add_positive:
        - "subject integrated into the environment"
        - "scale relationship remains clear"
    symbolic_subject:
      purpose: "Subject represents memory, emotion, or theme."
      add_positive:
        - "symbolic visual motifs support the subject"
        - "metaphor remains visually readable"

  blocking_depth_patterns:
    shallow_stage:
      description: "Subject close to background; graphic and poster-like."
      best_for:
        - poster_hero
        - fashion_editorial
        - product_ad
      add_positive:
        - "graphic subject-background relationship"
        - "clean silhouette"
      avoid:
        - "flat background unless intentionally minimal"

    deep_stage:
      description: "Clear foreground, midground, background; cinematic depth."
      best_for:
        - film_still
        - hidden_object_scene
        - street_scene
        - architecture_interior
      add_positive:
        - "clear foreground, midground, and background separation"
        - "subject sharp in midground"
        - "background adds story context"
      avoid:
        - "foreground blocking the hero subject"

    diagonal_blocking:
      description: "Subjects or objects form diagonal energy across the frame."
      best_for:
        - action_scene
        - fashion_pose
        - vehicle_motion
      add_positive:
        - "diagonal visual energy guiding the eye through the frame"
        - "dynamic pose readable against background"
      avoid:
        - "random tilted horizon unless Dutch angle is requested"

    triangular_blocking:
      description: "Three visual anchors create stable cinematic grouping."
      best_for:
        - group_scene
        - family_scene
        - product_with_props
        - poster_layout
      add_positive:
        - "triangular visual arrangement with clear hierarchy"
        - "primary subject at the strongest point"
      avoid:
        - "equal-weight clutter"

  gaze_and_eye_line:
    direct_to_camera:
      effect: "confrontational, iconic, commercial, or intimate."
      add_positive:
        - "direct eye contact"
        - "viewer-facing emotional connection"
    looking_off_frame:
      effect: "narrative, contemplative, implies unseen story."
      add_positive:
        - "gaze directed toward an implied off-screen event"
        - "negative space supports the direction of gaze"
    looking_at_object:
      effect: "establishes object importance."
      add_positive:
        - "eye line leads toward the hero object"
        - "viewer’s eye follows gaze to the object"
    downcast:
      effect: "quiet, vulnerable, introspective."
      add_positive:
        - "soft downcast gaze"
        - "subtle introspective emotion"

# =============================================================================
# MOTIVATED LIGHTING AND PRACTICAL SOURCES
# =============================================================================

motivated_lighting_cinematography:
  purpose: "Ensure cinematic lighting appears to come from plausible visual sources."
  source_types:
    window_light:
      visible_source: "window, curtain, glass wall, doorway"
      generator_prompt: "soft directional window light, visible or implied window source, natural shadow direction"
      best_for:
        - bridal
        - bedroom_editorial
        - architecture_interior
        - lifestyle
      avoid:
        - "impossible light direction"

    practical_lamp:
      visible_source: "table lamp, wall sconce, pendant, candle, lantern"
      generator_prompt: "warm practical light visible in the scene, gentle local glow, light direction consistent with lamp position"
      best_for:
        - night_interior
        - wabi_sabi_lobby
        - restaurant_scene
        - cozy_room
      avoid:
        - "lamp visible but light direction contradicts it"

    neon_sign:
      visible_source: "neon sign, LED screen, city signage"
      generator_prompt: "colored practical neon light grazing edges, wet reflections, natural skin tone preserved on face"
      best_for:
        - cyberpunk
        - rainy_night_city
        - music_video
      avoid:
        - "full-face color contamination"
        - "random unreadable neon text"

    fire_or_candle:
      visible_source: "fireplace, candle, torch, lantern"
      generator_prompt: "warm flickering firelight, soft orange highlights, deep surrounding shadows with readable subject edges"
      best_for:
        - fantasy
        - historical_scene
        - ritual_scene
        - cozy_interior
      avoid:
        - "over-orange skin"
        - "crushed shadows"

    screen_light:
      visible_source: "phone, monitor, holographic interface, arcade screen"
      generator_prompt: "cool screen glow on face or hands, visible source screen, realistic falloff into surrounding darkness"
      best_for:
        - tech_product
        - AI_phone
        - cyberpunk_room
        - gaming_scene
      avoid:
        - "screen glow overpowering the subject"
        - "unreadable UI unless requested"

    moonlight:
      visible_source: "night sky, window opening, exterior cool source"
      generator_prompt: "cool moonlit ambience with soft blue edge light and selective warm practical contrast"
      best_for:
        - night_film_still
        - mystery
        - romantic_night
      avoid:
        - "blue wash destroying skin tone"
        - "subject disappearing into darkness"

  generator_prompt_rule:
    - "If a visible practical source is present, light direction must support it."
    - "If no practical source is visible, describe the visible effect rather than equipment."
    - "Do not add visible lamps, candles, neon, or screens unless they support the scene and do not conflict with user constraints."

