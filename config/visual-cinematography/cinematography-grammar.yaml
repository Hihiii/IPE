  surreal_psychological:
    director_meaning: "Stylized symbolic film language showing inner state or fragmented memory."
    generator_prompt: "surreal psychological cinematic composition with symbolic visual motifs, controlled asymmetry, reflective or fragmented surfaces, and emotionally charged color contrast"
