# =============================================================================
# CINEMATOGRAPHY GRAMMAR — AUTOREVISE ENHANCED
# Purpose:
#   Convert high-level film grammar into generator-visible visual storytelling.
#   This file controls narrative shot language, scene blocking, film-still logic,
#   visual reveals, motivated light, camera movement implication, and edit-ready
#   prompt phrases for cinematic image generation.
# =============================================================================

cinematography_grammar:
  film_still:
    purpose: "Make the image feel like a frame from a movie, not a posed photo."
    add_positive:
      - "cinematic film still"
      - "naturalistic blocking"
      - "motivated lighting"
      - "subtle story moment"
      - "foreground, midground, and background depth"
    add_negative:
      - "flat studio pose"
      - "empty background"
      - "overly staged composition"

  hero_reveal:
    purpose: "Introduce a subject with power and dramatic presence."
    best_for:
      - character_poster
      - sports_poster
      - fantasy_warrior
      - luxury_vehicle
    add_positive:
      - "dramatic hero reveal"
      - "strong silhouette"
      - "rim light outlining the subject"
      - "low-angle cinematic composition"

  motivated_lighting:
    purpose: "Scene light appears to come from visible or believable sources."
    add_positive:
      - "motivated practical lighting"
      - "visible warm lamp sources"
      - "light direction consistent with the environment"

# =============================================================================
# AUTOREVISE CINEMATOGRAPHY SYSTEM
# =============================================================================

autorevise_cinematography_system:
  role: "Narrative and film-language layer for prompt enhancement."
  phase_usage:
    phase_1_intent_analysis:
      - "detect whether the prompt asks for movie still, poster, commercial ad, documentary realism, game screen, or visual concept"
      - "extract narrative beat, subject role, emotional state, and visual hierarchy"
      - "flag whether cinematic grammar should be subtle, balanced, strong, or disabled"
    phase_2_cinematic_enrichment:
      - "select one primary cinematic grammar pattern and optional secondary support pattern"
      - "map the selected grammar to composition, lighting, lens, exposure, mood, and motion decisions"
      - "translate director language into generator-visible visual effects"
    phase_3_scene_blueprint:
      - "define blocking, spatial layers, implied camera position, practical light motivation, and story beat"
    phase_3_5_prompt_package:
      - "place cinematic grammar in composition, style_and_lighting, atmosphere, and background categories"
    phase_4_self_review:
      - "detect cinematic contradictions: staged pose vs film still, poster layout vs candid scene, unreadable drama, unmotivated lighting"
    phase_4_5_compression:
      - "compress film grammar into one or two decisive phrases"
    phase_5_final_prompt:
      - "include only generator-visible cinematic language, not film theory explanation"

  core_principles:
    - "Cinematic does not mean more effects; it means story, motivated light, spatial depth, and intentional blocking."
    - "Use one dominant cinematic grammar pattern per final prompt."
    - "Do not stack every film term; choose the pattern that supports the user’s task."
    - "If the task is UI, education, product packshot, or architecture documentation, cinematic grammar must not harm readability or accuracy."
    - "A film still should feel like a captured story moment; a poster should feel designed and iconic."
    - "Practical lights, weather, windows, screens, neon signs, and fire should explain the light direction whenever possible."

master_level_shooting_discipline:
  purpose: >
    Turn professional photography and cinematography knowledge into visible image
    decisions without dumping equipment lists into the final prompt. Use this when
    a short user prompt needs expansion into a richer, precise, high-quality image prompt.
  universal_rules:
    - "Choose one camera position and make subject scale, perspective, and background depth consistent with it."
    - "Choose one dominant light motivation and keep highlight, shadow, rim, and reflection behavior coherent."
    - "Use background layers to support the subject, not compete with it."
    - "Describe material response through visible behavior: skin texture, fabric weave, glass reflection, metal edge highlight, product label clarity."
    - "Use lens language only when it changes perspective, compression, working distance, depth of field, or distortion control."
    - "If text, labels, faces, hands, product geometry, or architecture matter, prioritize clarity over shallow depth, dramatic shadow, or foreground obstruction."
  professional_recipes:
    portrait_editorial:
      visible_prompt: >
        master-level portrait photography, eye-level or slightly below eye-level camera,
        natural facial micro-expression, clean catchlights, soft directional key light,
        gentle shadow shape, realistic skin texture, background depth kept subordinate
      protect:
        - "face"
        - "eyes"
        - "jaw/neck/shoulder structure"
        - "skin tone and texture"
      avoid:
        - "dead eyes"
        - "plastic skin"
        - "forced grin"
        - "busy background behind the head"
    full_body_fashion:
      visible_prompt: >
        high-end fashion editorial photography, controlled full-body framing, readable
        pose silhouette, coherent body balance, fabric texture visible, clean floor
        contact, elegant background separation
      protect:
        - "full body silhouette"
        - "hands"
        - "feet"
        - "outfit shape"
        - "fabric material"
      avoid:
        - "cropped feet"
        - "warped legs"
        - "melted hands"
        - "fabric hiding anatomy errors"
    product_commercial:
      visible_prompt: >
        premium commercial product photography, precise product geometry, controlled
        reflections, readable label area, clean negative space, material-first lighting,
        background texture separated from product edges
      protect:
        - "product shape"
        - "label"
        - "logo"
        - "surface finish"
        - "edge definition"
      avoid:
        - "unreadable label"
        - "warped product geometry"
        - "random props"
        - "overdark shadows"
    poster_or_cover:
      visible_prompt: >
        poster-grade visual hierarchy, iconic hero subject, clear title-safe region,
        readable face or product detail, controlled atmosphere, background scale that
        supports the headline area
      protect:
        - "hero identity"
        - "title-safe area"
        - "text hierarchy when requested"
        - "subject silhouette"
      avoid:
        - "no-text contradiction when title is requested"
        - "busy masthead area"
        - "random fake cover copy"
    vehicle_hero:
      visible_prompt: >
        professional automotive hero photography, controlled low angle, clean wheel
        geometry, crisp body-panel reflections, readable grille and headlights, motion
        energy kept behind the vehicle silhouette
      protect:
        - "vehicle proportions"
        - "wheels"
        - "front grille"
        - "reflections"
      avoid:
        - "warped wheels"
        - "bent body panels"
        - "speed effects covering the car"
    vehicle_rain_speed:
      visible_prompt: >
        professional high-speed rainy-night automotive tracking shot, sharp panned
        vehicle body, recognizable grille and headlight geometry, wheels carrying
        controlled rotation blur, wet road lines streaking with the camera pan,
        tire spray thrown outward and backward from the contact patches, headlights
        aimed forward and diffused through rain mist without crossing the car body
      protect:
        - "vehicle identity and body proportions"
        - "front grille and symmetrical headlights"
        - "wheel shape and tire contact"
        - "forward headlight beam direction"
        - "water spray direction"
      avoid:
        - "static parked pose"
        - "diagonal spotlight crossing the vehicle"
        - "floating tires"
        - "dry tire contact during rain"
        - "water spray without tire source"
        - "blurred car body"
    architecture_interior:
      visible_prompt: >
        architectural editorial photography, straight verticals, controlled perspective,
        window-motivated light, readable room layout, material junctions visible,
        uncluttered foreground and balanced negative space
      protect:
        - "straight verticals"
        - "room scale"
        - "material junctions"
        - "window highlight detail"
      avoid:
        - "fisheye warp"
        - "tilted walls"
        - "overly cinematic darkness hiding layout"
  compression_rule: >
    In the final prompt, keep the visible photographic decision and remove redundant
    equipment names unless the user explicitly asked for gear.

