    compression_phrase: "poster-grade hero composition with strong silhouette and title-safe negative space"

  commercial_hero:
    director_meaning: "Clean advertisement framing with product or subject clarity."
    generator_prompt: "commercial hero image with precise visual hierarchy, clean readable subject, controlled reflections, and deliberate negative space for layout"
    visible_effects:
      - "first read is the product, face, or brand element"
      - "surfaces are clean and sellable"
      - "background is premium but subordinate"
      - "composition supports text or campaign layout"
    best_for:
      - product_ad
      - fashion_campaign
      - beauty_ad
      - luxury_brand_visual
    avoid:
      - "unreadable label"
      - "overly cinematic darkness hiding product"
      - "random props"
      - "visual clutter"
    compression_phrase: "commercial hero image with clean hierarchy and controlled layout space"

  documentary_observational:
    director_meaning: "Natural, grounded, less polished, believable captured moment."
    generator_prompt: "observational documentary-style framing, natural light behavior, imperfect lived-in environment, and authentic candid subject presence"
