# =============================================================================
# CINEMATOGRAPHY CONFLICT RESOLUTION
# =============================================================================

cinematography_conflict_resolution:
  film_still_vs_poster:
    conflict: "User asks for both cinematic film still and poster/cover layout."
    resolution:
      - "If text, logo, title, or campaign use is mentioned, poster/commercial layout wins."
      - "If narrative moment or natural scene is emphasized, film still wins."
      - "Use film-still lighting inside poster layout only if it does not reduce title-safe space."
    final_prompt_fix: "poster-grade visual hierarchy with cinematic film-still lighting and clear title-safe negative space"

  cinematic_dark_vs_readability:
    conflict: "Dark cinematic mood conflicts with product label, UI, architecture, outfit, or hidden objects."
    resolution:
      - "Keep dark atmosphere in background and shadows."
      - "Use selective highlights on required details."
      - "Never sacrifice hard-locked readability."
    final_prompt_fix: "dark cinematic atmosphere with selective highlights keeping the hero detail readable"

  naturalistic_blocking_vs_fashion_pose:
    conflict: "Natural film-still blocking conflicts with deliberate fashion editorial pose."
    resolution:
      - "Fashion/editorial task wins for pose intentionality."
      - "Use cinematic depth and motivated light, but keep pose deliberate and clean."
    final_prompt_fix: "editorial fashion pose with cinematic depth and motivated light"

  practical_light_vs_clean_product:
    conflict: "Visible practical lights may add clutter to a clean product advertisement."
    resolution:
      - "Use practical-light-inspired gradient without adding visible lamps unless user requested environment."
      - "Keep reflections controlled and label readable."
    final_prompt_fix: "warm motivated glow without visible lighting equipment or distracting lamps"

  epic_scale_vs_subject_identity:
    conflict: "Wide epic scale may make the subject too small."
    resolution:
      - "If subject identity matters, use medium-wide heroic framing instead of extreme wide."
      - "Keep identity cues readable."
    final_prompt_fix: "medium-wide epic scale with readable identity cues"

  hidden_object_vs_bokeh:
    conflict: "Cinematic shallow depth conflicts with hidden object readability."
    resolution:
      - "Use deep layered composition instead of shallow bokeh."
      - "Preserve readable objects across the frame."
    final_prompt_fix: "deep-focus layered scene with cinematic atmosphere and readable hidden objects"

  architecture_drama_vs_perspective_accuracy:
    conflict: "Dramatic film angle conflicts with architectural accuracy."
    resolution:
      - "Straight verticals and controlled perspective win."
      - "Add drama through light, atmosphere, and material contrast, not warped geometry."
    final_prompt_fix: "cinematic architectural lighting with straight verticals and controlled perspective"

  ui_vs_cinematic_mood:
    conflict: "Cinematic mood conflicts with UI clarity."
    resolution:
      - "Gameplay readability wins."
      - "Use mild cinematic polish only in background or soft shadows."
    final_prompt_fix: "clear gameplay-readable UI with subtle cinematic polish"

# =============================================================================
# CINEMATOGRAPHY FAILURE TAXONOMY
# =============================================================================

cinematography_failure_taxonomy:
  cinematic_word_only:
    symptoms:
      - "prompt says cinematic but no visible film grammar"
      - "image looks generic or posed"
    likely_causes:
      - "cinematic used as empty adjective"
      - "no blocking, light motivation, depth, or story beat defined"
    fix:
      - "add one clear film grammar pattern"
      - "define story beat, spatial layers, and motivated light"
    add_positive:
      - "cinematic film-still composition with natural blocking and motivated light"
    add_negative:
      - "generic posed studio shot"

  overcinematic_fx:
    symptoms:
      - "random lens flares, smoke, particles, or explosions"
      - "subject becomes secondary to effects"
    likely_causes:
      - "cinematic interpreted as visual FX overload"
      - "too many dramatic mood terms"
    fix:
      - "reduce FX"
      - "restore subject hierarchy and motivated atmosphere"
    add_positive:
      - "controlled cinematic atmosphere, subject remains first visual read"
    add_negative:
      - "random visual effects, excessive lens flare, distracting particles"

  unmotivated_lighting:
    symptoms:
      - "light direction does not match visible source"
      - "scene feels artificial or inconsistent"
    likely_causes:
      - "practical light mentioned but not tied to direction"
      - "multiple conflicting light sources"
    fix:
      - "define a plausible source and visible light behavior"
    add_positive:
      - "light direction consistent with the visible source"
    add_negative:
      - "incoherent light direction"

  staged_not_film_still:
    symptoms:
      - "subject looks like a studio pose instead of a narrative moment"
      - "background has no story relevance"
    likely_causes:
      - "film_still requested but no story beat or blocking"
    fix:
      - "add subtle story moment and naturalistic blocking"
    add_positive:
      - "caught in a subtle story moment, naturalistic blocking"
    add_negative:
      - "overly staged pose"

  unreadable_dark_cinema:
    symptoms:
      - "dramatic shadows hide required subject details"
      - "product label, face, outfit, UI, or architecture unreadable"
    likely_causes:
      - "low-key/noir language applied without readability guardrails"
    fix:
      - "add selective highlights and readable shadows"
    add_positive:
      - "selective highlights keeping the hero detail readable"
    add_negative:
      - "crushed unreadable shadows"

  confused_film_vs_poster:
    symptoms:
      - "image lacks either story moment or graphic poster hierarchy"
      - "text area cluttered by film-still details"
    likely_causes:
      - "film_still and poster_hero both used without priority"
    fix:
      - "choose dominant layout according to use case"
    add_positive:
      - "poster-grade hierarchy with cinematic lighting"
    add_negative:
      - "busy title area"

  weak_blocking:
    symptoms:
      - "subjects and props appear randomly placed"
      - "no relationship between subject and environment"
    likely_causes:
      - "missing blocking roles and depth staging"
    fix:
      - "define hero, support, foreground/midground/background"
    add_positive:
      - "clear hero-first blocking with supporting elements secondary"
    add_negative:
      - "random prop placement"

  cinematic_depth_hurts_task:
    symptoms:
      - "bokeh or foreground hides UI, hidden objects, outfit, or label"
    likely_causes:
      - "film-still depth applied to a readability-first task"
    fix:
      - "use deep-focus layered composition"
    add_positive:
      - "deep layered scene with all required details readable"
    add_negative:
      - "excessive bokeh hiding important details"

# =============================================================================
# CINEMATOGRAPHY COMPRESSION RULES
# =============================================================================

cinematography_compression_rules:
  max_patterns_in_final_prompt:
    normal: 1
    expert: 2
    debug: 4

  keep_priority:
    - "primary cinematic grammar pattern"
    - "story beat if relevant"
    - "motivated light source"
    - "blocking / depth staging"
    - "task-specific readability guardrail"

  remove_first:
    - "film theory labels not visible in image"
    - "redundant cinematic adjectives"
    - "multiple similar drama terms"
    - "equipment names"
    - "secondary patterns that do not support the task"

  semantic_deduplication:
    cinematic_cluster:
      redundant_terms:
        - "cinematic"
        - "filmic"
        - "movie-like"
        - "film grade"
        - "dramatic film still"
      compressed_as: "cinematic film-still composition"

    story_cluster:
      redundant_terms:
        - "narrative"
        - "storytelling"
        - "scene moment"
        - "subtle story"
      compressed_as: "subtle story moment"

    depth_cluster:
      redundant_terms:
        - "foreground"
        - "midground"
        - "background"
        - "layered depth"
        - "spatial depth"
      compressed_as: "layered foreground-midground-background depth"

    hero_cluster:
      redundant_terms:
        - "heroic"
        - "powerful"
        - "dramatic hero"
        - "iconic subject"
      compressed_as: "iconic hero composition"

  compressed_phrases:
    film_still: "cinematic film-still moment with natural blocking and motivated light"
    poster_hero: "poster-grade hero composition with strong silhouette and title-safe space"
    commercial_hero: "commercial hero image with clean hierarchy and controlled layout"
    noir: "noir tension with selective highlights and readable shadows"
    epic: "epic cinematic scale with atmospheric depth"
    intimate: "intimate cinematic close scene with quiet emotional focus"
    hidden_object: "dense but organized cinematic scene with readable visual zones"
    architecture: "cinematic architectural depth with straight verticals and realistic light motivation"
    educational_ui: "gameplay-readable UI with subtle cinematic polish"

# =============================================================================
# MODEL OUTPUT MODE CINEMATOGRAPHY STYLE
# =============================================================================

model_output_mode_cinematography_style:
  chatgpt_image:
    style: "natural language, visually explicit, one or two cinematic phrases maximum"
    prefer:
      - "cinematic film-still moment with natural blocking"
      - "motivated light from visible window/practical source"
      - "layered foreground-midground-background depth"
    avoid:
      - "technical screenplay jargon"
      - "too many shot names"
      - "camera rig terminology"

  stable_diffusion:
    style: "compact positive tags plus separate negative prompt"
    prefer:
      - "cinematic film still"
      - "naturalistic blocking"
      - "motivated lighting"
      - "foreground midground background depth"
    negative_prompt_candidates:
      - "overly staged"
      - "random lens flare"
      - "unmotivated lighting"
      - "busy title area"
      - "unreadable shadows"

  midjourney:
    style: "short aesthetic composition phrases"
    prefer:
      - "cinematic film still"
      - "hero poster composition"
      - "motivated practical lighting"
      - "layered depth"
    avoid:
      - "long YAML-style constraints"
      - "too many repair phrases"

  flux:
    style: "clear semantic ordering and concrete visual effect language"
    prefer:
      - "subject first, then blocking, then light motivation, then atmosphere"
    avoid:
      - "abstract film theory without visible rendering cues"

  image_edit:
    style: "preserve locked visual attributes; change only requested cinematic dimension"
    prefer:
      - "keep subject identity and composition unchanged unless explicitly edited"
      - "apply cinematic lighting/blocking only to editable attributes"
    avoid:
      - "rewriting the whole image"

  video_prompt:
    style: "add story beat, camera movement implication, and motion-ready staging"
    prefer:
      - "stable first frame"
      - "clear subject silhouette"
      - "parallax-ready foreground/midground/background"
      - "consistent light source for motion"
    avoid:
      - "tangled limbs"
      - "ambiguous spatial layers"
      - "text unless required"

# =============================================================================
# CINEMATOGRAPHY QUALITY RUBRIC
# =============================================================================

cinematography_quality_rubric:
  dimensions:
    cinematic_intent_clarity:
      score_5: "One clear cinematic grammar pattern supports the user task."
      score_3: "Cinematic mood is present but somewhat generic."
      score_1: "Cinematic is only an empty adjective."
    blocking_readability:
      score_5: "Subject, supporting elements, gaze, and spatial layers are clearly staged."
      score_3: "Subject is readable but environment relationship is weak."
      score_1: "Elements feel randomly placed."
    motivated_lighting:
      score_5: "Light direction is visibly motivated by window, practical, neon, screen, sky, or plausible source."
      score_3: "Lighting is attractive but source logic is vague."
      score_1: "Light direction is incoherent."
    task_fit:
      score_5: "Film grammar supports the task without harming readability, product accuracy, UI clarity, or architecture."
      score_3: "Cinematic effect slightly competes with task needs."
      score_1: "Cinematic treatment harms the actual goal."
    compression_quality:
      score_5: "Final prompt uses compact visible film language with no redundant theory terms."
      score_3: "Some repeated cinematic adjectives remain."
      score_1: "Prompt is film-jargon soup."

  minimum_by_task:
    movie_poster:
      cinematic_intent_clarity: 5
      blocking_readability: 4
      task_fit: 5
    product_ad:
      task_fit: 5
      blocking_readability: 4
      motivated_lighting: 4
    educational_game_ui:
      task_fit: 5
      blocking_readability: 5
      cinematic_intent_clarity: 3
    hidden_object_scene:
      blocking_readability: 5
      task_fit: 5
    architecture:
      task_fit: 5
      motivated_lighting: 4
      blocking_readability: 4

# =============================================================================
# PROMPT ASSEMBLY HOOKS
# =============================================================================

prompt_assembly_hooks:
  recommended_order:
    - "subject and task"
    - "cinematic grammar pattern"
    - "blocking / story beat"
    - "composition and spatial depth"
    - "motivated lighting"
    - "lens / exposure / color / material"
    - "task-specific guardrails"
    - "avoid list"

  insertion_rules:
    subject:
      include:
        - "cinematic subject role if relevant"
        - "story beat if it changes subject behavior"
    composition:
      include:
        - "film grammar pattern"
        - "blocking"
        - "depth staging"
    style_and_lighting:
      include:
        - "motivated light source"
        - "film-still / poster / commercial hierarchy"
    atmosphere:
      include:
        - "cinematic mood only if visible and task-relevant"
    constraints:
      include:
        - "readability guardrails"
        - "title-safe area"
        - "no over-FX"
    avoid:
      include_only_if_relevant:
        - "random lens flare"
        - "unmotivated lighting"
        - "overly staged pose"
        - "busy title area"
        - "crushed shadows"
        - "excessive bokeh hiding details"

  final_prompt_rules:
    - "Use one primary cinematography phrase unless expert/debug mode is requested."
    - "Do not include screenplay terminology unless it visibly affects the image."
    - "Do not include multiple contradictory shot grammars."
    - "For product/UI/architecture, cinematic grammar must support clarity, not override it."
    - "For image edit tasks, do not alter locked subject attributes while adding cinematic refinements."
