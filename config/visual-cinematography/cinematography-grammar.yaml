      - "image feels real and unstaged"
      - "environment has believable imperfections"
      - "lighting is natural or available-light motivated"
      - "subject posture feels unforced"
    best_for:
      - lifestyle
      - street_photography
      - travel_scene
      - candid_portrait
    avoid:
      - "overly glossy commercial finish"
      - "perfect symmetrical studio pose"
      - "excessive retouching"
    compression_phrase: "observational documentary framing with authentic candid presence"

  noir_tension:
    director_meaning: "Suspenseful dramatic blocking with controlled shadow and partial information."
    generator_prompt: "noir tension with selective illumination, deep readable shadows, partial silhouette, frame-within-frame depth, and psychologically charged negative space"
    visible_effects:
      - "only key details are illuminated"
      - "shadow shapes create mystery but subject remains readable"
      - "negative space implies threat or uncertainty"
      - "composition feels controlled and tense"
    best_for:
      - thriller
      - mystery_portrait
      - villain_poster
      - night_interior
    avoid:
      - "crushed unreadable blacks"
      - "random horror effects"
      - "face completely lost"
    compression_phrase: "noir tension with selective highlights and readable deep shadows"

  epic_scale:
    director_meaning: "Subject appears small or heroic against a large world."
    generator_prompt: "epic wide cinematic scale, subject integrated into a vast environment, atmospheric depth, strong foreground-to-background perspective, and monumental spatial contrast"
    visible_effects:
      - "environment scale is immediately clear"
      - "subject has dramatic relationship to surroundings"
      - "depth haze or atmospheric layering adds distance"
      - "composition emphasizes grandeur"
    best_for:
      - fantasy_landscape
      - architecture_exterior
      - travel_campaign
      - hero_journey_scene
    avoid:
      - "tiny unreadable subject if identity matters"
      - "flat backdrop"
      - "scale inconsistency"
    compression_phrase: "epic wide cinematic scale with atmospheric depth"

  intimate_close_scene:
    director_meaning: "Close emotional scene with controlled detail and small spatial cues."
    generator_prompt: "intimate cinematic close scene, close framing, quiet emotional focus, soft environmental cues, shallow spatial depth, and expressive micro-detail"
    visible_effects:
      - "viewer attention goes to face, hands, eyes, or detail"
      - "background is present but soft"
      - "emotion feels contained and personal"
      - "small gestures carry narrative weight"
    best_for:
      - emotional_portrait
      - romantic_scene
