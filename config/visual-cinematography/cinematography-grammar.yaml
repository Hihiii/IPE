generator_visible_cinematography_translation:
  film_still:
    director_meaning: "A still frame from a larger scene, natural yet visually composed."
    generator_prompt: "cinematic film-still composition with naturalistic blocking, motivated light direction, layered foreground-midground-background depth, and a subtle story moment"
    visible_effects:
      - "subject appears caught in a believable moment rather than posing"
      - "environment supports the story without feeling decorative"
      - "light direction has a visible source or plausible motivation"
      - "foreground and background create spatial depth"
    best_for:
      - cinematic_portrait
      - narrative_scene
      - photorealistic_cosplay
      - quiet_emotional_scene
      - street_scene
    avoid:
      - "flat studio pose"
      - "random dramatic effects"
      - "overly centered passport-photo framing"
      - "empty background with no story cues"
    compression_phrase: "cinematic film-still moment with natural blocking and motivated light"

  poster_hero:
