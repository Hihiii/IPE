    fill:
      source: "none or minimal ambient"
      ratio: "8:1 or greater key-to-fill for deep shadow"
      effect: "deep dramatic shadows, selective visibility"
    rim:
      source: "subtle rim on shadow side to define edge"
      effect: "prevents subject from merging into dark background"
    background:
      treatment: "dark or black, lit only by key spill, heavy vignette"
    generator_compressed: "single-source dramatic editorial key, deep chiaroscuro shadows, selective illumination on face and garment, controlled spill, dark background, premium avant-garde fashion feel"
    avoid:
      - "subject unreadable in shadow"
      - "face too dark"
      - "garment silhouette lost"
      - "unintentional horror lighting"

fashion_lighting_selection_guide:
