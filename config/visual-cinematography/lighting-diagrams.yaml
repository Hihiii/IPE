lighting_failure_taxonomy:
  equipment_rendered_in_scene:
    symptoms:
    - visible softbox
    - light stand appears
    - reflector board in image unintentionally
    likely_causes:
    - equipment name included in final prompt
    - reflective subject picks up studio terms
    fix:
    - remove equipment terms
    - replace with visible lighting effect
    - add no studio equipment visible
  flat_cinematic_lighting:
    symptoms:
    - image says cinematic but looks evenly lit
    - no depth or separation
    likely_causes:
    - cinematic used without light direction
    - no rim/separation
    - no shadow ratio
    fix:
    - add key direction
    - add controlled shadow side
    - add rim or background separation
  overdramatic_unreadable_shadows:
    symptoms:
    - face too dark
    - product label unreadable
    - hidden objects impossible to see
    likely_causes:
    - low-key style applied to readability-critical task
    fix:
    - add soft fill
    - lower contrast
    - protect hero element visibility
  skin_color_contamination:
    symptoms:
    - face turns blue/magenta/green
    - unnatural skin tone
    likely_causes:
    - colored neon or gel described across entire scene
    fix:
    - natural skin tone on face
    - colored light only on rim/background
    - neutral face fill
  glass_label_glare:
    symptoms:
    - label hidden by reflection
    - text warped or unreadable
    likely_causes:
    - strong specular highlights not controlled
    - glass material under-specified
    fix:
    - label unobscured by glare
    - clean glass reflection
    - controlled edge highlights
  muddy_low_key:
    symptoms:
    - dark image lacks detail
    - black areas crush subject shape
    likely_causes:
    - low-key with no edge light or fill
    fix:
    - add narrow rim highlight
    - retain shadow detail
    - separate subject from background
  excessive_bloom_halation:
    symptoms:
    - washed-out face
    - lost fabric detail
    - unreadable architecture
    likely_causes:
    - too many glow, haze, bloom terms
    fix:
    - subtle highlight halation
    - controlled bloom
    - preserve texture detail
  incoherent_light_direction:
    symptoms:
    - shadows point different ways
    - window light contradicts face highlight
    likely_causes:
    - multiple light sources without hierarchy
    fix:
    - single dominant key direction
    - motivated practical sources
    - consistent shadow direction
lighting_compression_rules:
  purpose: Compress rich lighting design into generator-effective final prompt language.
  semantic_clusters:
    soft_beauty_cluster:
      redundant_terms:
      - soft light
      - diffused light
      - gentle light
      - smooth shadow
      - beauty light
      compressed_as: soft diffused beauty light with smooth facial shadows
    cinematic_depth_cluster:
      redundant_terms:
      - cinematic lighting
      - dramatic light
      - rim light
      - separation light
      - depth
      compressed_as: cinematic key light with controlled shadows and rim separation
    golden_hour_cluster:
      redundant_terms:
      - golden hour
      - warm sunlight
      - sun glow
      - hair halo
      - backlight
      compressed_as: warm golden-hour backlight with soft face fill
    neon_night_cluster:
      redundant_terms:
      - neon
      - cyberpunk light
      - cyan magenta
      - wet reflections
      - night glow
      compressed_as: cyan-magenta neon rim light over wet night reflections
    product_control_cluster:
      redundant_terms:
      - controlled light
      - studio lighting
      - specular highlights
      - rim highlight
      - label light
      compressed_as: controlled product lighting with clean highlights and legible label
  final_prompt_lighting_order:
  - motivated source or key direction
  - light quality
  - shadow/contrast behavior
  - rim or separation if needed
  - material-specific highlight behavior
  - guardrail for hero visibility
  remove_first:
  - equipment names
  - duplicate soft/diffused adjectives
  - technical ratios if already visually described
  - unnecessary Kelvin values
  - modifier dimensions
  keep_if_critical:
  - key direction
  - face visibility
  - label legibility
  - material highlight character
  - rim separation for dark subjects
  - natural skin tone protection
lighting_conflict_resolution:
  rules:
    readability_over_mood: If the task requires reading text, labels, UI, or hidden objects, reduce contrast and preserve
      hero element visibility even if the mood is low-key.
    natural_skin_over_colored_grade: For human portraits, colored lights may affect rim, hair, clothing, and background, but
      the main face plane should retain believable skin tone unless the user explicitly requests stylized color wash.
    material_truth_over_color_style: Reflective or transparent material needs controlled highlight behavior before aggressive
      grading.
    single_dominant_key: When multiple light sources are mentioned, select one dominant key and make all other sources fill,
      rim, accent, or background.
    motivated_light_for_film_still: For cinematic film stills, prefer light that appears to come from believable scene sources
      over abstract studio terms.
    game_readability_over_film_noir: For educational games or hidden-object scenes, broad readability beats dramatic shadows.
lighting_quality_rubric:
  score_5:
  - Lighting has clear source direction and believable motivation.
  - Subject is readable with controlled shadow detail.
  - Light quality matches task and material.
  - Hero element receives priority illumination.
  - No equipment terms leak into final prompt unless intentionally requested.
  - Color temperature supports mood without contaminating protected subjects.
  score_3:
  - Lighting is visually pleasant but source direction is vague.
  - Subject is visible but depth or separation is weak.
  - Some technical terms remain but are not catastrophic.
  - Mood is supported but not fully integrated with material or composition.
  score_1:
  - Lighting is generic, contradictory, or unreadable.
  - Prompt names equipment instead of visible effects.
  - Hero element is hidden by glare, shadow, bloom, or color contamination.
  - Multiple unmotivated light sources fight each other.
