  wedding_backlight:
    scene: 唯美逆光婚紗 — Dreamy Wedding Backlight
    fps: 24fps
    shutter: 180° standard
    aperture: f/1.2
    aperture_rationale: 焦段 85mm，圍繞新人進行緩慢軌道圓弧運動。f/1.2 創造奶油般融化的背景。摘除遮光罩刻意迎接陽光直射製造耀光（lens flare）。
    rig_modifiers: 手持大白板（large portable white reflector for eye catch light）+ 遮光罩拆除
    lighting: 主光：夕陽黃金小時（Golden Hour）逆光。補光：正前手持大白板補眼神光。耀光對比：摘除遮光罩刻意讓陽光射入。
    ratio: '1:2'
    ai_prompt_matrix: Romantic wedding gown portrait, golden hour backlighting, heavy warm lens flare, dreamlike glow
    prompt_keywords: golden hour wedding, backlight flare, 85mm f1.2, orbital wedding shot, heavy warm flare, catch light
