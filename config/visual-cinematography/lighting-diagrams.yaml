# ------------------------------------------------------------
# FASHION EDITORIAL LIGHTING PRESETS
# Specialized lighting templates for premium fashion and portrait photography.
# Each preset describes a complete lighting scenario with key, fill, rim,
# background treatment, and visible effects.
# ------------------------------------------------------------

fashion_editorial_lighting_presets:
  purpose: "Provide turnkey lighting strategies for premium fashion editorial, beauty, and luxury portrait outputs."
  usage: "Select based on task_profile, garment material, mood, and desired premium feel level."

  editorial_beauty_dish:
    tier: "premium"
    description: "Classic high-end beauty and editorial fashion light. Beauty dish key creates medium-contrast facial modeling with a distinctive center-dot catchlight."
    best_for:
      - beauty_portrait
      - cosmetics_editorial
      - high_fashion_close_up
      - glamour_portrait
    key_light:
      source: "beauty dish key from above and slightly in front"
      height: "45 degrees above eye line"
      distance: "1-1.5m from subject"
      effect: "medium-contrast facial modeling with defined cheekbone shadow, center-dot catchlight both eyes"
    fill:
      source: "large white reflector or subtle fill from below"
      ratio: "3:1 key-to-fill"
      effect: "opens shadow detail without flattening facial structure"
    rim:
      source: "optional narrow strip behind subject (45 degrees off-axis)"
      effect: "fine edge highlight on hair and shoulder line"
    background:
      treatment: "controlled falloff from key side, white or soft gray seamless preferred"
    generator_compressed: "glamorous beauty-dish key light, medium-contrast facial modeling, defined cheek shadows, center-dot catchlights, soft reflector fill, clean background"
    avoid:
      - "flat featureless face"
      - "hard nose shadow touching lip"
      - "overpowered fill erasing all shadow"
      - "plastic skin from over-diffusion"

  editorial_large_softbox:
    tier: "premium"
    description: "Large soft wrap-around key for full-body fashion and editorial. Smooth shadow transition with editorial depth."
    best_for:
      - full_body_fashion
      - editorial_fashion_three_quarter
      - luxury_lifestyle
      - fashion_campaign
    key_light:
      source: "large rectangular softbox (120x120cm or larger) placed close to subject"
      position: "45 degrees key side, slightly above eye line"
      distance: "1-1.5m for wrap-around softness"
      effect: "very soft wrap-around key, smooth shadow transition, large square catchlight"
    fill:
      source: "ambient bounce from white walls or V-flat"
      ratio: "4:1 key-to-fill for editorial contrast"
      effect: "subtle shadow depth without distracting detail loss"
    rim:
      source: "narrow strip softbox from behind key-side (30x120cm)"
      effect: "clean edge definition on fashion silhouette"
    background:
      treatment: "gradient from bright key side to darker shadow side, depth through light falloff"
    generator_compressed: "large soft wrap-around editorial key, smooth shadow falloff, clean rim edge separation, 4:1 contrast ratio, fashion silhouette defined by light"
    avoid:
      - "flat even lighting killing editorial mood"
      - "shadow side completely black"
      - "unflattering shadow under chin"
      - "catchlight too large and distracting"

  editorial_rim_separation:
    tier: "premium"
    description: "Dual-rim high-contrast editorial look. Dark negative fill with precise edge lights for dramatic fashion silhouette."
    best_for:
      - high_contrast_fashion_editorial
      - avant_garde_fashion
      - luxury_editorial_statement
      - dramatic_portrait
    key_light:
      source: "none — silhouette defined by rim lights only"
      effect: "subject interior exposed by ambient or natural light only"
    fill:
      source: "negative fill (black V-flat) on both sides to deepen shadows"
      ratio: "10:1 or greater rim-to-ambient"
      effect: "deep shadow interior with bright edge definition"
    rim:
      source: "dual narrow strip softboxes (30x120cm) behind subject at 135 degrees left and right"
      effect: "two bright edge highlights tracing both sides of body, hair, and garment contour"
    background:
      treatment: "dark or black background, rim lights create separation only on subject edges"
    generator_compressed: "high-contrast editorial dual-rim look, dark interior with bright edge highlights tracing both sides of the silhouette, negative fill deepening shadows, black background"
    avoid:
      - "subject interior completely black and unreadable"
      - "rim light spilling onto face"
      - "catchlight lost in shadow"
      - "garment detail completely hidden"

  luxury_portrait_rembrandt:
    tier: "ultra_premium"
    description: "Classic Rembrandt lighting pattern for timeless luxury portraits. The triangle of light on the shadow cheek defines this elegant, painterly look."
