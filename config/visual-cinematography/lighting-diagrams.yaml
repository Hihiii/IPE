  esports_pro:
    scene: 電競職業選手 — Esports Pro
    fps: 24fps
    shutter: 180° (1/50s)
    aperture: f/2.0
    aperture_rationale: 微距急推鎖定瞳孔（macro push to eye）。f/2.0 的極淺景深讓鍵盤與螢幕光暈化作背景散景。
    rig_modifiers: LED 像素燈棒（Pixel Sticks）+ 鍵盤與螢幕實用光
    lighting: 主光：面前鍵盤與螢幕投射藍光（practical screen glow）。輪廓光：頸後兩側交叉紫光。像素燈棒精準控制線條寬度。
    ratio: '1:3'
    ai_prompt_matrix: Esports gamer pro close up, sharp rgb neon underglow, focused intense gaze, futuristic gaming room setup
    prompt_keywords: esports pro portrait, keyboard screen glow, rgb pixel stick rim, purple blue neon, macro eye push, futuristic
      gaming, intense gamer focus
  theater_stage:
    scene: 劇場舞台劇照 — Theater Stage
    fps: static
    shutter: N/A
    aperture: f/2.8
    aperture_rationale: 焦段 200mm，遠距離超長焦捕捉。壓縮背景，讓舞台上的演員彷彿從黑暗中剪出。
    rig_modifiers: 菲涅耳透鏡聚光燈（Fresnel spotlight）+ 完全無補光
    lighting: 主光：舞台唯一高空追光燈（Spotlight）。補光：完全無補光。菲涅耳硬光造成 1:10 絕對高反差，演員周圍完全隱入黑暗。
    ratio: '1:10'
    ai_prompt_matrix: Dramatic theater stage production still, single sharp spotlight hitting the actor, isolated on black
      stage
    prompt_keywords: theater stage portrait, single fresnel spotlight, 200mm telephoto, isolated on black, high contrast 1
      to 10, stage drama, dark ambient
  retro_american_street:
    scene: 歐美復古街頭 — Retro American Street
    fps: static / 24fps
    shutter: 180° standard
    aperture: f/8.0
    aperture_rationale: 大景深，廣角鏡頭 24mm 低視角仰拍。街頭背景與人物皆清晰，建立環境敘事感。
    rig_modifiers: 完全無人工控光幕 — 利用大自然硬光
    lighting: 主光：正午強烈頂陽光（Hard Sunlight）。背景：粗獷的都市水泥建築。不修正陰影，保留 90 年代街拍的真實感。
    ratio: '1:4'
    ai_prompt_matrix: 90s western street style editorial, harsh direct sunlight, vintage grain, dynamic urban angle
    prompt_keywords: 90s street fashion, harsh noon sunlight, 24mm wide angle, low angle urban, vintage grain film, concrete
      background, no fill natural light
  interrogation_room_brutal:
    scene: 高壓審訊室 — Interrogation Room Brutal
    fps: 24
    shutter: 172.8° or 90° sharp shutter for psychological anxiety
    aperture: f/2.8 - f/4.0
    aperture_rationale: 保持眉眼與拷問桌手銬的銳利度。切換窄快門角度（如90°）會讓演員手指的焦慮顫抖顯得極其生硬、神經質。
    rig_modifiers: Bare halogen pendant lamp (懸掛裸鹵素燈泡) + 桌面不銹鋼/白漆回彈
    lighting: 極限單一頂光（Extreme Overhead Top Light）。利用懸掛於角色頭頂正上方的裸露燈泡，讓眉骨陰影完全吞噬眼睛（Skull Eyes Effect），只有當角色抬頭仰望時，瞳孔才會瞬間捕捉到刺眼的高光。
    ratio: '1:12'
    ai_prompt_matrix: Interrogation room interrogation lighting, single harsh overhead industrial lamp, skull shadow eyes,
      oppressive interrogator mood, raw sweat texture
    prompt_keywords: interrogation scene, single overhead bare lamp, skull eye shadow, sharp 90 degree shutter grit, gritty
      concrete counter-reflection, intense psychological contrast
  macro_beverage_splash:
    scene: 商業飲品微距極速飛濺 — Commercial Beverage Splash Macro
    fps: 2000
    shutter: 1/4000s (45° equivalent shutter at 2000fps)
    aperture: f/11 - f/16
    aperture_rationale: 微距鏡頭（Macro Lens）在近距離下的景深會縮減至毫米級。為了讓飛濺的水花冰塊與瓶身標籤同時清晰，必須將光圈縮至 f/11 甚至更小。這意味著進光量呈現毀滅性下降。
    rig_modifiers: 40K Watt DC-driven LED Strobe line array + 鏡面反射板 (Mylar reflectors)
    lighting: 強烈透光（Transillumination / Backlighting）。主光源必須從液體與玻璃瓶身的『後方』射入，讓液體呈現通透、飽和的寶石般光澤。兩側用條形軟盒補出瓶身輪廓的玻璃高光邊（Specular Highlights）。
    ratio: 1:1 symmetrical back-dominant
    ai_prompt_matrix: Ultra high speed macro photography, 2000fps ice cube splashing into amber liquid, translucent backlit
      beverage glass, crisp liquid droplets frozen in mid-air, studio precision
    prompt_keywords: macro beverage splash, 2000fps flicker free, f11 deep macro focus, frozen translucent liquid, backlit
      product hero, specular glass highlight, 1/4000s macro crispness
generator_visible_lighting_translation:
  purpose: Translate human lighting equipment and DP setup language into image-model-visible visual effects. Equipment names
    stay in scene_blueprint; final prompts use visible light behavior.
  translation_principles:
  - Describe what light does to the subject, not the physical tool creating it.
  - Describe direction, softness, falloff, shadow edge, highlight character, catchlights, separation, and motivated source.
  - Avoid equipment names in final_prompt unless the requested image is a behind-the-scenes setup, photography tutorial diagram,
    or studio equipment product shot.
  - For reflective subjects, describe clean reflections and controlled highlight strips instead of naming stripboxes or flags.
  - For human portraits, prioritize face modeling, eye catchlights, skin texture preservation, and natural shadow geometry.
  - For cinematic scenes, tie light direction to believable sources such as windows, neon signs, lamps, fire, screens, sky,
    or streetlights.
  equipment_to_visible_effect:
    octabox_90cm:
      human_reference: medium-large octagonal softbox used as portrait or product key
      generator_prompt: large soft diffused key light with smooth shadow transition and rounded catchlights
      visible_effects:
      - soft cheek modeling
      - smooth skin highlights
      - gentle shadow edge
      - round eye catchlight
      avoid_in_final_prompt:
      - octabox
      - softbox
      - light stand
      - studio flash
    octabox_120cm_or_150cm:
      human_reference: very large softbox for full-body, groups, or cars
      generator_prompt: broad wrap-around soft light with barely visible shadow edge and gentle full-body illumination
      visible_effects:
      - soft full-body contour
      - minimal harsh shadow
      - large smooth highlights
      avoid_in_final_prompt:
      - octabox
      - softbox
    small_softbox_or_square_softbox:
      human_reference: controlled soft source for product, fill, or close-up accent
      generator_prompt: controlled soft directional light with compact smooth highlights
      visible_effects:
      - precise highlight placement
      - soft but defined shadow
      - clean product edge
      avoid_in_final_prompt:
      - softbox
    strip_softbox:
      human_reference: narrow vertical or horizontal soft source for rim and reflective edge highlights
      generator_prompt: narrow elongated edge highlight tracing the subject contour
      visible_effects:
      - thin rim line
      - long clean reflection on glass or metal
      - separated silhouette
      avoid_in_final_prompt:
      - stripbox
      - strip softbox
    beauty_dish:
      human_reference: crisp beauty source for glamour face sculpting
      generator_prompt: glamorous semi-soft frontal light with crisp cheek highlights and defined facial structure
      visible_effects:
      - sparkling eyes
      - defined cheekbones
      - controlled nose shadow
      - polished beauty skin
      avoid_in_final_prompt:
      - beauty dish
    bare_bulb_or_hard_source:
      human_reference: small hard source for sharp shadows and high contrast
      generator_prompt: hard directional light with sharp shadow edges and strong specular highlights
      visible_effects:
      - crisp cast shadow
      - high contrast
      - graphic shape definition
      avoid_in_final_prompt:
      - bare bulb
      - flash head
    v_flat_white_bounce:
      human_reference: large white bounce fill
      generator_prompt: soft bounced fill gently opening the shadow side without flattening contrast
      visible_effects:
      - shadow detail preserved
      - natural low-contrast fill
      - soft ambient lift
      avoid_in_final_prompt:
      - V-flat
      - bounce board
      - reflector
    black_flag_or_negative_fill:
      human_reference: black flag, cutter, or negative fill used to deepen shadows
      generator_prompt: controlled shadow side with rich negative fill and sculpted contrast
      visible_effects:
      - deeper cheek shadow
      - stronger contour
      - premium low-key separation
      avoid_in_final_prompt:
      - flag
      - cutter
      - negative fill panel
    grid_or_snoot:
      human_reference: beam control tool restricting spill
      generator_prompt: focused pool of light with minimal spill and controlled falloff
      visible_effects:
      - isolated highlight
      - dark surrounding area
      - spotlit emphasis
      avoid_in_final_prompt:
      - grid
      - snoot
    gobo:
      human_reference: pattern projection tool
      generator_prompt: patterned shadow texture crossing the background or subject
      visible_effects:
      - window-blind shadows
      - leaf-shadow pattern
      - architectural shadow texture
      avoid_in_final_prompt:
      - gobo
    practical_lamp:
      human_reference: visible lamp or believable scene light
      generator_prompt: warm practical lamp glow motivating the scene light
      visible_effects:
      - warm local glow
      - realistic light motivation
      - cozy falloff
      avoid_in_final_prompt: []
    neon_sign:
      human_reference: visible colored practical source
      generator_prompt: colored neon glow casting cyan and magenta rim light onto wet reflective surfaces
      visible_effects:
      - colored edge light
      - wet reflections
      - night-city atmosphere
      avoid_in_final_prompt: []
    window_light:
      human_reference: large natural daylight aperture
