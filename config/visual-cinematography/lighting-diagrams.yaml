    lighting: 蚌殼光（Clamshell）：上下夾擊消除一切皮下陰影。眼神光呈現完美圓形 ring catcher。白色美人碟創造無瑕質感。
    ratio: '1:1.2'
    ai_prompt_matrix: High fashion magazine cover, flawless clamshell beauty dish lighting, sharp ring catcher in eyes, sharp
      focus
    prompt_keywords: high fashion editorial, clamshell beauty dish, flawless skin, silver reflector fill, ring catch light,
      low angle fashion, f11 full detail
  wong_kar_wai_retro:
    scene: 王家衛復古港風 — Wong Kar-wai Retro
    fps: 24fps
    shutter: slow shutter 1/25s
    aperture: f/1.4
    aperture_rationale: 刻意製造拖影（Motion Streak）。慢快門 + 大光圈讓霓虹燈光在畫面中拉成彩色線條，人物邊緣溶解於光中。
    rig_modifiers: 綠色螢光燈管 + 暖紅色霓虹招牌（practical light sources）
    lighting: 主光：綠色螢光燈管。補光：側邊暖紅色霓虹招牌實用光。撞色互補不追求均勻度，容許高飽和色調在臉上暈開。
    ratio: '1:4'
    ai_prompt_matrix: Wong kar wai style, retro hong kong neon lighting, motion blur streak, high saturation green and red
      amber
    prompt_keywords: wong kar wai style, neon green key light, red neon fill, motion streak, 1/25s shutter drag, high saturation
      color wash, 1990s hong kong
  warm_maternity:
    scene: 溫馨孕婦寫真 — Warm Maternity
    fps: static
    shutter: N/A
    aperture: f/2.0
    aperture_rationale: 柔焦感。平視側身，強調腹部曲線。f/2.0 讓主體銳利而背景柔化為光暈。
    rig_modifiers: 超大柔光牆（massive soft diffusion wall）+ 大型白色反光板
    lighting: 大逆光：超大柔光牆置於主角正後方，邊緣產生神聖的「聖光溢出」。補光：正前方大型白色反光板全漫射。
    ratio: '1:1.2'
    ai_prompt_matrix: Pure warm maternity portrait, massive soft diffuse backlighting, ethereal white glowing rim, high key
    prompt_keywords: maternity portrait, massive soft backlight, ethereal rim glow, white high key, sacred light, belly silhouette,
      gentle warm tone
  gym_aesthetics:
    scene: 健身房力量美學 — Gym Aesthetics
    fps: static / 60fps
    shutter: 1/125s or faster
    aperture: f/2.8
    aperture_rationale: 中景，側位捕捉發力瞬間（peak contraction moment）。f/2.8 在筋肉線條清晰的同時略化背景。
    rig_modifiers: 雙側條形軟盒加蜂巢（dual stripboxes with honeycomb grids）
    lighting: 獾式布光（Badger）：左右雙後側對稱逆光 120°，正前無光。條形軟盒精準裁剪肌肉線條。健身房環境暗場。
    ratio: '1:6'
    ai_prompt_matrix: Athletic fitness portrait, dual rim lights highlighting muscle definition, gym background dark and moody
    prompt_keywords: gym aesthetics, badger dual rim, stripbox muscle definition, dark gym background, peak contraction, fitness
