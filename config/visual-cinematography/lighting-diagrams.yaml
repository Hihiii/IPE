version: 1
purpose: Light modifier dictionary and lighting diagram patterns for cinematic and commercial photography.
modifiers:
  octabox_90cm:
    category: softbox
    shape: octagonal
    size_cm: 90
    light_quality: soft
    shadow_transition: smooth_gradual
    falloff: moderate
    catchlight: octagonal
    best_for:
    - portrait key light
    - product key light
    - beauty and fashion
    prompt_keywords: soft diffused key light, smooth shadow transition, round catchlight
    notes: Most versatile modifier. 90cm is the sweet spot for half-body portraits.
  octabox_90cm_with_diffusion:
    category: softbox
    shape: octagonal
    size_cm: 90
    light_quality: very_soft
    shadow_transition: very_gradual
    falloff: gentle
    catchlight: octagonal_diffused
    best_for:
    - food photography key light
    - delicate product lighting
    - very soft portrait key
    prompt_keywords: extremely soft light, very gradual shadow transition, gentle illumination
    notes: Double diffusion layer makes light even softer than standard octabox. Ideal for reflective surfaces.
  octabox_120cm:
    category: softbox
    shape: octagonal
    size_cm: 120
    light_quality: very_soft
    shadow_transition: very_gradual
    falloff: gentle
    catchlight: large octagonal
    best_for:
    - full-body portrait key
    - car and large product photography
    - wrap-around lighting for groups
    prompt_keywords: very soft wrap-around light, barely visible shadow transition, gentle fill illumination
    notes: Larger modifier = softer light. Use when you want minimal shadow contrast.
  octabox_150cm:
    category: softbox
    shape: octagonal
    size_cm: 150
    light_quality: extremely_soft
    shadow_transition: barely_visible
    falloff: very_gentle
    catchlight: very_large_octagonal
    best_for:
    - full-body fashion
    - car exteriors
    - group of 3+ people
    - wrap-around beauty
    prompt_keywords: extremely soft wrap-around light, almost shadowless illumination, broad gentle light
    notes: Creates the softest modifier light possible. Almost shadowless but retains direction.
  softbox_60x60:
    category: softbox
    shape: square
    size_cm: 60
    light_quality: soft_controlled
    shadow_transition: smooth
    falloff: moderate
    catchlight: square
    best_for:
    - small product photography
    - close-up portraits
    - fill light
    prompt_keywords: controlled soft light, smooth shadow, even directional illumination
    notes: Good balance of softness and control. Suitable for tabletop product shots.
  softbox_30x30:
    category: softbox
    shape: square
    size_cm: 30
    light_quality: soft_precise
    shadow_transition: smooth_compact
    falloff: pronounced
    catchlight: small_square
    best_for:
    - macro product detail
    - jewelry accent light
    - small fill or accent
    - eye catchlight
    prompt_keywords: precise soft accent light, compact catchlight, controlled small-source illumination
    notes: Tiny modifier for tight spaces and small subjects. Still softer than bare bulb.
  softbox_120x120:
    category: softbox
    shape: square_large
    size_cm: 120
    light_quality: very_soft_even
    shadow_transition: very_gradual_even
    falloff: gentle
    catchlight: large_square
    best_for:
    - full-length portrait
    - group photography
    - furniture product
    - large fill source
    prompt_keywords: very even soft light, broad smooth illumination, gentle diffuse shadow
    notes: Square shape gives even light distribution. Excellent as a large fill source.
  strip_softbox_30x120:
    category: softbox
    shape: rectangular
    size_cm: 30x120
    light_quality: soft_directional
    shadow_transition: smooth_narrow
    falloff: controlled
    catchlight: narrow rectangle
    best_for:
    - rim light / edge light
    - hair light
    - full-length body edge separation
    prompt_keywords: narrow rim light, side edge accent, linear catchlight for edge separation
    notes: Excellent for rim lights. The narrow shape controls spill while maintaining softness.
  strip_softbox_60x180:
    category: softbox
    shape: rectangular_extra_long
    size_cm: 60x180
    light_quality: soft_broad
    shadow_transition: smooth_broad
    falloff: controlled_gentle
    catchlight: long_rectangle
    best_for:
    - full-body rim light
    - car edge lighting
    - product edge wrap
    - background light
    prompt_keywords: broad edge accent light, full body rim illumination, side wrap highlight
    notes: Longer than the standard strip. Covers full body height at close distance.
  beauty_dish_white:
    category: beauty_dish
    shape: circular
    size_cm: 60
    light_quality: medium_contrast
    shadow_transition: medium_with_character
    falloff: moderate_to_pronounced
    catchlight: solid_center_dot
    best_for:
    - beauty and glamour portraits
    - fashion editorial
    - commercial beauty product
    prompt_keywords: medium contrast key light, defined shadow with character, fashion editorial feel
    notes: Beauty dish gives more character than a softbox. The white interior softens slightly.
  beauty_dish_silver:
    category: beauty_dish
    shape: circular
    size_cm: 60
    light_quality: high_contrast_with_specular
    shadow_transition: pronounced
    falloff: pronounced
    catchlight: solid_center_dot
    best_for:
    - edgy fashion
    - male portraits
    - high-contrast editorial
    prompt_keywords: high contrast specular key light, defined shadow edge, edgy accent catchlight
    notes: Silver interior increases contrast and specular highlights. Use with grid for control.
  fresnel:
    category: focusable
    shape: circular
    size_cm: 15
    light_quality: hard_to_soft_variable
    shadow_transition: adjustable_beam
    falloff: distance_dependent
    catchlight: small_ring
    best_for:
    - cinematic key light
    - period film look
    - controlled beam spotlight
    - simulating sunlight through windows
    prompt_keywords: hard directional beam light, cinematic contrast, adjustable spotlight effect, chiaroscuro
    notes: Fresnel can spot (hard edge) or flood (softer). Creates the classic cinematic look.
  bare_bulb:
    category: bare
    shape: point
    size_cm: 3
    light_quality: hard_raw
    shadow_transition: sharp_abrupt
    falloff: rapid
    catchlight: small_dot
    best_for:
    - edgy high-contrast
    - stage light effect
    - harsh shadow for character
    prompt_keywords: harsh raw light, high contrast, sharp shadow edge, raw unmodified illumination
    notes: The hardest light. Creates deep, sharp shadows. Use sparingly.
  umbrella_white_through:
    category: umbrella
    shape: circular
    size_cm: 110
    light_quality: soft_wrap_around
    shadow_transition: very_soft_wide
    falloff: gentle
    catchlight: large_round
    best_for:
    - soft wrap-around fill
    - group portraits
    - high-key fashion
    prompt_keywords: very soft wrap-around fill light, gentle shadow, broad diffused illumination
    notes: Produces the softest, most wrapping light. Less controllable than softbox.
  umbrella_reflect_silver:
    category: umbrella
    shape: circular
    size_cm: 110
    light_quality: directional_with_spread
    shadow_transition: moderate_wide
    falloff: moderate
    catchlight: large_round_diffuse
    best_for:
    - fashion full-body key
    - group lighting
    - on-location portable key
    prompt_keywords: directional spread light, moderate shadow edge, high output broad key
    notes: More directional than shoot-through. Silver gives higher contrast than white.
  parabolic_deep:
    category: umbrella
    shape: parabolic_deep
    size_cm: 100
    light_quality: focused_with_wrap
    shadow_transition: smooth_controlled
    falloff: controlled
    catchlight: concentric_rings
    best_for:
    - fashion editorial key
    - beauty with edge
    - controlled wrap effect
    prompt_keywords: focused soft light with wrap, controlled shadow falloff, concentric ring catchlight
    notes: Deep dish gives more direction than standard umbrella. Produces a distinctive concentric ring catchlight.
  ring_light:
    category: ring
    shape: circular_donut
    size_cm: 45
    light_quality: flat_even
    shadow_transition: minimal_wrap
    falloff: even
    catchlight: ring_donut
    best_for:
    - beauty and macro
    - fashion flat lighting
    - social media content
    - catchlight emphasis
    prompt_keywords: even flat light, minimal shadow, donut-shaped catchlight, shadowless illumination
    notes: Creates a distinctive ring catchlight. Very flat, shadowless light.
  ring_light_60cm:
    category: ring
    shape: circular_donut
    size_cm: 60
    light_quality: flat_broad
    shadow_transition: minimal
    falloff: even_gentle
    catchlight: large_ring_donut
    best_for:
    - full-face beauty
    - fashion flat look
    - video content key
    prompt_keywords: broad even light, shadowless illumination, large round catchlight
    notes: Larger ring light spreads light more evenly. Good for video and beauty content.
  hard_reflector_standard:
    category: reflector
    shape: circular
    size_cm: 12
    light_quality: hard
    shadow_transition: sharp
    falloff: rapid
    catchlight: small_dot
    best_for:
    - hard accent light
    - background pattern light
    - adding specular edge
    prompt_keywords: hard accent spot light, sharp shadow, focused narrow beam
    notes: Often used with honeycomb grid for even more directional control.
  kinoflo_4bank:
    category: tube
    shape: rectangular_array
    size_cm: 60x60
    light_quality: soft_even
    shadow_transition: smooth_multi_source
    falloff: gentle
    catchlight: multi_line
    best_for:
    - interviewee key light
    - soft fill in tight spaces
    - even lighting for product flat
    prompt_keywords: even multi-tube soft light, shadowless illumination, even interview key
    notes: Multiple tubes create even, shadowless light. Runs cool. Popular in video production.
  LED_panel_variable:
    category: LED
    shape: rectangular_panel
    size_cm: 30x30
    light_quality: soft_to_hard_variable
    shadow_transition: adjustable
    falloff: controlled
    catchlight: square_panel
    best_for:
    - location documentary key
    - variable temperature portrait
    - travel and run-and-gun
    prompt_keywords: adjustable soft light, variable color temperature, even panel illumination
    notes: Modern LED panels can adjust both brightness and color temperature. Highly versatile.
  scrim_4x4:
    category: diffusion_frame
    shape: rectangular_frame
    size_cm: 120x120
    light_quality: extremely_soft_broad
    shadow_transition: barely_detectable
    falloff: very_gentle
    catchlight: large_diffuse
    best_for:
    - softening hard sunlight
    - large product diffusion
    - portrait wrap
    prompt_keywords: extremely soft broad light, barely detectable shadow, large diffused source illumination
    notes: A diffusion frame placed between light and subject. The larger the frame, the softer the light.
  gobo_cookie:
    category: pattern_projector
    shape: patterned
    light_quality: patterned_shadow
    shadow_transition: varied_by_pattern
    catchlight: none
    best_for:
    - background shadow patterns
    - simulating window light
    - atmospheric texture
    - film noir effect
    prompt_keywords: patterned shadow light, textured background pattern, cookie shadow effect
    notes: A gobo (go-between) placed in front of a light to cast patterned shadows. Classic film noir and atmospheric tool.
  practical_candle:
    category: practical_flame
    shape: point_warm
    size_cm: 2
    light_quality: very_warm_flame
    shadow_transition: soft_flickering
    falloff: rapid
    catchlight: small_warm_dot
    best_for:
    - intimate candlelit scene
    - romantic low light
    - period piece (pre-electric)
    prompt_keywords: warm flame light, intimate low-level illumination, warm flickering glow
    notes: Very low output, very warm (1800K). Shadows are deep and flicker naturally.
  practical_lamp:
    category: practical
    shape: shaded
    size_cm: 30
    light_quality: soft_diffused_throgh_shade
    shadow_transition: soft_directional
    falloff: moderate
    catchlight: varied_by_shade
    best_for:
    - interior scene motivation
    - tabletop product context
    - film and TV motivated source
    prompt_keywords: motivated interior warm light, soft shaded glow, warm directional illumination
    notes: A lamp that appears in the scene as a motivated light source. The shade diffuses the bulb.
  window_south:
    category: window
    shape: rectangular
    size_cm: large
    light_quality: hard_directional
    shadow_transition: sharp_defined
    falloff: distance_dependent
    catchlight: rectangular
    best_for:
    - direct sunlight simulation
    - hard dramatic window light
    - high contrast interior
    prompt_keywords: hard directional window light, sharp shadow, rectangular beam of sunlight
    notes: South-facing window (northern hemisphere) provides the hardest, most directional window light.
  window_north:
    category: window
    shape: rectangular
    size_cm: large
    light_quality: soft_diffused_window
    shadow_transition: soft_gradual
    falloff: gentle_with_distance
    catchlight: soft_rectangular
    best_for:
    - studio painting light
    - soft portrait window light
    - fine art and still life
    prompt_keywords: soft diffused window light, painterly natural illumination, gradual shadow falloff
    notes: North-facing window provides consistent, soft, diffuse light. Preferred by painters and portrait photographers.
  neon_light:
    category: practical_neon
    shape: tube_shaped
    size_cm: varied
    light_quality: hard_colored
    shadow_transition: sharp_colored
    catchlight: line_or_shape
    best_for:
    - urban night exterior
    - cyberpunk color accent
    - motivated color source
    prompt_keywords: colored hard light, urban night glow, saturated electric color accent
    notes: Neon signs serve as both set dressing and motivated colored light sources. Color is determined by the sign.
  lantern_softbox_65cm:
    category: softbox
    shape: spherical
    size_cm: 65
    light_quality: omnidirectional_soft
    shadow_transition: seamless
    falloff: rapid_360_degree
    catchlight: none_or_soft_glow
    best_for:
    - cinematic ambient fill
    - round table conversation
    - walk-and-talk moving key
    prompt_keywords: 360-degree ambient soft light, chinaball illumination, seamless shadowless base fill
    notes: 俗稱燈籠或中國球。360度全向泛光，用來快速建立空間的無方向性基礎低強度面光（Base Fill）。
  optical_spotlight_mount:
    category: pattern_projector
    shape: lens_focused
    light_quality: razor_sharp_hard
    shadow_transition: zero_blur_sharp
    catchlight: sharp_geometric
    best_for:
    - laser-like accent beam
    - ultra-sharp gobo projection
    - fashion graphic geometry
    prompt_keywords: optical snoot projector, razor sharp edge light, laser beam spotlight, geometric light mask
    notes: 帶有鏡片的投影聚光筒（如 Aputure Spotlight）。可塞入切光片（Shutters）切出絕對鋒利的幾何線條，或投射毫無模糊邊緣的 Gobo 圖案。
lighting_patterns:
  cinematic_three_point:
    modifier: fresnel_or_softbox
    lights: 3
    description: Key at 45°, fill opposite, rim/hair behind. Standard film setup.
    best_for: cinematic portrait, film still, interview
    prompt_keywords: three-point lighting, key fill and rim setup, dimensional portrait lighting
  clam_shell:
    modifier: beauty_dish_or_octabox
    lights: 2
    description: Key light above camera, fill light directly below camera, both on center axis.
    best_for: beauty, fashion, glamour
    prompt_keywords: beauty lighting from above and below camera, shadowless centered illumination, fashion flat beauty
  butterfly_paramount:
    modifier: beauty_dish
    lights: 1_plus
    description: Key light directly above and slightly in front of subject. Creates butterfly shadow under nose. Classic Hollywood.
    best_for: glamour, classic portrait, fashion beauty
    prompt_keywords: butterfly shadow under nose, classic Hollywood beauty, high centered key light
    notes: The most flattering pattern for female subjects. Key is high and centered, shadow drops straight down.
  rembrandt:
    modifier: octabox_or_softbox
    lights: 1_plus
    description: Key light at 45° above and to the side, creating triangle highlight on cheek shadow side.
    best_for: portrait, dramatic character
    prompt_keywords: triangle cheek highlight, classic portrait light, dramatic side key with shadow triangle
  loop:
    modifier: softbox_or_octabox
    lights: 1_plus
    description: Key light slightly above eye level at 30-45°, shadow of nose creates small loop on cheek.
    best_for: natural flattering portrait
    prompt_keywords: natural portrait light, slight downward shadow loop, flattering cheek shadow
  split:
    modifier: hard_or_soft_directional
    lights: 1_plus
    description: Key light at 90° to subject, one half fully lit, other half in shadow.
    best_for: dramatic, artistic, male portrait
    prompt_keywords: half shadow half light, dramatic side lighting, sharp face division
  cross_lighting:
    modifier: two_directional
    lights: 2
    description: Two lights at 90° to each other, each lighting one side. Creates dramatic angular shadows.
    best_for: edgy fashion, editorial drama, music portrait
    prompt_keywords: dual side lighting, dramatic crossed beams from both sides, angular shadow
    notes: Both lights are key — there is no fill. Creates high-drama, high-contrast looks.
  underlighting:
    modifier: bare_or_reflector
    lights: 1
    description: Light placed below subject, pointing upward. Creates inverted shadows.
    best_for: horror, thriller, dramatic character, ghost story
    prompt_keywords: light from below, inverted shadows, unnatural unsettling illumination
    notes: Unnatural and unsettling. The shadows are inverted from what we expect. Classic horror trope.
  silhouette:
    modifier: hard_or_bare
    lights: 1
    description: Strong light behind subject, no frontal light. Creates outline.
    best_for: dramatic, artistic, product outline emphasis
    prompt_keywords: backlit subject, rim outline only, no frontal fill, edge-defined shape
  rim_only:
    modifier: strip_softbox_or_hard
    lights: 12
    description: No key or fill. Only rim/edge lights from behind. Subject appears as a glowing outline.
    best_for: dramatic fashion, product edge emphasis, artistic nude
    prompt_keywords: edge light silhouette, no key light, glowing outline, dramatic edge definition
    notes: Extreme version of silhouette where some frontal detail is visible from bounce light.
  overhead_flat_lay:
    modifier: softbox_or_octabox
    lights: 1
    description: Light directly above pointing straight down. Flat, even overhead light.
    best_for: flat lay food, overhead product, tabletop arrangement
    prompt_keywords: top-down lighting, overhead flat illumination, minimal shadow below objects
    notes: The light must be positioned directly above the subject. Creates minimal shadows below objects.
  book_light:
    modifier: softbox_into_vflat
    lights: 1_plus
    description: Light bounced off V-flat or white board, then through a diffusion panel. Extremely soft.
    best_for: softest possible light, fine art, delicate product
    prompt_keywords: bounced soft light, indirect diffused illumination, extremely gentle shadow
  natural_window:
    modifier: window_as_softbox
    lights: 1
    description: Large window as the sole light source. Soft, directional, natural.
    best_for: natural look, lifestyle, interior
    prompt_keywords: natural directional soft light, window daylight, painterly side illumination
  motified_dramatic:
    modifier: fresnel_or_hard_with_gobo
    lights: 2_plus
    description: Key light with gobo/cookie creating shadow patterns, fill for minimal detail. Film noir style.
    best_for: noir, thriller, moody portrait
    prompt_keywords: patterned shadow from gobo, film noir, dramatic shadow texture, cookie pattern light
  mixed_temperature:
    modifier: any_combination
    lights: 2_plus
    description: Warm light (tungsten/CTO) on one side, cool light (daylight/CTB) on the other. Creates temperature contrast.
    best_for: cinematic portrait, urban night, editorial color contrast
    prompt_keywords: warm cool color contrast, two-tone temperature separation, cinematic color lighting
    notes: The ratio of warm to cool creates different moods. Equal parts is graphic; dominant warm with cool accent is natural.
  single_source_hard:
    modifier: fresnel_or_hard_reflector
    lights: 1
    description: Single hard light source. Deep shadows, high drama. No fill.
    best_for: moody portrait, film noir, dramatic product accent
    prompt_keywords: single hard light source, dramatic deep shadows, one-light high contrast
    notes: The most dramatic single-light setup. The entire mood is determined by light placement.
  single_source_soft:
    modifier: octabox_or_large_softbox
    lights: 1
    description: Single large soft source. Gentle shadows, natural falloff, simple and elegant.
    best_for: natural portrait, product hero, minimalist commercial
    prompt_keywords: single large soft source, natural gentle shadows, simple elegant single light
    notes: The safest single-light setup. Position at 45° for natural volume, or 0° for flat beauty.
  eye_light_only:
    modifier: small_LED_or_ring
    lights: 1
    description: Only enough light to create a visible catchlight in the eyes. Everything else falls to near-black.
    best_for: intimate portrait, dramatic beauty, fine art
    prompt_keywords: minimal catchlight in darkness, face defined by tiny source, near-black surroundings
    notes: Extremely low light setup. The rest of the face is defined only by ambient or bounce from the small source.
  kicker_plus_fill:
    modifier: strip_for_kicker_bounce_for_fill
    lights: 2
    description: No traditional key light. One rim/kicker from behind/side, one bounce fill from front.
    best_for: editorial, fashion detail, product edge emphasis
    prompt_keywords: edge light with front bounce, no top key, moody rim-defined face
    notes: The rim light defines shape, the fill opens shadows. Creates a moody but readable image.
  church_window:
    modifier: window_as_hard_source
    lights: 1
    description: A single dramatic window light from above or high on one side. Reminiscent of cathedral lighting.
    best_for: dramatic portrait, fine art, classical still life
    prompt_keywords: dramatic high window light, shaft of light from above, cathedral beam illumination
    notes: A shaft of light illuminating a subject from darkness. The rest of the scene is black.
  neon_practical:
    modifier: neon_sign
    lights: 12
    description: Neon sign as the primary or only light source. Colored hard light with ambiance.
    best_for: night exterior, urban portrait, cyberpunk, music
    prompt_keywords: colored neon light, saturated urban glow, practical source color accent
    notes: The color of the light is determined by the neon sign. Often paired with a cool or warm fill.
  practical_lamp_scene:
    modifier: practical_lamp
    lights: 12
    description: Household lamp as key or motivated source. Creates natural interior mood.
    best_for: interior lifestyle, film and TV motivated, cozy editorial
    prompt_keywords: household lamp interior light, warm shaded glow, motivated cozy illumination
    notes: The lampshade acts as a modifier. Creates warm, familiar light with natural falloff.
  candelight_cinematic:
    modifier: candles
    lights: 1_multiple
    description: One or more candles as the only light source. Extremely warm, intimate, flickering.
    best_for: period film, romantic dinner, intimate scene
    prompt_keywords: candle flame light, warm intimate glow, historical low-light flicker
    notes: Very low light level. The flicker of flames adds organic movement to the light.
  beauty_window:
    modifier: large_window
    lights: 1
    description: Large window placed to create a wrap-around soft effect on the face. The painter's light.
    best_for: portrait, beauty, fine art, lifestyle
    prompt_keywords: painterly window light, wrap-around soft daylight, classical fine-art illumination
    notes: Subject positioned close to the window so light wraps around the face. Rembrandt's preferred lighting.
  cross_keying:
    modifier: two_directional_softboxes_with_grids
    lights: 2
    description: 對角交叉布光。A燈作為演員甲的主光，同時兼任演員乙的逆光；B燈作為演員乙的主光，兼任演員甲的逆光。
    best_for: Over-the-shoulder (OTS) dual conversation scenes, narrative dialogue
    prompt_keywords: cinematic cross-keying, over the shoulder dialogue lighting, dual purpose key and rim
    notes: 電影對話戲的標準解法。極大節省機位調度時間，同時保證雙方在剪輯對切時，面部均有好看的側向立體感。
  negative_fill_shaping:
    modifier: large_black_floppies_or_vflats
    lights: variable (uses ambient or key)
    description: 不增加光，而是利用大面積黑布接近主角暗面，強行吸走環境反射光，製造極致的陰影下沉。
    best_for: High-contrast drama on location with too many white walls
    prompt_keywords: negative fill rendering, heavy jawline contrast, dynamic shadow side shaping
    notes: 當你在一個充滿白牆的房間（如現代辦公室）想拍出深邃感時，補再多光都沒用，你必須用黑旗板『裁切』出陰影。
light_source_types:
  HMI:
    description: Daylight-balanced arc light. Very high output, consistent 5600K. The standard for film production.
    best_for: film and TV key light, daylight fill, exterior
    notes: Expensive, powerful, requires ballast. Creates the most natural daylight simulation.
  tungsten:
    description: Standard incandescent lamp. Warm 3200K. Dims warmer. The classic film light.
    best_for: interior key, period film, warm accent
    notes: Dims to warmer temperatures. Very hot. Being replaced by LED but still preferred for certain looks.
  fluorescent_kinoflo:
    description: Tube-based fluorescent. Soft, even, cool-running. Multiple tubes for output.
    best_for: interview, fill, tight spaces, video
    notes: Runs cool, draws less power. Color can shift with age.
  LED_panel:
    description: Solid-state panel. Variable color temp, dimmable, lightweight. Modern standard.
    best_for: location, documentary, run-and-gun, video, stills
    notes: The most versatile modern source. Can emulate nearly any color temperature.
  strobe_flash:
    description: Short-duration flash. Very high output, daylight balanced. The standard for still photography.
    best_for: commercial studio, portrait, product, fashion
    notes: Freezes motion. Modeling lamp for preview. Output measured in watt-seconds.
  speedlight:
    description: Small shoe-mount flash. Portable, battery-powered. Minimal output but highly portable.
    best_for: event, on-location fill, macro, travel
    notes: Limited power but highly portable. Can be used off-camera wirelessly.
light_control_tools:
  flag_cutter:
    description: Black solid panel used to block light from specific areas. Creates hard shadow edges.
    best_for: negative fill, shaping light, preventing spill
    prompt_keywords: flag blocking light, negative fill, cutting light
  net_single:
    description: Single-layer net scrim. Reduces light by 1 stop without changing quality.
    best_for: reducing light intensity, controlling ratio
    prompt_keywords: single net scrim, 1 stop reduction, light control
  net_double:
    description: Double-layer net. Reduces light by 2 stops.
    best_for: greater light reduction, controlling hot spots
  snoot:
    description: Conical tube that focuses light into a narrow beam. Hard-edged spotlight effect.
    best_for: accent light, hair light, background spot
    prompt_keywords: snoot, focused light beam, narrow accent, spotlight effect
  barndoor:
    description: Adjustable hinged flaps attached to the front of a light. Controls light spread.
    best_for: shaping light falloff, preventing spill, controlling beam width
    prompt_keywords: barndoors, shaping light, controlling beam spread
  honeycomb_grid:
    description: Hexagonal grid that restricts light to a specific beam angle. Reduces spill.
    best_for: controlling light spread, adding directionality, beauty dish grid
    prompt_keywords: honeycomb grid, directional light control, restricted beam
  gel_CTO:
    description: Color Temperature Orange. Warms daylight to tungsten. Full/half/quarter strengths.
    best_for: matching warm practicals, warming daylight sources
    prompt_keywords: CTO gel, warming filter, daylight to tungsten
  gel_CTB:
    description: Color Temperature Blue. Cools tungsten to daylight. Full/half/quarter strengths.
    best_for: matching daylight, cooling tungsten sources
    prompt_keywords: CTB gel, cooling filter, tungsten to daylight
  gel_color:
    description: Saturated color gel. Adds colored light to the scene (red, blue, green, magenta, etc.).
    best_for: motivated color, creative accent, background color
    prompt_keywords: color gel, colored light, saturated accent light
  diffusion_filter:
    description: Filter placed over light to soften it. Various strengths (light frost, heavy frost, opal).
    best_for: softening hard light, reducing contrast
    prompt_keywords: diffusion filter, light softening, diffusion frost
  POLARIZATION:
    description: Linear or circular polarizer. Reduces reflections and glare on non-metallic surfaces.
    best_for: product photography, eliminating reflections, saturating colors
    prompt_keywords: polarizing filter, reduced reflection, glare control
  v_flat_black_white:
    description: 大型摺疊珍珠板。白面用於大面積溫和反光；黑面用於吸光（Negative Fill）以增強面部結構立體感。
    best_for: Studio portrait, control facial shaping, negative fill
    prompt_keywords: negative fill contrast, v-flat shadow shaping
  unbleached_muslin_bounce:
    description: 未漂白高密度平織布。光線打在上面回彈後，會帶有極其迷人、健康且溫暖的膚色調性。
    best_for: Premium cinematic portrait, organic skin tone
    prompt_keywords: warm organic muslin bounce light, golden skin glow
cinematic_genre_lighting:
  film_noir_suspense:
    genre: Film Noir / 黑色電影 / 懸疑
    key_light_position: 90° or 120° back-side — sidelight or backlight
    fill_ratio: no fill or extremely weak bounce — 1:8 to 1:16
    rim_backlight: none — subject's dark side fully merges into shadow
    modifiers: Fresnel lens, honeycomb grid, snoot
    visual_psychology: 制造极端的硬调对比，暗示角色的道德灰色地带与内心恐惧。The extreme contrast ratio visually encodes moral ambiguity — the character
      exists in a world without clear right or wrong.
    prompt_keywords: film noir lighting, hard contrast chiaroscuro, deep shadow no fill, 1:16 ratio, Fresnel hard light, moral
      ambiguity lighting, dark suspense atmosphere
    notes: The absence of fill light is the defining feature. The shadow side is not 'filled' — it is allowed to go to pure
      black. This is the opposite of modern three-point.
  sci_fi_cyberpunk:
    genre: Sci-Fi / Cyberpunk / 科幻霓虹
    key_light_position: 45° front-side, color temperature 3200K with cyan/magenta gel
    fill_ratio: 135° opposite-side at 1:4, contrasting color (e.g., cyan vs orange)
    rim_backlight: strong bilateral rim kickers, high-saturation neon colors
    modifiers: strip softbox with grid, LED pixel tube lights
    visual_psychology: 营造未来科技的疏离感，利用色彩冲突暗示人工环境的压迫。The color collision (warm vs cool) creates visual unease — the viewer feels
      the artificiality of the environment.
    prompt_keywords: cyberpunk lighting, neon rim light, cyan orange contrast, bilateral kicker, sci-fi color collision, LED
      pixel tube, artificial environment lighting
    notes: 'The bilateral rim lights are critical — without them, the subject merges into the dark environment. Color contrast
      does the narrative work: warm subject vs cool world.'
  david_fincher_crime:
    genre: David Fincher 風格 / 低調犯罪
    key_light_position: 45° top-side light (top-side light)
    fill_ratio: large black flag for light absorption — 1:6 effective ratio
    rim_backlight: very weak, outlines shoulder only, color temperature 4500K tungsten with green shift
    modifiers: large octabank with double diffusion, positioned extremely close to subject
    visual_psychology: 压抑、冷静、写实的病态美学。光线边缘过渡极其柔和，但阴影深邃。The softest light edge combined with the deepest shadows creates a clinical,
      obsessive feel — every surface texture is visible, yet the mood is suffocating.
    prompt_keywords: Fincher lighting, top-side key, clinical soft hard contrast, double diffusion octabank, green tinted
      rim, obsessive texture lighting, suffocating atmosphere
    notes: 'Fincher''s signature is the contradiction: the softest possible key light (double-diffused, close) with the darkest
      possible fill (black flag absorbs everything). The result is texture without mercy.'
  high_key_comedy:
    genre: High-Key Comedy / 商業喜劇 / 明亮
    key_light_position: 45° bilateral symmetrical key lights (left dominant, right subordinate)
    fill_ratio: bilateral超大 area fill — 1:1.5 to 1:2
    rim_backlight: comprehensive background light, eliminate all hard shadows
    modifiers: large overhead scrim (12x12),巨型 softbox
    visual_psychology: 消除空间的危险感与未知感，传递轻松、安全、阳光的整体情绪。Every shadow is eliminated because shadows in comedy represent danger
      and uncertainty — a shadowless world is a world without fear.
    prompt_keywords: high key comedy lighting, shadowless illumination, overhead scrim, bilateral symmetrical key, 1:1.5 ratio,
      safe bright atmosphere, no fear lighting
    notes: The goal is zero perceived shadow. Even 'shadows' must be so soft they read as tone variation, not absence of light.
      Overhead scrim provides the base wash, bilateral keys add dimension without contrast.
  roger_deakins_naturalism:
    genre: Roger Deakins 風格 / 柔和自然主義
    key_light_position: Large 90° soft side light, often bounced then diffused again
    fill_ratio: Soft wrap-around fill via passive ambient bounce — 1:3 effective ratio
    rim_backlight: None — fundamentally avoids artificial rim/backlight unless motivated by practicals
    modifiers: Maxi-brute bounced into unbleached muslin, custom soft grids
    visual_psychology: 極致的寫實與人文關懷。光線彷彿完全由空間中的窗戶、檯燈自然延伸，絕無人工雕琢感，讓觀眾毫無防備地沉浸於故事。The light always feels 'earned' and motivated
      by the environment.
    prompt_keywords: Roger Deakins style, motivated soft naturalism, unbleached muslin bounce, soft wrapping side key, realistic
      contrast, no artificial rim
    notes: 狄金斯的精髓在於『隱形（Invisible）』。主光大而柔和，且絕對順應場景邏輯。人物暗面不靠逆光分離，而是靠主體與背景的明暗互襯（Silhouette vs Tone）。
  greig_fraser_brutalist:
    genre: Greig Fraser 風格 / 巨型低反差暗調 (Dune / The Batman)
    key_light_position: Top-down massive soft source / Sky pan illumination
    fill_ratio: Extremely controlled low-key ambient — 1:4 to 1:6
    rim_backlight: Muted edge separation or pure silhouette matching brutalist architecture
    modifiers: Giant overhead diffusion skypans, active LED volume integration
    visual_psychology: 神聖、壓抑、宏大的史詩感。將人物縮小為環境的一部分，利用大面積的柔和暗調（Soft Underexposure）營造歷史的厚重與宿命感。Heavy textural low-key that retains
      shadow detail.
    prompt_keywords: Greig Fraser cinematography, brutalist scale lighting, underexposed soft key, massive overhead diffuse
      wash, moody cinematic texture, Dune aesthetic
    notes: 他的暗調（Low-key）不是硬光造成的黑，而是『整體欠曝的極柔光』。畫面的數位雜訊（Grain）往往會融在陰影裡，形成一種類似油畫的顆粒質感。
  wes_anderson_pastel_flat:
    genre: Wes Anderson 風格 / 扁平對稱色塊
    key_light_position: Dead center front key, or symmetrical bilateral soft key (0° or ±30°)
    fill_ratio: High-key wrap fill — 1:1.2 to 1:1.5
    rim_backlight: Subtle top light to separate hair from highly stylized wallpaper
    modifiers: Large soft overhead ring lights, global ambient diffusion walls
    visual_psychology: 童話般的抽離感、強迫症式的秩序美學。極度扁平（Flat）的光影消除了現實的殘酷與立體感，配合高飽和粉色調，讓銀幕變成精緻的立體繪本。The flat lighting denies depth, forcing
      the eye to focus on symmetry and costume palettes.
    prompt_keywords: Wes Anderson style, dead-center symmetrical lighting, flat pastel high-key, shadowless quirky composition,
      editorial storybook illumination
    notes: 絕不能出現Rembrandt光或強烈側陰影。這裡的光不為『立體感』服務，而是為了『平面圖案化（Graphic Pattern）』服務。
portrait_lighting_patterns:
  rembrandt:
    name: Rembrandt (林布蘭光)
    key_coordinates:
      horizontal_angle: 45
      vertical_angle: 45
      description: 45° side, 45° above looking down. Creates the signature inverted triangle of light on the shadow-side cheek.
    fill_config:
      ratio: 1:3 to 1:4
      position: opposite side, reflector or soft fill
    rim_background_relation: weak backlight. Lit side faces dark background, shadow side faces bright background (contrast法则)
      — the light side pops against dark, the shadow side separates against bright.
    suitable_face_character: Deep-set eyes, high cheekbones. Storytelling gravitas, classical dignity, restraint. The triangle
      represents structure and control — it suits authoritative, mysterious, or wise characters.
    shooting_pitfalls: '倒三角光块的宽度不可超过眼角，长度不可低于鼻翼，否则会破坏结构。The triangle must be contained: width ≤ outer eye corner, length ≥
      nostril. A broken triangle (too wide or too narrow) reads as a lighting mistake, not Rembrandt.'
    prompt_keywords: Rembrandt portrait lighting, 45 degree key, triangle cheek highlight, classic dignified portrait, dramatic
      character light, contrast法则 lighting
  clamshell:
    name: Clamshell (蚌殼式 / 美人光)
    key_coordinates:
      horizontal_angle: 0
      vertical_angle: 45
      description: Directly in front, 45° above tilting down (overhead key). Secondary light from directly below 45° tilting
        up.
    fill_config:
      ratio: '1:1.5'
      position: directly below camera, 45° upward tilt using reflector or weak soft light
    rim_background_relation: strong top-back hair light to separate subject from background. The hair light is critical —
      without it, the subject's head blends into the background tone.
    suitable_face_character: Fashion beauty, female close-up. The wrap fill light大面积填平皮肤瑕疵与眼袋 (fills in skin imperfections
      and under-eye bags). Ideal for commercial beauty where skin perfection is required.
    shooting_pitfalls: 必须严格控制下方补光的强度，若下方强于上方，会变成恐怖片恶魔光 (if lower light is stronger than upper, it becomes horror underlighting).
      The lower light should never exceed 60% of the upper key power.
    prompt_keywords: clamshell beauty lighting, overhead key under fill, fashion beauty portrait, skin perfection light, 1:1.5
      clamshell ratio, hair light separation
  split_lighting:
    name: Split Lighting (分裂光 / 左右臉)
    key_coordinates:
      horizontal_angle: 90
      vertical_angle: 0
      description: Exactly 90° side position, parallel to the subject's gaze. Exactly half the face is lit, half is in shadow.
    fill_config:
      ratio: 1:8 or above (no fill or black flag absorption)
      position: no fill, or black flag on the shadow side to deepen darkness
    rim_background_relation: none, or a single thin rim light on the shadow side to barely define the edge. The shadow side
      should approach pure black.
    suitable_face_character: Dual personality, extreme internal conflict, villain, or hardened realistic character. The literal
      split represents a divided self — the viewer understands instantly that this character has two sides.
    shooting_pitfalls: 摄影机视角若微调，会大幅改变亮暗面比例。建议从正前方或微偏暗面拍摄。A 5° camera shift changes the visible ratio dramatically. Shoot from
      dead center or slightly toward the dark side — never toward the lit side.
    prompt_keywords: split lighting portrait, 90 degree side key, half face shadow, dual personality lighting, villain portrait
      light, no fill hard contrast
  badger_lighting:
    name: Badger Lighting (獾式布光 / 雙逆光)
    key_coordinates:
      horizontal_angle: 120° to 130° bilateral (both sides)
      vertical_angle: 0
      description: Symmetrical dual back-rim lights from 120°-130° on both sides. The face is defined entirely by edge light.
    fill_config:
      ratio: '1:6'
      position: very weak large-area soft light from directly in front as base ambient — just enough to keep center of face
        from going pure black
    rim_background_relation: background fully darkened. The dual edge lights 'cut out' the subject from darkness like scissors
      cutting paper. The subject is defined by absence of background.
    suitable_face_character: Athlete, martial arts action close-up, superhero about to strike, silhouette of power. The double
      rim creates a heroic outline — the subject is too powerful to be fully illuminated, revealed only by their edge.
    shooting_pitfalls: 两侧逆光的强度必须精准同步，且要极力避免光线直接射入镜头导致耀光。Both rim lights must be precisely matched in intensity. Any asymmetry
      breaks the heroic silhouette. Use lens hoods and flag any direct light paths to the lens.
    prompt_keywords: badger lighting, dual rim light portrait, heroic silhouette lighting, 120 degree bilateral rim, athlete
      action light, edge defined character, symmetrical back rim
special_function_lighting:
  greenscreen_vfx:
    scene: Action / VFX Green Screen (綠幕去背)
    key_strategy: Match virtual scene sun position, typically 45° independent hard light
    fill_ambient: Green spill blockers (flags/neg fill) surrounding subject — prevent green light bouncing back onto skin.
      The more green spill on the subject, the harder the key.
    background_special: Green screen must be lit with large-area diffused lights (space lights or softbox array). Each point
      on the green screen must have exposure variance ≤ ±0.5 stops.
    technical_limits:
    - green screen exposure variance ≤ ±0.5 stops across entire surface
    - subject minimum 2.5m distance from green screen to minimize spill
    - green screen lit separately from subject — no light overlap
    dp_master_note: 去背成功的關鍵在於背景無陰影。主體的輪廓光（Rim Light）可微調偏向暖色，用色彩物理學中和邊緣溢出的綠光。The rim light slightly warmed (CTO 1/8) neutralizes
      green edge spill through color physics — complementary warm offsets green.
    prompt_keywords: green screen lighting, VFX key light, spill control, ±0.5 stop green screen, 2.5m subject distance, warm
      rim neutralizes green spill, space light greenscreen
  car_interior_virtual_production:
    scene: Car Interior (夜間車內戲 - LED Wall / 虛擬棚)
    key_strategy: External moving LED light bars (DMX automated) simulating street lamps sweeping past. The motion of light
      is the primary narrative device.
    fill_ambient: Dashboard-mounted micro LED chip lights at 1:2 ratio for low facial fill. These provide the base exposure
      for the actor's face when no external light is hitting them.
    background_special: Large dynamic LED wall or moving light source behind the car simulating rear traffic. The background
      motion establishes the car's speed, not the car itself.
    technical_limits:
    - color temperature must rapidly switch between 2700K (street lamp) and 6000K (tech/cool) depending on passing environment
    - DMX sweep frequency must match the virtual plate playback speed
    dp_master_note: 节（Rhythm）是车戏的灵魂。路灯掠过的频率必须与环境影片（Plate）的速度完全同步，否则会产生强烈的合成假感。The rhythm of light sweep is the唯一 thing that
      sells the car interior illusion — speed is communicated by light frequency, not camera movement.
    prompt_keywords: car interior lighting, DMX LED bar sweep, virtual production car, street lamp rhythm, 2700K 6000K transition,
      dashboard LED fill, car interior LED wall
  high_speed_slow_motion:
    scene: High-Speed Slow Motion (1000fps+ 極速慢動作)
    key_strategy: High-power tungsten (10K/20K watt) or DC-driven professional LED. Consumer AC LEDs WILL flicker at high
      fps.
    fill_ambient: Full-coverage high-power diffusion — shutter speed may reach 1/2000s or faster. At 1000fps with 180° shutter,
      exposure time is 1/2000s. Every stop of shutter increase requires doubling the light.
    background_special: Background must have independent high-brightness lighting. At extreme fps, any shadow cast by the
      moving subject stretches into a massive dark smear across the background.
    technical_limits:
    - ABSOLUTELY NO AC-driven consumer lights — they will produce catastrophic flicker in slow motion
    - 'minimum light output: enough for 1/2000s at ISO 400 at required aperture'
    - DC-driven LED or tungsten only (tungsten is naturally flicker-free)
    dp_master_note: 在高格拍摄中，光量就是一切。每一档快门的提升都代表光量需要成倍增加，现场控温与演员防晒是隐形考量。At 1000fps, the set temperature from 10K tungsten lights
      can exceed 40°C — heat management and actor safety become lighting design constraints.
    prompt_keywords: high speed slow motion lighting, 1000fps flicker free, DC LED slow motion, 10K tungsten high fps, heat
      management lighting, no AC flicker, extreme shutter light output
scene_shooting_recipes:
  red_alert_escape:
    scene: 紅色警報逃生 — Red Alert Escape
    fps: variable ramping 120fps → 24fps
    shutter: sync with fps (1/250s → 1/50s) — maintain 180° rule through the ramp
    aperture: f/5.6
    aperture_rationale: 深景深預留 Z 軸前後形變空間。Subject moving rapidly through corridors means unpredictable Z-axis distance changes
      — deep DOF is the only safe choice.
    rig_modifiers: 三軸穩定器 (3-axis gimbal), DMX 控制台 (DMX lighting console), 黑旗板 (flags for negative fill)
    dp_trap: 途中切回 24fps 時必須維持 180° 快門，利用走廊兩側的動態模糊無限放大速度感。When ramping back to 24fps, the 180° shutter creates natural motion
      blur in the corridor walls — this blur is what sells the speed, not the subject's movement.
    prompt_keywords: red alert escape scene, ramping 120 to 24fps, corridor speed blur, f5.6 deep focus chase, gimbal DMX
      chase, 180 degree shutter ramp
  rainy_neon_chase:
    scene: 雨夜霓虹追逐 — Rainy Night Neon Chase
    fps: 60
    shutter: 45° narrow shutter (1/500s)
    aperture: f/4.0
    aperture_rationale: Balances enough light for 1/500s exposure while maintaining manageable focus on a moving FPV drone
      platform.
    rig_modifiers: FPV 穿越機 (FPV drone), 大型八角罩加蜂巢 (large octabox with honeycomb grid for directional wet-ground reflection
      control), 條形軟盒 (strip softbox for rim)
    dp_trap: 必须严格执行窄快门，才能在慢动作下完美冻结主角皮衣上的雨滴与鞋底溅起的水花粒子。The 45° shutter is non-negotiable — at 60fps with 180° shutter, raindrops
      become continuous streaks instead of individual frozen particles. The narrow shutter is what makes rain visible as discrete
      drops.
    prompt_keywords: rainy night chase, 45 degree shutter rain, FPV drone chase, frozen raindrops, neon wet ground reflection,
      60fps narrow shutter action
  wuxia_duel:
    scene: 傳統武俠對決 — Traditional Wuxia Duel
    fps: 240
    shutter: narrow shutter (1/1000s or faster)
    aperture: f/8.0
    aperture_rationale: 確保刀劍與葉片均在焦內。Fighting subjects move on multiple Z-axes simultaneously (lunging forward, spinning, leaping).
      Only f/8+ can keep sword blade AND falling leaf both sharp.
    rig_modifiers: 電控重型搖臂 (motorized heavy jib arm), 12x12 呎大蝴蝶布 (12x12 overhead silk for soft ambient), 大功率高壓煙霧機 (high-output
      haze machine for light beam visibility)
    dp_trap: 严禁使用普通交流电（AC）灯具补光，否则在 240fps 下会产生毁灭性的画面闪烁（Flicker）。At 240fps, any AC light running at 50/60Hz will produce visible
      flicker. Only DC-driven LED or tungsten (naturally flicker-free) is acceptable. This is the single most common mistake
      in high-speed wuxia.
    prompt_keywords: wuxia duel lighting, 240fps blade capture, f8 deep focus fight, AC flicker warning high fps, jib arm
      martial arts, 12x12 overhead silk, haze beam light
  hacker_micro_infiltration:
    scene: 黑客微觀潛入 — Hacker Micro Infiltration
    fps: 24
    shutter: 180° standard (1/50s)
    aperture: f/2.0
    aperture_rationale: 極淺微距焦深。Probe macro lens at f/2.0 has sub-millimeter depth of field — only the hacker's eye or a single
      keyboard key is in focus at any moment. This is the visual language of 'micro' scale.
    rig_modifiers: 微距探針鏡頭 (macro probe lens), 微型 LED 貼片燈棒 (micro LED chip light bars for keyboard-level illumination)
    dp_trap: 探針鏡頭進光量極小，桌面模擬螢幕的微型 LED 亮度必須開足，且手動跟焦容錯率極低。Probe lenses transmit very little light (typical T-stop T/4+ even at
      f/2). The desktop 'screen' LEDs must be at maximum output. Manual follow-focus at this magnification has near-zero error
      tolerance — pre-mark focus points for every camera move.
    prompt_keywords: hacker infiltration macro, probe lens lighting, f2 extreme shallow DOF, micro LED chip light, manual
      follow focus probe, near zero DOF hacking scene
  corporate_executive:
    scene: 企業高管形象 — Corporate Executive Portrait
    fps: static / 24fps
    shutter: 180° standard
    aperture: f/4.0 - f/5.6
    aperture_rationale: 胸像中景（mid-shot bust），視線等高（eye-level）。f/4.0-f/5.6 保證西裝領帶至眼神皆清晰，同時保留適度背景分離。
    rig_modifiers: 大型八角罩（Octabank）主光 + 反光板補光 + 獨立背景燈
    lighting: 林布蘭光（Rembrandt）：主光 45° 側高位，三角光落在暗頰。背景光獨立打亮灰牆，區隔主體與背景。
    ratio: '1:3'
    ai_prompt_matrix: Corporate executive portrait, clean gray background, professional corporate lighting, crisp suit detail
    prompt_keywords: corporate executive portrait, rembrandt lighting, octabank key light, professional gray background, crisp
      suit texture, eye level mid shot
  minimalist_black_and_white:
    scene: 極簡黑白肖像 — Minimalist B&W Portrait
    fps: static
    shutter: N/A
    aperture: f/8.0
    aperture_rationale: 追求極致銳度（peak sharpness on lens）。面部特寫（close-up），f/8 將毛孔與皮膚紋理一覽無遺。
    rig_modifiers: 裸燈或雷達罩加蜂巢（bare light / beauty dish with honeycomb grid）
    lighting: 分裂光（Split）：絕對 90° 正側光。背景離牆遠，完全不吃光，主體從純黑背景中浮現。
    ratio: '1:8'
    ai_prompt_matrix: Timeless black and white portrait, harsh split lighting, deep facial wrinkles and textures, fine art
    prompt_keywords: black and white portrait, split lighting 90 degree, harsh side light, skin texture detail, fine art b&w,
      deep shadow portrait
  japanese_fresh_outdoor:
    scene: 日系清新外拍 — Japanese Fresh Outdoor
    fps: 24fps
    shutter: 180° standard with subtle handheld breathing motion
    aperture: f/1.4 - f/2.0
    aperture_rationale: 大光圈製造輕微手動呼吸感搖鏡（intentional handheld sway）。極淺景深讓背景融化為色塊。
    rig_modifiers: 泡沫反光板（米菠蘿 / foam core reflector）大面積回彈
    lighting: 主光：陰天漫射光或逆光太陽。補光：泡沫反光板正面回彈，整體高調（high-key）無生硬陰影。
    ratio: '1:1.5'
    ai_prompt_matrix: Japanese minimalist style portrait, soft airy overcast lighting, pastel tones, faint lens flare
    prompt_keywords: japanese fresh outdoor, soft overcast portrait, pastel high key, foam reflector fill, intentional handheld
      sway, airy translucent skin
  high_fashion_editorial:
    scene: 高奢時尚雜誌 — High Fashion Editorial
    fps: static
    shutter: N/A
    aperture: f/11
    aperture_rationale: 全焦段細節銳利 — 服裝材質、珠寶、髮絲皆須清晰。全身或半身低角度仰拍（low angle hero shot）。
