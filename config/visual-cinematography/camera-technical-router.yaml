version: 1
purpose: "Route scene requirements to a coherent tonal, exposure, lens, depth, motion, and texture package."

camera_technical_router:
  input_analysis:
    fields: [image_use, composition_goal, subject_type, primary_subject, scene_type, motion_level, environment_importance, face_priority, product_priority, background_readability, camera_angle, camera_distance, realism_level]
  decision_order:
    - verify_intent_subject_hierarchy_and_action_are_already_resolved
    - identify_critical_readability_target
    - verify_camera_angle_and_distance
    - select_practical_lens
    - select_depth_of_field
    - select_exposure_strategy
    - select_tonal_profile
    - select_motion_handling
    - select_iso_texture
    - resolve_conflicts
  output_fields:
    - tonal_profile
    - exposure_strategy
    - lens_practical_profile
    - aperture_dof_profile
    - shutter_motion_profile
    - iso_noise_profile
  final_prompt_injection:
    must_include: [visible_tonal_result, exposure_target, perspective_or_lens_effect, focus_behavior, motion_behavior]
    optional_include: [noise_texture, filter_character]
    negative_guards: [conflicting_camera_specs, unreadable_critical_subject, unmotivated_blur]

scene_defaults:
  reclining_interior:
    tonal_profile: normal_key
    exposure_strategy: portrait
    lens_practical_profile: wide_environmental
    aperture_dof_profile: moderate
    shutter_motion_profile: natural_motion
    iso_noise_profile: natural_iso
  stage_performance:
    tonal_profile: readable_night
    exposure_strategy: night_scene
    lens_practical_profile: short_telephoto
    aperture_dof_profile: moderate
    shutter_motion_profile: freeze_motion
    iso_noise_profile: high_iso_documentary
  car_magazine_cover:
    tonal_profile: low_key
    exposure_strategy: product
    lens_practical_profile: wide_environmental
    aperture_dof_profile: moderate
    shutter_motion_profile: freeze_motion
    iso_noise_profile: clean_low_iso

conflict_resolution:
  - "One lens family, one depth intent, and one motion intent per still image unless distinct layers explicitly justify an exception."
  - "Required background readability overrides portrait bokeh preference."
  - "Face, product, and exact text sharpness override motion blur or grain aesthetics."
  - "Lens selection is deferred until intent, subject hierarchy, camera relationship, shot scale, gaze/action, layout, background role, and camera distance are resolved (per the 14-step composition decision order)."
  - "Lens priority may advance only when the optical language is the explicit concept: macro, fisheye/extreme sport, architectural ultra-wide, telephoto compression, panning, surveillance/drone/GoPro, or smartphone selfie."
