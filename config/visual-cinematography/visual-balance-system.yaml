schema_version: "1.0.0"
name: "visual-balance-system"
description: >
  Balances subject mass, empty space, typography, architecture, light sources,
  props, and groups across the frame.

core_principle: >
  Asymmetry must be intentional. A heavy subject, bright light, dense text block,
  architectural mass, or group cluster needs a planned counterweight.

visual_balance_system:
  balance_inputs:
    - subject_size
    - subject_position
    - brightness_mass
    - color_saturation_mass
    - architectural_mass
    - typography_mass
    - prop_or_vehicle_mass
    - group_cluster_mass
    - negative_space_mass
  counterbalance_options:
    light_mass:
      prompt: "counterbalanced by a soft light pool or bright practical on the opposite side"
    architecture:
      prompt: "counterbalanced by readable architectural structure"
    negative_space:
      prompt: "counterbalanced by clean negative space"
    secondary_prop:
      prompt: "counterbalanced by a smaller secondary prop"
    typography:
      prompt: "counterbalanced by a title or cover-line column"
    color_accent:
      prompt: "counterbalanced by a small controlled accent color"
    background_depth:
      prompt: "counterbalanced by layered background depth"

rules:
  if_primary_subject_is_left_heavy:
    require_counterbalance_on_right:
      - light_mass
      - architecture
      - negative_space
      - secondary_prop
      - typography
  if_primary_subject_is_right_heavy:
    require_counterbalance_on_left:
      - light_mass
      - architecture
      - negative_space
      - secondary_prop
      - typography
  if_top_heavy:
    stabilize_with:
      - foreground_base
      - darker_lower_mass
      - grounded shadow
  if_group_asymmetry:
    use:
      - staggered_height
      - face_cluster_geometry
      - alternating color accents
      - shared lighting unifier
  if_bright_background_competes:
    reduce:
      - background_contrast
      - saturation
      - sharpness
    add:
      - subject_rim_light
      - face_key_light

failure_guardrails:
  - "subject visually falls out of frame"
  - "empty bright side pulls attention away"
  - "typography block overpowers subject"
  - "group cluster feels pasted or unbalanced"
  - "light source is the first read when it should be support"
