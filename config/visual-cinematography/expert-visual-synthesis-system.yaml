# ============================================================
# expert-visual-synthesis-system.yaml
# Cross-domain expert synthesis controller for premium image prompts
# Version: 1.0.0
# Purpose:
#   Integrate photography, composition, human proportion, clothing construction,
#   cloth physics, wet-material behavior, skin realism, lighting physics,
#   3D render readability, and motion/animation cues into one coherent
#   model-facing visual brief.
# ============================================================

schema_version: "1.0.0"
name: "expert-visual-synthesis-system"
description: >
  A cross-domain synthesis module for prompt enhancement. It turns short prompts
  into complete, physically coherent, premium image briefs by coordinating
  composition, subject scale, camera perspective, body structure, wardrobe state,
  fabric behavior, wetness, skin texture, material response, lighting motivation,
  render clarity, and motion cues.

core_principle: >
  High-end image quality comes from coherent cause-and-effect, not from stacking
  style adjectives. Every visible detail should answer one of these questions:
  what is the subject, where is the camera, what supports the body or object,
  what light causes the highlights and shadows, what material causes the texture,
  and what physical event caused fabric, hair, water, or motion to change shape.

primary_goal: >
  Produce prompts that feel like a professional photographer, cloth/material
  supervisor, 3D lookdev artist, and layout designer agreed on the same image.

global_rules:
  - "Use subject-first visual language, then camera/framing, then light/material/physics."
  - "Prefer visible cause-and-effect over generic quality words."
  - "Preserve the user's subject and intent; enrich missing physical and visual decisions."
  - "Never let beauty style override anatomy, garment physics, text accuracy, or object geometry."
  - "Translate expert concepts into visible effects; avoid equipment lists and engine jargon in final prompts."
  - "For Z Image Base/Turbo, use detailed, explicit visual-result phrases with positive guardrails before negatives."

# ------------------------------------------------------------
# 1. Gap Detector
# ------------------------------------------------------------

expert_gap_detector:
  activate_when:
    - "short prompt with human subject"
    - "fashion, glamour, swimsuit, towel, wet clothing, body-conscious outfit"
    - "standing portrait or full-body composition"
    - "fabric transparency, open front, slipping garment, wet cling, draped cloth"
    - "photorealistic portrait, cinematic editorial, commercial image"
    - "3D render, product render, physically based rendering, realistic material"
    - "motion, animation, water, steam, wind, fabric movement"
    - "user reports incorrect anatomy, cloth physics, lighting, or pose"
  missing_decision_groups:
    composition_scale:
      - "subject size in frame"
      - "headroom and footroom"
      - "camera height and perspective"
      - "negative space / title-safe space"
      - "body crop at natural anatomical breakpoints"
    wardrobe_physics:
      - "open-front degree"
      - "fastening or anchor point"
      - "fit pressure and contact areas"
      - "opacity / translucency cause"
      - "fold direction and fabric weight"
    body_scene_description:
      - "body shape described through pose, wardrobe fit, and scene interaction"
      - "support leg or seated support"
      - "visible anatomical landmark placement when relevant"
      - "body-camera perspective consistency"
    realism_surface:
      - "pores, skin texture, tone variation"
      - "wet sheen, droplets, rivulets, makeup behavior"
      - "hair strand grouping and environmental effect"
    lighting_scene_physics:
      - "motivated key light source"
      - "shadow direction and falloff"
      - "specular highlights on skin, fabric, glass, water, metal"
      - "bounce light from environment"
    render_design:
      - "clean geometry and edge definition"
      - "material-specific roughness/gloss/translucency"
      - "contact shadows and ambient occlusion"
      - "background depth without stealing subject priority"
    motion_physics:
      - "direction and source of motion"
      - "secondary motion in hair, cloth, water, steam"
      - "motion blur only where movement occurs"

# ------------------------------------------------------------
# 2. Composition: Standing Human Frame Proportion
# ------------------------------------------------------------

standing_human_composition:
  purpose: >
    Keep standing human images proportionally framed and visually intentional.
    This prevents full-body subjects from being too small, cropped awkwardly,
    or stretched by camera perspective.
  frame_scale_presets:
    portrait_waist_up:
      subject_occupancy: "55-75% frame height"
      crop_logic: "top of head to waist or upper hip, hands included only if intentional"
      prompt_positive:
        - "waist-up portrait framing with comfortable headroom"
        - "face, shoulders, torso, and hands intentionally placed"
        - "camera at chest to eye level with natural perspective"
      avoid:
        - "cropped hands unless deliberate"
        - "oversized head from wide-angle distortion"
    three_quarter_body:
      subject_occupancy: "70-88% frame height"
      crop_logic: "head to mid-thigh or below knee at a natural break"
      prompt_positive:
        - "three-quarter body framing"
        - "headroom and lower-body space balanced"
        - "body proportions stable from head to hips and legs"
      avoid:
        - "crop through joints"
        - "stretched legs from low wide-angle perspective"
    full_body_editorial:
      subject_occupancy: "78-92% frame height"
      crop_logic: "head to feet, feet fully inside frame with ground contact"
      prompt_positive:
        - "full-body standing composition, head-to-toe visible"
        - "feet fully inside frame with clear ground contact"
        - "subject occupies most of the vertical frame with clean margins"
      avoid:
        - "tiny subject lost in frame"
        - "feet cropped off"
        - "warped lower body"
    cover_or_poster:
      subject_occupancy: "60-82% frame height depending on title space"
      crop_logic: "preserve masthead/title-safe zone while keeping hero subject dominant"
      prompt_positive:
        - "hero subject dominant with title-safe negative space"
        - "clean hierarchy between face, body silhouette, and layout area"
      avoid:
        - "text area colliding with face"
        - "subject too large for publication layout"

  camera_perspective_rules:
    - "Use eye-level or chest-level camera for natural portrait proportions."
    - "Use low angle only when power/drama is intended, and protect leg/head proportions."
    - "Use 50-85mm equivalent visual perspective for natural human proportions unless the user requests wide-angle drama."
    - "Avoid extreme wide-angle close framing for glamour or body-conscious poses unless distortion is explicitly desired."

# ------------------------------------------------------------
# 2a. Fashion Editorial Composition
# ------------------------------------------------------------

fashion_editorial_composition:
  purpose: "Specialized composition rules for premium fashion editorial and high-end portrait photography. These rules extend the standing_human_composition with fashion-specific framing, silhouette hierarchy, and garment-first visual priority."
  frame_scale_fashion_presets:
    editorial_full_length:
      subject_occupancy: "75-90% frame height"
      crop_logic: "head to floor with shoes fully visible, minimum 5% headroom and 3% footroom"
      lens_preferred: "35-50mm for environmental context, 135-200mm for compressed editorial"
      prompt_positive:
        - "full-length fashion composition, head to toe visible"
        - "shoes or footwear fully inside frame"
        - "elegant vertical line from head to hem"
        - "garment silhouette is the primary compositional element"
      avoid:
        - "feet cropped off"
        - "tiny subject in frame"
        - "warped leg proportions from wide lens"
        - "garment silhouette cut off by frame edge"
    editorial_three_quarter:
      subject_occupancy: "55-75% frame height"
      crop_logic: "head to mid-calf or above ankle, crop at natural garment break point"
      lens_preferred: "85-105mm for flattering proportions, 50mm for editorial context"
      prompt_positive:
        - "three-quarter fashion frame, crop at mid-calf"
        - "garment shape and fabric texture dominate the frame"
        - "negative space above head for editorial breathing room"
      avoid:
        - "crop through hem or garment edge"
        - "awkward cut at knee level"
        - "head too large in frame"
    editorial_waist_up:
      subject_occupancy: "40-60% frame height"
      crop_logic: "top of head to lower waist or upper hip"
      lens_preferred: "85-135mm for flattering facial proportions, garment detail visible"
      prompt_positive:
        - "waist-up fashion editorial framing"
        - "face, shoulders, and garment upper detail are the hero elements"
        - "generous negative space left or right for editorial layout"
      avoid:
        - "cropped hands unless deliberate"
        - "tight framing leaving no negative space"
        - "garment detail lost at frame bottom"
    editorial_beauty_close_up:
      subject_occupancy: "25-40% frame height"
      crop_logic: "top of head to upper chest or collarbone, face dominant"
      lens_preferred: "105mm or 100mm macro for flat compression, extreme detail on skin and eyes"
      prompt_positive:
        - "beauty close-up editorial composition"
        - "face centered or slightly off-center with generous breathing room"
        - "sharp eyes, refined skin texture, clean makeup detail"
        - "garment or skin visible at frame bottom for context"
      avoid:
        - "face too large in frame"
        - "cropped forehead or chin"
        - "no context of garment or styling"
  fashion_editorial_rules:
    silhouette_first:
      rule: "The garment silhouette is the primary compositional element before face, background, or accessories."
      prompt_positive:
        - "garment silhouette defines the composition"
        - "clean outline from shoulder to hem"
        - "pose supports garment shape"
    negative_space_intentional:
      rule: "Negative space in fashion editorial is an active design element, not empty area."
      prompt_positive:
        - "generous negative space supporting editorial layout"
        - "breathing room around garment silhouette"
        - "negative space balanced against hero element"
    fabric_texture_priority:
      rule: "Composition must preserve zones where fabric texture, weave, or surface detail is readable."
      prompt_positive:
        - "fabric texture readable in hero zone"
        - "garment surface detail visible in key light area"
      avoid:
        - "fabric texture lost in shadow"
        - "garment reduced to flat color field"
    limb_placement_check:
      rule: "Arms and legs must support, not obscure, the garment silhouette."
      prompt_positive:
        - "limbs placed to reveal garment shape"
        - "arms create negative space around waist"
        - "legs positioned to show garment hem and shoe"
      avoid:
        - "arm covering garment waist detail"
        - "legs closed hiding garment line"
        - "hands obscuring fabric texture"

# ------------------------------------------------------------
# 3. Wardrobe Open-Front / Fit / Translucency / Scene Support
# ------------------------------------------------------------

wardrobe_visibility_physics:
  purpose: >
    Control open-front clothing, fit, body contact, translucency, and scene-driven
    wardrobe changes as physical garment behavior.

  open_front_degree:
    closed:
      visible_effect: "garment front fully closed, shape defined by seams and fabric body"
      prompt_positive: "closed front, clean placket or closure line, fabric structure intact"
    slightly_open:
      visible_effect: "small collar or neckline opening, limited skin visibility"
      prompt_positive: "slightly open front with natural collar spread and believable fabric tension"
    partially_open:
      visible_effect: "front opening reveals underlying skin or layer while garment remains anchored"
      prompt_positive: "partially open front, anchored at shoulder or waist, fabric edges fall naturally"
    loosely_open:
      visible_effect: "garment hangs from shoulders or one fastening point, more skin/layer visible"
      prompt_positive: "loosely open front, fabric panels hanging with gravity and soft fold shadows"
    slipping_or_revealing:
      visible_effect: "coverage changes because anchor point loosens, hand releases, strap slides, or wet fabric clings"
      prompt_positive: "coverage change caused by visible anchor, loosened edge, gravity, wet cling, or hand contact"

  fit_and_contact:
    loose_drape:
      positive:
        - "loose fabric hangs away from the body"
        - "soft folds gather at gravity points"
        - "body shape suggested by silhouette rather than sharp detail"
      negative:
        - "fabric glued to skin"
        - "random tight zones"
    fitted:
      positive:
        - "fitted garment follows body volume with seam tension"
        - "fabric contacts shoulders, chest, waist, and hips according to cut"
        - "folds appear at compression and bend points"
      negative:
        - "painted-on clothing"
        - "missing seam logic"
    wet_cling:
      positive:
        - "wet fabric clings at contact points"
        - "translucency varies between wet contact zones and thicker folded areas"
        - "darker damp patches and tension lines follow fabric gravity"
      negative:
        - "uniform transparent clothing"
        - "cutout anatomy"
        - "dry fabric with wet-cling visibility"

  scene_assisted_wardrobe:
    bathroom_after_shower:
      positive:
        - "humid bathroom air"
        - "wet hair and skin droplets"
        - "slightly damp towel or fabric at skin-contact areas"
        - "steam backlight revealing moisture without hiding garment structure"
    pool_or_ocean:
      positive:
        - "fabric darker where soaked"
        - "water weight pulling hem and folds downward"
        - "droplets and wet edge highlights"
    rain_scene:
      positive:
        - "rain-darkened fabric"
        - "wet seams and heavier folds"
        - "water beads on outer surface"
    studio_dry_fashion:
      positive:
        - "dry fabric structure, controlled folds, clean styling"
      negative:
        - "wet cling unless requested"

# ------------------------------------------------------------
# 4. Body Description Through Scene + Person
# ------------------------------------------------------------

body_description_strategy:
  purpose: >
    Describe bodies through visible structure, pose, wardrobe fit, and scene
    interaction instead of abstract or exaggerated body adjectives.
  rules:
    - "Use adult subject lock when mature styling is present."
    - "Describe silhouette through posture, camera angle, and garment interaction."
    - "Use natural body proportions, shoulder/ribcage/pelvis alignment, and grounded support."
    - "Avoid overloading body adjectives that fight anatomy or pose logic."
    - "For visible adult anatomy, add placement and occlusion consistency rather than erotic emphasis."
  prompt_positive:
    - "natural adult body proportions"
    - "body shape defined by pose, lighting, and garment contact"
    - "ribcage, waist, pelvis, and legs connected as one coherent structure"
    - "skin, fabric, and towel edges respect correct occlusion"
  prompt_negative:
    - "warped torso"
    - "impossible waist"
    - "misplaced anatomical landmarks"
    - "body shape fighting clothing physics"

# ------------------------------------------------------------
# 5. Realism: Skin, Hair, Micro Texture
# ------------------------------------------------------------

realism_surface_stack:
  purpose: >
    Create realistic human surface quality without plastic AI gloss.
  skin_realism:
    positive:
      - "realistic skin texture with refined pores"
      - "subtle skin tone variation"
      - "natural specular highlights following face and collarbone planes"
      - "soft subsurface color in cheeks, ears, shoulders, and fingertips"
      - "small natural imperfections kept subtle"
    negative:
      - "plastic skin"
      - "waxy face"
      - "over-smoothed beauty filter"
      - "uniform airbrushed skin"
  wet_skin:
    positive:
      - "water droplets catching the key light"
      - "thin rivulets following gravity on neck, collarbone, shoulders, and torso"
      - "dewy wet sheen with controlled highlights"
      - "wetness stronger near hairline, neck, and fabric contact"
    negative:
      - "random glitter highlights"
      - "oil-like plastic shine"
      - "droplets ignoring gravity"
  hair_realism:
    positive:
      - "strand groups with natural flyaways"
      - "wet hair clumps into darker separated strands"
      - "hair volume reduced by moisture when wet"
      - "rim light catches individual wet strands"
    negative:
      - "helmet hair"
      - "dry fluffy hair in wet scene"
      - "flat painted hair"

# ------------------------------------------------------------
# 6. Lighting: Scene-Caused Light and Material Response
# ------------------------------------------------------------

lighting_physics_synthesis:
  purpose: >
    Make light feel motivated, dimensional, and physically coherent.
  required_decisions:
    - "main light source direction"
    - "light softness / shadow edge"
    - "environment bounce color"
    - "specular highlight behavior"
    - "background separation"
    - "exposure protection for skin and bright fabric"
  bathroom_steam_lighting:
    positive:
      - "soft warm bathroom light diffused through steam"
      - "cooler reflected light from tiles or glass"
      - "backlight catches steam and wet hair edges"
      - "skin highlights controlled, not blown out"
      - "white towel keeps terry texture in highlights"
  editorial_daylight:
    positive:
      - "large soft window light with smooth shadow falloff"
      - "subtle bounce light filling the shadow side"
      - "clean catchlights and natural skin tone"
  studio_commercial:
    positive:
      - "controlled highlight shape"
      - "clean shadow transition"
      - "material texture readable without harsh glare"
  negative:
    - "unmotivated light direction"
    - "flat lighting"
    - "blown-out white fabric"
    - "muddy skin shadows"

# ------------------------------------------------------------
# 7. Wet-Cloth Geometry and Physics
# ------------------------------------------------------------

wet_cloth_geometry_physics:
  purpose: >
    Ensure wet or damp clothing behaves according to fabric weight, water load,
    adhesion, gravity, tension, and contact.
  physical_causes:
    moisture_load:
      visible_effect:
        - "fabric becomes heavier"
        - "folds hang more vertically"
        - "hem and towel edges sag downward"
        - "darker wet patches form near contact or saturation zones"
    adhesion:
      visible_effect:
        - "cloth clings where wet fabric touches skin"
        - "loose areas still hang away from the body"
        - "contact zones show subtle tension lines"
    translucency:
      visible_effect:
        - "visibility increases only in thin, wet, tensioned, or backlit zones"
        - "thicker folds remain more opaque"
        - "opacity transitions gradually, not uniformly"
    surface_water:
      visible_effect:
        - "droplets bead on water-resistant materials"
        - "cotton/terry absorbs water and darkens instead of beading heavily"
        - "rivulets follow gravity"
  prompt_positive:
    - "wet cloth geometry follows gravity and contact points"
    - "darker damp zones, heavier folds, and fabric tension where wet fabric touches skin"
    - "translucency varies by thickness, wetness, tension, and backlight"
    - "thicker folds remain opaque"
  prompt_negative:
    - "uniform fake transparency"
    - "dry fabric in wet scene"
    - "wet cloth ignoring gravity"
    - "cutout reveal"
    - "fabric clipping through body"

# ------------------------------------------------------------
# 8. 3D Rendering and Lookdev Language
# ------------------------------------------------------------

render_lookdev_synthesis:
  purpose: >
    Translate 3D/PBR/rendering expertise into visible image prompt language.
    Use this for product, architecture, photoreal, game-cinematic, or AI-image
    outputs where geometry, material, and light transport must feel stable.
  pbr_visible_principles:
    - "roughness controls highlight spread"
    - "glossy wet skin and glass create sharper specular streaks"
    - "terry towel has diffuse soft fibers and low specular response"
    - "skin has soft subsurface color and fine pore texture"
    - "contact shadows and ambient occlusion ground overlapping surfaces"
    - "straight architecture and product edges protect realism"
  prompt_positive:
    - "physically coherent material response"
    - "contact shadows and ambient occlusion under overlapping surfaces"
    - "realistic roughness and specular behavior for skin, towel, glass, tile, and water"
    - "clean geometry, stable perspective, no warped edges"
    - "background depth supports the hero subject without visual noise"
  prompt_negative:
    - "plastic render"
    - "flat ambient light"
    - "warped geometry"
    - "missing contact shadows"
    - "material mismatch"

# ------------------------------------------------------------
# 9. Motion / Animation Physics Effects
# ------------------------------------------------------------

motion_animation_physics:
  purpose: >
    Add motion cues that make still images and video-ready prompts feel physically
    alive while preserving subject readability.
  rules:
    - "State what caused the motion: wind, water, walking, hand pull, falling fabric, steam flow."
    - "Keep face, eyes, product hero, and critical anatomy sharp unless motion blur is intentional."
    - "Use secondary motion on hair, fabric edges, droplets, steam, and loose straps."
    - "Motion blur should follow the movement direction and not smear the whole subject."
  still_image_positive:
    - "decisive moment with face and body readable"
    - "subtle secondary motion in hair, towel edge, steam, and droplets"
    - "motion blur only on fast-moving cloth edges or water droplets"
  video_ready_positive:
    - "stable first frame with clear silhouette"
    - "consistent light source for motion"
    - "cloth and hair motion follows gravity, wind, or body movement"
  negative:
    - "global smeared motion"
    - "blurred face without intent"
    - "cloth moving without physical cause"
    - "steam hiding body/fabric collisions"

# ------------------------------------------------------------
# 10. Model-Specific Rendering
# ------------------------------------------------------------

model_specific_rendering:
  chatgpt_image:
    guidance: >
      Use natural language that states cause-and-effect relationships. Keep the
      prompt complete, readable, and physically coherent: subject, frame scale,
      camera perspective, motivated light, material behavior, and constraints.
  z_image_base:
    positive_template: >
      subject-first premium photoreal image, intentional frame scale, natural
      human proportions, motivated lighting, realistic skin pores, coherent fabric
      physics, wetness follows scene, contact shadows, material-specific highlights,
      clean geometry, background depth supports subject
    negative_template: >
      plastic skin, warped anatomy, bad body proportions, misplaced landmarks,
      dry fabric in wet scene, fake transparency, floating cloth, missing contact
      shadows, flat lighting, warped geometry, random text, watermark
  z_image_turbo:
    positive_template: >
      premium photoreal, clean framing, natural proportions, realistic skin texture,
      motivated light, coherent wet fabric, contact shadows, clean geometry
    negative_template: >
      plastic skin, warped body, fake transparency, floating cloth, dry wet-scene
      fabric, flat lighting, warped geometry, watermark

prompt_assembly_hooks:
  phase_1_intent_analysis:
    add_fields:
      - expert_gap_detector
    action: "Detect missing high-impact visual decisions in short or failure-prone prompts."
  phase_2_cinematic_enrichment:
    action: "Coordinate composition, camera, light, material, fabric, body, and render decisions as one cause-and-effect plan."
  phase_3_scene_blueprint:
    action: "Store the expert synthesis choices as positive visual guardrails and targeted negatives."
  phase_4_self_review:
    checks:
      - "Check subject scale and crop."
      - "Check body proportion and camera perspective."
      - "Check garment opening, anchor, fit, opacity, and wetness."
      - "Check skin microtexture and wetness realism."
      - "Check motivated light and material response."
      - "Check 3D geometry, contact shadows, and occlusion."
      - "Check motion cause and secondary motion."
  phase_4_5_cleanup:
    action: "Preserve expert synthesis guardrails; remove only repeated adjectives, equipment leaks, and contradictions."
  phase_4_6_renderer_selection:
    action: "Render expert synthesis in the selected model syntax."
  phase_5_final_prompt:
    action: "Include concise cause-and-effect visual language when it changes the generated image."
