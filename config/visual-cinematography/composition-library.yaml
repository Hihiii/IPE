version: 1
purpose: "Composition rules, framing types, and aspect ratio guides for cinematic and commercial photography."

# =============================================================================
# FRAMING TYPES — shot scale and camera distance
# =============================================================================
framing_types:
  extreme_close_up:
    description: "Subject fills 100% of frame. Extreme detail, no context. Single feature fills the frame."
    typical_use: "beauty macro (eye, lip), product texture detail, jewelry detail"
    subject_visible: "a single detail — eye, logo, texture patch"
    working_distance: "very close (macro range)"
    prompt_keywords: "extreme close-up, macro fill frame, single detail focus, ultra tight crop"
    notes: "Every surface imperfection is visible. Requires flawless subject or intentional texture."

  close_up:
    description: "Subject occupies 80-100% of frame. Minimal background. Face or product top fills most of the frame."
    typical_use: "beauty portrait, product hero label, food hero detail"
    subject_visible: "face from chin to top of head, or product top 80%"
    working_distance: "close (0.5-1m for portrait, macro for product)"
    prompt_keywords: "close-up shot, tight framing, subject fills frame, minimal background"

  medium_close_up:
    description: "Subject occupies 50-70% of frame. Some context visible. The most common commercial framing."
    typical_use: "product hero shot, portrait headshot, food plated hero"
    subject_visible: "face to mid-chest, or full product with slight breathing room"
    working_distance: "moderate (1-1.5m)"
    prompt_keywords: "medium close-up, commercial product framing, hero shot, comfortable detail with context"
    notes: "The default framing for most commercial work. Balances detail and context."

  medium_shot:
    description: "Subject occupies 30-50% of frame. Clear context while subject remains dominant."
    typical_use: "half-body portrait, product with prop, food with table setting"
    subject_visible: "face to waist, or product with one prop"
    working_distance: "moderate (1.5-2.5m)"
    prompt_keywords: "medium shot, half-body framing, subject with context, moderate distance"

  full_body:
    description: "Subject occupies 20-30% of frame. Full subject visible with environmental context."
    typical_use: "fashion full-body, car full vehicle, furniture in room"
    subject_visible: "head to toe, or entire product"
    working_distance: "far (2.5-5m)"
    prompt_keywords: "full-body shot, full product view, environmental context, full frame subject"

  wide_shot:
    description: "Subject occupies 10-20% of frame. Environment dominates. Subject is a focal element within the scene."
    typical_use: "architectural interior, landscape with subject, room setting"
    subject_visible: "full subject surrounded by environment"
    working_distance: "far (5m+)"
    prompt_keywords: "wide shot, environmental framing, subject in context, expansive scene"
    notes: "Subject can be small in frame. Composition must guide the eye to the subject."

  extreme_wide:
    description: "Subject occupies less than 10% of frame. Environment is the primary subject."
    typical_use: "architectural exterior, landscape, cityscape"
    subject_visible: "tiny in frame or absent — environment is hero"
    working_distance: "very far (10m+)"
    prompt_keywords: "extreme wide shot, epic landscape, vast environment, establishing view"


# =============================================================================
# CLASSIC COMPOSITION RULES
# =============================================================================

# =============================================================================
# CLASSIC COMPOSITION RULES
# =============================================================================
rules:
  rule_of_thirds:
    description: "Frame divided into 3x3 grid. Key elements placed on intersection lines."
    visual_effect: "balanced, natural, dynamic tension"
    tension_level: "moderate"
    best_for:
      - "general photography"
      - "portrait with environmental context"
      - "standard commercial"
      - "landscape and architecture"
    prompt_keywords: "rule of thirds composition, subject on left third, dynamic balanced framing"
    notes: "Most versatile rule. Place subject's eyes on upper third line for portraits."

  centered_symmetry:
    description: "Subject placed exactly in center, left-right or full symmetry."
    visual_effect: "stable, formal, powerful, iconic"
    tension_level: "low"
    best_for:
      - "hero product shots"
      - "formal portrait"
      - "architecture with strong symmetry"
      - "iconic brand imagery"
    prompt_keywords: "centered symmetrical composition, formal balanced framing, iconic centered subject"
    notes: "Works best when the subject has strong inherent visual weight. Less dynamic but more authoritative."

  golden_ratio:
    description: "Spiral-based composition following 1:1.618 proportion. Subject at spiral convergence."
    visual_effect: "naturally harmonious, aesthetically pleasing, flow-driven"
    tension_level: "low_to_moderate"
    best_for:
      - "fine art photography"
      - "high-end commercial"
      - "editorial with flow"
      - "product with natural leading lines"
    prompt_keywords: "golden ratio composition, natural harmonious framing, spiral leading lines"
    notes: "Often confused with rule of thirds. Golden ratio spiral creates a natural viewing path through the image."

  golden_triangle:
    description: "Diagonal from corner to corner, perpendiculars from other corners. Subjects at intersections."
    visual_effect: "dynamic diagonal balance, asymmetric harmony"
    tension_level: "moderate"
    best_for:
      - "portrait with dynamic diagonal flow"
      - "editorial with directional energy"
      - "product with leading gestures"
    prompt_keywords: "golden triangle composition, diagonal dynamic balance, asymmetric harmony"
    notes: "More dynamic than rule of thirds. Excellent for portraits with directional gaze."

  leading_lines:
    description: "Lines in the frame that guide the viewer's eye toward the subject."
    visual_effect: "directional, guided, deep, immersive"
    tension_level: "moderate"
    best_for:
      - "architectural photography"
      - "landscape with paths"
      - "interior design"
      - "editorial with depth"
    prompt_keywords: "leading lines composition, directional lines guiding to subject, perspective depth"
    notes: "Common lines: roads, railways, building edges, shorelines, shadows, arm gestures."

  s_curve:
    description: "S-shaped or serpentine line that guides the eye through the frame in a flowing pattern."
    visual_effect: "elegant, flowing, natural, graceful"
    tension_level: "low"
    best_for:
      - "landscape with rivers or paths"
      - "figure photography and nude"
      - "food with curved plating"
      - "editorial with flowing fabric"
    prompt_keywords: "S-curve composition, serpentine line, flowing visual path"
    notes: "One of the most naturally pleasing compositions. The S-shape slows the eye and creates a journey through the frame."

  l_shape:
    description: "Elements arranged in an L-shaped formation, leaving one quadrant open."
    visual_effect: "stable, grounded, open, spacious"
    tension_level: "low"
    best_for:
      - "product with negative space"
      - "editorial with text area"
      - "architectural interior"
    prompt_keywords: "L-shaped composition, framed negative space, open quadrant"
    notes: "The open area of the L is natural negative space for text or breathing room."

  frame_within_frame:
    description: "Use foreground elements to create a natural frame around the subject."
    visual_effect: "layered, voyeuristic, deep, contextual"
    tension_level: "low"
    best_for:
      - "architectural portraiture"
      - "editorial storytelling"
      - "cinematic establishing shots"
      - "environmental portrait"
    prompt_keywords: "frame within frame composition, foreground framing element, layered depth"
    notes: "Common frames: doorways, windows, arches, tree branches, scaffolding, other people."

  negative_space:
    description: "Large empty area around the subject. Subject occupies small portion of frame."
    visual_effect: "minimalist, isolated, elegant, dramatic emptiness"
    tension_level: "moderate_to_high"
    best_for:
      - "luxury product minimalism"
      - "editorial with breathing room"
      - "cover and title area design"
      - "fine art minimalism"
    prompt_keywords: "negative space composition, minimalist framing, generous empty space, isolated subject"
    notes: "Critical for commercial work where text overlay is needed. More space = more luxury feel."

  diagonal_tension:
    description: "Key elements arranged along diagonal lines. Creates dynamism and movement."
    visual_effect: "dynamic, energetic, unstable, active"
    tension_level: "high"
    best_for:
      - "action and sport"
      - "dynamic fashion"
      - "editorial with movement"
      - "food with dynamic arrangement"
    prompt_keywords: "diagonal composition, dynamic angle, energetic diagonal line, active framing"
    notes: "Dutch angle (canted horizon) is an extreme version. Use intentionally, not accidentally."

  depth_layering:
    description: "Clear foreground, midground, and background separation. Three distinct depth planes."
    visual_effect: "immersive, dimensional, cinematic, spatial"
    tension_level: "moderate"
    best_for:
      - "cinematic storytelling"
      - "editorial scene setting"
      - "architectural interiors"
      - "environmental commercial"
    prompt_keywords: "three-layer depth composition, foreground midground background separation, cinematic depth"
    notes: "Each layer should have distinct lighting or focus treatment. Essential for cinematic feel."

  triangles_and_geometry:
    description: "Subjects arranged in triangular formations. Stable yet dynamic."
    visual_effect: "stable, compositional strength, geometric order"
    tension_level: "low_to_moderate"
    best_for:
      - "group portraits"
      - "still life arrangement"
      - "product groupings"
      - "architectural geometric"
    prompt_keywords: "triangular composition, geometric arrangement, stable diagonal grouping"
    notes: "Inverted triangles feel unstable. Upright triangles feel solid. Use for group shots."

  fill_the_frame:
    description: "Subject fills most or all of the frame. Minimal background. Extreme intimacy."
    visual_effect: "intimate, detailed, confrontational, impactful"
    tension_level: "high"
    best_for:
      - "beauty macro shot"
      - "product detail emphasis"
      - "extreme close-up portrait"
      - "texture and material focus"
    prompt_keywords: "fill the frame composition, tight crop, extreme close-up, subject dominates frame"
    notes: "Loses all environmental context. Pure subject focus. Every detail matters."

  circular_wrap:
    description: "Elements arranged in circular or C-shape pattern around the subject."
    visual_effect: "enclosing, protective, guided circular flow"
    tension_level: "low"
    best_for:
      - "group shots around a table"
      - "architectural domes and arches"
      - "product with circular prop arrangement"
    prompt_keywords: "circular composition, C-shape framing, enclosed circular arrangement"
    notes: "Eyes naturally follow circular paths. Use to keep viewer inside the frame."

  radial:
    description: "All lines converge toward the center or radiate outward from the center."
    visual_effect: "focused, explosive, central, dramatic perspective"
    tension_level: "moderate_high"
    best_for:
      - "architectural interiors (domes)"
      - "dramatic landscape with sunburst"
      - "product with spokes or circular detail"
    prompt_keywords: "radial composition, converging lines, centered focus, radiating outward"
    notes: "The center becomes the unavoidable focal point. Works well with wide-angle lenses."


# =============================================================================
# COMPOSITION STRATEGIES — advanced framing concepts
# =============================================================================
composition_strategies:
  horizon_placement:
    description: "Deliberate placement of the horizon line within the frame for landscape and architecture."
    tension_level: "moderate"
    options:
      upper_third: "emphasizes foreground — use when foreground detail matters"
      lower_third: "emphasizes sky — use when clouds, sky, or atmosphere matter"
      center: "reflection symmetry — use when water reflection or strong symmetry"
    prompt_keywords: "horizon on upper third, emphasize foreground, dramatic sky composition"

  juxtaposition:
    description: "Two contrasting elements placed together to highlight their differences."
    visual_effect: "intentional contrast, conceptual depth, storytelling"
    tension_level: "high"
    best_for:
      - "editorial with conceptual theme"
      - "before/after or old/new contrast"
      - "product comparison"
      - "social commentary"
    prompt_keywords: "juxtaposition composition, contrasting elements, conceptual contrast"
    notes: "Scale, texture, color, age, or content contrast all work. The contrast must be intentional and readable."

  pattern_and_repetition:
    description: "Repeating elements create rhythm, texture, and visual interest."
    visual_effect: "rhythmic, textile-like, hypnotic, orderly"
    tension_level: "low_to_moderate"
    best_for:
      - "architectural facades"
      - "product arrays"
      - "texture emphasis"
      - "abstract editorial"
    prompt_keywords: "pattern repetition, rhythmic elements, repeating texture, visual rhythm"
    notes: "Breaking the pattern (one different element) creates the strongest focal point."

  figure_to_ground:
    description: "The relationship between subject (figure) and background (ground). Managing separation."
    visual_effect: "clear, separated, dimensional"
    strategies:
      - "tonal contrast: light subject on dark ground (or vice versa)"
      - "color contrast: warm subject on cool ground"
      - "sharpness contrast: sharp subject on blurred ground"
    prompt_keywords: "figure ground separation, subject background contrast, tonal separation"
    notes: "The most fundamental composition skill. If figure and ground merge, the subject is lost."

  color_weight_balance:
    description: "Balancing the visual weight of colors across the frame. Saturated colors weigh more."
    visual_effect: "balanced, harmonious, visually stable"
    strategy: "A small area of high-saturation color balances a large area of neutral color."
    prompt_keywords: "color weight balance, saturation distribution, visual color balance"
    notes: "A tiny red object can balance a large gray area. Understand color weight, not just size."

  gaze_guidance:
    description: "Using the subject's gaze direction to guide the viewer's attention within or out of frame."
    visual_effect: "narrative, directional, psychological"
    strategies:
      - "gaze within frame: subject looking at another element"
      - "gaze out of frame: creates curiosity about what they see"
      - "gaze at camera: direct engagement with viewer"
    prompt_keywords: "gaze guidance, subject looking direction, eye line composition"
    notes: "The viewer will instinctively follow the subject's gaze. Use this to direct attention."

  z_depth_guidance:
    description: "Using depth cues to create the illusion of three-dimensional space in a 2D frame."
    visual_effect: "deep, dimensional, immersive"
    strategies:
      - "overlapping planes"
      - "atmospheric perspective (haze in distance)"
      - "size diminution (things get smaller)"
      - "leading lines converging"
    prompt_keywords: "z-depth, deep space composition, atmospheric perspective, layered depth"

  motion_and_stillness:
    description: "Using implied motion or contrast between moving and still elements."
    visual_effect: "dynamic, energetic, narrative"
    best_for:
      - "fashion with movement"
      - "street photography"
      - "action product (sports equipment)"
    prompt_keywords: "motion and stillness contrast, dynamic movement, frozen motion"


# =============================================================================
# GENRE-SPECIFIC COMPOSITION GUIDES
# =============================================================================
genre_composition:
  portrait:
    subject_placement: "eyes on upper third line"
    headroom: "minimal — crop tighter than you think"
    gaze: "leave space in direction of gaze"
    framing:
      - "close-up: eyes to chin, no headroom"
      - "headshot: top of head to mid-chest"
      - "half-body: head to waist"
      - "full-body: head to toe, slight headroom"
    avoid:
      - "cropping at joints (neck, wrist, knee, ankle)"
      - "too much headroom"
      - "merging background lines with head"
    prompt_keywords: "portrait composition, eyes on upper third, tight headroom, no joint crop"

  group_portrait:
    subject_placement: "arrange faces in triangle formation"
    headroom: "allow for tallest person"
    strategies:
      - "stagger heights (not all in one line)"
      - "overlap shoulders slightly"
      - "all faces on same focal plane"
    avoid:
      - "equal spacing (looks like lineup)"
      - "hands on each other's shoulders (dated)"
    prompt_keywords: "group portrait composition, triangular arrangement, staggered heights"

  ensemble_selfie:
    subject_placement: "faces arranged in a tight triangle or diamond cluster around the camera"
    headroom: "minimal but protect all eyes, mouths, and edge faces"
    camera_height: "slightly above face level or held at arm length"
    lens_behavior: "controlled wide-angle selfie perspective with strong depth but no face warping"
    strategies:
      - "one foreground selfie arm or hand explains the camera position"
      - "closest subject anchors the lower center or lower third"
      - "side subjects lean inward to form a face cluster"
      - "back-row subjects sit higher in frame without blocking each other"
      - "background remains rich but softer and lower contrast than faces"
      - "use diagonal arms, hair, and lighting beams to add energy"
    avoid:
      - "flat lineup"
      - "same face repeated"
      - "foreground arm covering faces"
      - "fisheye face distortion"
      - "cropped eyes or mouth at frame edge"
    prompt_keywords: "premium wide-angle ensemble selfie, diamond face cluster, foreground selfie arm, controlled wide-angle perspective, layered party background"

  selfie_perspective_default:
    trigger_terms:
      - "selfie"
      - "自拍"
      - "group selfie"
      - "自拍視角"
    interpretation: "selfie perspective shot, not an automatic visible phone or selfie stick"
    subject_placement: "face and upper torso close to the camera; one near-side forearm enters from the lower or side frame edge toward the lens"
    camera_height: "front-camera feel, slightly above or near face height unless user specifies another angle"
    lens_behavior: "controlled close wide-angle perspective; proximity is visible but faces remain natural"
    strategies:
      - "use a front-facing arm-length camera POV, not an external observer composition"
      - "show one foreground forearm reaching toward the lens while the hand-held device remains completely beyond the crop"
      - "default to close half-body or three-quarter framing rather than distant full-body composition"
      - "keep eyes, mouth, and expression readable"
      - "for groups, stagger face heights and depths so everyone fits the close frame"
      - "keep foreground hands smaller and secondary so they do not dominate the face"
    avoid:
      - "visible phone unless explicitly requested"
      - "selfie stick unless explicitly requested"
      - "mirror selfie unless explicitly requested"
      - "phone covering face"
      - "oversized foreground hand"
      - "fisheye face distortion"
      - "external observer full-body view"
      - "extra hand holding an imaginary device"
    prompt_keywords: "front-facing arm-length camera POV, close handheld selfie perspective, near-side forearm reaching toward lens, device completely outside frame, controlled wide-angle face perspective, no visible phone"

  visible_selfie_device_explicit:
    trigger_terms:
      - "phone visible"
      - "手機入鏡"
      - "拿手機自拍"
      - "mirror selfie"
      - "鏡子自拍"
      - "selfie stick"
      - "自拍棒"
      - "GoPro"
      - "vlog camera"
    interpretation: "visible selfie device is allowed only because the user explicitly requested it"
    strategies:
      - "define which hand holds the phone, selfie stick, action camera, or vlog camera"
      - "define screen or lens direction"
      - "keep the device from covering eyes, mouth, face identity, important wardrobe, text, or product details"
      - "for mirror selfies, define mirror plane, phone reflection, gaze target, and hand-device contact"
      - "make device scale and perspective plausible for the camera distance"
    avoid:
      - "extra duplicated phone"
      - "phone fused with hand"
      - "phone blocking face unless requested"
      - "floating selfie stick"
      - "impossible mirror reflection"
      - "camera lens facing the wrong direction"
    prompt_keywords: "visible phone only by request, correct hand-device contact, screen or lens direction clear, device does not cover key face details"

  product_hero:
    subject_placement: "center or left third, depending on text"
    headroom: "generous negative space for text"
    camera_height: "slightly above product for 3/4 view"
    framing:
      - "hero: product fills 40-60% of frame"
      - "detail: product fills 80-100% of frame"
      - "lifestyle: product in context, 20-30% of frame"
    avoid:
      - "product touching edges"
      - "uneven margin on both sides"
      - "background competing with product color"
    prompt_keywords: "product hero composition, centered with negative space, 3/4 product angle"

  food:
    subject_placement: "off-center for dynamic plating"
    camera_height:
      - "45°: standard three-quarter view"
      - "90°: flat lay overhead"
      - "0°: eye level with food"
    framing: "tight to show texture, not too much table"
    avoid:
      - "oversaturated background"
      - "distracting cutlery placement"
      - "uneven lighting on hero element"
    prompt_keywords: "food composition, overhead flat lay, 45 degree food angle, tight texture crop"

  architecture_interior:
    subject_placement: "centered for symmetry, off-center for leading lines"
    verticals: "keep vertical lines straight — no converging verticals unless intentional"
    camera_height: "waist level for natural perspective"
    avoid:
      - "converging verticals (use tilt-shift or correct in post)"
      - "overexposed windows"
      - "cluttered foreground"
    prompt_keywords: "architecture composition, straight verticals, interior symmetry, wide angle interior"

  landscape:
    horizon: "upper third for foreground emphasis, lower third for sky emphasis"
    foreground: "include foreground element for depth"
    leading_lines: "use natural lines (river, path, shore) to guide inward"
    avoid:
      - "empty sky (no clouds, no interest)"
      - "bisecting horizon (don't split frame in half)"
      - "boring foreground"
    prompt_keywords: "landscape composition, foreground depth, horizon placement, leading lines landscape"

  editorial_fashion:
    subject_placement: "dynamic off-center, often leaning or moving"
    headroom: "can be extreme — crop creatively"
    strategies:
      - "break rules intentionally"
      - "extreme negative space for text"
      - "diagonal lean for energy"
    avoid:
      - "safe boring compositions"
      - "generic centered headshots"
    prompt_keywords: "editorial fashion composition, dynamic crop, extreme negative space, fashion frame"

  macro_detail:
    subject_placement: "fill the frame — rule of thirds applies to detail"
    focus_plane: "critical sharpness on the most important detail"
    depth_of_field: "very shallow, often f/2.8 or wider"
    avoid:
      - "too much depth of field (distracts from detail)"
      - "bad lighting direction (flattens texture)"
    prompt_keywords: "macro composition, fill the frame, extreme detail crop, shallow depth macro"


# =============================================================================
# COMPOSITION PITFALLS — what to avoid
# =============================================================================
composition_pitfalls:
  merging:
    description: "Background element merges with subject, creating visual confusion."
    example: "Tree branch growing out of subject's head."
    fix: "Shift camera position or subject until separation is clear."

  tight_crop_at_joint:
    description: "Cropping exactly at wrist, ankle, knee, or neck. Makes the subject look amputated."
    fix: "Crop between joints (mid-forearm, mid-shin) or include the full limb."

  horizon_bisection:
    description: "Horizon line cutting the frame exactly in half. Creates a static, boring split."
    fix: "Place horizon on upper or lower third."

  leading_out:
    description: "Leading lines or gaze direction leads the eye out of the frame with no reason."
    fix: "Ensure lines lead toward subject or bring eye back into frame."

  ambiguous_focus:
    description: "No clear primary subject. Viewer doesn't know where to look first."
    fix: "Establish clear focal priority. Use contrast, sharpness, or brightness to guide."

  cluttered_frame:
    description: "Too many competing elements. No visual hierarchy."
    fix: "Remove or simplify. Ask: does this element serve the subject?"

  unintentional_centered:
    description: "Subject accidentally centered without symmetry or intentionality."
    fix: "Either commit to full symmetry or move off-center with purpose."

  flat_composition:
    description: "No depth — all elements appear on the same focal plane."
    fix: "Add foreground interest, use leading lines, or shoot at an angle with depth."

  weight_imbalance:
    description: "All visual weight on one side of the frame, nothing balancing on the other."
    fix: "Add a smaller balancing element, or crop to a more intentional asymmetry."

  tangent:
    description: "Edges of two elements just barely touching. Creates visual tension that looks accidental."
    fix: "Either overlap clearly or separate clearly. No grazing touches."


# =============================================================================
# ASPECT RATIO COMPOSITION GUIDES
# =============================================================================
aspect_ratio_guides:
  square_1x1:
    description: "Equal width and height. Symmetrical, stable, social-media friendly."
    best_for: "Instagram, product hero, portrait tight"
    composition_tips:
      - "centered symmetry works beautifully"
      - "negative space on any side"
      - "fill the frame for impact"
    prompt_keywords: "square 1:1 composition, centered square frame, social media crop"

  landscape_16x9:
    description: "Wide format. Cinematic, expansive."
    best_for: "video thumbnail, cinematic still, landscape, hero banner"
    composition_tips:
      - "horizon on upper or lower third"
      - "depth layering essential — foreground, midground, background"
      - "rule of thirds works naturally"
    prompt_keywords: "16:9 widescreen composition, cinematic wide, landscape format"

  portrait_4x5:
    description: "Vertical format, slightly taller than wide. Standard print ratio."
    best_for: "print editorial, fashion portrait, book cover"
    composition_tips:
      - "subject fills vertical space naturally"
      - "generous headroom or intentional crop"
      - "top third is natural text area"
    prompt_keywords: "4:5 portrait composition, vertical editorial, print format"

  cinematic_235x1:
    description: "Ultra-wide anamorphic format. The standard cinematic widescreen ratio."
    best_for: "cinematic still, epic landscape, wide group"
    composition_tips:
      - "horizontal lines lead the eye across the frame"
      - "extreme foreground elements add depth"
      - "less vertical space — compose horizontally"
    prompt_keywords: "2.35:1 anamorphic composition, cinematic widescreen, ultra wide format"

  social_story_9x16:
    description: "Tall vertical format. Full-screen mobile."
    best_for: "Instagram stories, TikTok, mobile-first, portrait full-body"
    composition_tips:
      - "subject in center or top half"
      - "bottom area for text overlay"
      - "strong vertical lines work best"
    prompt_keywords: "9:16 vertical story composition, mobile full screen, social vertical"


# =============================================================================
# DYNAMIC MOTION COMPOSITION — visual psychology for moving subjects
# =============================================================================
# Motion composition exploits the viewer's visual inertia to create emotion.
# The same subject at the same speed feels radically different depending on
# how the frame relates to the direction of movement.
# =============================================================================
motion_composition:
  lead_room_travel:
    category: "conventional_natural"
    rule: "Space ahead of the subject must be at least 2:1 compared to space behind."
    visual_effect: "comfortable forward momentum, natural visual flow, psychologically reassuring"
    viewer_response: "The eye glides smoothly ahead of the subject. The viewer feels in control, as if riding alongside."
    prompt_keywords: "lead room composition, travel room, 2:1 forward space, natural motion framing, comfortable movement direction"

  trapped_composition:
    category: "intentional_psychoogical"
    rule: "Subject's forward space is deliberately cut off — the subject moves toward the edge of the frame."
    visual_effect: "extreme anxiety, claustrophobic tension, hunted sensation, overwhelming pressure"
    viewer_response: "The viewer subconsciously feels the subject has no escape route. Used in horror, thriller, and high-stakes chase. The psychological opposite of lead room."
    technique: "Position subject near the leading edge of frame (the edge they are moving toward), with minimal or zero space ahead. Camera may slightly lead-pull to maintain the trapped feel."
    prompt_keywords: "trapped composition, no lead room, claustrophobic motion, anxiety framing, hunted visual, chasing tension"
    notes: "This is a high-risk high-reward technique. Use sparingly — its power comes from contrast with normal lead room compositions."

  kinetic_dutch_angle:
    category: "dynamic_instability"
    rule: "Camera tilted 5-15° against the direction of the subject's turn or lean."
    visual_effect: "visceral speed sensation, physical instability, subconscious lean response"
    viewer_response: "The viewer unconsciously leans their body in response. The tilt creates a physical empathy with the centripetal force acting on the subject."
    technique: "When the subject leans into a turn (motorcycle, runner, skater), tilt the camera in the OPPOSITE direction. This exaggerates the perceived G-force and instability. Keeping the horizon level would neutralize the speed sensation."
    best_for: "motorcycle cornering, car drifting, runner banking around a curve, skater carving, horse turning at gallop"
    prompt_keywords: "kinetic Dutch angle, 15 degree motion tilt, anti-direction camera lean, G-force visual exaggeration, speed instability framing, subconscious lean composition"
    notes: "The amount of tilt maps to perceived speed — 5° for moderate speed, 15° for极限. Beyond 15° it becomes disorienting rather than thrilling."


# =============================================================================
# CAMERA ANGLES AND HEIGHTS — psychological impact of vertical camera position
# =============================================================================
# The height of the camera relative to the subject is one of the most
# powerful narrative tools. It directly shapes how the audience perceives
# the subject's power, vulnerability, and relationship to the environment.
# =============================================================================
camera_angles_and_heights:
  low_angle_hero:
    category: "power_dynamics"
    description: "低角度仰拍。相機置於主體視線下方向上拍攝。"
    visual_effect: "權威、宏大、英雄主義、具有壓迫感或崇高感。"
    best_for:
      - "商業產品的 Hero Shot（如汽車、巨型伺服器機櫃）"
      - "展現建築框架的拔地而起感"
      - "強化電影反派或英雄登場的氣勢"
    prompt_keywords: "low-angle shot, heroic perspective, worm's eye tilt, looking up at subject, imposing scale"
    notes: "要注意背景的雜亂度，仰拍會將天花板或天空引入作為主要背景。"

  high_angle_vulnerability:
    category: "power_dynamics"
    description: "高角度俯拍。相機置於主體視線上方向下拍攝。"
    visual_effect: "渺小、無助、被窺視感、或展現環境整體的秩序感。"
    best_for:
      - "劇情片中角色陷入絕境的心理刻畫"
      - "商業攝影中展現複雜桌面配置（Tabletop Grid）"
    prompt_keywords: "high-angle shot, vulnerable perspective, looking down, bird's-eye tilt, submissive framing"

  gods_eye_view:
    category: "spatial_planar"
    description: "上帝視角/正鳥瞰（Top-down Overhead）。相機與地面呈絕對 90° 垂直向下。"
    visual_effect: "絕對的客觀、神聖、地圖般的平面幾何秩序、抽離現實感。"
    best_for:
      - "美食攝影的高級平鋪（Flat Lay）"
      - "建築空間的標準層平面圖（Floor Plan）視覺化呈現"
      - "電影中表現命運掌控或宏大戰局的開場"
    prompt_keywords: "90-degree top-down view, god's eye perspective, perfect flat lay overhead, planar geometric layout"
    notes: "此視角會徹底消滅 Z 軸高度，必須依賴光影陰影來形塑物體的立體感。"

  eye_level_truth:
    category: "psychological_neutral"
    description: "等高平視（Eye-level）。相機與主角眼睛或產品幾何中心絕對平行。"
    visual_effect: "紀實、平等、不帶批判、極致的真實與沉浸感。"
    best_for:
      - "新聞紀實與人文街頭攝影"
      - "電商標準產品包裝正面圖"
    prompt_keywords: "eye-level shot, neutral perspective, zero tilt camera, natural human gaze"


# =============================================================================
# TEMPORAL MOTION COMPOSITION — camera movement that reshapes narrative time
# =============================================================================
# These techniques use camera motion combined with lens physics to manipulate
# the viewer's perception of time, space, and attention within a single shot.
# Unlike static composition rules, these unfold over time.
# =============================================================================
temporal_motion_composition:
  dolly_zoom_vertigo:
    category: "optical_illusion"
    description: "希區考克變焦（Dolly Zoom / Vertigo Effect）。攝影機實體向前推進（Dolly In），同時鏡頭進行光學變焦拉遠（Zoom Out），反之亦然。"
    visual_effect: "主體大小保持絕對不變，但背景空間產生瘋狂的壓縮或擴張。製造極度強烈的暈眩、心理震驚、或頓悟感。"
    best_for:
      - "懸疑/驚悚片中真相大白的瞬間"
      - "展現主體與宏大空間（如無盡的機房走廊、荒漠公路）的空間撕裂感"
    prompt_keywords: "dolly zoom effect, vertigo optical illusion, perspective warping, background compression streak"
    notes: "在 AI 影片生成（如 Wan 2.1）中，這個提示詞能觸發極具視覺震撼的時空拉伸。"

  rack_focus_rebalancing:
    category: "attention_shifting"
    description: "焦點轉移構圖（Rack Focus）。在極淺景深下，將焦點從前景主體 A 快速轉移到背景主體 B。"
    visual_effect: "在同一個鏡頭內重組構圖的權重，引導觀眾的注意力流動，製造「秘密被揭開」或「動態對話」的敘事感。"
    best_for:
      - "電影對話戲中，從傾聽者到說話者的權力轉移"
      - "商業攝影中，從產品外包裝焦點過渡到核心硬體晶片細節"
    prompt_keywords: "cinematic rack focus shift, shallow depth of field focus pull, selective focus transition"

  lead_push_in_isolation:
    category: "psychological_immersion"
    description: "緩慢急推/逼近（Slow Push-in）。攝影機軸向主體緩慢推進，逐漸從中景（Medium Shot）收窄為特寫（Close-up）。"
    visual_effect: "將空間環境（Context）逐漸剝離，強制觀眾進入角色的內心世界，放大其孤立感或專注度。"
    best_for:
      - "角色做出重大決策或內心崩潰的特寫"
      - "電競選手極度專注的眼神鎖定"
    prompt_keywords: "slow cinematic push-in, dynamic focal tightening, slow dolly-in tracking, framing concentration"


# =============================================================================
# CINEMATIC VISUAL METAPHORS — composition as narrative subtext
# =============================================================================
# These are not just framing rules — they are visual metaphors that encode
# the narrative subtext into the composition itself. The camera position
# becomes a storytelling device that communicates themes the script never
# needs to say aloud.
# =============================================================================
cinematic_visual_metaphors:
  short_framing_alienation:
    category: "psychological_discomfort"
    description: "反向留白/短視線構圖（Short-framing / Short-sighted Framing）。"
    rule: "故意打破常規的視線留白（Lead Room），讓角色面向「距離鏡頭邊緣最近的短邊」，使其前方幾乎沒有空間，而腦後留下巨大的無用空間。"
    visual_effect: "強烈的孤立、社交疏離、內心面臨死胡同的焦慮、或與環境格格不入的破碎感（經典代表：《大先生 Mr. Robot》）。"
    best_for:
      - "賽博朋克都市中邊緣人的孤獨感"
      - "驚悚片中角色被無形力量逼入絕境的心理隱喻"
    prompt_keywords: "intentional short-framing, short-sighted composition, zero lead room alienation, claustrophobic psychological placement"

  structural_line_division:
    category: "social_metaphor"
    description: "結構性線條分割（Bong Joon-ho / 奉俊昊式階級分割）。"
    rule: "利用場景內建的物理結構（如窗框、柱子、樓梯扶手、明暗陰影線），將畫面精準切割為兩個或多個區塊，並將不同角色安置於不同區塊中。"
    visual_effect: "在視覺上暗示角色之間「不可調和的隔閡」、「階級鴻溝」或「心理陣營的對立」（經典代表：《寄生上流 Parasite》）。"
    best_for:
      - "充滿戲劇衝突的雙人對手戲"
      - "展現傳統與現代、科技與自然共存的矛盾空間"
    prompt_keywords: "Bong Joon-ho style partition, structural window frame division, symbolic line separation composition"

  kubrick_one_point_perspective:
    category: "authoritarian_order"
    description: "庫布里克單點透視（Stanley Kubrick One-Point Perspective）。"
    rule: "將主體置於絕對中央，場景中所有的縱深平行線（如走廊、牆面、道路）以強烈的幾何對稱性向中央唯一的滅點（Vanishing Point）匯聚。"
    visual_effect: "極致的冷酷、宿命感、強迫症式的秩序、巨型體制對個人的壓迫感（經典代表：《鬼店》、《2001太空漫遊》）。"
    best_for:
      - "巨型科技基礎設施（如對稱的 AI 伺服器機房走廊、高壓變電所架構）"
      - "極簡主義硬核大片"
    prompt_keywords: "Kubrickian one-point perspective, absolute symmetrical vanishing point, rigid linear geometry, majestic clinical alignment"


# =============================================================================
# AUTOREVISE ENHANCEMENT LAYER — generator-safe composition decision system
# =============================================================================
# These sections are designed for prompt enhancers. They translate composition
# theory into generator-visible, non-ambiguous language and provide guardrails
# for cropping, layout, subject hierarchy, text-safe zones, UI readability,
# architecture perspective, and complex-scene organization.
# =============================================================================

generator_visible_composition_translation:
  purpose: "Translate composition theory into concrete visual instructions an image generator can render."
  principle:
    - "Describe what should be visible in the frame, where it sits, and how the eye travels."
    - "Do not rely only on abstract terms such as 'good composition' or 'cinematic framing'."
    - "Pair every composition rule with subject placement, crop boundary, depth layer, and visual hierarchy."
    - "When a rule may cause crop errors, add explicit guardrails such as 'feet fully visible' or 'hands not cropped'."

  translation_patterns:
    rule_of_thirds:
      weak_prompt: "rule of thirds composition"
      generator_prompt: "subject placed along the left or right third line, with balanced negative space on the opposite side and clear eye path toward the face or product"
      visible_effects:
        - "asymmetrical but balanced layout"
        - "subject not centered unless requested"
        - "usable empty space for atmosphere or text"
      add_when:
        - "cinematic portrait"
        - "travel editorial"
        - "lifestyle scene"
        - "poster with secondary background"

    centered_symmetry:
      weak_prompt: "symmetrical composition"
      generator_prompt: "subject centered on the vertical axis, left and right sides visually balanced, background geometry aligned symmetrically behind the subject"
      visible_effects:
        - "formal iconic presence"
        - "stable premium structure"
        - "architectural order"
      add_when:
        - "luxury product hero"
        - "architecture lobby"
        - "religious or ceremonial portrait"
        - "minimal poster"

    golden_ratio:
      weak_prompt: "golden ratio framing"
      generator_prompt: "subject placed near a natural golden-ratio focal point, with visual flow curving from foreground detail to the main subject and then into the background"
      visible_effects:
        - "organic eye movement"
        - "elegant editorial flow"
        - "less rigid than centered symmetry"
      add_when:
        - "bridal portrait"
        - "fashion editorial"
        - "romantic scene"
        - "premium product still life"

    leading_lines:
      weak_prompt: "leading lines"
      generator_prompt: "strong architectural or environmental lines converge toward the subject, guiding the viewer's eye directly to the hero element"
      visible_effects:
        - "clear depth"
        - "strong directional perspective"
        - "subject naturally emphasized by environment"
      add_when:
        - "streets"
        - "hallways"
        - "architecture"
        - "runway"
        - "vehicle road scene"

    negative_space:
      weak_prompt: "negative space"
      generator_prompt: "large uncluttered empty area reserved around the subject, with the hero element occupying a controlled smaller portion of the frame"
      visible_effects:
        - "premium calm"
        - "clear ad layout"
        - "room for headline or logo"
      add_when:
        - "commercial poster"
        - "fashion magazine cover"
        - "product ad"
        - "social media graphic"
      guardrail: "Specify exact empty-space side or percentage when text overlay matters."

    depth_layering:
      weak_prompt: "layered composition"
      generator_prompt: "clear foreground, midground, and background separation; foreground elements softly frame the subject, subject sharp in midground, background supports atmosphere without stealing attention"
      visible_effects:
        - "cinematic depth"
        - "spatial readability"
        - "premium realism"
      add_when:
        - "film still"
        - "street scene"
        - "complex environment"
        - "hidden object illustration"

    frame_within_frame:
      weak_prompt: "frame within frame"
      generator_prompt: "subject visually framed by doorway, window, mirror edge, arch, railing, foliage, or foreground object, creating a natural inner frame around the hero element"
      visible_effects:
        - "strong focus"
        - "storytelling viewpoint"
        - "environmental intimacy"
      add_when:
        - "cinematic interiors"
        - "romantic portrait"
        - "architecture"
        - "mystery scene"

    diagonal_tension:
      weak_prompt: "diagonal composition"
      generator_prompt: "main pose, light direction, or environmental lines run diagonally across the frame, creating energy and motion while preserving a clear subject silhouette"
      visible_effects:
        - "dynamic energy"
        - "action direction"
        - "visual tension"
      add_when:
        - "sports"
        - "battle scene"
        - "dance"
        - "vehicle motion"
      guardrail: "Keep face, hands, weapon, or product label sharp and readable."

composition_intent_selector:
  purpose: "Select a composition strategy based on task type, subject type, and output use case."

  human_portrait:
    default:
      shot_scale: "waist_up_or_medium_close_up"
      composition: "rule_of_thirds_or_golden_ratio"
      placement: "eyes near upper third line, face not too close to edge"
      depth: "subject separated from background with soft depth cues"
    protect:
      - "eyes"
      - "hands"
      - "face shape"
      - "hair silhouette"
      - "outfit crop boundary"
    add_positive:
      - "eyes placed near the upper third line"
      - "clean headroom"
      - "hands fully visible if included"
      - "background supports the face without clutter"
    add_negative:
      - "cropped fingers"
      - "cut off head"
      - "face pushed against frame edge"
      - "background merging with hair"

  full_body_character_design:
    default:
      shot_scale: "full_body"
      composition: "centered_or_slight_three_quarter"
      placement: "entire figure visible from head to toe"
      depth: "clean background or simple environment to preserve silhouette"
    protect:
      - "full outfit"
      - "feet"
      - "weapon or props"
      - "character silhouette"
    add_positive:
      - "full-body composition"
      - "entire figure visible from head to toe"
      - "feet fully inside the frame"
      - "clear readable silhouette"
      - "props fully visible and not cropped"
    add_negative:
      - "cropped feet"
      - "waist-up framing"
      - "unclear silhouette"
      - "weapon cut off by frame"

  fashion_editorial:
    default:
      shot_scale: "three_quarter_or_full_body"
      composition: "golden_ratio_negative_space"
      placement: "body line creates elegant vertical or S-curve flow"
      depth: "simple background with controlled negative space"
    protect:
      - "pose line"
      - "fabric shape"
      - "face"
      - "legs and shoes if full-body"
    add_positive:
      - "elegant magazine-style negative space"
      - "clear pose silhouette"
      - "clean crop boundaries"
      - "outfit shape and fabric drape fully readable"

  product_ad:
    default:
      shot_scale: "medium_close_up_or_full_product"
      composition: "centered_symmetry_or_golden_ratio"
      placement: "product label faces camera, hero product has breathing room"
      depth: "foreground surface, product plane, clean background gradient"
    protect:
      - "product geometry"
      - "label text"
      - "brand color"
      - "reflection control"
    add_positive:
      - "product label facing camera"
      - "clean commercial product layout"
      - "controlled negative space for copy"
      - "reflection does not obscure label"
    add_negative:
      - "cropped product"
      - "warped label"
      - "extra duplicate product"
      - "busy background behind label"

  architecture_interior:
    default:
      shot_scale: "wide_shot"
      composition: "one_point_or_two_point_perspective"
      placement: "camera at human eye height unless overhead requested"
      depth: "foreground threshold, midground furniture or lobby, background circulation"
    protect:
      - "straight verticals"
      - "ceiling height"
      - "floor-wall junction"
      - "material rhythm"
      - "walkable circulation"
    add_positive:
      - "straight vertical lines"
      - "controlled architectural perspective"
      - "clear floor, wall, and ceiling planes"
      - "realistic spatial depth"
    add_negative:
      - "warped walls"
      - "tilted verticals"
      - "impossible ceiling geometry"
      - "distorted furniture scale"

  architecture_exterior:
    default:
      shot_scale: "wide_or_extreme_wide"
      composition: "two_point_perspective_or_centered_symmetry"
      placement: "building fully visible unless facade detail requested"
      depth: "foreground street, building mass, sky or urban context"
    protect:
      - "facade grid"
      - "floor rhythm"
      - "structural plausibility"
      - "street scale"
    add_positive:
      - "entire building mass visible"
      - "consistent window rhythm"
      - "straight vertical edges"
      - "realistic street-level scale"
    add_negative:
      - "bent facade"
      - "random window spacing"
      - "impossible cantilever"
      - "cropped building top unless intentional"

  educational_game_ui:
    default:
      shot_scale: "screen_layout"
      composition: "clear_grid_or_zoned_layout"
      placement: "interactive objects large and separated"
      depth: "low to moderate depth; readability over cinematic depth"
    protect:
      - "readability"
      - "large tappable elements"
      - "clear objective"
      - "low cognitive load"
    add_positive:
      - "clear child-friendly UI layout"
      - "large readable interactive objects"
      - "simple visual hierarchy"
      - "uncluttered play area"
    add_negative:
      - "tiny text"
      - "overly complex background"
      - "interactive objects hidden by decoration"
      - "visual clutter"

  hidden_object_scene:
    default:
      shot_scale: "wide_or_isometric_wide"
      composition: "organized_dense_zones"
      placement: "many objects arranged in clear visual zones, not random clutter"
      depth: "foreground, midground, background zones with readable object silhouettes"
    protect:
      - "object readability"
      - "scene zoning"
      - "consistent scale"
      - "searchable details"
    add_positive:
      - "dense but organized hidden-object composition"
      - "clear visual zones"
      - "many small readable objects"
      - "no random clutter"
      - "objects separated by color and silhouette"
    add_negative:
      - "chaotic unsearchable clutter"
      - "tiny unreadable objects"
      - "merged object silhouettes"
      - "flat repetitive pattern"

  movie_poster:
    default:
      shot_scale: "hero_subject_with_environment"
      composition: "hero_hierarchy_negative_space"
      placement: "hero subject dominates first read; background story elements support second read"
      depth: "foreground atmosphere, hero plane, symbolic background"
    protect:
      - "hero hierarchy"
      - "title-safe space"
      - "strong silhouette"
      - "poster readability"
    add_positive:
      - "strong poster hierarchy"
      - "hero subject clearly dominates"
      - "background story elements secondary"
      - "clean space for title or logo"
    add_negative:
      - "equal-weight clutter"
      - "unclear main subject"
      - "random text"
      - "title area blocked"

subject_positioning_guardrails:
  purpose: "Prevent common crop and placement failures."

  headroom:
    good:
      - "small clean headroom above subject"
      - "top of head fully visible unless deliberate close-up"
    avoid:
      - "cut off head"
      - "excessive empty space above head"
      - "face too low in frame"

  hands:
    good:
      - "hands fully visible when emotionally or narratively important"
      - "fingers separated from background"
      - "hands not touching frame edge"
    avoid:
      - "cropped fingers"
      - "hands hidden behind props without reason"
      - "hands merging with clothing"

  feet_and_shoes:
    good:
      - "feet fully visible in full-body shots"
      - "shoes not touching bottom frame edge"
      - "ground contact visible"
    avoid:
      - "cropped feet"
      - "floating subject"
      - "missing ground shadow"

  face_edge_distance:
    good:
      - "face has breathing room from frame edges"
      - "eyes located on upper third line for portraits"
    avoid:
      - "face pressed against edge"
      - "eyes too close to top border"
      - "important facial features cropped"

  product_label:
    good:
      - "label faces camera"
      - "label in sharp focus"
      - "enough clean background behind label area"
    avoid:
      - "label angled away"
      - "reflection over label"
      - "label cropped or warped"

  architecture_verticals:
    good:
      - "vertical structural lines remain straight"
      - "camera tilt controlled"
      - "perspective intentionally selected"
    avoid:
      - "leaning walls"
      - "curved facade unless fisheye requested"
      - "inconsistent floor heights"

text_and_brand_safe_layout:
  purpose: "Reserve readable areas for typography, logo, subtitles, UI labels, or post-production text overlays."

  text_safe_zones:
    top_banner:
      prompt: "upper 15% kept clean and uncluttered for headline text"
      best_for:
        - "poster"
        - "social ad"
        - "thumbnail"
    bottom_caption:
      prompt: "bottom 20% reserved as clean caption area with low detail background"
      best_for:
        - "commercial poster"
        - "educational card"
        - "app banner"
    right_third:
      prompt: "right 30% negative space reserved for text overlay"
      best_for:
        - "product ad"
        - "fashion poster"
        - "vertical story format"
    left_third:
      prompt: "left 30% negative space reserved for logo and title"
      best_for:
        - "brand campaign"
        - "magazine cover"
    central_title_gap:
      prompt: "central upper area remains clean for title placement without covering the subject"
      best_for:
        - "movie poster"
        - "game key art"

  typography_guardrails:
    add_positive:
      - "clean low-detail background behind text-safe area"
      - "high contrast text-safe zone"
      - "subject does not overlap title area"
    add_negative:
      - "random text"
      - "illegible typography"
      - "busy texture behind text"
      - "subject blocking the title-safe space"

  logo_guardrails:
    add_positive:
      - "logo area remains clean and unobstructed"
      - "brand mark has clear breathing room"
      - "brand colors remain accurate"
    add_negative:
      - "warped logo"
      - "extra fake logos"
      - "logo covered by highlights"
      - "busy background behind logo"

complex_scene_zoning:
  purpose: "Organize dense images so they remain readable instead of becoming random clutter."

  zone_types:
    foreground_anchor:
      function: "Creates depth and anchors scale."
      generator_prompt: "one or two larger foreground elements frame the scene without blocking the main subject"
      avoid:
        - "foreground blocking hero element"
        - "foreground objects too sharp and distracting"

    midground_action:
      function: "Primary subject and main activity zone."
      generator_prompt: "main action clearly located in the midground with the strongest contrast and sharpest focus"
      avoid:
        - "main subject lost in background"
        - "equal detail everywhere"

    background_context:
      function: "Adds worldbuilding and atmosphere."
      generator_prompt: "background contains smaller contextual details, softer contrast, and less visual weight"
      avoid:
        - "background competing with main subject"
        - "random high-contrast distractions"

    side_quest_details:
      function: "Small discoverable details for hidden-object or game scenes."
      generator_prompt: "small readable details distributed into separate visual clusters, each with clear silhouette"
      avoid:
        - "micro details too small to read"
        - "objects merged into texture"

  density_levels:
    low:
      description: "Minimal scene, few elements, strong premium focus."
      max_detail_guidance: "1 hero, 1-2 supporting details, clean background"
    medium:
      description: "Editorial or cinematic scene with meaningful environment."
      max_detail_guidance: "1 hero, 3-5 supporting elements, 3 depth layers"
    high:
      description: "Hidden object, market, city, classroom, festival, game scene."
      max_detail_guidance: "many elements but grouped into clear zones"
    premium_ensemble:
      description: "Rich multi-character editorial or selfie scene with many costumes, accessories, faces, lights, and environmental details."
      max_detail_guidance: "3-5 hero faces, one shared camera angle, one lighting color script, one environment, 2-3 signature details per subject, background details grouped into soft depth layers"
    extreme:
      description: "Complex seek-and-find illustration."
      max_detail_guidance: "dense objects with repeated visual lanes, color-coded zones, and no random clutter"

visual_hierarchy_rules:
  purpose: "Define what the viewer should see first, second, and third."

  hierarchy_stack:
    first_read:
      definition: "The hero element seen within the first second."
      prompt_methods:
        - "highest contrast"
        - "sharpest focus"
        - "largest shape"
        - "brightest face or product label"
        - "central or third-line placement"
    second_read:
      definition: "Supporting details that explain context."
      prompt_methods:
        - "secondary contrast"
        - "slightly smaller scale"
        - "surrounding props"
        - "environmental geometry"
    third_read:
      definition: "Atmosphere, worldbuilding, and small discoverable details."
      prompt_methods:
        - "lower contrast"
        - "softer focus"
        - "smaller scale"
        - "background texture"

  generator_prompt_templates:
    simple: "clear visual hierarchy: [hero] first, [supporting element] second, [background atmosphere] third"
    product: "label is the first read, product silhouette second, material reflections third"
    portrait: "eyes and face are the first read, pose and outfit second, background atmosphere third"
    architecture: "main volume and entrance first, facade rhythm second, street and landscape context third"
    hidden_object: "large landmarks first, character activity second, small hidden objects third"

poster_layout_system:
  purpose: "Composition recipes for commercial, movie, game, and brand posters."

  layout_recipes:
    hero_center_top_title:
      structure: "hero subject centered; title-safe area above or below"
      best_for:
        - "movie poster"
        - "game key art"
        - "character poster"
      prompt: "centered hero composition with clean title-safe space, strong silhouette, background story elements secondary"

    diagonal_energy:
      structure: "subject pose, light, and background vectors move diagonally"
      best_for:
        - "sports poster"
        - "action movie"
        - "vehicle campaign"
      prompt: "diagonal composition with dynamic energy, subject remains sharp and readable, motion direction clearly visible"

    luxury_minimal_ad:
      structure: "small hero object, large negative space, refined material surface"
      best_for:
        - "perfume"
        - "jewelry"
        - "skincare"
        - "premium phone"
      prompt: "minimal luxury ad layout, hero product with generous negative space, clean background, precise material highlights"

    split_world_poster:
      structure: "frame divided into two contrasting visual worlds"
      best_for:
        - "before/after concept"
        - "dual identity"
        - "brand crossover"
        - "psychological poster"
      prompt: "clean split composition with two contrasting worlds, subject bridges both sides, division line visually intentional"

    magazine_cover:
      structure: "portrait subject with clean masthead area and editorial negative space"
      best_for:
        - "fashion editorial"
        - "celebrity portrait"
        - "beauty cover"
      prompt: "magazine-cover composition with clean masthead-safe top area, face and outfit readable, elegant editorial negative space"

ui_game_composition_rules:
  purpose: "Composition rules for educational games, UI screens, map scenes, and interactive layouts."

  screen_readability:
    add_positive:
      - "large tappable objects"
      - "clear play area"
      - "consistent spacing"
      - "simple visual hierarchy"
      - "important UI elements not hidden by background detail"
    add_negative:
      - "tiny buttons"
      - "low contrast icons"
      - "decorative clutter covering gameplay objects"
      - "random small unreadable text"

  age_level_defaults:
    low_grade:
      description: "For grade 1-2 children."
      composition: "large objects, simple lanes, few choices per screen, bright clear contrast"
      prompt: "simple child-friendly composition, large separated interactive objects, low cognitive load, no clutter"
    middle_grade:
      description: "For grade 3-4 children."
      composition: "moderate detail, more zones, clear feedback area, readable labels"
      prompt: "moderately detailed educational game screen, clear zones for question, play area, and feedback"
    high_grade:
      description: "For grade 5-6 children."
      composition: "more strategy space, map-like layout, still readable"
      prompt: "organized game-map composition with multiple readable zones and clear objective path"

  hidden_object_game:
    add_positive:
      - "slightly elevated wide view"
      - "organized visual districts"
      - "objects separated by silhouette and color"
      - "clear focal landmarks"
    add_negative:
      - "random clutter"
      - "unreadable micro objects"
      - "flat repeated pattern"
      - "no visual zoning"

architecture_perspective_control:
  purpose: "Prevent architecture and interior compositions from becoming warped or physically incoherent."

  one_point_perspective:
    best_for:
      - "hallway"
      - "lobby"
      - "corridor"
      - "symmetrical interior"
    generator_prompt: "single central vanishing point, straight vertical lines, floor and ceiling lines converge toward the center"
    risks:
      - "too rigid if used for organic interiors"
      - "can look uncanny if furniture scale is inconsistent"
    corrective_terms:
      - "realistic human-scale furniture"
      - "straight verticals"
      - "consistent ceiling height"

  two_point_perspective:
    best_for:
      - "building exterior corner view"
      - "product three-quarter view"
      - "interior room corner"
    generator_prompt: "controlled two-point perspective with vertical lines kept straight and depth lines receding naturally"
    risks:
      - "vertical distortion from excessive tilt"
    corrective_terms:
      - "no fisheye distortion"
      - "straight building edges"
      - "consistent facade grid"

  elevated_three_quarter:
    best_for:
      - "master plan"
      - "game environment"
      - "hidden object city"
      - "room layout"
    generator_prompt: "slightly elevated three-quarter view showing layout, circulation, and object relationships clearly"
    risks:
      - "can become isometric when not intended"
    corrective_terms:
      - "natural perspective, not flat diagram unless requested"

  orthographic_or_isometric:
    best_for:
      - "game map"
      - "UI layout"
      - "diagram"
      - "educational explainer"
    generator_prompt: "clean isometric or orthographic view, consistent scale, no dramatic lens distortion"
    risks:
      - "less cinematic"
    corrective_terms:
      - "readability prioritized over cinematic depth"

composition_failure_taxonomy:
  purpose: "Detect common composition failures and map them to targeted fixes."

  cropped_important_subject:
    symptoms:
      - "feet, hands, product cap, weapon, or building top unintentionally cut off"
    likely_causes:
      - "shot size unspecified"
      - "dynamic pose without crop guardrail"
      - "full-body request not reinforced"
    fix:
      - "add explicit shot size"
      - "add 'entire subject visible'"
      - "add crop-specific negative terms"
    add_positive:
      - "entire figure/product/building fully inside the frame"
    add_negative:
      - "cropped feet"
      - "cut off hands"
      - "cropped product top"

  weak_visual_hierarchy:
    symptoms:
      - "viewer cannot tell what the main subject is"
      - "all details have equal contrast"
    likely_causes:
      - "too many elements"
      - "no hero element"
      - "background too busy"
    fix:
      - "declare first-read hero element"
      - "reduce background contrast"
      - "use focus, scale, or placement to prioritize subject"
    add_positive:
      - "clear visual hierarchy"
      - "hero element is the first read"
      - "background details secondary"

  cluttered_negative_space:
    symptoms:
      - "text overlay area is busy"
      - "poster layout feels crowded"
    likely_causes:
      - "negative space requested but not protected"
      - "background texture too detailed"
    fix:
      - "reserve exact safe zone"
      - "lower detail and contrast inside text-safe area"
    add_positive:
      - "clean uncluttered negative space"
      - "low-detail background for text"
    add_negative:
      - "busy texture behind text"
      - "random objects in negative space"

  flat_no_depth:
    symptoms:
      - "scene looks pasted flat"
      - "no foreground, midground, background separation"
    likely_causes:
      - "no depth layering"
      - "front-facing subject without environment"
    fix:
      - "add depth planes"
      - "add foreground frame or background falloff"
    add_positive:
      - "foreground, midground, and background layers"
      - "clear spatial depth"
    add_negative:
      - "flat cutout look"

  distorted_architecture:
    symptoms:
      - "walls curve, vertical lines tilt, floors mismatch"
    likely_causes:
      - "wide-angle or dynamic angle without perspective guardrails"
    fix:
      - "specify controlled architectural perspective"
      - "preserve straight verticals"
    add_positive:
      - "straight vertical lines"
      - "controlled perspective"
      - "physically coherent structure"
    add_negative:
      - "fisheye distortion"
      - "warped walls"
      - "tilted facade"

  chaotic_hidden_object_scene:
    symptoms:
      - "dense image becomes random noise"
      - "objects too small or merged"
    likely_causes:
      - "density requested without zoning"
    fix:
      - "divide scene into visual zones"
      - "use readable silhouettes and landmarks"
    add_positive:
      - "dense but organized visual zones"
      - "many small readable objects"
      - "clear focal landmarks"
    add_negative:
      - "random clutter"
      - "merged object silhouettes"

composition_conflict_resolution:
  purpose: "Resolve conflicts between composition requests, crop rules, style, and output use case."

  full_body_vs_close_up:
    conflict: "User wants full outfit but also close-up emotional portrait."
    resolution: "If outfit is the hero, choose full-body or three-quarter. If expression is hero, choose waist-up or close-up. Preserve the user's explicit hero element."
    prompt_fix:
      outfit_hero: "three-quarter to full-body composition, outfit fully readable, face still clear"
      expression_hero: "waist-up portrait, face and emotion emphasized, key outfit details still visible"

  text_overlay_vs_busy_scene:
    conflict: "User wants complex background and text overlay."
    resolution: "Keep complexity away from the text-safe area. Reserve a clean zone with low contrast."
    prompt_fix: "dense scene on one side, clean negative space on the opposite side for text"

  cinematic_depth_vs_ui_readability:
    conflict: "User wants cinematic game screen but also usable educational UI."
    resolution: "Prioritize readability and interaction. Use light cinematic depth only in background."
    prompt_fix: "gameplay-readable layout with mild cinematic background depth, large clear UI objects"

  architecture_drama_vs_perspective_accuracy:
    conflict: "User wants dramatic low angle but architecture must remain realistic."
    resolution: "Use controlled low camera height without fisheye distortion; keep verticals straight if architectural accuracy matters."
    prompt_fix: "slightly low camera height, controlled perspective, straight verticals, no fisheye distortion"

  action_motion_vs_silhouette_readability:
    conflict: "Dynamic action may hide body, weapon, or costume."
    resolution: "Separate motion trails from the body silhouette; keep hero form sharp."
    prompt_fix: "dynamic diagonal motion, subject silhouette remains sharp and readable, motion trails outside the body outline"

  minimal_luxury_vs_many_props:
    conflict: "User asks luxury minimalism but includes many props."
    resolution: "Use one hero prop and one secondary texture; reduce all other elements."
    prompt_fix: "minimal luxury layout with one hero object, one supporting material texture, generous negative space"

composition_compression_rules:
  purpose: "Compress composition language for final prompts without losing crop and hierarchy constraints."

  semantic_clusters:
    visual_hierarchy:
      redundant_terms:
        - "clear hierarchy"
        - "strong focal point"
        - "main subject emphasized"
        - "viewer eye guided"
      compressed_as: "clear hero-first visual hierarchy"

    negative_space:
      redundant_terms:
        - "empty area"
        - "breathing room"
        - "clean space"
        - "uncluttered area"
      compressed_as: "clean negative space"

    depth:
      redundant_terms:
        - "foreground"
        - "midground"
        - "background"
        - "layered depth"
        - "spatial separation"
      compressed_as: "three-layer spatial depth"

    architecture_perspective:
      redundant_terms:
        - "straight verticals"
        - "controlled perspective"
        - "no warped walls"
        - "architectural accuracy"
      compressed_as: "controlled architectural perspective with straight verticals"

    full_body_guardrail:
      redundant_terms:
        - "full body"
        - "head to toe"
        - "feet visible"
        - "entire figure"
      compressed_as: "full-body, head-to-toe visible"

  remove_first:
    - "abstract composition labels without visible placement details"
    - "repeated synonyms for balance"
    - "multiple composition rules that fight each other"
    - "generic 'beautiful composition' phrasing"

  keep_always:
    - "shot size"
    - "hero element placement"
    - "crop guardrails"
    - "text-safe zone"
    - "architecture perspective guardrails"
    - "UI readability guardrails"

composition_quality_rubric:
  purpose: "Score composition quality during Phase 4 self-review."
  scoring:
    hero_clarity:
      weight: 25
      pass_condition: "The first-read hero element is unmistakable."
    crop_integrity:
      weight: 20
      pass_condition: "No important face, hand, foot, product, prop, logo, or building element is unintentionally cropped."
    spatial_depth:
      weight: 15
      pass_condition: "Foreground, midground, and background relationships are clear when depth is relevant."
    style_fit:
      weight: 15
      pass_condition: "Composition matches the selected task: poster, portrait, product, UI, architecture, or hidden object."
    text_or_ui_safety:
      weight: 10
      pass_condition: "Any required text/logo/UI area remains clean and readable."
    perspective_accuracy:
      weight: 10
      pass_condition: "Architecture, products, and vehicles maintain plausible geometry."
    clutter_control:
      weight: 5
      pass_condition: "Scene detail is organized into readable zones, not random noise."
  thresholds:
    production_ready: 90
    acceptable: 75
    needs_revision: 60
    reject: 59

prompt_assembly_hooks:
  purpose: "Define where composition fields should enter the final prompt package."
  order:
    - "shot_size"
    - "hero_element"
    - "subject_placement"
    - "crop_guardrails"
    - "composition_rule_visible_effect"
    - "depth_planes"
    - "text_or_logo_safe_zone"
    - "perspective_guardrails"
    - "clutter_or_density_control"
  rule:
    - "Never output only the composition rule name without visible placement details."
    - "If a user requested full-body, product label, architecture accuracy, or text overlay, composition guardrails must survive compression."
    - "If multiple composition rules are selected, choose one primary rule and one supporting depth or layout rule only."
