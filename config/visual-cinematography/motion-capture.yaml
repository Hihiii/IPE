version: 1
purpose: "Motion capture strategies for action, sports, pet, and dynamic photography."

# =============================================================================
# SHUTTER STRATEGIES — frozen information vs. visual flow
# =============================================================================
# Shutter choice is a philosophical decision between two radically different goals:
# 1. Technical capture: eliminate blur completely → data extraction, VFX, AI training
# 2. Aesthetic capture: control blur for cinematic flow → narrative, emotion, human perception
# =============================================================================
shutter_strategies:

  # ─── TECHNICAL CAPTURE ─────────────────────────────────────────────────
  technical_narrow_shutter:
    speed: "1/1000s to 1/4000s"
    shutter_angle_equiv: "45° to 90°"
    category: "technical"
    description: "Ultra-fast shutter that completely eliminates motion blur. Every frame is an absolutely sharp still image."
    purpose: "VFX tracking point extraction, AI training dataset, 3D trajectory reconstruction, joint node calculation, muscle texture analysis"
    motion_effect: "zero motion blur — each frame is a standalone photograph"
    visual_feel: "staccato, hyper-real, slightly unnatural to human eye (we expect some blur in motion)"
    light_cost: "extreme — requires very bright light or high ISO"
    prompt_keywords: "ultra fast shutter, technical freeze, no motion blur, absolute sharpness frame, VFX ready capture, AI training sharp, hyper-real frozen motion"
    notes: "At 1/4000s even a hummingbird's wings are frozen. The image looks 'too sharp' to most viewers — this is correct for machine vision, wrong for cinema."

  # ─── CINEMATIC CAPTURE ─────────────────────────────────────────────────
  cinematic_180_degree:
    speed: "2x frame rate reciprocal (24fps→1/50s, 30fps→1/60s, 60fps→1/120s, 120fps→1/250s)"
    shutter_angle_equiv: "180°"
    category: "aesthetic"
    description: "The golden standard of cinematic motion. Shutter speed equals twice the frame rate. Simulates human visual persistence."
    purpose: "narrative film, commercial cinematic, any content meant to feel natural and fluid"
    motion_effect: "natural motion blur — exactly what the human eye expects to see"
    visual_feel: "smooth, fluid, organic, cinematic — the 'film look'"
    light_cost: "moderate — balances sharpness and blur efficiently"
    prompt_keywords: "cinematic motion blur, 180 degree shutter, natural motion blur, film look motion, smooth cinematic motion, 24fps cinema shutter"
    notes: "This is the default for all cinematic work. The motion blur amount is perceived as 'natural' because it mimics how our eyes track movement. Always start here, deviate with intent."

  # ─── HYBRID / SPECIALTY ───────────────────────────────────────────────
  freeze_with_micro_blur:
    speed: "1/500s"
    shutter_angle_equiv: "~90° at 24fps"
    category: "hybrid"
    description: "Freezes most motion but allows micro-blur in fastest-moving extremities (paw tips, tail, hair, fingers)."
    best_for: "dog running, kid playing, dance, general action — dynamic but controlled"
    motion_effect: "mostly frozen with micro-blur at extremities — feels dynamic, not artificial"
    visual_feel: "energetic, dynamic, action-oriented but still natural"
    prompt_keywords: "fast action with micro blur, dynamic freeze, sharp body soft extremities, controlled motion capture"

  panning_motion:
    speed: "1/30s to 1/125s"
    shutter_angle_equiv: "45° to 360° depending on panning speed"
    category: "specialty"
    description: "Camera follows moving subject. Subject sharp, background motion-blurred. The speed sensation is created by the background blur, not the subject."
    best_for: "running animal side view, racing, cycling, car motion, galloping horse side tracking"
    motion_effect: "sharp subject against horizontally blurred background — pure speed sensation"
    technique: "match panning speed to subject speed. Slower shutter = more background blur = faster feel. Faster shutter = cleaner subject = more clinical."
    prompt_keywords: "panning shot motion blur background, sharp subject speed effect, horizontal motion blur, tracking pan action"
    notes: "Background blur direction and length directly communicates speed to the viewer. More blur = faster perceived speed, regardless of actual velocity."

  slow_shutter_creative_blur:
    speed: "1/4s to 1/15s"
    shutter_angle_equiv: ">360° (open longer than frame interval)"
    category: "specialty"
    description: "Very slow shutter for extreme creative blur. Subject may become unrecognizable streak. Requires tripod."
    best_for: "light trails, water abstraction, crowd as texture, abstract speed"
    motion_effect: "extreme blur or streak — subject identity may be lost"
    prompt_keywords: "extreme motion blur, long exposure action, creative blur effect, abstract speed streak, light trail motion"


# =============================================================================
# MOTION CAPTURE TECHNIQUES
# =============================================================================
motion_techniques:
  peak_action:
    description: "Capture the exact moment of apex in a motion cycle. The top of a jump, the moment before a catch."
    timing: "anticipate and shoot just before peak — reaction time delays capture"
    best_for: "dog catching ball, jumping athlete, horse jumping, dancer leap"
    prompt_keywords: "peak action moment, mid-air capture, apex of motion, decisive moment"

  follow_focus:
    description: "Camera tracks subject while maintaining focus. Used with continuous autofocus (AF-C)."
    technique: "keep focus point on subject's eye or center of mass, burst mode recommended"
    best_for: "running animal, moving vehicle, sport player, any lateral motion"
    prompt_keywords: "tracking focus, subject in motion, continuous focus, moving subject sharp"

  burst_sequence:
    description: "Multiple frames per second to capture a sequence of motion. Best frame selected later."
    rate: "10-30 fps recommended for fast action"
    best_for: "unpredictable motion, pet action, sport climax, expression change"
    prompt_keywords: "burst sequence, high-speed continuous shooting, multiple frames"

  pre_focus_trap:
    description: "Pre-focus on a specific point and wait for subject to enter the frame. Trigger when subject hits focus plane."
    best_for: "animal running past a point, ball entering frame, bird landing on perch"
    prompt_keywords: "focus trap, pre-focused zone, subject entering frame, waiting capture"


# =============================================================================
# SUBJECT-SPECIFIC MOTION GUIDES — biomechanics & soul capture
# =============================================================================
# Each species has a unique movement architecture. Capturing their essence requires
# understanding their biomechanical rhythm, not just freezing motion.
# =============================================================================
subject_motion:
  vehicle_high_speed_panning:
    biomechanics: "vehicle dynamics - rigid body translation, rotating wheels, tire-road contact, water displacement"
    core_mechanics: "A fast car remains a rigid, sharp body when the camera pans with it. Speed is communicated by lateral background streaks, spinning wheels, road-line streaks, and tire spray trailing behind the direction of travel."
    dynamic_observation: "The tire contact patch is the physical source of wet-road motion. Front tires cut through standing water and push it outward; rear tires throw rooster-tail spray backward. Headlight beams point along the vehicle's forward path and widen through rain mist instead of crossing the car diagonally."
    best_for: "racing, sports cars on wet roads, night highway speed, car drifting, motorcycle motion"
    camera_angle: "low three-quarter tracking view or side tracking view with the car body sharp and the background streaking horizontally"
    technique:
      primary: "pan with the car at matching speed; keep the grille, headlights, body panels, and brand-defining proportions crisp while allowing wheel rotation blur and background motion streaks"
      wet_road: "show tire contact patches cutting through shallow standing water, water displaced outward and backward, and reflections stretched along the road surface"
      night_rain: "align both headlight beams with the car's forward direction, diffused by rain haze and visible only where rain/mist catches the light"
    recommended_shutter: "1/30s to 1/125s visual equivalent for panning, with crisp hero body and controlled wheel/background blur"
    focus_target: "front grille, nearest headlight, or front quarter panel"
    prompt_keywords: "sharp panning automotive shot, crisp car body, horizontally streaked background, spinning wheel blur, tire contact patches, rearward tire spray, wet road reflections stretched along the road plane, headlight beams aligned forward through rain mist"
    negative_guardrails:
      - "diagonal spotlight crossing the vehicle"
      - "static parked pose"
      - "floating car"
      - "dry tire contact during rain"
      - "water spray moving forward or upward without tire source"
      - "blurred car body"
      - "warped wheels"
      - "melted grille"
      - "asymmetrical headlights"

  dog_running:
    biomechanics: "canine — explosive power, nonlinear trajectory"
    core_mechanics: "Spine-driven propulsion. Canines use spinal arching as a spring — the spine contracts and releases like a bow, generating explosive forward thrust. This differs fundamentally from equine locomotion which relies on gluteal power."
    dynamic_observation: "Dog gallop alternates between extreme stretch (all legs extended) and extreme tuck (all legs gathered under body). The suspension phase — all four paws off ground — is the peak visual moment."
    gait_patterns:
      trot:
        pattern: "diagonal gait — left front + right hind synchronize, then right front + left hind"
        visual: "smooth, rhythmic, moderate energy. The dog appears to bounce slightly between diagonal pairs."
        best_for: "steady panning shots, establishing running rhythm, slower-speed detail capture"
        recommended_shutter: "1/500s — smooth motion allows moderate shutter"
      gallop:
        pattern: "four-beat asymmetrical gait with suspension phase — all four paws leave the ground"
        visual: "epic, explosive, maximum stretch. The dog is fully airborne between stride cycles."
        best_for: "hero action shot, iso-velocity parallel tracking, suspension phase freeze"
        recommended_shutter: "1/1000s — suspension phase needs fast shutter to freeze"
    soul_of_the_shot: "The mid-air stretch when the dog is fully extended, muscles taut, fur blown back by wind. This is pure kinetic energy frozen in time."
    camera_angle: "dog's eye view — 20-40cm above ground, low angle that makes the dog look heroic"
    technique:
      primary: "pre-focus on the ball's parabolic apex. When dog jumps, tilt-up to follow, capturing the moment jaws close on ball with muscles tense and saliva flying."
      alt: "side pan at eye level, tracking the dog across the frame with motion blur background"
    recommended_fps: 120
    recommended_shutter: "1/1000s"
    recommended_aperture: "f/4"
    typical_lens: "70-200mm f/2.8-f/4"
    focus_target: "eye"
    prompt_keywords: "dog running full speed, dog galloping suspension phase, dog mid-air stretch, paws off ground, flying fur, low angle dog eye view, kinetic canine energy"

  dog_catching_ball:
    biomechanics: "canine — dead center aerial suspension"
    core_mechanics: "Spine-loaded jump. The dog crouches to compress the spinal spring, then releases in an explosive vertical-horizontal vector."
    dynamic_observation: "The jump-and-catch has a 'Dead Center' moment — a brief hover at the apex where the dog appears to float in air before gravity takes over."
    soul_of_the_shot: "The instant of hover: mouth millimeters from the ball, eyes locked on target, front paws reaching, saliva trailing in slow-motion. This is the canine equivalent of a ballet grand jeté."
    camera_angle: "low angle (20-40cm), tilt-up following the jump trajectory"
    technique:
      primary: "predict the ball's highest point. Pre-focus on that aerial zone. Fire burst just before dog enters frame."
      alt: "side view at dog's eye level, capturing the full jump arc from takeoff to catch."
    recommended_fps: 120
    recommended_shutter: "1/1000s or faster"
    recommended_aperture: "f/4"
    typical_lens: "70-200mm f/2.8"
    peak_moment: "jaws closing on ball, eyes locked, paws reaching, dead center hover"
    focus_target: "eye or ball"
    prompt_keywords: "dog jumping to catch ball mid-air, dead center hover, dog aerial catch, paws reaching up, low angle dog jump, canine grand jete"

  horse_galloping:
    biomechanics: "ungulate — gluteal-driven, massive body mass, four-beat rhythm"
    core_mechanics: "Gluteus maximus driven propulsion - fundamentally different from canine spinal-spring mechanics. Horse power comes from the hindquarters, with the spine remaining relatively rigid as a force transmission beam."
    dynamic_observation: "The gallop is a classic 'four-beat' cycle (left hind → right hind → left front → right front). Massive vertical oscillation of the center of gravity. Hoof strike transmits immense energy into the ground — dirt explosion at each impact."
    gait_patterns:
      trot:
        pattern: "two-beat diagonal gait — left front + right hind strike simultaneously, then right front + left hind"
        visual: "smooth, regular, moderate vertical bounce. Rider posts (rises) in rhythm."
        best_for: "side panning steady shots, establishing power, dressage detail"
        recommended_shutter: "1/500s"
      gallop:
        pattern: "four-beat asymmetrical with suspension phase — all four hooves leave ground between stride cycles"
        visual: "epic, total-body extension, maximum power. The horse appears to fly."
        best_for: "hero action, iso-velocity parallel tracking, dirt-explosion hoof strike"
        recommended_shutter: "1/1000s"
    soul_of_the_shot: "Hoof striking earth with dirt exploding upward, muscles rippling under coat, mane and tail streaming horizontally. The raw power of half a ton of muscle moving at 50 km/h."
    camera_angle: "side parallel tracking, camera at horse head height (150-170cm)"
    technique:
      primary: "use medium focal length (50-85mm) to minimize perspective distortion and truthfully render muscle rhythm. Capture hoof strike moment for maximum power."
      alt: "front-facing low angle as horse gallops toward camera — dramatic but requires very fast shutter."
    recommended_fps: 60
    recommended_shutter: "1/500s"
    recommended_aperture: "f/5.6"
    typical_lens: "50-85mm for true proportion, 200mm+ for compression"
    focus_target: "eye or shoulder"
    prompt_keywords: "horse galloping full speed, four-beat gallop cycle, hoof strike dirt explosion, horse muscle rhythm, mane flowing horizontal, horse head height side tracking"
    notes: "50-85mm gives the most anatomically accurate proportions. Telephoto compresses and flattens the horse's body — use intentionally."

  bird_in_flight:
    biomechanics: "avian — high-frequency vibration, three-dimensional movement"
    dynamic_observation: "Wingbeat frequency is highest during takeoff and landing (violent Z-axis oscillation). Gliding is relatively stable. The wing changes shape dramatically between upstroke and downstroke."
    soul_of_the_shot: "Wings fully extended at the bottom of the downstroke — every primary feather separated and backlit, revealing the intricate architecture of flight."
    camera_angle: "low angle pointing up, or find elevated position for eye-level shot"
    technique:
      primary: "use super-telephoto 400mm+. On takeoff, zoom-out or dolly-back to anticipate rapid forward acceleration."
      alt: "pan with bird in flight against clean sky background for maximum contrast on wing detail."
    recommended_fps: 240
    recommended_shutter: "1/2000s to 1/4000s"
    recommended_aperture: "f/8"
    typical_lens: "400mm+ f/4 or faster"
    focus_target: "eye or head"
    prompt_keywords: "bird in flight wings extended, primary feathers separated, bird taking off rapid acceleration, avian wing architecture, bird against sky, backlit wing feathers"
    notes: "At 1/2000s and below, fast wingbeats blur into impressionistic color. Only 1/4000s+ reveals true feather-by-feather detail."

  human_sprint:
    biomechanics: "bipedal — pelvis as center of gravity, ankle/knee as reaction force transmission points"
    core_mechanics: "Human explosive motion has strong nonlinear acceleration. The first 3 meters from the starting block have the highest acceleration in the entire race — velocity change per meter is maximum here."
    dynamic_moments:
      compression:
        phase: "蓄力期 — muscles maximally contracted, limbs coiled, center of gravity low"
        visual: "extreme tension, compressed power, coiled spring about to release"
        camera: "low and close to subject. Wide or medium focal length. Emphasize the physical pressure — muscle bulge, face strain, tendon definition."
      release:
        phase: "釋放點 — feet leave ground or fist impacts target"
        visual: "explosive energy, sudden extension, muscle deformation at maximum load"
        camera: "high FPS (120fps+). Capture sweat droplets, muscle ripple, facial distortion at impact."
    critical_acceleration_zone: "First 3 meters of sprint start have maximum nonlinear acceleration. The athlete's center of gravity rises from ~50cm (block) to full stride height in under 1 second. Z-axis deformation is extreme."
    lens_strategy_for_acceleration: "Must use deep depth of field (f/5.6-f/8) for the start phase. The rapid Z-axis movement (athlete rising from blocks to upright) will pull focus with shallow DOF. Zone focus on the 0-3m range with f/8 for guaranteed sharpness."
    soul_of_the_shot: "The start: every muscle coiled, face twisted in focused agony, dirt exploding from starting blocks. Or the finish: chest leaning into the tape, veins bulging, the exact millimeter of winning."
    camera_angle:
      start: "extreme low angle close-up on starting blocks and athlete's eyes — capture the compression"
      sprint: "frontal迎面 or side tracking — capture the release and full stride extension"
    technique:
      primary: "Ramping (variable frame rate) — 120fps slow-motion at start to show muscle loading, then return to 24fps for mid-race rhythm."
      alt: "frontal ultra-wide at finish line, capturing the exact moment of tape break."
    recommended_fps: "variable — 120fps at start, 24fps mid-race"
    recommended_shutter: "synchronized with frame rate (180-degree rule: 2x fps)"
    recommended_aperture: "f/5.6-f/8 for start zone (Z-axis), f/2.8 for lateral tracking (X-Y axis)"
    typical_lens: "70-200mm f/2.8 for tracking, 24mm for start line dramatic close-up"
    focus_target: "face or center of mass"
    prompt_keywords: "sprinter starting block explosion, human sprint peak motion, athlete muscle coiled, running core rotation, sprint finish line agony, extreme low angle sprint start, explosive acceleration first 3 meters"
    notes: "The start phase uses deep DOF (f/5.6-f/8) for Z-axis tolerance. Once athlete is upright and moving laterally, switch to f/2.8 for isolation. Ramping is the most cinematic technique for sprint."


# =============================================================================
# ACTION APERTURE — depth of field tolerance for moving subjects
# =============================================================================
# Aperture choice in motion photography is a risk management decision:
# wider aperture = stronger subject isolation but razor-thin focus margin.
# Choice depends on motion axis, tracking technology, and narrative intent.
# =============================================================================
action_aperture:
  deep_zone_tracking_f5_6_11:
    description: "Deep focus for Z-axis motion and multi-subject tracking. High focus tolerance."
    risk: "low — generous focus plane accommodates forward/backward movement"
    best_for: "subject moving toward/away from camera (Z-axis), multiple subjects at different distances, unpredictable motion trajectory, bird takeoff, horse galloping toward camera"
    motion_axis: "Z-axis (forward/backward) — subject moves through the focus plane"
    technique: "stop down to f/5.6 or f/8 with sufficient light. Pre-focus on the action zone and let depth of field do the work."
    narrative_effect: "environmental — viewer sees subject in context, background detail adds story"
    prompt_keywords: "deep focus action, deep depth of field motion, Z-axis tracking deep focus, high tolerance action focus, environmental motion capture"

  shallow_isolate_f2_8_4:
    description: "Shallow focus for X-Y axis motion with active focus assist. Maximum subject separation."
    risk: "high — requires wireless follow-focus (LiDAR or phase-detection AF) and discipline"
    best_for: "subject moving parallel to camera plane (X-Y axis), single subject isolation, muscle detail close-up, expression capture, cinematic sport portrait"
    motion_axis: "X-Y axis (lateral/horizontal) — subject stays on same focus plane"
    technique: "requires LiDAR or phase-detection auto-focus with continuous tracking. Only use when subject movement is predominantly lateral."
    narrative_effect: "intimate — background obliterated, viewer locked onto subject's muscle tension, expression, or equipment"
    prompt_keywords: "shallow depth of field action, subject isolated motion, X-Y axis shallow focus, cinematic shallow DOF sport, intimate action close-up"
    notes: "Without active focus assist (LiDAR/advanced AF-C), f/2.8 on a moving subject is a gamble. The closer the subject, the thinner the margin."

  moderate_hybrid_f4_5_6:
    description: "Balanced focus margin with meaningful separation. The action sweet spot."
    risk: "moderate — forgiving enough for most motion, separated enough for visual impact"
    best_for: "general action, running dog lateral tracking, most field sports, dance performance"
    motion_axis: "any — accommodates mixed Z and X-Y movement"
    technique: "default for action when lighting allows. f/4 gives one-stop margin over f/2.8 while maintaining visible background separation."
    narrative_effect: "balanced — subject pops from background but environment remains readable"
    prompt_keywords: "moderate depth of field action, balanced focus motion, action sweet spot aperture, mixed axis motion capture"


# =============================================================================
# ADVANCED MOTION SCENARIOS — professional production specs
# =============================================================================
# Complete rig, codec, and shutter specs for demanding motion capture scenarios.
# Each entry is a production-ready recipe combining fps, shutter, lens, rig, and recording format.
# =============================================================================
motion_scenarios:
  martial_arts_high_difficulty:
    description: "High-difficulty stunt choreography. Fast, complex, multi-point movement with weapon or body contact."
    biomechanics: "explosive human — torque from core, whip-like limb extension, impact force"
    recommended_fps: "48/60fps"
    shutter_angle: "90° to 144°"
    shutter_speed_equiv: "1/120s to 1/250s at 60fps"
    focal_length_35mm_equiv: "35-50mm"
    lens_rationale: "Standard to slight wide — captures full body plus weapon extension without distortion. Wide enough for environment context, tight enough for impact detail."
    rig: "三軸穩定器 + 步進跟隨 (3-axis gimbal with step follow mode)"
    rig_rationale: "Step follow mode resists operator inertia — the gimbal stays locked in orientation until operator applies deliberate force, eliminating micro-jitters during fast choreography."
    codec_color: "ProRes 422 HQ / Log"
    codec_rationale: "422 HQ retains enough chroma for skin-tone grading under mixed lighting. Log profile preserves highlight detail in explosions or bright set pieces."
    prompt_keywords: "martial arts high fps, stunt choreography capture, 60fps action, 90 degree shutter action, gimbal step follow fight scene"

  vehicle_car_chase:
    description: "High-speed vehicle pursuit. Dynamic camera movement matching vehicle velocity."
    biomechanics: "machine — mass inertia, tire deformation at limit, suspension compression, aerodynamic buffeting"
    recommended_fps: "24/60fps"
    shutter_angle: "180° (maintain fluidity)"
    shutter_speed_equiv: "1/50s at 24fps, 1/120s at 60fps"
    focal_length_35mm_equiv: "16-24mm"
    lens_rationale: "Ultra-wide grounded perspective — exaggerates speed by making foreground pass quickly. Use 16mm贴地 for ground-level dramatic foreground."
    rig: "車載搖臂 (Russian Arm or equivalent car-mounted rig)"
    rig_rationale: "Russian Arm mounts camera to a chase car with a robotic arm, allowing 360° positioning around the subject vehicle at matching speed. Essential for side-by-side 80km/h+ shots."
    codec_color: "RAW / 最大動態範圍 (maximum dynamic range)"
    codec_rationale: "Car chase has extreme dynamic range — bright sky, reflective paint, dark wheel wells, headlights. RAW captures all of it. Grade later."
    prompt_keywords: "car chase cinematic, 180 degree shutter vehicle, Russian arm car rig, 16mm wide chase, vehicle pursuit camera"

  motion_capture_bone_tracking:
    description: "Skeletal motion capture for VFX, biomechanical analysis, or AI training data. Every frame is a data point."
    biomechanics: "analytical — joint angles, limb segment tracking, center of mass trajectory, ground reaction force inference"
    recommended_fps: "120/240fps"
    shutter_angle: "45° (1/1000s or faster)"
    shutter_speed_equiv: "1/1000s to 1/4000s"
    focal_length_35mm_equiv: "85mm"
    lens_rationale: "85mm minimizes perspective distortion across the frame — critical for consistent joint position data. No wide-angle foreshortening that would distort skeletal reconstruction."
    rig: "重型三腳架 / 鎖定機位 (heavy tripod, locked-off position)"
    rig_rationale: "Any camera movement introduces parallax that must be solved in post. Locked-off position with a nodal head ensures pure subject motion data with zero camera-induced variables."
    codec_color: "10-bit 4:2:2"
    codec_rationale: "10-bit prevents banding in gradients (common in tracking markers on solid backgrounds). 4:2:2 chroma subsampling ensures clean keying for subject extraction."
    prompt_keywords: "motion capture 240fps, skeletal tracking capture, 45 degree shutter mocap, locked off camera mocap, 10-bit 4:2:2 bone tracking"

  extreme_sport_ramping:
    description: "Variable frame rate (ramping) for extreme sports. Slow-motion at peak action, real-time during approach."
    biomechanics: "kinetic chain — momentum builds through approach, concentrates at impact/launch, disperses on landing"
    recommended_fps: "120→24fps (variable ramping)"
    shutter_behavior: "real-time sync adjustment — shutter tracks frame rate changes seamlessly"
    shutter_rule: "maintain 180° rule across the ramp: shutter follows fps in real-time"
    focal_length_35mm_equiv: "24-70mm zoom"
    lens_rationale: "Zoom allows dynamic reframing during the action — pull back for approach, punch in for impact detail. Single lens covers the full action range."
    rig: "搖臂 / 獨腳架高機動跟隨 (jib arm or monopod for high-mobility follow)"
    rig_rationale: "Monopod gives vertical mobility (crouch-to-stand follow) while maintaining stability. Jib arm adds horizontal sweeping for dramatic reveals."
    codec_color: "ProRes 4444"
    codec_rationale: "4444 preserves full chroma resolution for extreme grades. Ramping means variable exposure — 4444 gives maximum grading headroom to match shots across the speed change."
    prompt_keywords: "extreme sport ramping, variable frame rate action, 120fps to 24fps ramp, ProRes 4444 action, monopod extreme sport follow"


# =============================================================================
# CAMERA RIGGING PHYSICS — relative velocity & focus strategy
# =============================================================================
# The core problem: how does a 20kg+ camera rig keep pace with a subject moving at 50km/h?
# Solution: understand relative velocity and choose the right mechanical partner.
# =============================================================================
rigging_physics:

  # ─── RELATIVE VELOCITY MANAGEMENT ──────────────────────────────────────
  iso_velocity_tracking:
    category: "relative_velocity"
    principle: "Camera moves parallel to subject at the same speed. Relative velocity = zero."
    description: "Camera and subject maintain a constant spatial relationship — subject appears stationary relative to camera, background is blurred by motion parallax."
    visual_effect: "subject hyper-sharp, background smoothly streaked by motion parallax, depth separation without shallow DOF"
    rig: "追逐車 + 搖臂 (chase car + Technocrane arm)"
    rig_detail: "Technocrane mounted on a matching-velocity vehicle. The arm allows lateral/vertical offset while maintaining zero relative velocity."
    shutter_consideration: "Standard 180° rule is sufficient — relative velocity is zero so subject has no motion blur. Background blur comes from parallax, not shutter."
    best_for: "side-by-side car chase, galloping horse parallel tracking, athlete sprint side tracking"
    prompt_keywords: "iso-velocity tracking, zero relative velocity, chase car technocrane, subject sharp background parallax blur, parallel motion tracking"

  cross_velocity_intersect:
    category: "relative_velocity"
    principle: "Camera and subject move toward each other or on intersecting diagonals. Relative velocity = sum of both speeds."
    description: "Camera intersects the subject's path — creates a dramatic velocity exchange moment but doubles the relative speed. The moment of closest approach has 2x the motion energy."
    visual_effect: "extreme dynamic impact at intersection point, subject rockets past camera, intense speed exchange"
    rig: "穿越機 FPV Drone 或 高速索道系統 Cable Cam"
    rig_detail: "FPV drone for flexible 3D intersecting paths. Cable cam for predictable repeatable intersections on a fixed line."
    shutter_consideration: "CRITICAL: relative speed is doubled (subject speed + camera speed). Shutter must be increased by 1-2 stops above normal. At 1/500s equivalent, use 1/1000s-1/2000s. At intersection moment, frames may still show micro-blur — acceptable as speed artifact."
    best_for: "car head-on pass, runner intersecting drone path, horse jumping toward camera with dolly push-in, dramatic reveal pass"
    prompt_keywords: "cross-velocity tracking, intersecting motion paths, FPV drone intersect, 2x relative speed shutter compensation, cable cam velocity cross"
    notes: "The moment of closest approach has the highest blur risk. Burst fire through the intersection and select the frame just before or after peak for maximum sharpness."

  # ─── HIGH-SPEED FOCUS STRATEGIES ──────────────────────────────────────
  lidar_active_focus:
    category: "focus_strategy"
    principle: "LiDAR emits laser pulses to measure subject distance in real-time. Focus motor adjusts instantaneously regardless of speed."
    description: "Active LiDAR focus system (e.g., DJI Lidar, Sony Lidar AF) paints the subject with infrared laser points. Camera tracks Z-axis movement perfectly even in low light."
    best_for: "Z-axis motion (subject running toward/away from camera), unpredictable trajectory, low-light action, fast approach shots"
    limitation: "LiDAR can be confused by: reflective surfaces (water, mirrors), heavy fog/rain/dust, multiple subjects at same depth"
    rig: "LiDAR module mounted on camera hot shoe or rail, paired with compatible focus motor (DJI RS series or Tilta Nucleus)"
    prompt_keywords: "LiDAR active autofocus, laser tracking focus, Z-axis motion tracking, unpredictable subject focus, low light autofocus action"

  zone_focusing_manual:
    category: "focus_strategy"
    principle: "Pre-measure physical distances to marked ground points. Manual follow-focus pulls to each zone as the subject passes."
    description: "The most hardcore cinematic technique. Before the take, mark points A, B, C on the ground using tape or markers. Measure exact distances from camera to each point. The focus puller rehearses the pulls: zone A→B→C timed to the subject's speed."
    visual_effect: "Absolutely precise focus when done correctly. No hunting, no AI delay, no LiDAR confusion."
    best_for: "extreme environments (dust storm, heavy rain, smoke/fog), repeatable action with known path, period film where technology feel is wrong"
    when_to_use: "When LiDAR/autofocus fails due to environment. When director demands absolutely predictable focus rack. When subject path is fixed and repeatable."
    technique: "Mark physical ground points. Measure distances. Mark focus barrel with tape for each zone. Rehearse pull timing with the subject walking first, then at half speed, then full speed."
    prompt_keywords: "zone focusing manual, pre-measured focus pull, ground mark focus points, manual follow focus extreme environment, precision manual rack focus"
    notes: "The more rehearsal, the better the take. Professional focus pullers can hit marks within 2cm error at 50km/h subject speed with enough practice."


# =============================================================================
# MECHANICAL & FLUID DYNAMICS — vehicles, explosions, liquids
# =============================================================================
# Inanimate motion follows strict physical inertia, but velocity can increase
# exponentially. Composition must account for edge distortion and safe action area.
# =============================================================================
mechanical_fluid_dynamics:
  vehicle_high_speed:
    core_mechanics: "Mass inertia, tire deformation at limit, aerodynamic downforce, suspension compression under braking."
    speed_perception: "Speed is perceived through edge distortion and foreground reference, not subject size. A car at telephoto compression looks slow regardless of actual velocity."
    lens_rule: "NEVER use long telephoto from front-on approach — telephoto compression eliminates perceived speed. Use wide-angle (16-24mm) close to ground. The edge distortion (wide-angle barrel) amplifies foreground motion and creates extreme speed sensation."
    camera_position: "Low to ground (10-30cm). Ground-level wide-angle exaggerates the speed differential between foreground tarmac (blazing past) and background (compressed)."
    technique: "Wide-angle貼地 with panning. The foreground surface moves through the frame edge at high velocity, while the subject remains relatively centered — the contrast creates speed."
    shutter_recommendation: "180° rule for cinematic flow. If cross-velocity, increase by 1 stop to compensate for doubled relative speed."
    prompt_keywords: "wide angle racing,貼地 vehicle shot, edge distortion speed, 16mm car chase, foreground velocity reference, anti-telephoto speed rule"

  explosion_dynamics:
    core_mechanics: "Rapid gas expansion, shockwave propagation, debris particle dispersion following inverse-square law."
    particle_velocity: "Shrapnel/debris can exceed 100m/s at initial burst. Frame-filling expansion in under 1/100s."
    composition_safe_action_area: "Reserve minimum 30% margin around the expected blast center. Particles expand outward faster than the eye can track — without safety margin, the explosion 'escapes the frame' in a single frame."
    technique: "Frame wide, let the explosion fill INTO the frame rather than trying to track it. The viewer should see the blast expand, not catch up to it."
    shutter_recommendation: "1/2000s minimum to freeze debris particles. At 1/1000s, fast-moving fragments become motion streaks."
    prompt_keywords: "explosion capture safe action area, 30% margin explosion, debris freeze high shutter, blast expansion composition, wide frame explosion"

  liquid_splash:
    core_mechanics: "Surface tension rupture, droplet dispersion, Rayleigh jet formation. Droplets move at 5-15m/s depending on impact force."
    peak_moment: "The 'crown' formation — the first 1/500s after impact when the liquid forms a symmetric corona before gravity breaks it."
    composition_safe_action_area: "Minimum 30% margin from splash center to frame edge. Droplets can travel 3-5x the splash pool diameter at peak."
    technique: "Backlight the splash for backlit droplet visibility. Use a trigger (sound or laser) to capture the exact impact moment."
    shutter_recommendation: "1/2000s to freeze individual droplets. 1/4000s for micro-droplet detail."
    prompt_keywords: "liquid splash capture, crown formation high shutter, backlit droplet freeze, splash safe action margin, impact moment trigger"


# =============================================================================
# AUTOREVISE EXTENSIONS — generator-visible motion language and failure control
# =============================================================================
# These sections are designed for prompt-enhancer pipelines. The human technical
# layer may reference shutter speed, shutter angle, rigs, and biomechanics; the
# final generator prompt should translate those choices into visible motion cues,
# readable pose language, and targeted correction terms.
# =============================================================================

generator_visible_motion_translation:
  purpose: "Translate technical motion-capture decisions into image-model-visible effects."
  general_rule: "Do not rely on shutter speed alone. Always describe the visible result: frozen droplets, trailing fabric, directional blur, crisp face, readable limb silhouette, dust arc, splash shape, or wheel streak."
  technical_terms_to_translate:
    shutter_speed:
      human_reference: "1/1000s, 1/2000s, 45° shutter, 180° shutter"
      generator_prompt: "crisp frozen action, readable body outline, suspended particles, controlled motion blur only where intended"
      avoid_in_final_prompt:
        - "shutter angle"
        - "1/2000s"
        - "tracking rig"
        - "LiDAR"
      use_numeric_only_when:
        - "camera education diagram"
        - "technical photography prompt"
        - "video workflow prompt"
    motion_blur:
      human_reference: "long exposure, panning, 180-degree cinematic blur"
      generator_prompt: "directional motion streaks following the subject's travel path, sharp face or hero object, background streaked by movement"
      visible_effects:
        - "clear direction of travel"
        - "sharp focal anchor"
        - "blur follows one vector"
        - "foreground and background blur do not contradict the subject motion"
    panning:
      human_reference: "camera tracks subject laterally"
      generator_prompt: "sharp subject against horizontally streaked background, wheels or limbs show slight rotational blur, strong sense of speed"
      corrective_terms:
        - "subject remains sharp"
        - "background streaks align with travel direction"
        - "no duplicated subject"
    ramping:
      human_reference: "shutter or speed ramping"
      generator_prompt: "one decisive frozen instant surrounded by subtle temporal trails, cinematic acceleration feeling without ghost duplicates"
      corrective_terms:
        - "single clear subject"
        - "controlled temporal trail"
        - "no multiple bodies"
    particle_freeze:
      human_reference: "high-speed capture"
      generator_prompt: "individual droplets, dust, sparks, hair strands, and fabric edges suspended in midair"
      corrective_terms:
        - "particles separated and readable"
        - "not smoky mush"
        - "sharp subject silhouette"

