version: 1
purpose: "Visual language, medium, and mood lexicon for cinematic and commercial photography."

# =============================================================================
# VISUAL LANGUAGE — overall aesthetic categories
# =============================================================================
visual_languages:
  premium_commercial:
    description: "High-end product photography with clinical precision, controlled lighting, perfect sharpness."
    best_for: "luxury product, beauty, automotive, jewelry"
    medium: "photography"
    prompt_keywords: "premium commercial photography, luxury studio aesthetic, editorial quality, sharp focus"

  cinematic_dramatic:
    description: "Film-inspired lighting with deep shadows, rich contrast, intentional color grading."
    best_for: "editorial, fashion, film poster, storytelling"
    medium: "photography"
    prompt_keywords: "cinematic lighting, dramatic contrast, film grade, chiaroscuro, moody atmosphere"

  minimalist_clean:
    description: "Sparse composition, generous negative space, subtle lighting, restrained palette."
    best_for: "minimalist product, modern interior, tech, luxury minimal"
    medium: "photography"
    prompt_keywords: "minimalist photography, clean composition, restrained palette, soft even light"

  natural_documentary:
    description: "Available light feel, organic shadows, unposed subjects, authentic texture."
    best_for: "lifestyle, food, travel, editorial reportage"
    medium: "photography"
    prompt_keywords: "natural light photography, documentary style, authentic texture, available light"

  futuristic_tech:
    description: "Clean lines, cool color palette, hard rim lights, metallic reflections, precise geometry."
    best_for: "tech product, automotive futuristic, sci-fi editorial"
    medium: "photography_or_3D"
    prompt_keywords: "futuristic aesthetic, cool blue tone, hard rim light, metallic reflection, tech precision"

  editorial_fashion:
    description: "Bold composition, unconventional framing, high contrast, creative color grading."
    best_for: "fashion editorial, magazine cover, avant-garde"
    medium: "photography"
    prompt_keywords: "editorial fashion, bold composition, creative grading, avant-garde styling"

  fine_art:
    description: "Painterly quality, soft diffused light, muted palette, classical composition."
    best_for: "fine art print, gallery, still life, art portrait"
    medium: "photography"
    prompt_keywords: "fine art photography, painterly light, classical composition, muted tones, museum quality"

  lifestyle_warm:
    description: "Inviting, natural, relatable. Soft warm light, casual composition, human-centered."
    best_for: "family, food, interior, travel, brand lifestyle"
    medium: "photography"
    prompt_keywords: "warm lifestyle photography, natural inviting light, candid feel, relatable scene"

  outdoor_action:
    description: "Dynamic outdoor activity with natural light, motion, and environmental context."
    best_for: "pet action, sport outdoor, kids playing, beach activity, hiking"
    medium: "photography"
    prompt_keywords: "outdoor action photography, natural sunlight, dynamic motion, environmental activity, candid action"

  wildlife_nature:
    description: "Animal in natural habitat, patient observation, no artificial lighting, authentic behavior."
    best_for: "wildlife, bird, pet portrait, zoo, nature documentary"
    medium: "photography"
    prompt_keywords: "wildlife photography, natural habitat, animal portrait, authentic behavior, telephoto compression"

  sport_action:
    description: "Fast motion, frozen or motion-blurred action, peak moment capture, athletic intensity."
    best_for: "sports, athletics, dance, action sports, pet agility"
    medium: "photography"
    prompt_keywords: "sports photography, frozen action, peak motion, fast shutter, athletic dynamic"


# =============================================================================
# MEDIUM — the technical nature of the output
# =============================================================================
mediums:
  photography:
    description: "Photorealistic, lens-based capture. Physical camera artifacts (bokeh, lens flare, depth of field)."
    default_lens_character: "true"
    prompt_keywords: "photography, lens-based, camera capture, photorealistic"

  photorealistic_3D:
    description: "Computer-generated but indistinguishable from photography. Perfect lighting, no physical limits."
    default_lens_character: "simulated"
    prompt_keywords: "photorealistic 3D render, CGI, physically based rendering, ray traced"

  illustration:
    description: "Artistic interpretation. Visible brushwork or stylized rendering."
    default_lens_character: "false"
    prompt_keywords: "illustration, digital painting, artistic rendering"

  hybrid_photo_3D:
    description: "Photography base with 3D enhancement. Used when physical photography is extended with CGI elements."
    default_lens_character: "true"
    prompt_keywords: "photography with CGI enhancement, photo-real composite"


# =============================================================================
# MOOD LEXICON — emotional tone with lighting/color tendencies
# =============================================================================
moods:
  luxurious_calm:
    description: "Wealthy, refined, serene. Warm golds, deep neutrals, soft directional light."
    lighting_tendency: "soft directional key, moderate contrast, gentle shadow"
    color_tendency: "warm gold, amber, charcoal, deep brown"
    prompt_keywords: "luxurious calm mood, elegant refined tone, warm sophisticated lighting"

  dramatic_intense:
    description: "High stakes, powerful, bold. Hard light, deep shadows, high contrast."
    lighting_tendency: "hard key light, deep shadows, high contrast ratio 8:1+"
    color_tendency: "cool shadows with warm accent, desaturated with selective pop"
    prompt_keywords: "dramatic intense mood, high contrast lighting, bold shadows, powerful tone"

  warm_intimate:
    description: "Personal, cozy, inviting. Warm color temperature, soft wrap light, close subject distance."
    lighting_tendency: "warm soft light, close proximity, gentle falloff, wrap-around"
    color_tendency: "warm 3200K-4000K, amber honey tones, golden highlights"
    prompt_keywords: "warm intimate mood, cozy inviting light, soft warm glow, close personal feel"

  cold_distant:
    description: "Clinical, isolated, detached. Cool blues, hard shadows, minimal warmth."
    lighting_tendency: "cool hard light, minimal fill, harsh shadow, stark"
    color_tendency: "cool blue, cyan, cold white, steel gray"
    prompt_keywords: "cold distant mood, cool clinical lighting, isolated feel, stark blue tone"

  mysterious_dark:
    description: "Hidden, suspenseful, intriguing. Low key, minimal fill, selective illumination."
    lighting_tendency: "single hard source, minimal or no fill, deep shadows, rim accent"
    color_tendency: "desaturated, shadow-weighted, cool or neutral"
    prompt_keywords: "mysterious dark mood, low key lighting, selective illumination, deep shadow"

  energetic_vibrant:
    description: "Lively, exciting, dynamic. High saturation, colorful gels, hard directional light."
    lighting_tendency: "hard directional, colored gels, high contrast, multiple sources"
    color_tendency: "high saturation, complementary color contrast, vibrant primaries"
    prompt_keywords: "energetic vibrant mood, colorful dynamic lighting, high saturation, lively atmosphere"

  soft_dreamy:
    description: "Ethereal, gentle, romantic. Very soft light, pastel palette, shallow depth of field."
    lighting_tendency: "extremely soft light, large diffused source, low contrast, wrap-around"
    color_tendency: "pastel, muted, warm white, soft pink, lavender"
    prompt_keywords: "soft dreamy mood, ethereal light, romantic soft focus, pastel gentle tone"

  nostalgic_vintage:
    description: "Old-fashioned, sentimental, warm memory. Warm tones, soft halation, film grain implied."
    lighting_tendency: "soft diffused, warm, slight underexposure, natural window light feel"
    color_tendency: "warm amber, faded color, sepia tone, filmic green shadows"
    prompt_keywords: "nostalgic vintage mood, warm faded tones, filmic quality, memory-like softness"

  edgy_rebellious:
    description: "Bold, unconventional, raw. Hard light, extreme angles, desaturated with color pop."
    lighting_tendency: "hard single source, extreme angle, high contrast, underlighting or cross"
    color_tendency: "desaturated base with single saturated accent, monochrome with pop"
    prompt_keywords: "edgy rebellious mood, harsh unconventional lighting, raw attitude, bold contrast"

  peaceful_serene:
    description: "Calm, balanced, harmonious. Soft even light, natural palette, open space."
    lighting_tendency: "soft even light, north window quality, minimal shadow, open"
    color_tendency: "natural muted, earth tones, soft blue sky, gentle green"
    prompt_keywords: "peaceful serene mood, calm balanced light, natural harmony, open tranquil space"

  joyful_playful:
    description: "Happy, carefree, fun. Bright warm light, high saturation, candid moment, natural smile."
    lighting_tendency: "bright natural light, open sun, minimal shadow, golden hour warmth"
    color_tendency: "warm golden, vibrant green, bright blue sky, saturated primaries"
    prompt_keywords: "joyful playful mood, carefree fun, bright warm light, candid happy moment"

  energetic_action:
    description: "Fast, dynamic, powerful. Hard directional light, motion blur accent, high contrast."
    lighting_tendency: "hard sunlight, directional side or back light, high contrast, motion emphasis"
    color_tendency: "high saturation, warm-cool contrast (blue sky + golden sand), vibrant"
    prompt_keywords: "energetic action mood, dynamic motion, powerful movement, fast pace, athletic energy"

  outdoor_natural:
    description: "Open air, natural environment, weather-influenced light. Uncontrolled but authentic."
    lighting_tendency: "available natural light, cloud-diffused sun, golden hour, open shade"
    color_tendency: "natural spectrum, sky blue, foliage green, earth brown, skin tone accurate"
    prompt_keywords: "outdoor natural mood, available light, open environment, authentic outdoor feel"

  tender_affection:
    description: "Gentle, loving, warm bond between subject and human/companion. Soft intimate light."
    lighting_tendency: "soft warm light, open shade or window light, gentle shadow, close proximity"
    color_tendency: "warm neutral, soft gold, gentle cream, muted green background"
    prompt_keywords: "tender affectionate mood, gentle bond, soft warm light, loving connection, pet human bond"

  editorial_luxury:
    description: "Premium editorial fashion mood with controlled contrast, refined palette, and decisive silhouette hierarchy. The quintessential high-fashion studio feel."
    lighting_tendency: "controlled directional key, medium contrast, clean rim separation, defined shadow"
    color_tendency: "restrained with selective saturation, muted neutrals with single garment accent, warm or cool minimal"
    prompt_keywords: "editorial luxury fashion mood, refined high-fashion tone, controlled editorial lighting, premium studio aesthetic"
# =============================================================================
# AUTOREVISE EXTENSIONS — mood decision, translation, conflict resolution
# =============================================================================
# These sections extend the mood lexicon from a vocabulary list into a decision
# system for prompt enhancement. They are intended to be used by the cinematic
# prompt enhancer after task_profile, subject_rules, color, lighting, lens, and
# composition have been selected.

generator_visible_mood_translation:
  purpose: "Translate abstract mood words into visible choices the image model can render."
  principle:
    - "Do not send abstract mood words alone."
    - "For every mood, express visible lighting, palette, composition, material, and atmosphere behavior."
    - "Keep mood secondary to hard user constraints and subject identity."
    - "If a mood conflicts with readability, preserve readability and express the mood through background, color, or lighting accents."

  abstract_to_visible:
    luxurious:
      weak_prompt_terms:
        - "luxurious"
        - "premium"
        - "high-end"
        - "expensive"
      generator_visible_prompt: "restrained luxury editorial aesthetic, precise material highlights, generous negative space, controlled warm highlights, deep neutral shadows"
      visual_controls:
        lighting: "soft directional key with controlled specular highlights"
        color: "champagne, charcoal, warm ivory, muted gold"
        composition: "minimal clutter, hero-first hierarchy, generous negative space"
        material: "crisp surface response, refined texture, no cheap oversaturation"
      avoid:
        - "random gold everywhere"
        - "busy background"
        - "overly glossy plastic look"

    cinematic:
      weak_prompt_terms:
        - "cinematic"
        - "movie-like"
        - "film look"
      generator_visible_prompt: "cinematic film-still composition, motivated light direction, layered foreground-midground-background depth, controlled color grade, subtle atmosphere"
      visual_controls:
        lighting: "motivated practical or directional light"
        color: "consistent filmic grade with protected skin or product color"
        composition: "storytelling frame with clear visual hierarchy"
        atmosphere: "subtle haze or bloom only when useful"
      avoid:
        - "flat studio look"
        - "random lens flare"
        - "excessive smoke"
        - "unmotivated lighting"

    dreamy:
      weak_prompt_terms:
        - "dreamy"
        - "ethereal"
        - "soft"
        - "romantic"
      generator_visible_prompt: "soft diffused glow, low contrast shadows, pastel highlight roll-off, gentle background falloff, delicate atmospheric softness"
      visual_controls:
        lighting: "large soft source, smooth shadow transition"
        color: "pastel cream, blush, lavender, warm white"
        lens: "soft background separation, gentle falloff"
        composition: "open breathing room, relaxed visual flow"
      avoid:
        - "blurred face"
        - "washed-out subject"
        - "loss of clothing or material detail"

    dramatic:
      weak_prompt_terms:
        - "dramatic"
        - "intense"
        - "powerful"
        - "bold"
      generator_visible_prompt: "strong directional light, deep readable shadows, decisive rim separation, high contrast focal point, bold silhouette"
      visual_controls:
        lighting: "hard or semi-hard key, negative fill, edge separation"
        exposure: "low-to-middle key with preserved hero detail"
        composition: "diagonal tension or centered hero dominance"
      avoid:
        - "unreadable black shadows"
        - "overly theatrical random contrast"
        - "face lost in darkness"

    warm_intimate:
      weak_prompt_terms:
        - "warm"
        - "cozy"
        - "intimate"
        - "inviting"
      generator_visible_prompt: "warm close-range atmosphere, soft amber practical light, gentle facial shadows, natural texture, close personal framing"
      visual_controls:
        lighting: "warm practical or window-like soft source"
        color: "amber, cream, honey, soft brown"
        composition: "closer framing, human-scale details"
      avoid:
        - "orange skin contamination"
        - "overly dark interior"
        - "fake fireplace glow unless specified"

    cold_clinical:
      weak_prompt_terms:
        - "cold"
        - "clinical"
        - "distant"
        - "sterile"
      generator_visible_prompt: "cool clean light, steel-blue shadows, precise geometry, minimal warmth, crisp surfaces and isolated spatial feeling"
      visual_controls:
        lighting: "cool directional or even light"
        color: "cyan, cold white, steel gray, blue shadow"
        composition: "open distance, symmetry or strict geometry"
      avoid:
        - "dead flat lighting"
        - "skin becoming gray unless intended"
        - "unreadable dark blues"

    playful:
      weak_prompt_terms:
        - "playful"
        - "fun"
        - "joyful"
        - "cute"
      generator_visible_prompt: "bright friendly lighting, rounded shapes, saturated but clean color accents, readable silhouettes, cheerful spatial rhythm"
      visual_controls:
        lighting: "bright open light with soft shadows"
        color: "clear warm primaries, pastel accents, clean contrast"
        composition: "large readable elements, active but organized layout"
      avoid:
        - "visual clutter"
        - "tiny details"
        - "overly mature dark palette"

    mysterious:
      weak_prompt_terms:
        - "mysterious"
        - "dark"
        - "suspenseful"
        - "hidden"
      generator_visible_prompt: "selective illumination, shadow-weighted frame, visible rim outline, partial reveal of key features, controlled darkness"
      visual_controls:
        lighting: "single motivated source or rim edge light"
        exposure: "low-key with hero detail preserved"
        composition: "frame-within-frame, partial occlusion, negative space"
      avoid:
        - "subject completely hidden"
        - "muddy black frame"
        - "loss of face or product label"

    editorial_fashion:
      weak_prompt_terms:
        - "editorial fashion"
        - "fashion editorial"
        - "high-fashion"
        - "haute couture"
        - "editorial"
      generator_visible_prompt: "editorial fashion aesthetic, controlled directional key light, clean silhouette separation, restrained palette with selective garment saturation, defined shadow hierarchy, premium studio finish"
      visual_controls:
        lighting: "controlled directional key with defined shadow edge and clean rim separation"
        color: "restrained neutrals with selective saturation on hero garment, muted background"
        composition: "decisive silhouette hierarchy, negative space, full-length or three-quarter frame"
        material: "premium fabric texture, refined surface response, no cheap flat texture"
      avoid:
        - "flat catalog lighting"
        - "oversaturated background"
        - "generic beauty lighting"
        - "garment lost in shadow"

    natural_authentic:
      weak_prompt_terms:
        - "natural"
        - "authentic"
        - "documentary"
        - "candid"
      generator_visible_prompt: "available-light realism, organic shadows, natural posture, imperfect lived-in details, believable environment"
      visual_controls:
        lighting: "window light, open shade, cloud-diffused sun, or practical light"
        color: "natural white balance with mild filmic treatment"
        composition: "slightly imperfect but intentional framing"
      avoid:
        - "overposed fashion stiffness"
        - "plastic skin"
        - "overly polished CGI"

mood_intent_selector:
  purpose: "Select mood direction based on task profile, subject type, audience, and risk flags."
  selection_rules:
    - "Use one primary mood and at most one secondary mood."
    - "For commercial product images, mood must support product legibility and brand color accuracy."
    - "For human portraits, mood must not corrupt skin tone, facial readability, or anatomy."
    - "For educational/game UI, readability outranks cinematic atmosphere."
    - "For architecture, spatial clarity and material truth outrank mood stylization."

  by_task_profile:
    beauty_portrait:
      default_primary_mood: soft_dreamy
      optional_secondary_mood:
        - luxurious_calm
        - warm_intimate
      visible_prompt: "soft flattering mood with clean facial light, natural skin tone, gentle highlight roll-off, refined editorial calm"
      protect:
        - "eyes"
        - "skin tone"
        - "facial structure"
      avoid:
        - "colored light covering the entire face"
        - "muddy shadows under eyes"

    fashion_editorial:
      default_primary_mood: editorial_fashion
      optional_secondary_mood:
        - dramatic_intense
        - luxurious_calm
        - edgy_rebellious
      visible_prompt: "fashion editorial mood with decisive pose hierarchy, controlled contrast, refined styling, strong silhouette"
      protect:
        - "outfit shape"
        - "pose readability"
        - "face"
      avoid:
        - "background stealing attention from clothing"
        - "overly generic beauty look"

    product_ad:
      default_primary_mood: premium_commercial
      optional_secondary_mood:
        - luxurious_calm
        - futuristic_tech
        - minimalist_clean
      visible_prompt: "premium commercial mood with product-first clarity, controlled reflections, precise material highlights, clean negative space"
      protect:
        - "label"
        - "product silhouette"
        - "brand colors"
      avoid:
        - "mood lighting obscuring label"
        - "random props"

    architecture_interior:
      default_primary_mood: minimalist_clean
      optional_secondary_mood:
        - peaceful_serene
        - lifestyle_warm
        - luxurious_calm
      visible_prompt: "calm architectural mood with straight perspective, material clarity, soft daylight, uncluttered spatial rhythm"
      protect:
        - "straight verticals"
        - "room scale"
        - "material joints"
      avoid:
        - "overly dark cinematic shadows hiding space"
        - "warped walls"

    architecture_exterior:
      default_primary_mood: cinematic_dramatic
      optional_secondary_mood:
        - luxurious_calm
        - peaceful_serene
        - futuristic_tech
      visible_prompt: "clear architectural mood with controlled sky exposure, facade rhythm, readable massing, refined environmental atmosphere"
      protect:
        - "facade geometry"
        - "vertical lines"
        - "window rhythm"
      avoid:
        - "fisheye drama"
        - "unreal material colors"

    educational_game_ui:
      default_primary_mood: joyful_playful
      optional_secondary_mood:
        - peaceful_serene
      visible_prompt: "friendly educational mood, bright readable layout, rounded shapes, cheerful accents, low cognitive load"
      protect:
        - "large interactive objects"
        - "readable UI"
        - "age-appropriate clarity"
      avoid:
        - "cinematic darkness"
        - "tiny decorative clutter"
        - "adult luxury palette"

    hidden_object_scene:
      default_primary_mood: energetic_vibrant
      optional_secondary_mood:
        - joyful_playful
        - outdoor_natural
      visible_prompt: "busy but organized discovery mood, many readable details, clear visual zones, colorful accents separated by silhouette"
      protect:
        - "object readability"
        - "zone organization"
        - "visual search clarity"
      avoid:
        - "random clutter"
        - "overdark shadows"
        - "objects too tiny to identify"

    cinematic_movie_poster:
      default_primary_mood: cinematic_dramatic
      optional_secondary_mood:
        - mysterious_dark
        - luxurious_calm
        - energetic_action
      visible_prompt: "poster-grade cinematic mood with hero-first hierarchy, strong silhouette, atmospheric depth, controlled color contrast"
      protect:
        - "main character silhouette"
        - "title-safe space"
        - "face or hero object"
      avoid:
        - "overcrowded background"
        - "unreadable hero face"

    anime_realism_character:
      default_primary_mood: cinematic_dramatic
      optional_secondary_mood:
        - soft_dreamy
        - energetic_vibrant
        - luxurious_calm
      visible_prompt: "anime-realism mood with stylized facial design, cinematic lighting, readable costume silhouette, polished illustration realism"
      protect:
        - "character identity cues"
        - "costume silhouette"
        - "clean stylization"
      avoid:
        - "chibi proportions"
        - "raw documentary realism"
        - "muddy hybrid style"

mood_to_cinematography_mapping:
  purpose: "Map mood selections into visible decisions across lighting, color, composition, lens, exposure, and atmosphere."
  luxurious_calm:
    lighting: "soft directional light with controlled highlight edges"
    color: "warm champagne, charcoal, ivory, muted gold"
    composition: "generous negative space, balanced hero placement, minimal clutter"
    lens: "natural-to-short telephoto compression for refined proportions"
    exposure: "middle-key or low-key with readable material detail"
    atmosphere: "clean air, subtle glow only on highlights"
    compression_phrase: "restrained champagne-gold luxury mood"

  editorial_luxury:
    lighting: "controlled directional key with clean rim separation, medium contrast, defined shadow edge"
    color: "restrained neutrals with selective garment saturation, muted background, single hero accent"
    composition: "decisive silhouette hierarchy, generous negative space, three-quarter or full-length fashion frame, subject occupies 60-80% of frame"
    lens: "short-to-medium telephoto compression (85-135mm) for elegant proportions, or 35-50mm for environmental editorial"
    exposure: "middle-key with controlled highlight on garment texture and readable shadow detail"
    atmosphere: "clean editorial air, no haze, subtle background separation, fabric texture fully readable"
    compression_phrase: "editorial luxury fashion mood"

  cinematic_dramatic:
    lighting: "motivated directional key, rim separation, controlled shadows"
    color: "filmic warm-cool contrast or genre-specific grade"
    composition: "layered depth, foreground framing, decisive silhouette"
    lens: "natural perspective or mild telephoto compression depending on subject"
    exposure: "middle-to-low key with preserved hero detail"
    atmosphere: "subtle haze, bloom, or volumetric separation when context supports it"
    compression_phrase: "cinematic film-still mood"

  minimalist_clean:
    lighting: "soft even light, gentle shadow, no distracting light effects"
    color: "neutral whites, soft grays, muted accent color"
    composition: "large negative space, clear geometry, minimal props"
    lens: "natural perspective, accurate proportions"
    exposure: "bright but not clipped, clean tonal separation"
    atmosphere: "no haze, no grain, no clutter"
    compression_phrase: "clean minimalist mood"

  natural_documentary:
    lighting: "available-light realism with organic shadows"
    color: "natural white balance, restrained grading"
    composition: "candid framing, believable environment, subtle imperfection"
    lens: "natural perspective or observational telephoto"
    exposure: "natural dynamic range with preserved skin and environment detail"
    atmosphere: "lived-in texture, no over-polish"
    compression_phrase: "authentic documentary mood"

  futuristic_tech:
    lighting: "cool rim edges, clean reflections, precise geometry"
    color: "cyan, steel blue, cold white, black, silver"
    composition: "symmetry, hard diagonals, clean product or architecture geometry"
    lens: "controlled wide or natural perspective, no warped product geometry"
    exposure: "crisp highlights, deep but readable blacks"
    atmosphere: "subtle glow from interfaces, no messy neon overload"
    compression_phrase: "cool futuristic tech mood"

  lifestyle_warm:
    lighting: "warm practical or window light, gentle falloff"
    color: "cream, honey, amber, soft wood, natural skin"
    composition: "human-scale framing, relaxed negative space, environmental warmth"
    lens: "natural perspective with modest background separation"
    exposure: "warm middle key, readable shadows"
    atmosphere: "cozy lived-in softness"
    compression_phrase: "warm lifestyle mood"

  soft_dreamy:
    lighting: "large diffused source, soft glow, low contrast"
    color: "pastel cream, blush, lavender, warm white"
    composition: "open breathing room, gentle flow, soft background falloff"
    lens: "shallow but controlled depth, face or hero detail sharp"
    exposure: "high-to-middle key with preserved texture"
    atmosphere: "soft bloom or delicate haze"
    compression_phrase: "soft dreamy pastel mood"

  mysterious_dark:
    lighting: "selective low-key illumination, rim outline, deep shadow"
    color: "cool neutrals, desaturated shadows, small warm accent if needed"
    composition: "partial reveal, frame-within-frame, shadow-weighted negative space"
    lens: "natural or telephoto isolation depending on subject"
    exposure: "low key with readable hero detail"
    atmosphere: "controlled darkness, no muddy blacks"
    compression_phrase: "mysterious low-key mood"

  joyful_playful:
    lighting: "bright open light, soft friendly shadows"
    color: "clean saturated accents, warm primaries, soft pastels"
    composition: "large readable shapes, active rhythm, clear spacing"
    lens: "natural perspective, no intimidating distortion"
    exposure: "bright high-key but texture preserved"
    atmosphere: "clear cheerful air, no heavy haze"
    compression_phrase: "bright playful mood"

mood_conflict_resolution:
  purpose: "Resolve incompatible emotional or style directions before final prompt assembly."
  general_rules:
    - "Use one dominant mood. Secondary mood may modify lighting or color only."
    - "If the user uses correction language such as 'but', 'instead', 'don't', 'closer to', 'rather than', the later corrective mood overrides earlier mood references."
    - "Medium-defining style beats mood. For example, photorealistic photography must not become painterly just because the mood is dreamy."
    - "Readability beats mood for text, product labels, UI, educational content, and hidden-object scenes."
    - "Natural subject color beats mood color for skin, brand colors, food, animals, and architecture materials."

  conflicts:
    luxury_vs_playful:
      symptoms: "premium minimal aesthetic conflicts with cheerful saturated child-friendly design."
      resolution: "Choose luxury for product/fashion/architecture; choose playful for children's UI, educational games, toys."
      final_prompt_strategy: "Use restrained palette for luxury; use clean bright accents and rounded shapes for playful."

    cinematic_dark_vs_readability:
      symptoms: "dark mood risks hiding product label, face, UI, hidden objects, or architecture detail."
      resolution: "Keep dark atmosphere in background and shadows, add selective hero illumination."
      final_prompt_strategy: "dark cinematic atmosphere with readable hero detail and clear rim separation"

    dreamy_vs_sharp_detail:
      symptoms: "soft dreamy mood risks blurring face, label, jewelry, fabric, or UI text."
      resolution: "Keep dreamy softness in background and highlights; keep hero element sharp."
