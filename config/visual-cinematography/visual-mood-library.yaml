mood_failure_taxonomy:
  mood_word_only:
    symptoms:
      - "Prompt says cinematic/luxury/dreamy but gives no visible cue."
      - "Output becomes generic or inconsistent."
    likely_causes:
      - "Mood not translated into lighting, palette, composition, material, or atmosphere."
    fix:
      - "Convert mood into visible decisions using generator_visible_mood_translation."
    add_positive:
      - "mood expressed through lighting, color palette, composition, and material response"

  mood_overload:
    symptoms:
      - "Prompt contains many emotional adjectives with no hierarchy."
      - "Image becomes visually muddy or overstyled."
    likely_causes:
      - "Too many primary moods selected."
    fix:
      - "Select one dominant mood and one optional modifier."
    add_negative:
      - "conflicting mixed mood"

  skin_color_contamination:
    symptoms:
      - "Face becomes blue, green, purple, orange, or gray unintentionally."
    likely_causes:
      - "Mood palette applied globally instead of to background/rim/shadows."
    fix:
      - "Protect natural skin tone, apply colored light to edges/background."
    add_positive:
      - "natural skin tone protected, colored accent only on rim edges and background"

  luxury_becomes_gaudy:
    symptoms:
      - "Luxury mood becomes excessive gold, diamonds, random ornaments, or shiny plastic."
    likely_causes:
      - "Luxury described only as gold/expensive without restraint."
