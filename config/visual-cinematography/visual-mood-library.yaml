    style: "Natural language with visible mood behavior. Avoid long mood keyword chains."
    example: "restrained luxury editorial mood with soft directional light, champagne-gold accents, and clean negative space"

  stable_diffusion:
    style: "Use compact mood tags plus visible effects and separate negatives."
    example_positive: "restrained luxury editorial mood, soft directional light, champagne gold palette, clean negative space"
    example_negative: "gaudy, oversaturated, cheap plastic, cluttered background"

  midjourney:
    style: "Use a short high-impact mood phrase and one or two visible modifiers."
    example: "restrained luxury editorial mood, champagne-gold highlights, clean negative space"

  flux:
    style: "Use direct semantic sentences with subject and mood placed early."
    example: "The scene has a restrained luxury editorial mood, using soft directional light and clean negative space to keep the product dominant."

mood_quality_rubric:
  score_5:
    description: "Mood is visible, coherent, and supports the subject without reducing readability."
    signs:
      - "One dominant mood is clear."
      - "Lighting, color, composition, and material all support the same emotional direction."
      - "Hard constraints, skin tones, labels, UI, or architecture remain protected."
      - "No redundant mood adjectives in final prompt."

  score_3:
    description: "Mood is understandable but partly generic or weakly translated."
    signs:
      - "Mood words appear but not all are converted into visible cues."
      - "Some redundancy remains."
      - "Subject readability is mostly preserved."

  score_1:
    description: "Mood conflicts with the task or becomes vague adjective stuffing."
    signs:
      - "Multiple incompatible moods compete."
      - "Subject, label, face, UI, or architecture becomes unreadable."
      - "Prompt relies on abstract words like cinematic/luxury/dreamy without visual behavior."

prompt_assembly_hooks:
  phase_1:
    extract:
      - "reference_mood"
      - "emotional_curve"
      - "audience expectation"
      - "mood conflicts from user wording"
  phase_2:
    use:
      - "mood_intent_selector"
      - "mood_to_cinematography_mapping"
      - "generator_visible_mood_translation"
  phase_3_5:
    insert_into:
      style_and_lighting: "compressed mood phrase + visible lighting/color/composition behavior"
      atmosphere: "only mood-related haze, bloom, grain, weather, or softness that has visible purpose"
      constraints: "mood guardrails by subject"
  phase_4:
    check:
      - "mood supports task_profile"
      - "mood does not conflict with style_realism_mode"
      - "mood does not reduce readability"
      - "mood not repeated as adjective stuffing"
  phase_4_5:
    compress_with:
