mood_compression_rules:
  purpose: "Compress mood language for Phase 4.5 without losing visible intent."
  rules:
    - "Keep one compressed mood phrase in final prompt."
    - "Remove repeated emotional adjectives after they have been converted to visible lighting/color/composition."
    - "Prefer visible mood phrases over abstract adjectives."
    - "Cut mood words before cutting hard constraints, subject identity, composition, or lighting."

  semantic_clusters:
    luxury_cluster:
      redundant_terms:
        - "luxurious"
        - "premium"
        - "high-end"
        - "elegant"
        - "sophisticated"
        - "refined"
        - "expensive"
      compressed_as: "restrained luxury editorial mood"

    editorial_fashion_cluster:
      redundant_terms:
        - "editorial"
        - "fashion editorial"
        - "high-fashion"
        - "haute couture"
        - "editorial fashion"
        - "fashion spread"
        - "runway look"
      compressed_as: "editorial fashion mood"

    beauty_portrait_cluster:
      redundant_terms:
        - "beauty portrait"
        - "beauty shot"
        - "glamour"
        - "cosmetic"
        - "skincare"
        - "beauty editorial"
      compressed_as: "premium beauty editorial mood"

    cinematic_cluster:
      redundant_terms:
        - "cinematic"
        - "filmic"
        - "movie-like"
        - "dramatic film still"
        - "film grade"
      compressed_as: "cinematic film-still mood"

    dreamy_cluster:
      redundant_terms:
        - "dreamy"
        - "ethereal"
        - "soft"
        - "romantic"
        - "gentle"
        - "delicate"
      compressed_as: "soft dreamy pastel mood"

    warm_cluster:
      redundant_terms:
        - "warm"
        - "cozy"
        - "intimate"
        - "inviting"
        - "honey"
        - "amber glow"
      compressed_as: "warm intimate mood"

    dark_cluster:
      redundant_terms:
        - "dark"
        - "mysterious"
        - "moody"
        - "suspenseful"
        - "shadowy"
      compressed_as: "mysterious low-key mood"

    playful_cluster:
      redundant_terms:
        - "playful"
        - "joyful"
        - "fun"
        - "cute"
        - "cheerful"
        - "happy"
      compressed_as: "bright playful mood"

    authentic_cluster:
      redundant_terms:
        - "natural"
        - "authentic"
        - "candid"
        - "documentary"
        - "real"
        - "unposed"
      compressed_as: "authentic documentary mood"

    nsfw_explicit_cluster:
      redundant_terms:
        - "nsfw"
        - "NSFW"
        - "not safe for work"
        - "explicit"
        - "adult explicit"
        - "porn"
        - "pornographic"
        - "xxx"
      compressed_as: "explicit adult glamour editorial with bright high-key fashion lighting"
      note: "Do NOT compress to dark/moody/editorial — NSFW intent requires bright explicit glamour by default."

