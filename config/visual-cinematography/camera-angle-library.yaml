      - "giant feet"
      - "unreadable face"
    compression_phrase: "controlled worm's-eye hero angle"

  slightly_high_angle:
    category: "vertical_position"
    psychological_effect:
      - "editorial"
      - "delicate"
      - "observational"
      - "intimate"
    generator_prompt: "slightly high-angle perspective looking down gently, elegant editorial viewpoint, face and upper body remain flattering"
