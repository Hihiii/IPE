camera_angle_compression_rules:
  purpose: "Compress repeated camera angle descriptions into one clear phrase for final prompts."

  clusters:
    heroic_low_angle:
      redundant_terms:
        - "low angle"
        - "upward perspective"
        - "heroic view"
        - "monumental camera angle"
      compressed_as: "heroic low-angle perspective"

    natural_eye_level:
      redundant_terms:
        - "eye level"
        - "natural perspective"
        - "human viewpoint"
        - "neutral camera height"
      compressed_as: "eye-level natural perspective"

    high_angle_editorial:
      redundant_terms:
        - "high angle"
        - "looking down"
        - "editorial top perspective"
        - "slightly above subject"
      compressed_as: "slightly high-angle editorial view"

    top_down_readable:
      redundant_terms:
        - "top-down"
        - "overhead"
        - "bird view"
        - "flat layout"
        - "map-like"
      compressed_as: "top-down readable layout"

    product_three_quarter:
      redundant_terms:
        - "three-quarter product view"
