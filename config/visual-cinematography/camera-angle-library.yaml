# =============================================================================
# CAMERA ANGLE LIBRARY — Enhanced for autorevise-style prompt enhancement
# Purpose:
#   Control camera height, view direction, psychological effect, perspective risk,
#   and generator-visible angle language.
#
# Design principle:
#   Camera angle is not only a camera term. It affects perceived power,
#   vulnerability, product geometry, architectural accuracy, UI readability,
#   and character identity. Final prompts should describe the visible result
#   of the angle, not only the technical label.
# =============================================================================

# =============================================================================
# CAMERA ANGLE LIBRARY — vertical camera positions and their psychological
# impact on the subject's perceived power and vulnerability.
# =============================================================================

camera_angles:
  low_angle:
    visual_effect:
      - "heroic"
      - "dominant"
      - "monumental"
      - "powerful"
    best_for:
      - hero_poster
      - sports_portrait
      - luxury_car
      - mythic_character
    add_positive:
      - "low-angle shot"
      - "heroic upward perspective"
      - "monumental presence"
    risks:
      - "may distort face or hands if too close"
    add_negative:
      - "unflattering facial distortion"
      - "oversized hands"

  high_angle:
    visual_effect:
      - "delicate"
      - "observational"
      - "vulnerable"
      - "editorial"
    best_for:
      - bedroom_editorial
      - fashion_portrait
      - quiet_emotional_scene
    add_positive:
      - "slightly high-angle portrait"
      - "camera looking down gently"

  eye_level:
    visual_effect:
      - "natural"
      - "honest"
      - "relatable"
    best_for:
      - realistic_portrait
      - documentary_scene
      - architectural_interior
    add_positive:
      - "eye-level camera angle"
      - "natural human perspective"


# =============================================================================
# AUTOREVISE CAMERA ANGLE SYSTEM
# =============================================================================

autorevise_camera_angle_system:
  purpose:
    - "Select camera angle based on subject, task profile, shot size, composition, and output format."
    - "Translate camera-angle psychology into generator-visible spatial language."
    - "Prevent angle choices from causing face distortion, product deformation, architecture warp, or UI readability loss."
    - "Route camera-angle failures back to shot-taxonomy, camera-lens-library, composition-library, subject-rules, and output-specs."

  phase_usage:
    phase_1_intent_analysis:
      extract:
        - requested_angle
        - implied_angle
        - subject_vulnerability_or_power_intent
        - geometry_accuracy_needs
        - readability_needs
        - angle_risk_flags
    phase_2_cinematic_enrichment:
      select:
        - angle_category
        - view_direction
        - angle_strength
        - perspective_risk
        - corrective_terms
    phase_3_scene_blueprint:
      store:
        - camera_height
        - camera_pitch
        - view_axis
        - subject_to_camera_relationship
    phase_3_5_prompt_package:
      compile_into:
        - composition
        - style_and_lighting.lens
        - subject
    phase_4_self_review:
      detect:
        - unflattering distortion
        - wrong perceived power
        - architecture warp
        - product geometry errors
        - UI readability failures
        - angle conflicts with shot size
    phase_4_5_compression:
      compress_angle_language_into:
        - "eye-level natural perspective"
        - "heroic low-angle composition"
        - "slightly high-angle editorial portrait"
        - "top-down gameplay-readable view"
        - "controlled three-quarter product view"

# =============================================================================
# EXPANDED CAMERA ANGLE TAXONOMY
# =============================================================================

expanded_camera_angles:
  eye_level:
    category: "vertical_position"
    psychological_effect:
      - "neutral"
      - "honest"
      - "human"
      - "relatable"
    generator_prompt: "eye-level natural human perspective, subject viewed at normal standing height, realistic proportions"
    best_for:
      - realistic_portrait
      - documentary_scene
      - lifestyle_photography
      - product_with_human_context
      - architecture_interior
    risks:
      - "can feel flat if no composition or lighting hierarchy is added"
    corrective_terms:
      - "clear subject-first hierarchy"
      - "natural proportions"
      - "subtle depth layering"
    compression_phrase: "eye-level natural perspective"

  slightly_low_angle:
    category: "vertical_position"
    psychological_effect:
      - "confident"
      - "premium"
      - "subtly powerful"
      - "aspirational"
    generator_prompt: "slightly low-angle perspective, subject appears confident and elevated without exaggerated distortion"
    best_for:
      - fashion_editorial
      - luxury_portrait
      - product_hero
      - vehicle_hero
      - character_poster
    risks:
      - "can enlarge chin, hands, or feet if too close"
      - "can exaggerate torso proportions in portraits"
    corrective_terms:
      - "natural facial proportions"
      - "hands not enlarged"
      - "subtle upward perspective only"
    compression_phrase: "subtle low-angle confidence"

  low_angle:
    category: "vertical_position"
    psychological_effect:
      - "heroic"
      - "dominant"
      - "monumental"
      - "powerful"
    generator_prompt: "low-angle heroic upward perspective, subject towers slightly above camera, strong silhouette and monumental presence"
    best_for:
      - hero_poster
      - sports_portrait
      - mythic_character
      - luxury_car
      - skyscraper_exterior
      - dramatic_product_hero
    risks:
      - "face, hands, shoes, or vehicle front may become oversized"
      - "vertical architecture may lean if perspective is uncontrolled"
      - "can become campy if overused for luxury minimal images"
    corrective_terms:
      - "controlled perspective"
      - "natural anatomy despite upward angle"
      - "straight vertical lines where architectural elements appear"
      - "face kept away from extreme frame edge"
    add_negative:
      - "unflattering facial distortion"
      - "oversized hands"
      - "fisheye warp"
    compression_phrase: "heroic low-angle perspective"

  extreme_low_angle_worms_eye:
