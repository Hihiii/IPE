# =============================================================================
# VIEW DIRECTION TAXONOMY
# =============================================================================

view_directions:
  front_view:
    purpose: "Show symmetry, face, label, logo, interface, or facade directly."
    generator_prompt: "front-facing view, subject oriented directly toward the camera, key details clearly visible"
    best_for:
      - portrait
      - product_label
      - logo_poster
      - architecture_facade
      - character_design_sheet
    risks:
      - "can feel static"
      - "may flatten depth"
    corrective_terms:
      - "clear symmetry"
      - "subtle depth from lighting"
      - "key details facing camera"
    compression_phrase: "front-facing view"

  three_quarter_view:
    purpose: "Show form, depth, and silhouette while keeping important details visible."
    generator_prompt: "three-quarter view showing front and side planes, strong sense of depth and volume"
    best_for:
      - product_design_render
      - vehicle_hero
      - full_body_character
      - fashion_editorial
      - architecture_exterior
      - cosplay_poster
    risks:
      - "label or face may become less readable if turned too far"
    corrective_terms:
      - "front detail still readable"
      - "clear side contour"
      - "balanced perspective"
    compression_phrase: "three-quarter depth view"

  side_profile:
    purpose: "Create graphic silhouette, elegance, or psychological distance."
    generator_prompt: "clean side-profile view, strong silhouette, face or product outline readable"
    best_for:
      - fashion_portrait
      - character_poster
      - luxury_vehicle
      - product_silhouette
      - psychological_scene
    risks:
      - "facial identity may reduce"
      - "product label may disappear"
    corrective_terms:
      - "recognizable profile silhouette"
      - "important design cues remain visible"
    compression_phrase: "clean side-profile view"

  rear_view:
    purpose: "Show back design, departure, mystery, or environmental story."
    generator_prompt: "rear view, subject seen from behind, silhouette and back design clearly visible, environment ahead supports the story"
    best_for:
      - fashion_back_detail
      - character_departure
      - landscape_contemplation
      - vehicle_rear_design
    risks:
      - "identity and facial expression lost"
      - "not suitable when face or label is required"
    corrective_terms:
      - "back design is the hero detail"
      - "clear silhouette"
      - "environmental story visible"
    compression_phrase: "rear-view storytelling angle"

  over_the_shoulder_view:
    purpose: "Create intimacy, perspective, or conversational staging."
    generator_prompt: "over-the-shoulder view with softly blurred foreground shoulder, main subject unobstructed and clearly visible"
    best_for:
      - conversation_scene
      - mirror_scene
      - cinematic_film_still
      - viewer_pov
    risks:
      - "foreground shoulder may cover the subject"
      - "extra body parts may appear"
    corrective_terms:
      - "foreground softly blurred"
      - "main subject unobstructed"
      - "clean body silhouette"
    compression_phrase: "over-the-shoulder cinematic view"

  point_of_view:
    purpose: "Make viewer feel inside the scene."
    generator_prompt: "first-person point-of-view perspective, viewer positioned naturally within the scene, hands or foreground elements only if requested"
    best_for:
      - immersive_scene
      - game_view
      - action_moment
      - product_use_context
    risks:
      - "unwanted hands may appear"
      - "subject may be too close"
    corrective_terms:
      - "no unwanted hands unless specified"
      - "clear subject distance"
      - "natural viewer perspective"
    compression_phrase: "immersive POV perspective"

# =============================================================================
# GENERATOR-VISIBLE CAMERA ANGLE TRANSLATION
# =============================================================================

generator_visible_camera_angle_translation:
  principle:
    - "Do not rely only on camera-angle labels. Describe the visible spatial relationship."
    - "Combine vertical angle with view direction when needed: e.g. low-angle three-quarter view."
    - "For faces, add distortion protection when using low or wide angles."
    - "For architecture, add straight verticals and controlled perspective."
    - "For products, keep geometry and labels readable."

  weak_to_strong_examples:
    low_angle:
      weak: "low angle"
      strong: "heroic low-angle upward perspective with controlled proportions and strong silhouette"
    high_angle:
      weak: "high angle"
      strong: "slightly high-angle editorial view looking down gently, face remains flattering and readable"
    top_down:
      weak: "top-down"
      strong: "top-down overhead layout with clear object silhouettes and readable spatial organization"
    dutch_angle:
      weak: "Dutch angle"
      strong: "subtle intentional Dutch angle creating tension while keeping the subject silhouette readable"
    three_quarter:
      weak: "3/4 view"
      strong: "three-quarter view showing front and side planes with clear depth and readable key details"

