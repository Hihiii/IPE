# =============================================================================
# ANGLE STRENGTH CONTROL
# =============================================================================

angle_strength_control:
  premium_subtle:
    usage: "Use for ultra-premium fashion and luxury editorial. The angle is barely noticeable but creates a distinct feeling of confidence, exclusivity, and refined power."
    prompt_style:
      - "barely perceptible low-angle confidence"
      - "controlled slightly-low fashion perspective"
      - "subtle upward angle with natural proportions"
      - "editorial eye-level with intentional power dynamic"
    best_for:
      - luxury_fashion_editorial
      - haute_couture
      - premium_portrait
      - luxury_brand_campaign
      - high_end_beauty
    guardrails:
      - "face remains natural"
      - "no aggression or camp"
      - "garment silhouette dominant over angle effect"
      - "body proportions preserved"

  subtle:
    usage: "Use when angle should enhance the image without drawing attention to itself."
    prompt_style:
      - "slightly low-angle"
      - "slightly high-angle"
      - "natural eye-level"
    best_for:
      - luxury
      - beauty
      - product_ad
      - interior_design

  balanced:
    usage: "Use when angle is clearly part of the visual language but does not dominate."
    prompt_style:
      - "low-angle hero perspective"
      - "high-angle editorial view"
      - "three-quarter product view"
    best_for:
      - fashion_editorial
      - vehicle_hero
      - character_poster
      - architecture_exterior

  strong:
    usage: "Use when angle is a major storytelling device."
    prompt_style:
      - "dramatic worm's-eye view"
      - "bird's-eye environmental view"
      - "subtle Dutch angle tension"
    best_for:
      - movie_poster
      - action_scene
      - mythic_character
      - cyberpunk_scene

  locked:
    usage: "Use when user explicitly specifies angle; do not override."
    prompt_style: "preserve exact requested camera angle"
    rule: "User-specified camera angle becomes a hard lock unless it conflicts with safety or impossible output constraints."

# =============================================================================
# SUBJECT-SPECIFIC CAMERA ANGLE GUARDRAILS
# =============================================================================

subject_specific_camera_angle_guardrails:
  human_face:
    risks:
      - "low angle can enlarge chin or nostrils"
      - "wide close perspective can distort face"
      - "high angle can shrink jaw and compress features"
    positive_guardrails:
      - "natural facial proportions"
      - "eyes remain the first read"
      - "face kept away from frame edges"
      - "flattering perspective"
    avoid:
      - "unflattering facial distortion"
      - "oversized nose or chin"
      - "wide-angle face warp"

  human_full_body:
    risks:
      - "low angle can enlarge feet"
      - "high angle can compress legs"
      - "Dutch angle can make pose hard to read"
    positive_guardrails:
      - "natural full-body proportions"
      - "complete silhouette visible"
      - "feet and hands remain correctly scaled"
      - "pose remains readable"
    avoid:
      - "giant feet"
      - "tiny head"
      - "cropped footwear"

  product_packaging:
    risks:
      - "angle can hide label"
      - "low angle can distort bottle or box geometry"
      - "high angle can obscure brand front"
    positive_guardrails:
      - "label faces camera and remains readable"
      - "accurate product geometry"
      - "clean silhouette"
      - "controlled perspective"
    avoid:
      - "warped label"
      - "tilted product geometry"
      - "cropped packaging"

  architecture:
    risks:
      - "low angle can create leaning verticals"
      - "Dutch angle usually looks like a mistake"
      - "ultra-wide angle can curve walls"
    positive_guardrails:
      - "straight vertical lines"
      - "controlled architectural perspective"
      - "realistic scale"
      - "consistent facade or interior grid"
    avoid:
      - "fisheye distortion"
      - "leaning walls"
      - "curved building edges"
      - "accidental tilted horizon"

  vehicle:
    risks:
      - "low angle can warp front grille"
      - "wide three-quarter can distort wheels"
      - "cropped wheels reduce hero stance"
    positive_guardrails:
      - "full vehicle stance visible"
      - "wheels correctly shaped and fully inside frame"
      - "controlled three-quarter perspective"
      - "body lines remain accurate"
    avoid:
      - "oval wheels"
      - "cropped tires"
      - "warped grille"

  game_ui:
    risks:
      - "cinematic angle may reduce gameplay readability"
      - "steep perspective may make UI objects hard to understand"
    positive_guardrails:
      - "readable gameplay layout"
      - "large clear interactive objects"
