# =============================================================================
# CAMERA ANGLE CONFLICT RESOLUTION
# =============================================================================

camera_angle_conflict_resolution:
  low_angle_vs_flattering_face:
    conflict: "Heroic low angle requested, but face beauty or realistic portrait accuracy is important."
    resolution: "Use a slightly low angle instead of extreme low angle; preserve natural facial proportions."
    final_phrase: "subtle low-angle confidence with flattering facial proportions"

  worm_eye_vs_full_body_design:
    conflict: "Extreme low angle requested, but full costume or character design must remain readable."
    resolution: "Use controlled low-angle full-body framing; avoid giant feet and cropped props."
    final_phrase: "controlled low-angle full-body framing with readable costume silhouette"

  dutch_angle_vs_architecture_accuracy:
    conflict: "Dutch angle requested for drama, but architecture needs straight verticals and accurate scale."
    resolution: "Avoid Dutch angle; use dramatic lighting or composition instead."
    final_phrase: "dramatic architectural view with straight verticals and controlled perspective"

  high_angle_vs_powerful_subject:
    conflict: "High angle weakens subject, but user wants heroic or dominant impression."
    resolution: "Switch to eye-level or slightly low-angle unless high angle was explicitly locked."
    final_phrase: "eye-level to slightly low-angle heroic perspective"

  top_down_vs_human_expression:
    conflict: "Top-down view requested, but facial expression or eye contact is important."
    resolution: "Use slightly high-angle instead of full overhead, or make expression secondary."
    final_phrase: "slightly high-angle view with face and expression still readable"

  product_three_quarter_vs_label_readability:
    conflict: "Three-quarter product view creates depth but hides label."
    resolution: "Use shallow three-quarter angle with label still facing camera."
    final_phrase: "controlled three-quarter product view with readable front label"

  cinematic_angle_vs_game_ui_readability:
    conflict: "Cinematic camera angle reduces educational game or UI clarity."
    resolution: "Prioritize front, top-down, or isometric readability; cinematic mood can come from color and lighting."
    final_phrase: "gameplay-readable top-down or isometric view with mild cinematic polish"

  social_vertical_vs_low_angle:
    conflict: "9:16 vertical framing plus low angle may crop head or feet."
    resolution: "Add headroom and footroom guardrails."
    final_phrase: "vertical low-angle composition with safe headroom and footroom"

