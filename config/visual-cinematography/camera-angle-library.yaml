# =============================================================================
# CAMERA ANGLE QUALITY RUBRIC
# =============================================================================

camera_angle_quality_rubric:
  score_5:
    description: "Angle strongly supports subject role, mood, task readability, and geometry accuracy."
    signs:
      - "camera height feels intentional"
      - "view direction shows important details"
      - "no distortion harms subject"
      - "angle works with shot size and aspect ratio"

  score_3:
    description: "Angle is acceptable but generic or slightly mismatched."
    signs:
      - "subject remains readable"
      - "minor tension between mood and camera position"
      - "some missed opportunity for stronger visual hierarchy"

  score_1:
    description: "Angle actively damages the task."
    signs:
      - "face or product distorted"
      - "architecture warped"
      - "UI unreadable"
      - "full-body subject cropped or badly scaled"
      - "angle contradicts requested mood"

# =============================================================================
# PROMPT ASSEMBLY HOOKS
# =============================================================================

prompt_assembly_hooks:
  camera_angle_position:
    insert_after:
      - shot_size
      - composition
    insert_before:
      - lens_and_depth_of_field
      - lighting
    reason: "Camera angle affects perspective and subject geometry before lens and lighting language are interpreted."

  final_prompt_rules:
    - "Use one primary camera angle phrase unless a complex scene needs multiple viewpoints."
    - "If angle risks distortion, add one corrective phrase immediately after the angle."
    - "For architecture, always pair dramatic angle with straight verticals or controlled perspective."
    - "For products, always pair angled view with label/readability requirements."
    - "For game UI and hidden-object scenes, prioritize readable view over cinematic angle."
    - "For image edits, preserve existing camera angle unless the user explicitly asks to change it."

  avoid_list_hooks:
    add_when_relevant:
      human_low_angle:
        - "wide-angle face distortion"
        - "oversized hands"
      architecture_angle:
        - "fisheye distortion"
        - "leaning walls"
      product_angle:
        - "warped label"
        - "cropped product"
      ui_angle:
        - "unreadable tilted interface"
      dutch_angle:
        - "accidental crooked framing"

composition_use_layer:
  purpose: "Select camera angle by composition goal, power relationship, anatomy risk, and background readability."
  angle_decision_fields:
    emotional_effect: []
