      - "mythic"
      - "overwhelming"
      - "larger-than-life"
    generator_prompt: "extreme worm's-eye view from near ground level, dramatic upward perspective, towering scale, strong vertical energy"
    best_for:
      - skyscraper
      - superhero_reveal
      - mythic_godlike_character
      - futuristic_product_from_below
      - dynamic_sports_action
    risks:
      - "high risk of distorted anatomy"
      - "faces may become unreadable"
      - "feet or foreground objects may dominate"
      - "architecture may warp unless straight verticals are requested"
    corrective_terms:
      - "controlled worm's-eye perspective"
      - "clear readable face"
      - "natural anatomy despite extreme angle"
      - "straight architectural verticals if buildings are present"
    add_negative:
