schema_version: "1.0.0"
name: "camera-relationship-system"
description: "Defines camera-to-subject relationships, including selfie perspective without accidental device props."

camera_relationship:
  selfie_perspective:
    camera_position: arm_length_at_subject_hand_endpoint
    camera_holder: subject_hand_beyond_frame
    lens_feel: controlled_front_camera_wide_angle
    perspective: front_facing_arm_length_camera_pov
    phone_visible: false
    camera_device_visible: false
    foreground_arm: required_from_lower_or_side_frame_edge
    device_position: completely_beyond_crop
    default_subject_scale: close_half_body_or_three_quarter
    guards: [no_external_observer_full_body_view, face_away_from_extreme_frame_edge, controlled_near_camera_distortion, lens_aware_gaze, no_visible_device]
  handheld_vlog_perspective:
    camera_position: arm_length_or_short_distance
    camera_holder: implied_subject
    lens_feel: smartphone_or_action_camera
    phone_visible: optional_only_if_requested
  pov_close_camera:
    camera_position: close_to_subject
    camera_holder: viewer_or_camera_operator
    phone_visible: false

rules:
  - "Plain selfie terms select a front-facing arm-length camera POV, not an external observer view, and never imply a visible device."
  - "Visible devices are decided by selfie-perspective-disambiguation explicit triggers."
