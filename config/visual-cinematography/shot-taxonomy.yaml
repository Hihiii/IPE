# GENERATOR-VISIBLE SHOT TRANSLATION
# =============================================================================

generator_visible_shot_translation:
  principle: "Translate shot terms into subject scale, crop boundary, margin, and readability."
  fields:
    subject_scale: "how much of the subject occupies the frame"
    crop_boundary: "where the frame cuts the body/object/scene"
    margin_behavior: "how much breathing room exists around important parts"
    detail_priority: "which details remain sharp and readable"
    context_amount: "how much environment remains visible"
    guardrail_language: "positive instructions preventing unwanted crop or scale"

  examples:
    full_body:
      weak: "full body"
      strong: "full-body head-to-toe framing, entire figure visible, feet fully inside frame, comfortable margin around hair, hands, props, and footwear"
    close_up:
      weak: "close-up"
      strong: "close-up hero framing, face or product label fills the frame, sharp first-read detail, background simplified"
    wide:
      weak: "wide shot"
      strong: "wide environmental shot with the subject integrated into surroundings while remaining clearly identifiable"
    top_down:
      weak: "top-down"
      strong: "top-down readable layout, objects clearly spaced on a flat plane, no important details hidden by perspective"

