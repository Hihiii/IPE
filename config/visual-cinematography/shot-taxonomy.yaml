# =============================================================================
# SHOT TAXONOMY — standard frame sizes and their narrative functions
# =============================================================================
# Each shot size encodes a specific relationship between the viewer and the
# subject. Choosing the right shot size is the first compositional decision
# — it sets the emotional distance before any rule or pattern is applied.
# =============================================================================

shot_taxonomy:
  full_body:
    purpose: "Show the complete subject silhouette, outfit, pose, and footwear."
    best_for:
      - character_design
      - fashion_lookbook
      - cosplay_poster
      - game_character_sheet
    add_positive:
      - "full-body composition"
      - "entire figure visible from head to toe"
      - "feet fully inside the frame"
      - "clear pose silhouette"
    add_negative:
      - "cropped feet"
      - "cut off head"
      - "waist-up framing"

  waist_up:
    purpose: "Balance face, upper-body styling, and environmental context."
    best_for:
      - fashion_editorial
      - lifestyle_portrait
      - cinematic_character_portrait
    add_positive:
      - "waist-up composition"
      - "upper body clearly visible"
      - "face and outfit both emphasized"

  close_up:
    purpose: "Emphasize facial expression, eyes, makeup, and skin detail."
    best_for:
      - beauty_portrait
      - emotional_scene
      - cosmetic_advertising
    add_positive:
      - "close-up portrait"
      - "sharp eyes"
      - "catchlights in the eyes"
      - "natural skin texture"
    add_negative:
      - "full-body view"
      - "distant subject"

# =============================================================================
# AUTOREVISE SHOT SYSTEM — frame-size control for prompt enhancement
# =============================================================================
# Purpose:
#   Convert vague framing requests into generator-visible crop, margin, hierarchy,
#   and guardrail language. This module prevents common image-model failures such
#   as cropped feet, unclear subject scale, mismatched close-up/full-body intent,
#   or cinematic bokeh destroying task readability.
# =============================================================================

autorevise_shot_system:
  role_in_pipeline:
    phase_1_intent_analysis:
      - "Detect explicit shot-size terms and implied framing from subject/task."
      - "Extract crop-sensitive details such as shoes, full outfit, product label, UI, or text-safe zones."
      - "Promote explicit framing requests into hard_locks."
    phase_2_enrichment:
      - "Select one dominant shot size before choosing lens, composition, or depth of field."
      - "Translate shot size into visible crop, subject scale, margins, and focal hierarchy."
    phase_3_scene_blueprint:
      - "Set camera distance, subject-to-frame scale, and safe margin requirements."
    phase_3_5_prompt_package:
      - "Write shot instructions in the composition/framing field."
    phase_4_self_review:
      - "Check whether the chosen shot conflicts with task profile, output ratio, or user locks."
    phase_4_5_compression:
      - "Compress framing instructions into one strong shot phrase and one guardrail phrase."

  core_principles:
    - "Use exactly one dominant shot size unless a diptych, storyboard, or multi-panel output is requested."
    - "Shot size is a structural decision, not a style adjective."
    - "If the user explicitly names a framing, it overrides default task-profile framing."
    - "For human subjects, crop at natural anatomical breakpoints when partial body framing is requested."
    - "For commercial/product/UI tasks, readability outranks dramatic framing."
    - "Negative crop constraints should be paired with positive visible framing language."

# =============================================================================
# EXPANDED SHOT TAXONOMY
# =============================================================================

expanded_shot_taxonomy:
  extreme_close_up:
    purpose: "Isolate a tiny feature or detail as the entire visual subject."
    best_for:
      - eyes
      - lips
      - jewelry
      - product_texture
      - fabric_detail
      - mechanical_detail
      - macro_food_texture
    generator_prompt: "extreme close-up detail shot, the selected detail fills the frame, all attention on texture and micro highlights"
    visible_effects:
      - "background context almost absent"
      - "texture and surface behavior dominate"
      - "very intimate visual distance"
    add_positive:
      - "extreme close-up detail shot"
      - "selected detail fills most of the frame"
      - "razor-sharp hero detail"
    add_negative:
      - "distant subject"
      - "full-body framing"
      - "wide environmental scene"
    risks:
      - "user may lose outfit/environment context"
      - "AI may crop too much if identity or object shape matters"
    compression_phrase: "extreme close-up detail shot"

  close_up:
    purpose: "Frame face, expression, beauty details, or product label as the primary read."
    best_for:
      - beauty_portrait
      - emotional_scene
      - cosmetic_advertising
      - product_label
      - food_hero
    generator_prompt: "close-up framing with the face or hero object filling the frame, sharp first-read detail, softly simplified background"
    visible_effects:
      - "strong facial or label priority"
      - "limited environment"
      - "high emotional immediacy"
    add_positive:
      - "close-up portrait"
      - "sharp eyes or hero label"
      - "background simplified and secondary"
    add_negative:
      - "distant subject"
      - "full outfit emphasis"
    crop_guardrails:
      human:
        - "forehead and chin remain inside the frame unless extreme close-up is requested"
        - "eyes are sharp and not too close to frame edge"
      product:
        - "label faces camera and remains fully readable"
    compression_phrase: "close-up hero framing"

  bust_portrait:
    purpose: "Show head, shoulders, and upper chest with strong identity and styling focus."
    best_for:
      - character_portrait
      - profile_image
      - cosplay_portrait
      - cinematic_emotional_portrait
      - beauty_editorial
    generator_prompt: "chest-up bust portrait, head and shoulders clearly visible, face is first read with enough upper-body styling context"
    add_positive:
      - "chest-up bust portrait"
      - "head and shoulders composition"
      - "face first, upper styling second"
    add_negative:
      - "cropped chin"
      - "full-body distant figure"
      - "feet visible"
    crop_guardrails:
      - "neck and shoulders remain anatomically natural"
      - "hands only included if intentionally posed and fully readable"
    compression_phrase: "chest-up bust portrait"

  waist_up:
    purpose: "Balance face, upper-body styling, gesture, and some environmental context."
    best_for:
      - fashion_editorial
      - lifestyle_portrait
      - cinematic_character_portrait
      - commercial_portrait
      - interview_style_image
    generator_prompt: "waist-up composition, face and upper-body styling both visible, hands included only if fully readable"
    add_positive:
      - "waist-up composition"
      - "upper body clearly visible"
      - "face and outfit both emphasized"
      - "hands fully visible if included"
    add_negative:
      - "cropped hands"
      - "full-body distant figure"
      - "tight face-only crop"
    crop_guardrails:
      - "crop at or below the waist, not through wrists or fingers"
      - "if one hand appears, all fingers remain anatomically clear"
    compression_phrase: "waist-up portrait composition"

  half_body:
    purpose: "Show subject from head to mid-thigh, balancing face, torso, and pose."
    best_for:
      - fashion_campaign
      - character_poster
      - cosplay_editorial
      - social_cover
    generator_prompt: "half-body framing from head to mid-thigh, clear pose line, face and outfit both readable"
    add_positive:
      - "half-body portrait"
      - "head to mid-thigh visible"
      - "clear pose line"
    add_negative:
      - "cropped elbows"
      - "cropped hands"
      - "cut off at knees awkwardly"
    crop_guardrails:
      - "avoid cutting exactly through joints"
      - "hands remain inside frame when visible"
    compression_phrase: "half-body fashion framing"

  three_quarter_body:
    purpose: "Show subject from head to knees or lower legs, keeping pose and outfit readable without requiring full environment."
    best_for:
      - fashion_editorial
      - action_character_pose
      - cosplay_poster
      - dance_or_sports_pose
    generator_prompt: "three-quarter body composition, head to knees visible, pose silhouette and outfit readable, comfortable margins around moving limbs"
    add_positive:
      - "three-quarter body composition"
      - "head to knees visible"
      - "clear pose silhouette"
      - "limbs fully readable"
    add_negative:
      - "cropped knees"
      - "feet-focused full-body shot"
      - "tight waist-up crop"
    crop_guardrails:
      - "do not cut through knees, wrists, or fingers"
      - "leave extra margin around dynamic limbs or props"
    compression_phrase: "three-quarter body framing"

  full_body:
    purpose: "Show complete silhouette, outfit, pose, footwear, and ground contact."
    best_for:
      - character_design
      - fashion_lookbook
      - cosplay_poster
      - game_character_sheet
      - full_outfit_review
      - dance_pose
    generator_prompt: "full-body composition, entire figure visible from head to toe, feet fully inside frame, clear pose silhouette, ground contact visible"
    add_positive:
      - "full-body composition"
      - "entire figure visible from head to toe"
      - "feet fully inside the frame"
      - "comfortable margin around the body"
      - "clear pose silhouette"
      - "ground contact visible"
    add_negative:
      - "cropped feet"
      - "cut off head"
      - "waist-up framing"
      - "feet touching the bottom edge"
      - "limbs cut off by frame"
    crop_guardrails:
      - "leave headroom above hair and bottom margin below feet"
      - "for wide poses, include hands, weapon, cape, or prop inside frame"
      - "avoid extreme shallow depth if outfit details matter"
    compression_phrase: "full-body head-to-toe framing"

  wide_shot:
    purpose: "Show subject in a readable environment while keeping the subject identifiable."
    best_for:
      - environmental_portrait
      - travel_scene
      - architecture_with_person
      - cinematic_scene
      - vehicle_in_landscape
    generator_prompt: "wide shot with the subject integrated into the environment, clear spatial context, subject still readable as the hero"
    add_positive:
      - "wide environmental shot"
      - "subject integrated into surroundings"
      - "clear spatial context"
    add_negative:
      - "tiny unrecognizable subject"
      - "tight close-up crop"
    crop_guardrails:
      - "subject remains visually identifiable"
      - "environment supports the story without stealing first read"
    compression_phrase: "wide environmental shot"

  extreme_wide_establishing:
    purpose: "Introduce scale, world, architecture, or environment before subject detail."
    best_for:
      - cityscape
      - architecture_exterior
      - fantasy_world
      - travel_establishing
      - disaster_or_epic_scale
    generator_prompt: "extreme wide establishing shot, environment dominates the frame, subject small but intentionally placed for scale"
    add_positive:
      - "extreme wide establishing shot"
      - "large environmental scale"
      - "subject used as scale reference"
    add_negative:
      - "close-up portrait"
      - "subject fills the frame"
    crop_guardrails:
      - "use only when environment is the hero or scale is essential"
      - "do not use for outfit, expression, product label, or UI readability"
    compression_phrase: "extreme wide establishing shot"

  insert_shot:
    purpose: "Show a story-critical object, hand action, label, button, clue, or product feature."
    best_for:
      - product_feature
      - hand_interaction
      - clue_in_story
      - UI_button
      - jewelry
      - food_detail
    generator_prompt: "cinematic insert shot of the key detail, object or action clearly isolated, surrounding context minimal but readable"
    add_positive:
      - "insert shot"
      - "key detail clearly isolated"
      - "sharp focus on the story-critical object"
    add_negative:
      - "wide scene with lost detail"
      - "obscured object"
    crop_guardrails:
      - "if hands are visible, fingers remain complete and natural"
      - "if text is visible, it remains flat, sharp, and evenly lit"
    compression_phrase: "cinematic insert shot"

  overhead_top_down:
    purpose: "Use a directly overhead viewpoint for layout clarity, maps, flat lays, food tables, or game boards."
    best_for:
      - flat_lay
      - board_game
      - food_table
      - educational_game_ui
      - map_scene
      - hidden_object_layout
    generator_prompt: "top-down overhead composition, objects arranged clearly on a flat plane, readable spacing and clean silhouettes"
    add_positive:
      - "top-down overhead view"
      - "clear object layout"
      - "readable spacing between items"
    add_negative:
      - "low-angle portrait"
      - "tilted confusing perspective"
    crop_guardrails:
      - "avoid perspective distortion unless explicitly requested"
      - "keep UI or object labels upright and readable"
    compression_phrase: "top-down readable layout"

  isometric_three_quarter:
    purpose: "Show multiple objects, rooms, or game spaces with readable depth and clear interaction zones."
    best_for:
      - educational_game_scene
      - hidden_object_scene
      - interior_layout
      - city_block
      - strategy_game_map
    generator_prompt: "isometric three-quarter view, readable spatial layout, clear foreground-midground-background zones, objects separated by silhouette"
    add_positive:
      - "isometric three-quarter view"
      - "readable spatial layout"
      - "clear interaction zones"
    add_negative:
      - "cinematic bokeh hiding details"
      - "unclear perspective"
    crop_guardrails:
      - "preserve object readability over dramatic depth of field"
      - "avoid tiny unreadable text"
    compression_phrase: "isometric readable game-like layout"

  over_the_shoulder:
    purpose: "Create subject relationship, conversation, mirror/selfie context, or voyeuristic frame-within-frame perspective."
    best_for:
      - dialogue_scene
      - mirror_scene
      - reaction_shot
      - phone_selfie_context
      - cinematic_observation
    generator_prompt: "over-the-shoulder composition with a soft foreground shoulder framing the main subject, main subject unobstructed and clearly readable"
    add_positive:
      - "over-the-shoulder framing"
      - "soft blurred foreground shoulder"
      - "main subject unobstructed"
    add_negative:
      - "foreground blocking the face"
      - "extra confusing limbs"
    crop_guardrails:
      - "foreground shoulder should frame, not cover, the hero subject"
      - "avoid extra duplicate heads or hands"
    compression_phrase: "clean over-the-shoulder framing"

  point_of_view:
    purpose: "Show the scene as if seen through the eyes or hands of a participant."
    best_for:
      - immersive_scene
      - gameplay_first_person
      - hand_interaction
      - travel_moment
      - smartphone_selfie_variant
    generator_prompt: "first-person point-of-view framing, visible hands or foreground cues create immersion, hero action remains readable"
    add_positive:
      - "first-person POV framing"
      - "immersive viewer perspective"
      - "foreground cues support the action"
    add_negative:
      - "extra hands"
      - "unreadable action"
      - "disconnected floating limbs"
    crop_guardrails:
      - "hands must be anatomically natural and intentionally placed"
    compression_phrase: "first-person POV framing"

