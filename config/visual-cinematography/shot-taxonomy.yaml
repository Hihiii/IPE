# =============================================================================
# SHOT CONFLICT RESOLUTION
# =============================================================================

shot_conflict_resolution:
  full_body_vs_close_up:
    conflict: "User asks for full outfit/character design but also close-up beauty portrait."
    resolution:
      - "If outfit, shoes, weapon, or full silhouette is explicit, prioritize full_body or three_quarter_body."
      - "If makeup, eyes, or facial emotion is explicit, prioritize close_up or bust_portrait."
      - "If both are important, choose three_quarter_body and add face-readable lighting, or propose two-panel output if allowed."
    repair_phrase: "three-quarter body framing balancing face detail and outfit readability"

  product_label_vs_shallow_depth:
    conflict: "Shallow DoF requested but product label/text must be readable."
    resolution:
      - "Use balanced depth of field."
      - "Keep label plane sharp."
      - "Allow background separation only behind the product."
    repair_phrase: "sharp readable label with gentle background separation"

  poster_title_area_vs_full_body:
    conflict: "Full-body subject conflicts with title/logo safe zone."
    resolution:
      - "Scale subject smaller or place subject off-center."
      - "Reserve top/bottom/right safe zone for text."
      - "Keep figure fully visible with margins."
    repair_phrase: "full-body framing with title-safe negative space"

  cinematic_depth_vs_hidden_object_readability:
    conflict: "Cinematic shallow depth conflicts with hidden-object scene."
    resolution:
      - "Prioritize deep readable composition."
      - "Use atmospheric depth through layering, not blur."
      - "Keep small objects sharp enough to identify."
    repair_phrase: "dense but readable deep-focus hidden-object layout"

  architecture_wide_vs_detail_focus:
    conflict: "Need both overall room/building and material detail."
    resolution:
      - "Use wide shot for layout plus material detail described at key surfaces."
      - "Avoid extreme close-up unless user requests detail study."
    repair_phrase: "wide architectural framing with key material details preserved"

  social_vertical_vs_full_body:
    conflict: "9:16 vertical aspect and full-body subject may crop feet or head."
    resolution:
      - "Use centered or one-third vertical composition."
      - "Leave headroom and footroom."
      - "Avoid ultra-wide poses unless enough margin exists."
    repair_phrase: "vertical full-body framing with headroom and footroom"

  action_motion_vs_crop_safety:
    conflict: "Dynamic limbs/props extend beyond frame."
    resolution:
      - "Use wider crop or three-quarter framing."
      - "Leave action margin around limbs, hair, cape, weapon, vehicle."
    repair_phrase: "dynamic action framing with extra margin around moving limbs and props"

  close_up_vs_environment_story:
    conflict: "Tight close-up loses story environment."
    resolution:
      - "If emotion is priority, keep close-up with background cues."
      - "If environment is priority, use waist-up/wide environmental portrait."
    repair_phrase: "waist-up environmental portrait with face first and setting second"

# =============================================================================
# SUBJECT-SPECIFIC SHOT GUARDRAILS
# =============================================================================

subject_specific_shot_guardrails:
  human_face:
    must_preserve:
      - "eyes sharp and inside frame"
      - "chin and forehead not accidentally cut"
      - "natural facial proportions"
    positive_guardrails:
      - "face centered or intentionally placed with comfortable edge margin"
      - "sharp expressive eyes"
    avoid:
      - "face pressed against frame edge"
      - "cropped chin unless extreme close-up is intended"

  human_hands:
    must_preserve:
      - "fingers complete if visible"
      - "wrists not cropped awkwardly"
      - "gesture readable"
    positive_guardrails:
      - "hands fully visible if included"
      - "clear natural finger placement"
    avoid:
      - "cropped fingers"
      - "extra hands"
      - "hands merged with body"

  full_body_human:
    must_preserve:
      - "head"
      - "feet"
      - "hands"
      - "pose silhouette"
      - "ground contact"
    positive_guardrails:
      - "entire figure visible from head to toe"
      - "feet fully inside frame"
      - "comfortable margin around body"
    avoid:
      - "cropped feet"
      - "cut off head"
      - "limbs outside frame"

  product_packaging:
    must_preserve:
      - "full product outline"
      - "label"
      - "logo"
      - "cap or key feature"
    positive_guardrails:
      - "full product visible"
      - "label faces camera and remains sharp"
      - "clean margin around packaging"
    avoid:
      - "cropped label"
      - "warped typography"
      - "background covering product edges"

  architecture:
    must_preserve:
      - "spatial layout"
      - "vertical lines"
      - "floor/ceiling/wall relationship"
      - "scale"
    positive_guardrails:
      - "wide architectural framing"
      - "straight vertical lines"
      - "complete facade or room layout visible"
    avoid:
      - "cropped roofline"
      - "leaning walls"
      - "fisheye distortion unless requested"

  game_ui:
    must_preserve:
      - "play area"
      - "interactive objects"
      - "instruction/readability zone"
      - "safe margins"
    positive_guardrails:
      - "clear gameplay-readable layout"
      - "large tappable objects"
      - "UI elements not cropped"
    avoid:
      - "tiny unreadable UI"
      - "cinematic crop hiding gameplay objects"

  hidden_object_scene:
    must_preserve:
      - "multiple visual zones"
      - "many readable small objects"
      - "overall scene context"
    positive_guardrails:
      - "elevated wide or isometric layout"
      - "dense but organized visual zones"
      - "objects separated by silhouette and color"
    avoid:
      - "close-up crop"
      - "random clutter"
      - "bokeh hiding objects"

# =============================================================================
# SHOT FAILURE TAXONOMY
# =============================================================================

shot_failure_taxonomy:
  accidental_crop:
    symptoms:
      - "feet, hands, hair, product edges, or roofline cut off unintentionally"
      - "important detail touches frame edge"
    likely_causes:
      - "shot size not explicit"
      - "aspect ratio conflict"
      - "dynamic pose without action margin"
    fix:
      - "promote crop guardrails into composition"
      - "add comfortable margin and specify visible body/object parts"
    add_positive:
      - "comfortable margin around the subject"
      - "important parts fully inside frame"
    add_negative:
      - "cropped feet"
      - "cut off hands"
      - "object edges cropped"

  wrong_shot_scale:
    symptoms:
      - "model outputs close-up when full body was needed, or distant subject when detail was needed"
    likely_causes:
      - "task profile default conflicts with user intent"
      - "style terms override framing"
    fix:
      - "choose one dominant shot size and place it early in prompt"
    add_positive:
      - "dominant shot size stated first in composition"
    add_negative:
      - "wrong crop scale"

  unreadable_full_body:
    symptoms:
      - "full-body figure exists but face/outfit/details are too small"
    likely_causes:
      - "environment too dominant"
      - "extreme wide shot used for character design"
    fix:
      - "use full-body with subject occupying more frame, not extreme wide"
    add_positive:
      - "full-body character fills enough of the frame for outfit readability"
    add_negative:
      - "tiny distant figure"

  over_tight_closeup:
    symptoms:
      - "face or product cropped too aggressively; context lost"
    likely_causes:
      - "close-up interpreted as extreme close-up"
      - "macro language overused"
    fix:
      - "specify close-up but full face/product shape remains visible"
    add_positive:
      - "close-up with full face/product shape intact"
    add_negative:
      - "extreme crop unless requested"

  hidden_object_wrong_crop:
    symptoms:
      - "scene too close, not enough objects visible"
      - "background blur hides discoverable details"
    likely_causes:
      - "cinematic portrait defaults applied to hidden-object task"
    fix:
      - "switch to elevated wide/isometric/top-down readable layout"
    add_positive:
      - "elevated wide hidden-object composition"
      - "deep readable scene"
    add_negative:
      - "shallow depth hiding details"

  architecture_wrong_crop:
    symptoms:
      - "room layout missing, roofline cropped, facade incomplete"
    likely_causes:
      - "portrait/poster crop applied to architecture"
      - "aspect ratio not considered"
    fix:
      - "use wide architectural framing with straight verticals and complete layout"
    add_positive:
      - "complete facade or room visible"
      - "wide architectural framing"
    add_negative:
      - "cropped roofline"
      - "leaning walls"

# =============================================================================
# SHOT COMPRESSION RULES
# =============================================================================

shot_compression_rules:
  principle: "Use one compressed shot phrase plus one guardrail phrase."
  max_shot_phrases_by_mode:
    normal: 2
    expert: 3
    debug: 5

  semantic_deduplication:
    full_body_cluster:
      redundant_terms:
        - "full body"
        - "head to toe"
        - "entire figure"
        - "feet visible"
        - "complete silhouette"
      compressed_as: "full-body head-to-toe framing"
    close_up_cluster:
      redundant_terms:
        - "close-up"
        - "face fills frame"
        - "beauty crop"
        - "tight portrait"
      compressed_as: "close-up hero framing"
    wide_environment_cluster:
      redundant_terms:
        - "wide shot"
        - "environmental shot"
        - "large context"
        - "setting visible"
      compressed_as: "wide environmental framing"
    readable_layout_cluster:
      redundant_terms:
        - "top-down"
        - "isometric"
        - "readable layout"
        - "clear interaction zones"
      compressed_as: "readable overhead/isometric layout"

  avoid_overwriting_user_framing:
    rule: "If user explicitly asks for a shot size, do not replace it with task default. Add guardrails only."
    examples:
      - user: "full body portrait"
        keep: "full-body head-to-toe framing"
        add: "comfortable margin, feet visible"
      - user: "close-up beauty photo"
        keep: "close-up beauty framing"
        add: "sharp eyes, full face not accidentally cropped"

# =============================================================================
# MODEL OUTPUT MODE SHOT STYLE
# =============================================================================

model_output_mode_shot_style:
  chatgpt_image:
    style: "Natural language, visual crop and margin descriptions."
    example: "Full-body head-to-toe framing with feet fully inside the frame and comfortable margin around the pose."

  stable_diffusion:
    style: "Positive framing tags plus negative crop terms."
    positive_example: "full body, head-to-toe, feet visible, centered composition, comfortable margin"
    negative_example: "cropped feet, cut off head, cropped hands, out of frame"

  midjourney:
    style: "Compact phrase with crop and composition terms."
    example: "full-body fashion editorial, head-to-toe framing, clean margins --ar 9:16"

  image_edit:
    style: "Preserve current crop unless user requests change; only change specified framing attribute."
    example: "Keep the existing face, body, outfit, and background; adjust framing to show the full body with feet inside the frame."

  video_prompt:
    style: "Use motion-safe framing with extra margin for movement."
    example: "Medium-wide action framing with extra space in the direction of movement, limbs and props remain inside frame."

# =============================================================================
# SHOT QUALITY RUBRIC
# =============================================================================

shot_quality_rubric:
  dimensions:
    shot_intent_match:
      max_score: 5
      checks:
        - "Does the selected shot size match the user request and task profile?"
        - "Is exactly one dominant shot size used?"
    crop_safety:
      max_score: 5
      checks:
        - "Are important body parts, product edges, UI elements, or architecture boundaries inside the frame?"
        - "Are margins appropriate for output ratio?"
    detail_readability:
      max_score: 5
      checks:
        - "Are the task-critical details large enough and sharp enough?"
        - "Does the shot size preserve the hero element?"
    context_balance:
      max_score: 5
      checks:
        - "Does the amount of environment support the story without stealing first read?"
        - "Does close-up framing avoid losing required context?"
    conflict_handling:
      max_score: 5
      checks:
        - "Are shot conflicts with lens, aspect ratio, motion, or text area resolved?"

  minimum_scores_by_task:
    full_body_character_design:
      shot_intent_match: 5
      crop_safety: 5
      detail_readability: 4
    product_ad:
      shot_intent_match: 4
      crop_safety: 5
      detail_readability: 5
    architecture:
      shot_intent_match: 4
      crop_safety: 5
      context_balance: 5
    hidden_object_scene:
      shot_intent_match: 5
      detail_readability: 5
      context_balance: 5
    educational_game_ui:
      shot_intent_match: 5
      crop_safety: 5
      detail_readability: 5

# =============================================================================
# PROMPT ASSEMBLY HOOKS
# =============================================================================

prompt_assembly_hooks:
  placement:
    normal: "composition.framing"
    if_user_explicit_shot_lock: "constraints.hard_locks + composition.framing"
    if_crop_failure_detected: "composition.framing + avoid"
  final_prompt_order:
    - "dominant shot phrase"
    - "subject scale and visible parts"
    - "margin/crop guardrail"
    - "context amount"
  examples:
    full_body_character:
      final_phrase: "full-body head-to-toe framing, entire outfit and footwear visible, comfortable margin around hair, hands, and props"
    product_ad:
      final_phrase: "clean product hero framing, full product visible, sharp readable label, controlled margin"
    hidden_object:
      final_phrase: "elevated isometric hidden-object layout, dense but organized visual zones, deep readable scene"
    architecture:
      final_phrase: "wide architectural framing, complete room or facade visible, straight verticals and realistic scale"
