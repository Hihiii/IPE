  instructions: |
    ## Phase 4: Self-Review Optimization *(internal)*

    Phase 4 uses `config/prompt-core/intent-preservation-review.yaml` in `delta_repair_only` mode. Compare the candidate against the original user prompt, Phase 1 hard locks, attribute-change control, selected task profile, and selected config provenance. Repair only a detected regression or contradiction. Do not promote inferred enhancements, soft preferences, or character outfit details into hard locks or framing requirements. This rule overrides any earlier wording that treats the Phase 3.1 output as a new original prompt for broad re-enrichment.

    Take the Phase 3.1 categorized prompt package and run it through Phase 1 → Phase 2 → Phase 3 → Phase 3.1 a second time, treating the existing prompt as the "original input". This is a self-critique pass to find optimization opportunities. Output is consumed by Phase 4.1 — do not report to the user.

    ### What to look for on the second pass

    1. **Gaps** — did Phase 1 miss any intent dimensions? (audience, format, brand constraints, risk flags)
    2. **Contradictions** — does the lighting diagram contradict the composition choice? Does the lens strategy fight the working distance?
    3. **Ambiguity** — are any categories vague or underspecified? Can a detail be grounded in a config entry?
    4. **Consistency** — does the color grade support the mood? Does the exposure strategy match the lighting diagram?
    5. **Over-engineering** — is every detail justified? Remove photography terms added without config backing.

    ### Output

    ```yaml
    optimization_pass:
      iteration: 2
      changes_made:
        - category: "style.lighting"
          before: "..."
          after: "..."
          reason: "original key angle clashed with rim placement"
        - category: "style.composition"
          before: "..."
          after: "..."
          reason: "missed negative space requirement from Phase 1 format constraint"
      optimized_prompt: "<re-runs Phase 3.1 with improvements>"
    ```

    Only make changes that are grounded in a config knowledge base entry. If everything is solid, publish the Phase 3.1 output as-is (no changes needed — silence is correct).

    ### Rules

    - Maximum 1 self-review pass. Do not loop infinitely.
    - If the optimized_prompt is identical to the original Phase 3.1 output, omit changes_made.
    - Do not degrade quality — if the first pass is already solid, ship it.
