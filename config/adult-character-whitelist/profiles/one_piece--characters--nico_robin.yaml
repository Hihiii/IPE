  identity_summary: Archaeologist of the Straw Hat Pirates with long wavy black hair (often with small
    flower accessories tucked in), calm blue eyes, a tall mature build, wearing a purple or violet
    sleeveless top or jacket, white or light-colored pants or shorts, and brown high-heeled boots.
    Carries a cross-body bag and books about history and poneglyphs. Possesses the Flower-Flower Fruit
    (Hana Hana no Mi) powers, allowing her to sprout limbs anywhere. Composed scholarly poise with a
    dark mysterious sense of humor.
