  identity_summary: Blood Fiend with long blonde hair (varies from blonde to pink in manga
    illustrations), light red horns protruding from the top of her head, red and yellow eyes that form a
    cross pattern, sharp teeth with defined fangs, pale skin,
    Japanese-style anime face, wearing a white button-up shirt with a red tie, black pants, and a dark
