  filename_pattern: "final_YYYYMMDD_HHMMSS.txt"
  output_directory: "ABSOLUTE_USER_DESKTOP/comfyui_prompt"
  desktop_resolution: "Resolve the real user Desktop first, then append comfyui_prompt. Use XDG_DESKTOP_DIR from ~/.config/user-dirs.dirs on Linux when available; otherwise use the user's standard Desktop folder."
  forbid_relative_output_directory: true
  forbidden_output_directories:
    - "skill folder"
    - "repository folder"
    - "current working directory"
    - "relative desktop/comfyui_prompt"
  if_filename_exists: "create a new suffixed file such as final_YYYYMMDD_HHMMSS_01.txt; do not overwrite"
  create_output_directory_if_missing: true
  writer_script: "scripts/write_final_prompt_txt.py"
  export_selected_renderer_only: false
  export_family_variants: true
  enable_family_variants_only_when_explicitly_requested: false
  family_variant_targets: [chatgpt_image, flux, z_image_base, z_image_turbo, comfyui_flux2_zimage_3stage, stable_diffusion, midjourney, image_edit]
  include_requested_workflow_target: true
  collapse_identical_outputs: true
  dedupe_key:
    - "Positive Prompt"
    - "Negative Prompt"
    - "Suggested Resolution"
  fields_per_model_target:
    - "Positive Prompt"
    - "Negative Prompt"
    - "Suggested Resolution"
  prompt_field_mapping:
    chatgpt_image:
      positive_prompt: "prompt"
      negative_prompt: "avoid"
    z_image_base:
      positive_prompt: "positive_prompt"
      negative_prompt: "negative_prompt"
    z_image_turbo:
      positive_prompt: "positive_prompt"
      negative_prompt: "negative_prompt"
    comfyui_flux2_zimage_3stage:
      positive_prompt: "shared_positive_prompt"
      negative_prompt: "z_image_negative_prompt"
      stage_usage: "Flux.2 Dev uses shared_positive_prompt only; Z-Image Base and Z-Image Turbo use shared_positive_prompt plus z_image_negative_prompt."
    stable_diffusion:
      positive_prompt: "positive_prompt"
      negative_prompt: "negative_prompt"
    midjourney:
      positive_prompt: "prompt"
      negative_prompt: "no_terms or --no segment"
    flux:
      positive_prompt: "prompt"
      negative_prompt: "negative_prompt or avoid"
    image_edit:
      positive_prompt: "edit_instruction"
      negative_prompt: "forbidden_changes"
    video_prompt:
      positive_prompt: "scene_prompt + motion_prompt + camera_motion"
      negative_prompt: "negative_prompt"
  missing_negative_policy: "Write '(not specified)' if the selected renderer has no true negative prompt instead of inventing one."
  identical_output_policy: "If several model targets produce exactly the same positive prompt, negative prompt, and suggested resolution, write one section and join their model_target labels instead of duplicating content."

prompt_assembly_hooks:
  phase_4_6_renderer_selection:
    action: "Select model_target before choosing suggest_resolution so resolution follows the renderer and workflow."
  phase_5_final_prompt:
    action: "Add suggest_resolution to final_prompt and export ALL model targets. Generate family variants for all renderers: chatgpt_image, flux, z_image_base, z_image_turbo, comfyui_flux2_zimage_3stage, stable_diffusion, midjourney, image_edit. Generate final_YYYYMMDD_HHMMSS.txt under the resolved absolute user Desktop/comfyui_prompt folder containing each model_target output's Positive Prompt, Negative Prompt, and Suggested Resolution. collapse_identical_outputs deduplicates sections when multiple models share the same positive/negative content. Never write this TXT under the skill folder, repository folder, current working directory, or a relative desktop/comfyui_prompt path."
