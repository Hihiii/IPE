    transparent_background: false
    video_ready_frame: false
    notes: "Most common social format. Subject should fit within center 80% to avoid crop issues."

  landscape_16x9:
    aspect_ratio: "16:9"
    resolution_hint: "3840x2160 (4K) or 1920x1080"
    typical_use: "video thumbnail, YouTube banner, cinematic still, hero banner"
    transparent_background: false
    video_ready_frame: true
    notes: "Can be used as video freeze-frame. Leave bottom third clear for text overlay."

  portrait_4x5:
    aspect_ratio: "4:5"
    resolution_hint: "1080x1350 or higher"
    typical_use: "Instagram portrait, Facebook ad, print editorial"
    transparent_background: false
    video_ready_frame: false
    notes: "Standard print ratio. Subject fills vertical space naturally."

  portrait_2x3:
    aspect_ratio: "2:3"
    resolution_hint: "2400x3600 or higher"
    typical_use: "print magazine full page, portrait print, book cover"
    transparent_background: false
    video_ready_frame: false
    notes: "Classic 35mm film ratio. Tall vertical, generous headroom."

  cinematic_235x1:
    aspect_ratio: "2.35:1"
    resolution_hint: "3840x1630 or higher"
    typical_use: "cinematic still, film poster, epic landscape"
    transparent_background: false
    video_ready_frame: true
    notes: "Anamorphic widescreen. Horizontal composition is critical."

  story_9x16:
    aspect_ratio: "9:16"
    resolution_hint: "1080x1920 or higher"
    typical_use: "Instagram story, TikTok, Reels, mobile-first"
    transparent_background: false
    video_ready_frame: true
    notes: "Full mobile screen. Subject in top 60%, bottom 40% clear for UI elements."

  transparent_png:
    aspect_ratio: "variable"
    resolution_hint: "as needed for intended use"
    typical_use: "product cutout, e-commerce asset, compositing element"
    transparent_background: true
    video_ready_frame: false
    notes: "Subject isolated on transparent background. No background lighting or environment. Edge detail must be clean."

  print_300dpi:
    aspect_ratio: "variable"
    resolution_hint: "300 DPI at final print size"
    typical_use: "print catalog, billboard, brochure, magazine ad"
    transparent_background: false
    video_ready_frame: false
    notes: "Print requires higher resolution and CMYK-aware color. Check brand color accuracy."

  wide_banner_3x1:
    aspect_ratio: "3:1"
    resolution_hint: "3000x1000 or higher"
    typical_use: "website hero banner, email header, billboard wide"
    transparent_background: false
    video_ready_frame: false
    notes: "Extremely wide. Subject on left or center third. Right area for text or CTA."

  square_ui_icon_bg:
    aspect_ratio: "1:1"
    resolution_hint: "1024x1024"
    typical_use: "app icon background, UI element, thumbnail base"
    transparent_background: false
    video_ready_frame: false
    notes: "Simple background with clear center focus. Avoid fine detail that reads as noise at small size."

delivery_guidelines:
  transparent_background:
    description: "Subject isolated on alpha channel. No background, no environment, no shadows beyond subject."
    technical_requirements:
      - "no background gradient or color"
      - "clean edge between subject and transparency"
      - "no partial transparency on edges unless specified"
    prompt_approach: "Shoot subject against solid chroma key background or with clean edge lighting for extraction."

  video_ready:
    description: "Frame that matches video production standards for use as freeze-frame, thumbnail, or insert."
    technical_requirements:
      - "must not have film grain exceeding video noise floor"
      - "aspect ratio must match video project (typically 16:9 or 2.35:1)"
      - "safe zone: keep content within center 90% for broadcast safety"
    prompt_approach: "Compose for the full video frame. No critical content in outer 5% margin."

  print_ready:
    description: "Image prepared for physical printing. Color accuracy and resolution are critical."
    technical_requirements:
      - "minimum 300 DPI at final dimensions"
      - "color accuracy: use brand color values, not relative"
      - "sharpening: output sharpen for paper, not screen"

typography_output_specs:
