schema_version: "1.0.0"
name: nsfw-visual-director
purpose: >
  Direct adult NSFW scenes with a deliberate sensory-first visual hierarchy,
  camera grammar, readable physics, and emotional narrative while preserving
  user-specified framing and adult-safety boundaries.

scope:
  supported_subject_counts: [single, duo]
  supported_contexts: [private, fictional_public_exposure, pov, consensual_bdsm]
  supported_moments: [still, transition, peak, afterglow]
  excluded: [group_or_multi_person_scene]
  unsupported_scene_handling:
    group_or_multi_person_scene: reject_before_visual_direction
  duo_rule: "Every participant is clearly adult, fictional/original, and consensual before visual direction begins."

visual_focus_plan:
  required_fields:
    - scene_type
    - emotional_tension
    - primary_focus
    - secondary_focus
    - gaze_or_attention_path
    - occlusion_order
    - shot_scale
    - camera_angle_or_relationship
    - focal_plane
    - crop_safety
    - exposure_visibility_guard_when_relevant
    - exposure_action_plan_when_relevant
  default_primary_focus: sensory_zone_or_readable_interaction_zone
  default_secondary_focus: face_gaze_or_emotional_reaction
  user_override: "An explicit user-requested face, action, camera, crop, or focal target overrides the default hierarchy."
  conflict_rule: "When one crop cannot keep every element sharp and visible, protect the declared primary focus; when the visible exposure contract applies, its selected evidence target must remain in frame, unoccluded, and readable rather than being delegated to silhouette or depth separation."

scene_direction:
  single:
    narrative_targets: [body_line, self-directed action, emotional_reaction, tactile_material_response]
  duo:
    narrative_targets: [lead_and_response, readable_interaction_zone, consent_cues, distinct_silhouettes, support_and_force_direction]
  private:
    environment_rule: "Use intimate environment detail only when it supports light, material, contact, or emotional context."
  fictional_public_exposure:
    environment_rule: "Use the public setting for tension and scale while preserving a clear primary focus; no identifiable bystander becomes a participant."
  pov:
    camera_rule: "Treat POV as a camera relationship with a plausible viewer position, visible action axis, and intentional foreground framing."
  consensual_bdsm:
    scene_rule: "Show consent-aware adult context, support, restraint anchors, pressure response, and readable body mechanics; never rely on ambiguous force or hidden contact."
  peak:
    motion_rule: "Keep the critical structure and primary focus sharp; place blur only on causally fast secondary motion."
  afterglow:
    motion_rule: "Prioritize relaxed support, residual material state, body spacing, and emotional resolution over action intensity."

camera_grammar:
  wide:
    use_for: [full_body_pose, environment_interaction, public_context, support_readability]
    rule: "Keep the primary focus readable through placement, contrast, and light rather than relying on scale alone."
  medium:
    use_for: [face_and_body_balance, single_subject_tension, duo_relationship]
    rule: "Balance primary sensory focus with secondary gaze or reaction without accidental joint crops."
  close_up:
    use_for: [tactile_detail, emotional_reaction, material_interface]
    rule: "Use only one dominant local subject; keep the crop intentional and retain orientation cues."
  low_angle:
    rule: "Use for elevated presence or body-line emphasis while preserving plausible proportions and support."
  high_angle:
    rule: "Use for vulnerability, spatial clarity, or support visibility without flattening the interaction zone."
  over_the_shoulder:
    rule: "Use a foreground shoulder only when it reinforces point of view without obscuring the primary focus."
  dutch_angle:
    rule: "Reserve for transition or peak tension; preserve horizon, support, and action-axis readability."
  pov:
    rule: "Anchor the camera to a plausible participant or observer position and prevent impossible limb or contact geometry."

focus_and_light_controls:
  sensory_first_priority: [primary_sensory_or_interaction_zone, tactile_material_response, face_or_gaze, support_and_body_structure, environment]
  depth_of_field: "Place the primary focus on the sharpest focal plane; use falloff to subordinate, not erase, secondary narrative information."
  contrast: "Assign highest local contrast and most controlled highlight to the primary focus; do not let background practicals compete."
  occlusion: "Use hands, fabric, foreground, and depth only when their front/back order is physically clear and they preserve the primary read."
  crop_safety:
    - "Do not crop the only readable primary focus, key support point, or decisive contact/interaction evidence."
    - "Do not turn an intentional close crop into an unplanned full-body view."
    - "For duo scenes, retain a readable action axis and distinguishable silhouettes."
    - "When the visible exposure contract applies, keep its selected evidence target in frame, unoccluded, and readable; do not use a face-first crop, hand, garment, steam, darkness, or foreground to hide it."
    - "For an exposure action, frame the action anchor, garment movement, and selected target together whenever practical so the revealed end state has a readable cause."

failure_guards:
  - face_priority_must_not_override_declared_sensory_primary_focus
  - competing_equal_focuses_without_hierarchy
  - primary_focus_hidden_by_darkness_steam_or_foreground
  - camera_angle_hides_support_or_interaction_geometry
  - public_context_dominates_subject_readability
  - pov_without_plausible_camera_position
  - bdsm_without_visible_anchor_or_clear_adult_consent_context
  - group_or_multi_person_routing
  - visible_exposure_target_lost_to_crop_or_occlusion
  - garment_action_without_a_readable_exposed_end_state

renderer_translation:
  flux: "Express one dominant focus, one supporting emotional cue, camera relationship, crop, depth, light, and material effect in fluent positive English."
  z_image_positive: "Make focal order visible through sharpness, contrast, subject placement, camera angle, and occlusion language."
  z_image_negative: "Use targeted failures for competing focal points, lost support, merged silhouettes, impossible POV, or obscured primary focus only when relevant."

prompt_assembly_hooks:
  phase_1_intent_analysis: "Build visual_focus_plan after adult eligibility and before generic visual hierarchy selection."
  phase_2_cinematic_enrichment: "Select scene direction, camera grammar, shot scale, focal plane, crop, light, and any exposure action proof based on the plan."
  phase_3_scene_blueprint: "Record visual_focus_plan alongside dynamic_scene_plan, exposure_action_plan, and material_environment_plan."
  phase_4_self_review: "Verify that the primary focus remains visible, exposure action has a readable end state, and face-first legacy rules did not override sensory-first direction; request recomposition when it fails."
