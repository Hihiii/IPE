schema_version: "1.0.0"
name: nsfw-composition-lighting-controller
purpose: >
  Keep adult action, faces, support, contact, material, and environment legible
  through one coordinated composition, camera, exposure, and lighting plan.

visual_priority_plan:
  priority_mode: sensory_first
  required_order:
    - primary_sensory_or_readable_interaction_zone
    - tactile_material_response
    - face_gaze_or_emotional_reaction
    - support_and_body_structure
    - environment_context
  baseline_rule: "For eligible human subjects, make the visual director's primary sensory or readable interaction zone clear before decorative atmosphere; face and gaze remain a supporting emotional read unless explicitly requested as primary."
  adult_visible_exposure_priority: "When visible adult exposure is active, selected target readability outranks cinematic darkness, background mood, and decorative low-key contrast."
  user_override: "An explicit user-requested face, action, camera, crop, or focus target overrides sensory-first priority."
  visual_director_rule: "nsfw-visual-director.yaml resolves primary and secondary focus before generic face-priority rules are applied."
  crop_rules:
    - "Do not crop the only readable face, key support point, or requested action zone."
    - "Use foreground occlusion only when it increases depth without hiding structural information."
    - "For duo scenes, preserve distinguishable silhouettes and an unambiguous action axis."

camera_and_motion:
  pose_to_camera:
    standing: "Use a natural-to-short-telephoto perspective unless an explicit wide-angle effect is requested."
    seated_or_reclining: "Prioritize pelvis/leg direction, support visibility, and proportional feet before dramatic angle."
    peak_action: "Choose camera placement perpendicular or three-quarter to the action axis so force direction and contact remain readable."
  focus_priority: [primary_sensory_or_interaction_zone, tactile_material_response, face_or_gaze, support_and_body_structure]
  motion_priority: "Keep faces, support, and key structural contact sharp; apply blur only to fast secondary motion."

lighting_environment_plan:
  required_fields:
    - key_light_role
    - fill_or_shadow_policy
    - separation_or_rim_role
    - environment_or_practical_role
    - exposure_priority
    - material_readability
    - exposure_light_readability_when_active
  photoreal_default:
    key_light_role: "motivated directional key revealing facial planes, body form, and material texture"
    fill_or_shadow_policy: "controlled shadow detail; do not bury the action, contact zone, or selected exposure target"
    separation_or_rim_role: "subtle rim or background separation only when needed for silhouette clarity"
    exposure_priority: "primary sensory or interaction zone, skin midtones, relevant material highlights, then face/gaze readability"
    exposure_light_readability_when_active: "Backgrounds may stay low-key, but the selected target needs soft local fill, open shadow detail on the target zone, readable skin midtones, and clear value separation from nearby garment, limb, bedding, chair, or background."
  anime_realism:
    key_light_role: "intentional main value direction with clean readable plane separation"
    fill_or_shadow_policy: "controlled shadow groups rather than accidental black crush"
    separation_or_rim_role: "stylized rim accents that reinforce silhouette without breaking light direction"
    exposure_priority: "primary sensory or interaction zone, gesture silhouette, material class readability, then face/gaze readability"
    exposure_light_readability_when_active: "Use clean value grouping that keeps the selected target and adjacent skin midtones readable before preserving dark atmosphere."

negative_guardrails:
  - "no unintentionally unreadable face when the face is within the intended crop or selected as a secondary focus"
  - "no silhouette merge at the duo interaction zone"
  - "no highlight clipping that erases material texture"
  - "no backlight-only scene that removes support or contact evidence"
  - "no low-key cinematic darkness that hides the selected exposure target"
  - "no black-crushed target zone when visible adult exposure is active"
  - "no contradictory multi-directional key lights"

prompt_assembly_hooks:
  phase_2_cinematic_enrichment: "Choose one coherent camera, motion, and lighting plan after dynamic_scene_plan and visual_focus_plan exist."
  phase_3_scene_blueprint: "Describe visible light behavior and readable composition, not equipment jargon."
  phase_4_self_review: "Verify sensory-first or user-requested priority order, crop safety, focus hierarchy, exposure, and silhouette separation."
