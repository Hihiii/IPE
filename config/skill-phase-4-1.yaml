  source: "SKILL.md lines 1011-1127"
  instructions: |
    ## Phase 4.1: Prompt Cleanup & Consistency Check *(internal)*

    Before selecting the final renderer, clean the model-neutral prompt package for consistency and usability. This phase is **not** a compression phase and must not shorten the prompt merely to save tokens.

    The goal is:

    ```text
    clean + non-contradictory + complete + renderer-ready
    ```

    not:

    ```text
    short
    ```

    A longer prompt is acceptable when the additional wording preserves subject identity, publication typography, vehicle/product/building integrity, material behavior, lighting direction, text/logo requirements, or exact user constraints. Output is consumed by Phase 4.2 — do not report to the user.

    ```yaml
    prompt_cleanup_consistency_check:
      principle: >
        Do not compress for length. Only remove semantic garbage, duplicate wording, contradictions,
        equipment leaks, avoid-list conflicts, and low-value filler that does not change the visible result.

      target_behavior:
        - "preserve visual specificity"
        - "preserve hard locks and user-requested details"
        - "preserve publication-layout and cover typography intent"
        - "preserve hero-subject integrity guardrails"
        - "preserve material, lighting, color, and composition details when they affect the image"
        - "remove true duplication and contradictions only"
        - "prepare a clean package for the selected model renderer"

      cleanup_actions:
        remove_or_merge:
          - repeated synonyms with identical meaning
          - repeated mood adjectives that do not add visible information
          - redundant quality tags
          - conflicting style modes
          - internal lighting equipment names in generator-facing fields
          - abstract cinematography theory that has no visible translation
          - avoid terms that contradict required positive elements
          - broad negative terms that suppress required text, logo, or cover typography
          - accidental raw YAML/JSON fragments in final prompt fields

        preserve_always:
          - original_user_intent
          - explicit_user_constraints
          - subject_identity
          - exact_text_or_logo_requirements
          - publication_layout_or_cover_typography_intent
          - model_target_and_renderer_requirements
          - shot_size_and_crop_guardrails
          - composition_and_subject_placement
          - style_realism_mode
          - key_lighting_direction_and_quality
          - material_critical_details
          - hero_integrity_guardrails
          - output_specs
          - task_specific_negative_guardrails

      no_shortening_rule: >
        If a phrase adds distinct visible information, preserves a user requirement, or prevents a known failure mode,
        keep it. Do not remove it just because the prompt is long.

      subject_minimum_detail_floor:
        human_portrait:
          require:
            - subject identity / demographic or character role
            - shot size
            - pose or expression
            - lighting direction
            - style realism mode
            - anatomy/crop guardrails when needed
        automotive:
          require:
            - vehicle identity
            - full or intended crop state
            - correct proportions / wheel guardrail
            - scene context
            - lighting direction
            - composition placement
        product:
          require:
            - product identity
            - geometry or label readability
            - material finish
            - lighting/reflection behavior
            - background or surface
        architecture:
          require:
            - space/building type
            - perspective accuracy
            - material palette
            - lighting condition
            - scale/layout readability
        publication_cover:
          require:
            - publication type
            - masthead/title intent
            - cover-line or text-safe layout mode
            - hero subject hierarchy
            - readable typography guardrails
    ```

    ### How to run cleanup

    1. **Preserve first.** Identify all hard locks, subject identity, exact text/logo, publication intent, and model-specific requirements before removing anything.
    2. **Remove only true garbage.** Delete repeated synonyms, contradictory clauses, internal equipment leaks, and generic filler that does not affect the visible result.
    3. **Fix contradictions before deleting.** If positive requires text/logo/cover typography, do not use broad negatives like `no text` or `text artifacts`; replace them with `random unreadable text`, `messy typography`, or `no random extra logos`.
    4. **Preserve publication intent.** If the user asked for a magazine cover or poster, keep masthead/title/cover-line language unless the selected mode is explicitly `text_safe_layout_only_mode`.
    5. **Preserve positive guardrails.** For Z Image Base, Z Image Turbo, and SD-style models, keep positive protection such as "full car visible", "correct car proportions", "clean wheel shape", "label faces camera", or "straight vertical lines."
    6. **Keep distinct visual instructions.** Material behavior, lighting direction, color palette, camera angle, crop safety, and background context should remain when they change the image.
    7. **Do not enforce a token or word budget here.** Phase 4.2 only handles renderer syntax and field splitting; it must not shorten meaningful visual content just to fit a length target.
    8. **When in doubt, remove decorative adjectives before visual nouns.** "amber glass bottle" survives; "beautiful gorgeous premium amber" gets merged.
    9. **Final package should feel complete and controllable**, not skeletal.
