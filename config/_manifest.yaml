schema_version: "2.0.0"
name: nsfw-comfyui-cinematic-enhancer-manifest
execution_runtime:
  mode: fixed_complete_semantic_closure
  catalog: config/execution-catalog.yaml
  quality_contract: config/quality-contract.yaml
  compiler: scripts/compile_execution_packet.py
  phase_materializer: scripts/materialize_execution_phase.py
  validator: scripts/validate_execution_record.py
  geometry_validator: scripts/check_exposure_geometry.py
  default_staging_validator: scripts/check_default_exposure_staging.py
  exposure_light_readability_validator: scripts/check_exposure_light_readability.py
  semantic_visibility_validator: scripts/check_semantic_exposure_visibility.py
  character_resolver: scripts/resolve_adult_character.py
  quality_gate: scripts/validate_quality_gate.py
  rule: "The agent must execute only the compiled packet and validate its phase ledger before returning a prompt pack."
always_load:
  - config/core-knowledge.yaml
  - config/enhancement-pipeline.yaml
  - config/adult-content-policy.yaml
  - config/nsfw-baseline-resolver.yaml
  - config/nsfw-comfyui-overrides.yaml
  - config/comfyui-prompt-pack.yaml
  - config/nsfw-dynamic-scene-controller.yaml
  - config/nsfw-material-environment-controller.yaml
  - config/nsfw-composition-lighting-controller.yaml
  - config/nsfw-local-anatomy-surface-controller.yaml
  - config/nsfw-visual-director.yaml
conditional_load:
  named_character:
    when: "The request names a fictional character whose identity must be preserved."
    path: config/adult-character-whitelist/index.yaml
    resolver_sidecar: config/adult-character-whitelist/runtime-alias-resolver.json
  image_edit:
    when: "The request asks to modify, repair, preserve, revise, or replace part of a source image."
    paths:
      - config/image-edit-policy.yaml
      - config/edit-reference/reference-image-control.yaml
      - config/edit-reference/attribute-change-control-policy.yaml
      - config/edit-reference/image-edit-repair-templates.yaml
  adult_human_scene:
    when: "The request depicts an eligible adult human or human-like subject."
    paths:
      - config/character-identity/human-anatomy-guardrails.yaml
      - config/character-identity/pose-gesture-body-language.yaml
      - config/character-identity/adult-lens-aware-posing-system.yaml
      - config/character-identity/adult-hand-placement-system.yaml
      - config/character-identity/adult-standing-pose-system.yaml
      - config/character-identity/adult-seated-pose-system.yaml
      - config/character-identity/adult-reclining-pose-system.yaml
      - config/character-identity/adult-nude-pose-system.yaml
      - config/character-identity/adult-garment-pose-interaction-system.yaml
      - config/character-identity/reclining-pose-physics.yaml
      - config/character-identity/fabric-opacity-translucency-logic.yaml
      - config/character-identity/garment-motion-physics.yaml
      - config/safety-mature/adult-pose-tiering-system.yaml
      - config/safety-mature/mature-content-tiering-system.yaml
  visible_adult_exposure:
    when: "The request depicts an eligible adult human or humanoid subject and must satisfy the always-NSFW visible exposure baseline."
    path: config/nsfw-visible-exposure-contract.yaml
  exposure_action:
    when: "An eligible adult human or humanoid scene needs a target-compatible garment/material exposure action, camera proof, and Phase 4 feasibility recovery."
    path: config/nsfw-exposure-action-controller.yaml
  default_exposure_staging:
    when: "An eligible adult human or humanoid scene is missing pose, wardrobe, or both and needs exposure-first staging defaults."
    path: config/nsfw-default-exposure-staging.yaml
  exposure_light_readability:
    when: "An eligible adult human or humanoid scene needs cinematic lighting that keeps the selected exposure target locally readable."
    path: config/nsfw-exposure-light-readability.yaml
  semantic_exposure_visibility:
    when: "An eligible adult human or humanoid scene needs positive-only semantic clearance for hair, hands, garment folds, atmosphere, light, focus, and crop."
    path: config/nsfw-semantic-exposure-visibility.yaml
  dynamic_action_or_interaction:
    when: "The request contains movement, a transition, an impact moment, water or particle motion, a single adult action, or a consenting-adult duo interaction."
    paths:
      - config/nsfw-dynamic-scene-controller.yaml
      - config/visual-cinematography/gaze-action-composition-logic.yaml
      - config/visual-cinematography/motion-capture.yaml
      - config/visual-cinematography/shutter-motion-control-system.yaml
      - config/scene-environment/action-object-attention-system.yaml
      - config/scene-environment/physical-collision-guardrails.yaml
      - config/scene-environment/soft-surface-contact-physics.yaml
  material_or_environment_response:
    when: "The request includes visible skin or fabric state, wetness, steam, water, reflective surfaces, bedding, weather, or a material-focused close-up."
    paths:
      - config/nsfw-material-environment-controller.yaml
      - config/character-identity/adult-garment-pose-interaction-system.yaml
      - config/character-identity/garment-motion-physics.yaml
      - config/visual-cinematography/material-rendering-library.yaml
      - config/visual-cinematography/expert-visual-synthesis-system.yaml
      - config/scene-environment/environment-atmosphere-library.yaml
  scene_and_visual_enrichment:
    when: "The request needs specific location, contact, composition, camera, lighting, material, or depth decisions."
    paths:
      - config/scene-environment/scene-worldbuilding-library.yaml
      - config/scene-environment/physical-collision-guardrails.yaml
      - config/scene-environment/soft-surface-contact-physics.yaml
      - config/visual-cinematography/lighting-diagrams.yaml
      - config/visual-cinematography/camera-lens-library.yaml
      - config/visual-cinematography/exposure-decision-engine.yaml
      - config/visual-cinematography/material-rendering-library.yaml
      - config/visual-cinematography/depth-layering-system.yaml
      - config/visual-cinematography/visual-balance-system.yaml
      - config/nsfw-composition-lighting-controller.yaml
      - config/visual-cinematography/style-realism-control.yaml
loading_rules:
  - Load the original enhancement modules when their visual trigger applies; never replace them with generic NSFW wording.
  - Resolve nsfw-baseline-resolver.yaml for every request before selecting a neutral adult tier or interpreting wardrobe preservation.
  - Resolve nsfw-visible-exposure-contract.yaml for every eligible human/humanoid scene; an adult-nude semantic label, wet clothing, or a sensual contour is not a delivery substitute for visible exposure evidence.
  - Resolve nsfw-default-exposure-staging.yaml for every eligible human/humanoid scene with missing or incomplete pose or wardrobe intent; default female/feminine routes try vulva first and only use nipple fallback after a recorded lower-body route failure.
  - Resolve nsfw-exposure-light-readability.yaml for every eligible human/humanoid scene; preserve cinematic mood while forcing local fill, open shadow detail, and readable skin midtones on the selected target.
  - Resolve nsfw-exposure-action-controller.yaml for every eligible human/humanoid scene; bind each selected target to a compatible action, end state, and camera proof, then recompose rather than deliver a covered result.
  - Resolve nsfw-semantic-exposure-visibility.yaml for every eligible human/humanoid scene; positive prompts must state semantic clearance for hair, hands, garment edges, atmosphere, light, focus, and crop because no negative prompt is delivered.
  - Resolve nsfw-visual-director.yaml before generic visual hierarchy rules; it applies sensory-first focus unless the user specifies another focus or camera target.
  - Activate nsfw-local-anatomy-surface-controller.yaml only for a visible, relevant adult surface; it must not force a chest close-up into another composition.
  - Default style is cinematic photoreal; only switch to anime-realism, cel-shaded anime, or illustration when the user explicitly asks.
  - Resolve named characters through scripts/resolve_adult_character.py; only load the single profile returned by a unique runtime sidecar match.
  - Reference-only catalog sources must be materialized automatically at their declared phase; agents may not skip, pre-load, or self-select them.
  - Reject unresolved named-character NSFW requests; do not search legacy character data or infer adulthood.
  - Read nsfw-comfyui-overrides.yaml after any legacy module so its delivery constraints win only where they conflict.
