schema_version: "1.0.0"
name: nsfw-dynamic-scene-controller
purpose: >
  Build a physically readable single-subject or consenting-adult duo scene
  before cinematic rendering. This controller describes support, contact,
  motion, gaze, occlusion, and secondary motion without replacing user intent.

eligibility:
  allowed_subject_counts: [single, duo]
  duo_requirement: "Every participant is clearly adult, fictional/original, and consensual."

baseline_integration:
  eligible_human_rule: "Resolve adult_nude baseline before choosing pose_family or motion_state."
  unspecified_wardrobe: "Select a clearly adult nude pose family with readable support, body line, and camera geometry."
  explicit_wardrobe: "Select garment grip, loosening, partial removal, or displaced-fabric dynamics that retain design identity and follow gravity/contact."

dynamic_scene_plan:
  required_fields:
    - subject_count
    - pose_family
    - motion_state
    - primary_action
    - support_points
    - contact_anchors
    - force_direction
    - occlusion_order
    - gaze_reaction
    - secondary_motion
    - camera_readability
  subject_count: "single | duo"
  pose_family: "standing | seated | reclining | kneeling | floor_supported | dynamic_transition"
  motion_state: "still | transition | peak_action | aftermath"
  primary_action: "One concise description of the visible action or pose objective."
  support_points: []
  contact_anchors: []
  force_direction: "Direction, source, and result of the visible force or weight shift."
  occlusion_order: []
  gaze_reaction: []
  secondary_motion: []
  camera_readability: "Faces, action zone, support points, and relevant interaction remain readable."

motion_state_rules:
  still:
    require: [stable_center_of_gravity, relaxed_secondary_motion, readable_body_line]
  transition:
    require: [clear_before_after_direction, weight_transfer, one_primary_motion_axis]
  peak_action:
    require: [decisive_moment, force_source, support_or_counterforce, clear_action_silhouette]
  aftermath:
    require: [settled_weight, residual_secondary_motion, environment_response]

single_subject_rules:
  - "Name the support surface or support leg before describing a dramatic body line."
  - "Visible hands require a support, framing, garment, or contact role."
  - "When reclining or seated, show compression, wrinkle direction, and contact shadow at load points."
  - "Use a single primary action axis; hair, fabric, droplets, and loose straps follow it as secondary motion."

duo_rules:
  - "Assign a lead action and an observable response; do not describe disconnected poses."
  - "Every contact anchor has a participant, a target, a pressure or support role, and a visible occlusion order."
  - "Keep both faces readable unless the user explicitly requests otherwise."
  - "Hands, limbs, and torsos must have separate silhouettes at the action zone whenever framing allows."
  - "Do not use a particle, shadow, steam, or foreground effect to conceal unsupported anatomy or contact."

impact_and_motion_rules:
  - "Describe one peak moment rather than stacking incompatible action phases into a still image."
  - "State the physical cause for motion in hair, fabric, liquid, steam, bedding, or environment effects."
  - "Freeze the face, key contact, and structural anatomy when peak_action is selected; motion blur is limited to fast secondary elements."
  - "Force direction, weight shift, contact shadow, and displaced material must agree."

prompt_assembly_hooks:
  phase_1_intent_analysis: "Create dynamic_scene_plan for every human NSFW request; use still for a non-action portrait."
  phase_2_cinematic_enrichment: "Choose pose, camera, action axis, timing, and motion treatment from the scene plan."
  phase_3_scene_blueprint: "Represent every required field as a visible scene decision."
  phase_4_self_review: "Reject floating support, ambiguous contact, hidden action zones, incompatible motion states, and absent force causes."
