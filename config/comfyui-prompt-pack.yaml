schema_version: "1.0.0"
name: comfyui-prompt-pack
purpose: "Render one NSFW-ready positive-only prompt pack for Z-Image Base+Turbo and Krea2 ComfyUI nodes."

output_contract:
  language:
    prompt: en
    labels: zh-TW
  fields:
    - z_image_positive_prompt
    - krea2_positive_prompt
    - suggest_resolution
  user_facing_template: |
    ## Z-Image Base+Turbo Positive Prompt
    {z_image_positive_prompt}

    ## Krea2 Positive Prompt
    {krea2_positive_prompt}

    ## Suggested Resolution
    {suggest_resolution}

internal_scene_contract:
  required_when_human_subject_present:
    - nsfw_baseline_tier
    - nsfw_baseline_application_reason
    - visible_exposure_contract
    - default_exposure_staging_plan
    - exposure_action_plan
    - exposure_geometry_plan
    - semantic_exposure_visibility_plan
    - exposure_light_readability_plan
    - exposure_feasibility_review
    - dynamic_scene_plan.pose_family
    - dynamic_scene_plan.motion_state
    - dynamic_scene_plan.support_points
    - dynamic_scene_plan.contact_anchors
    - dynamic_scene_plan.force_direction
    - dynamic_scene_plan.occlusion_order
    - dynamic_scene_plan.gaze_reaction
    - dynamic_scene_plan.secondary_motion
    - visual_focus_plan
    - local_anatomy_surface_contract_when_active
    - material_environment_plan
    - lighting_environment_plan
  renderer_rule: "Translate these plans into visible English decisions; do not expose their internal field names."

z_image:
  fields: [z_image_positive_prompt]
  target: "Z-Image Base+Turbo shared positive input."
  positive_syntax: "Dense English visual language, subject-first, with visible details and constructive guardrails only."
  positive_required_order:
    - resolved_adult_nsfw_baseline
    - visible_adult_exposure_evidence
    - semantic_visibility_clearance
    - visual_focus_and_camera_intent
    - adult_subject_and_identity
    - requested_adult_content_and_action
    - pose_support_contact_motion_and_occlusion
    - composition_camera_and_crop
    - lighting_skin_fabric_material_and_environment_response
    - edit_preservation_locks_when_relevant
  positive_only_policy:
    - Use constructive positive controls instead of negative prompt terms.
    - Convert failure controls into desired visible states: clearly adult, stable anatomy, readable hands, clean crop, clear target visibility, coherent fabric physics, and watermark-free clean image area.
    - For dynamic scenes, state support, action axis, hand role, material response, and silhouette separation positively.
    - For visible local anatomy or translucent/wet garment interfaces, state local light, material thickness, adhesion/stretch, and target readability positively.

krea2:
  field: krea2_positive_prompt
  target: "Krea2 positive input."
  positive_syntax: "Natural-language subject-first visual paragraph with no section headers, negative syntax, or model command flags."
  positive_required_order:
    - resolved_adult_nsfw_baseline
    - visible_adult_exposure_evidence
    - semantic_visibility_clearance
    - subject_identity_and_action
    - camera_crop_and_focus
    - lighting_material_environment
    - edit_preservation_locks_when_relevant
  translation_rule: "Compress internal plans into fluent positive visible states; use fewer technical labels than Z-Image while preserving target/action/camera readability."

style_translation:
  default: cinematic_photoreal
  cinematic_photoreal: "Use real-camera perspective, physically plausible skin/material behavior, motivated lighting, and controlled exposure."
  anime_realism: "Use stylized anime facial and contour language with controlled value groups, clean material highlights, and the same support/contact/gravity logic."
  rule: "Switch away from cinematic_photoreal only when an explicit style request triggers style-realism-control.yaml."

always_nsfw_baseline_rendering:
  eligible_human_subject:
    z_image: "Begin with clearly adult status and the resolved adult-nude or transformed-wardrobe presentation before pose, camera, and material detail."
    krea2: "Begin with clearly adult status and the resolved adult-nude or transformed-wardrobe presentation in a natural first sentence."
  nonhuman_only_subject:
    rule: "Do not inject adult subject or NSFW language."
  transformed_wardrobe:
    rule: "Retain garment identity, color, and key design while rendering a concrete physically caused opening, partial removal, lowering, pull-aside, or displacement that exposes the selected evidence target."
  visible_exposure_contract:
    z_image: "Name the same visible evidence target, garment action, and in-frame readability before pose, camera, and material detail."
    krea2: "Name the same visible evidence target, garment action, and in-frame readability in natural positive language before atmosphere or style."
  default_exposure_staging_plan:
    z_image: "Within the early subject block, state the selected target, exposure-first pose template, wardrobe mode or action, ray-readable camera proof, and semantic clearance guards."
    krea2: "Use a fluent first sentence that binds the selected target, pose, wardrobe/action, camera proof, and clearance guards before atmosphere or style."
    rule: "Missing pose or wardrobe intent must resolve to exposure-first staging; female/feminine unspecified targets use canonical vulva with pussy allowed only as a prompt synonym."
  exposure_action_plan:
    z_image: "Keep the target, action, end state, and camera proof together; do not separate target anatomy from the garment/material cause that reveals it."
    krea2: "Keep the target, action, end state, and camera proof in one readable sentence."
    rule: "Cleavage, unbuttoned clothing, wetness, or fabric tension alone cannot stand in for the selected target's final visible state."
  exposure_geometry_plan:
    z_image: "Keep the validated target/action/camera relationship coherent; do not add an occluding hand, garment, prop, shallow-focus loss, or crop that contradicts it."
    krea2: "Keep the validated target/action/camera relationship coherent with concise positive wording."
    rule: "Do not expose coordinate fields; translate only their visible camera, action, and crop consequences."
  semantic_exposure_visibility_plan:
    z_image: "State hair, hands, garment edges, atmosphere, light, and focus as constructive clearance controls around the selected evidence target."
    krea2: "State the same clearance controls as natural readable staging rather than as an avoid list."
    rule: "A positive-only prompt must not rely on a removed negative prompt to prevent semantic occlusion."
  exposure_light_readability_plan:
    z_image: "Keep target-local fill, open shadow detail on the target zone, readable skin midtones, and contrast separation near the selected target in the early subject block."
    krea2: "State the same target-readable lighting as natural positive staging before mood, background darkness, or style."
    rule: "Cinematic low-key lighting may describe the background, edges, or room mood only after the selected target remains locally lit and readable."

adult_visual_direction_rendering:
  visual_focus_plan:
    z_image: "Express primary and secondary focus through placement, sharpness, contrast, occlusion, and camera angle rather than internal field names."
    krea2: "Express primary and secondary focus as a natural camera and focus description."
  local_anatomy_surface_when_active:
    positive: "Translate local surface geometry, individual variation, pose/gravity, material interface, and key-light response into visible natural English detail."
    positive_only_guard: "Use constructive phrasing for integrated local anatomy, asymmetric natural detail, coherent material interface, and consistent highlights."
  focus_conflict: "Do not let generic face-first language override a declared sensory primary focus; follow explicit user focus when supplied."

resolution_policy:
  priority:
    - explicit_user_resolution
    - explicit_user_aspect_ratio
    - edit_source_resolution_or_aspect_ratio
    - composition_orientation
  buckets:
    square: "1024x1024 (1:1)"
    portrait: "1024x1536 (2:3)"
    landscape: "1536x1024 (3:2)"
  default: portrait
  edit_rule: "When source dimensions are known, preserve them; otherwise preserve the source aspect ratio using the nearest bucket."

validation:
  required_nonempty_fields: [z_image_positive_prompt, krea2_positive_prompt, suggest_resolution]
  positive_must_not_contain: ["[AVOID]", "negative prompt", "--no", "avoid ", "no "]
  prompt_language: english
  human_scene_retention:
    - resolved_adult_nsfw_baseline_for_eligible_humans
    - visual_focus_plan_with_declared_primary_and_secondary_focus
    - local_anatomy_surface_continuity_when_active
    - visible_support_and_weight_shift
    - readable_contact_and_occlusion
    - coherent_motion_cause_and_secondary_motion
    - lighting_and_material_cause_effect
    - face_action_and_critical_structure_readability
    - visible_adult_exposure_contract_with_readable_evidence_target
    - default_exposure_staging_target_pose_wardrobe_camera_and_semantic_clearance
    - concrete_garment_transformation_when_wardrobe_is_explicit
    - evidence_target_in_frame_unoccluded_and_readable
    - exposure_action_target_garment_zone_and_end_state_are_compatible
    - exposure_geometry_camera_ray_surface_facing_action_reach_and_crop_passed
    - exposure_light_readability_target_local_fill_open_shadow_and_skin_midtones
    - phase_4_exposure_feasibility_review_passed
