schema_version: "1.0.0"
skill_phase:
  phase: 4.2
  name: "Phase 4.2: Z-Image Renderer"
  internal: true
  instructions: |
    Render only the cleaned Phase 4.1 prompt package for Z-Image.

    Return `model_target: z_image`, `renderer_profile`, `positive_prompt`,
    `negative_prompt`, and `suggest_resolution`. The positive prompt is a dense
    English, subject-first visual phrase chain. Preserve all composition,
    identity, exposure, action, camera, lighting, material, and edit locks.
    The negative prompt contains only targeted failure controls and must not
    negate requested adult content. Do not select Flux, a multi-model workflow,
    or any legacy renderer target.
