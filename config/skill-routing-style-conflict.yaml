  instructions: |
    ## Style Conflict Resolution

    When the user prompt mixes terms from different style modes (e.g., "photorealistic anime portrait"), the style conflict resolution rules determine which mode takes priority and which terms must be removed or downweighted. Always reference `config/visual-cinematography/style-realism-control.yaml` for the base mode definitions.

    ```yaml
    style_conflict_resolution:
      photorealistic_vs_anime:
        if_user_says: ["photorealistic", "real person", "real-life"]
        remove_or_downweight:
          - "anime"
          - "cel shading"
          - "cartoon"
        preserve_if_character_reference:
          - "character-inspired costume"
          - "signature color palette"
          - "recognizable hairstyle influence"

      anime_realism_vs_cartoon:
        if_user_says: ["anime realism", "high-end Japanese", "semi-realistic anime"]
        keep:
          - "stylized facial design"
          - "cinematic lighting"
          - "realistic body proportions"
        avoid:
          - "chibi"
          - "flat cartoon"
          - "raw documentary photo"

      general_rule: >
        When style terms conflict, medium-defining terms outrank loose aesthetic references.
        Correction language such as "but", "instead", "rather than", "don't", "closer to", "not...but..."
        overrides earlier style terms. A named anime/game character reference is a subject or design cue,
        not automatically the rendering medium. Never preserve incompatible medium terms as equal-weight style modes.
    ```
