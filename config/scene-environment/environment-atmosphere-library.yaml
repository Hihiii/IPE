    - "moody"
    - "dreamy"
    - "cinematic"
    - "romantic"
    - "melancholic"
    - "mysterious"
    - "peaceful"
    - "electric"
    - "tense"
    - "luxurious"
    - "nostalgic"
  atmosphere_terms:
    - "rainy"
    - "foggy"
    - "misty"
    - "humid"
    - "hazy"
    - "stormy"
    - "golden hour"
    - "blue hour"
    - "sunrise"
    - "sunset"
    - "night"
    - "snow"
    - "dust"
    - "smoke"
    - "volumetric light"

