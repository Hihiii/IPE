atmosphere_density_control:
  clear:
    use_when:
      - "product clarity"
      - "architecture clarity"
      - "technical detail"
    caution: "Avoid hiding detail."
  light:
    use_when:
      - "editorial mood"
      - "gentle atmosphere"
      - "soft depth"
  medium:
    use_when:
      - "cinematic mood"
      - "rainy city"
      - "foggy distance"
    caution: "Keep hero subject readable."
  heavy:
    use_when:
      - "horror"
      - "mystery"
      - "silhouette-driven scene"
    caution: "Use only if subject visibility can be reduced."

generator_visible_translation:
  positive:
    - "time-of-day atmosphere"
    - "weather-specific surface response"
    - "air quality and mood cues"
    - "environmental lighting consistency"
    - "ambient particles and sensory detail when appropriate"
  negative:
    - "atmosphere hiding the subject"
    - "inconsistent weather cues"
    - "random fog"
    - "overdone bloom"
    - "muddy visibility"

model_specific_rendering:
  chatgpt_image:
    guidance: >
      Use natural-language atmosphere descriptions tied to light, weather, air,
      sensory cues, and mood. Keep the subject readable.
  z_image_turbo:
    positive_template: >
      atmospheric environment, time-of-day lighting, weather cues, sensory detail,
      mood-rich background, coherent air and light
    negative_template: >
      random fog, overdone bloom, muddy visibility, inconsistent weather, flat atmosphere
  stable_diffusion:
    positive_template: >
      atmospheric, cinematic mood, weather effects, environmental lighting,
      volumetric light, mist, haze, wet reflections
    negative_template: >
      excessive fog, low visibility, muddy, overbloom, inconsistent lighting

self_review_checklist:
  - "Is the time of day clear or intentionally neutral?"
  - "Are weather, surface response, lighting, and air quality consistent?"
  - "Does the atmosphere support the mood?"
  - "Is the subject still readable?"
  - "Are particle effects and ambient motion purposeful rather than random?"
  - "Does atmosphere align with scene worldbuilding and era/culture?"

prompt_assembly_hooks:
  phase_1_intent_analysis:
    add_fields:
      - environment_atmosphere
    action: "Detect environment type, time, weather, mood, atmosphere, and sensory cues."

  phase_2_cinematic_enrichment:
    action: "Translate mood into light, weather, air quality, sensory cues, and particle effects."

  phase_3_scene_blueprint:
    action: "Coordinate atmosphere with scene worldbuilding, lighting, and background density."

  phase_4_self_review:
    checks:
      - "Check weather/light consistency."
      - "Check atmosphere does not obscure subject unintentionally."
      - "Check mood-to-environment coherence."

  phase_4_5_cleanup:
    action: "Do not remove atmosphere cues that define mood or time of day."

  phase_4_6_renderer_selection:
    action: "Render atmosphere in model-appropriate language."

  phase_5_final_prompt:
    action: "Include concise environment/atmosphere cues when they improve the final image."


