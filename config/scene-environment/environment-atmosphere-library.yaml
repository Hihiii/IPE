# ============================================================
# environment-atmosphere-library.yaml
# Environment, atmosphere, weather, time, mood, and sensory cue controller
# Version: 1.0.0
# Purpose:
#   Strengthen environmental mood, air quality, time of day, weather, atmosphere,
#   sensory details, and background ambience in image prompts.
# ============================================================

schema_version: "1.1.0"
name: "environment-atmosphere-library"
description: >
  A mood and environmental condition module for prompt enhancement. It defines
  scene atmosphere through time of day, weather, season, humidity, air quality,
  mood, sensory cues, lighting cues, particles, ambient motion, temperature feel,
  and background density.

  LOAD POLICY: Do NOT load for casual time-of-day mentions like "morning light"
  or "sunny day". Only load when the scene atmosphere requires structured enrichment:
  mood translation into environmental cues, weather/season effects, sensory ambience,
  or visibility/particle control.

core_principle: >
  Environment and atmosphere define how the scene feels. The same location can look
  completely different depending on time of day, weather, humidity, air quality,
  ambient motion, and mood. Prompt these conditions explicitly when they matter.

global_rules:
  - "Do not treat atmosphere as a vague adjective; connect it to light, air, weather, color, and sensory cues."
  - "If the user specifies mood, translate it into environmental conditions."
  - "When background is important, define time of day and atmosphere unless the user explicitly wants neutral studio light."
  - "Use atmospheric density carefully: too much fog, rain, haze, or bloom can hide important subject details."
  - "Keep atmosphere consistent with lighting, color palette, scene worldbuilding, and era/culture."
  - "Use particles and ambient motion only when they support the scene."
  - "Atmospheric detail as a depth-creation method must follow config/visual-cinematography/visual-richness-narrative-depth.yaml — depth_creation_methods.atmospheric_detail. Atmosphere must not obscure subject readability."

composition_task_layer:
  purpose: "Use environment and atmosphere as composition tools, not only mood tags."
  environment_fields:
    subject_frame_position: ""
    typical_lead_lines: []
    foreground_elements: []
    background_readability_level: "minimal | readable_secondary | worldbuilding_support | spectacle"
    light_source_opportunities: []
  defaults:
    beach_day:
      subject_frame_position: "left or right third with horizon kept below face"
      typical_lead_lines: ["shoreline", "wave edge", "sand path", "sun direction"]
      foreground_elements: ["sand texture", "float/prop edge", "water foam"]
      background_readability_level: "readable_secondary"
      light_source_opportunities: ["hard sun", "sky fill", "water bounce", "hair rim light"]
    pool_resort:
      subject_frame_position: "pool edge or waterline with hands/elbows grounded"
      typical_lead_lines: ["pool edge", "waterline", "tile joints", "lantern rows"]
      foreground_elements: ["ripples", "ledge", "foam", "wet hands"]
      background_readability_level: "readable_secondary"
      light_source_opportunities: ["pool caustics", "warm practicals", "cool water bounce"]
    gothic_interior:
      subject_frame_position: "midground subject framed by vertical architecture"
      typical_lead_lines: ["columns", "aisle", "window shafts", "floor pattern"]
      foreground_elements: ["candles", "ornate furniture", "soft shadow frame"]
      background_readability_level: "worldbuilding_support"
      light_source_opportunities: ["stained glass beam", "window shaft", "candle practical", "rim from high backlight"]

environment_atmosphere_schema:
  environment_type: ""
  time_of_day: ""
  weather: ""
  season: ""
  air_quality: ""
  humidity: ""
  temperature_feel: ""
  atmosphere_density: "clear | light | medium | heavy"
  mood: []
  sensory_cues: []
  lighting_cues: []
  particle_effects: []
  ambient_motion: []
  sound_implied_cues: []
  background_density: "sparse | balanced | rich | cinematic_dense"
  visibility_control: "clear_subject | atmospheric_subject | silhouette | obscured"
  renderer_guardrails:
    positive: []
    negative: []

