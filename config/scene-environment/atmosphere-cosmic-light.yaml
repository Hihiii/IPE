# ============================================================
# atmosphere-cosmic-light.yaml
# Natural light, celestial light, weather drama, and atmospheric optics controller
# Version: 1.0.0
# Purpose:
#   Control natural light quality, sky behavior, celestial illumination,
#   volumetric atmosphere, and extreme weather readability in prompts.
# ============================================================

schema_version: "1.0.0"
name: "atmosphere-cosmic-light"
description: >
  A natural-light and extreme-weather module for prompt enhancement. It covers
  sun angle, sky states, moonlight, starlight, aurora, lightning, storm systems,
  fog, mist, god rays, atmospheric scattering, cloud behavior, weather particles,
  and exposure safeguards for dramatic outdoor scenes.

core_principle: >
  Outdoor scenes become memorable when the light source, sky condition,
  atmosphere density, and weather mechanics are explicit. Natural light and
  cosmic light should shape form, color temperature, visibility, and mood in a
  physically coherent way.

global_rules:
  - "Natural light should specify time of day, sky condition, and light direction when visually important."
  - "Extreme weather should affect visibility, surface response, motion, and atmosphere, not only add particles."
  - "Celestial light such as moonlight, aurora, stars, and eclipse glow should influence color temperature and silhouette readability."
  - "Volumetric effects should enhance depth and mood without obscuring the hero subject unintentionally."
  - "If the weather is dramatic, clarify whether the scene should prioritize spectacle, realism, or subject readability."
  - "Sunrise, sunset, blue hour, moonlight, and storm light each require different contrast and color logic."
  - "Atmospheric optics like crepuscular rays, halo, rainbow, fog glow, or backlit mist should have a clear source condition."

atmosphere_cosmic_light_schema:
  light_source_type: "sunlight | overcast_daylight | golden_hour | blue_hour | moonlight | starlight | aurora | lightning | eclipse | mixed_natural_light"
  sky_condition: "clear | partly_cloudy | overcast | stormy | foggy | snowy | desert_haze | volcanic_ash | night_clear | night_cloudy"
  time_phase: "pre_dawn | sunrise | morning | noon | afternoon | golden_hour | sunset | blue_hour | dusk | night | midnight"
  weather_state: "clear | rain | storm | snow | blizzard | fog | mist | hail | sandstorm | dust_storm | hurricane_surf"
  atmosphere_density: "clear | light | medium | heavy"
  celestial_elements: []
  volumetric_effects: []
  weather_particles: []
  cloud_behavior: []
  surface_response: []
  exposure_readability:
    subject_visibility: "low | medium | high"
    silhouette_priority: "low | medium | high"
    shadow_detail_policy: "deep_but_readable | soft | graphic | storm_dark"
  renderer_guardrails:
    positive: []
    negative: []

light_profiles:
  golden_hour:
    positive:
      - "warm low-angle sunlight"
      - "long soft shadows"
      - "golden rim light"
      - "warm highlights with gentle atmospheric glow"
    negative:
      - "flat midday light"
      - "colorless sky"

  blue_hour:
    positive:
      - "cool ambient skylight"
      - "soft deep-blue atmosphere"
      - "balanced transition between sky glow and practical lights"
    negative:
      - "harsh noon contrast"
      - "dead black sky"

  moonlight:
    positive:
      - "cool moonlit rim light"
      - "readable silhouette against the night sky"
      - "subtle silver-blue highlights"
      - "deep shadows with preserved edge detail"
    negative:
      - "subject lost in darkness"
      - "flat black night scene"

  aurora_night:
    positive:
      - "celestial aurora glow across the sky"
      - "colored atmospheric illumination on landscape edges"
      - "clear night air with visible stars when appropriate"
    negative:
      - "generic neon sky unrelated to the environment"
      - "aurora without visible atmospheric spread"

  storm_light:
    positive:
      - "dramatic storm-filtered daylight"
      - "high-contrast cloud breaks"
      - "light shafts through storm clouds"
      - "charged atmosphere and directional wind cues"
    negative:
      - "random lightning without storm context"
      - "weather not affecting visibility or surfaces"

extreme_weather_profiles:
  thunderstorm:
    positive:
      - "towering storm clouds"
      - "rain streaks shaped by wind direction"
      - "wet reflective surfaces"
      - "occasional lightning illumination"
      - "dense but readable storm atmosphere"
    negative:
      - "dry ground during heavy rain"
      - "cloudless sky with lightning"

  night_highway_rain:
    positive:
      - "dense night rain with wind-shaped streaks"
      - "wet asphalt reflecting street lamps and vehicle lights along the road plane"
      - "headlight beams diffused by rain mist and aligned with the vehicle's forward direction"
      - "spray and mist sourced from tire contact with standing water"
      - "reduced distant visibility with readable foreground vehicle detail"
    negative:
      - "diagonal spotlight crossing the vehicle"
      - "dry road during heavy rain"
      - "rain streaks unrelated to wind or camera movement"
      - "opaque rain haze hiding the vehicle"
      - "headlight beams aimed sideways through the car body"

  blizzard:
    positive:
      - "wind-driven snow"
      - "reduced visibility in the distance"
      - "frosted surfaces and cold haze"
      - "snow accumulation consistent with the scene"
    negative:
      - "warm clear sunlight without cold logic"
      - "snow particles unrelated to wind direction"

  sandstorm:
    positive:
      - "windblown dust layers"
      - "low-visibility desert atmosphere"
      - "warm diffused sun through airborne sand"
      - "grit affecting surfaces and horizon clarity"
    negative:
      - "clean clear air during active sandstorm"
      - "dust with no wind force"

  volcanic_ash:
    positive:
      - "smoke and ash-laden sky"
      - "orange or red underglow when lava/light source exists"
      - "falling ash particles affecting visibility"
    negative:
      - "clean bright sky during ash event"
      - "random black smoke with no source"

atmospheric_optics:
  positive_language:
    - "volumetric light rays"
    - "crepuscular rays through clouds or trees"
    - "backlit mist glowing around the subject"
    - "subtle atmospheric scattering in the distance"
    - "fog glow around bright sources"
    - "rainbow or halo only when lighting conditions justify it"
    - "vehicle headlights scatter through rain only along their forward beam path"
  negative_language:
    - "random god rays"
    - "opaque fog hiding the subject"
    - "overbloomed sky"
    - "fake HDR weather"
    - "spotlight beams crossing the hero subject without a physical source"

natural_scene_scale_anchors:
  suggestions:
    - "tree line"
    - "ridgeline"
    - "shoreline"
    - "cloud layers"
    - "rocks or cliffs"
    - "human figure only if needed for scale"
    - "boats, cabins, roads, or structures when contextually appropriate"

self_review_checklist:
  - "Is the main outdoor light source explicit and visually coherent?"
  - "Do sky condition, weather, and ground/surface response agree with each other?"
  - "Are celestial light and atmospheric effects influencing the scene instead of being decorative only?"
  - "Is the subject still readable despite dramatic light or weather?"
  - "Does the atmosphere deepen scale and mood without flattening the scene?"

model_specific_rendering:
  chatgpt_image:
    guidance: >
      Use natural-language descriptions tying time, sky condition, weather,
      atmosphere, and visibility to actual visual consequences.
  z_image_turbo:
    positive_template: >
      natural dramatic lighting, atmospheric sky, weather-consistent surfaces,
      volumetric atmosphere, readable subject, cinematic sky light
    negative_template: >
      flat outdoor light, fake HDR sky, opaque fog, subject lost in darkness,
      inconsistent weather
  stable_diffusion:
    positive_template: >
      dramatic natural light, volumetric rays, atmospheric scattering,
      storm clouds, moonlight rim light, weather particles, readable silhouette
    negative_template: >
      flat lighting, overbloom, bad weather logic, opaque fog, crushed shadows

prompt_assembly_hooks:
  phase_1_intent_analysis:
    add_fields:
      - atmosphere_cosmic_light
    action: "Detect natural light source, sky behavior, weather severity, and celestial illumination."
  phase_2_cinematic_enrichment:
    action: "Translate outdoor mood into sky, weather, light direction, atmospheric optics, and surface response."
  phase_3_scene_blueprint:
    action: "Coordinate natural light and weather with terrain, oceans, architecture, and subject readability."
  phase_4_self_review:
    checks:
      - "Check weather/light coherence."
      - "Check subject visibility under atmospheric drama."
      - "Check celestial light influence and scale depth."
  phase_4_5_cleanup:
    action: "Preserve time/sky/weather/celestial cues and readability safeguards."
  phase_4_6_renderer_selection:
    action: "Render atmosphere/cosmic-light details in model-appropriate language."
  phase_5_final_prompt:
    action: "Include concise but vivid natural-light and weather logic when relevant."
