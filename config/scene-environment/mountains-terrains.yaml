# ============================================================
# mountains-terrains.yaml
# Mountain scale, elevation atmosphere, and landform controller
# Version: 1.0.0
# Purpose:
#   Control mountainous landscapes, cliffs, valleys, plateaus, glaciers,
#   deserts, forests, ridgelines, landform scale, and terrain readability.
# ============================================================

schema_version: "1.0.0"
name: "mountains-terrains"
description: >
  A terrain and landform module for prompt enhancement. It covers mountain scale,
  ridge structure, cliff faces, valleys, snowlines, glaciers, scree, plateaus,
  canyons, grasslands, alpine conditions, atmospheric perspective, and the spatial
  readability of ground planes, elevation, and terrain layers.

core_principle: >
  Mountain and terrain scenes need layered landform logic. Ridgelines, foreground
  ground planes, middle-distance slopes, distant peaks, erosion patterns, vegetation
  zones, and atmospheric perspective all contribute to scale and realism.

global_rules:
  - "Define the dominant landform: peak, ridge, valley, cliff, canyon, plateau, glacier, dune field, etc."
  - "Use foreground, middle-distance, and far-distance terrain layers to communicate scale."
  - "Elevation and weather should influence vegetation, snowline, haze, and visibility."
  - "Rocks, snow, soil, and vegetation should be coherent with climate and altitude."
  - "If the scene is aerial or high-altitude, clarify horizon behavior, cloud level, and terrain compression."
  - "Landforms should feel geological, not randomly shaped decoration."
  - "Keep hero subject readability while preserving the vastness of the terrain."

mountains_terrains_schema:
  terrain_type: "alpine_peak | mountain_range | ridgeline | canyon | plateau | valley | cliffside | glacier | volcanic_mountain | dune_desert | rolling_hills | forested_mountains | tundra_highland"
  elevation_feel: "lowland | upland | high_altitude | extreme_altitude | aerial_view"
  climate_band: "temperate | arid | tropical_highland | snowy_alpine | polar | volcanic"
  weather_link: "clear | misty | stormy | snowy | windy | sunrise | sunset | moonlit"
  terrain_layers:
    foreground: []
    midground: []
    background: []
    far_background: []
  geology_cues: []
  vegetation_zones: []
  snow_ice_logic: []
  atmospheric_perspective: []
  scale_anchors: []
  exposure_readability:
    terrain_readability: "low | medium | high"
    ridge_separation: "low | medium | high"
    subject_to_terrain_separation: "low | medium | high"
  renderer_guardrails:
    positive: []
    negative: []

terrain_profiles:
  alpine_range:
    positive:
      - "layered mountain ridges"
      - "crisp foreground rocks"
      - "mid-distance slopes"
      - "distant hazy peaks"
      - "snowline appropriate to season and altitude"
    negative:
      - "single flat mountain cutout"
      - "random snow placement"

  canyon_landscape:
    positive:
      - "stratified rock faces"
      - "clear depth drop into the canyon"
      - "sun-shadow contrast revealing geology"
      - "readable foreground ledge or rim"
    negative:
      - "flat cliff wall with no depth"
      - "erased ground-plane logic"

  volcanic_peak:
    positive:
      - "dark rocky textures"
      - "ash or smoke context when active"
      - "harsh terrain with sparse vegetation"
      - "strong silhouette against the sky"
    negative:
      - "lush forest on active barren summit without explanation"
      - "generic cone with no geological detail"

  glacier_scene:
    positive:
      - "blue-white ice masses"
      - "crevasse structure"
      - "cold atmospheric clarity"
      - "rock-ice transitions"
    negative:
      - "smooth plastic ice"
      - "warm lush terrain directly adjacent without climatic logic"

  dune_desert:
    positive:
      - "wind-shaped dune ridges"
      - "soft light gradation across sand forms"
      - "heat haze or dry atmosphere when appropriate"
    negative:
      - "random lumpy sand"
      - "no wind direction logic"

mountain_scale_logic:
  positive_language:
    - "foreground rocks or trail for scale"
    - "layered ridgelines receding into atmospheric haze"
    - "peak silhouette clearly separated from sky"
    - "valley depth readable through overlap and tone separation"
    - "terrain planes feel traversable or geologically coherent"
  negative_language:
    - "flat backdrop mountains"
    - "unclear ground plane"
    - "identical repeated ridges"
    - "toy-like scale"

high_altitude_atmosphere:
  positive_language:
    - "thin high-altitude air"
    - "cold clarity in near forms with distant atmospheric fade"
    - "cloud inversion below peaks when appropriate"
    - "strong sun exposure with crisp shadows"
  negative_language:
    - "humid lowland haze on extreme alpine summit unless weather justifies it"
    - "dense lush foliage at barren icy summit"

landform_readability_rules:
  suggestions:
    - "Use a readable horizon or ridge break."
    - "Separate foreground, midground, and distant mountains by value or color temperature."
    - "Define vegetation and snow distribution by altitude."
    - "Use trails, roads, huts, climbers, trees, or structures only when scale clarification is useful."

self_review_checklist:
  - "Is the dominant landform type explicit and visually coherent?"
  - "Are terrain layers readable from foreground to far distance?"
  - "Do rock, soil, vegetation, snow, and ice match the climate and altitude?"
  - "Is the scale of the terrain convincing?"
  - "Does atmospheric perspective help, rather than flatten, the scene?"

model_specific_rendering:
  chatgpt_image:
    guidance: >
      Use natural language for landform type, terrain layers, scale, climate,
      and atmospheric perspective.
  z_image_turbo:
    positive_template: >
      layered terrain, readable ridgelines, geological detail, mountain scale,
      atmospheric depth, coherent snowline and vegetation zones
    negative_template: >
      flat backdrop mountains, repeated ridges, toy scale, unclear ground plane,
      random snow placement
  stable_diffusion:
    positive_template: >
      detailed mountains, layered ridges, canyon depth, geological strata,
      alpine atmosphere, atmospheric perspective
    negative_template: >
      flat mountains, bad scale, repeated ridges, plastic ice, unclear terrain

prompt_assembly_hooks:
  phase_1_intent_analysis:
    add_fields:
      - mountains_terrains
    action: "Detect landform type, scale, climate/elevation, and terrain-layer needs."
  phase_2_cinematic_enrichment:
    action: "Translate terrain intent into geology, vegetation, snow/ice, and atmospheric perspective."
  phase_3_scene_blueprint:
    action: "Coordinate terrain layers with atmosphere, water systems, and subject placement."
  phase_4_self_review:
    checks:
      - "Check terrain-layer readability."
      - "Check climate/elevation coherence."
      - "Check mountain or landform scale logic."
  phase_4_5_cleanup:
    action: "Preserve terrain-layer, geology, and scale cues."
  phase_4_6_renderer_selection:
    action: "Render mountains and landforms in model-appropriate language."
  phase_5_final_prompt:
    action: "Include concise but strong terrain-scale and landform cues when relevant."
