# ============================================================
# background-architecture-readability.yaml
# Background building clarity, urban depth-of-field, and facade readability controller
# Version: 1.0.0
# Purpose:
#   Prevent important background architecture from becoming mushy, smeared,
#   over-blurred, or unreadable in portraits, commercial visuals, city scenes,
#   automotive shots, mecha destruction scenes, and architectural images.
# ============================================================

schema_version: "1.0.0"
name: "background-architecture-readability"
description: >
  A prompt-enhancement module for controlling architectural background clarity,
  facade geometry, depth-of-field strength, urban detail hierarchy, and building
  readability when architecture is part of the image value.

core_principle: >
  Background architecture is not always disposable bokeh. In city, automotive,
  commercial, mecha, architectural, and website-hero visuals, buildings often serve
  as scale, brand atmosphere, visual depth, or design information. The prompt should
  decide whether architecture should be blurred, moderately readable, or sharp.

global_rules:
  - "Do not automatically apply shallow depth of field when background architecture is important."
  - "Define background clarity intent: soft bokeh, readable architecture, or sharp architectural detail."
  - "If buildings matter, preserve facade geometry, window grid, vertical lines, perspective, and material rhythm."
  - "Use moderate depth of field when the subject is primary but buildings should remain legible."
  - "Avoid excessive bokeh hiding the urban context unless portrait isolation is the actual goal."
  - "For architectural and technical visuals, use corrected or coherent verticals where appropriate."
  - "For mecha/city/action visuals, buildings are scale anchors and should remain structurally readable."

background_architecture_schema:
  architecture_importance: "decorative | contextual | readable | primary"
  depth_of_field_policy: "shallow_bokeh | moderate_readable_background | deep_focus | architecture_priority"
  facade_readability_priority: "low | medium | high | critical"
  building_detail_targets: []
  perspective_policy: "natural | corrected_verticals | cinematic_wide | compressed_telephoto | custom"
  blur_limit: "heavy | medium | light | none"
  protected_background_features: []
  anti_blur_terms: []
  workflow_notes: []

activation_contexts:
  high_priority:
    - "city background"
    - "urban street"
    - "architecture"
    - "building exterior"
    - "office tower"
    - "modern city"
    - "automotive magazine cover"
    - "product ad with city background"
    - "mecha in city"
    - "destruction scene"
    - "real estate / architecture visualization"
    - "website hero background"
  lower_priority:
    - "beauty close-up"
    - "dreamy portrait"
    - "soft bokeh portrait"
    - "macro face shot"

clarity_profiles:
  portrait_bokeh:
    when_to_use:
      - "subject isolation is more important than background information"
      - "beauty close-up or dreamy editorial"
    positive:
      - "soft background bokeh"
      - "background architecture reduced to atmospheric shapes"
    avoid:
      - "sharp busy background competing with the face"

  readable_urban_context:
    when_to_use:
      - "person/vehicle/product is primary but city background matters"
      - "fashion street scene"
      - "commercial urban visual"
    positive:
      - "controlled depth of field without excessive background blur"
      - "background architecture remains readable"
      - "visible window grid and facade rhythm"
      - "urban background details remain legible but secondary"
    negative:
      - "overly blurred background"
      - "mushy architecture"
      - "unreadable city background"

  architecture_priority:
    when_to_use:
      - "architecture itself is central"
      - "building exterior, interior, lobby, corridor, cityscape, or real-estate visual"
    positive:
      - "sharp architectural lines"
      - "clear facade geometry"
      - "visible material joints and window grid"
      - "clean verticals and coherent perspective"
      - "deep focus architectural clarity"
    negative:
      - "smeared windows"
      - "warped facade lines"
      - "background melted into haze"
      - "excessive bokeh hiding architecture"

facade_detail_targets:
  - "window grid"
  - "vertical mullions"
  - "floor divisions"
  - "balcony lines"
  - "stone or concrete panel joints"
  - "glass reflections"
  - "entrance canopy"
  - "street-level storefronts"
  - "roofline"
  - "podium-to-tower relationship"

prompt_enrichment_language:
  readable_background_positive:
    - "background architecture remains readable"
    - "clear building facade geometry"
    - "visible window grid and structural lines"
    - "controlled depth of field without excessive background blur"
    - "foreground subject remains primary while background buildings stay legible"
    - "architectural lines remain clean and coherent"
    - "urban background retains enough detail for scale and atmosphere"
  architecture_priority_positive:
    - "deep focus architectural clarity"
    - "sharp facade lines"
    - "corrected verticals where appropriate"
    - "clean window-grid rhythm"
    - "well-defined material joints and facade edges"
  negative:
    - "overly blurred background"
    - "mushy architecture"
    - "low-detail buildings"
    - "smeared windows"
    - "warped facade lines"
    - "unreadable city background"
    - "background melted into haze"
    - "excessive bokeh hiding architecture"

depth_of_field_decision_rules:
  - "If prompt includes close-up beauty portrait and no architectural relevance, allow shallow depth of field."
  - "If prompt includes city, street, car, product ad, magazine cover, mecha, or building-specific context, prefer moderate readable background."
  - "If prompt requests architecture visualization, use deep focus or architecture-priority clarity."
  - "If user explicitly requests bokeh, keep bokeh but preserve important scale anchors when needed."

workflow_advice:
  background_architecture_blur_problem:
    not_first_choice:
      - "generic detailer LoRA"
    better_first_steps:
      - "remove or weaken shallow depth-of-field language"
      - "add background architecture readability prompt"
      - "use higher base resolution"
      - "lower Turbo refine denoise to 0.18-0.24 when background matters"
      - "upscale + low denoise refine"
      - "use architecture detail LoRA only after composition and DOF are correct"

self_review_checklist:
  - "Is the background architecture decorative, contextual, readable, or primary?"
  - "Does the DOF policy match the visual goal?"
  - "Are facade geometry, window grids, and perspective readable when needed?"
  - "Is background detail competing too much with the subject?"
  - "Is the architecture accidentally blurred by generic portrait bokeh language?"

model_specific_rendering:
  chatgpt_image:
    guidance: >
      Use explicit depth-of-field and architecture-readability language. Avoid default
      portrait bokeh when the background buildings carry context, scale, or commercial value.
  z_image_turbo:
    positive_template: >
      readable urban background, clear facade geometry, visible window grid,
      controlled depth of field, architecture remains legible
    negative_template: >
      mushy architecture, smeared windows, overly blurred background,
      warped facade lines, excessive bokeh
  stable_diffusion:
    positive_template: >
      readable background buildings, sharp facade lines, clear window grid,
      moderate depth of field, urban detail
    negative_template: >
      blurred buildings, low detail background, smeared architecture, bokeh hiding city

prompt_assembly_hooks:
  phase_1_intent_analysis:
    add_fields:
      - background_architecture_schema
    action: "Detect whether architecture is decorative, contextual, readable, or primary."
  phase_2_cinematic_enrichment:
    action: "Set DOF policy and facade-readability targets."
  phase_3_scene_blueprint:
    action: "Coordinate background architecture with camera, composition, depth layering, and rendering technicals."
  phase_4_self_review:
    checks:
      - "Check if building detail is accidentally over-blurred."
      - "Check facade geometry and window-grid readability."
      - "Check DOF-policy consistency."
  phase_4_5_cleanup:
    action: "Do not remove architecture-readability constraints when background buildings matter."
  phase_4_6_renderer_selection:
    action: "Render architecture-readability and anti-blur terms in model-appropriate language."
  phase_5_final_prompt:
    action: "Include concise DOF and background-architecture readability instructions when relevant."
