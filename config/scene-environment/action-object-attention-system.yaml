schema_version: "1.0.0"
name: "action-object-attention-system"
description: >
  Action-object attention controller for scenes where a person watches, uses,
  aims at, touches, carries, reads, repairs, plays, or reacts to an object such
  as a TV, monitor, phone, sign, weapon, vehicle, instrument, product, or screen.

core_principle: >
  If an action depends on an object, the gaze, hands, body orientation, object
  placement, light response, and narrative attention should point to the same
  target. The object should not become a decorative afterthought.

attention_schema:
  action_target: ""
  gaze_target: ""
  hand_contact: ""
  body_orientation: ""
  object_screen_or_surface_content: ""
  object_light_or_reflection: ""
  interaction_cause: ""
  reaction_expression: ""
  occlusion_order: ""
  forbidden_attention_drift: []

target_types:
  screen_or_tv:
    positive:
      - "eyes aimed at the screen plane"
      - "screen glow subtly affects face and hands"
      - "body angle acknowledges the TV or monitor position"
      - "screen content remains readable only if exact text/content is requested"
    avoid:
      - "character looking away from the screen"
      - "screen ignored by lighting"
      - "random unreadable text"
  handheld_object:
    positive:
      - "fingers wrap around the object with visible contact"
      - "wrist angle and gaze support the intended action"
      - "object scale matches the hand"
    avoid:
      - "floating object"
      - "impossible grip"
      - "wrong hand-object occlusion"
  weapon_or_tool:
    positive:
      - "grip, stance, gaze, and target direction align"
      - "tool contact points are readable"
      - "pose supports the tool's weight and use"
    avoid:
      - "weapon points one way while gaze points elsewhere"
      - "unsupported prop weight"
  product_or_brand:
    positive:
      - "product receives visual hierarchy and safe negative space"
      - "hand contact does not cover critical label areas unless requested"
      - "gaze or gesture directs attention to product"
    avoid:
      - "product hidden by hand"
      - "random label text"
      - "subject competes with product hierarchy"

failure_taxonomy:
  action_target_ignored:
    symptoms:
      - "subject does not look at or orient toward the stated object"
      - "object is present but not interacted with"
    positive_fix:
      - "align gaze, torso, hands, and light cues with the action target"
    negative_fix:
      - "ignored action target"
      - "looking away from target"
  impossible_object_contact:
    symptoms:
      - "hand floats near object"
      - "fingers do not wrap or press naturally"
    positive_fix:
      - "define grip, pressure, contact shadow, and occlusion order"
    negative_fix:
      - "floating object"
      - "impossible grip"

prompt_assembly_hooks:
  phase_1_intent_analysis:
    action: "Detect object-dependent actions, screen viewing, product handling, tool use, and target-focused reactions."
  phase_2_cinematic_enrichment:
    action: "Align gaze, hands, body orientation, object placement, object light, and narrative attention."
  phase_4_self_review:
    checks:
      - "Does the subject look at or orient toward the intended target?"
      - "Are hand-object contact and occlusion physically plausible?"
      - "Does lighting acknowledge screen or reflective objects?"
  phase_4_6_renderer_selection:
    action: "Render action-object attention as concrete gaze/contact/object-light cues."
