# ============================================================
# location-semantics-lock.yaml
# Exterior/interior spatial semantics, "in front of" lock, and venue-placement controller
# Version: 1.0.0
# Purpose:
#   Prevent prompt drift between exterior facade, interior hall, courtyard,
#   plaza, stage-front, building-front, and inside-building interpretations.
# ============================================================

schema_version: "1.0.0"
name: "location-semantics-lock"
description: >
  A spatial-semantics module for prompt enhancement. It disambiguates phrases such
  as "in front of a cathedral", "outside a building", "inside a church", "on a plaza",
  "at the entrance", and "stage set in front of architecture". It prevents exterior
  facade prompts from drifting into interior halls or nave-like scenes.

core_principle: >
  Location phrases must be spatially explicit. If the user says a subject is in front
  of a building, the prompt should preserve exterior placement, facade/backdrop logic,
  ground-plane context, and not accidentally convert the scene into an interior space.

global_rules:
  - "Classify building relation before enriching architecture."
  - "If the user says 'in front of' a building, prefer exterior facade / plaza / courtyard / street-front placement."
  - "Do not use interior-specific architectural terms unless the user requests interior."
  - "For cathedral-front prompts, use facade, exterior stonework, plaza, entrance, front steps, exterior arches, and outdoor stage."
  - "Avoid nave, aisle, interior columns, indoor vaulted ceiling, or sanctuary unless explicitly requested."
  - "If the performance is in front of architecture, define whether the stage is exterior, temporary outdoor, courtyard, or interior."

location_semantics_schema:
  spatial_relation: "in_front_of | outside | inside | entrance | courtyard | plaza | street_front | interior_hall | rooftop | custom"
  building_role: "backdrop | venue | interior_space | exterior_landmark | environmental_context | primary_subject"
  exterior_interior_lock: "exterior | interior | ambiguous | mixed"
  ground_plane_context: []
  facade_visibility: "none | partial | readable | dominant"
  prohibited_location_drift: []
  perspective_notes: []
  semantic_lock_strength: "low | medium | high | critical"

spatial_relation_profiles:
  in_front_of_building:
    positive_language:
      - "outdoor setting in front of the building facade"
      - "exterior plaza or street-level stage"
      - "the building exterior serves as a backdrop"
      - "front facade visible behind the subject"
      - "subject remains outside the building"
    negative_language:
      - "inside the building"
      - "interior hall"
      - "nave"
      - "indoor cathedral stage"
      - "interior vaulted ceiling"

  exterior_cathedral_front:
    positive_language:
      - "outdoor concert stage set up in front of a grand Gothic cathedral facade"
      - "exterior cathedral plaza setting"
      - "cathedral exterior stone facade behind the stage"
      - "visible pointed arches, rose window, entrance portal, and exterior towers"
      - "not inside the cathedral"
    negative_language:
      - "cathedral interior"
      - "inside the church nave"
      - "indoor church stage"
      - "sanctuary performance"
      - "interior pews"
      - "indoor vaulted nave"

  interior_cathedral:
    positive_language:
      - "inside the cathedral nave"
      - "interior vaulted ceiling"
      - "stone columns and stained-glass windows within the church"
    negative_language:
      - "outdoor plaza"
      - "exterior facade backdrop"
    use_only_when: "User explicitly asks for interior cathedral or inside church."

  building_entrance:
    positive_language:
      - "at the exterior entrance"
      - "front steps"
      - "doorway and facade remain visible"
      - "threshold between exterior plaza and building entrance"
    negative_language:
      - "deep interior hall unless requested"

location_drift_failures:
  exterior_to_interior_drift:
    symptoms:
      - "prompt says in front of cathedral but image becomes inside cathedral"
      - "facade becomes nave or interior hall"
      - "outdoor stage becomes indoor sanctuary stage"
    repair_prompt:
      - "explicitly state exterior plaza setting"
      - "use facade/backdrop terminology"
      - "add not inside the cathedral"
      - "negative: cathedral interior, inside church nave, indoor church stage"

  facade_lost:
    symptoms:
      - "building facade becomes vague or hidden"
      - "venue relation unclear"
    repair_prompt:
      - "define facade visibility and architectural features"
      - "state building is a backdrop behind the stage"

self_review_checklist:
  - "Is the subject outside or inside?"
  - "Does 'in front of' remain exterior?"
  - "Are prohibited interior terms avoided when exterior is intended?"
  - "Is the building role clear: backdrop, venue, environment, or main subject?"
  - "Does the ground plane support the intended location?"

model_specific_rendering:
  chatgpt_image:
    guidance: >
      Use explicit spatial language such as exterior plaza, in front of the facade,
      outdoor stage, not inside the building, and specify prohibited interior drift.
  z_image_turbo:
    positive_template: >
      outdoor stage in front of facade, exterior plaza, building exterior backdrop,
      not inside, clear ground plane
    negative_template: >
      interior, inside building, indoor nave, interior hall, wrong location
  stable_diffusion:
    positive_template: >
      exterior facade, outdoor plaza, in front of building, outside stage,
      visible front facade
    negative_template: >
      interior, nave, indoor church, inside cathedral, interior hall

prompt_assembly_hooks:
  phase_1_intent_analysis:
    add_fields:
      - location_semantics_schema
    action: "Detect spatial relation and exterior/interior lock."
  phase_2_cinematic_enrichment:
    action: "Translate place relation into exterior/interior-safe spatial language."
  phase_3_scene_blueprint:
    action: "Coordinate location lock with architecture readability, stage design, and composition."
  phase_4_self_review:
    checks:
      - "Check exterior/interior drift."
      - "Check building role and ground-plane consistency."
  phase_4_5_cleanup:
    action: "Do not remove explicit location locks such as 'not inside the cathedral'."
  phase_4_6_renderer_selection:
    action: "Render location lock in target-model language."
  phase_5_final_prompt:
    action: "Include concise location lock whenever spatial relation is important."
