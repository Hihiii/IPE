prop_usage_rules:
  - "Choose only a few props that strengthen scene identity."
  - "Anchor elements define the place; accents provide life and mood."
  - "Do not let props overpower the hero subject."
  - "Keep prop style consistent with the overall rendering language and task."
  - "For character-focused scenes, prefer 2-3 anchor elements and 1-2 accents only."
  - "For environmental hero shots, full anchor set plus relevant accents is expected."
  - "Avoid genre-clash props: do not put modern items in historical scenes unless fusion is intentional."
  - "Props are secondary details subject to P85 (visual richness / narrative depth). Every prop must be justified by scene context. See config/visual-cinematography/visual-richness-narrative-depth.yaml — secondary_detail_policy."
