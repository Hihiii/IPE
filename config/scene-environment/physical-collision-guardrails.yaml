# ------------------------------------------------------------
# 3. Spatial Relationship Schema
# ------------------------------------------------------------

spatial_relationship_schema:
  key_fields:
    camera_relation:
      - "distance to camera"
      - "foreground / midground / background role"
      - "left/right/up/down placement"
    subject_object_relation:
      - "touching"
      - "holding"
      - "leaning"
      - "resting"
      - "wearing"
      - "partially covering"
      - "passing behind"
      - "placed in front of"
    overlap_relation:
      - "A occludes 20% of B"
      - "A blocks the lower half of B"
      - "subject partially hides the rear wheel"
      - "front object covers only the corner of the product"
    support_relation:
      - "feet planted on floor"
      - "body weight supported by chair"
      - "hand presses lightly on tabletop"
      - "bag strap rests on shoulder"
      - "hips press into mattress"
      - "thigh and knee rest on bed"
      - "palm presses into bed sheet"
      - "forearm compresses sofa cushion"
      - "elbow supports upper-body weight"
      - "palms press down on pool coping"
      - "fingers curl over the pool edge"
      - "pool ledge supports upper-body weight"
      - "bath towel wraps around torso under the arms"
      - "towel top edge catches under one armpit or against the upper chest"
      - "wet towel weight pulls the loose side downward"
      - "hand lightly holds the towel fold if retention is intended"
    light_interaction:
      - "light from camera-left 45 degrees"
      - "contact shadow under the object"
      - "specular highlight on glossy surfaces"
      - "soft bounce light from surrounding surfaces"

# ------------------------------------------------------------
# 4. Collision / Contact Failure Taxonomy
# ------------------------------------------------------------

collision_failure_taxonomy:
  body_object_intersection:
    symptoms:
      - "body clips through furniture, wall, vehicle, or prop"
      - "arm passes through object"
      - "subject merges into support surface"
    positive_fix:
      - "physically plausible contact points"
      - "body touches the object without intersecting it"
      - "clear separation between body and object geometry"
    negative_fix:
      - "body clipping through objects"
      - "merged geometry"
      - "impossible body-object intersection"

  body_body_intersection:
    symptoms:
      - "subjects merge into each other"
      - "limbs pass through another person"
      - "crowded pose loses clear body separation"
    positive_fix:
      - "clear subject separation"
      - "physically plausible body-to-body spacing"
      - "readable overlap and occlusion order"
    negative_fix:
      - "intersecting bodies"
      - "merged limbs"
      - "unreadable subject overlap"

  prop_hand_intersection:
    symptoms:
      - "fingers clip through object"
      - "weapon or product not actually held"
      - "grip is visually impossible"
    positive_fix:
      - "hand grips the object naturally"
      - "fingers wrap around the prop without clipping"
      - "contact points between hand and object are clear"
    negative_fix:
      - "fingers clipping into object"
      - "floating prop"
      - "impossible hand grip"

  foot_ground_contact_failure:
    symptoms:
      - "feet float above the floor"
      - "ground contact absent or unclear"
      - "stance unsupported"
    positive_fix:
      - "feet firmly contact the ground"
      - "clear contact shadow beneath feet"
      - "support foot aligned with body balance"
    negative_fix:
      - "floating feet"
      - "no ground contact"
      - "unsupported stance"

  seated_support_failure:
    symptoms:
      - "subject appears to hover above chair or bed"
      - "hips do not contact seat surface"
      - "weight distribution on support surface is unclear"
    positive_fix:
      - "body weight naturally supported by the seat"
      - "hips and thighs contact the support surface believably"
      - "compression and posture match the seated pose"
    negative_fix:
      - "floating seated pose"
      - "hovering above chair"
      - "no seat contact"

  soft_surface_weight_failure:
    symptoms:
      - "body appears to lie on a bed or sofa without weight"
      - "hips, thighs, knees, hands, or elbows do not compress the soft surface"
      - "legs look pasted on top of bedding or float above the bed"
      - "foreground lower leg appears stretched because the support plane is unclear"
    positive_fix:
      - "hips and thighs sink subtly into the mattress"
      - "bed sheet wrinkles and compresses under hips, thighs, knees, palms, or elbows"
      - "soft contact shadow follows the body-surface contact points"
      - "legs rest naturally against the bed surface"
    negative_fix:
      - "floating legs on bed"
      - "body hovering above mattress"
      - "no fabric compression"
      - "unsupported soft-surface contact"

  arm_support_load_path_failure:
    symptoms:
      - "hands are posed on the bed but do not appear to carry body weight"
      - "upper body is lifted without believable arm support"
      - "wrists, elbows, shoulders, and torso do not align as a support chain"
      - "palms or elbows touch the bed without pressure or contact shadow"
    positive_fix:
      - "hands planted beneath the shoulders, palms pressing into the bed"
      - "elbows or wrists aligned with shoulders to support upper-body weight"
      - "subtle compression and contact shadow under palms or elbows"
      - "upper-body weight visibly transfers through the arms into the surface"
    negative_fix:
      - "hands posed as support without carrying weight"
      - "unsupported upper body"
      - "floating palms"
      - "broken wrist support"

  pool_edge_support_semantic_drift:
    symptoms:
      - "hands on pool edge becomes arms raised overhead"
      - "subject appears to lift or hold an overhead ledge instead of pushing down on the pool edge"
      - "pool coping is placed above the head like a bar or ceiling edge"
      - "upper body does not show weight transfer through palms into the pool edge"
    positive_fix:
      - "both palms press down on the pool coping at waterline or chest height"
      - "fingers curl naturally over the near edge of the pool ledge"
      - "elbows bend downward and shoulders load into the hands"
      - "upper body rises out of the water because the pool edge supports the body weight"
      - "pool edge stays beside or in front of the subject, not above the head"
    negative_fix:
      - "arms raised overhead"
      - "holding an overhead ledge"
      - "lifting the pool edge"
      - "hands gripping underside of tile"
      - "pool edge above head"
      - "overhead bar pose"

  clothing_body_clipping:
    symptoms:
      - "fabric cuts into body unnaturally"
      - "straps sink into skin geometry"
      - "garment intersects with limbs"
    positive_fix:
      - "clothing follows the body naturally"
      - "fabric sits on the body without clipping"
      - "straps and accessories rest believably on the body"
    negative_fix:
      - "clothing clipping into skin"
      - "intersecting garment geometry"
      - "merged clothing and body"

  wrong_occlusion_order:
    symptoms:
      - "front and back elements are visually reversed"
      - "overlap lacks clarity"
      - "object hidden by the wrong element"
    positive_fix:
      - "clear front-to-back layering"
      - "correct occlusion order"
      - "readable overlap hierarchy"
    negative_fix:
      - "wrong occlusion order"
      - "confused front/back layering"
      - "unreadable overlap"

  flat_material_interaction:
    symptoms:
      - "materials look like cheap plastic"
      - "surfaces ignore hardness, gloss, or texture"
      - "light does not react correctly on material"
    positive_fix:
      - "material-specific highlights and reflections"
      - "surface texture reads clearly"
      - "hardness, gloss, and roughness feel physically coherent"
      - "contact shadows and reflected light reinforce depth"
    negative_fix:
      - "flat material response"
      - "cheap plastic look"
      - "incorrect specular behavior"

  source_less_water_splash:
    symptoms:
      - "water splash appears as a particle overlay with no visible hand, foot, or object causing it"
      - "splash direction does not match any subject's motion"
      - "droplets float evenly across the frame without gravity, arc, or depth"
      - "water spray hides hands and creates fused fingers instead of partial occlusion"
    positive_fix:
      - "define the splash source subject and the exact hand or foot action"
      - "place the splash origin at the palm, foot, or water surface contact point"
      - "show a directional water arc, larger droplets near the source, fine mist farther away, and falling droplets under gravity"
      - "keep hands readable with correct partial water occlusion"
    negative_fix:
      - "source-less splash"
      - "floating water overlay"
      - "uniform particle spray"
      - "hands hidden by random splash"
      - "fused fingers behind water"

  inconsistent_pool_depth_support:
    symptoms:
      - "subjects in the same pool stand at incompatible water depths"
      - "feet or ankles appear to float because the pool floor or ledge plane is unclear"
      - "waterline cuts across legs inconsistently from left to right"
      - "foam, ripples, and leg occlusion do not match the support plane"
    positive_fix:
      - "define a shared shallow-water plane for the whole group"
      - "feet contact the pool floor or shallow ledge with contact foam and ripples"
      - "waterline wraps ankles or calves consistently according to camera perspective"
      - "leg occlusion, refraction, and caustics match the same water depth"
    negative_fix:
      - "floating feet"
      - "inconsistent water depth"
      - "legs pasted onto water"
      - "missing foot contact"
      - "wrong waterline"

  towel_slip_reveal_physics_failure:
    symptoms:
      - "bath towel looks glued to the chest instead of wrapped around the torso"
      - "towel top edge cuts through or floats in front of the body"
      - "breast exposure appears as a cutout rather than a natural slip of fabric"
      - "both sides of the towel fall symmetrically while only one side should loosen"
      - "towel has no anchor point, hand support, friction point, or gravity direction"
    positive_fix:
      - "thick terry towel wraps around the torso with visible fabric thickness"
      - "one towel edge slips diagonally downward from the upper chest"
      - "opposite towel edge remains caught under the arm or lightly held by a hand"
      - "gravity pulls the damp towel into vertical folds"
      - "towel overlaps the body with clear front/back occlusion and soft contact shadows"
    negative_fix:
      - "floating towel"
      - "towel clipping through chest"
      - "painted-on towel"
      - "impossible cutout reveal"
      - "symmetrical towel fall"
      - "fabric glued to skin"

  adult_landmark_occlusion_error:
    symptoms:
      - "nipple, areola, or adult external anatomy appears on top of towel, fabric, shadow, or unrelated texture"
      - "visible anatomical landmark ignores the front/back order of skin, towel edge, hand, thigh, or fabric"
      - "landmark is visible through opaque towel without wet/sheer/transparent physical support"
      - "external anatomy appears outside the correct body region because occlusion or crop logic is confused"
    positive_fix:
      - "correct occlusion order between skin, towel edge, hands, thighs, and visible adult anatomy"
      - "landmarks remain on visible skin surfaces only"
      - "opaque towel edge covers hidden anatomy unless reveal is physically caused by lowered fabric"
      - "visible external anatomy follows pelvis orientation and is occluded naturally by pose and fabric"
    negative_fix:
      - "nipple on towel"
      - "floating areola"
      - "landmark through opaque towel"
      - "displaced external anatomy"
      - "wrong occlusion order"

soft_surface_support_mechanics:
  purpose: >
    APPLIED EXAMPLE of universal_physics.surface_types.soft_deformable +
    universal_physics.contact_types.reclining_load / hand_support_load.
    Strengthen bed, sofa, cushion, blanket, and mattress poses by making the support
    surface visibly carry body weight.
  universal_rules_applied:
    - "surface_types.soft_deformable: deformation + wrinkles + soft shadows"
    - "contact_types.reclining_load: weight distributed along body-surface contact"
    - "contact_types.hand_support_load: palms/elbows press into surface"
    - "gravity: no floating body parts — every contact point visible"
  support_points_to_define:
    - "pelvis / hip contact"
    - "outer thigh contact"
    - "knee contact"
    - "forearm or elbow contact"
    - "palm or wrist contact"
    - "foot or ankle contact if visible"
  visible_surface_effects:
    - "subtle mattress depression (soft_deformable behavior)"
    - "sheet wrinkles radiating from pressure points"
    - "fabric tension around hips, thighs, knees, palms, or elbows"
    - "soft contact shadows under body parts touching the bed"
    - "no visible air gap between body and support surface"
  prompt_positive:
    - "body weight visibly supported by the soft bed surface"
    - "hips and thighs subtly compress the mattress"
    - "sheet wrinkles and contact shadows under hips, knees, palms, and elbows"
    - "hands or elbows press into the bedding and support the torso"
  prompt_negative:
    - "floating body above bed"
    - "no mattress compression"
    - "missing contact shadows"
    - "unsupported hand contact"
    - "legs hovering over bedding"

pool_edge_exit_support_mechanics:
  purpose: >
    APPLIED EXAMPLE of universal_physics.surface_boundary_disambiguation +
    universal_physics.contact_types.hand_support_load.
    Preserve the meaning of "hands supporting on the pool edge while emerging from water."
    This is a downward support action on a SOLID surface (pool coping) at the boundary
    with a LIQUID surface (water). The solid supports weight; the liquid does not.
  universal_rules_applied:
    - "surface_boundary_disambiguation: SOLID pool coping vs LIQUID water — coping supports weight, water does not"
    - "contact_types.hand_support_load: palms press down, arms carry torso weight"
    - "gravity: downward load path from shoulders through arms to palms"
  activate_when:
    - "hands on pool edge"
    - "supporting on pool edge"
    - "climbing out of pool"
    - "emerging from pool"
    - "out of water"
    - "poolside ledge"
    - "pool coping"
  required_contact_logic:
    - "pool edge sits at waterline, chest height, or shoulder-adjacent height, not above the head"
    - "palms press downward on the top surface of the pool coping"
    - "fingers curl over the near edge for grip"
    - "wrists, elbows, shoulders, and torso form a downward support load path"
    - "upper body weight visibly transfers through the arms into the pool ledge"
    - "waterline and wet arms support the action of rising from the pool"
  prompt_positive:
    - "both palms planted on the pool coping at the waterline"
    - "fingers curled over the near pool edge"
    - "elbows bent downward, shoulders pressing into the hands"
    - "upper body rising out of the water, weight supported by the pool ledge"
    - "pool edge beside or in front of the subject, not above the head"
  prompt_negative:
    - "arms raised overhead"
    - "hands holding an overhead ledge"
    - "lifting the pool edge"
    - "gripping underside of tiles"
    - "hanging from pool edge"
    - "pool edge above head"

pool_edge_seated_support_mechanics:
  purpose: >
    APPLIED EXAMPLE of universal_physics.surface_boundary_disambiguation +
    universal_physics.contact_types.sitting_load + universal_physics.surface_types.solid_rigid.
    Preserve the correct physical meaning of "sitting on the pool edge" (坐在泳池邊).
    The pool coping/edge is a SOLID RIGID horizontal surface supporting the person's weight
    from below. The LIQUID water surface is below and in front — it does NOT support weight.
  universal_rules_applied:
    - "surface_boundary_disambiguation.example_pool_edge: SOLID coping vs LIQUID water"
    - "contact_types.sitting_load: buttocks/hips on horizontal solid surface"
    - "surface_types.solid_rigid: no deformation, sharp contact shadow"
    - "surface_types.liquid: water below sitting level, waterline at calves/ankles"
    - "gravity: center of gravity above coping, not above water"
  activate_when:
    - "sitting on pool edge"
    - "sitting by the pool"
    - "poolside sitting"
    - "dangling feet in pool"
    - "坐在泳池邊"
    - "池邊坐姿"
    - "pool edge seated"
    - "sitting on pool coping"
    - "legs in water sitting on edge"
  required_contact_logic:
    - "buttocks or hips contact the flat top surface of the pool coping — this is the primary weight-bearing contact"
    - "pool edge is a SOLID horizontal surface at or slightly above the waterline"
    - "water surface is BELOW the sitting surface — the person does NOT sit on the water"
    - "feet may dangle into the water, touch the pool deck, or rest against the pool wall"
    - "if feet are in the water: the waterline wraps around calves or ankles, not the hips or buttocks"
    - "the person's center of gravity is above the pool coping, not above the water"
    - "legs extend downward from the hips toward the water or deck — they do not float horizontally"
  prompt_positive:
    - "seated on the pool coping, buttocks firmly on the flat ledge surface"
    - "pool edge supports body weight from below as a solid sitting surface"
    - "feet dangling into the water, waterline at calf or ankle height"
    - "hands resting on thighs or beside hips on the pool coping"
    - "pool edge clearly separate from the water surface"
  prompt_negative:
    - "sitting on water surface"
    - "floating above water while seated"
    - "buttocks on water instead of solid ledge"
    - "feet floating without waterline contact"
    - "pool edge merged with water surface"
    - "hips submerged while upper body is dry"
    - "suspended sitting without visible support surface"

bath_towel_slip_support_mechanics:
  purpose: >
    APPLIED EXAMPLE of universal_physics.contact_types.grasping_load +
    universal_physics.occlusion_order + universal_physics.gravity.
    Preserve believable after-bath towel slip physics.
  universal_rules_applied:
    - "contact_types.grasping_load: towel anchored under arm or held by hand"
    - "occlusion_order: towel edge occludes skin at the wrap boundary; exposed skin is in front of/above the towel edge"
    - "gravity: loose side slips downward, heavy damp folds pulled by gravity"
    - "surface_types.soft_deformable: fabric weight, thickness, dampness change the drape behavior"
  activate_when:
    - "after bath"
    - "post-shower"
    - "bath towel"
    - "towel wrapped around body"
    - "towel slipping"
    - "towel sliding down"
    - "浴巾滑落"
    - "出浴"
  required_contact_logic:
    - "towel wraps around the torso as a continuous layer, with visible thickness at the top edge"
    - "one side loosens and slips diagonally downward under gravity"
    - "the other side remains anchored under the arm, tucked at the bust line, or lightly held by a hand"
    - "the top edge follows the chest volume without cutting through skin"
    - "fabric folds hang vertically or diagonally from the slipping edge"
    - "soft contact shadows show where towel touches wet skin"
    - "after-bath towel is at least slightly damp, with heavier folds and darker wet contact zones"
    - "wet hair, droplets, skin sheen, and humid bathroom air support the just-bathed context"
  reveal_logic:
    - "partial exposure happens because the top edge has slipped below the intended coverage area"
    - "the reveal boundary is the towel edge, not a transparent or cutout effect"
    - "exposed skin remains physically in front of or above the towel edge with correct occlusion"
    - "wet skin, droplets, and steam may be present, but they should not hide collision errors"
  prompt_positive:
    - "thick white terry bath towel wrapped around torso"
    - "slightly damp towel touching wet skin"
    - "one towel edge slipping diagonally downward from the upper chest"
    - "opposite edge caught under the arm or lightly held, believable anchor point"
    - "heavy damp towel folds pulled by gravity"
    - "darker wet contact zones in the absorbent terry texture"
    - "soft contact shadows where towel overlaps wet skin"
    - "natural partial reveal caused by the lowered towel edge"
  prompt_negative:
    - "floating towel"
    - "towel clipping through chest"
    - "painted-on towel"
    - "impossible cutout reveal"
    - "fabric glued to skin"
    - "symmetrical towel fall"
    - "transparent towel unless requested"
    - "completely dry towel in a steamy post-shower scene"

# ------------------------------------------------------------
# 5. Contact Logic Rules
# ------------------------------------------------------------

contact_logic_rules:
  leaning_pose:
    requirements:
      - "the body visibly contacts the support object"
      - "the leaning angle matches the contact point"
      - "contact shadow or pressure cue reinforces the touch"
    prompt_positive:
      - "the subject leans naturally against the surface"
      - "clear body-to-surface contact"
      - "physically plausible leaning posture"

  seated_pose:
    requirements:
      - "hips and thighs contact the seat"
      - "spine and legs align with the seated support"
      - "body weight reads as supported"
    prompt_positive:
      - "body weight naturally supported by the chair"
      - "clear seated contact with the surface"
      - "physically believable seated posture"

  pool_edge_exit_support:
    requirements:
      - "pool edge remains beside, in front of, or slightly below the shoulders, never above the head"
      - "palms press down on the top surface of the pool coping"
      - "fingers curl over the near edge without gripping the underside of tile"
      - "elbows bend downward and shoulders visibly carry body weight through the hands"
      - "upper body rises from the water because the ledge supports the torso"
    prompt_positive:
      - "both palms planted on the pool coping at the waterline"
      - "fingers naturally curled over the near edge"
      - "elbows bent downward, shoulders loaded into the hands"
      - "upper body rising out of the water with weight supported by the pool ledge"
    prompt_negative:
      - "arms raised overhead"
      - "holding an overhead ledge"
      - "lifting the pool edge"
      - "gripping underside of tiles"
      - "pool edge above head"

  bath_towel_slip:
    requirements:
      - "towel is a continuous thick wrap around the torso"
      - "one side slips diagonally downward while another point remains anchored"
      - "top edge follows body contour without intersecting the chest"
      - "fabric weight creates vertical folds and a clear gravity direction"
      - "occlusion order between towel edge, exposed skin, arms, and torso is readable"
      - "towel reads as slightly damp or wet at contact areas in after-bath scenes"
      - "visible anatomical landmarks remain on exposed skin and never on the towel surface"
    prompt_positive:
      - "thick terry bath towel wrapped around torso"
      - "slightly damp towel against wet skin"
      - "one towel edge slipping diagonally downward"
      - "opposite edge caught under the arm or lightly held"
      - "heavy damp towel folds pulled by gravity"
      - "darker wet contact zones in the towel"
      - "soft contact shadows at towel-skin overlap"
      - "correct occlusion between towel edge and exposed skin"
    prompt_negative:
      - "floating towel"
      - "towel clipping through chest"
      - "painted-on towel"
      - "impossible cutout reveal"
      - "fabric glued to skin"
      - "dry towel in a just-showered scene"
      - "nipple on towel"
      - "floating areola"

  hand_prop_interaction:
    requirements:
      - "fingers wrap the object plausibly"
      - "the object sits in the hand without floating"
      - "the hand-object contact area is readable"
    prompt_positive:
      - "hand grips the object naturally"
      - "clear hand-to-object contact"
      - "fingers do not clip through the prop"

  layered_overlap_scene:
    requirements:
      - "foreground/midground/background hierarchy is readable"
      - "overlap amount is controlled"
      - "occlusion order is clear"
    prompt_positive:
      - "clear front-to-back layering"
      - "A partially occludes B"
      - "readable overlap hierarchy"

  group_contact_scene:
    requirements:
      - "subjects remain individually readable"
      - "limbs do not intersect"
      - "body spacing remains plausible"
    prompt_positive:
      - "physically plausible spacing between subjects"
      - "clear subject separation"
      - "readable contact and overlap"

  group_pool_water_splash:
    requirements:
      - "the water splash has a visible source subject and contact point"
      - "the direction of the splash follows the palm, foot, or object motion"
      - "droplet size changes with distance and falls under gravity"
      - "hands remain readable where the splash partially overlaps them"
      - "all subjects share one believable pool depth and support plane"
      - "feet, ankles, foam, ripples, and waterline match the same shallow-water geometry"
      - "wet swimwear and skin highlights match the pool-play action"
    prompt_positive:
      - "central splash caused by a visible hand scooping water upward"
      - "splash origin at the palms with a clear upward arc and falling droplets"
      - "larger droplets near the hands, fine mist higher up, gravity pulling spray downward"
      - "readable hands and fingers around the water spray"
      - "all feet planted on the same shallow pool floor or ledge"
      - "consistent ankle-level waterline, ripples, foam, and leg occlusion"
      - "wet swimwear cling, sunlit water highlights, and droplets on skin"
    prompt_negative:
      - "source-less splash"
      - "floating water overlay"
      - "uniform particle spray"
      - "hands hidden by random splash"
      - "fused fingers behind splash"
      - "floating feet"
      - "inconsistent water depth"
      - "dry swimwear in pool"

  product_surface_scene:
    requirements:
      - "product sits firmly on the support surface"
      - "contact shadow grounds the product"
      - "surface reflection and shadow match material"
    prompt_positive:
      - "product rests firmly on the surface"
      - "subtle contact shadow anchors the object"
      - "material response matches the product finish"

# ------------------------------------------------------------
# 6. Occlusion / Layering Translation
# ------------------------------------------------------------

generator_visible_collision_translation:
  general:
    positive:
      - "physically plausible contact points"
      - "clear separation between intersecting forms"
      - "correct occlusion order"
      - "readable front-to-back layering"
      - "contact shadows reinforce depth"
    compressed: "physically plausible contact, correct occlusion, readable layering, contact shadows"

  body_object:
    positive:
      - "body touches the object without intersecting it"
      - "clear body-object contact"
      - "support surface contact is visible"
    compressed: "clear body-object contact without clipping"

  prop_grip:
    positive:
      - "hand grips the object naturally"
      - "fingers wrap around the prop without clipping"
      - "the prop is firmly held"
    compressed: "natural hand grip, no finger clipping, prop firmly held"

  overlap_specification:
    positive:
      - "A partially occludes B"
      - "the front object covers only part of the rear object"
      - "the overlap remains readable"
    compressed: "controlled partial occlusion with clear front/back order"

  material_response:
    positive:
      - "material-specific highlights and reflections"
      - "surface texture reads clearly"
      - "hardness, gloss, and roughness are believable"
      - "light interacts naturally with the material"
    compressed: "believable material response with clear texture, gloss, and contact shadows"

  group_pool_water_splash:
    positive:
      - "visible splash source and contact point"
      - "directional water arc with gravity-falling droplets"
      - "readable hands around partial water occlusion"
      - "consistent shallow-water support plane"
      - "feet planted with ripples and foam"
      - "wet swimwear and skin droplets match the action"
    compressed: "visible splash source, directional water arc, readable hands, consistent shallow-water foot support"

# ------------------------------------------------------------
# 7. Prompt Recipes
# ------------------------------------------------------------

prompt_recipes:
  human_object_contact:
    positive:
      - "physically plausible contact points"
      - "body touches the object without intersecting it"
      - "clear body-object separation"
      - "contact shadows reinforce the touch"
    negative:
      - "body clipping through object"
      - "merged geometry"
      - "floating contact"
      - "impossible intersection"

  seated_subject:
    positive:
