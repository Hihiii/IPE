# ============================================================
# physical-collision-guardrails.yaml
# Physical collision, contact logic, occlusion, and material interaction controller
# Version: 1.0.0
# Purpose:
#   Prevent physically implausible intersections, floating contact, bad occlusion,
#   and flat material interaction in images involving humans, objects, furniture,
#   vehicles, products, architecture, props, clothing, and multi-subject scenes.
# ============================================================

schema_version: "1.1.0"
name: "physical-collision-guardrails"
description: >
  A spatial-logic and contact-consistency module for prompt enhancement. It detects
  collision-risk situations, clarifies physical relationships between subjects and objects,
  improves occlusion order, support contact, material interaction, and light-surface behavior,
  and reduces clipping, intersection, floating, or merged geometry failures.

  LOAD POLICY: This is a 38KB file. Do NOT load for every seated or leaning pose.
  Only load when collision risk is genuinely significant — complex object interaction,
  multi-subject physical contact, tight overlap, or material-sensitive contact scenes.

# ------------------------------------------------------------
# 1. Core Principle
# ------------------------------------------------------------

core_principle: >
  Do not treat objects and subjects as isolated layers. Prompt the model with explicit
  spatial relationships, contact logic, occlusion hierarchy, support mechanics, and
  material-response cues so the scene reads as physically coherent rather than flat,
  clipped, or plastic-looking.

primary_goal: >
  Preserve physically believable scene structure, including body-object contact,
  body-body spacing, prop interaction, support surfaces, ground contact, overlapping order,
  and material/light interaction.

global_rules:
  - "Explicitly define who touches what, what supports what, and what occludes what."
  - "When objects overlap, specify the overlap amount and which object is in front."
  - "When a subject is seated, leaning, kneeling, holding, or touching, define the contact point."
  - "Prevent body/object intersections, floating gaps, and impossible contact."
  - "When material realism matters, describe hardness, softness, gloss, texture, and how light reacts on the surface."
  - "Use contact shadows and reflected light to reinforce physical presence and depth."
  - "Do not rely only on 'realistic' or 'physically accurate'; name the interaction directly."

# ------------------------------------------------------------
# 1a. Universal Support Surface Physics
# ------------------------------------------------------------
# These rules apply to ANY spatial interaction regardless of scenario.
# Scenario-specific sections (below) are APPLIED EXAMPLES that reference
# these universal rules — not replacements for them.
# ------------------------------------------------------------

universal_physics:
  gravity:
    direction: "always downward"
    rule: "Every body part must have a physically plausible load path to a support surface. No floating body parts."
    violations: ["floating body above surface", "suspended without support", "body part hanging in mid-air with no contact"]

  surface_types:
    solid_rigid:
      description: "Concrete, wood, metal, stone, tile, hard plastic, glass"
      behavior: "No deformation. Rigid support. Sharp contact shadows. Clear surface boundary."
      prompt_hints: ["firmly supported by the rigid surface", "clear contact shadow on hard surface"]
    soft_deformable:
      description: "Bed, sofa, cushion, mattress, pillow, blanket, towel"
      behavior: "Deforms under weight. Fabric wrinkles. Subtle compression. Soft contact shadows."
      prompt_hints: ["subtle compression under body weight", "fabric wrinkles radiating from contact points", "soft contact shadow"]
    liquid:
      description: "Water, pool, bathtub, lake, ocean"
      behavior: "NO rigid support. Buoyancy only. Cannot support sitting/standing weight. Waterline wraps around submerged parts."
      prompt_hints: ["water surface is BELOW the sitting surface", "waterline wraps around calves/ankles, not hips", "no rigid support from water"]
    suspension_hanging:
      description: "Rope, bar, trapeze, someone holding another person"
      behavior: "Load path through suspension point. Tension, grip, or hold must be visible."
      prompt_hints: ["weight hangs from the grip point", "tension visible in arms and shoulders"]

  contact_types:
    sitting_load:
      description: "Body weight bears DOWN on a horizontal surface via buttocks/hips"
      required_contact: "buttocks or hips contact the flat top surface of the support"
      surface_requirement: "Support must be a SOLID or SOFT surface — liquid cannot support sitting weight"
      load_path: "spine → pelvis → hips → support surface"
      prompt_positive: ["seated on the surface, body weight supported from below", "buttocks and thighs firmly contact the sitting surface"]
      prompt_negative: ["hovering above the seat", "no visible contact between body and surface", "sitting on liquid without solid support"]
    standing_load:
      description: "Body weight bears DOWN through legs to feet on a surface"
      required_contact: "feet contact the ground or support surface"
      load_path: "spine → hips → legs → feet → surface"
      prompt_positive: ["feet firmly planted on the surface", "clear ground contact with weight visible in stance"]
      prompt_negative: ["floating feet", "no ground contact", "feet hovering above surface"]
    leaning_load:
      description: "Body weight transfers at an angle onto a vertical or near-vertical surface"
      required_contact: "shoulder, back, side, or arm contacts the support surface"
      load_path: "body center of gravity → contact point → surface"
      prompt_positive: ["body leans naturally against the surface", "clear contact point between body and support"]
      prompt_negative: ["leaning without visible contact", "body floating near the surface without touching"]
    reclining_load:
      description: "Body weight distributed along a horizontal surface (lying, semi-reclined)"
      required_contact: "back, shoulders, hips, thighs contact the surface along their length"
      surface_requirement: "For soft surfaces: describe compression. For solid: describe contact points."
      prompt_positive: ["body weight visibly distributed along the surface", "hips and shoulders contact the surface"]
      prompt_negative: ["body hovering above reclining surface", "no contact between back and surface"]
    hand_support_load:
      description: "Upper-body weight transfers through arms to palms or elbows on a surface"
      required_contact: "palms or elbows press down on the surface"
      load_path: "shoulders → elbows → wrists → palms → surface"
      prompt_positive: ["palms press down on the surface, supporting upper-body weight", "elbows bear body weight with visible contact pressure"]
      prompt_negative: ["hands touching without carrying weight", "floating palms", "unsupported upper body"]
    grasping_load:
      description: "Fingers wrap around an object to hold or grip it"
      required_contact: "fingers wrap around the object surface"
      prompt_positive: ["fingers wrap naturally around the object", "secure grip without clipping"]
      prompt_negative: ["fingers clipping through object", "floating grip", "impossible hand position"]

  surface_boundary_disambiguation:
    purpose: >
      When two surface types meet at a boundary (e.g., solid pool coping + water),
      explicitly state which surface supports what. Models often merge adjacent
      surfaces or confuse which surface provides structural support.
    rules:
      - "When a SOLID surface and LIQUID surface meet: the solid surface provides structural support; the liquid surface does NOT."
      - "When a SOLID surface and SOFT surface meet: the solid provides rigid support; the soft deforms but does not replace the solid's structural role."
      - "When a person is AT the boundary of two surfaces: state explicitly which surface supports each body part."
      - "The support surface must be visible or clearly implied by body position and contact shadows."
      - "If multiple surfaces could plausibly support the subject, disambiguate in the positive prompt."
    example_pool_edge:
      scene: "person sitting on pool edge with feet in water"
      disambiguation:
        - "buttocks/hips are supported by the SOLID pool coping, NOT the water"
        - "feet are IN the water but the water does NOT support the person's weight"
        - "waterline is at calf/ankle height, not at hip height"
        - "pool edge is between the person and the water surface — the water is BELOW and IN FRONT of the sitting surface"
        - "contact shadow between buttocks and pool coping confirms solid-surface contact"

  occlusion_order:
    rule: "The front-most element occludes elements behind it. State the hierarchy explicitly."
    example: "A (foreground) partially occludes B (midground); B is fully in front of C (background)."
    prompt_positive: ["clear front-to-back occlusion order", "A partially covers B"]
    prompt_negative: ["wrong occlusion order", "reversed front/back", "merged layers without depth"]


