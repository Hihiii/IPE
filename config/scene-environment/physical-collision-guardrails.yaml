      - "hips and thighs contact the support surface"
      - "clear seated posture"
    negative:
      - "floating seated pose"
      - "hovering above chair"
      - "no seat contact"

  prop_in_hand:
    positive:
      - "hand grips the object naturally"
      - "fingers wrap around the prop without clipping"
      - "prop is firmly held"
    negative:
      - "fingers clipping into prop"
      - "floating prop"
      - "impossible grip"

  layered_scene:
    positive:
      - "clear front-to-back layering"
      - "A partially occludes B"
      - "readable overlap hierarchy"
    negative:
      - "wrong occlusion order"
      - "confused overlap"
      - "reversed depth layering"

  material_realism:
    positive:
      - "material-specific highlights and reflections"
      - "surface texture reads clearly"
      - "hardness and gloss feel believable"
      - "light interacts naturally with the material"
    negative:
      - "cheap plastic look"
      - "flat material response"
      - "incorrect reflections"

# ------------------------------------------------------------
# 8. Material / Light Interaction Guidance
# ------------------------------------------------------------

material_light_interaction_rules:
  hard_glossy_surfaces:
    examples:
      - "painted metal"
      - "car body"
      - "glass"
      - "glazed ceramic"
    require:
      - "clean specular highlights"
      - "clear reflected light"
      - "controlled sharp reflections"
      - "contact shadows at points of support"

  soft_matte_surfaces:
    examples:
      - "fabric"
      - "paper"
      - "skin"
      - "brushed suede"
    require:
      - "diffuse light response"
      - "soft edge shadow transitions"
      - "visible texture rather than plastic shine"

  structured_fashion_materials:
    examples:
      - "leather"
      - "denim"
      - "satin"
      - "latex-like glossy fabric"
    require:
      - "material-specific folds and sheen"
      - "the garment sits on the body believably"
      - "surface response matches the material's stiffness and gloss"

  spatial_light_rules:
    recommended_language:
      - "light from camera-left at 45 degrees"
      - "contact shadow beneath the object"
      - "subtle bounce light from surrounding surfaces"
      - "reflections match the object orientation"
      - "occluded areas receive less direct light"

# ------------------------------------------------------------
# 9. Self-Review Checklist
# ------------------------------------------------------------

collision_self_review_checklist:
  - "Does every touching subject/object pair have a believable contact point?"
  - "Do hands, fingers, limbs, props, furniture, and vehicles avoid clipping into each other?"
  - "Are feet grounded, or otherwise correctly supported by the scene?"
  - "If seated or leaning, does the body visibly rest on the support surface?"
  - "Is occlusion order clear and front/back layering correct?"
  - "If objects overlap, is the amount and direction of overlap readable?"
  - "Do clothing, straps, jewelry, and accessories sit on the body without intersection errors?"
  - "Do product, furniture, and environmental surfaces show believable contact shadows?"
  - "Do materials respond to light according to gloss, roughness, hardness, or softness?"
  - "Does the scene avoid the cheap plastic or flat compositing look?"

# ------------------------------------------------------------
# 10. Model-Specific Rendering
# ------------------------------------------------------------

model_specific_collision_rendering:
  chatgpt_image:
    positive_template: >
      Maintain physically plausible contact and spatial logic: objects and subjects should
      touch naturally without intersecting, overlap should be readable with correct occlusion
      order, support surfaces should visibly carry weight, and materials should respond to
      light with believable texture, gloss, and contact shadows.
    avoid_template: >
      Avoid body clipping through objects, floating contact, wrong occlusion order,
      finger clipping, merged geometry, flat material response, and cheap plastic-looking surfaces.

  z_image_turbo:
    positive_template: >
      physically plausible contact points, no body-object clipping, correct occlusion order,
      grounded feet, clear support contact, natural hand grip, material-specific reflections, contact shadows
    negative_template: >
      clipping, intersecting limbs, floating feet, hovering body, fingers through object,
      wrong occlusion order, merged geometry, cheap plastic look, flat material response

  stable_diffusion:
    positive_template: >
      physically plausible contact, correct occlusion, grounded support, natural hand grip,
      believable material response, contact shadows
    negative_template: >
      clipping, intersection, floating contact, wrong occlusion order, merged geometry,
      plastic look, flat lighting response

  image_edit:
    repair_template: >
      Repair only the physical collision and contact logic while preserving identity, pose intent,
      composition, lighting mood, and scene design. Fix clipping, floating contact, wrong occlusion
      order, support-surface contact, and material response.

# ------------------------------------------------------------
# 11. Prompt Assembly Hooks
# ------------------------------------------------------------

prompt_assembly_hooks:
  phase_1_intent_analysis:
    add_fields:
      - collision_risk
    action: "Detect contact-heavy, overlap-heavy, support-heavy, and material-sensitive scenes."

  phase_2_cinematic_enrichment:
    action: "Translate contact, occlusion, spatial distance, support logic, and material/light interaction into generator-visible constraints."

  phase_3_scene_blueprint:
    action: "Specify contact points, support surfaces, overlap relations, occlusion order, and light-material behavior."

  phase_3_5_prompt_package:
    action: "Store collision/contact guardrails as structured positive and negative renderer hints."

  phase_4_self_review:
    checks:
      - "Check clipping, intersection, floating contact, support logic, and occlusion order."
      - "Check material interaction, reflections, and contact shadows where relevant."

  phase_4_5_cleanup:
    action: "Do not remove collision, support, occlusion, or material-interaction guardrails when collision risk is high or critical."

  phase_4_6_renderer_selection:
    action: "Apply model-specific collision/contact wording."

  phase_5_final_prompt:
    action: "Include concise collision/contact, occlusion, and material-interaction guardrails in the final prompt when the scene requires them."
