# ============================================================
# oceans-subaquatic-physics.yaml
# Water surfaces, waves, shoreline, underwater optics, and marine physics controller
# Version: 1.0.0
# Purpose:
#   Control ocean scenes, shorelines, wave behavior, wet-surface logic,
#   underwater visibility, caustics, refraction, floating particles, and marine scale.
# ============================================================

schema_version: "1.0.0"
name: "oceans-subaquatic-physics"
description: >
  A water and underwater-physics module for prompt enhancement. It covers ocean
  surfaces, tide and surf behavior, foam, spray, reflections, refraction,
  shoreline interaction, underwater light falloff, caustics, particulate matter,
  buoyancy cues, pressure mood, marine life context, and subaquatic visibility.

core_principle: >
  Water must feel physically present. Surface water should show wave structure,
  foam, reflections, wetness, and interaction with wind, tide, and light.
  Underwater scenes must show filtered light, suspended particles, refraction,
  depth-dependent visibility, and believable subject immersion.

global_rules:
  - "Specify whether the scene is above water, shoreline, breaking surf, partially submerged, or fully underwater."
  - "Wave scale, foam, spray, and water surface motion should match weather and camera distance."
  - "Wet surfaces should visibly respond to water through sheen, darkening, and reflections."
  - "Underwater scenes should show color absorption, reduced contrast with depth, and particulate matter when appropriate."
  - "Refraction, caustics, and surface ripples should be physically motivated, not decorative."
  - "If the subject interacts with water, define splash direction, buoyancy, drag, or submersion state."
  - "Keep hero-subject readability even in turbulent or deep-water scenes unless obscuration is requested."

oceans_subaquatic_physics_schema:
  water_context: "shoreline | beach_surf | open_ocean | coastal_cliff | harbor | river_mouth | lake_like_seascape | shallow_underwater | deep_underwater | underwater_ruins | reef"
  water_state: "calm | rippled | choppy | rough | storm_surf | breaking_wave | glassy | submerged_still"
  tide_state: "low | mid | high | storm_surge | not_relevant"
  weather_link: "clear | windy | stormy | overcast | tropical_sun | moonlit"
  underwater_visibility: "crystal_clear | clear | moderate | murky | deep_blue_low_visibility"
  surface_effects: []
  underwater_effects: []
  fluid_interaction: []
  foam_spray_logic: []
  reflection_refraction_logic: []
  marine_scale_anchors: []
  exposure_readability:
    above_water_subject_visibility: "low | medium | high"
    underwater_subject_visibility: "low | medium | high"
    caustic_intensity: "none | subtle | medium | strong"
  renderer_guardrails:
    positive: []
    negative: []

surface_water_profiles:
  calm_coastal:
    positive:
      - "gentle surface ripples"
      - "soft sky reflections"
      - "subtle shoreline foam"
      - "light wind response"
    negative:
      - "storm-scale waves in calm scene"
      - "mirror-flat water during windy conditions"

  tropical_surf:
    positive:
      - "breaking translucent waves"
      - "sunlit spray and foam"
      - "wet sand reflections"
      - "clear horizon and moving surf patterns"
    negative:
      - "dull opaque surf under bright tropical light"
      - "foam with no wave structure"

  storm_ocean:
    positive:
      - "rough wave faces"
      - "wind-torn spray"
      - "dark swell patterns"
      - "whitecaps consistent with strong wind"
    negative:
      - "calm reflective sea during storm"
      - "tiny ripples instead of storm swell"

shoreline_interaction_rules:
  positive_language:
    - "waterline clearly meets sand, rocks, or concrete"
    - "wet sand appears darker and more reflective"
    - "shore rocks show wet sheen and splash residue"
    - "foam trails recede naturally with the wave"
    - "tide level affects the visible shoreline geometry"
  negative_language:
    - "dry-looking rocks inside active surf"
    - "foam floating randomly with no wave edge"
    - "shoreline disconnected from water"

underwater_profiles:
  shallow_clear_water:
    positive:
      - "sunbeams penetrating the surface"
      - "caustic patterns on rocks or seabed"
      - "clear suspended micro-particles"
      - "cyan-to-blue color shift"
    negative:
      - "surface-like lighting with no subaquatic filtering"
      - "dry-air clarity underwater"

  reef_water:
    positive:
      - "filtered tropical light"
      - "colorful but physically coherent reef visibility"
      - "gentle suspended particles and depth haze"
      - "water surface wavering above when visible"
    negative:
      - "over-sharp distant visibility without water haze"
      - "random neon water colors"

  deep_underwater:
    positive:
      - "low-key blue depth"
      - "rapid falloff of warm colors"
      - "selective visibility with distance haze"
      - "small particulate matter drifting in the water column"
    negative:
      - "bright dry daylight look"
      - "full-spectrum color preservation at depth"

subaquatic_physics:
  positive_language:
    - "light filtered through water"
    - "refraction at the water surface"
    - "subtle drag on hair, fabric, or particles"
    - "buoyancy cues in pose or floating objects"
    - "surface ripples distort the view when seen from below"
    - "underwater soundless stillness or pressure mood when appropriate"
  negative_language:
    - "air-like motion underwater"
    - "hair or cloth behaving as if dry"
    - "no suspended particles"
    - "no attenuation with depth"

marine_scale_anchors:
  suggestions:
    - "shoreline rocks"
    - "wave height relative to the subject"
    - "boats or piers"
    - "seabed, reef formations, kelp, or coral"
    - "diver silhouette only if contextually appropriate"

self_review_checklist:
  - "Is the water context explicit: surf, shoreline, open ocean, or underwater?"
  - "Do wave scale, foam, spray, and wetness match wind and weather?"
  - "If underwater, are light filtering, particulate matter, and depth visibility believable?"
  - "Are reflection, refraction, or caustics physically motivated?"
  - "Does the subject interact with water in a readable way?"

model_specific_rendering:
  chatgpt_image:
    guidance: >
      Use natural language tying water state, shore interaction, underwater optics,
      visibility, and subject immersion into a coherent scene.
  z_image_turbo:
    positive_template: >
      realistic water behavior, coherent waves and foam, wet-surface reflections,
      underwater light filtering, caustics, particles, readable water interaction
    negative_template: >
      flat water, random foam, dry rocks in surf, air-like underwater motion,
      no water haze
  stable_diffusion:
    positive_template: >
      realistic ocean surface, foam, spray, wet reflections, caustics,
      underwater particles, refraction, filtered blue light
    negative_template: >
      flat water, bad foam, no wetness, air clarity underwater, no attenuation

prompt_assembly_hooks:
  phase_1_intent_analysis:
    add_fields:
      - oceans_subaquatic_physics
    action: "Detect water context, wave state, shoreline interaction, or underwater depth/visibility."
  phase_2_cinematic_enrichment:
    action: "Translate marine mood into wave structure, foam, wetness, light filtering, and subject-water interaction."
  phase_3_scene_blueprint:
    action: "Coordinate water behavior with atmosphere, terrain, and rendering technicals."
  phase_4_self_review:
    checks:
      - "Check wave/foam/wetness coherence."
      - "Check underwater optics and visibility."
      - "Check subject readability in or near water."
  phase_4_5_cleanup:
    action: "Preserve physically important water cues and interaction logic."
  phase_4_6_renderer_selection:
    action: "Render ocean and underwater physics in model-appropriate language."
  phase_5_final_prompt:
    action: "Include concise but physical water logic when relevant."
