schema_version: "1.0.0"
name: "soft-surface-contact-physics"
description: >
  Soft-surface contact controller for beds, sofas, cushions, pillows, blankets,
  mattresses, carpets, towels, and padded supports. It ensures contact
  compression, wrinkles, fabric tension, occlusion, and shadows agree with the
  subject's weight and pose.

core_principle: >
  A soft surface should react to weight. Describe compression, displaced folds,
  contact shadows, fabric tension, cushion deformation, and edge occlusion at
  the exact body or object points that carry load.

soft_surface_schema:
  surface_type: "bed | sofa | cushion | pillow | blanket | mattress | towel | carpet | custom"
  load_points: []
  compression_intensity: "none | subtle | medium | deep"
  wrinkle_direction: ""
  fabric_tension: ""
  contact_shadow: ""
  occlusion_boundary: ""
  rebound_or_indent: ""
  material_response: ""

surface_response_patterns:
  bed_or_mattress:
    positive:
      - "subtle mattress indentation under hips and shoulders"
      - "wrinkles radiate away from knees, elbows, and hands"
      - "contact shadows under the body"
    avoid:
      - "perfectly flat bed under body weight"
      - "body floating above sheet"
  sofa_or_cushion:
    positive:
      - "cushion compresses under seated or leaning weight"
      - "fabric creases at the pressure points"
      - "body edge slightly sinks into the cushion"
    avoid:
      - "merged body and sofa geometry"
      - "no cushion deformation"
  pillow_or_blanket:
    positive:
      - "soft folds bunch around contact points"
      - "pillow edge partially occludes supported body part"
      - "fabric tension follows pull direction"
    avoid:
      - "blanket clips through limbs"
      - "pillow ignores head or arm weight"

failure_taxonomy:
  no_compression:
    symptoms:
      - "soft surface remains flat under body or object"
    positive_fix:
      - "add subtle compression, wrinkles, and contact shadows"
    negative_fix:
      - "flat uncompressed cushion"
      - "floating body"
  clipping_into_surface:
    symptoms:
      - "limb or torso merges into blanket, mattress, or sofa"
    positive_fix:
      - "clear occlusion boundary and visible contact edge"
    negative_fix:
      - "body clipping into surface"
      - "merged fabric and skin"

prompt_assembly_hooks:
  phase_1_intent_analysis:
    action: "Detect soft beds, sofas, cushions, pillows, blankets, towels, and padded support surfaces."
  phase_2_cinematic_enrichment:
    action: "Add load points, compression, wrinkle direction, contact shadow, and occlusion boundary."
  phase_4_self_review:
    checks:
      - "Does each weight-bearing point deform the soft surface?"
      - "Are contact shadows and wrinkle directions physically consistent?"
  phase_4_6_renderer_selection:
    action: "Use concise surface-response language and avoid broad physics jargon."
