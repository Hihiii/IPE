# ============================================================
# era-culture-library.yaml
# Era, culture, region, and visual authenticity controller
# Version: 1.0.0
# Purpose:
#   Preserve era/cultural coherence, enrich historically or culturally specific
#   prompts, and prevent anachronistic visual details.
# ============================================================

schema_version: "1.0.0"
name: "era-culture-library"
description: >
  A contextual authenticity module for prompt enhancement. It detects era, region,
  cultural context, period detail, and aesthetic systems, then translates them into
  architecture, fashion, object, typography, material, transportation, and color cues.
  It also prevents anachronisms and culture/style mismatch.

core_principle: >
  Era and culture are not decorative tags. They define the visual logic of the world:
  clothing silhouettes, architecture, objects, vehicles, signage, furniture, materials,
  color aesthetics, typography, social atmosphere, and historical plausibility.

global_rules:
  - "If the user explicitly specifies an era, region, culture, or historical style, preserve it as high-priority intent."
  - "If an era or culture is implied by subject, setting, or mood, infer a suitable context without over-specifying."
  - "Use culturally and historically coherent details across clothing, architecture, props, signage, materials, and color."
  - "Avoid anachronistic objects unless the user explicitly requests deliberate fusion."
  - "Respect contemporary cultural sensitivity: avoid stereotypes, caricature, and generic exoticism."
  - "Do not overwrite a user's explicit era/culture with a more generic modern setting."
  - "For fantasy or hybrid settings, define the fusion logic clearly rather than mixing random references."

era_culture_schema:
  era: ""
  period_detail: ""
  region: ""
  cultural_context: ""
  visual_authenticity_priority: "low | medium | high"
  architecture_language: []
  fashion_language: []
  hair_makeup_language: []
  object_language: []
  transportation_language: []
  typography_aesthetic: []
  color_aesthetic: []
  material_cues: []
  social_atmosphere: []
  anachronism_avoidance: []
  fusion_rules: []
  renderer_guardrails:
    positive: []
    negative: []

