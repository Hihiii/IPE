generator_visible_translation:
  positive:
    - "era-consistent visual details"
    - "culturally coherent setting"
    - "period-appropriate clothing, objects, architecture, and materials"
    - "authentic regional visual language"
    - "historically plausible environmental details"
  negative:
    - "anachronistic objects"
    - "wrong-era props"
    - "generic cultural mashup"
    - "stereotyped cultural details"
    - "modern objects in historical scene unless requested"

model_specific_rendering:
  chatgpt_image:
    guidance: >
      Use natural language to describe era, region, and culturally coherent visual details.
      Avoid a laundry list; mention the strongest architecture, fashion, prop, and color cues.
  z_image_turbo:
    positive_template: >
      era-consistent, culturally coherent, period-appropriate architecture, authentic props,
      matching fashion silhouettes, no anachronism
    negative_template: >
      anachronism, wrong era props, modern objects, generic culture mashup, stereotype
  stable_diffusion:
    positive_template: >
      era-consistent, period accurate, culturally coherent, authentic architecture,
      period clothing, historical props
    negative_template: >
      anachronism, modern object, wrong era, inaccurate costume, generic culture mashup

self_review_checklist:
  - "Did the prompt preserve explicit era, culture, and region?"
  - "Are architecture, fashion, props, signage, materials, and color from the same visual world?"
  - "Are there any anachronistic details that should be avoided?"
  - "If this is a hybrid/fantasy setting, is the fusion logic clear?"
  - "Does the cultural context avoid stereotypes and generic exoticism?"

prompt_assembly_hooks:
  phase_1_intent_analysis:
    add_fields:
      - era_culture
    action: "Detect explicit or implied era, region, cultural context, and authenticity priority."

  phase_2_cinematic_enrichment:
    action: "Translate era/culture into architecture, clothing, props, materials, colors, and typography cues."

  phase_3_scene_blueprint:
    action: "Ensure scene worldbuilding and environment props follow era/culture rules."

  phase_4_self_review:
    checks:
      - "Check anachronism."
      - "Check cultural coherence."
      - "Check explicit user era/culture preservation."

  phase_4_5_cleanup:
    action: "Do not remove explicit era/culture cues or anachronism safeguards."

  phase_4_6_renderer_selection:
    action: "Render era/culture details in model-appropriate language."

  phase_5_final_prompt:
    action: "Include concise era/culture authenticity cues when relevant."


