schema_version: "1.0.0"
name: "phase-execution-contract"
description: >
  Auditable execution contract for the cinematic prompt workflow. It prevents
  phase skipping and makes config relevance selection, reads, and applications
  observable before a final prompt may be delivered.

execution_policy:
  mode: "audited_non_skippable"
  core_rules:
    - "Run every phase in sequence for every request. A phase may produce no changes, but it may not be omitted."
    - "Read fixed baseline configs and top-level indexes before deciding relevance; do not rely on memory or a prior task."
    - "Read every config YAML selected by direct user cues, a matched router, or a transitive config dependency."
    - "A selected config is complete only when the receipt records the visible fields or guardrails applied from it."
    - "The model target may change output syntax but may not skip phases or suppress relevant config reads."
    - "Do not create a final prompt when any required phase or selected config remains pending, unread, or unevidenced."
    - "Tier P (skill-phase-*.yaml) files are loaded Just-In-Time: each is read immediately before its phase begins, not during Phase 0. The receipt records `loaded_at_phase` for every JIT-loaded file."

phase_sequence:
  - phase_0_config_resolution
  - phase_1_intent_analysis
  - phase_2_cinematic_enrichment
  - phase_3_scene_blueprint
  - phase_3_1_prompt_package
  - phase_4_self_review
  - phase_4_1_cleanup
  - phase_4_2_renderer_selection
  - phase_4_3_delivery_package
  - phase_5_final_output

phase_0_config_resolution:
  mandatory_baseline_configs:
    - config/prompt-core/phase-execution-contract.yaml
    # PC-1 Foundation is merged into config/core-knowledge.yaml
    # (semantic-priority-rules.yaml, subject-rules.yaml, output-specs.yaml
    #  are no longer separate files — their full content is inline in core-knowledge)
    #
    # PC-2 Phase-Bound files (loaded JIT, not during Phase 0):
    #   prompt-assembly-schema.yaml → Phase 3.1
    #   prompt-renderer.yaml → Phase 4.2
    #   quality-rubric.yaml → Phase 4
    #   failure-taxonomy.yaml → Phase 4
    #   intent-preservation-review.yaml → Phase 4
    #
    # PC-3 Lazy files — loaded only when manifest triggers match:
    #   constraints-library.yaml, task-profiles.yaml,
    #   image2-benchmark-learning-system.yaml, composition-preset-routing.yaml,
    #   lora-routing-system.yaml, model-specific-compact-prompt-generator.yaml
    #
    # PC-Deprecated:
    #   prompt-renderer-modes.yaml — content integrated into prompt-renderer.yaml
  required_actions:
    - "Tier S: Load config/core-knowledge.yaml — consolidated essential rules (includes full PC-1 Foundation content: semantic-priority-rules, subject-rules, output-specs merged inline)."
    - "Tier M: Load config/_manifest.yaml — table of contents with triggers, policies, phase bindings."
    - "Tier P: DO NOT load phase files yet. Each is loaded Just-In-Time before its phase."
    - "PC-2 Phase-Bound: DO NOT load prompt-assembly-schema.yaml, prompt-renderer.yaml, quality-rubric.yaml, failure-taxonomy.yaml, or intent-preservation-review.yaml yet. These are loaded JIT before their respective phases."
    - "Record a decision for every top-level config domain: selected or not_applicable, with a task-specific reason."
    - "Resolve direct triggers, task-profile routes, router dependencies, model-target routes, and explicit user constraints transitively."
    - "Tier D + R: Lazy-load only matched YAML files after the relevant domain and index route are selected."
    - "Tier I: If character detected, read character-ip index files, then load only the matched character tree."
    - "Create the internal phase_execution_receipt before Phase 1 begins."
  index_first_loading:
    fixed_baseline: "Read Tier S (core-knowledge.yaml — includes full PC-1 Foundation content merged inline) then Tier M (_manifest.yaml) first."
    character_requests: "Read the formal character lookup index and legacy lookup index before loading a matched formal tree or legacy per-IP file."
    other_domains: "Read a domain router or index first when one exists, then load only the matched controller YAMLs."
    prohibited: "Do not enumerate or load every YAML in a domain merely to discover relevance. Do not load any Tier P or PC-2 Phase-Bound file during Phase 0."
  jit_loading:
    description: "Tier P (skill-phase-*.yaml) and PC-2 (phase-bound prompt-core) files are loaded Just-In-Time, not during Phase 0."
    rule: "For each phase in the phase_sequence, immediately before beginning that phase, load the corresponding skill-phase-*.yaml file AND any PC-2 prompt-core files bound to that phase."
    mapping:
      phase_1_intent_analysis:
        - config/skill-phase-1.yaml
      phase_2_cinematic_enrichment:
        - config/skill-phase-2.yaml
      phase_3_scene_blueprint:
        - config/skill-phase-3.yaml
      phase_3_1_prompt_package:
        - config/skill-phase-3-1.yaml
        - config/prompt-core/prompt-assembly-schema.yaml
      phase_4_self_review:
        - config/skill-phase-4.yaml
        - config/prompt-core/quality-rubric.yaml
        - config/prompt-core/failure-taxonomy.yaml
        - config/prompt-core/intent-preservation-review.yaml
      phase_4_1_cleanup:
        - config/skill-phase-4-1.yaml
      phase_4_2_renderer_selection:
        - config/skill-phase-4-2.yaml
        - config/prompt-core/prompt-renderer.yaml
      phase_4_3_delivery_package:
        - config/skill-phase-4-3.yaml
      phase_5_final_output:
        - config/skill-phase-5.yaml
    receipt: "Each JIT-loaded file's config_read_record must include `loaded_at_phase` set to the phase ID that triggered its load."
  relevance_rules:
    direct_trigger: "Select a YAML when its trigger, task, subject, output, safety, text, reference, style, environment, or model condition matches the request."
    router_dependency: "When a selected YAML names a route, required controller, schema, or dependency, select that dependency too."
    character_ip: "For a matched character, read the lookup index, matched per-IP source file, and every populated profile layer required by the source schema. Do not load unrelated character profiles."
    reference_images: "When the request contains a reference image or edit instruction, select all matched edit-reference and reference-override controllers."
    no_memory_shortcut: "A prior task, familiar prompt pattern, or default model is never evidence that a config was read for this request."

phase_contracts:
  phase_1_intent_analysis:
    require: [user_signals, hard_locks, task_profile, model_target, risk_flags, selected_config_ledger]
    gate: "Every user signal has a routing decision or an explicit not_applicable reason."
  phase_2_cinematic_enrichment:
    require: [composition_decision, camera_technical_plan, selected_domain_decisions, generator_visible_translation]
    gate: "Every selected enrichment config contributes an applied field or a no_effect rationale."
  phase_3_scene_blueprint:
    require: [subject, composition, light, material, environment, constraints, output]
    gate: "The blueprint contains the guardrails required by selected configs."
  phase_3_1_prompt_package:
    require: [categorized_prompt_package, config_provenance]
    gate: "Every material blueprint decision is represented in a package field."
  phase_4_self_review:
    require: [quality_rubric_result, failure_taxonomy_result, repairs_or_no_change]
    gate: "Each failed dimension is repaired, explicitly accepted, or triggers a rebuild."
  phase_4_1_cleanup:
    require: [preservation_check, contradiction_check, retained_hard_locks]
    gate: "Cleanup removed only redundancy, contradictions, equipment leaks, or non-visible filler."
  phase_4_2_renderer_selection:
    require: [model_target, renderer_profile, syntax_translation, retained_detail_check]
    gate: "Renderer syntax changed without dropping selected-config guardrails."
  phase_4_3_delivery_package:
    require: [final_prompt_object, locked_constraints, output_specs]
    gate: "All renderer fields and locked constraints are present and internally consistent."
  phase_5_final_output:
    require: [validated_phase_execution_receipt, final_prompt_object]
    gate: "The receipt validator passes before presenting or exporting a final prompt."

receipt_contract:
  storage: "internal by default; expose only on user request for debug or audit output"
  top_level_fields:
    - execution_status
    - inventory_scan
    - domain_decisions
    - phases
    - config_read_ledger
  inventory_scan:
    required_fields: [config_directories]
    rule: "config_directories must list every current top-level directory under config/."
  domain_decision:
    required_fields: [domain, decision, rationale]
    allowed_decisions: [selected, not_applicable]
  phase_record:
    required_fields: [id, status, evidence]
    required_status: complete
  config_read_record:
    required_fields: [path, relevance, required_by_phases, read_status, applied_fields]
    optional_fields: [loaded_at_phase, satisfies]
    required_status: complete
    rule: "path must exist below config/ and applied_fields must name the fields, guards, or decisions actually used."
    rule: "Tier P (JIT) files MUST include loaded_at_phase set to the phase ID that triggered the load. Tier S/M/D/I/R files MAY omit loaded_at_phase or set it to 'phase_0_config_resolution'."
    rule: "The `satisfies` field (optional) lists baseline config paths whose essential content is covered by this config. Used by core-knowledge.yaml to satisfy SATISFIED_BY_CORE baselines without loading separate files."

final_output_gate:
  deny_when:
    - "the top-level domain scan does not cover every config domain"
    - "a phase is missing, out of order, pending, skipped, or failed"
    - "a selected config has no complete read record"
    - "a selected config has no applied-fields evidence or no-effect rationale"
    - "the receipt validator reports an error"
  validation_command: "python scripts/validate_phase_execution_receipt.py --receipt <internal-receipt.yaml>"
  success_condition: "All required phases and selected config reads are complete, evidenced, and validated."

prompt_assembly_hooks:
  phase_0_config_resolution:
    action: "Create the inventory, resolve relevant YAMLs transitively, and start the receipt."
  phase_5_final_prompt:
    action: "Validate the receipt and block final output when the execution contract is incomplete."
