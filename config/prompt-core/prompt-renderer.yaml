        Create a photorealistic fashion portrait of an adult woman standing between semi-transparent frosted glass panels in a modern architectural studio.

        [POSE / ACTION]
        She stands with a slight hip shift, weight on the back leg, one hand gently resting at her side and the other touching the edge of a glass panel. Her gaze is directed slightly off-camera with a relaxed, confident expression.

        [COMPOSITION]
        4:5 portrait aspect ratio, waist-up shot, eye-level camera angle, subject placed on the left third with generous negative space on the right, clean headroom, hands fully uncropped.

        [SCENE / DEPTH]
        Foreground: soft out-of-focus frosted glass edge on the far left.
        Midground: the woman positioned between two glass panels with clear silhouette separation.
        Background: softly blurred architectural interior with warm neutral walls.
        Create clear depth layers between the glass, the subject, and the background.

        [LIGHTING / MOOD]
        Soft diffused key light from camera-right creates smooth facial shadows and natural catchlights. Warm neutral tones with restrained editorial mood. Glass panels catch subtle reflections without overpowering the face.

        [AVOID]
