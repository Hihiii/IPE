# ============================================================
# prompt-renderer.yaml
# Autorevise model-specific final prompt renderer profiles
# Version: 1.3.0
# Purpose:
#   Convert a model-neutral prompt_package into the final syntax,
#   density, ordering, and positive/negative structure preferred by
#   each target image/video model.
# ============================================================

schema_version: "1.3.0"
name: "prompt-renderer"
description: >
  Model-specific prompt renderer profiles for converting an internal
  autorevise prompt package into final prompt formats for ChatGPT Image,
  Z Image Base, Z Image Turbo, Stable Diffusion-style models, Midjourney, Flux,
  image editing, and video generation. Internal prompt packages may be
  YAML/JSON, but final prompts must be rendered into the target model's
  preferred prompt style.

# ------------------------------------------------------------
# 1. Global Renderer System
# ------------------------------------------------------------

autorevise_renderer_system:
  purpose: >
    Keep the cinematic prompt enhancer's internal reasoning model-neutral,
    then render the final prompt differently for each target model.
    The renderer is not allowed to invent new visual intent. It may only
    translate, reorder, split, or remove genuinely redundant wording from the
    prompt_package, constraints, semantic priority rules, and output specs.
    It must not shorten or reduce visual specificity solely because a model
    profile prefers a different syntax.

  core_principle: >
    JSON/YAML is for internal structure and debugging. The final prompt
    sent to a T2I/I2V/T2V model should be the syntax that model understands best.

  detail_preservation_rule: >
    Every renderer must preserve concrete subject, composition, spatial,
    lighting, material, text, anatomy, geometry, and scene decisions. A model
    profile may change syntax, but it must not turn a complete prompt into
    vague, short render-quality phrases unless the user explicitly requests
    brevity or a downstream tool has a known hard limit.

  default_model_target: "chatgpt_image"

  export_family_variants:
    default: true
    rule: "Render and export ALL model targets to the TXT file. The selected renderer is treated as primary, but every model family is included for multi-workflow comparison."
    explicit_variant_targets: [chatgpt_image, flux, z_image_base, z_image_turbo, comfyui_flux2_zimage_3stage, stable_diffusion, midjourney, image_edit]

  allowed_model_targets:
    - chatgpt_image
    - chatgpt_image_2
    - z_image_base
    - z_image_turbo
    - comfyui_flux2_zimage_3stage
    - stable_diffusion
    - midjourney
    - flux
    - image_edit
    - video_prompt
    - universal_package
    - debug_yaml

  renderer_selection_priority:
    - explicit_user_model_target
    - workflow_context
    - output_mode_requested
    - model_syntax_markers
    - default_model_target

  model_target_detection:
    chatgpt_image:
      trigger_terms:
        - "ChatGPT Image"
        - "image2"
        - "GPT Image"
        - "OpenAI image"
        - "DALL-E"
      default_when_unspecified: true

    chatgpt_image_2:
      trigger_terms:
        - "chatgpt_image_2"
        - "GPT Image 2 prompt-only"
        - "image2 prompt-only"
        - "prompt-only profile"
      renderer_profile: "prompt_only_generate_and_revise"
      rule: "Use when the task explicitly requests GPT Image 2 prompt-only output (generate_prompt or revise_prompt). Falls back to chatgpt_image if unspecified."

    z_image_base:
      trigger_terms:
        - "Z Image Base"
        - "Z-Image Base"
        - "z image base"
        - "z-image base"
        - "zimage base"
      renderer_profile: "dense_visual_direct"

    z_image_turbo:
      trigger_terms:
        - "Z Image Turbo"
        - "Z-Image Turbo"
        - "z image turbo"
        - "z-image turbo"
        - "zimage turbo"
        - "z turbo"
        - "ComfyUI Z Image Turbo"
      renderer_profile: "detailed_visual_explicit"

    z_image_generic:
      trigger_terms:
        - "z image"
        - "z-image"
        - "zimage"
        - "ComfyUI Z Image"
      default_variant: "z_image_turbo"
      rule: "If the user or workflow says Z Image but does not specify Base or Turbo, use z_image_turbo unless the workflow specifically requests z_image_base."

    comfyui_flux2_zimage_3stage:
      trigger_terms:
        - "Flux.2 Dev to Z Image Base to Z Image Turbo"
        - "Flux2 Z Image three stage"
        - "Flux.2 Dev + Z-Image Base + Z-Image Turbo"
        - "three-stage ComfyUI workflow"
        - "shared positive prompt"
        - "Flux sketch then Z Image polish"
      renderer_profile: "shared_positive_zimage_negative"
      rule: "Use one shared positive prompt for Flux.2 Dev, Z-Image Base, and Z-Image Turbo; output a separate negative prompt only for Z-Image Base/Turbo."

    stable_diffusion:
      trigger_terms:
        - "Stable Diffusion"
        - "SDXL"
        - "Pony"
        - "Illustrious"
        - "ComfyUI"
        - "Automatic1111"
        - "Forge"
      renderer_profile: "positive_negative_tagged"

    midjourney:
      trigger_terms:
        - "Midjourney"
        - "MJ"
        - "--ar"
        - "--style"
        - "--sref"
        - "--cref"
      renderer_profile: "compact_aesthetic_command"

    flux:
      trigger_terms:
        - "Flux"
        - "Flux.2"
        - "Flux.2 Dev"
        - "FLUX.1"
        - "flux dev"
        - "flux schnell"
      renderer_profile: "clear_natural_subject_first"

    image_edit:
      trigger_terms:
        - "edit image"
        - "image edit"
        - "只改"
        - "保持不變"
        - "same face"
        - "keep the same"
        - "change only"
      renderer_profile: "edit_instruction_with_locks"

    video_prompt:
      trigger_terms:
        - "video"
        - "I2V"
        - "T2V"
        - "image-to-video"
        - "text-to-video"
        - "Sulphur"
        - "Runway"
        - "Kling"
        - "Luma"
      renderer_profile: "motion_ready_scene_prompt"

# ------------------------------------------------------------
# 2. Universal Prompt Package Contract
# ------------------------------------------------------------

universal_prompt_package_contract:
  purpose: >
    The renderer consumes this structured model-neutral package. Every
    downstream renderer should draw from these fields, but may only omit
    fields that are irrelevant to the selected renderer. Do not remove
    meaningful visual details to satisfy a token or word target.

  required_fields:
    - original_prompt
    - model_target
    - task_profile
    - subject
    - subject_role
    - style_realism_mode
    - shot_size
    - composition
    - composition_decision
    - visual_hierarchy
    - depth_layers
    - background_role
    - crop_policy
    - camera_angle
    - lighting_visible_effect
    - camera_technical_decision
    - output_specs
    - constraints

  optional_fields:
    - lens_visible_depth
    - gaze_action_flow
    - lead_room
    - negative_space_policy
    - visual_balance_note
    - typography_space_note
    - exposure_and_tonality
    - tonal_profile
    - exposure_strategy
    - aperture_dof_profile
    - shutter_motion_profile
    - iso_noise_profile
    - color_palette
    - material_rendering
    - visual_mood
    - cinematography_grammar
    - motion
    - background
    - atmosphere
    - text_logo_brand
    - publication_layout
    - mature_content
    - avoid
    - locked_constraints
    - quality_risks

  canonical_field_order:
    - subject
    - hard_locks_and_required_features
    - subject_action
    - shot_size
    - composition_layout
    - visual_hierarchy
    - gaze_or_action_direction
    - camera_angle_and_distance
    - lens_choice
    - aperture_depth_of_field
    - shutter_motion_handling
    - lead_room
    - environment_and_background_role
    - depth_layers
    - crop_intent
    - style_realism_mode
    - exposure_strategy
    - tonal_profile
    - lighting_visible_effect
    - lens_visible_depth
    - exposure_and_tonality
    - material_rendering
    - color_palette
    - background
    - visual_mood
    - motion
    - output_specs
    - avoid

  composition_rendering_rules:
    must_render:
      - subject_position
      - frame_scale
      - gaze_or_action_direction
      - lead_room
      - depth_layers
      - background_readability
      - lighting_hierarchy
      - crop_intent
    optional_render:
      - visual_balance_note
      - negative_space_note
      - typography_space_note
      - foreground_framing_note

  camera_technical_rendering_rules:
    must_render_when_relevant:
      - tonal_profile
      - exposure_strategy
      - lens_practical_profile
      - aperture_dof_profile
      - shutter_motion_profile
      - iso_noise_profile
    visual_translation_order:
      - perspective_and_subject_distance
      - focus_behavior
      - motion_behavior
      - exposure_target
      - tonal_result
      - texture_or_grain
    avoid:
      - "meaningless camera specs without visual purpose"
      - "conflicting lens, depth, shutter, or exposure instructions"
      - "shallow depth of field when required background context must remain readable"
      - "ultra-wide close portrait distortion"
      - "motion blur when face, text, or product detail must stay sharp"

  technical_conflict_cleanup:
    required: true
    rules:
      - "Resolve conflicting focal lengths, camera heights, depth intents, exposure profiles, motion intents, and noise profiles before final rendering."
      - "Background readability, action target visibility, group face readability, and architecture structure override decorative bokeh."
      - "Full-body framing keeps feet visible unless a deliberate crop is explicit."
  lens_priority_override:
    allowed_when: [macro_detail, fisheye_or_extreme_sports, architectural_ultra_wide, telephoto_compression, panning_racing, extreme_wide_mecha_scale, surveillance_drone_gopro, smartphone_or_mirror_selfie]
    rule: "Use lens-first language only when the optical concept itself is explicitly requested."

  field_priority:
    safety_and_policy: 100
    explicit_user_hard_locks: 98
    targeted_edit_scope: 96
    subject_identity_and_role: 94
    required_text_logo_brand: 92
    output_specs: 90
    task_readability: 86
    dominant_style_mode: 78
    composition_shot_angle: 74
    lighting_exposure_material_color: 68
    cinematic_mood_enhancement: 55
    minor_quality_tags: 30

# ------------------------------------------------------------
# 3. Global Rendering Rules
# ------------------------------------------------------------

global_rendering_rules:
  do:
    - "Render the final prompt in the target model's preferred syntax."
    - "Preserve explicit hard locks and targeted edit scope before aesthetic enhancements."
    - "Use generator-visible visual language instead of internal technical planning."
    - "Keep one dominant style/medium mode."
    - "Place the subject and required identity in the first sentence or first prompt segment."
    - "Use positive visual guardrails where possible; use avoid/negative only for high-risk failures."
    - "When the original user prompt is short or fragmentary, expand it into a complete high-specificity prompt instead of preserving its shortness."
    - "When token usage is not a concern, preserve distinct visual, layout, typography, material, and hero-integrity details instead of forcing the shortest prompt."

  do_not:
    - "Do not send raw JSON/YAML to a T2I model unless a downstream parser explicitly consumes it."
    - "Do not leak internal technical equipment terms into final prompt unless the requested image is a behind-the-scenes setup or equipment diagram."
    - "Do not include multiple conflicting style modes."
    - "Do not include avoid terms that contradict required positive elements."
    - "Do not use long lists of generic quality tags when a concise visual phrase can replace them."

  forbidden_equipment_terms_in_final_prompt:
    default:
      - octabox
      - softbox
      - stripbox
      - V-flat
      - C-stand
      - light stand
      - studio flash
      - strobe
      - beauty dish
      - reflector board
      - snoot
      - grid
      - flag
      - cutter
      - barn doors
    allowed_only_when:
      - behind_the_scenes_photo
      - studio_setup_diagram
      - photography_education_diagram
      - lighting_equipment_product_shot

  technical_to_visible_language:
    lighting:
      octabox: "large soft diffused key light with smooth shadow transition"
      strip_softbox: "narrow elongated rim highlight along the subject edge"
      v_flat: "soft bounced fill opening the shadow side"
      snoot: "focused narrow pool of light"
      grid: "controlled directional light with minimal spill"
      full_CTO: "warm amber light"
      full_CTB: "cool blue light"
    lens:
      "85mm": "flattering short-telephoto portrait compression"
      "24mm": "wide environmental perspective with natural spatial depth"
      "tilt_shift": "controlled architectural perspective with straight vertical lines"
      "macro": "close detail view with crisp surface texture"
    exposure:
      low_key: "dark atmosphere with selective readable highlights"
      high_key: "bright airy exposure with preserved highlight detail"
      middle_key: "balanced exposure with natural contrast"
      expose_for_highlights: "bright areas retain texture without clipping"
    composition:
      rule_of_thirds: "subject placed along a third line with balanced negative space"
      centered_symmetry: "centered symmetrical composition with balanced left-right structure"
      depth_layering: "clear foreground, midground, and background separation"
      negative_space: "clean open area reserved for visual breathing room or text"
    mood:
      luxury: "restrained luxury editorial aesthetic"
      cinematic: "cinematic film-still composition with motivated light and layered depth"
      dreamy: "soft atmosphere with gentle glow and delicate contrast"
      playful: "bright friendly mood with clear readable shapes"

short_prompt_expansion_rules:
  purpose: >
    Convert short user prompts, keyword fragments, and under-specified briefs into
    complete model-facing prompts with the missing visual decisions filled in.
  activate_when:
    - "original prompt is a short phrase, object list, style fragment, or under-specified concept"
    - "the user asks to enhance, improve, make cinematic, or make higher quality"
    - "no explicit request for a short final prompt is present"
  expansion_targets:
    - "primary subject identity, role, action, and hard locks"
    - "human body structure, hands, gaze target, and natural expression when people are central"
    - "shot size, crop, viewpoint, and composition"
    - "visible lighting effect, exposure feel, and shadow behavior"
    - "material, surface, skin, fabric, product, or environmental texture"
    - "background depth, atmosphere, and scene context"
    - "output format, publication/text intent, exact text, logo, label, language/script, or commercial use when implied"
    - "professional shooting discipline: camera position, motivated light, subject separation, and visible material response"
    - "concise avoid terms for high-risk failures"
  default_chatgpt_image_result:
    renderer_profile: "natural_language_semantic"
    advisory_word_range: "260-520 words for ordinary readability; may be longer when required details matter"
    format: "complete natural-language prompt plus concise avoid sentence"
  do_not:
    - "Do not keep the final prompt short merely because the input was short."
    - "Do not invent a different subject, identity, brand, era, wardrobe, or content category."
    - "Do not expose lighting diagrams, equipment names, or raw config categories in the final prompt."
    - "Do not add mature-content restrictions beyond underage or childlike sexual framing."

# ------------------------------------------------------------
# 3A. Cover / Poster / Magazine Rendering Rules
# ------------------------------------------------------------

cover_poster_publication_rules:
  purpose: >
    Prevent cover-style prompts from losing the requested typography or layout intent.
    When the user asks for a magazine cover, poster, book cover, or similar publication-style image,
    the renderer must preserve the cover-layout intent instead of accidentally suppressing all text.

  trigger_terms:
    - "magazine cover"
    - "cover"
    - "poster"
    - "book cover"
    - "movie poster"
    - "album cover"
    - "cover-style"
    - "封面"
    - "海報"
    - "雜誌封面"

  decision_modes:
    exact_text_mode:
      when: "The user explicitly provides exact title, masthead, subtitle, cover line, logo, or brand text."
      renderer_behavior:
        - "Keep the requested text intent visible in the final prompt."
        - "Ask for large legible masthead and short readable supporting lines."
        - "Prefer simple, short, uppercase or clean sans-serif text structure for weak-text models."
    implied_cover_text_mode:
      when: "The user asks for a cover or poster but does not specify exact text."
      renderer_behavior:
        - "Do not suppress text entirely."
        - "Request a clear magazine masthead or poster title area plus a few clean supporting cover lines or placeholder editorial text."
        - "Keep text layout simple and professional, with clear title-safe zones."
    text_safe_layout_only_mode:
      when: "The downstream workflow explicitly plans to add final typography later."
      renderer_behavior:
        - "Request clear empty masthead area and cover-line safe zones."
        - "Avoid forcing many text details into the image."

  negative_prompt_policy:
    when_cover_requested:
      forbidden_negative_terms:
        - "no text"
        - "text artifacts"
      preferred_replacements:
        - "random unreadable text"
        - "messy typography"
        - "illegible cover lines"

  layout_guidance:
    masthead_area: "clear title area at the top"
    supporting_lines: "a few clean supporting cover lines around the subject when appropriate"
    bottom_lines: "optional smaller cover lines near the bottom"
    readability: "keep typography large, simple, and legible"

# ------------------------------------------------------------
# 3B. Mature Content Rendering Rules
# ------------------------------------------------------------

mature_content_rendering_rules:
  purpose: >
    Convert mature styling into target-model wording while enforcing only age-safety
    restrictions. This module must not downshift adult nudity, adult genital visibility,
    gore, or other user-specified adult explicit content into non-explicit editorial
    language unless the user requests that style.

  adult_age_lock:
    positive_terms:
      - "adult"
      - "21+"
      - "mature adult"
      - "adult model"
    rule: "Place one adult age marker near the subject description when mature styling is present."

  adult_positive_language:
    - "tasteful adult glamour editorial"
    - "adult swimsuit fashion editorial"
    - "adult boudoir-inspired portrait"
    - "elegant body-conscious styling"
    - "confident adult fashion pose"
    - "natural skin texture"
    - "soft editorial lighting"

  disallowed_or_negative_language:
    - "childlike"
    - "underage"

  renderer_behavior:
    chatgpt_image:
      positive: "Use natural-language adult wording that preserves the requested adult explicitness level."
      avoid: "Use a concise avoid sentence only for childlike or underage appearance."
    z_image_base:
      positive: "Use dense adult subject-first visual phrases and preserve requested adult explicitness."
      negative: "Use compact age-safety negative list only: underage, childlike."
    z_image_turbo:
      positive: "Use short adult subject-first phrases and preserve requested adult explicitness."
      negative: "Use compact age-safety negative list: underage, childlike."
    stable_diffusion:
      positive: "Use tag-style adult phrases matching the requested mature content."
      negative: "Use direct age-safety tags only: underage, childlike."
    image_edit:
      rule: "Preserve the requested adult explicitness level and edit scope unless underage or childlike framing is present."

  nsfw_trigger_rendering:
    rule: >
      When the mature content classification was triggered by "nsfw" or related explicit keywords,
      default to bright, clear lighting that keeps the subject well-lit and fully visible.
      Preserve the requested adult explicit detail with clear visual language.
    user_lighting_override: >
      When the user explicitly requests a specific lighting mood (candlelit, dark, moody, intimate
      shadow, neon, low-key, twilight, dawn, dusk, or any named lighting condition), respect
      the user's lighting intent. The NSFW exposure target must remain readable and in-frame
      regardless of the selected lighting mood — do not brighten the scene in a way that
      contradicts the user's explicit atmosphere request.
    exposure_priority: >
      The exposure target (nipple or vulva) must always be visible regardless of lighting mood.
      Use selective rim light, practical motivation, or focused spot to keep the target readable
      in dark or moody scenes. Never shadow or dim the exposure target itself.

selfie_rendering_rules:
  purpose: "Render plain selfie as camera relationship and add capture props only from explicit triggers."
  selfie_perspective:
    must_render: [front_facing_arm_length_camera_pov, close_half_body_or_three_quarter_framing, near_side_forearm_reaching_toward_lens, camera_device_completely_beyond_crop, subject_looking_into_lens]
    must_not_auto_render: [visible_smartphone, mobile_phone, holding_phone, selfie_stick, mirror_selfie, phone_covering_face, reflected_phone, external_observer_full_body_view]
  phone_selfie:
    must_render: [visible_smartphone, hand_phone_contact, finger_grip_logic, believable_phone_direction]
  mirror_selfie:
    must_render: [mirror_visible, visible_smartphone, reflection_logic, subject_phone_alignment]
  selfie_stick_shot:
    must_render: [selfie_stick_visible, hand_stick_contact, pole_direction]
  cleanup_rule: "When plain selfie has no explicit prop trigger, remove all phone, mirror, stick, reflected-device, and external-observer full-body terms; preserve the arm-length POV with the device beyond crop."

wardrobe_rendering_rules:
  purpose: "Render only wardrobe explicitly present in the original prompt and never turn context, style, modesty, or identity into new clothing."
  explicit_only: true
  must_render: [explicit_wardrobe_items, explicit_absence_states, material_physics_only_for_existing_items]
  must_not_auto_render: [unspecified_upper_clothing, unspecified_lower_clothing, underwear, swimwear, outerwear, towel_wrap, fabric_wrap, body_paint, context_inferred_wardrobe]
  cleanup_rule: "Remove any garment or garment-material effect not explicitly present in the original prompt; retain non-garment coverage through pose, crop, object occlusion, or shadow."

adult_pose_rendering_rules:
  purpose: "Preserve requested adult pose intensity while rendering it as a physically coherent, camera-compatible body line."
  adult_content_allowed: true
  hard_restriction_only: [underage, childlike]
  must_render_when_relevant:
    - adult_age_clarity
    - adult_pose_tier
    - pose_category
    - body_line_strategy
    - support_points
    - hand_intent
    - pelvis_leg_alignment
    - lens_pose_compatibility
    - garment_pose_interaction
    - fabric_physics
  rules:
    - "Do not auto-downgrade adult glamour, boudoir, swimwear, implied-nude, artistic figure, or explicit adult pose intent."
    - "Render support, contact, and weight distribution before aesthetic body-line language."
    - "For adult figure contexts, retain mature presentation and strategic coverage geometry where requested."
    - "Use only the concise underage/childlike guard; do not add broad adult-content suppression."

# ------------------------------------------------------------
# 4. Renderer Profiles
# ------------------------------------------------------------

renderer_profiles:

  chatgpt_image:
    profile_name: "natural_language_semantic"
    best_for:
      - "ChatGPT Image / GPT Image style generation"
      - "high semantic prompts"
      - "complex visual intent"
      - "cinematic or editorial scenes"
    final_output_shape:
      prompt: string
      avoid: string
      locked_constraints: list_optional
      model_target: "chatgpt_image"
    prompt_style:
      syntax: "natural language paragraph"
      abstraction_tolerance: "high"
      sentence_structure: "complete descriptive sentences"
      allow_cinematography_terms: true
      allow_composition_terms: true
      allow_mood_terms: true
      positive_negative_split: false
    recommended_length:
      quick: "140-260 words"
      standard: "260-520 words"
      detailed: "520-850 words"
      production: "850-1200 words"
    field_order:
      - subject_identity
      - required_constraints
      - shot_and_composition
      - style_and_medium
      - lighting_and_exposure
      - material_and_color
      - background_and_atmosphere
      - output_specs
      - avoid_sentence
    rendering_rules:
      - "Use natural language with clear semantic relationships."
      - "If the source prompt is short, expand it into a complete image brief rather than mirroring the short input."
      - "Fill missing but necessary visual decisions: subject role, composition, light, material response, background depth, atmosphere, and output constraints."
      - "For people, make anatomy, body balance, hands, expression, gaze target, skin texture, and face lighting physically believable."
      - "For text, logos, covers, posters, labels, or UI, preserve requested text intent and avoid broad no-text suppression."
      - "For professional photographic quality, describe visible camera position, light motivation, shadow behavior, subject separation, and material response instead of dumping equipment names."
      - "Keep technical camera terms only if they improve visual clarity."
      - "Prefer visible lighting effects over equipment names."
      - "Avoid long comma-only keyword chains."
      - "Use a short natural-language avoid sentence instead of a huge negative list."
      - "When a cover or poster is requested, preserve the typography or masthead intent instead of suppressing all text."
    avoid_style:
      format: "single concise sentence"
      max_items: 8
      example: "Avoid cropped hands, plastic skin, random text, watermark, distorted anatomy, and visible studio equipment."
    example:
      prompt: >
        A photorealistic waist-up fashion portrait of an adult woman standing between two semi-transparent frosted glass panels.
        She is placed on the left third of the frame with generous negative space to the right. Soft diffused light comes
        from camera-right, creating smooth facial shadows and natural catchlights. The image uses natural skin texture,
        warm neutral tones, and a restrained luxury editorial mood with softly blurred background separation.
      avoid: >
        Avoid cropped hands, plastic skin, random text, watermark, distorted anatomy, door handles, hinges, and visible studio equipment.

  chatgpt_image_2:
    profile_name: "prompt_only_generate_and_revise"
    best_for:
      - "GPT Image 2 prompt-only workflow (no image upload, no API)"
      - "producing two copy-paste-ready text blocks for ChatGPT"
      - "generate_prompt: high-quality generation prompt for a new image"
      - "revise_prompt: targeted revision prompt that preserves locked attributes"
    final_output_shape:
      generate_prompt: string
      revise_prompt: string_optional
      model_target: "chatgpt_image_2"
    prompt_style:
      syntax: "natural language paragraph, two distinct formats"
      abstraction_tolerance: "high"
      sentence_structure: "generate_prompt: complete descriptive sentences, subject + hard constraints first; revise_prompt: change-target first, preserve locks middle, stable closure last"
      allow_cinematography_terms: true
      allow_composition_terms: true
      positive_negative_split: false
    recommended_length:
      generate_prompt: "200-600 words"
      revise_prompt: "80-250 words"
    field_order:
      generate_prompt:
        - subject_identity_and_hard_locks
        - composition_and_framing
        - lighting_and_exposure
        - material_and_color
        - background_and_atmosphere
        - text_or_publication_if_any
      revise_prompt:
        - change_target_intent
        - preserve_locks
        - stable_closure
    rendering_rules:
      generate:
        - "Output exactly one generate_prompt block in natural language."
        - "Lead with subject identity and all hard constraints (P100-P97)."
        - "Then describe composition, framing, and camera position."
        - "Then lighting, exposure, color, and material behavior."
        - "Then background depth, environment, and atmosphere."
        - "Lastly text, logo, or publication layout intent if present."
        - "Do NOT use YAML, tags, or avoid-syntax inside the generate_prompt block."
        - "Use complete descriptive sentences with clear spatial relationships."
        - "Preserve all explicit user constraints as hard locks — never drop or generalize them."
        - "Fill missing visible decisions (light direction, shadow behavior, material response) without inventing new subject intent."
      revise:
        - "Output exactly one revise_prompt block when the user requests a change to an existing image."
        - "The revise_prompt MUST begin with the change target: start with '只修改' (Chinese) or 'Change only' (English) followed by exactly what should differ."
        - "Then list preserved locks derived from the original hard constraints: identity, number of people/objects, composition, camera position, layout, typography, color palette, lighting, and any attribute not named in the change target."
        - "End with the stable closure sentence: '其餘所有可見元素保持不變' (Chinese) or 'All other visible elements remain unchanged' (English)."
        - "Do NOT require the user to provide an original image summary — the prompt itself states what to preserve."
        - "Do NOT add global restyling, new background, new props, or enhance unspecified attributes unless they are the explicit change target."
        - "If the change target is ambiguous, ask the user to clarify rather than guessing the scope."
    example:
      generate_prompt: >
        A photorealistic waist-up fashion portrait of an adult woman with natural skin texture,
        standing between two semi-transparent frosted glass panels. She is placed on the left third
        of the frame with generous negative space to the right. Soft diffused light comes from
        camera-right, creating smooth facial shadows and natural catchlights. The image uses warm
        neutral tones with a restrained luxury editorial mood. The background features softly blurred
        architectural elements behind the glass panels, providing depth without distraction.
      revise_prompt: >
        只修改光線方向：將光線改為來自左側的暖色午後陽光，產生更長的陰影和溫暖的膚色調。
        保持不變：人物身份、臉部、姿勢、構圖、鏡位、玻璃面板位置、背景建築、材質、配色。
        其餘所有可見元素保持不變。

  comfyui_flux2_zimage_3stage:
    profile_name: "shared_positive_zimage_negative"
    best_for:
      - "ComfyUI three-stage generation"
      - "Flux.2 Dev sketch / composition pass"
      - "Z-Image Base reconstruction and material/detail pass"
      - "Z-Image Turbo polish pass"
      - "workflows where all stages share one positive prompt but only Z Image stages receive negative prompt"
    final_output_shape:
      shared_positive_prompt: string
      z_image_negative_prompt: string
      stage_notes:
        flux2_dev: "use shared_positive_prompt only"
        z_image_base: "use shared_positive_prompt + z_image_negative_prompt"
        z_image_turbo: "use same shared_positive_prompt + z_image_negative_prompt, optionally lower denoise/strength in workflow"
      model_target: "comfyui_flux2_zimage_3stage"
    prompt_style:
      syntax: "dense but readable subject-first visual phrases"
      abstraction_tolerance: "low_to_medium"
      sentence_structure: "comma-separated phrase groups; no YAML inside model prompt"
      allow_cinematography_terms: "only visible effects"
      allow_composition_terms: true
      allow_mood_terms: "one dominant look only"
      positive_negative_split: true
      negative_prompt_applies_to: "z_image_base_and_z_image_turbo_only"
    recommended_length:
      shared_positive_prompt: "180-320 words standard, 320-440 words for complex covers, products, architecture, explicit text, or multi-subject scenes"
      z_image_negative_prompt: "45-110 words"
    shared_positive_order:
      - flux_composition_skeleton
      - subject_identity_and_hard_locks
      - pose_action_expression_gaze
      - anatomy_structure_positive_guardrails
      - shot_scale_camera_perspective
      - lighting_motivation_and_shadow_behavior
      - material_skin_fabric_surface_physics
      - background_depth_and_environment
      - text_logo_publication_intent_if_any
      - output_specs
    positive_prompt_rules:
      - "The shared positive prompt must be valid for Flux.2 Dev with no negative prompt support."
      - "Do not put forbidden terms, 'no X', 'avoid X', or failure wording in the shared positive prompt."
      - "Use constructive positive replacements: say correct anatomy, clean hands, readable text, stable geometry, natural skin texture, and physically coherent fabric."
      - "Lead with composition and subject scale so Flux.2 Dev sketches the correct layout before Z Image adds detail."
      - "Keep texture and polish details after composition, subject, pose, and camera so they do not overpower the sketch stage."
      - "Preserve all hard locks exactly, including identity, pose, garment, adult content category, exact text, and aspect ratio."
      - "Use one coherent style target; avoid mixing cinematic, product render, anime, editorial, and documentary unless the user explicitly asks."
      - "Use positive anatomy and geometry guardrails before relying on the Z Image negative prompt."
      - "For multi-subject action scenes, keep the shared event source, effect direction, subject reactions, and support plane in the shared positive prompt so Flux.2 Dev sketches the correct interaction."
      - "When benchmark_learning_required is true, place the benchmark scene decisions before polish details: camera/framing, motivated lighting, subject identity and pose support, material response, environment depth, layout/text policy, action mechanics, and palette roles."
    z_image_negative_rules:
      - "Only Z-Image Base and Z-Image Turbo use the negative prompt."
      - "Put model failure terms here, not in the shared positive prompt."
      - "Keep task-specific high-risk negatives: deformed anatomy/hands, misplaced landmarks, wrong gaze/expression, fake text/logos, warped geometry, floating cloth, wetness contradictions, watermark."
      - "For Image 2.0 benchmark repair, include drift negatives for unrelated genre redesign, unrequested background style, single-color palette takeover, simplified generic hero object, repeated support panels, broken editorial grid, and random fake text when relevant."
      - "Do not include broad generic spam such as worst quality, bad quality, lowres, masterpiece."
      - "For mature content, only add age-safety negatives for underage or childlike cues."
      - "Do not use the negative prompt to censor requested adult nudity, adult genital visibility, gore, or explicit adult intent."
    stage_balance:
      flux2_dev:
        priority:
          - "composition skeleton"
          - "subject position and scale"
          - "pose silhouette"
          - "camera angle and crop"
          - "large lighting direction"
        avoid_in_shared_positive:
          - "long failure lists"
          - "negative syntax"
          - "micro-detail before layout"
      z_image_base:
        priority:
          - "subject reconstruction"
          - "anatomy and facial realism"
          - "material and fabric physics"
          - "lighting/shadow/material response"
          - "geometry and text integrity"
      z_image_turbo:
        priority:
          - "polish and cleanup"
          - "skin/fabric/detail finish"
          - "artifact suppression through z_image_negative_prompt"
          - "do not change composition from Flux/Base unless workflow strength allows it"
    positive_prompt_modules:
      always_keep:
        - "clear composition skeleton"
        - "subject scale and crop"
        - "camera perspective"
        - "pose silhouette and expression/gaze"
        - "positive anatomy and geometry guardrails"
        - "lighting direction and material response"
        - "skin/fabric/wetness physics when relevant"
        - "exact text or publication intent when relevant"
        - "multi-subject event source and reaction logic when relevant"
        - "ensemble character differentiation when relevant"
        - "controlled wide-angle selfie perspective when relevant"
        - "selfie perspective without visible phone unless explicitly requested"
        - "character IP silhouette, hair, face, palette, costume, prop, archetype, and worldbuilding locks when relevant"
        - "benchmark scene-transfer locks when learning from a stronger Image 2.0 reference: camera height, shot scale, light motivation, subject support, material response, background depth, layout policy, palette discipline, and post-layout text strategy"
      benchmark_scene_transfer:
        add_when_relevant:
          - "camera distance, camera height, and subject scale explicitly defined"
          - "motivated light source with visible shadow and highlight behavior"
          - "subject pose support or action contact point clearly defined"
          - "skin, fabric, water, glass, metal, paper, or object materials described by visible cause-and-effect"
          - "background has specific location anchors and controlled depth planes"
          - "layout/text policy selected before generation: exact short text, placeholder blocks, reserve space, or post-layout"
          - "palette roles are explicit and prevent single-color takeover"
      character_ip_identity:
        add_when_relevant:
          - "highly recognizable character IP design"
          - "strong silhouette readability and signature outline"
          - "distinctive hair silhouette with preserved color, bang shape, side locks, volume, and accessory"
          - "recognizable face impression, consistent eye shape, signature expression, and character-specific gaze"
          - "locked primary, secondary, accent, metal, glow, and eye color hierarchy"
          - "iconic costume structure with clear color blocking, emblem, signature accessory, and clean garment construction"
          - "signature prop or weapon clearly visible when it defines the character"
          - "archetype-consistent pose, expression, gesture, and camera relation"
          - "subtle worldbuilding motifs and environment support the character universe"
          - "allowed variations limited to pose, camera angle, lighting, background, seasonal outfit detail, and expression within character range"
      ensemble_character_selfie:
        add_when_relevant:
          - "premium ensemble selfie with distinct adult characters"
          - "controlled wide-angle camera held close to the group"
          - "faces arranged in a diamond or triangular cluster"
          - "one optional foreground selfie arm adds depth without covering faces"
          - "no visible phone or selfie stick unless explicitly requested"
          - "each subject has a different hair color, hairstyle, outfit silhouette, accessory motif, and expression"
          - "shared night pool-party lighting, wet hair strands, skin droplets, foam texture, and glossy costume materials"
          - "neon cyan and warm practical lights separate faces from the layered background"
      visible_selfie_device:
        add_only_when_explicitly_requested:
          - "visible phone, mirror selfie, selfie stick, GoPro, or vlog camera is included only because the user requested it"
          - "device hand, screen or lens direction, and occlusion limits are clear"
          - "device does not cover eyes, mouth, face identity, important wardrobe, text, product, or hero details unless requested"
      group_pool_water_splash:
        add_when_relevant:
          - "clear group pool composition with distinct subjects"
          - "one visible subject causes the central splash"
          - "hands scooping or clapping water with readable palms and fingers"
          - "directional water arc with larger droplets near the hands and fine mist above"
          - "varied reactions and gaze toward the same splash"
          - "consistent shallow-water plane, planted feet, ankle waterline, ripples, and foam"
          - "wet swimwear, skin droplets, and sunlit water highlights"
    negative_prompt_modules:
      include_when_relevant:
        - "deformed anatomy, bad hands, extra fingers"
        - "misplaced nipple, floating areola, wrong intimate anatomy"
        - "dead eyes, forced grin, wrong gaze"
        - "floating cloth, fabric clipping, fake transparency"
        - "dry towel in a just-showered scene"
        - "source-less splash, floating water overlay, uniform particle spray"
        - "merged hands, fused fingers behind splash, floating feet, inconsistent water depth"
        - "dry swimwear in pool, cloned expressions"
        - "same face repeated, cloned hairstyle, identical outfits, warped selfie face, foreground hand covering faces, visible phone unless requested, extra selfie stick"
        - "generic character, weak silhouette, changed hairstyle, wrong color palette, missing emblem, missing signature prop, face identity drift, costume drift, wrong personality expression"
        - "unrelated genre redesign, unrequested background style, single-color palette takeover, broken editorial grid, repeated duplicate support panels"
        - "warped product geometry, bent architecture, wrong vehicle wheels"
        - "random unreadable text, misspelled text, fake logos"
        - "watermark"
        - "underage or childlike cues when mature content is present"
    example:
      shared_positive_prompt: >
        photorealistic adult fashion editorial image, clear waist-up composition with the subject centered slightly left,
        stable headroom and chest-level camera perspective, adult woman after shower in a humid bathroom, damp hair clumped
        into natural strands, wet skin droplets on face, neck, shoulders, and collarbones, opaque thick white terry towel
        wrapped around torso with visible top-edge thickness, one edge slipping diagonally downward while the opposite edge
        remains lightly held, correct skin-towel occlusion, natural facial micro-expression and clear gaze, realistic skin
        pores and subtle tone variation, soft warm bathroom light diffused through steam from camera-left, cooler tile bounce
        in the shadows, terry towel texture preserved in highlights, background glass and tile softly layered without stealing focus
      z_image_negative_prompt: >
        deformed hands, extra fingers, misplaced nipple, floating areola, nipple on towel, wrong intimate anatomy, plastic skin,
        dead eyes, forced grin, floating towel, towel clipping through body, fake transparency, dry towel in a just-showered scene,
        random unreadable text, watermark, underage, childlike

  z_image_base:
