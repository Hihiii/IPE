    prompt_style:
      syntax: "structured preserve-and-refine sections with [SECTION HEADER] labels"
      abstraction_tolerance: "medium"
      sentence_structure: "open with global preserve+refine statement, then [SUBJECT LOCK] [POSE LOCK] [CLOTHING / DESIGN] [LIGHTING / MATERIAL] [DO NOT CHANGE]"
      allow_cinematography_terms: "only visible effects"
      allow_composition_terms: "yes when visualized"
      allow_mood_terms: "compressed to one dominant look"
      positive_negative_split: true
    recommended_length:
      standard: "180-320 words"
      detailed: "320-480 words for complex covers, multi-subject scenes, vehicles, architecture, or exact text"
      negative_prompt: "40-120 words"
