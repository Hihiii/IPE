          - "motivated lighting with coherent shadow falloff"
          - "realistic skin pores and subtle tone variation"
          - "fabric fit, opening, translucency, and wetness follow physical cause"
          - "contact shadows and ambient occlusion under overlaps"
          - "material-specific roughness and specular highlights"
          - "clean geometry and background depth supporting the hero subject"
      human_portrait:
