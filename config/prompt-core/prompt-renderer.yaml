# ------------------------------------------------------------
# 5. Model-Specific Completeness-Preserving Cleanup Rules
# ------------------------------------------------------------

model_specific_compression:
  chatgpt_image:
    compression_level: "none_for_length"
    keep:
      - semantic_relationships
      - clear constraints
      - visual hierarchy
      - natural lighting description
      - material realism
    remove:
      - repeated mood synonyms
      - raw equipment names
      - excessive tag chains

  chatgpt_image_2:
    compression_level: "none_for_length"
    keep:
      - generate_prompt: subject_identity_hard_locks
      - generate_prompt: composition_framing
      - generate_prompt: lighting_color_material
      - generate_prompt: background_atmosphere
      - revise_prompt: change_target_scope
      - revise_prompt: preserve_locks
      - revise_prompt: stable_closure
    remove:
      - avoid_sentences
      - YAML formatting
      - model_technical_terms

  z_image_base:
    compression_level: "none_for_length"
    keep:
      - all section headers [SUBJECT LOCK] [POSE LOCK] [CLOTHING / DESIGN] [LIGHTING / MATERIAL] [DO NOT CHANGE]
      - intro preserve+refine statement
      - subject identity in subject_lock
      - pose mechanics in pose_lock
      - clothing and material detail in clothing_and_design
      - lighting and shadow behavior in lighting_and_material
      - full do_not_change lock list
      - top 8-16 negative risks
    remove:
      - abstract cinematography theory
      - equipment lists
      - repeated quality adjectives
      - long narrative explanations
      - redundant mood clusters

  z_image_turbo:
    compression_level: "none_for_length"
    keep:
      - all six section headers [SUBJECT] [POSE / ACTION] [CLOTHING / DESIGN] [LIGHTING / MATERIAL] [SCENE] [COMPOSITION]
      - subject identity in subject
      - pose and action detail in pose_and_action
      - clothing and key materials in clothing_and_design
      - lighting direction in lighting_and_material
      - environment anchors in scene
      - framing decisions in composition
      - all task-specific negative risks that prevent visible failures
    remove:
      - abstract cinematography theory
      - long storytelling explanations
      - redundant adjectives
      - unnecessary camera specs
      - multiple color theory labels

  stable_diffusion:
    compression_level: "syntax_optimized_not_length_limited"
    keep:
      - strong tags
      - subject descriptors
      - style anchor
      - shot/crop tags
      - material/lighting tags
      - negative failure tags
    remove:
      - long prose
      - explanatory clauses
      - nested YAML-like structure

  midjourney:
    compression_level: "syntax_optimized_not_length_limited"
    keep:
      - subject
      - dominant aesthetic
      - shot/composition
      - lighting/color
      - aspect ratio parameters
    remove:
      - deep technical detail
      - long avoid list
      - negative list unless essential

  flux:
    compression_level: "semantic_clean_not_length_limited"
    keep:
      - all six section headers [MAIN IMAGE GOAL] [POSE / ACTION] [COMPOSITION] [SCENE / DEPTH] [LIGHTING / MOOD] [AVOID]
      - subject identity in main_image_goal
      - pose specificity in pose_and_action
      - composition rules in composition
      - depth layers in scene_and_depth
      - lighting direction in lighting_and_mood
      - clear avoid list
    remove:
      - section redundancy across sections
      - SD-style keyword spam
      - excessive weights
      - contradictory style labels

  image_edit:
    compression_level: "scope_preserving"
    keep:
      - edit target
      - change_only fields
      - locked attributes
      - forbidden changes
    remove:
      - global restyling unless requested
      - unrelated enhancements
      - new background or props unless requested

  video_prompt:
    compression_level: "motion_structured"
    keep:
      - stable first frame
      - subject motion
      - secondary motion
      - camera motion
      - continuity guardrails
    remove:
      - static-only details that do not support motion
      - overly complex text/logo details unless required

