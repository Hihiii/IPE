      - preserve_and_refine_intro
      - subject_lock
      - pose_lock
      - clothing_and_design
      - lighting_and_material
      - do_not_change
    rendering_rules:
      - "Open with: 'Preserve the original composition, pose, camera angle, crop, and background layout from the input image. Refine into [target style/quality].'"
      - "[SUBJECT LOCK]: 'Keep [subject identity / face / body / expression].' Explicitly state what stays identical."
      - "[POSE LOCK]: 'Keep [pose/action/hand placement/gaze].' Lock all body mechanics."
      - "[CLOTHING / DESIGN]: 'Refine [main outfit], [fabric], [construction details], [color palette]. Do not add extra clothing layers or random accessories.'"
      - "[LIGHTING / MATERIAL]: 'Improve [skin/fabric/glass/metal/shadows/reflections].' Target specific material quality upgrades."
      - "[DO NOT CHANGE]: 'Do not change [identity, pose, outfit type, scene, camera angle, crop, background structure].' Comprehensive lock list derived from hard constraints."
      - "Use full sentences within sections, not comma-tagging."
      - "Translate master-level photography into visible effects: camera height, perspective, subject separation, catchlights, shadow shape, material response."
      - "Remove abstract film theory, production jargon, equipment lists, and repeated quality adjectives."
      - "For mature styling, preserve requested adult explicitness and add only compact age-safety negatives for underage or childlike cues."
