      - "higher-detail local generation"
      - "ComfyUI text-to-image workflows"
      - "image refinement tasks that lock source composition while improving quality"
      - "portraits, fashion/editorial, products, covers/posters, architecture, vehicles, and complex scenes"
    final_output_shape:
      positive_prompt: string
      negative_prompt: string
      prompt_short: string_optional
      prompt_standard: string_optional
      publication_mode: string_optional
