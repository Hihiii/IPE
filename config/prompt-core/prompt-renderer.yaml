# ------------------------------------------------------------
# 7. Renderer Conflict Resolution
# ------------------------------------------------------------

renderer_conflict_resolution:
  raw_json_to_model:
    problem: "User or system attempts to pass structured JSON/YAML directly to a T2I model."
    rule: "Render JSON/YAML into the target model's final prompt syntax unless the workflow parser explicitly consumes structured fields."
    fix: "Use universal_package internally, then call selected renderer."

  chatgpt_prompt_sent_to_z_turbo:
    problem: "ChatGPT Image paragraph syntax performs poorly in Z Image Turbo."
    symptoms:
      - weak subject adherence
      - style drift
      - ignored composition details
      - noisy or generic output
    fix:
      - "Convert prose into Z-Image visual phrase syntax without deleting meaningful image details."
      - "Convert abstract terms into visible visual phrases."
      - "Split positive and negative prompts."
      - "Put subject, style, shot, and composition first."

  z_turbo_prompt_sent_to_chatgpt:
    problem: "Overly terse comma-tag prompt may underuse ChatGPT Image semantic capability."
    fix:
      - "Render as natural language with spatial relationships and intent."
      - "Keep concise avoid sentence."

  style_mode_conflict:
    problem: "Prompt contains multiple incompatible rendering modes."
    rule: "One dominant style mode per final prompt. Other references become design cues."
    examples:
      photorealistic_cosplay: "photorealistic real-life cosplay with character-inspired design cues"
      anime_realism: "anime-realism illustration with realistic proportions and stylized face design"

  cover_requested_but_text_suppressed:
    problem: "Prompt asks for a cover or poster, but renderer removes all typography intent."
    rule: "Preserve the cover/poster text intent unless the workflow explicitly requests text-safe empty areas only."
    fixes:
      unspecified_text: "use a large masthead plus a few clean supporting cover lines or placeholder editorial text"
      explicit_text: "use the requested title or cover text and simplify it for readability if needed"
      post_added_text: "use clear empty masthead and cover-line safe zones only if later typography will be composited manually"

  positive_negative_contradiction:
    problem: "Negative prompt forbids a required positive element."
    fixes:
      required_logo_and_no_logo: "replace 'no logo' with 'no random extra logos'"
      required_text_and_no_text: "replace 'no text' with 'no random extra text, only specified text'"
      required_motion_and_no_blur: "replace 'no blur' with 'hero detail sharp, motion blur limited to background or moving edges'"
      required_vehicle_speed_and_blurry_subject: "replace broad 'blurry subject' with 'blurred car body, soft grille, melted headlights, warped wheels' while keeping background streaks, wheel rotation blur, rain streaks, and road-line motion"

  automotive_motion_semantic_drift:
    problem: "High-speed vehicle prompt becomes static, physically incoherent, or overlit by impossible beams."
    symptoms:
      - "speed language but parked-looking car"
      - "diagonal spotlight crossing the vehicle"
      - "headlights not aligned with car travel"
      - "water spray detached from tire contact"
      - "car body blurred instead of background and wheels"
    fixes:
      - "state sharp panned car body with horizontally streaked background"
      - "place spinning wheel blur only on wheels and road contact motion"
      - "define tire contact patches cutting through shallow water with spray thrown outward and backward"
      - "align headlight beams forward through rain mist"
      - "protect correct grille, symmetrical headlights, clean wheel geometry, and recognizable coupe proportions"

  shared_positive_with_negative_language:
    problem: "A shared positive prompt used by Flux.2 Dev contains negative syntax or failure terms."
    rule: "For the ComfyUI Flux.2 Dev -> Z-Image Base -> Z-Image Turbo workflow, keep all avoid/failure terms out of shared_positive_prompt and place them only in z_image_negative_prompt."
    fixes:
      no_bad_hands_in_positive: "replace 'no bad hands' with 'natural hand structure' in shared_positive_prompt; put 'bad hands, extra fingers' in z_image_negative_prompt"
      no_text_in_positive: "replace 'no random text' with 'only specified text, clean readable typography' in shared_positive_prompt; put 'random unreadable text' in z_image_negative_prompt"
      no_deformed_anatomy_in_positive: "replace 'no deformed anatomy' with 'natural body proportions and coherent anatomy' in shared_positive_prompt; put 'deformed anatomy' in z_image_negative_prompt"

  equipment_leak:
    problem: "Final prompt includes lighting equipment terms that may be rendered as objects."
    fix: "Replace equipment with visible lighting effect phrases."

# ------------------------------------------------------------
# 8. Advisory Length Guidance
# ------------------------------------------------------------

advisory_length_guidance:
  enforcement: "disabled"
  purpose: "Reference only. Do not trim final prompts to fit these ranges unless the user explicitly asks for a shorter prompt or a downstream tool has a known hard limit."
  completeness_priority: "subject identity, hard locks, character matrices, anatomy, expression/gaze, pose mechanics, text/logo intent, product/vehicle/architecture geometry, water/fabric physics, lighting direction, material response, and scene logic outrank any length target."
  chatgpt_image:
    quick: { words: "140-260", use_for: "simple concept or minor prompt enhancement" }
    standard: { words: "260-520", use_for: "normal image generation with rich visual specificity" }
    detailed: { words: "520-850", use_for: "complex cinematic / commercial image" }
    production: { words: "850-1200", use_for: "hero poster or complex multi-layer scene" }

  chatgpt_image_2:
    generate_prompt: { words: "200-600", use_for: "GPT Image 2 generation prompt" }
    revise_prompt: { words: "80-250", use_for: "GPT Image 2 targeted revision prompt" }

  z_image_base:
    simple: { words: "140-220", use_for: "simple subject with complete visual control" }
    standard: { words: "200-360", use_for: "recommended base-model default with complete visual detail" }
    max_detailed: { words: "360-480", use_for: "complex cover/poster, exact text, vehicle, product, architecture, or multi-subject scene" }
    negative_prompt: { words: "40-120", use_for: "category-specific failure controls" }

  z_image_turbo:
    simple: { words: "140-220", use_for: "single subject with complete visual control" }
    standard: { words: "220-360", use_for: "recommended default with explicit composition, lighting, material, and scene detail" }
    complex: { words: "360-480", use_for: "cover/poster, vehicle, product, architecture, exact text, or multi-subject scene" }
    negative_prompt: { words: "30-110", use_for: "specific high-risk failure controls" }

  comfyui_flux2_zimage_3stage:
    shared_positive_prompt: { words: "180-320", use_for: "single positive prompt shared by Flux.2 Dev sketch, Z-Image Base reconstruction, and Z-Image Turbo polish" }
    shared_positive_max: { words: "320-440", use_for: "complex covers, products, architecture, exact text, multi-subject, or anatomy-sensitive scenes" }
    z_image_negative_prompt: { words: "45-110", use_for: "Z-Image Base/Turbo only; task-specific failure controls and age-safety negatives when needed" }

  stable_diffusion:
    positive_prompt: { tokens: "120-320", use_for: "tag prompt with richer subject and guardrail detail" }
    negative_prompt: { tokens: "30-120", use_for: "task-specific failure controls" }

  midjourney:
    prompt: { words: "60-160", use_for: "compact but not skeletal aesthetic command" }

  flux:
    standard: { words: "140-300", use_for: "clear semantic prompt" }
    detailed: { words: "300-480", use_for: "complex but still clean prompt" }

  image_edit:
    edit_instruction: { words: "40-160", use_for: "targeted edit with locks" }

  video_prompt:
    scene_prompt: { words: "80-220", use_for: "stable first frame" }
    motion_prompt: { words: "20-80", use_for: "motion/camera direction" }

# ------------------------------------------------------------
# 9. Output Templates
# ------------------------------------------------------------

output_templates:
  chatgpt_image:
    yaml_shape: |
      final_prompt:
        model_target: "chatgpt_image"
        renderer_profile: "natural_language_semantic"
        suggest_resolution: "<resolution or aspect-ratio-specific recommendation>"
        prompt: >
          <natural language prompt>
        avoid: >
          <concise avoid sentence>
        locked_constraints:
          - <optional hard lock>
        user_status: "pending | accepted | modified"

  chatgpt_image_2:
    yaml_shape: |
      final_prompt:
        model_target: "chatgpt_image_2"
        renderer_profile: "prompt_only_generate_and_revise"
        generate_prompt: >
          <natural language prompt for new image generation>
          subject and hard locks first, then composition, lighting, materials, background, text
        revise_prompt: >  # only when revision is requested
          只修改 <change target>。
          保持不變：<preserve locks derived from hard constraints>。
          其餘所有可見元素保持不變。
        user_status: "pending | accepted | modified"

  z_image_turbo:
    yaml_shape: |
      final_prompt:
        model_target: "z_image_turbo"
        renderer_profile: "structured_preserve_and_refine_turbo"
        suggest_resolution: "<resolution or aspect-ratio-specific recommendation>"
        positive_prompt: |
          [SUBJECT]
          <subject identity / face / body / expression / gaze>.

          [POSE / ACTION]
          <pose, action, weight shift, body angle, hand placement, gaze direction>.

          [CLOTHING / DESIGN]
          <main outfit, fabric, construction details, color palette>. Do not add extra clothing layers or random accessories.

          [LIGHTING / MATERIAL]
          <key light direction, fill/rim, color mood, material response for skin/fabric/glass/metal>.

          [SCENE]
          <environment, background type, depth planes, atmosphere, location anchors>.

          [COMPOSITION]
          <aspect ratio, shot scale, camera angle, subject placement, negative space, crop rules>.
        negative_prompt: >
          <specific task-specific negative prompt>
        publication_mode: "exact_text_mode | implied_cover_text_mode | text_safe_layout_only_mode"
        locked_constraints:
          - <optional hard lock>
        user_status: "pending | accepted | modified"

  z_image_base:
    yaml_shape: |
      final_prompt:
        model_target: "z_image_base"
        renderer_profile: "structured_preserve_and_refine"
        suggest_resolution: "<resolution or aspect-ratio-specific recommendation>"
        positive_prompt: |
          Preserve the original composition, pose, camera angle, crop, and background layout from the input image. Refine into <target style/quality>.

          [SUBJECT LOCK]
          Keep <subject identity / face / body / expression>.

          [POSE LOCK]
          Keep <pose/action/hand placement/gaze>.

          [CLOTHING / DESIGN]
          Refine <main outfit>, <fabric>, <construction details>, <color palette>. Do not add extra clothing layers or random accessories.

          [LIGHTING / MATERIAL]
          Improve <skin/fabric/glass/metal/shadows/reflections>.

          [DO NOT CHANGE]
          Do not change <identity, pose, outfit type, scene, camera angle, crop, background structure>.
        negative_prompt: >
          <category-specific negative prompt>
        publication_mode: "exact_text_mode | implied_cover_text_mode | text_safe_layout_only_mode"
        locked_constraints:
          - <optional hard lock>
        user_status: "pending | accepted | modified"

  comfyui_flux2_zimage_3stage:
    yaml_shape: |
      final_prompt:
        model_target: "comfyui_flux2_zimage_3stage"
        renderer_profile: "shared_positive_zimage_negative"
        suggest_resolution: "<shared workflow resolution recommendation>"
        shared_positive_prompt: >
          <one positive prompt shared by Flux.2 Dev, Z-Image Base, and Z-Image Turbo>
        z_image_negative_prompt: >
          <negative prompt used only by Z-Image Base and Z-Image Turbo>
        stage_usage:
          flux2_dev: "shared_positive_prompt only"
          z_image_base: "shared_positive_prompt + z_image_negative_prompt"
          z_image_turbo: "shared_positive_prompt + z_image_negative_prompt"
        locked_constraints:
          - <optional hard lock>
        user_status: "pending | accepted | modified"

  stable_diffusion:
    yaml_shape: |
      final_prompt:
        model_target: "stable_diffusion"
        renderer_profile: "positive_negative_tagged"
        suggest_resolution: "<model-native width x height recommendation>"
        positive_prompt: >
          <comma-separated positive prompt>
        negative_prompt: >
          <comma-separated negative prompt>
        parameters:
          aspect_ratio: <optional>
          width: <optional>
          height: <optional>
          sampler: <optional>
          steps: <optional>
          cfg: <optional>
        user_status: "pending | accepted | modified"

  midjourney:
    yaml_shape: |
      final_prompt:
        model_target: "midjourney"
        renderer_profile: "compact_aesthetic_command"
        suggest_resolution: "<aspect-ratio recommendation; Midjourney renders size internally>"
        prompt: >
          <compact prompt> --ar <ratio> <optional parameters> --no <essential avoid terms>
        user_status: "pending | accepted | modified"

  flux:
    yaml_shape: |
      final_prompt:
        model_target: "flux"
        renderer_profile: "structured_section_prompt"
        suggest_resolution: "<resolution or aspect-ratio-specific recommendation>"
        prompt: |
          [MAIN IMAGE GOAL]
          <one-liner: Create a [style] image of [subject] in [scene].>

          [POSE / ACTION]
          <pose, weight shift, body angle, hand task, gaze. Must feel natural and intentional.>

          [COMPOSITION]
          <aspect ratio, shot scale, camera angle, subject placement, negative space, crop rules>

          [SCENE / DEPTH]
          Foreground: <foreground element>.
          Midground: <main subject>.
          Background: <background role>.
          Create clear depth layers.

          [LIGHTING / MOOD]
          <key light, fill/rim, color mood, material response>

          [AVOID]
          Avoid <main failure modes>.
        negative_prompt: ""  # avoid is embedded in prompt
        user_status: "pending | accepted | modified"

  image_edit:
    yaml_shape: |
      final_prompt:
        model_target: "image_edit"
        renderer_profile: "edit_instruction_with_locks"
        suggest_resolution: "match source image resolution unless resize is requested"
        edit_instruction: >
          <what to change>
        must_preserve:
          - <locked attribute>
        change_only:
          - <editable attribute>
        avoid:
          - <forbidden change>
        user_status: "pending | accepted | modified"

  video_prompt:
    yaml_shape: |
      final_prompt:
        model_target: "video_prompt"
        renderer_profile: "motion_ready_scene_prompt"
        suggest_resolution: "<video frame size recommendation>"
        scene_prompt: >
          <stable first-frame description>
        motion_prompt: >
          <subject and secondary motion>
        camera_motion: >
          <optional camera movement>
        negative_prompt: >
          <continuity and artifact avoid terms>
        user_status: "pending | accepted | modified"

  phase_5_txt_export:
    yaml_shape: |
      final_prompt_txt_export:
        required: true
        filename_pattern: "final_YYYYMMDD_HHMMSS.txt"
        output_directory: "ABSOLUTE_USER_DESKTOP/comfyui_prompt"
        desktop_resolution: "Resolve the real user Desktop first, then append comfyui_prompt. Use XDG_DESKTOP_DIR from ~/.config/user-dirs.dirs on Linux when available; otherwise use the user's standard Desktop folder."
        forbid_relative_output_directory: true
        forbidden_output_directories:
          - "skill folder"
          - "repository folder"
          - "current working directory"
          - "relative desktop/comfyui_prompt"
        if_filename_exists: "create a new suffixed file such as final_YYYYMMDD_HHMMSS_01.txt; do not overwrite"
        create_output_directory_if_missing: true
        writer: "scripts/write_final_prompt_txt.py"
        export_selected_renderer_only: false
        export_family_variants: true
        enable_family_variants_only_when_explicitly_requested: false
        family_variant_targets: [chatgpt_image, flux, z_image_base, z_image_turbo, z_image_turbo, comfyui_flux2_zimage_3stage, stable_diffusion, midjourney, image_edit]
        include_requested_workflow_target: true
        rule: "Export ALL available model targets to the TXT file. The selected renderer is treated as the primary variant, but every model family is included so the user has a complete export for multi-workflow comparison. collapse_identical_outputs prevents duplicate sections."
        collapse_identical_outputs: true
        dedupe_key:
          - positive_prompt
          - negative_prompt
          - suggest_resolution
        fields_per_model_target:
          - model_target
          - positive_prompt
          - negative_prompt
          - suggest_resolution
        mapping_rules:
          chatgpt_image:
            positive_prompt: "prompt"
            negative_prompt: "avoid"
          z_image_base:
            positive_prompt: "positive_prompt"
            negative_prompt: "negative_prompt"
          z_image_turbo:
            positive_prompt: "positive_prompt"
            negative_prompt: "negative_prompt"
          comfyui_flux2_zimage_3stage:
            positive_prompt: "shared_positive_prompt"
            negative_prompt: "z_image_negative_prompt"
          stable_diffusion:
            positive_prompt: "positive_prompt"
            negative_prompt: "negative_prompt"
          midjourney:
            positive_prompt: "prompt"
            negative_prompt: "no_terms or --no terms"
          flux:
            positive_prompt: "prompt"
            negative_prompt: "negative_prompt"
          image_edit:
            positive_prompt: "edit_instruction"
            negative_prompt: "forbidden_changes"
          video_prompt:
            positive_prompt: "scene_prompt + motion_prompt + camera_motion"
            negative_prompt: "negative_prompt"

# ------------------------------------------------------------
# 10. Quality Checks Before Final Output
# ------------------------------------------------------------

renderer_quality_checks:
  required_before_delivery:
    - original_intent_visible
    - model_target_selected
    - correct_renderer_profile_used
    - hard_locks_preserved
    - character_ip_identity_anchors_preserved_when_relevant
    - subject_first_ordering
    - single_dominant_style_mode
    - no_equipment_leak
    - avoid_list_not_contradictory
    - prompt_preserves_required_detail
    - target_model_syntax_valid
    - suggest_resolution_present
    - phase_5_txt_export_ready

  z_image_turbo_specific_checks:
    - all_six_sections_present_subject_pose_clothing_lighting_scene_composition
    - positive_prompt_preserves_required_z_image_turbo_detail
    - subject_in_first_section
    - abstract_terms_translated_to_visible_effects
    - separate_negative_prompt_present_if_supported
    - no_long_cinematography_explanations
    - turbo_prompt_uses_one_complete_subject_first_positive_prompt
    - human_anatomy_expression_gaze_kept_as_short_positive_guardrails_when_needed
    - exact_text_or_publication_intent_not_removed
    - if_cover_requested_text_intent_is_preserved
    - if_cover_requested_negative_prompt_does_not_delete_all_text
    - hero_integrity_strengthened_for_cars_products_architecture
    - mature_styling_has_adult_age_lock_when_needed
    - mature_styling_uses_only_age_safety_negatives
    - character_ip_positive_anchors_kept_before_negative_drift_terms_when_relevant

  z_image_base_specific_checks:
    - positive_prompt_preserves_required_z_image_base_detail
    - subject_and_hard_locks_in_first_phrase_group
    - dense_visual_phrases_not_chatgpt_paragraphs
    - anatomy_expression_text_geometry_and_material_details_preserved_when_relevant
    - negative_prompt_is_category_specific_not_generic_quality_spam
    - professional_photography_terms_render_as_visible_effects
    - character_ip_silhouette_hair_face_palette_costume_and_prop_locks_preserved_when_relevant
    - mature_styling_has_adult_age_lock_when_needed
    - mature_styling_uses_only_age_safety_negatives

  comfyui_flux2_zimage_3stage_specific_checks:
    - shared_positive_prompt_present
    - z_image_negative_prompt_present
    - flux2_dev_uses_shared_positive_prompt_only
    - shared_positive_prompt_contains_no_negative_syntax_or_failure_terms
    - shared_positive_prompt_orders_composition_before_microtexture
    - hard_locks_preserved_in_shared_positive_prompt
    - character_ip_anchors_preserved_in_shared_positive_prompt_when_relevant
    - z_image_negative_prompt_contains_only_task_specific_failures
    - z_image_negative_prompt_not_used_to_censor_requested_adult_content
    - age_safety_negatives_added_only_when_mature_content_is_present

  chatgpt_image_specific_checks:
    - natural_language_coherent
    - short_source_prompt_expanded_when_needed
    - expanded_prompt_preserves_user_subject_and_constraints
    - character_ip_prompt_expands_name_into_visual_identity_anchors_when_relevant
    - expanded_prompt_adds_composition_lighting_material_background_and_output_intent
    - people_have_plausible_anatomy_hands_expression_and_gaze
    - text_logo_cover_label_or_ui_intent_not_contradicted_by_no_text
    - professional_quality_expressed_as_visible_camera_light_material_decisions
    - spatial_relationships_clear
    - concise_avoid_sentence
    - no_raw_json_or_tag_spam

  chatgpt_image_2_specific_checks:
    - generate_present_when_new_image_requested
    - revise_present_when_edit_requested
    - generate_prompt_starts_with_subject_and_hard_locks
    - generate_prompt_includes_composition_lighting_material_background
    - revise_prompt_begins_with_change_target
    - revise_prompt_lists_preserve_locks
    - revise_prompt_closes_with_stable_sentinel
    - no_global_restyle_unless_requested_in_revise
    - generate_prompt_uses_natural_language_not_yaml_tags
    - revise_prompt_preserves_all_unspecified_visible_elements

  stable_diffusion_specific_checks:
    - positive_negative_separated
    - no_full_paragraph_if_tag_mode_requested
    - negative_prompt_relevant
    - weights_only_if_supported

  image_edit_specific_checks:
    - edit_scope_first
    - locked_attributes_explicit
    - no_global_restyle_unless_requested

  video_prompt_specific_checks:
    - stable_first_frame_clear
    - motion_separated_from_scene_description
    - camera_motion_not_conflicting_with_crop
    - continuity_risks_guarded

# ------------------------------------------------------------
# 11. Prompt Assembly Hooks
# ------------------------------------------------------------

prompt_assembly_hooks:
  phase_1_intent_analysis:
    add_fields:
      - model_target
      - renderer_profile
      - output_mode
    action: "Detect model target from user prompt or workflow context. Default to chatgpt_image when unspecified."

  phase_3_5_prompt_package:
    action: "Keep prompt_package model-neutral. Do not overfit to a specific renderer yet."

  phase_4_self_review:
    checks:
      - "Does the selected renderer match the model_target?"
      - "Would the current prompt be too long or abstract for the target model?"
      - "Are any required positive elements contradicted by avoid/negative terms?"
      - "Did internal equipment or technical terms leak into the final candidate?"
      - "For shared-positive ComfyUI workflows, is the shared positive free of negative syntax while Z Image negatives carry only failure controls?"

  phase_4_5_cleanup:
    action: "Apply semantic deduplication, contradiction cleanup, equipment leak cleanup, and avoid-list cleanup. Do not shorten required visual details for token or word targets."

  phase_4_6_renderer_selection:
    action: "Select renderer profile based on model_target or workflow_context. If the workflow is Flux.2 Dev -> Z-Image Base -> Z-Image Turbo with shared positive, use comfyui_flux2_zimage_3stage. If target is unspecified, use chatgpt_image."

  phase_5_final_prompt:
    action: "Render and export ALL model targets. Generate family variants for all renderers including chatgpt_image, flux, z_image_base, z_image_turbo, comfyui_flux2_zimage_3stage, stable_diffusion, midjourney, and image_edit. Generate final_YYYYMMDD_HHMMSS.txt under the resolved absolute user Desktop/comfyui_prompt folder with each model_target output's positive prompt, negative prompt, and suggested resolution. collapse_identical_outputs deduplicates sections when multiple models share the same positive/negative prompts. Never write this TXT under the skill folder, repository folder, current working directory, or a relative desktop/comfyui_prompt path."
