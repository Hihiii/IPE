schema_version: "1.0.0"
name: "model-specific-compact-prompt-generator"
description: >
  Opt-in compact prompt generator for workflows where the user explicitly requests
  shorter model-facing output or a downstream tool has a known hard limit. Do not
  use it solely because of the selected model.

core_principle: >
  Compacting is not deletion. Keep hard locks first, merge redundant style
  phrases, and preserve the minimum identity/anatomy/layout/fabric/text fields
  needed for generation correctness.

compression_priority:
  keep_first:
    - user explicit constraints
    - character identity locks
    - exact text / logo / typography constraints
    - anatomy and contact physics
    - costume marker hierarchy
    - mature age-safety and fabric logic
    - composition and output aspect ratio
  compress_middle:
    - atmospheric adjectives
    - repeated quality terms
    - overlapping lighting phrases
    - duplicated material descriptors
  remove_first:
    - equipment names that render as objects
    - vague quality stacks
    - contradictory style words
    - nonessential micro-details

renderer_profiles:
  z_image_turbo:
    target_style: "detailed, explicit visual phrase chain when compacting is explicitly required"
    max_sections:
      - subject_identity
      - pose_costume
      - scene_lighting
      - negatives
  sdxl:
    target_style: "tag-like ordered prompt"
    max_sections:
      - lora_tags
      - character_tags
      - costume_tags
      - composition_tags
      - negative_tags
  chatgpt_image:
    target_style: "natural paragraph with concise avoid sentence"

prompt_assembly_hooks:
  phase_4_5_cleanup:
    action: "Only compact when the user asks for brevity or a downstream tool has a known hard limit."
  phase_4_6_renderer_selection:
    action: "Keep the complete renderer-specific prompt by default; apply this compact profile only when its opt-in condition is met."
