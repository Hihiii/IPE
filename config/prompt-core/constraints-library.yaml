version: 1
purpose: "Common constraints and rules for preserving image integrity and avoiding generation artifacts."

# =============================================================================
# COMMON CONSTRAINTS — rules extracted from Phase 1 analysis
# =============================================================================
constraints:
  no_watermark:
    description: "No watermark, logo stamp, or branding overlay should appear on the generated image."
    typical_use: "Commercial asset generation, e-commerce, editorial"
    prompt_keywords_avoid: ["watermark", "logo overlay", "brand stamp", "copyright text"]

  no_extra_text:
    description: "No text, letters, or writing should appear in the image unless explicitly specified in exact_text."
    typical_use: "Product shots, clean backgrounds, minimalist imagery"
    prompt_keywords_avoid: ["text", "letters", "writing", "label text", "sign text"]
    notes: "Generators often hallucinate text. Must be explicitly suppressed."

  no_human_subject:
    description: "No human faces, bodies, or hands should appear in the image."
    typical_use: "Product-only shots, packaging, still life"
    prompt_keywords_avoid: ["person", "human", "hand", "face", "model", "woman", "man"]

  no_anatomy_errors:
    description: "If humans are present, hands, fingers, eyes, and facial features must be anatomically correct."
    typical_use: "Editorial with model, portrait, lifestyle"
    notes: "High-risk for generative AI. Consider using negative prompts for anatomy distortion."

  brand_color_accuracy:
    description: "Specific brand colors must be matched exactly. No creative reinterpretation of brand palette."
    typical_use: "Brand advertising, packaging, product catalog"
    notes: "Extract brand color hex values from Phase 1. Use color_constraints.brand_colors."

  exact_identity:
    description: "If the prompt specifies a known person, product, or logo, its identity must be recognizable."
    typical_use: "Celebrity portrait, specific product model, brand logo"
    risk_level: "high"
    notes: "Generative AI may produce lookalike but not exact match. Flag for user awareness."

  no_over_fx:
    description: "Avoid excessive post-processing, over-sharpening, HDR artifacts, or unrealistic glow."
    typical_use: "Natural look, editorial, fine art"
    prompt_keywords_avoid: ["HDR", "oversharpened", "glow effect", "lens flare", "dramatic filter"]

  no_reflection_confusion:
    description: "Reflective surfaces must show consistent reflections. Avoid impossible mirror images."
    typical_use: "Glass product, mirror, water, polished metal"
    notes: "Generators often create physically impossible reflections. Use consistent lighting direction."

  no_motion_blur_unless_specified:
    description: "Subject must be frozen and sharp unless motion blur is an intentional creative choice."
    typical_use: "Studio product, portrait, architecture"
    prompt_keywords_avoid: ["motion blur", "camera shake", "blurred subject"]

  no_distorted_proportions:
    description: "Subject proportions must be realistic. No distorted scale between foreground and background."
    typical_use: "Architecture, automotive, product on tabletop"
    notes: "Wide-angle lenses naturally distort. Account for lens choice. Flag extreme forced perspective."

  consistent_lighting:
    description: "All light sources in the image must cast shadows in the same direction. No conflicting light angles."
    typical_use: "All generated imagery"
    notes: "Generators may add random secondary lights. Must be controlled via explicit light setup."

  no_generation_artifacts:
    description: "No visible AI artifacts: double limbs, melted texture, floating objects, pattern repetition."
    typical_use: "All generated imagery"
    prompt_keywords_avoid: ["floating objects", "disconnected limbs", "repeating pattern error"]

  animal_anatomy:
    description: "Animal anatomy must be correct: four legs, correct tail position, correct ear shape for breed, no extra limbs."
    typical_use: "Pet photography, wildlife, animal content"
    notes: "Chow chow specific: blue-black tongue, straight hind legs (not bowed), thick mane, small triangular ears, curled tail over back."
    prompt_keywords_avoid: ["extra leg", "missing tail", "wrong tongue color", "floppy ear on chow chow"]

  fur_texture_realism:
    description: "Fur must look like real hair, not painted or plastic. Individual hairs visible at high zoom."
    typical_use: "Pet photography, animal portrait, wildlife"
    notes: "Chow chow has a dense double coat. The outer coat is coarse, the undercoat is soft and woolly. Both layers must be visible."
    prompt_keywords_avoid: ["smooth fur", "plastic coat", "painted texture", "shiny unrealistic fur"]

  animal_expression_natural:
    description: "Animal expression should be natural for the species. Avoid human-like facial expressions or anthropomorphized emotions."
    typical_use: "Pet photography, wildlife, animal content"
    notes: "A dog's happy expression is open mouth, relaxed eyes, ears forward. Fear is ears back, whites of eyes showing."
    prompt_keywords_avoid: ["human smile on dog", "anthropomorphic expression", "talking animal face"]

  tongue_and_mouth_accuracy:
    description: "Tongue color and mouth anatomy must be correct for the breed. Chow chow has a distinctive blue-black tongue."
    typical_use: "Pet photography with open mouth, panting dog, tongue visible"
    notes: "Chow chow and Shar-Pei are the only breeds with blue-black tongues. Pink tongue on a chow chow is a critical error."


# =============================================================================
# EXACT TEXT PRESERVATION RULES
# =============================================================================
text_preservation:
  high_criticality:
    description: "Text must be fully legible, correctly spelled, and placed at the specified location."
    strategy: "Generate image with clear flat surface for text area. Overlay text in post-production for guaranteed accuracy."
    risk: "AI-generated text is rarely correct. Strongly recommend post-production text overlay."

  medium_criticality:
    description: "Text should be present and generally readable, but minor imperfection is acceptable."
    strategy: "Include text location in composition. Accept that generator may hallucinate characters."
    risk: "Moderate. Acceptable for background signs, not for primary branding."

  low_criticality:
    description: "Text presence is decorative. Exact spelling and placement are not critical."
    strategy: "Include in prompt as atmosphere element. No post-production required."
    risk: "Low. Accept hallucinated text for background atmosphere."

# =============================================================================
# AUTOREVISE EXTENSIONS — constraint priority, attribute locks, generator guardrails
# =============================================================================
autorevise_constraint_system:
  purpose: "Convert user constraints into enforceable prompt behavior before cinematic enhancement."
  principle:
    - "User explicit constraints outrank all aesthetic enrichment."
    - "Enhancement may clarify, but must not rewrite locked identity, locked attributes, or forbidden content."
    - "Constraints should be rendered as concise, generator-visible guardrails in the final prompt."
    - "Do not add negative terms that conflict with required elements."

  priority_levels:
    hard_lock:
      priority: 100
      meaning: "Cannot be changed, softened, stylized away, reinterpreted, cropped, obscured, or replaced."
      examples:
        - "same face"
        - "logo must remain Coca-Cola red"
        - "no door handle"
        - "full body, feet visible"
        - "keep outfit unchanged"
      final_prompt_behavior:
        positive: "State the lock clearly near the subject or composition clause."
        negative: "Add only the most relevant no-change guardrail."
      self_review_check: "If any enhancement modifies this attribute, revert the enhancement."

    required_feature:
      priority: 95
      meaning: "Must appear clearly and remain readable / recognizable, but may be aesthetically integrated."
      examples:
        - "specific prop"
        - "brand name"
        - "glass panels"
        - "main character holding a sword"
      final_prompt_behavior:
        positive: "Place the feature in the subject or composition clause."
        negative: "Guard against common confusion or omission."

    forbidden_element:
      priority: 95
      meaning: "Must not appear in the generated image unless the user later explicitly requests it."
      examples:
        - "no watermark"
        - "no extra text"
        - "no people"
        - "no door handle"
        - "no cropped feet"
      final_prompt_behavior:
        avoid: "Keep concise and specific."
      self_review_check: "If forbidden element is implied by another selected config, remove that config."

    soft_preference:
      priority: 70
      meaning: "Should guide style, tone, palette, or mood, but can be adjusted to preserve hard locks."
      examples:
        - "luxury feel"
        - "cinematic"
        - "warm mood"
        - "anime realism"
      final_prompt_behavior:
        positive: "Condense into one coherent style clause."

    inferred_enhancement:
      priority: 40
      meaning: "Creative enrichment added by the pipeline when the user has not specified details."
      examples:
        - "subtle rim light"
        - "balanced negative space"
        - "material highlights"
      final_prompt_behavior:
        positive: "Include only if it supports task_profile and does not conflict."

# =============================================================================
# ATTRIBUTE CHANGE CONTROL — edit prompts and image-variation safety
# =============================================================================
attribute_change_control:
  purpose: "Protect user-specified unchanged attributes during enhancement and image editing."

  trigger_phrases:
    preserve_everything_else:
      examples: ["只改", "只調整", "only change", "just change", "keep everything else", "其他不變", "保持其他不變"]
      behavior:
        locked_attributes: "all attributes except explicitly editable ones"
        final_prompt_guardrail: "preserve all other visual attributes unchanged"

    same_subject:
      examples: ["同一個人", "same person", "same face", "臉不變", "五官不變", "identity unchanged"]
      locks: ["identity", "face", "facial proportions", "skin tone", "distinctive features"]
      guardrail: "same identity and facial structure preserved"

    same_body:
      examples: ["身材不變", "body unchanged", "same body shape", "same proportions"]
      locks: ["body shape", "height impression", "body proportions", "silhouette"]
      guardrail: "same body proportions and silhouette preserved"

    same_outfit:
      examples: ["服裝不變", "same outfit", "keep clothing", "衣服不要改"]
      locks: ["wardrobe", "garment color", "garment cut", "fabric pattern", "accessories"]
      guardrail: "same outfit design, color, and fabric details preserved"

    same_background:
      examples: ["背景不變", "same background", "keep location", "場景不要改"]
      locks: ["environment", "background architecture", "props", "time of day"]
      guardrail: "same background layout and environmental context preserved"

    same_camera:
      examples: ["角度不變", "構圖不變", "same crop", "same framing", "camera angle unchanged"]
      locks: ["shot size", "camera angle", "composition", "crop", "subject placement"]
      guardrail: "same camera angle, crop, and subject placement preserved"

  output_schema:
    locked_attributes: []
    editable_attributes: []
    forbidden_changes: []
    final_prompt_guardrails: []

# =============================================================================
# CONSTRAINT EXTRACTION PATTERNS — raw language to structured constraints
# =============================================================================
constraint_extraction_patterns:
  no_or_without:
    patterns: ["不要", "不能", "沒有", "no ", "without ", "do not", "exclude"]
    extraction: "forbidden_element"
    examples:
      - raw: "不要門把手"
        structured: {type: "forbidden_element", item: "door handle"}
      - raw: "no watermark"
        structured: {type: "forbidden_element", item: "watermark"}

  must_or_required:
    patterns: ["必須", "一定要", "需要", "must", "required", "make sure", "ensure"]
    extraction: "required_feature"
    examples:
      - raw: "必須全身構圖"
        structured: {type: "hard_lock", item: "full-body composition"}

  not_x_but_y:
    patterns: ["不是", "而是", "not", "rather than", "instead of", "不是A是B"]
    extraction: "contrastive_constraint"
    behavior:
      - "Add Y as positive required feature."
      - "Add X as forbidden confusion risk."
    examples:
      - raw: "是玻璃，不是玻璃門"
        positive: "freestanding glass panels"
        avoid: "glass door, door handle, hinges"

  exact_text:
    patterns: ["文字", "logo", "品牌名", "text", "label", "sign", "title"]
    extraction: "exact_text_or_text_safe_area"
    behavior:
      - "If exact spelling matters, recommend post-production overlay."
      - "Reserve clean background area for text."
      - "Do not allow random extra text."

  aspect_ratio:
    patterns: ["9:16", "16:9", "1:1", "4:5", "3:2", "直式", "橫式", "vertical", "horizontal"]
    extraction: "output_format_hard_lock"

  reference_style:
    patterns: ["像", "風格", "in the style of", "inspired by", "reference", "類似"]
    extraction: "soft_preference_unless_exact_reference"

# =============================================================================
# GENERATOR-VISIBLE CONSTRAINT TRANSLATION
# =============================================================================
generator_visible_constraint_translation:
  principle: "Translate constraints into positive visual language when possible, and use avoid terms only for likely failure modes."

  translation_rules:
    no_extra_text:
      positive: "clean surfaces with no unintended lettering"
      avoid: ["random text", "gibberish letters", "watermark", "signature"]
      use_when:
        - "final output should be clean"
        - "text is not explicitly requested"

    exact_text_high_criticality:
      positive: "flat clean text-safe area reserved for post-production typography"
      avoid: ["AI-generated misspelled text", "distorted letters", "random extra typography"]
      note: "If exact text is high criticality, final prompt should prefer text-safe layout over asking the model to render perfect text."

    no_human_subject:
      positive: "product-only still life, no people in frame"
      avoid: ["human hands", "model", "face", "body", "silhouette of a person"]

    full_body_not_cropped:
      positive: "full-body composition with entire figure visible from head to toe, feet fully inside frame, ground contact visible"
      avoid: ["cropped feet", "cut-off head", "waist-up framing", "body cropped by frame edge"]

    glass_panel_not_door:
      positive: "two freestanding semi-transparent frosted glass panels with clean edges"
      avoid: ["glass door", "door handle", "hinges", "door frame", "sliding door track"]

    photoreal_not_illustration:
      positive: "photorealistic camera-style image with natural lens rendering and physically plausible lighting"
      avoid: ["anime drawing", "cartoon", "flat illustration", "painted look", "CGI plastic skin"]

    anime_not_photo:
      positive: "stylized anime illustration with clean intentional shape language"
      avoid: ["raw smartphone photo", "uncanny real human face", "documentary photography"]

    readable_logo_or_label:
      positive: "label faces camera, evenly lit text area, high contrast typography zone, no glare across label"
      avoid: ["warped label", "misspelled logo", "glare over text", "folded label"]

    architecture_straight_verticals:
      positive: "architecturally coherent space, straight vertical lines, realistic scale, consistent facade rhythm"
      avoid: ["fisheye warp", "leaning walls", "bent windows", "impossible structure"]

    skin_anatomy_realism:
      positive: "natural anatomy, realistic hands, clean facial structure, lifelike eyes, natural skin texture"
      avoid: ["extra fingers", "merged fingers", "warped hands", "dead eyes", "plastic skin"]

# =============================================================================
# COMMON AUTOREVISE GUARDRAIL RECIPES
# =============================================================================
constraint_recipes:
  full_body_character_design:
    trigger: ["full body", "全身", "character design", "角色設計", "outfit design", "shoes"]
    hard_locks:
      - "entire figure visible from head to toe"
      - "feet fully inside frame"
      - "outfit and accessories readable"
    avoid:
      - "cropped feet"
      - "cut off head"
      - "waist-up portrait"
      - "hidden shoes"

  product_only_hero:
    trigger: ["product", "產品", "e-commerce", "商品", "bottle", "packaging"]
    hard_locks:
      - "product geometry accurate"
      - "label or logo readable if present"
      - "no human model unless requested"
    avoid:
      - "hands"
      - "extra products"
      - "warped label"
      - "price tag"
      - "barcode unless specified"

  brand_poster_with_logo:
    trigger: ["brand", "logo", "品牌", "聯名", "poster", "海報"]
    hard_locks:
      - "brand color accuracy"
      - "logo placement preserved if specified"
      - "text-safe area reserved"
    soft_preferences:
      - "poster-ready visual hierarchy"
      - "clean area for typography"
    avoid:
      - "random extra logos"
      - "misspelled brand name"
      - "busy texture behind text"

  photorealistic_cosplay:
    trigger: ["cosplay", "cosplayer", "真人", "photorealistic", "real-life"]
    hard_locks:
      - "real camera photography style"
      - "recognizable costume influence without turning into flat illustration"
      - "natural skin and anatomy"
    avoid:
      - "anime drawing"
      - "cartoon rendering"
      - "plastic CGI skin"
      - "inaccurate costume construction"

  architectural_visualization:
    trigger: ["architecture", "interior", "lobby", "building", "facade", "大廳", "建築", "室內"]
    hard_locks:
      - "straight vertical lines"
      - "realistic spatial scale"
      - "physically plausible materials"
      - "consistent perspective"
    avoid:
      - "fisheye distortion"
      - "leaning columns"
      - "warped windows"
      - "impossible structure"

  educational_game_screen:
    trigger: ["game", "遊戲", "educational", "教學", "UI", "low grade", "低年級"]
    hard_locks:
      - "large readable interactive objects"
      - "clear gameplay layout"
      - "low cognitive load for young learners"
    avoid:
      - "tiny text"
      - "clutter blocking interaction"
      - "overly cinematic dark lighting"
      - "small hidden UI elements"

  hidden_object_scene:
    trigger: ["找找看", "hidden object", "complex city", "dense scene"]
    hard_locks:
      - "dense but organized scene"
      - "many small readable objects"
      - "clear visual zones"
    avoid:
      - "random clutter"
      - "objects merged together"
      - "unreadable tiny details"
      - "single empty background"

# =============================================================================
# SAFETY AND POLICY FILTER SLOT — pre-enrichment risk handling
# =============================================================================
safety_and_policy_filter_slot:
  purpose: "Run after Phase 1 intent extraction and before Phase 2 enrichment. Prevent the enhancer from amplifying underage or childlike sexual framing."
  behavior:
    - "Do not intensify underage or childlike sexual framing."
    - "If a mature request includes underage or childlike cues, preserve the adult artistic intent while removing those cues and making the subject clearly adult."
    - "Age-safety constraints override all style, mood, and cinematography enhancements."
  output_fields:
    policy_status: "allowed | safe_rewrite_needed | refuse"
    unsafe_elements_removed: []
    safe_rewrite_direction: ""
    enhancement_allowed: true

# =============================================================================
# FINAL PROMPT AVOID LIST MANAGEMENT
# =============================================================================
avoid_list_management:
  purpose: "Prevent negative prompt bloat and contradictions."
  rules:
    - "Use no more than 8 avoid terms in normal mode unless the user explicitly requests technical negative prompts."
    - "Prioritize avoids that prevent likely failure modes for the selected task_profile."
    - "Do not add avoid terms for elements that are unrelated to the scene."
    - "Do not use avoid terms that contain required subject words."
    - "Prefer one specific avoid term over many generic ones."

  priority_order:
    - "forbidden elements explicitly stated by user"
    - "AI artifact risks for the subject type"
    - "text/logo risks"
    - "crop/framing risks"
    - "style conflict risks"
    - "low-priority aesthetic dislikes"

  negative_prompt_bloat_examples:
    bad: ["bad quality", "ugly", "worst quality", "deformed", "blurry", "lowres", "mutated", "bad anatomy", "bad hands", "extra limbs", "watermark", "text", "logo", "signature"]
    better: ["cropped feet", "extra fingers", "random text", "watermark"]
    note: "Use task-specific avoid terms instead of generic negative spam."

# =============================================================================
# CONSTRAINT CONFLICT RESOLUTION
# =============================================================================
constraint_conflict_resolution:
  only_change_vs_autorevise:
    conflict: "User requests a targeted edit, but pipeline wants to enhance many dimensions."
    resolution: "Lock all attributes except the requested editable attribute. Use minimal enhancement depth."
    final_prompt_pattern: "Only change [target]; preserve [locked attributes] unchanged."

  exact_text_vs_image_generation:
    conflict: "User requires exact text, but image generation is unreliable for spelling."
    resolution: "Reserve clean text-safe area and recommend post-production overlay for high-criticality text."
    final_prompt_pattern: "clean blank area reserved for exact text overlay; no random generated text"

  brand_color_vs_cinematic_grade:
    conflict: "Cinematic color grade may shift required brand colors."
    resolution: "Apply grade to environment, shadows, and lighting, but preserve brand colors accurately."
    final_prompt_pattern: "brand colors remain accurate; cinematic grade affects background only"

  full_body_vs_close_up_beauty:
    conflict: "User asks full body but profile suggests close-up portrait."
    resolution: "Full-body hard lock wins. Use face detail language only as secondary."
    final_prompt_pattern: "full-body composition with readable face and outfit"

  dark_mood_vs_readability:
    conflict: "Low-key cinematic mood may hide important subject details."
    resolution: "Keep low-key atmosphere but add selective highlights on hero details."
    final_prompt_pattern: "dark cinematic atmosphere with hero details still readable"

  wide_angle_drama_vs_architecture_accuracy:
    conflict: "Dramatic wide-angle lens may warp architecture."
    resolution: "Use controlled wide perspective with straight verticals; avoid fisheye."
    final_prompt_pattern: "wide architectural view with straight vertical lines and controlled perspective"

  motion_blur_vs_product_label:
    conflict: "Motion effect may blur required logo or label."
    resolution: "Freeze hero label; apply motion only to secondary particles/background."
    final_prompt_pattern: "sharp readable label, motion limited to surrounding elements"

  style_reference_vs_medium_lock:
    conflict: "User references anime/game character but requests photorealistic image."
    resolution: "Keep reference as costume/color/hairstyle influence, not rendering medium."
    final_prompt_pattern: "photorealistic real-life interpretation with character-inspired design cues"

# =============================================================================
# TEXT / LOGO / BRAND HANDLING
# =============================================================================
text_logo_brand_constraints:
  exact_text_workflow:
    high:
      instruction: "Do not rely on the model for exact typography. Reserve a clean text-safe area for post-production overlay."
      final_prompt_positive:
        - "clean blank area reserved for exact typography"
        - "simple low-detail background behind text area"
      avoid:
        - "random text"
        - "misspelled letters"
        - "distorted typography"
    medium:
      instruction: "Allow approximate background signage, but protect main subject from gibberish text."
      final_prompt_positive:
        - "simple readable sign placement"
      avoid:
        - "random extra typography on main subject"
    low:
      instruction: "Decorative text is acceptable as atmosphere; exact spelling not guaranteed."

  logo_handling:
    high_brand_accuracy:
      rule: "If logo identity must be exact, recommend adding logo in post; prompt should reserve placement and preserve brand colors."
      positive:
        - "logo-safe area on clothing or product"
        - "flat clean surface for logo placement"
        - "brand color zone preserved"
      avoid:
        - "warped logo"
        - "fake logo variants"
        - "misspelled brand text"

  text_safe_layout_requirements:
    - "Text area should be low-detail and high contrast."
    - "Do not place text over busy hair, fabric folds, reflective glass, or complex city detail."
    - "For posters, reserve top/bottom/side safe zone explicitly."

# =============================================================================
# SUBJECT-SPECIFIC CONSTRAINT GUARDRAILS
# =============================================================================
subject_constraint_guardrails:
  human_portrait:
    must_protect:
      - "face identity if specified"
      - "eyes and catchlights"
      - "hands if visible"
      - "skin tone realism"
      - "hairline and hair texture"
    avoid:
      - "extra fingers"
      - "merged fingers"
      - "dead eyes"
      - "plastic skin"
      - "asymmetric eye size unless stylized"

  fashion_full_body:
    must_protect:
      - "entire outfit silhouette"
      - "fabric color and pattern"
      - "shoes and ground contact"
      - "pose readability"
    avoid:
      - "cropped feet"
      - "fabric fused with skin"
      - "missing accessories"
      - "unclear garment construction"

  product_packaging:
    must_protect:
      - "product shape"
      - "label plane"
      - "brand color"
      - "material finish"
      - "scale and geometry"
    avoid:
      - "warped packaging"
      - "unreadable label"
      - "extra product duplicates"
      - "glare across logo"

  architecture:
    must_protect:
      - "straight verticals"
      - "consistent window rhythm"
      - "realistic room scale"
      - "material junctions"
      - "structural plausibility"
    avoid:
      - "bent columns"
      - "fisheye warp"
      - "impossible stairs"
      - "floating furniture"

  vehicle:
    must_protect:
      - "wheel geometry"
      - "brand/model silhouette if specified"
      - "body reflections"
      - "perspective consistency"
    avoid:
      - "oval wheels"
      - "melted grille"
      - "duplicated headlights"
      - "incorrect scale"

  game_ui:
    must_protect:
      - "interactive readability"
      - "clear tappable objects"
      - "simple hierarchy"
      - "age-appropriate visual density"
    avoid:
      - "tiny unreadable UI"
      - "cluttered buttons"
      - "text-heavy interface"
      - "dark low-contrast UI"

# =============================================================================
# MODEL OUTPUT MODE CONSTRAINT STYLE
# =============================================================================
model_output_mode_constraint_style:
  chatgpt_image:
    style: "Natural language constraints. Use concise avoid list. Prefer positive guardrails."
    example:
      prompt_guardrail: "The figure is fully visible from head to toe with feet inside the frame."
      avoid: ["cropped feet", "random text", "watermark"]

  stable_diffusion:
    style: "Separate positive prompt and negative prompt. Specific negative tags allowed, but avoid bloat."
    example:
      positive: "full body, feet visible, natural hands, clean background"
      negative: "cropped feet, extra fingers, watermark, random text"

  midjourney:
    style: "Compact natural-language constraints with --no for critical forbidden elements."
    example:
      positive: "full-body fashion editorial, entire outfit visible"
      no: "--no cropped feet, watermark, random text"

  flux:
    style: "Clear declarative sentences; avoid excessive keyword negatives."
    example:
      positive: "A complete full-body figure is visible, including shoes and ground contact."
      avoid: "No random typography or watermark."

# =============================================================================
# CONSTRAINT FAILURE TAXONOMY — for Phase 4 self-review
# =============================================================================
constraint_failure_taxonomy:
  explicit_constraint_lost:
    symptoms:
      - "Final prompt no longer includes a user-specified must-have or must-not-have."
      - "Enhancement changed original subject, outfit, crop, or style."
    likely_causes:
      - "Semantic priority not applied."
      - "Task profile defaults overrode user instruction."
    fix:
      - "Reinsert explicit user constraint as hard_lock."
      - "Remove conflicting inferred enhancement."

  avoid_list_contradicts_prompt:
    symptoms:
      - "Avoid list contains a word required by the positive prompt."
      - "Example: positive asks for logo, avoid says no logo."
    likely_causes:
      - "Generic no_extra_text/no_logo applied without exact_text check."
    fix:
      - "Replace generic avoid with targeted avoid such as no random extra text."

  overconstrained_prompt:
    symptoms:
      - "Final prompt contains too many no/avoid clauses."
      - "Model may ignore constraints or produce sterile output."
    likely_causes:
      - "All failure taxonomy negatives were dumped into final prompt."
    fix:
      - "Keep only top 3-8 risk-specific avoid terms."
      - "Convert negatives into positive visual guardrails when possible."

  targeted_edit_overwritten:
    symptoms:
      - "User asked to only change one attribute, but final prompt modifies unrelated attributes."
    likely_causes:
      - "Enhancement depth too high."
      - "Attribute change control missing."
    fix:
      - "Switch to minimal mode."
      - "Lock all unrelated attributes."

  text_handling_unrealistic:
    symptoms:
      - "Final prompt demands exact long text rendered by image model."
    likely_causes:
      - "Text criticality ignored."
    fix:
      - "Reserve text-safe area and recommend post-production overlay."

  constraint_buried_too_late:
    symptoms:
      - "Critical crop/style/identity constraints appear only at the end."
    likely_causes:
      - "Prompt assembly did not prioritize hard locks."
    fix:
      - "Move hard locks into subject/composition clauses near the beginning."

# =============================================================================
# CONSTRAINT COMPRESSION RULES — for Phase 4.5
# =============================================================================
constraint_compression_rules:
  clusters:
    no_text_cluster:
      verbose:
        - "no text"
        - "no letters"
        - "no random typography"
        - "no gibberish"
        - "no watermark"
        - "no signature"
      compressed_as: "no random text, watermark, or signature"

    anatomy_cluster:
      verbose:
        - "correct hands"
        - "no extra fingers"
        - "no warped hands"
        - "natural anatomy"
        - "realistic eyes"
      compressed_as: "natural anatomy and realistic hands"

    crop_cluster:
      verbose:
        - "full body"
        - "feet visible"
        - "head visible"
        - "not cropped"
        - "shoes visible"
      compressed_as: "full body visible from head to toe"

    architecture_cluster:
      verbose:
        - "straight verticals"
        - "no fisheye"
        - "no warped windows"
        - "realistic perspective"
      compressed_as: "straight verticals and controlled architectural perspective"

    product_label_cluster:
      verbose:
        - "readable label"
        - "logo clear"
        - "no glare"
        - "no warped text"
        - "label faces camera"
      compressed_as: "readable front-facing label without glare"

  rules:
    - "Keep explicit user wording for rare or unusual constraints."
    - "Compress common artifact negatives into one cluster phrase."
    - "Do not compress away exact forbidden items like 'door handle' or 'cropped feet'."
    - "Place compressed constraints after subject/composition but before optional style tags."

# =============================================================================
# PROMPT ASSEMBLY HOOKS
# =============================================================================
prompt_assembly_hooks:
  phase_1:
    - "Extract hard_locks, soft_preferences, inferred_enhancements, locked_attributes, editable_attributes, forbidden_changes."
    - "Run safety_and_policy_filter_slot before creative enrichment."

  phase_2:
    - "Reject any cinematic enrichment that conflicts with hard_locks or forbidden_changes."
    - "Translate constraints into generator-visible positive guardrails."

  phase_3_5:
    - "Store constraints in structured categories: must_keep, must_avoid, exact_text, locked_attributes, editable_attributes."

  phase_4:
    - "Run constraint_failure_taxonomy checks."
    - "Check avoid list for contradictions against positive prompt."
    - "Check targeted edit requests for over-modification."

  phase_4_5:
    - "Apply constraint_compression_rules and avoid_list_management."
    - "Keep top risk-specific avoid terms only."

  phase_5:
    - "Place hard locks early in final prompt."
    - "Use concise avoid list."
    - "Show locked_constraints only when they affect the output or user requested an edit."
