material_requirements:
  direct_bare_no_wardrobe: not_applicable
  direct_garment_action: not_applicable
  sheer_material_action:
    required_fields: [source_of_moisture, fabric_state, mechanical_condition, light_relation]
    source_of_moisture: "A scene-compatible source such as rain, shower, spill, spray, sweat, or condensation."
    fabric_state: wet_or_translucent
    mechanical_condition: [clinging, stretched, adhered]
    light_relation: "Directional or back/side light makes the selected target discernible without cutout-like transparency."

feasibility_review:
  required_fields: [status, attempt_count, target_action_compatible, end_state_exposes_target, camera_target_readable, obstruction_free, material_path_feasible, surface_facing, camera_ray_clear, action_reach, target_in_crop]
  required_pass_values: [target_action_compatible, end_state_exposes_target, camera_target_readable, obstruction_free, material_path_feasible, surface_facing, camera_ray_clear, action_reach, target_in_crop]
  maximum_recomposition_attempts: 3
  recovery_rule: "On any failed check, return to Phase 2 and escalate: (a) strengthen the action anchor and grip, (b) switch to a more aggressive action in the same garment zone (prefer pull_completely_off, tear_or_rip, push_down/push_up), (c) switch from sheer route to direct garment action, (d) switch from garment action to direct bare. Never de-escalate from garment action to sheer, or from explicit visibility to implied/discernible. Delivery requires a passed final review."
  hard_failures:
    - cleavage_without_target_exposure
    - unbuttoned_or_opened_but_target_still_covered
    - upper_garment_action_for_vulva
    - lower_garment_action_for_nipple
    - sheer_route_without_moisture_or_light_cause
    - target_behind_garment_hand_or_crop
    - target_surface_backfacing_camera
    - camera_ray_intersects_limb_garment_or_prop
    - garment_action_anchor_cannot_reach_target
    - target_projection_outside_crop

exposure_geometry_plan:
  coordinate_system: camera_normalized_v1
  required_fields: [coordinate_system, camera, target, crop_bounds, occluders, garment_action]
  camera:
    required_fields: [position, forward]
    position: "Three finite normalized scene coordinates [x, y, z]."
    forward: "Non-zero forward vector from camera into the shot."
  target:
    required_fields: [center, surface_normal, projected_point]
    center: "Three finite normalized scene coordinates for the selected exposure target."
    surface_normal: "Non-zero outward target-surface normal; it must face the camera."
    projected_point: "Normalized [u, v] target projection in the camera image plane."
  crop_bounds:
    required_fields: [min, max]
    rule: "min and max are normalized [u, v] bounds in [0, 1]; projected target must lie inside."
  occluders:
    allowed_kinds: [limb, garment, prop]
    allowed_shapes: [sphere, box]
    rule: "List every primitive that could sit between camera and target. Sphere uses center/radius; box uses center/half_extents. Any ray hit before target fails."
  garment_action:
    required_fields: [anchor, reach_radius]
    rule: "Anchor is the grip, displaced garment edge, or fabric tension point. Its reach radius must physically include the target center."
  validation:
    surface_facing_threshold: 0.25
    required_checks: [surface_facing, camera_ray_clear, action_reach, crop_inclusion, occluder_free]
    scope: "This validates agent-recorded scene geometry, not final image pixels or diffusion-model output."

phase_hooks:
  phase_1_intent_analysis: "Resolve one primary target and candidate route after visible exposure contract resolution."
  phase_2_cinematic_enrichment: "Bind target, garment zone, action anchor, end state, material path, pose, hand placement, focal plane, and crop into one exposure_action_plan. For clothed scenes, posture and garment action must jointly serve the target: lower-body garments must be lowered, pulled aside, or removed with camera/crop synchronized to the selected target. When an exposure_action_plan exists, set dynamic_scene_plan.primary_action and dynamic_scene_plan.force_direction to reflect the exposure action and its physical cause; do not keep an independent pose label that omits the garment or material reveal."
  phase_3_scene_blueprint: "Record exposure_action_plan and exposure_geometry_plan with the exact target-action-end-state-camera relationship."
  phase_3_1_prompt_package: "Render the physical action and its exposed/discernible end state; do not render target words independently from the action."
  phase_4_self_review: "Trace the camera-subject-target relationship: draw a line from camera through the shot to the target zone. Verify the target's body surface faces the camera, no limb/garment/prop sits on that line, the garment action's range physically reaches the target, and the crop boundaries include it. A claim of 'nipple visible' without geometric support fails. Run deterministic geometry validation, then recompose up to two times before blocking delivery."
  phase_4_2_comfyui_renderer: "Keep the validated action and end state early in both positive prompts."
