schema_version: "1.0.0"
name: nsfw-exposure-action-controller
purpose: >
  Turn a visible adult exposure target into a physically feasible garment or
  material action, a definite end state, and a camera-readable composition.

execution_leaf:
  applies_to: [clearly_adult_human, clearly_adult_humanoid]
  required_fields: [primary_target, route, garment_zone, action, action_anchor, end_state, material_cause_when_relevant, camera_proof, fallback_route]
  selection: "Choose one primary target by default. Select direct garment action, sheer material action, or direct bare no-wardrobe presentation; auto-mixed routing may add a scene-compatible moisture cause."
  compatibility: "Nipple uses upper-body garment actions; vulva uses lower-body garment actions. Each action must end with the target uncovered or clearly discernible. Cleavage, loose buttons, body curves, or generic wetness fail."
  camera: "Keep the target in frame, unoccluded, on the focal plane, and supported by pose, hand placement, garment tension, and crop."
  recovery: "Phase 4 verifies target-action-end-state-camera feasibility with normalized scene geometry, recomposes from Phase 2 at most 3 times, then blocks delivery if no valid route remains."
  auto_repair_aggressiveness: >
    When the initial garment action fails feasibility review, the system must escalate to a
    more aggressive action route rather than downgrading the exposure target. Escalation
    priority: (a) strengthen the current action anchor and grip, (b) switch to a more
    aggressive action in the same garment zone, (c) switch from sheer route to direct
    garment action, (d) switch from garment action to direct bare. Never de-escalate
    from garment action to sheer, or from explicit visibility to implied/discernible.

exposure_action_plan:
  required_fields:
    - primary_target
    - route
    - garment_zone
    - action
    - action_anchor
    - end_state
    - material_cause_when_relevant
    - camera_proof
    - fallback_route
  primary_target_rule: "Choose exactly one target unless the user explicitly requests multiple readable exposure targets."
  routes: [direct_bare_no_wardrobe, direct_garment_action, sheer_material_action]
  camera_proof_required: [target_in_frame, target_unoccluded, target_on_focal_plane]

