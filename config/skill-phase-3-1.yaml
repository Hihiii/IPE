  instructions: |
    ## Phase 3.1: Enhanced Prompt Package *(internal)*

    Compile the enriched scene into a **categorized prompt package**. Each category maps to one controllable dimension for later iteration. Output is consumed by Phase 4 — do not report to the user.

    ```yaml
    prompt_package:
      original_prompt: "premium amber glass serum bottle on black stone"

      type:
        category: product_poster               # image category, from task_profile
        use_case: "e-commerce hero image, product launch campaign, social media primary visual"

      subject: "amber glass serum bottle with gold dropper cap, placed center-left on polished black marble"

      composition:
        framing: "medium close-up, full frame product focus, product occupies 40% of frame"
        layout: "full frame, product centered on golden ratio intersection, generous breathing room on all sides"
        subject_placement: "center-left, right 30% reserved as negative space for text overlay"
        depth_planes: "foreground marble slab, midground product, background soft warm gradient"
        negative_space: "right 30% and bottom margin — clear for headlines and tagline"
        margins: "equal left-right, slightly more bottom margin for visual weight"

      style_and_lighting:
        visual_language: "premium commercial photography, luxury studio aesthetic, editorial quality"
        medium: "photography"
        mood: "luxurious, calm, warm elegant, sophisticated"
        lighting:
          key: "warm directional soft light from camera-right, 45 degrees, moderate shadow"
          fill: "gentle warm fill from camera-left, one stop below key, open shadows"
          rim: "narrow rim accent from back-left for edge separation"
          pattern: "three-point cinematic with warm accent"
          quality: "soft diffused with smooth shadow transition"
        color_script: "vintage warm amber tone, selective saturation, warm gold highlights, complementary amber-and-charcoal palette"
        exposure: "middle key, moderate contrast, 3:1 key-to-fill ratio"
        lens: "85mm short telephoto at f/5.6, eye-level angle, moderate distance, natural proportions"

      background: "minimal studio tabletop, cream silk fabric draped on right side, soft warm gradient background"
      material: "high-gloss glass with sharp specular highlights, matte gold cap, polished marble with subtle reflections, silk fabric with soft sheen"
      atmosphere: "clean no haze, clinical sharp bokeh, no grain"

      constraints:
        must_keep:
          - "brand name LUMIÈRE visible on product label"
          - "gold dropper cap design detail"
          - "warm amber tone overall"
        no_extra_elements:
          - "watermark"
          - "human model or hands"
          - "price tag or barcode"
          - "extra text not specified in exact_text"
        exact_text_preservation:
          - text: "LUMIÈRE"
            location: "product label center"
            criticality: "high — must be fully legible"

      output_format:
        aspect_ratio: "1:1"
        transparent_background: false
        video_ready_frame: false
        output_medium: "digital"

      publication_layout:
        type: "none"
        publication_mode: "none"
        masthead_required: false
        cover_lines_required: false
        text_safe_zones: []
        text_policy: "none"

      footer: "warm amber gradient bar at bottom edge anchoring the composition, subtle marble texture strip grounding the product, brand color accent bar in charcoal"

      keywords: ["soft diffused key light", "warm colored key light", "gentle fill light", "narrow rim edge light", "three-point lighting setup"]
      quality_tags: ["premium commercial photography", "studio product shot", "sharp focus on product label", "8K detail"]
      avoid: []
    ```

    Rules:
    - Each category is independently editable for targeted iteration.
    - `style_and_lighting.lighting` must match the Phase 3 lighting_diagram.
    - `style_and_lighting.lens` must match the Phase 2 lens_strategy.
    - `subject` must keep the original user intent visible.
    - `constraints.exact_text_preservation` must match Phase 1 `exact_text`.
    - The model-neutral prompt candidate = `subject` + `composition` values + `style_and_lighting` values + `background` + `material` + `atmosphere` + `footer` + `keywords`; Phase 4.2 renders this candidate into the target model-specific final syntax.
