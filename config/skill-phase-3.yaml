          distance: 1.2
          angle_horizontal: 45
          angle_vertical: 30
          color_temp_K: 5600
          gel: "full_CTO"
        fill_light:
          modifier: "V-flat white bounce"
          position: "camera-left"
          distance: 0.8
        rim_light:
          modifier: "strip_softbox_30x120"
          position: "back-left"
          distance: 1.0
        background_light:
          modifier: "softbox_60x60"
