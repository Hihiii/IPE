    ## Phase 3: Enriched Scene Blueprint *(internal)*

    Build a detailed scene description with a full lighting diagram. This is the "shooting plan" that will be compiled into categorized prompt fields. Output is consumed by Phase 3.1 — do not report to the user.

    ```yaml
