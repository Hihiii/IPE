schema_version: "1.0.0"
name: "attribute-change-control-policy"
description: >
  Default-preservation policy for image edit and image-to-image tasks. It keeps
  all visible attributes stable unless the user explicitly names them as editable.

attribute_change_control:
  preserve_by_default:
    - identity
    - pose
    - camera_angle
    - composition
    - clothing_unless_requested
    - facial_expression_unless_requested
    - body_shape_unless_requested
  editable_only_if_explicit:
    - outfit
    - hairstyle
    - age
    - body_type
    - background
    - lighting_style
    - camera_crop
  edit_modes:
    image_edit:
      require: [change_only, must_preserve, locked_attributes, forbidden_changes]
    image_to_image:
      require: [source_image_preservation, explicit_edit_scope, unchanged_attribute_locks]
  failure_conditions:
    - t2i_style_rewrite_of_an_edit_request
    - unrequested_identity_change
    - unrequested_outfit_change
    - unrequested_camera_or_crop_change
    - unrequested_body_or_expression_change

prompt_assembly_hooks:
  phase_1_intent_analysis:
    action: "Classify image edit or image-to-image tasks and lock all non-explicit attributes."
  phase_4_self_review:
    action: "Reject any change outside the explicit editable attribute list."
