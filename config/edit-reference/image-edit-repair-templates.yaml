# ============================================================
# image-edit-repair-templates.yaml
# Image editing, inpainting, repair, and selective-change controller
# Version: 1.0.0
# Purpose:
#   Improve edit prompts so the model knows exactly what to change,
#   what to preserve, how local or global the edit should be, and how
#   to keep identity, lighting, composition, and scene coherence intact.
# ============================================================

schema_version: "1.0.0"
name: "image-edit-repair-templates"
description: >
  A prompt-enhancement module for image edits, inpainting, selective repairs,
  localized modifications, consistency-preserving updates, and before/after control.
  It helps translate vague edit requests into precise instructions that define the edit scope,
  preserve constraints, and visual continuity.

core_principle: >
  A good edit prompt clearly separates change targets from preservation targets.
  The model should know what must change, what must stay the same, what local area is involved,
  and what visual properties must remain coherent after the edit.

global_rules:
  - "Always separate the edit into: target region, desired change, preservation constraints, and quality checks."
  - "Preserve identity, composition, lighting direction, camera angle, background continuity, and scene mood unless the user requests otherwise."
  - "Localized edits should be narrow and specific; avoid accidental global drift."
  - "Repairs should fix the failure without unnecessarily redesigning successful parts of the image."
  - "When editing people, preserve facial identity, age impression, hairstyle family, body type, clothing logic, and pose logic unless changed intentionally."
  - "When editing products, vehicles, or architecture, preserve shape language, material identity, scale, and perspective."
  - "When editing text-bearing designs, preserve layout hierarchy and only change the requested text zones."

image_edit_schema:
  edit_mode: "local_repair | selective_replace | attribute_change | background_swap | composition_preserve_edit | style_shift | cleanup | object_addition | object_removal | text_edit"
  edit_scope: "tiny_local | local | regional | subject_only | background_only | full_frame"
  direct_target: "subject | face | hands | legs | clothing | accessory | background | lighting | text | product | environment"
  requested_change: []
  preserve: []
  avoid: []
  continuity_checks: []
  strength: "subtle | moderate | strong"
  renderer_notes: []

edit_intent_categories:
  structural_repair:
    description: "Fix anatomy, geometry, pose, perspective, collisions, or object structure."
    typical_targets:
      - "hands"
      - "feet"
      - "face proportions"
      - "mecha joints"
      - "vehicle wheels"
      - "architectural lines"

  cosmetic_refinement:
    description: "Improve texture, polish, lighting quality, facial finish, material rendering, or background cleanup."
    typical_targets:
      - "skin texture"
      - "fabric detail"
      - "metal surface"
      - "glass reflection"
      - "messy background clutter"

  content_swap:
    description: "Replace a specific object, garment, hairstyle, accessory, or backdrop while preserving the rest."
    typical_targets:
      - "change outfit"
      - "swap background"
      - "replace prop"
      - "change hairstyle"

  design_edit:
    description: "Modify poster text, branding, colorway, layout zones, or product presentation."
    typical_targets:
      - "title text"
      - "logo placement"
      - "cover-line arrangement"
      - "brand color adjustment"

preservation_defaults:
  portrait_edit:
    preserve:
      - "same person identity"
      - "same facial structure"
      - "same hairstyle family unless changed"
      - "same camera angle and framing"
      - "same lighting direction"
      - "same background continuity unless changed"

  product_edit:
    preserve:
      - "same product identity"
      - "same core silhouette"
      - "same camera perspective"
      - "same material logic unless changed"
      - "same overall composition"

  scene_edit:
    preserve:
      - "same composition and horizon placement"
      - "same time-of-day logic unless changed"
      - "same scene mood unless changed"
      - "same primary subject placement"

selective_edit_templates:
  face_refinement:
    instruction_pattern:
      - "Refine the face only."
      - "Preserve identity, hairstyle, pose, camera angle, and lighting."
      - "Improve facial symmetry, eye alignment, skin realism, and natural expression."
      - "Do not change the background or outfit."

  hand_repair:
    instruction_pattern:
      - "Repair the hands only."
      - "Preserve pose, arm position, body posture, and the rest of the image."
      - "Correct finger count, finger anatomy, joint structure, and contact logic."
      - "Do not alter the face, clothing, or background."

  leg_foot_repair:
    instruction_pattern:
      - "Repair the legs and feet only."
      - "Preserve the upper body, pose intent, outfit, and background."
      - "Correct limb orientation, ankle alignment, foot direction, ground contact, and anatomy."
      - "Do not redesign the whole body."

  outfit_change:
    instruction_pattern:
      - "Change the outfit only."
      - "Preserve the person identity, body type, pose, lighting, and background."
      - "Replace the current clothing with the requested outfit while keeping fit, drape, and material logic coherent."
      - "Do not change hairstyle or facial appearance unless requested."

  background_swap:
    instruction_pattern:
      - "Change the background only."
      - "Preserve the main subject identity, pose, outfit, camera angle, and lighting coherence."
      - "Replace the environment with the requested new setting."
      - "Ensure the new background matches the subject scale and perspective."

  text_replace:
    instruction_pattern:
      - "Edit the text only."
      - "Preserve layout hierarchy, typography style, composition, and all non-text visual elements."
      - "Replace the specified text with the requested wording, maintaining clean and accurate rendering."
      - "Do not introduce random extra text."

repair_failure_mappings:
  anatomy_failure:
    use_mode: "structural_repair"
    preserve_priority:
      - "composition"
      - "lighting"
      - "identity"
      - "successful body parts"

  background_failure:
    use_mode: "cosmetic_refinement"
    preserve_priority:
      - "subject identity"
      - "subject placement"
      - "camera framing"

  text_failure:
    use_mode: "design_edit"
    preserve_priority:
      - "layout"
      - "brand hierarchy"
      - "graphic system"

edit_safety_rules:
  - "Avoid saying 'change everything' unless the user truly wants a full remake."
  - "When the request is narrow, explicitly protect everything outside the target region."
  - "For repair tasks, say 'fix' or 'repair' rather than 'reimagine'."
  - "For continuity-sensitive edits, use 'preserve' language multiple times."

self_review_checklist:
  - "Is it clear what changes?"
  - "Is it clear what stays the same?"
  - "Is the edit scope narrow enough?"
  - "Will the edit accidentally drift identity, composition, or lighting?"
  - "If text is edited, is the text zone and wording explicit?"

model_specific_rendering:
  chatgpt_image:
    guidance: >
      Use natural edit instructions with explicit preserve/change separation.
      Prioritize continuity, localized repair clarity, and layout preservation when relevant.
  z_image_turbo:
    positive_template: >
      selective edit, preserve identity, preserve composition, preserve lighting,
      fix only target area, localized repair, no global drift
    negative_template: >
      unnecessary redesign, identity drift, background drift, pose drift, random changes
  stable_diffusion:
    positive_template: >
      repair only target region, preserve rest of image, maintain framing and lighting,
      correct anatomy/detail, localized edit
    negative_template: >
      overchange, drift, altered face, altered composition, altered lighting

prompt_assembly_hooks:
  phase_1_intent_analysis:
    add_fields:
      - image_edit_schema
    action: "Detect whether the user wants repair, swap, refinement, or selective replacement."
  phase_2_cinematic_enrichment:
    action: "Translate vague edit requests into explicit change/preserve instructions."
  phase_3_scene_blueprint:
    action: "Integrate edit scope with identity, composition, rendering, and typography systems."
  phase_4_self_review:
    checks:
      - "Check preservation constraints."
      - "Check edit locality."
      - "Check drift risk."
  phase_4_5_cleanup:
    action: "Preserve explicit 'what stays the same' language."
  phase_4_6_renderer_selection:
    action: "Render edit instructions in model-appropriate format."
  phase_5_final_prompt:
    action: "Include concise but explicit edit/preserve structure whenever the task is an edit."
