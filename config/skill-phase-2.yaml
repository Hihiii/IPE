  source: "SKILL.md lines 711-834"
  instructions: |
    ## Phase 2: Cinematic Enrichment *(internal)*

    Take the Phase 1 intent and enrich it with professional cinematography decisions. Every choice must reference the knowledge bases. Output is consumed by Phase 3 — do not report to the user.

    Phase 2 produces **two layers**:
    1. **Human-technical plan** — the cinematography reasoning for the human DP
    2. **Generator translation** — the visible effects that the image model must render

    This is because "f/2.8 at 85mm" means something very different to a cinematographer than to a diffusion model. The human layer captures the intent; the generator layer captures the visible result.

    ### Color Script

    Choose a palette and grading look from `config/visual-cinematography/color-palette-schemes.yaml`:
    - `palette_type`: complementary (contrast) | analogous (harmony) | monochromatic (focus) | triadic (vibrant) | split_complementary (refined contrast)
    - `dominant_colors`: colors that support the brand or mood
    - `saturation_strategy`: muted | vibrant | selective | desaturated
    - `color_grading_intent`: select from `config/visual-cinematography/color-palette-schemes.yaml color_grading_looks`

    ### Lighting Intent

    Choose a key modifier and ratio from `config/visual-cinematography/lighting-diagrams.yaml` and `config/visual-cinematography/exposure-strategies.yaml`:
    - `key_quality`: hard | soft | diffused | specular | wrap_around
    - `key_modifier`: select a modifier from `config/visual-cinematography/lighting-diagrams.yaml modifiers`
    - `ratio`: key-to-fill ratio from `config/visual-cinematography/exposure-strategies.yaml ratios`
    - `color_temperature_strategy`: matched | mixed_CTO | mixed_CTB | gel_accent
    - `rim_or_separation`: does the subject need edge separation?
    - `background_treatment`: flat | gradient | textured | gobo | patterned

    ### Lens Strategy

    Choose a focal length from `config/visual-cinematography/camera-lens-library.yaml` and its impact:
    - `focal_length_category`: wide_angle | wide_to_normal | standard | short_telephoto | telephoto | ultra_wide
    - `compression`: low | moderate | strong | extreme
    - `aperture_intent`: shallow_DoF | deep_focus | medium
    - `working_distance`: close | moderate | far
    - `camera_height`: low_angle | eye_level | high_angle | overhead
    - `distortion_character`: natural | slight_warp | anamorphic_feel

    ### Exposure Strategy

    Choose an exposure strategy from `config/visual-cinematography/exposure-strategies.yaml`:
    - `style`: high_key | low_key | middle_key | silhouette | chiaroscuro | flat_diffuse
    - `contrast_ratio`: low | medium | high | extreme

    ### Composition

    Choose a composition rule from `config/visual-cinematography/composition-library.yaml`:
    - `rule`: rule_of_thirds | centered_symmetry | golden_ratio | leading_lines | frame_within_frame | negative_space | diagonal_tension | depth_layering | and more
    - `depth_layers`: 2 | 3 | 4
    - `focal_priority`: ordered list of what the eye should see first
    - `breathing_room`: tight | comfortable | generous

    ### Pose Design / Anti-Boring

    If the subject is human and the pose is static, symmetrical, or underspecified, apply `config/character-identity/anti-boring-pose-system.yaml` (P93):
    - `boring_pose_diagnosis`: detect which patterns apply (full_frontal_symmetry, dead_arms, even_stance, etc.)
    - `pose_design_strategies`: apply concrete fixes per pattern
    - `weight_and_balance_rules`: define center of gravity and weight distribution
    - `gaze_and_intention`: give the gaze a target or emotion
    - `hand_purpose_catalog`: assign each hand a distinct role
    - `scene_interaction_matrix`: connect pose to environment
    - `camera_relationship`: adapt pose to camera angle
    - `task_defaults`: recommended pose strategy per task type

    ### Visual Richness / Narrative Depth

    If the scene feels flat or underspecified, enrich it using `config/visual-cinematography/visual-richness-narrative-depth.yaml`:
    - `narrative_layering`: define foreground, midground, background, and atmosphere roles
    - `depth_creation_methods`: perspective, lighting, material contrast, atmospheric detail, focus separation
    - `secondary_detail_policy`: what to add and what not to add — every detail must be justified by scene context
    - `task_defaults`: recommended richness strategy per task type

    ### Generator Translation Layer

    Translate the human-technical plan above into effects the image model can actually render. The model does not understand "octabox_90cm" — it renders physical objects. The model does not understand "f/2.8" — it renders depth of field as a visible effect.

    Build this from the human-technical decisions using knowledge-base lookups:

    - `visible_lighting_effect`: describe the light's behavior on the subject — shadow transition, catchlight shape, highlight character, wrap quality. Never name equipment.
    - `visible_depth_effect`: describe depth cues — foreground blur, background compression, focal falloff, atmospheric perspective.
    - `visible_material_effect`: describe surface behavior — specular response, subsurface scattering, reflection sharpness, translucency.
    - `visible_composition_effect`: describe the spatial relationship — negative space ratios, eye path, weight balance, leading vectors.
    - `model_risk`: known generation failure modes triggered by this configuration (e.g., "softbox visible as physical object", "hands merged with background at this ratio").
    - `corrective_terms`: terms that mitigate known model risks or cross-reference style guardrails from `config/visual-cinematography/style-realism-control.yaml`.

    Also extract `avoid_in_prompt` from each modifier entry's prompt_keywords or notes — any equipment name that would cause the model to render studio hardware.

    Target output:

    ```yaml
    cinematic_enrichment:
      color_script:
        palette_type: "complementary"
        dominant_colors: ["amber_gold", "deep_brown"]
        saturation_strategy: "selective_saturation"
        color_grading_intent: "vintage_warm"

      lighting_intent:
        key_quality: "soft_diffused"
        key_modifier: "octabox_90cm"
        ratio: "3:1"
        color_temperature_strategy: "mixed_CTO"
        rim_or_separation: true
        background_treatment: "gradient_warm"

      lens_strategy:
        focal_length_category: "short_telephoto"
        compression: "moderate"
        aperture_intent: "medium"
        working_distance: "moderate"
        camera_height: "eye_level"
        distortion_character: "natural"

      exposure_strategy:
        style: "middle_key"
        contrast_ratio: "medium"

      composition:
        rule: "negative_space"
        depth_layers: 3
        focal_priority: ["product_label", "glass_highlight", "texture"]
        breathing_room: "generous_right"

      generator_translation:
        visible_lighting_effect: "large soft diffused key light from camera-right, smooth shadow transition, warm round catchlights in the glass, gentle wrap-around on the bottle contour"
        visible_depth_effect: "moderate depth of field — sharp on the bottle label, gradual falloff into the silk drape, marble surface stays crisp at the product plane"
        visible_material_effect: "amber glass with glossy specular highlight on the shoulder, soft subsurface glow through the bottle, silk with visible woven texture, polished marble with mirror-like reflection"
        visible_composition_effect: "generous negative space on the right balanced by the silk fall, eye path from gold label to cap highlight to marble edge, hero centered with breathing room"
        model_risk:
          - "softbox may render as physical reflector visible in glass reflection"
          - "glass refraction may distort or omit label text"
          - "gold foil may render as flat yellow at low contrast"
        corrective_terms:
          - "no studio equipment visible"
          - "clean glass reflection without light source"
          - "gold foil texture with metallic sheen"
        avoid_in_prompt:
          - "octabox"
          - "softbox"
          - "V-flat"
          - "studio flash"
          - "light stand"
    ```
