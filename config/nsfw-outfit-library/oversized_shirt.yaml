label: oversized_shirt
triggers: [shirt only, oversized]
anchors:
  - large men's soft flannel or crisp oxford cotton button-up shirt, slightly wrinkled from sleeping in it
  - only two buttons fastened at the chest
  - shirt unbuttoned below showing full torso and groin area
  - collar sliding off one shoulder revealing bare shoulder and collarbone
  - shirt hem barely covers upper thigh, resting at the crease between thigh and hip
  - no pants or underwear beneath, bare legs visible from hem down
  - knee-high socks
  - messy bedhead hair
