  instructions: |
    ## Phase 1: Intent Analysis *(internal)*

    Extract the core requirements from the raw user prompt. Identify what matters so Phase 2-3 enrichment targets the right dimensions. This output is consumed by subsequent phases — do not report to the user.

    ### Primary Fields

    | Field | Purpose |
    |-------|---------|
    | `task_profile` | select from `config/prompt-core/task-profiles.yaml` to apply sensible defaults |
    | `subject_type` | what is being photographed (product, person, food, scene, etc.) |
    | `subject_role` | the subject's narrative function (hero, context, accent, environment) |
    | `usage_context` | where the image will be used (influences contrast, saturation, sharpness) |
    | `audience` | who the image is for (influences color temperature, lighting mood) |
    | `aspect_ratio` | extract or infer from the prompt |
    | `output_medium` | print \| digital \| social \| unspecified |
    | `model_target` | `z_image` or `unspecified`; delivery is always rendered for Z-Image |
    | `publication_layout` | publication-style layout intent: none, magazine_cover, poster, book_cover, album_cover, movie_poster, or unspecified |
    | `mature_content` | mature content classification and age-safety control: safe, adult_mature, adult_explicit, requires_adult_age_lock, or minor_blocked |
    | `anatomy_risk` | human anatomy / pose-biomechanics risk level and lower-body-structure control: low, medium, high, or critical |
    | `face_expression_gaze` | gaze target, emotional tone, facial micro-expression, attention anchor, and portrait realism risk |
    | `text_rendering` | exact text, logo, title, label, language/script, copy hierarchy, and no-extra-text / no-text contradiction control |
    | `sex_characteristics` | intended adult body presentation, body-trait consistency lock, and external intimate-anatomy consistency lock: male, female, androgynous, trans, nonbinary, genderfluid, user_specified, or unspecified |
    | `collision_risk` | physical-collision, contact-logic, occlusion, and material-interaction risk level: low, medium, high, or critical |
    | `pose_boring_risk` | pose stiffness / anti-boring diagnosis risk: none, symmetric_stance, dead_arms, empty_gaze, no_interaction, or multiple. Load config/character-identity/anti-boring-pose-system.yaml when human subject has underspecified or symmetrical pose |
    | `scene_enrichment` | scene type, background density, depth layering, environmental storytelling, and subject-background interaction package |

    ### Visual Hierarchy & Narrative

    | Field | Purpose |
    |-------|---------|
    | `visual_hierarchy` | ordered list of what the eye should see first → last |
    | `narrative_context` | what story does the image tell? (e.g., "product emerging from darkness", "freshly prepared on a kitchen counter") |
    | `hero_element` | the single most important visual detail that must be perfect |
    | `secondary_elements` | supporting objects, props, or background features |
    | `reference_mood` | implied mood references (e.g., "like a luxury perfume ad", "warm family dinner feel") |

    ### Publication / Cover Layout Detection

    If the user asks for a **magazine cover, poster, book cover, album cover, movie poster, or social cover visual**, extract publication intent explicitly. A cover/poster request is not just a composition request — it usually implies typography, masthead, title hierarchy, and layout zones.

    | Field | Purpose |
    |-------|---------|
    | `publication_layout.type` | none \| magazine_cover \| poster \| book_cover \| album_cover \| movie_poster |
    | `publication_layout.publication_mode` | exact_text_mode \| implied_cover_text_mode \| text_safe_layout_only_mode |
    | `publication_layout.masthead_required` | whether a large title/masthead should appear |
    | `publication_layout.cover_lines_required` | whether supporting cover lines or editorial text should appear |
    | `publication_layout.text_safe_zones` | clear areas reserved for title, masthead, subtitle, or later typography |
    | `publication_layout.exact_text` | exact user-provided text, if any |
    | `publication_layout.text_policy` | generate_text \| placeholder_editorial_text \| reserve_space_only |

    Publication mode rules:
    - If the user provides exact text, title, logo, masthead, subtitle, or cover lines → `exact_text_mode`.
    - If the user asks for a cover/poster but does not specify exact text → default to `implied_cover_text_mode`.
    - Use `text_safe_layout_only_mode` only when the user or workflow explicitly says typography will be added later.
    - Do **not** turn a cover/poster request into a text-free image unless explicitly requested.
    - For weaker text models, keep text simple: large masthead, short cover lines, clear spacing, simple sans-serif or editorial type.

    Trigger examples:
    - "汽車雜誌封面" → `magazine_cover` + `implied_cover_text_mode`
    - "海報大片" → `poster` + `implied_cover_text_mode`
    - "標題寫 SUPRA STYLE" → `exact_text_mode`
    - "留上方空白讓我後製文字" → `text_safe_layout_only_mode`

    ```yaml
    publication_layout:
      type: "magazine_cover"
      publication_mode: "implied_cover_text_mode"
      masthead_required: true
      cover_lines_required: true
      text_safe_zones:
        - "large masthead area at top"
        - "supporting cover-line zones around subject"
        - "optional bottom cover-line area"
      exact_text: []
      text_policy: "placeholder_editorial_text"
    ```

    ### Mature Content Detection

    First, classify mature content using the basic rules in `core-knowledge.yaml age_safety` (tiers, hard_restrictions, unrestricted_adult_content). Core-knowledge already covers the full age-safety policy and replaces `mature-content-control.yaml` as baseline — do NOT load that 1KB file unless there is an age-safety edge case or renderer-specific mature wording need.

    If the prompt requires mature tier selection beyond core-knowledge (e.g., explicit tier-level detail for sensual_glamour vs implied_contour vs adult_nude), then load `config/safety-mature/mature-content-tiering-system.yaml` for structured tiering. The purpose is to preserve adult intent while preventing only `underage` or `childlike` sexual framing from entering the final prompt.

    | Field | Purpose |
    |-------|---------|
    | `mature_content.level` | safe \| adult_mature \| adult_explicit \| requires_adult_age_lock \| minor_blocked |
    | `mature_content.adult_age_lock` | whether adult / 21+ / mature adult wording is required |
    | `mature_content.style_intent` | mature style language such as adult glamour editorial, adult explicit nudity, adult genital visibility, gore, or user-specified adult visual intent |
    | `mature_content.wardrobe_coverage` | fashion_full_coverage \| body_conscious_fashion \| swimsuit_editorial \| lingerie_inspired_fashion \| body_paint_inspired_fashion \| minimal_or_nude |
    | `mature_content.pose_safety` | adult_allowed \| minor_blocked |
    | `mature_content.forbidden_elements` | underage or childlike sexual framing to remove or block |
    | `mature_content.renderer_guardrails` | model-specific positive and negative wording for age-safety only |

    Rules:
    - Mature styling must be clearly adult when sensual or explicit framing is present.
    - Use `adult`, `21+`, `mature adult`, or `adult model` near the subject description when needed.
    - Do not use `underage` or `childlike` framing in mature/sexualized prompts.
    - Adult nudity, adult genital visibility, adult sexual actions, and gore are not restricted by this mature-content module.
    - Do not rewrite adult explicit requests into non-explicit editorial language unless the user asks for that style.

    ```yaml
    mature_content:
      level: "adult_mature"
      adult_age_lock: true
      style_intent: "adult glamour editorial"
      wardrobe_coverage: "swimsuit_editorial"
      pose_safety: "adult_allowed"
      forbidden_elements:
        - "childlike"
        - "underage"
      renderer_guardrails:
        positive:
          - "adult 21+ model"
        negative:
          - "childlike"
          - "underage"
    ```

    #### NSFW / Explicit Input Handling

    When the user prompt contains **"nsfw"**, **"NSFW"**, **"explicit nude"**, **"adult explicit"**, or similar explicit adult intent keywords:

    - Classify `mature_content.level` as **`adult_explicit`** (not `adult_mature` or `sensual_glamour`).
    - Set `wardrobe_coverage` to **`body_paint_inspired_fashion`** (minimal artistic coverage) or `minimal_or_nude` when nudity is the clear intent.
    - Set `style_intent` to **`"adult explicit glamour editorial, bright high-key fashion lighting"`** to ensure the output uses bright/glamour tones rather than dark moody editorial.
    - Do **not** downshift NSFW intent into non-explicit editorial language.
    - Do **not** apply dark, mysterious, or low-key mood unless the user explicitly requests it.
    - Preserve full adult explicit detail: skin texture, body contour, and requested explicit anatomy.
    - Add adult age lock wording.
    - Block only underage/childlike framing.

    ```yaml
    mature_content:
      level: "adult_explicit"
      adult_age_lock: true
      style_intent: "adult explicit glamour editorial, bright high-key fashion lighting"
      wardrobe_coverage: "body_paint_inspired_fashion"
      pose_safety: "adult_allowed"
      forbidden_elements:
        - "childlike"
        - "underage"
      renderer_guardrails:
        positive:
          - "adult 21+ model"
          - "explicit adult glamour"
        negative:
          - "childlike"
          - "underage"
    ```

    ### Human Anatomy / Pose Biomechanics Detection

    First, assess anatomy risk using the basic rules in `core-knowledge.yaml anatomy_guardrails` (zone_requirements for pelvis/hips, upper_thighs, knees, feet_ankles). For low-risk standing or seated poses, core-knowledge rules are sufficient — do NOT load the full 54KB `human-anatomy-guardrails.yaml`.

    If the user prompt involves complex or high-risk scenarios — such as **dynamic/athletic posing**, **dance**, **glamour**, **swimsuit**, **body-conscious fashion**, **cosplay**, **lower-body-visible with biomechanics concern**, or **previous anatomy failure repair** — then classify anatomy risk with `config/character-identity/human-anatomy-guardrails.yaml`.

    This module is not only about “correct anatomy.” It breaks anatomy control into explicit structure and pose rules:

    - pelvis / hip structure
    - hip-to-thigh connection
    - support-leg weight distribution
    - knee direction consistency
    - leg proportion consistency
    - foot grounding
    - dynamic pose biomechanics

    | Field | Purpose |
    |-------|---------|
    | `anatomy_risk.level` | low \| medium \| high \| critical |
    | `anatomy_risk.triggers` | which prompt cues caused anatomy strengthening |
    | `anatomy_risk.lower_body_visible` | whether lower-body structure must be guarded explicitly |
    | `anatomy_risk.support_leg_required` | whether the support leg / center-of-gravity logic must be stated |
    | `anatomy_risk.pose_biomechanics_required` | whether pose mechanics should be made explicit |
    | `anatomy_risk.renderer_guardrails_required` | whether model-specific anatomy wording should be added |

    Rules:
    - If the lower body is visible, do not rely on `correct anatomy` alone.
    - Use generator-visible guardrails such as `believable pelvis`, `natural hip-to-thigh connection`, `knees aligned with thigh direction`, and `grounded support foot`.
    - If the pose is dynamic or asymmetric, make the support leg and center of gravity readable.
    - If anatomy risk is high or critical, keep anatomy guardrails through Phase 4.1, Phase 4.2, and the final repackaged output.
    - For reclining, semi-reclined, side-lying, propped-on-hands, propped-on-elbows, or bed/sofa poses, check the ribcage-pelvis-thigh-knee-shin-foot direction chain. The pelvis, folded legs, shins, and feet must not point in unrelated directions.
    - For soft-surface poses, include visible support logic: hips, thighs, knees, palms, or elbows contacting the bed or sofa, subtle fabric compression, contact shadows, and no floating lower legs.
    - If hands or elbows support the torso, describe the shoulder-elbow-wrist/palm load path so the upper-body weight visibly transfers into the surface.
    - For adult nude, towel-slip, body-paint, wet-cloth, or anatomy-repair prompts, treat visible nipples, areolae, and requested adult external genital anatomy as anatomical landmarks. Their placement must follow chest volume, ribcage turn, pelvis orientation, camera perspective, and occlusion by towel, hands, thighs, or fabric.
    - If the pose is too complex for stable anatomy, preserve pose intent but simplify impossible limb relationships.

    ```yaml
    anatomy_risk:
      level: "high"
      triggers:
        - "dynamic pose with one-leg support"
        - "glamour pose with fitted outfit"
        - "dance or athletic stance"
        - "lower-body emphasis with biomechanics concern"
      lower_body_visible: true
      support_leg_required: true
      pose_biomechanics_required: true
      renderer_guardrails_required: true
    ```

    ### Sex Characteristics / Body Presentation Consistency

    If the prompt explicitly requires adult body-presentation control — such as body trait drift prevention, intimate anatomy consistency, or adult male/female body locks in NSFW/glamour/swimsuit contexts — classify it with `config/character-identity/sex-characteristics-control.yaml`.

    Do NOT load this module for casual gender mentions (e.g. "a woman in a garden", "a male warrior"). A simple gender descriptor without body-presentation consistency concerns does not trigger this file. Check `_manifest.yaml` triggers first.

    This module is for **body-trait consistency**, not explicit anatomy. It prevents unintended trait drift such as male subjects gaining unintended feminine chest structure, female subjects gaining unintended male-coded torso traits, or user-specified androgynous/trans/nonbinary presentation being overwritten.

    | Field | Purpose |
    |-------|---------|
    | `sex_characteristics.intended_presentation` | male \| female \| androgynous \| trans \| nonbinary \| genderfluid \| user_specified \| unspecified |
    | `sex_characteristics.body_trait_lock` | male_coded \| female_coded \| androgynous \| user_specified \| unspecified |
    | `sex_characteristics.intimate_anatomy_lock` | male_external \| female_external \| user_specified \| unspecified |
    | `sex_characteristics.explicit_user_override` | whether user explicitly requested non-binary or nonstandard presentation |
    | `sex_characteristics.consistency_required` | whether renderer should include body-presentation guardrails |
    | `sex_characteristics.forbidden_trait_drift` | unintended body-trait drift to prevent |
    | `sex_characteristics.forbidden_intimate_trait_drift` | unintended external intimate-anatomy drift to prevent |
    | `sex_characteristics.renderer_guardrails` | model-specific positive / negative body-presentation phrases |

    Rules:
    - Explicit user-specified body presentation wins.
    - Do not force binary traits when the user explicitly requests androgynous, trans, nonbinary, gender-fluid, or user-specified presentation.
    - Use visible, non-explicit body-structure language.
    - Do not add explicit anatomy.
    - Mature / glamour styling must not override body-trait locks.
    - When an adult male/female subject is specified and anatomy visibility is relevant, keep external anatomy consistent with the specified subject.
    - Female-coded subjects should not gain unintended male external anatomy.
    - Male-coded subjects should not gain unintended female external anatomy.
    - Explicit user-specified anatomy or body presentation overrides automatic binary correction.
    - Use safe consistency language by default; use strict intimate-anatomy guardrail terms only for NSFW-sensitive, anatomy-sensitive, repair, or repeated-failure contexts.
    - If the user explicitly reports misplaced nipples, areolae, or adult external genital anatomy, use strict placement guardrails: correct adult anatomical landmark placement, correct skin/fabric/towel occlusion, and no misplaced, floating, duplicated, or wrong-sex visible anatomy.

    ```yaml
    sex_characteristics:
      intended_presentation: "male"
      body_trait_lock: "male_coded"
      intimate_anatomy_lock: "male_external"
      explicit_user_override: false
      consistency_required: true
      forbidden_trait_drift:
        - "feminine breasts"
        - "female-coded torso"
        - "wrong sex characteristics"
      forbidden_intimate_trait_drift:
        - "vagina"
        - "female external genital anatomy"
      renderer_guardrails:
        positive:
          - "adult male figure"
          - "masculine torso structure"
          - "flat chest"
          - "male-coded shoulder-waist-hip proportions"
        negative:
          - "feminine breasts"
          - "female chest"
          - "wrong sex characteristics"
    ```

    ### Physical Collision / Spatial Contact Consistency

    If the prompt involves complex spatial interaction — such as multi-subject physical contact, prop/object handling with grip concern, vehicle/person contact, material-sensitive interaction, pool-edge vs water-surface disambiguation, or collision risk from tight overlap — classify collision/contact risk with `config/scene-environment/physical-collision-guardrails.yaml`.

    Do NOT load this 38KB file for every seated or leaning pose. Casual sitting, standing, or simple poses without significant object/contact interaction do not need full collision physics. Assess collision_risk.level first — this file is only needed when risk is MEDIUM/HIGH/CRITICAL.

    This module is not only about avoiding clipping. It also defines:

    - physical contact logic
    - support surfaces and weight transfer
    - front/back occlusion hierarchy
    - readable overlap amount
    - hand-prop interaction
    - clothing/accessory contact
    - material hardness / gloss / texture response
    - light-shadow interaction that reinforces physical presence

    | Field | Purpose |
    |-------|---------|
    | `collision_risk.level` | low \| medium \| high \| critical |
    | `collision_risk.triggers` | which prompt cues triggered collision strengthening |
    | `collision_risk.contact_logic_required` | whether touching / support relationships must be made explicit |
    | `collision_risk.occlusion_required` | whether front/back layering must be specified |
    | `collision_risk.material_interaction_required` | whether surface/light interaction must be stated |
    | `collision_risk.renderer_guardrails_required` | whether renderer-specific collision wording should be added |

    Rules:
    - Explicitly state what touches what, what supports what, and what occludes what.
    - Use overlap wording such as `A partially occludes B` when composition depends on layering.
    - Use contact-shadow and material-response wording when objects otherwise look flat or plastic.
    - Do not allow body-object clipping, floating contact, impossible grips, wrong occlusion order, or merged geometry.
    - When material realism matters, state hardness, gloss, texture, and light interaction.
    - For bed, sofa, cushion, blanket, or mattress poses, specify where body weight settles and where fabric compresses. This is required for semi-reclined, side-lying, kneeling-on-bed, and hand-supported poses.
    - For pool-edge exit poses such as `hands supporting on pool edge`, `climbing out of pool`, or `emerging from pool`, preserve the downward support action: palms press down on the pool coping, fingers curl over the near edge, elbows bend downward, shoulders load into the hands, and the pool edge remains beside or in front of the subject rather than above the head.
    - For after-bath towel-slip poses, preserve towel physics: thick terry towel, continuous torso wrap, visible top-edge thickness, one edge slipping diagonally downward, another edge anchored under the arm or lightly held, heavy damp folds, and soft contact shadows where towel overlaps wet skin.
    - For after-bath or post-shower towel poses, default to wet context: damp or wet hair, wet skin with droplets, slightly damp towel where it touches the body, darker wet contact zones, and heavier absorbent terry folds unless the user explicitly asks for a dry staged towel.

    ```yaml
    collision_risk:
      level: "high"
      triggers:
        - "leaning on a car"
        - "hand holding a product"
        - "foreground overlap"
        - "glossy painted metal"
      contact_logic_required: true
      occlusion_required: true
      material_interaction_required: true
      renderer_guardrails_required: true
    ```

    ### Scene Worldbuilding / Background Enrichment

    If the task benefits from a fuller environment — such as editorial covers, fashion scenes, automotive scenes, lifestyle images, cinematic portraits, product ads, or posters — classify and enrich the scene with `config/scene-environment/scene-worldbuilding-library.yaml` and `config/scene-environment/environment-props-library.yaml`.

    This module helps the system move beyond a subject-only prompt into a complete scene:

    - scene type inference
    - background density control
    - foreground / midground / background / far-depth layering
    - environmental storytelling
    - subject-background interaction
    - negative-space planning for typography when needed
    - style-consistent worldbuilding

    | Field | Purpose |
    |-------|---------|
    | `scene_enrichment.scene_type` | the most suitable environment type for the subject/task |
    | `scene_enrichment.background_density` | sparse \| balanced \| rich \| cinematic_dense |
    | `scene_enrichment.depth_layers` | structured foreground, midground, background, far-background scene elements |
    | `scene_enrichment.environmental_storytelling` | atmosphere and narrative support elements |
    | `scene_enrichment.subject_background_interaction` | reflections, support, palette harmony, and light/environment relationship |
    | `scene_enrichment.style_consistency_rules` | keep the background rendering aligned with the subject/task style |
    | `scene_enrichment.negative_space_required` | whether background complexity should be reduced for text or hero focus |

    Rules:
    - Do not rely on "detailed background" alone; define the place.
    - Infer a suitable environment if the user leaves the background underspecified.
    - Use depth layering so the scene does not feel flat.
    - Use environmental storytelling details that strengthen the subject and mood.
    - Control density: some tasks need a rich world, some need clean negative space.
    - Keep background style aligned with the subject rendering language.

    ### Era & Culture Contextual Authenticity

    If the prompt contains or implies an era, historical period, cultural region, traditional style, retro setting, futuristic culture, or geographically specific visual language, classify it with `config/scene-environment/era-culture-library.yaml`.

    Era and culture affect the full scene logic: architecture, fashion silhouettes, hair and makeup, props and tools, vehicles, signage and typography, furniture and interiors, materials and craft logic, color aesthetics, social atmosphere, and anachronism avoidance.

    Rules:
    - Preserve explicit user-specified era, culture, and region.
    - Avoid anachronistic objects unless deliberate fusion is requested.
    - Avoid generic cultural mashups and stereotypes.
    - If fusion is requested, define the fusion logic clearly.
    - Coordinate era/culture with scene worldbuilding, environment props, rendering, and typography.

    ### Environment & Atmosphere Control

    If the prompt requires structured atmospheric enrichment — translating mood into concrete environmental cues, defining weather/season effects, adding sensory ambience, or controlling visibility/particles — classify it with `config/scene-environment/environment-atmosphere-library.yaml`.

    Do NOT load for casual time-of-day mentions like "morning light" or "sunny day" without atmosphere enrichment need. Simple time/weather descriptors can be handled inline without this 12KB file.

    Environment and atmosphere affect the sensory layer of the image: time of day, weather, season, air quality, humidity, temperature feel, atmosphere density, mood, sensory cues, lighting cues, particle effects, ambient motion, and background visibility.

    Rules:
    - Translate mood into concrete environmental cues.
    - Keep weather, lighting, surface response, and air quality consistent.
    - Use atmosphere to support mood, not to randomly obscure the subject.
    - Coordinate atmosphere with lighting diagrams, scene worldbuilding, color palette, and rendering technicals.
    - Avoid overdone bloom, random fog, muddy visibility, or inconsistent weather cues.

    ### Typography / Graphic Design Layout Control

    If the request contains or implies typography, logo, brand name, magazine cover, poster, product ad, campaign visual, signage, UI-like layout, title, headline, cover lines, or exact text, classify it with `config/text-brand-layout/typography-layout-system.yaml`.

    Typography affects the image as a design system:

    - layout type
    - text hierarchy
    - masthead / headline / subhead / cover-line logic
    - logo placement
    - grid system
    - safe margins
    - typography reserve zones
    - subject avoid zones
    - negative space planning
    - exact text preservation
    - random text prevention

    Rules:
    - Never add `no text` when the user requested cover/poster/ad typography.
    - Preserve exact user-provided text, spelling, capitalization, and brand names.
    - Keep text away from faces, hands, product hero areas, and key composition lines unless intentionally requested.
    - If exact long text is critical, reserve clean zones and prefer post-layout editing.

    ```yaml
    typography_layout:
      layout_type: "magazine_cover"
      text_intent: "exact"
      text_hierarchy:
        masthead: "BRAND NAME"
        headline: "MAIN TITLE"
        cover_lines: []
      grid_system:
        layout_grid: "asymmetrical_editorial"
        typography_reserve_zones:
          - "top masthead band"
          - "right side cover-line column"
        subject_avoid_zones:
          - "face"
          - "hands"
          - "product logo"
    ```

    ### Multi-subject Interaction Control

    If the request contains multiple people, multiple characters, team scenes, group selfies, duos, families, crowds, sports teams, dance partners, fight/action scenes, or multi-product compositions, classify it with `config/character-identity/multi-subject-interaction-system.yaml`.

    Multi-subject control prevents subjects from merging and clarifies:

    - subject count
    - per-subject character card
    - primary / secondary roles
    - left / center / right placement
    - foreground / midground / background placement
    - camera distance from each person
    - individual pose and gaze
    - hair / outfit / accessory differentiation
    - group formation
    - shared event center
    - event source subject
    - effect direction and reaction timing
    - subject spacing
    - interaction target
    - physical contact
    - occlusion order
    - identity separation
    - collision risk

    Rules:
    - Count subjects explicitly.
    - Assign each subject a role, position, pose, gaze, and interaction target.
    - For multi-person action, define the shared event center, who causes it, the physical direction of the effect, and how each subject reacts.
    - For premium ensemble or cosplay-style group images, give every key person a compact character card: position, depth, hair color/style, outfit silhouette, material, accessory motif, expression, gaze, and hand role.
    - Use one shared camera, lighting, wetness/material system, and environment to unify the group; do not make separate characters look pasted from different images.
    - Preserve distinct faces, silhouettes, and wardrobes.
    - Apply physical-collision and occlusion guardrails for close-contact scenes.
    - For pool, splash, confetti, smoke, or motion-effect group scenes, keep hands, feet, support plane, and partial occlusion readable; do not allow the effect to become a pasted overlay.
    - For six or more subjects, use group rhythm and hierarchy rather than over-describing every person.

    ```yaml
    multi_subject_interaction:
      subject_count: 3
      primary_subject: "center foreground subject"
      character_design_matrix:
        - "subject_A: foreground center, pink hair, direct calm gaze, leather-and-fabric outfit, one foreground selfie arm"
        - "subject_B: upper left, blonde wet hair, confident gaze, white vest with straps and dark inner layer"
        - "subject_C: upper right, reddish hair, bright laugh, pink outfit accents, reaching hand"
      group_composition:
        formation: "triangle"
        spacing: "natural"
        hierarchy: "single_hero"
      interaction_logic:
        - "primary subject looks at camera"
        - "secondary subjects support the composition from left and right"
      shared_event_center:
        source_subject: "center-left subject"
        action_cause: "hands scooping water upward"
        effect_origin: "palms at pool surface"
        effect_direction: "upward arc, then falling droplets"
        reaction_targets:
          - "other subjects look toward the splash with varied natural reactions"
      identity_separation_required: true
    ```

    ### Atmosphere & Cosmic Light

    If the prompt depends on outdoor natural light, celestial light, storm drama, aurora, fog, mist, god rays, lightning, blizzard, sandstorm, or large-scale atmospheric spectacle, classify it with `config/scene-environment/atmosphere-cosmic-light.yaml`.

    This module controls:
    - sun / moon / aurora / lightning / eclipse light logic
    - sky condition and cloud behavior
    - volumetric atmosphere and atmospheric optics
    - weather-driven particles and surface response
    - readability safeguards for dramatic outdoor scenes

    Rules:
    - Tie outdoor mood to a real sky/light condition.
    - Extreme weather must affect visibility and surfaces, not only add particles.
    - Preserve subject readability under dramatic weather and low light.
    - Use atmospheric optics only when physically justified.

    ### Oceans & Subaquatic Physics

    If the prompt involves sea, shore, surf, waves, harbors, underwater scenes, reefs, marine ruins, diving, or strong subject-water interaction, classify it with `config/scene-environment/oceans-subaquatic-physics.yaml`.

    This module controls:
    - wave and surf structure
    - tide and shoreline logic
    - foam, spray, wetness, and reflections
    - underwater visibility and light filtering
    - caustics, refraction, buoyancy, and suspended particles

    Rules:
    - Specify whether the scene is above water, at the shoreline, or underwater.
    - Water state must match wind, weather, and camera distance.
    - Underwater scenes must show filtered light and depth-dependent visibility.
    - Wet surfaces should visibly respond to water.

    ### Mountains & Terrains

    If the prompt depends on mountain scale, ridgelines, cliffs, valleys, canyons, glaciers, dunes, alpine weather, or large-scale landform readability, classify it with `config/scene-environment/mountains-terrains.yaml`.

    This module controls:
    - landform type and climate band
    - terrain layering from foreground to far distance
    - geology, vegetation, and snow/ice distribution
    - atmospheric perspective and ridge separation
    - scale readability in large landscapes

    Rules:
    - Define the dominant landform type.
    - Use terrain layers to communicate scale.
    - Match vegetation, snow, and rock to altitude and climate.
    - Preserve subject readability while maintaining environmental grandeur.

    ### Automotive Motion / Rain Physics

    If the prompt involves a moving vehicle, sports car, racing scene, rain-soaked road, highway speed, wheel spray, or night headlights, classify it with `config/core-knowledge.yaml` (`subject_rules` section), `config/visual-cinematography/motion-capture.yaml`, `config/visual-cinematography/cinematography-grammar.yaml`, `config/visual-cinematography/rendering-technicals-library.yaml`, `config/scene-environment/atmosphere-cosmic-light.yaml`, and `config/prompt-core/failure-taxonomy.yaml`.

    Rules:
    - Preserve vehicle identity, body type, correct grille, symmetrical headlights, clean wheel geometry, and tire contact.
    - Define travel direction and camera tracking direction.
    - For speed, prefer sharp panning language: crisp car body, spinning wheels, horizontal background streaks, and road-line motion.
    - For rain, define tire contact patches cutting through shallow standing water.
    - Water spray should be thrown outward and backward from each tire, not floating, moving forward, or detached from the wheels.
    - Headlight beams should align with the vehicle's forward path and scatter through rain mist; avoid diagonal spotlight beams crossing the car body.
    - Wet asphalt reflections should stretch along the road plane and perspective.
    - Avoid broad negative terms like `blurry subject` when motion is required. Use targeted negatives such as `blurred car body`, `soft grille`, `melted headlights`, `warped wheels`, `diagonal spotlight crossing the vehicle`, `dry tire contact`, and `water spray without tire source`.

    ### Attribute Change Control

    Explicitly define what the user has locked vs what the enhancement pipeline may change. This prevents Phase 2-4 from modifying attributes the user considers fixed.

    | Category | Description |
    |----------|-------------|
    | `locked_attributes` | things the user has explicitly stated must not change (face, hairstyle, body shape, outfit, background, specific product, brand identity) |
    | `editable_attributes` | things the user has implied or explicitly permitted to change (pose, expression, lighting, camera angle, timing) |
    | `forbidden_changes` | hard rules from the user — things the enhancement pipeline must never do regardless of aesthetic judgment |

    Extract these from the user's language:
    - "same face" / "keep the same" / "不變" / "一樣" → locked
    - "only change..." / "just adjust..." → locked everything else, edit only specified
    - Unspecified attributes are implicitly editable unless context suggests otherwise

    ```yaml
      attribute_change_control:
        locked_attributes:
          - face
          - hairstyle
          - body_shape
          - outfit
          - background
        editable_attributes:
          - pose
          - expression
          - lighting
        forbidden_changes:
          - changing identity
          - changing clothing
          - changing camera crop
    ```

    ### Constraint Model (Three-Tier)

    Classify every constraint extracted from the user prompt into one of three tiers. This prevents over-enhancement (adding things that conflict with user intent) and under-enforcement (ignoring critical user requirements).

    | Tier | Description | Examples |
    |------|-------------|----------|
    | `hard_locks` | Cannot be changed under any enhancement. These override all aesthetic judgment. | exact brand colors, required text, specific subject identity, forbidden elements, minimum detail fidelity |
    | `soft_preferences` | Should be respected unless they conflict with a hard lock. May be deprioritized if they cause quality degradation. | implied mood references ("like a luxury perfume ad"), suggested styles, optional color tones |
    | `inferred_enhancements` | Can be added only if they do not conflict with any hard lock or soft preference. These are the pipeline's creative license. | additional mood adjectives, secondary lighting refinements, subtle material detail enrichments |

    Extraction rules:
    - Explicit user statements → `hard_locks`
    - Implied preferences and comparisons → `soft_preferences`
    - Gaps where no user constraint exists → `inferred_enhancements` may fill them from config knowledge bases

    ```yaml
      constraint_model:
        hard_locks:
          description: "Cannot be changed under any enhancement."
          items: []
        soft_preferences:
          description: "Should be respected unless conflicting."
          items: []
        inferred_enhancements:
          description: "Can be added only if not conflicting."
          items: []
    ```

    ### Risk Flags

    | Field | Purpose |
    |-------|---------|
    | `risk_flags` | known failure modes predicted from the configuration (text rendering, anatomy, exact identity, over-FX, brand consistency) |

    Target output:

    ```yaml
    intent:
      task_profile: "product_ad"
      subject_type: "glass bottle"
      subject_role: "hero"
      usage_context: "e-commerce hero image"
      audience: "premium skincare buyers"
      aspect_ratio: "1:1"
      output_medium: "digital"
      model_target: "chatgpt_image"

      visual_hierarchy: ["bottle_label", "gold_cap", "marble_reflection", "silk_drape"]
      narrative_context: "luxury skincare product floating in warm amber light, isolated from the world"
      hero_element: "product label with gold foil detail"
      secondary_elements: ["cream silk fabric right side", "polished marble slab"]
      reference_mood: "Tom Ford fragrance ad, dark warm luxury"

      constraint_model:
        hard_locks:
          - "gold tone accent, no bright colors"
          - "no human model"
          - "text LUMIÈRE on product label center — must be fully legible"
          - "text 'Gold Serum' on product label below brand name"
          - "keep right 30% clear for text overlay"
        soft_preferences:
          - "dark warm luxury mood like Tom Ford fragrance ad"
          - "studio controlled lighting"
          - "centered hero with breathing room"
        inferred_enhancements:
          - "amber gold color palette to support luxury brand feel"
          - "soft gradient background to isolate product"
          - "subtle marble reflection to add depth without distraction"

      risk_flags: ["text_rendering", "glass_reflection", "brand_color_accuracy"]
    ```
