schema_version: "1.0.0"
name: nsfw-cinematic-enhancement-pipeline
purpose: >
  Preserve the original prompt enhancer's composition, cinematography, scene,
  material, anatomy, and review architecture while routing final delivery only
  to the NSFW Flux and Z-Image prompt-pack contract.

pipeline:
  - id: phase_0_config_resolution
    action: "Read the core, NSFW overrides, prompt-pack contract, and only the domain modules triggered by the request."
  - id: phase_1_intent_analysis
    action: "Classify subject kind, resolve always-NSFW baseline, visible exposure contract, and one exposure action target/route for eligible human/humanoid subjects, then extract hard locks, task mode, adult tier, character identity, wardrobe transformation, edit scope, visual goal, aspect ratio, risk flags, dynamic_scene_plan, visual_focus_plan, and local_anatomy_surface activation."
  - id: phase_2_composition_and_cinematography
    action: "Resolve visual focus, visible exposure target, compatible garment/material action, exposed end state, and dynamic pose/action timing first, then run the composition decision order, camera relationship, shot scale, crop safety, depth, lighting, exposure, local anatomy surface, material, style mode, and visual hierarchy analysis."
  - id: phase_3_scene_blueprint
    action: "Build a model-neutral blueprint covering adult baseline tier, visible exposure contract, exposure action plan, wardrobe transformation, subject, visual focus, pose support, contact anchors, force direction, occlusion, gaze/reaction, secondary motion, scene depth, lighting behavior, local anatomy surface, material response, environment coupling, and constraints."
  - id: phase_3_1_prompt_package
    action: "Compile the blueprint into categorized prompt fields with provenance, hard locks, dynamic_scene_plan, visual_focus_plan, local_anatomy_surface_contract when active, material_environment_plan, and lighting_environment_plan."
  - id: phase_4_self_review
    action: "Evaluate intent preservation, exposure target-action-end-state feasibility, composition readability, anatomy, support, contact, timing, occlusion, motion, adult eligibility, material plausibility, lighting/environment coupling, style consistency, and failure risks; recompose from Phase 2 at most twice before blocking delivery."
  - id: phase_4_1_cleanup
    action: "Remove redundancy and contradictions while retaining every meaningful composition, identity, action, and adult-content lock."
  - id: phase_4_2_comfyui_renderer
    action: "Apply only config/comfyui-prompt-pack.yaml; do not invoke any legacy renderer target."
  - id: phase_4_3_delivery_package
    action: "Normalize the four required Flux/Z-Image fields and resolution recommendation."
  - id: phase_5_final_output
    action: "Return the Chinese-labelled, English prompt pack. Export only on explicit user request."

composition_decision_order:
  - story_goal
  - subject_and_identity
  - dynamic_scene_structure
  - visual_hierarchy
  - camera_relationship
  - shot_scale
  - crop_safety
  - gaze_or_action_flow
  - frame_layout
  - background_role_and_negative_space
  - depth_layers
  - light_hierarchy
  - visual_balance
  - anatomy_contact_and_material_failure_guardrails

module_routing:
  baseline:
    - config/core-knowledge.yaml
    - config/prompt-core/prompt-assembly-schema.yaml
    - config/prompt-core/quality-rubric.yaml
    - config/prompt-core/failure-taxonomy.yaml
    - config/prompt-core/intent-preservation-review.yaml
    - config/visual-cinematography/composition-decision-engine.yaml
    - config/visual-cinematography/camera-technical-router.yaml
    - config/visual-cinematography/shot-taxonomy.yaml
    - config/visual-cinematography/crop-safety-rules.yaml
    - config/visual-cinematography/visual-hierarchy-system.yaml
    - config/nsfw-dynamic-scene-controller.yaml
    - config/nsfw-material-environment-controller.yaml
    - config/nsfw-composition-lighting-controller.yaml
    - config/nsfw-baseline-resolver.yaml
    - config/nsfw-local-anatomy-surface-controller.yaml
    - config/nsfw-visual-director.yaml
  adult_human:
    - config/character-identity/human-anatomy-guardrails.yaml
    - config/character-identity/pose-gesture-body-language.yaml
    - config/character-identity/adult-lens-aware-posing-system.yaml
    - config/character-identity/adult-hand-placement-system.yaml
    - config/character-identity/adult-standing-pose-system.yaml
    - config/character-identity/adult-seated-pose-system.yaml
    - config/character-identity/adult-reclining-pose-system.yaml
    - config/character-identity/adult-nude-pose-system.yaml
    - config/character-identity/adult-garment-pose-interaction-system.yaml
    - config/character-identity/reclining-pose-physics.yaml
    - config/character-identity/fabric-opacity-translucency-logic.yaml
    - config/character-identity/garment-motion-physics.yaml
    - config/safety-mature/adult-pose-tiering-system.yaml
    - config/safety-mature/mature-content-tiering-system.yaml
  image_edit:
    - config/edit-reference/reference-image-control.yaml
    - config/edit-reference/attribute-change-control-policy.yaml
    - config/edit-reference/image-edit-repair-templates.yaml
  scene_when_relevant:
    - config/scene-environment/scene-worldbuilding-library.yaml
    - config/scene-environment/physical-collision-guardrails.yaml
    - config/scene-environment/soft-surface-contact-physics.yaml
    - config/scene-environment/action-object-attention-system.yaml
    - config/scene-environment/environment-atmosphere-library.yaml
  visual_when_relevant:
    - config/visual-cinematography/lighting-diagrams.yaml
    - config/visual-cinematography/camera-lens-library.yaml
    - config/visual-cinematography/exposure-decision-engine.yaml
    - config/visual-cinematography/material-rendering-library.yaml
    - config/visual-cinematography/depth-layering-system.yaml
    - config/visual-cinematography/visual-balance-system.yaml
    - config/visual-cinematography/gaze-action-composition-logic.yaml
    - config/visual-cinematography/motion-capture.yaml
    - config/visual-cinematography/shutter-motion-control-system.yaml
    - config/visual-cinematography/style-realism-control.yaml
    - config/visual-cinematography/expert-visual-synthesis-system.yaml

preservation_rules:
  - The final model target never skips an enhancement or review phase.
  - Model-specific syntax may not drop composition, crop, anatomy, contact, lighting, material, or hard-lock decisions.
  - Adult rules constrain subject eligibility and content handling; they do not replace the cinematic enhancement pipeline.
  - Dynamic-scene, visual-focus, local-anatomy-surface, material-environment, and composition-lighting plans are internal contracts; their visible decisions must survive both Flux and Z-Image rendering.
  - For eligible human/humanoid subjects, always-NSFW baseline resolution occurs before ordinary user-intent preservation; age safety and real-person blocking remain higher priority.
