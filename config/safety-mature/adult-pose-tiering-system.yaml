schema_version: "1.0.0"
name: "adult-pose-tiering-system"
description: "Routes clearly adult glamour, boudoir, swimwear, nude figure, and adult-focused posing to appropriate visual and physical rules. LOAD POLICY: Only when explicit adult pose tier selection is needed (glamour vs boudoir vs implied vs explicit). Do NOT load for generic adult content — core-knowledge age_safety covers it."

adult_content_policy:
  adult_content_allowed: true
  only_hard_restriction: [underage, childlike]
  renderer_behavior: [classify_adult_tier, preserve_pose_quality, preserve_anatomical_coherence, preserve_physical_plausibility]

adult_pose_tiers:
  glamour:
    focus: [fashionable_body_line, confident_expression, elegant_hand_placement]
  boudoir:
    focus: [private_interior_context, supported_pose, relaxed_body_line]
  lingerie_or_swimwear:
    focus: [garment_structure, silhouette, camera_friendly_full_body_pose]
  implied_nude:
    focus: [strategic_coverage_physics, body_line, mature_presentation]
  artistic_nude:
    focus: [figure_study, sculptural_light, anatomical_form]
  explicit_adult:
    focus: [adult_age_clarity, anatomical_coherence, support_points, renderer_capability]
  adult_action_scene:
    focus: [clear_action_intent, mutual_spatial_logic, anatomy_and_contact]

routing_rules:
  - "Keep requested adult pose tier; do not automatically convert it to a plain portrait or conservative fashion stance."
  - "Route standing, seated, reclining, mirror, wet, and back-view poses to their matching pose module."
  - "Route implied or nude figure contexts through age guardrails, body support, camera-aware posing, and fabric/contact logic."
  - "Adult tier never overrides anatomy, consent-independent physical plausibility, or age boundary rules."

prompt_assembly_hooks:
  phase_1_intent_analysis:
    action: "Classify adult pose tier only when mature or adult body-presentation intent is explicit."
  phase_2_cinematic_enrichment:
    action: "Select pose family, body line, hand intent, support points, lens compatibility, and material response."
  phase_4_self_review:
    checks: [adult_age_clarity, pose_tier_preserved, support_visible, no_underage_or_childlike_presentation]
