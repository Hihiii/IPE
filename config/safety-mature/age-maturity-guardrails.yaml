schema_version: "1.0.0"
name: "age-maturity-guardrails"
description: "Single hard-boundary controller for mature prompts; preserves all adult intent while blocking only underage or childlike framing. LOAD POLICY: Only when age boundary is ambiguous (youth-coded cues vs adult intent). Core-knowledge age_safety covers the standard case."

age_maturity_guardrails:
  hard_block:
    - childlike
    - underage
  required_for_adult_content:
    - clearly_adult_subject
    - mature_facial_structure
    - adult_body_proportions
    - adult_styling_or_context

positive_markers:
  - "adult woman or adult man"
  - "mature adult facial features"
  - "adult body proportions"
  - "clearly adult model"
  - "adult fashion styling"

negative_markers:
  - childlike
  - underage

rules:
  - "Use one positive adult marker near the subject description when mature posing is relevant."
  - "Apply only `underage` and `childlike` negatives; do not introduce any other adult-content suppression."
  - "When age is ambiguous in a mature request, resolve toward clearly adult presentation before rendering."
