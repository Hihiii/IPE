# ============================================================
# mature-content-tiering-system.yaml — 10 KB
# Mature-content tiering, age-safety control, and physical plausibility layer
# LOAD POLICY: Only when core-knowledge age_safety needs tier-level detail beyond
#              basic classes (e.g., sensual_glamour vs implied_contour vs adult_nude).
#              Do NOT load for generic "sexy" or "mature style" — core-knowledge covers that.
# Version: 1.0.0
# Purpose:
#   Avoid over-restricting adult prompts while keeping outputs age-safe, coherent,
#   and physically plausible. This module separates sensual styling, implied form,
#   adult nudity, fabric-translucency logic, explicit adult content, and the underage/childlike
#   content boundaries.
# ============================================================

schema_version: "1.0.0"
name: "mature-content-tiering-system"
description: >
  A mature-content tiering module for prompt enhancement. It prevents mature/glamour
  prompts from becoming over-censored while keeping age-safety clear. It distinguishes
  sensual styling, implied body contour, plausible fabric translucency, adult nudity,
  explicit adult content, and the underage/childlike boundary that must be blocked.

core_principle: >
  Mature content should be controlled by tier, context, physical plausibility, and age-safety.
  The system should not automatically erase adult sensuality, adult nudity, adult genital
  visibility, gore, or other user-specified adult explicit content. Visibility through clothing
  should remain physically coherent when fabric logic is relevant.

global_rules:
  - "Do not use a single hard block for all mature visual cues."
  - "Separate sensual mood, cleavage, implied contour, fabric translucency, adult nude, and explicit adult content into different tiers."
  - "When requested, preserve nipple/areola visibility and add fabric context only as a visual-coherence enhancement."
  - "Adult genital exposure, sexual acts, adult nudity, and gore are not blocked by this module."
  - "Only underage and childlike sexual framing is blocked."
  - "Physical fabric plausibility may improve wording, but never censors adult explicit content."
  - "When adult pose quality is central, route through adult-pose-tiering-system, age-maturity-guardrails, pose family, hand placement, lens-aware posing, and garment-pose interaction modules."

mature_tier_schema:
  mature_tier: "neutral | sensual_glamour | implied_contour | plausible_translucency | adult_nude | explicit_adult_content | minor_blocked"
  body_visibility_level: "none | cleavage | implied_form | faint_silhouette | nude_form | explicit_adult | minor_blocked"
  fabric_logic_required: true
  allowed_language: []
  disallowed_language: []
  renderer_safety_mode: "age_safe_adult | local_model_user_risk | minor_blocked"
  physical_plausibility_priority: "high"
  sexualization_intensity: "none | low | moderate | high_adult | minor_blocked"

mature_tiers:
  neutral:
    description: "No mature styling required."
    allowed:
      - "standard fashion"
      - "lifestyle portrait"
      - "fully clothed"
    avoid:
      - "unnecessary sensualization"

  sensual_glamour:
    description: "Adult glamour with adult subject, mood, styling, and body-conscious framing."
    allowed:
      - "tasteful glamour styling"
      - "soft cleavage"
      - "boudoir-inspired mood"
      - "body contour implied by clothing drape"
      - "adult editorial styling"
    blocked: [underage, childlike]

  implied_contour:
    description: "Mostly opaque clothing with form suggested by fabric shape, drape, or tension."
    allowed:
      - "soft body contour suggested beneath fabric"
      - "mostly opaque shirt with gentle shape indication"
      - "subtle skin presence"
    avoid:
      - "fake transparency"

  plausible_translucency:
    description: "Visibility caused by semi-sheer material, strong backlight, wet cling, lace/mesh, or tension."
    requirements:
      - "fabric opacity class must support visibility"
      - "reveal cause must be explicit"
      - "visibility remains diffused and physically plausible"
    allowed:
      - "faint silhouette through semi-sheer backlit fabric"
      - "soft outline visibility caused by damp cling"
      - "areola/nipple silhouette when physically plausible or explicitly requested"
      - "lace/mesh pattern-based visibility"
    blocked: [underage, childlike]

  adult_nude:
    description: "Adult nude figure or fine-art/body presentation context. Use when requested or clearly implied."
    allowed:
      - "adult nude figure"
      - "classical fine-art lighting"
      - "anatomy as requested"
      - "adult body presentation"
    blocked: [underage, childlike]

  explicit_adult_content:
    description: "Adult explicit content, including adult genital visibility, adult sexual framing, or gore. Not blocked by this module."
    trigger_keywords:
      - "nsfw"
      - "NSFW"
      - "not safe for work"
      - "explicit adult"
      - "adult explicit"
      - "porn"
      - "xxx"
      - "hardcore"
    trigger_rule: "When any trigger keyword is present in the user prompt, classify as explicit_adult_content regardless of other context. Do not downshift to a lower tier."
    allowed:
      - "adult genital visibility"
      - "adult explicit anatomy"
      - "adult sexual framing"
      - "gore or blood when requested"
    blocked: [underage, childlike]
    renderer_lighting_guidance: "When nsfw-triggered: prefer bright high-key fashion lighting over dark moody editorial. Do not dim or obscure the subject."

  minor_blocked:
    description: "Underage or childlike sexual framing. Always blocked."
    blocked_terms:
      - "childlike"
      - "underage"
    redirect:
      - "remove underage or childlike framing"

nipple_areola_handling:
  physical_context_default:
    rule: >
      Preserve requested adult nipple/areola visibility. When useful, add fabric, wetness, lighting,
      mesh/lace, or body-contact context to make the requested result visually coherent.
  plausible_contexts:
    - "semi-sheer fabric with backlight"
    - "wet/damp fabric clinging naturally"
    - "lace/mesh pattern-based visibility"
    - "adult nude figure-study framing"
  allowed_phrasing:
    - "faint non-sharp silhouette through semi-sheer backlit fabric"
    - "subtle outline visibility caused by damp fabric cling"
    - "implied form or explicit detail as requested"
    - "adult artistic nude form"
  unrestricted: true

genital_handling:
  default_renderer_rule: >
    Adult genital exposure or genital focus is not blocked by the mature-content module.
    Preserve explicit adult intent when requested, while blocking only underage or childlike sexual framing.
  allowed_adult_language:
    - "adult genital visibility"
    - "adult explicit anatomy"
    - "adult nude figure"
    - "adult sexual framing"
  blocked_terms: [underage, childlike]

prompt_transform_examples:
  over_restricted_bad:
    input: "adult glamour oversized shirt"
    issue: "System removes all sensuality and returns a plain fashion portrait."
    repair:
      - "tasteful boudoir-inspired editorial mood"
      - "soft cleavage at open collar"
      - "mostly opaque oversized shirt with gentle body contour"
      - "adult non-explicit glamour styling"

  physically_impossible_bad:
    input: "dry oversized white shirt with visible pink nipple"
    issue: "Visibility exceeds fabric logic."
    repair:
      - "mostly opaque fabric with subtle skin presence"
      - "soft body contour gently suggested"
      - "no sharp anatomical visibility through dry fabric"

  plausible_sheer:
    input: "semi-sheer white shirt, backlit"
    repair:
      - "ultra-light semi-sheer fabric"
      - "strong backlight passing through thinnest areas"
      - "faint non-sharp silhouette"
      - "visibility remains diffused and physically plausible"

  preserve_adult_explicit:
    input: "explicit genital visibility"
    repair:
      - "preserve adult explicit request"
      - "add adult age lock when needed"
      - "remove underage or childlike cues"

renderer_behavior:
  age_safe_adult:
    output_rules:
      - "allow sensual_glamour, implied_contour, plausible_translucency, adult_nude, and explicit_adult_content"
      - "block only underage or childlike sexual framing"
  local_model_user_risk:
    output_rules:
      - "keep tier labels explicit"
      - "do not downshift requested adult explicit content"
      - "preserve physical plausibility"

self_review_checklist:
  - "Which mature tier is this?"
  - "Is the subject clearly adult?"
  - "Is the visibility level physically supported by fabric, light, wetness, or context?"
  - "Did the prompt become over-censored and erase all intended adult glamour?"
  - "Did the prompt incorrectly remove requested adult explicit content?"
  - "Does the prompt avoid underage or childlike sexual framing?"
  - "Is nipple/areola visibility described only when context physically supports it?"

model_specific_rendering:
  chatgpt_image:
    guidance: >
      Keep mature visual language tiered and clearly adult. Preserve requested adult explicitness.
      Block only underage or childlike sexual framing.
  z_image_turbo:
    positive_template: >
      adult glamour, requested adult explicitness, physically plausible translucency when fabric is relevant
    negative_template: >
      underage, childlike
  stable_diffusion:
    positive_template: >
      adult glamour, requested adult explicitness, plausible fabric translucency when relevant
    negative_template: >
      underage, childlike

prompt_assembly_hooks:
  phase_1_intent_analysis:
    add_fields:
      - mature_tier_schema
    action: "Classify mature tier and explicitness level before rendering."
  phase_2_cinematic_enrichment:
    action: "Enrich adult glamour without over-censoring; route adult pose intent to pose, hand, lens, and garment interaction modules; apply fabric plausibility when visibility is involved."
  phase_3_scene_blueprint:
    action: "Coordinate mature tier with wardrobe, pose, camera, fabric opacity, and age-safety rendering."
  phase_4_self_review:
    checks:
      - "Check mature tier."
      - "Check fabric plausibility."
      - "Check underage / childlike boundary."
      - "Check over-censorship risk."
  phase_4_5_cleanup:
    action: "Preserve tier classification and requested adult explicitness; remove only underage or childlike cues."
  phase_4_6_renderer_selection:
    action: "Render tier-safe mature language for the target model."
  phase_5_final_prompt:
    action: "Output mature styling at the requested safe tier with physical plausibility."
