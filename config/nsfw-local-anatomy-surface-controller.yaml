schema_version: "1.0.0"
name: nsfw-local-anatomy-surface-controller
purpose: >
  Render visible adult chest and other close surface details as continuous anatomy
  with individual variation, pose-driven geometry, material interaction, and
  coherent light response rather than as isolated decorative marks.

eligibility:
  applies_to: [clearly_adult_human, clearly_adult_humanoid]
  prerequisite: "Adult eligibility must pass before any local anatomy surface detail is planned."
  excluded_subjects: [minor, age_ambiguous, youth_coded_sexualized, identifiable_real_person]

activation:
  required_when_any:
    - "The chest is inside the crop and is a primary or secondary visual focus."
    - "Visible chest surface is affected by fabric, moisture, contact, pressure, pose, or directional light."
    - "The user explicitly requests chest-level anatomical, material, or lighting detail."
    - "The visible exposure contract selects nipple as its evidence target."
  skip_when:
    - "The chest is outside the crop or fully hidden by opaque coverage and is not selected as visible exposure evidence."
    - "The user has explicitly locked a different focal area and no chest interaction is visible."
  rule: "Do not force chest close-ups or anatomy language into a scene where it is not visible and relevant."

local_anatomy_surface_contract:
  required_when_active:
    - visible_region
    - focus_role
    - surface_geometry_orientation
    - pose_or_gravity_effect
    - contact_or_fabric_interface
    - local_light_response
    - material_state
    - failure_guards
  focus_role: "primary | secondary | supporting"
  surface_geometry_orientation: "Match the local form turning toward or away from camera and key light."
  pose_or_gravity_effect: "Account for standing, leaning, reclining, twisting, compression, stretch, and support."
  contact_or_fabric_interface: "State whether skin is bare, compressed, covered, wet-cling, semi-sheer, or occluded."

adult_chest_surface_rules:
  anatomical_continuity:
    - "Areola and nipple detail follows the local chest surface and camera perspective; it is not a flat front-facing decal."
    - "Permit subtle left-right variation in size, orientation, tone, projection, and illumination; do not mirror-copy local anatomy."
    - "Use a soft transition between areola, surrounding skin tone, and local shadow rather than a hard circular border."
    - "Local detail follows body rotation, gravity, support, compression, and stretch before cosmetic emphasis."
  pose_and_contact:
    - "Compression, hand contact, fabric tension, or body support may flatten, redirect, partially occlude, or shadow local forms."
    - "A pose that rotates one side away from the camera must change apparent size, contrast, and highlight position."
    - "Do not place identical local detail at the same height, contrast, or projection when the torso is twisted, tilted, or unevenly lit."
  photoreal_surface:
    dry: [subtle tonal variation, fine skin microtexture, soft subsurface color variation, highlight rolloff following curvature]
    damp: [localized moisture sheen, softened edge contrast, droplets following gravity, highlights broken by surface curvature]
    wet: [water-source-supported sheen, directional rivulets, controlled specular bands, no uniform plastic gloss]
  anime_realism_surface:
    - "Use controlled tonal gradients and contour-aware highlight shapes rather than photoreal pore detail."
    - "Keep small asymmetry, body-plane direction, fabric contact, and light direction consistent with the stylized form."

material_interface_rules:
  bare_skin:
    - "Keep local form, skin texture, and light falloff continuous with the surrounding chest surface."
  wet_cling_or_translucent_fabric:
    - "Visibility is graded by moisture, material thickness, stretch, adhesion, and light direction; never use a sharp cutout-like reveal."
    - "Fabric folds, seams, buttons, weave, and wet/dry transitions remain in front of the body and can soften or interrupt local detail."
    - "When selected as visible exposure evidence, nipple detail must remain clearly discernible through the material; a vague contour is not sufficient."
  silk:
    - "Use directional sheen and fold bands that follow garment tension; do not make satin behave as transparent body paint."
  latex_pvc:
    - "Use controlled reflection bands and tension-driven surface compression while preserving a distinct garment layer."
  opaque_fabric:
    - "Use only plausible contour or fabric tension; do not show sharply colored anatomical detail through opaque material."

failure_guards:
  - sticker_like_round_dot
  - mirror_symmetric_local_anatomy
  - floating_or_unanchored_projection
  - oversaturated_isolated_color_patch
  - sharp_anatomy_through_opaque_fabric
  - local_detail_ignoring_torso_rotation
  - highlight_or_shadow_opposite_to_key_light
  - uniform_gloss_or_uniform_transparency

renderer_translation:
  z_image_positive: "Use visible local geometry and material cues; keep the focal role explicit through composition and depth-of-field language."
  z_image_negative: "Add targeted controls for decal-like local anatomy, mirror symmetry, cutout transparency, floating detail, and contradictory light only when relevant."

prompt_assembly_hooks:
  phase_1_intent_analysis: "Evaluate activation and record local_anatomy_surface_contract only when a visible region is relevant."
  phase_2_cinematic_enrichment: "Resolve focal role, form orientation, pose/gravity, material interface, and key-light response together."
  phase_3_scene_blueprint: "Attach the local contract to material_environment_plan and visual_focus_plan."
  phase_4_self_review: "Reject local anatomy that reads as pasted-on, mirrored, floating, fabric-clipped, or detached from pose and light."
