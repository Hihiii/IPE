# skin-rendering-system.capsule.yaml — Phase 2-3 compiled capsule

skin_texture:
  quality_target: realistic
  guards:
    - no_plastic_skin
    - no_waxy_skin
    - no_over_smoothing
    - maintain_pore_detail
  highlight_control:
    - specular_placement
    - wetness_response
    - sweat_precision

environment_response:
  rain: [beaded_water, rivulet, diffuse_wetness]
  humidity: [ambient_moisture, soft_highlight]
  heat: [flush, sweat_sheen, dilated_pores]
  cold: [goosebumps, tightened_texture, pale_tone]

makeup:
  style: contextual
  skin_interaction: natural
